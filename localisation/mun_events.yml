# == (*) ==
### CZECHOSLOVAKIA ###
 MUN_czech_skoda_priority.t: "Заводи «Шкода»"
 MUN_czech_skoda_priority.d: "Компанія «Шкода» виробляє широкий спектр продукції: від артилерії до танків, поїздів та морських гармат. Це забезпечує велику гнучкість завдяки перенаправленню ресурсів туди, де попит найвищий, і тепер ми можемо частково цим керувати."
 MUN_czech_skoda_priority.1.a: "Цікаво"
 MUN_czech.2.t.1: "Судетські воєнізовані формування просять про допомогу"
 MUN_czech.2.t.2: "Судетський добровольчий корпус просить про допомогу"
 MUN_czech.2.t.3: "Судетська робітнича міліція просить про допомогу"
 MUN_czech.2.d.1: "У світлі нещодавніх новин про наші плани щодо Чехії, багато судетських політичних партій швидко сформували воєнізовані загони по всьому регіону в надії підірвати [CZE.GetAdjective]ий уряд. Тепер вони просять нашої підтримки у здійсненні транскордонних рейдів та актів саботажу, щоб допомогти нашим зусиллям проти [CZE.GetAdjective]ого війська."
 MUN_czech.2.d.2: "У світлі нещодавніх новин про наші плани щодо Чехії, судетські політичні партії швидко мобілізували свої воєнізовані формування — Судетський добровольчий корпус. Загони добровольчого корпусу по всій Судетській області розпочали напади на об'єкти, що належать [CZE.GetAdjective]ому уряду. Тепер вони просять про нашу повну підтримку в проведенні транскордонних рейдів та здійсненні диверсій проти [CZE.GetAdjective]ого війська."
 MUN_czech.2.d.3: "У світлі нещодавніх новин про наші плани щодо [CZE.getname], місцеві комуністичні партії швидко мобілізували робітничу міліцію. Ці загони робітничої міліції почали атакувати об'єкти [CZE.GetAdjective]ого уряду в регіоні. Тепер вони просять нашої повної підтримки у здійсненні транскордонних рейдів та диверсій проти [CZE.GetAdjective]ого уряду і інших контрреволюціонерів."
 MUN_czech.2.a: "Звичайно, ми допоможемо"
 MUN_czech.2.b: "Можливо, краще не заохочувати їх надалі"
 MUN_czech.3.t: "Партизанська активність у Судетах"
 MUN_czech.3.d: "На тлі нещодавньої зацікавленості [FROM.GetAdjective]ого уряду в анексії Судетської області, воєнізовані формування почали вступати в сутички з нами. Вони атакують урядові будівлі та підривають нашу оборону в кількох районах. Якщо ми хочемо покращити нашу військову ситуацію в регіоні, нам потрібно розібратися з цими воєнізованими угрупованнями."
 MUN_czech.3.a: "Хіба може бути ще гірше?"
 MUN_czech.4.t: "Криза довіри"
 MUN_czech.4.d: "Нещодавні новини про військову агресію проти нас вразили уряд до глибини душі. [CZE.GetLeader] втратив віру в здатність свого уряду провести країну через цю кризу. Він вимагає, щоб $CZE_jan_syrovy$ взяв ситуацію під контроль і очолив країну. $CZE_jan_syrovy$ заявив, що не має бажання керувати державою, однак, з огляду на обставини, [CZE.GetLeader] відповів, що той не має іншого вибору, окрім як взяти на себе командування і провести нас через цю кризу."
 MUN_czech.4.a: "Ви потрібні нам як ніколи."
 MUN_czech.4.b: "Ми не повинні втрачати голову."
 MUN_czech.5.t: "Томаш Масарик пішов із життя"
 MUN_czech.5.d: "Масарик був стабілізуючою фігурою в чехословацькій політиці понад два десятиліття. Коли здавалося, що коаліції створити неможливо, а політичні глухі кути непереборні, Масарик раз за разом творив політичні дива, допомагаючи зміцнювати і розвивати Чехословаччину до її нинішнього стану. Його присутності дуже бракуватиме, і це відчуватиме вся нація."
 MUN_czech.5.a: "Незамінний політичний титан."
 MUN_czech.7.t: "Перегляд зобов'язань перед [CZE.GetAdjective]им урядом"
 MUN_czech.7.d: "Нещодавно до нас надійшли новини про те, що [GER.getnamedef] бажає анексувати Судетську область і готова піти на війну з [CZE.GetAdjective]им військом задля досягнення цієї мети. Наразі ми маємо оборонну угоду з Чехословаччиною, що означає, що у разі її війни з [GER.getnamedef] ми будемо зобов'язані прийти їй на допомогу. Якщо ми хочемо уникнути такого розвитку подій, нам потрібно негайно розірвати наші оборонні угоди з Чехословаччиною."
 MUN_czech.7.a: "Ми не кидаємо наших друзів"
 MUN_czech.7.b: "У нас не було б і шансу проти [GER.GetAdjective]ого війська"
 MUN_czech.1001.t: "[FROM.GetNameDefCap] вимагає коридор до [SOV.GetAdjective]их територій"
 MUN_czech.1001.d: "Сподіваючись координувати військові дії з [SOV.GetNameDef], [FROM.GetNameDef] вимагає, щоб ми передали їм прикордонні регіони [89.GetName] та [91.GetName]."
 MUN_czech.1002.t: "[FROM.GetNameDefCap] вимагає впливу на Югославську лігу"
 MUN_czech.1002.d: "Після експансії на південь [FROM.GetName] висунула незвичну вимогу. Вони вимагають не захоплення земель, а контролю над Югославською оборонною лігою, прагнучи стати захисником і сюзереном північнобалканських країн, які зараз є нашими суб'єктами. Вони стверджують, що будуть кращим захисником, ніж ми, але, звісно, це може бути лише відмовкою."
 MUN_czech.1002.a: "Можливо, вони мають рацію"
 MUN_czech.1002.b: "Ні, вони перебувають під нашим захистом!"
 MUN_czech.1003.t: "[FROM.GetName] відхиляє вимоги"
 MUN_czech.1003.d: "Попри переконливі аргументи наших дипломатів, [FROM.GetNameDef] відмовилася поступитися нашим вимогам."
 MUN_czech.1003.a: "Вони не залишають нам іншого вибору"
 MUN_czech.1004.t: "[FROM.GetName] виступає проти Угорщини"
 MUN_czech.1004.d: "До [ROOT.capital.GetCapitalVictoryPointName] надійшли новини про те, що [FROM.GetAdjective]і війська просуваються до [HUN.GetAdjective]ого кордону. Хоча [HUN.GetAdjective]і представники, безсумнівно, незабаром зв'яжуться з нами, ми повинні вже зараз вирішити, чи варто нам допомогти [HUN.GetNameDef] і здобути потенційного союзника, чи дозволити [FROM.GetNameDef] продовжувати свої нинішні плани."
 MUN_czech.1004.a: "Ми повинні захищати свої інтереси"
 MUN_czech.1004.b: "Давайте залишимося осторонь"
 MUN_czech.1005.t: "[FROM.GetName] вимагає прибережну територію"
 MUN_czech.1005.d: "Оскільки [FROM.GetNameDef] невпинно розширює свою територію, їхні представники прибули, щоб вимагати передачі їм земель, якими колись володіли [FROM.GetAdjective]і дворяни. Вони кажуть, що це дасть їм потенційний вихід до Адріатики, і, схоже, їх не надто цікавлять наші думки з цього приводу."
 MUN_czech.1006.t: "[FROM.GetName] пропонує партнерство"
 MUN_czech.1006.d: "[FROM.GetNameDef] звернулася до нас із пропозицією договору про взаємну оборону, прагнучи відлякати будь-яких нападників об'єднаною міццю наших армій. Проте, що цікаво, договір містить таємну частину, де викладено можливе розширення [ROOT.GetAdjective]ого впливу і те, як [FROM.GetNameDef] може в цьому допомогти."
 MUN_czech.1007.t: "[FROM.GetName] вимагає лояльності"
 MUN_czech.1007.d: "Недовіра між нами та [FROM.GetNameDef] з моменту їхнього створення призвела до того, що тепер вони вимагають нашої лояльності під загрозою вторгнення. Цікаво, однак, що [FROM.GetNameDef] також апелює до наших територіальних амбіцій і обіцяє, що в обмін на відмову від претензій на їхні землі вони можуть допомогти нам здобути інші землі, на які ми претендуємо."
 MUN_czech.1007.b: "Ми повинні зберегти наш суверенітет!"
 MUN_czech.1008.t: "[FROM.GetName] пропонує укласти союз із [CZE_invited_country.GetName]"
 MUN_czech.1008.d: "Представники [FROM.GetNameDef], нашого містка до Центральної Європи, запропонували розширити наш альянс, запросивши [CZE_invited_country.GetName]."
 MUN_czech.1008.a: "Ще один фактор стримування нападників"
 MUN_czech.1008.b: "Від нас не варто очікувати захисту всієї Європи"
 MUN_czech.1009.t: "[FROM.GetName] запрошує нас до фракції «[CZE.GetFactionName]»"
 MUN_czech.1009.d: "Дипломати з [FROM.GetNameDef] повідомили, що ми були б бажаними гостями в їхньому альянсі. Однак у минулому наші територіальні претензії були каменем спотикання у відносинах з [FROM.GetNameDef]. Тепер ми повинні вирішити, чи продовжувати наполягати на цих претензіях, чи зосередитися на встановленні більш дружніх відносин."
 MUN_czech.1009.a: "За нашого нового союзника!"
 MUN_czech.1009.b: "Ми приєднаємося після визнання наших претензій"
 MUN_czech.1009.c: "Ми не зацікавлені"
 MUN_czech.1010.t: "[FROM.GetName] пропонує нам очолити фракцію «[CZE.GetFactionName]»"
 MUN_czech.1010.d: "Після недавньої спроби перетворити угоди Малої Антанти на справжній альянс [FROM.GetNameDef] виступила з пропозицією: вони хочуть, щоб ми очолили цю нову фракцію. Вони поступляться лідерством і натомість отримають у нашій особі цінного захисника — угода, яка розширить нашу сферу впливу, але потенційно за рахунок країн, що перебувають під загрозою."
 MUN_czech.1010.a: "Вони будуть цінними союзниками"
 MUN_czech.1010.b: "Захисту [ROOT.GetNameDef] цілком достатньо"
 MUN_czech.1011.t: "[FROM.GetName] пропонує договір про захист"
 MUN_czech.1011.d: "У рамках зусиль з відлякування будь-якої агресії щодо [FROM.GetNameDef], їхні дипломати звернулися до нас із проєктом договору про взаємну оборону. В обмін на нашу підтримку вони запропонують нам такий самий захист, що змусить будь-якого агресора вести війну на два фронти."
 MUN_czech.1011.a: "Це варте ризику"
 MUN_czech.1011.b: "Нейтралітет безпечніший"
 MUN_czech.1012.t: "[FROM.GetName] вимагає нашого підкорення"
 MUN_czech.1012.d: "Підбадьорена своїм новоствореним альянсом, [FROM.GetNameDef] висунула низку вимог, що рівнозначно втраті нашого суверенітету. Враховуючи підтримку з боку [SOV.GetName] через його інтерес до регіону, ми маємо зараз вирішити, чи можемо дозволити собі відмовити."
 MUN_czech.1012.a: "Опір призведе лише до втрати [ROOT.GetAdjective]их життів"
 MUN_czech.1012.b: "Смерть краща за ганьбу!"
 MUN_czech.1013.t: "[FROM.GetName] пропонує умовний союз"
 MUN_czech.1013.d: "Після ретельних обмірковувань уряд [FROM.GetNameDef] оголосив, що поділяє думку про вигідність союзу, проте не може закрити очі на свої територіальні претензії. Тому вони виступили з пропозицією: вони приєднаються до нашої фракції, але тільки якщо ми передамо їм території, на які вони претендують."
 MUN_czech.1013.a: "Жертва, на яку варто піти"
 MUN_czech.1013.b: "Ми намагаємося захистити власну територію!"
 MUN_czech.1014.t: "[FROM.GetName] просить про захист"
 MUN_czech.1014.d: "Впливові дипломати з [FROM.GetNameDef] звернулися до міністра закордонних справ із проханням закріпити туманні обіцянки захисту, викладені в чехословацько-радянському договорі 1935 року."
 MUN_czech.1014.a: "Можливо, нам варто спробувати захистити нашого союзника"
 MUN_czech.1014.b: "Нехай це залишається туманними обіцянками"
 MUN_czech.1015.t: "[FROM.GetName] пропонує об'єднати наші фракції"
 MUN_czech.1015.d: "Оскільки тепер ми маємо спільних ворогів, [FROM.GetName] звернулася до нас із пропозицією поглибити нашу співпрацю шляхом інтеграції нашої фракції в їхню."
 MUN_czech.1015.a: "Скоординовані дії врятували б багато життів"
 MUN_czech.1015.b: "Ми маємо зберігати контроль"
 MUN_czech.1016.t: "[FROM.GetName] пропонує пакт про ненапад"
 MUN_czech.1016.d: "Продовжуючи базуватися на попередніх переговорах, які були скасовані після зміни планів зовнішньої політики, [FROM.GetNameDef] запропонувала відновити переговори щодо пакту про ненапад."
 MUN_czech.1016.a: "На один кордон менше для захисту"
 MUN_czech.1016.b: "Це стане на заваді нашим амбіціям"
 MUN_czech.1017.t: "Спільне вторгнення у [GER.GetNameDef]?"
 MUN_czech.1017.d: "[FROM.GetNameDef] звернулася до [ROOT.GetAdjective]ого керівництва з таємними планами вторгнення у [GER.GetNameDef]. Показавши свою рішучість усунути [GER.GetAdjective]у загрозу, вони попросили нашої допомоги, щоб разом розгромити могутню [GER.GetAdjective]ою армію."
 MUN_czech.1017.a: "Ми завдамо удару по [GER.GetNameDef] разом із ними"
 MUN_czech.1017.b: "Це занадто небезпечно"
 MUN_czech.1018.t: "Воювати проти [GER.GetNameDef] самотужки?"
 MUN_czech.1018.t.2: "Спільне вторгнення у [GER.GetNameDef]"
 MUN_czech.1018.d: "Незважаючи на всі наші дипломатичні зусилля, ми не змогли заручитися іноземною підтримкою для превентивного вторгнення в [GER.GetName]. Тепер постає питання, чи варто взагалі втілювати наші плани наступу."
 MUN_czech.1018.d.FRA_POL: "З [FRA.GetNameDef] та [POL.GetNameDef] надійшли чудові новини — наші дипломати повідомляють, що обидві країни зобов'язалися допомогти нам у вторгненні до [GER.GetNameDef]."
 MUN_czech.1018.d.FRA: "Наші дипломати повернулися з [FRA.GetNameDef] із чудовою новиною про те, що вони готові взяти участь у спільному вторгненні до [GER.GetNameDef]. Тепер ми маємо оцінити, чи буде достатньо наших об'єднаних сил."
 MUN_czech.1018.d.POL: "Наші дипломати повернулися з [POL.GetNameDef] із чудовою новиною про те, що вони готові взяти участь у спільному вторгненні до [GER.GetNameDef]. Тепер ми маємо оцінити, чи буде достатньо наших об'єднаних сил."
 MUN_czech.1018.a: "Вони ніколи цього не очікуватимуть"
 MUN_czech.1018.b: "Озираючись назад, це занадто ризиковано"
 MUN_czech.1019.t: "[FROM.GetName] вимагає [762.GetName]"
 MUN_czech.1019.d: "Посилаючись на бажання відновити колишні богемські кордони та легітимізувати свій контроль над [72.GetName], [FROM.GetAdjective]і представники висунули ультиматум із вимогою передати [762.GetName]."
 MUN_czech.1019.a: "Можливо, це убезпечить нас"
 MUN_czech.1020.t: "[FROM.GetName] пропонує інвестиції на умовах"
 MUN_czech.1020.a: "Чудова угода!"
 MUN_czech.1020.b: "Ці умови є неприйнятними"
 MUN_czech.1020.d: "З [FROM.GetNameDef] прибули дипломати з планом угоди, за якою їхня країна інвестуватиме в нашу промисловість та інфраструктуру в обмін на угоду щодо ресурсів. Цей крок, зроблений після невдалих інвестицій у попередні роки, свідчить про відновлення зусиль щодо покращення наших відносин."
 CZE_investment_effects_tt: "Через §Y100 днів§! ми отримаємо:\n§YІнфраструктуру§! в §Y3§! випадкових регіонах.\n§YЦивільну фабрику§! в §Y1§! випадковому регіоні.\n"
 MUN_czech.1021.t: "Повернення Австро-Угорського митного союзу?"
 MUN_czech.1021.d: "[CZE.GetNameDefCap] звернулася до нас із проєктом торговельної угоди між колишніми країнами Австро-Угорщини. Хоча новий [CZE.GetAdjective]ий уряд і задоволений своєю незалежністю, він, здається, особливо охоче бажає відновити вигідні елементи австро-угорської держави."
 MUN_czech.1021.a: "Збільшення торгівлі звучить привабливо"
 MUN_czech.1021.b: "Ми маємо захищати національних виробників"
 MUN_czech.1022.t: "[CZE.GetName] захоплює Сілезію"
 MUN_czech.1022.d: "Після запеклих боїв у горах [69.GetName], [CZE.GetAdjective]і війська врешті-решт прорвалися і встановили контроль над усією Сілезією, перш ніж війська, з якими вони зіткнулися, встигли оговтатися, щоб чинити серйозний опір."
 MUN_czech.1022.a: "Ми маємо втрутитися"
 MUN_czech.1022.b: "Ми не можемо нажити собі ще одного ворога"
 MUN_czech.1022.c: "Велика перемога!"
 MUN_czech.1023.t: "[CZE.GetName] розпочинає боротьбу за Сілезію"
 MUN_czech.1023.d: "Посилаючись на якісь застарілі аргументи про середньовічні королівства та імперії, [FROM.GetNameDef] перетворила прикордонні сутички на локальну війну, щоб встановити контроль над [ROOT.GetAdjective]ою Сілезією."
 MUN_czech.1023.a: "Готуйте війська"
 MUN_czech.1024.t: "[CZE.GetName] пропонує мирну угоду"
 MUN_czech.1024.d: "Після того, як прикордонні сутички в Сілезії переросли в повномасштабну війну, [FROM.GetNameDef] тепер заявила про свою готовність припинити конфлікт, якщо територія, на яку вона претендує, буде їй передана."
 MUN_czech.1024.a: "Можливо, нам варто зосередитися на інших напрямках"
 MUN_czech.1024.b: "Ситуація все ще на нашу користь"
 MUN_czech.1024.c: "Це не підлягає обговоренню!"
 MUN_czech.1025.t: "Завершення добровольчої місії в Іспанії"
 MUN_czech.1025.d.1: "[ROOT.GetAdjective]і війська, відправлені до [CZE_supported_spanish_faction.GetName], повертаються додому після того, як допомогли їм здобути перемогу. Бойові дії дали новий досвід нашим військам, і особливо медичним загонам."
 MUN_czech.1025.d.2: "Незважаючи на доблесну боротьбу [ROOT.GetAdjective]их сил у громадянській війні в Іспанії, сторона, яку ми підтримували, зазнала поразки. Попри це, наші війська і особливо їхні медичні команди засвоїли цінні уроки."
 MUN_czech.1025.a: "Сподіваємося, нам не доведеться застосовувати ці уроки вдома"
 MUN_czech.1026.t: "[FROM.GetName] відхиляє пропозицію"
 MUN_czech.1026.a: "Це їхня втрата"
 MUN_czech.1026.b: "Тривожний розвиток подій"
 MUN_czech.1026.france_refuses_to_lead: "Незважаючи на керівну роль, яка була запропонована [FROM.GetAdjective]ій стороні в обмін на приєднання до нашого союзу, вони вирішили цього не робити. Здається, [FROM.GetNameDef] намагається зберегти нейтралітет або вичікує слушного моменту."
 MUN_czech.1026.sphere_of_influence: "Хоча члени [FROM.GetAdjective]ого уряду запевнили нас, що наша участь у фракції «[ROOT.GetFactionName]» цінується, вони заявили, що поширення нашого впливу на Балкани зайде надто далеко і може відлякати потенційних союзників."
 MUN_czech.1026.guarantee: "Наші дипломати повідомляють, що попри їхні зусилля, [FROM.GetNameDef] не погодилася з нашою пропозицією щодо договору про взаємну оборону. Здається, вони вважають, що ми наражаємось на більшу небезпеку, ніж вони. Будемо сподіватись, що вони помиляються."
 MUN_czech.1026.faction_merge: "Незважаючи на всі наші зусилля, наші та [FROM.GetAdjective]і дипломати не змогли дійти згоди щодо об'єднання фракцій «[ROOT.GetFactionName]» та «[FROM.GetFactionName]»."
 MUN_czech.1026.non_aggression: "Незважаючи на запевнення у своїх мирних намірах, [FROM.GetAdjective]і дипломати відмовилися підписати з нашою країною пакт про ненапад; чому так сталося — залишається лише здогадуватися."
 MUN_czech.1026.trade_deal: "Посилаючись на бажання залишатися економічно незалежною, [FROM.GetNameDef] відхилила пропозицію щодо нашої торговельної угоди."
 MUN_czech.1026.faction_invite: "Хоча наші дипломати й озвучили аргументи, чому [FROM.GetNameDef] виграє від союзу з нами, вони врешті-решт не досягли успіху в залученні їх на наш бік."
 MUN_czech.1026.weapons_sale: "Незважаючи на нашу щедру пропозицію, [FROM.GetNameDef] вирішила наразі не купувати в нас зброю."
 MUN_czech.1026.unification: "Незважаючи на визнання переваг, які принесла б федерація, [FROM.GetNameDef] вирішила зберегти свій уряд у вигнанні як єдиний законний уряд для своїх земель."
 MUN_czech.1026.white_peace: "Сьогодні наші представники повернулися з сумною новиною: незважаючи на окупацію [66.GetName], [FROM.GetAdjective]е керівництво не бажає підписувати мирний договір. Схоже, нам доведеться або просуватися далі в наших завоюваннях, або сподіватися, що ми їх виснажимо."
 MUN_czech.1027.t: "Укласти [FROM.GetAdjective]о-[ROOT.GetAdjective]у торговельну угоду?"
 MUN_czech.1027.d: "Незважаючи на початкові ідеологічні розбіжності, [FROM.GetNameDef] звернулася до нашого прагматизму, запропонувавши укласти торговельну угоду. В обмін на дозвіл [FROM.GetAdjective]ій стороні видобувати ресурси в регіоні [202.GetName], вони допоможуть надати верстати, які нам так конче потрібні для розширення наших промислових потужностей."
 MUN_czech.1027.a: "Вкрай вигідна угода."
 MUN_czech.1027.b: "Ми повинні відмовити їм у цих ресурсах."
 MUN_czech.1028.t: "Затримка зусиль з фортифікації"
 MUN_czech.1028.d: "Багато хто в країні зараз задається питанням, чому уряд не продовжив фортифікаційні проєкти, які він розпочав наприкінці минулого року. Уряд виділив кошти на додаткові проєкти з будівництва фортець через Раду з фортифікації. Оскільки жодного прогресу в реалізації програми не спостерігається, люди вимагають або продовжити проєкт, або повернути кошти. Якщо ми все ж бажаємо продовжувати наші програми фортифікації, не можна втрачати ані хвилини, щоб відновити проєкти і завершити їх вчасно."
 MUN_czech.1028.a: "Ми не маємо часу на зволікання!"
 CZE_no_time_to_lose_tt: "Наш час на завершення фортифікаційних проєктів до того, як виникне загроза, тепер дуже обмежений."
 MUN_czech.1029.t: "Проєкт фортифікації завершено"
 MUN_czech.1029.d: "Наш останній фортифікаційний проєкт завершено, і тепер є ресурси для початку наступного. Наші інженери готові за першим же наказом вирушити в інше місце, щоб розпочати земляні роботи на новій лінії укріплень."
 MUN_czech.1029.a: "Відмінна робота, панове"
 MUN_czech.1030.t: "[FROM.GetName] вимагає інтеграції"
 MUN_czech.1030.d: "[FROM.GetNameDefCap] вимагає, щоб ми стали частиною їхнього союзу, оскільки вони прагнуть його розширити. Хоча вони апелюють до різних країн регіону з різних причин: панславізм, панбалканізм, а для інших — спільна історія в Австро-Угорській імперії, ця пропозиція також містить явну приховану погрозу на випадок нашої відмови."
 MUN_czech.1030.a: "Можливо, це не так уже й погано"
 MUN_czech.1030.b: "Не дуже переконливо"
 MUN_czech.1031.t: "[FROM.GetName] пропонує союз"
 MUN_czech.1031.d: "Хоча [ROOT.GetNameDef] капітулювала, [FROM.GetAdjective]ий уряд виступив із радикальною пропозицією, яка дозволить нам продовжити боротьбу: об'єднати те, що залишилося від нашої країни, з їхньою."
 MUN_czech.1031.a: "Разом ми зможемо краще захистити наші землі"
 MUN_czech.1031.b: "Наші розбіжності занадто великі"
 MUN_czech.1032.t: "Подолання розколу"
 CZE_divide_nation_title_dynamic_sudentenland: "$MUN_czech.1032.t$ у Судетській області"
 CZE_divide_nation_title_dynamic_czech_states: "$MUN_czech.1032.t$ серед чеських робітників"
 CZE_divide_nation_title_dynamic_tesinko_poles: "$MUN_czech.1032.t$ у регіоні [72.GetName]"
 CZE_divide_nation_title_dynamic_slovakia_states: "$MUN_czech.1032.t$ у [SLO.GetNonIdeologyName]"
 CZE_divide_nation_title_dynamic_hungarian_states: "$MUN_czech.1032.t$ у регіоні [664.GetName]"
 CZE_divide_nation_title_dynamic_ukrainian_states: "$MUN_czech.1032.t$ у регіоні [73.GetName]"
 MUN_czech.1032.d: "Нещодавні зусилля щодо вирішення проблем у [FROM.getname] увінчалися успіхом і дозволили знизити рівень невдоволення центральним урядом, принаймні на даний час. Ресурси нашого уряду тепер звільнилися для спрямування на інші соціальні чи економічні програми, які продовжуватимуть боротися з проблемами, що розколюють нашу країну."
 MUN_czech.1032.a: "До роботи"
 MUN_czech.1033.t: "[FROM.GetAdjective]ий уряд у вигнанні просить про визнання"
 MUN_czech.1033.d: "[FROM.GetAdjective]ий уряд у вигнанні під керівництвом $CZE_edvard_benesh$ просить нас прийняти їхню делегацію, оскільки вони ведуть боротьбу за відновлення суверенітету [CZE.GetNonIdeologyName]."
 MUN_czech.1033.a: "Ще один союзник проти [GER.GetAdjective]ої держави"
 MUN_czech.1033.b: "Вони нелегітимні"
 MUN_czech.1034.t: "Заворушення у Словаччині"
 MUN_czech.1034.d: "Через наші поступки націоналістичним настроям інших груп, члени Словацької народної партії сформували власне воєнізоване формування, яке тепер прагне незалежності або принаймні автономії для Словаччини. Тепер постає питання: чи варто зосередитися на збереженні видимості єдності, запобігаючи цьому, чи досягти її, дозволивши це і зосередившись на землях, які залишаються лояльними до уряду."
 MUN_czech.1034.a: "Ввести армію у Словаччину!"
 MUN_czech.1034.b: "Заарештувати їх, але надати певну автономію"
 MUN_czech.1034.c: "Взяти під прямий контроль"
 MUN_czech.1034.c_tt: "§RМи будемо повністю залежати від рішення [GER.GetNameDef] щодо долі Чехословаччини.§!"
 MUN_czech.1035.t: "[FROM.GetName] пропонує виготовляти для нас зброю"
 MUN_czech.1035.d: "Наше тісне партнерство з [CZE.GetNameDef] спонукало їх запропонувати унікальну угоду: вони виготовлятимуть для нас зброю, яку ми зараз виробляємо всередині країни, звісно ж, за певну ціну. Це, у свою чергу, дозволить нам зосередитися на інших секторах нашої промисловості."
 MUN_czech.1035.a: "Це означає менше дублювання зусиль"
 MUN_czech.1035.b: "Ми не можемо ставити нашу армію в залежність від іноземного спорядження"
 #MUN_czech.1036.t: "" #Event uses MUN_czech.1032.t
 MUN_czech.1036.d: "Велика депресія не принесла нашій країні жодної користі ні в економічному, ні в політичному плані. Нас дошкуляють численні регіональні економічні та політичні проблеми, і здається, що вони лише загострюються навіть на тлі нашого дивовижного відновлення після Великої депресії. Ми маємо вирішити ці проблеми до того, як вони ще більше розколють нашу націю."
 MUN_czech.1036.a: "Ми повинні зцілити нашу націю"
 CZE_divided_nation_event_onbroad_tt: "Розблоковано §Yрішення§!, які дозволяють нам §Yвидалити§! негативні §Yмодифікатори регіону§! у наших національних регіонах.\n\nВиконання цих §Yрішень§! також зменшить негативні модифікатори національного духу §Y$CZE_a_divided_nation_dynamic_modifier$§!, поки його не буде §Yвидалено§!."
 MUN_czech.1037.t: "[GER.GetName] бере під захист Угорщину"
 MUN_czech.1037.d: "Помітивши очевидне виправдання війни проти Угорщини у нашій країні, [GER.GetAdjective]і представники чітко дали зрозуміти, що війна з [HUN.GetAdjective]ими військами означатиме війну і з [GER.GetAdjective]ими. Чи продовжувати нам діяти — вирішувати нам."
 MUN_czech.1037.a: "Наші плани мають бути скасовані"
 MUN_czech.1037.b: "Це нічого не змінює"
 MUN_czech.1038.t.1: "[FROM.GetName] пропонує ліцензію на свої проєкти танків"
 MUN_czech.1038.t.2: "[FROM.GetName] пропонує продати гвинтівки"
 MUN_czech.1038.t.3: "[FROM.GetName] пропонує продати артилерію"
 MUN_czech.1038.t.4: "[FROM.GetName] пропонує продати легкі танки"
 MUN_czech.1038.t.5: "[FROM.GetName] пропонує продати винищувачі"
 MUN_czech.1038.d: "Представники [FROM.GetAdjective]ого уряду та їхніх збройових компаній звернулися до нас із пропозицією щодо продажу зброї. Ціна здається цілком прийнятною, до того ж [FROM.GetNameDef] пропонує деякі дуже сучасні зразки."
 MUN_czech.1038.a: "Звучить як вигідна угода"
 MUN_czech.1039.t: "[RUT.getname] бажає угоди про автономію"
 MUN_czech.1039.d: "У світлі Угоди про автономію, яку ми надали [SLO.GetAdjective]им представникам, $RUT_augustin_voloshyn$ запитав про можливість для свого регіону укласти таку ж угоду про федералізацію з нами. Це здається абсурдним, але за нинішніх обставин ми змушені сприймати ці вимоги всерйоз."
 MUN_czech.1039.a: "Ми ще подивимось"
 MUN_czech.1040.t: "[CZE.getname] пропонує нам Договір про митний союз"
 MUN_czech.1040.d: "[CZE.getnameDEFCAP] нещодавно відновила дипломатичні переговори щодо митного союзу між нашими двома країнами. Угода, яку вони намагаються укласти, здається справедливою, але згодом може містити інші вимоги, до яких ми можемо бути не готові. Цей договір і те, що становить предмет торгівлі, виглядає тривіальним і символічним, тому від його підписання не буде жодної шкоди."
 MUN_czech.1040.a: "Здається безпечним"
 MUN_czech.1040.b: "Цьому не можна довіряти"
 MUN_czech.1041.t: "[FROM.getname] відхиляє Договір про митний союз"
 MUN_czech.1041.d: "Посилаючись на те, що цей договір може зашкодити їхній економіці, [From.getname] відхилила підписання договору про митний союз між нашими країнами. Ці причини здаються безпідставними та надуманими відмовками."
 MUN_czech.1041.a: "Прикро"
 MUN_czech.1042.t: "[FROM.getname] погоджується на Договір про митний союз"
 MUN_czech.1042.d: "Переконавшись, що Договір є задовільним, [FROM.getname] погодилася з його умовами. Сподіваємось, це перший крок до більш тісних зв'язків між нашими двома країнами."
 MUN_czech.1042.a: "Відмінно"
 MUN_czech.1043.t: "[FROM.getname] вимагає, щоб ми приєдналися до їхньої федерації"
 MUN_czech.1043.d: "Посилаючись на тісніші зв'язки між нашими країнами та останні події у світі, [FROM.getname] заявила, що нам буде краще під їхнім захистом, ніж на самоті. Це виглядає як хитрий план, щоб просто окупувати нашу територію. Що ми маємо робити?"
 MUN_czech.1043.a: "Ми згодні"
 MUN_czech.1043.b: "Жахлива ідея"
 MUN_czech.1044.t: "[FROM.getname] відмовляється приєднатися до Федерації"
 MUN_czech.1044.d: "Вирішивши, що їм буде краще самим, ніж під нашим керівництвом, [FROM.getname] відкинула можливість приєднатися до нашої федерації. Це удар по нашій меті зміцнити свої позиції в Європі. Що ми маємо робити тепер, коли [FROM.getname] не бажає братися за розум."
 MUN_czech.1044.a: "Дуже прикро"
 MUN_czech.1044.b: "Нам доведеться спробувати інші методи"
 MUN_czech.1045.t: "[FROM.getname] погоджується приєднатися до Федерації"
 MUN_czech.1045.d: "Зрозумівши, що під нашим захистом вони будуть у більшій безпеці, ніж наодинці, [FROM.getname] мудро приєдналася до нашої федерації. Це значно зміцнить наші позиції в Європі."
 MUN_czech.1045.a: "Відмінно"
 MUN_czech.1046.t: "Зцілення розколу"
 MUN_czech.1046.d: "Оскільки ми вирішили багато проблем всередині країни, напруга в нашій нації, здається, спадає. Після завершення багатьох економічних та соціальних програм наша країна тепер, схоже, починає зцілюватися."
 MUN_czech.1046.a: "Чудові новини"
 #MUN_czech.1047 is hidden
 MUN_czech.1048.t: "[FROM.GetName] приймає вимоги"
 MUN_czech.1048.t2: "[FROM.GetName] погоджується на пропозицію"
 MUN_czech.1048.d: "З небажанням [FROM.GetAdjective]і посадовці повідомили нас, що мають намір поступитися нашим територіальним вимогам. [FROM.GetAdjective]і війська вже виводяться з цієї території."
 MUN_czech.1048.d2: "Після тривалих дискусій наші офіційні особи та [FROM.GetAdjective]і представники успішно узгодили нову роль [FROM.GetAdjective]ої економіки як частини нашого союзу. Ця домовленість обов'язково принесе процвітання громадянам обох наших країн."
 MUN_czech.1048.d3: "Нашу пропозицію щодо пакту про ненапад [FROM.GetAdjective]і представники сприйняли з миттєвим ентузіазмом; схоже, їхні амбіції наразі зосереджені деінде."
 MUN_czech.1048.d4: "Опинившись під серйозною загрозою, [FROM.GetNameDef] піддалася нашим вимогам щодо лояльності."
 MUN_czech.1048.d5: "Після тривалих дискусій наші офіційні особи та [FROM.GetAdjective]і представники успішно досягли угоди, за якою частина нашої військової промисловості буде виділена для виробництва спорядження для них. Натомість ми отримаємо торгові товари для наших ринків і виробництва."
 #MUN_czech.1049 is a faction joining event so largely reuses generic loc
 MUN_czech.1049.d: "Новий [FROM.GetAdjective]ий уряд звернувся до нас із пропозицією про створення альянсу. Незважаючи на початкову антинімецьку позицію їхнього нового військового уряду, схоже, вони виявили прагматизм і визнали, що їхні старі міжнародні партнери ненадійні."
 MUN_czech.1050.d: "Наші дипломати повернулися з [FROM.GetNameDef] із невтішною новиною: наш запит на приєднання до їхнього альянсу було відхилено. Хоча причини залишаються неясними, зараз ми опинилися в складній ситуації, коли розкрили свої занепокоєння щодо наших традиційних союзників, так і не зумівши здобути нового."
 MUN_czech.1050.a: "Тоді, можливо, нам варто запропонувати вигідніші умови"
 MUN_czech.1050.b: "Будемо шукати кращих союзників"
 MUN_czech.1051.t: "[FROM.GetName] просить про сферу впливу"
 MUN_czech.1051.d: "Наш новий союзник, [FROM.GetNameDef], висловив зацікавленість у розширенні свого впливу за межі власних кордонів. Відповідно, [FROM.GetAdjective]і представники прибули, щоб заручитися дозволом і підтримкою цієї експансії, під час якої має бути встановлено чітку межу між територіями під [ROOT.GetAdjective]им та [FROM.GetAdjective]им впливом."
 MUN_czech.1051.a: "Ми повинні посилити нашого ключового [FROM.GetAdjective]ого союзника"
 MUN_czech.1052.t: "[FROM.GetName] просить нас надати прохід [SOV.GetAdjective]им військам"
 MUN_czech.1052.d: "Після нової дипломатичної угоди між [FROM.GetAdjective]им та [SOV.GetAdjective]им урядами, [FROM.GetNameDef] впевнена, що [SOV.GetNameDef] захистить їх у разі конфлікту. Єдиною перешкодою є відсутність сухопутного зв'язку між ними. Тому [FROM.GetAdjective]і дипломати звернулися до нашого уряду з проханням дозволити прохід [SOV.GetAdjective]их військ через нашу територію до [FROM.GetAdjective]ої території у разі виникнення конфлікту."
 MUN_czech.1052.a: "Їхня боротьба захистить і нас"
 MUN_czech.1053.t: "[FROM.GetName] тисне на нас [HUN.GetAdjective]ими претензіями"
 MUN_czech.1053.d: "Перетворивши Угорщину на підлеглу державу, [FROM.GetNameDef] тепер вимагає, щоб і ми змирилися з такою ж долею. Вони погрожують, що в разі нашої відмови вони підтримають [HUN.GetAdjective]і претензії на [ROM.GetAdjective]у територію. Тепер ми мусимо обирати між втратою нашого суверенітету або потенційною загрозою нашій територіальній цілісності."
 CZE_cancel_anti_hungary_focus_tt: "Скасовує фокус §Y«$CZE_neutralize_the_hungarian_threat$»§!"
 MUN_czech.1054.t: "Спільне вторгнення у Литву?"
 MUN_czech.1054.d: "Як і було домовлено раніше, [FROM.GetNameDef] виступила з пропозицією, яка допомогла б зміцнити нашу країну. А саме, шляхом насильницького об'єднання з Литвою; це дало б нам доступ до додаткових ресурсів і позбавило б ворога можливості атакувати нас через Литву"
 MUN_czech.1054.a: "Ми повинні розширюватися, щоб протистояти експансії інших"
 MUN_czech.1055.t: "[SOV.GetAdjective]і добровольці прибувають"
 MUN_czech.1055.d: "Здійснивши безпрецедентний подвиг у повітряній логістиці, [SOV.GetAdjective]і ВПС були використані для перекидання кількох дивізій добровольців до нашого аеропорту в [73.GetName], щоб підтримати наші нинішні військові зусилля."
 MUN_czech.1056.t: "[FROM.GetName] вимагає [975.GetName]"
 MUN_czech.1056.d: "Подібно до того, як це колись пропонувалося на Паризькій мирній конференції після Великої війни, [CZE.GetNameDef] оголосила, що вважає коридор до свого союзника, [YUG.GetNameDef], необхідним для безпеки їхнього альянсу. Для досягнення цієї мети [FROM.GetAdjective]і представники висунули ультиматум з вимогою передати їм [975.GetName]."

### THE FALL OF THE REPUBLIC EVENTS ###
 MUN_the_fall_of_the_republic.1.t: "Масовий спалах протестів"
 MUN_the_fall_of_the_republic.1.d: "Нещодавнє рішення [ROOT.GetLeader] відмовитися від Судетської області призвело до спалаху протестів по всій країні. Хоча політичне та військове керівництво прагнуло уникнути кровопролиття у, як вони вважали, безглуздому опорі в умовах непереборної сили, багато хто в країні відчув, що вони прийняли хибне рішення. Деякі політичні рухи зараз намагаються скористатися цими заворушеннями для досягнення власних цілей."
 MUN_the_fall_of_the_republic.1.a: "У нас не було вибору!"
 MUN_the_fall_of_the_republic.2.t.1: "Падіння Першої Республіки"
 MUN_the_fall_of_the_republic.2.t.2: "Хаос в уряді"
 MUN_the_fall_of_the_republic.2.d: "Після рішення уряду здати Судетську область наша країна зіткнулася з великою хвилею відставок молодшого керівництва в армії та уряді. За повідомленнями, дехто з цих людей за ніч втік з країни. У нашому уряді необхідні серйозні зміни, щоб зупинити відтік чиновників і відновити хоч якусь віру в нашу здатність керувати."
 MUN_the_fall_of_the_republic.2.a: "Нам потрібні радикальні зміни."
 MUN_the_fall_of_the_republic.2.b: "Ми повинні тримати курс!"
 MUN_the_fall_of_the_republic.3.t: "[RUT.getname] просить про автономію"
 MUN_the_fall_of_the_republic.3.d: "З огляду на нещодавній політичний хаос, що охопив нашу країну, невеликий регіон Карпатської України бажає отримати більшу автономію від [9.GetCapitalVictoryPointName]. Вони посилаються на давні розбіжності між своїм регіоном та рештою [ROOT.getname]. Однак це прохання більше схоже на те, що місцеві лідери просто користуються нагодою для розширення власних повноважень. Відхилення цього прохання коштуватиме багато політичного капіталу в той момент, коли ми не маємо зайвого."
 MUN_the_fall_of_the_republic.3.a: "Звичайно, чому б і ні?"
 MUN_the_fall_of_the_republic.3.b: "Абсолютно ні!"
 MUN_the_fall_of_the_republic.3.c: "Відпустити їх."
 MUN_the_fall_of_the_republic.4.t: "Доля [RUT.getname]"
 MUN_the_fall_of_the_republic.4.d: "Після нещодавнього хаосу, що спіткав [CZE.GetAdjective]ий уряд, невеликий регіон [RUT.getname] опинився поза межами будь-якої держави. Цей невеликий регіон проголошує себе незалежною країною і робить дипломатичні кроки назустріч своїм сусідам. Багато хто в нашому уряді стурбований тим, що такий стратегічно важливий регіон на нашому кордоні може потрапити до чужих рук. Армія запропонувала негайно висунути сепаратистському регіону ультиматум з вимогою анексії."
 MUN_the_fall_of_the_republic.4.a: "Надішліть їм ультиматум негайно!"
 MUN_the_fall_of_the_republic.4.b: "Це може бути ризиковано, давайте почекаємо."
 MUN_the_fall_of_the_republic.5.t: "[FROM.getname] вимагає нашої анексії!"
 MUN_the_fall_of_the_republic.5.d: "Після здобуття нами незалежності було лише питанням часу, коли сусідня країна спробує включити нас до своєї території. Схоже, [FROM.getname] стала першою, хто це зробив, і тепер вимагає нашої капітуляції. Що ми маємо робити?"
 MUN_the_fall_of_the_republic.5.a: "Ми будемо битися до останнього!"
 MUN_the_fall_of_the_republic.5.b: "Ми не маємо іншого вибору, окрім як погодитися."
 MUN_the_fall_of_the_republic.6.t: "[FROM.getname] відхиляє наш ультиматум!"
 MUN_the_fall_of_the_republic.6.d: "Несподівано [FROM.getname] відхилила наш ультиматум і натомість має намір чинити нам збройний опір. Вони не залишили нам іншого вибору, окрім вторгнення. Плани битв та маршрути наступу вже розроблені, нам залишається лише віддати наказ про напад."
 MUN_the_fall_of_the_republic.6.a: "Ми їх попереджали."
 MUN_the_fall_of_the_republic.6.a_tt: "Ця операція не вплине на §Y$HUN_pal_teleki$§!, якщо [RUT.GetNameDef] не має союзників"
 MUN_the_fall_of_the_republic.6.b: "Це може вилізти боком, краще почекати."
 MUN_the_fall_of_the_republic.7.t: "[FROM.getname] поступається нашим вимогам"
 MUN_the_fall_of_the_republic.7.d: "Як і очікувалося, [FROM.getname] прийняла наші вимоги і готова бути анексованою нашою країною в обмін на деякі тривіальні умови. Цей невеликий регіон не мав жодних шансів протистояти такій могутній державі, як наша. Тепер наш північний кордон захищений краще, ніж раніше, і уряд дуже задоволений здобутою легкою перемогою."
 MUN_the_fall_of_the_republic.7.a: "Чудові новини."

### BOP EVENTS ###
 MUN_czech_bop.1.t: "Бойова готовність армії"
 MUN_czech_bop.1.d: "Зусилля з проведення реформ у першій половині десятиліття починають приносити свої плоди. Наразі наша армія є однією з найсучасніших у Європі. Проте серед деяких політиків і керівників багатьох промислових конгломератів почало поширюватися почуття самовпевненості. Якщо наша армія має залишатися на піку бойової готовності, ми повинні боротися з можливими сумнівами щодо її здатності воювати, а також з тими, хто прагне підірвати її заради власної вигоди."
 MUN_czech_bop.1.a: "Ми будемо готові."
 MUN_czech_bop.2.t.1: "Загроза німецького переозброєння"
 MUN_czech_bop.2.t.2: "Військова експансія сусідніх країн"
 MUN_czech_bop.2.d.1: "Нещодавня ремілітаризація Рейнської області, яку провела [GER.getnameDEFcap], налякала декого з наших військових і політичних лідерів. Хоча багато хто вірить в укладені країною альянси та підготовку, яку наразі проводить армія для протистояння можливій німецькій загрозі. Дехто, однак, не настільки впевнений, що ми зможемо вистояти перед будь-якою [GER.GetAdjective]ою загрозою."
 MUN_czech_bop.2.d.2: "Нещодавні новини про те, що деякі з наших сусідів розпочали програми зі значного розширення своїх збройних сил, налякали декого з наших військових і політичних лідерів. Багато хто вірить в альянси, які країна уклала з іншими державами, та підготовку, яку наразі проводить армія для протистояння можливій іноземній загрозі. Дехто, однак, не настільки впевнений, що ми зможемо вистояти перед лицем можливої іноземної агресії."
 MUN_czech_bop.2.a: "Ми будемо готові."
 MUN_czech_bop.2.a_tt: "Зусилля наших сусідів із переозброєння змусили декого в нашій армії засумніватися в нашій здатності протистояти можливій агресії. Ми повинні заспокоїти армію своїми діями."
 MUN_czech_bop.3.t: "[CZE.getname] надіслала спостерігачів до нашої країни"
 MUN_czech_bop.3.d: "[CZE.getname] нещодавно надіслала людей до нашої країни для спостереження за поточним конфліктом. Водночас один із їхніх виробників стрілецької зброї зв'язався з нашими дипломатами через інші канали, цікавлячись, чи не хочемо ми купити у них стрілецьку зброю. Через накладені на нас обмеження це передбачатиме контрабанду зброї до нашої країни."
 MUN_czech_bop.3.a: "Подивимося, до чого це призведе."
 MUN_czech_bop.3.b: "Ми не можемо дозволити їм робити щось більше, ніж просто спостерігати."
 MUN_czech_bop_3_tt: "§Y[CZE.GetAdjective]ий§! виробник зброї §Y$CZE_zbrojovka_brno_organization$§! може спробувати провезти нам зброю контрабандою."
 MUN_czech_bop.4.t: "Схема $CZE_zbrojovka_brno_organization$"
 MUN_czech_bop.4.d: "[ETH.getname] встановила контакт із представниками виробника зброї $CZE_zbrojovka_brno_organization$ і зацікавлена в контрабанді нашої зброї до своєї країни. Попри санкції Ліги Націй проти [ETH.GetAdjective]ого уряду, $CZE_zbrojovka_brno_organization$ готова піти на цю схему. Порушення мандату Ліги Націй виявиться непопулярним на міжнародній арені, якщо нас упіймають."
 MUN_czech_bop.4.a: "Зробімо це"
 MUN_czech_bop.4.b: "Це не варте можливих наслідків"
 CZE_gun_smuggling_tt: "Контрабанда зброї до країни"
 CZE_we_got_caught_tt: "§Y$CZE_zbrojovka_brno_organization$§! викриють."
 CZE_we_dont_get_caught_tt: "§Y$CZE_zbrojovka_brno_organization$§! не викриють."
 MUN_czech_bop.5.t: "$CZE_zbrojovka_brno_organization$ погоджується на схему контрабанди"
 MUN_czech_bop.5.d: "Після розмови з представниками чеського уряду $CZE_zbrojovka_brno_organization$ отримала таємний дозвіл почати контрабанду невеликої кількості стрілецької зброї до країни. Їхній досвід також буде доступний нам через наші таємні канали."
 MUN_czech_bop.5.a: "Ми знайдемо цьому гарне застосування."
 MUN_czech_bop_5_tt: "Цього §Yвиробника§! буде §Rвидалено§! після закінчення війни."

### SLOVAKIA ###
 MUN_slovakia_little_war.1.t: "Перемога в регіоні [71.Getname]"
 MUN_slovakia_little_war.1.d: "Наша армія добре проявила себе в регіоні [71.Getname], розгромивши сили противника в цьому районі. Наші командири отримали безцінну інформацію та уроки з цієї битви, які вони зможуть використати в майбутньому."
 MUN_slovakia_little_war.1.a: "Відмінна робота."
 MUN_slovakia_little_war.2.t: "Поразка в регіоні [71.Getname]"
 MUN_slovakia_little_war.2.d: "Незважаючи на всі наші зусилля, наші сили зазнали поразки в регіоні [71.Getname]. Нездатність вчасно зібрати достатню кількість боєприпасів та моторизованої техніки для конфлікту стала ключовим фактором нашої невдачі. Попри цю невдачу, командири, які брали участь у битві, засвоїли кілька дуже важливих уроків."
 MUN_slovakia_little_war.2.a: "Невтішний результат."
 MUN_slovakia_little_war.3.t: "Прикордонне зіткнення в регіоні [71.Getname]"
 MUN_slovakia_little_war.3.d: "Навіть після отримання нашої території за рішенням «$GER_first_vienna_award$», [HUN.getnamedef] все ще прагне подальшого коригування кордону з нами в регіоні [71.getname]. Ми повинні відповісти на цей виклик силою, щоб показати їм, що мы не віддамо свою землю без бою."
 MUN_slovakia_little_war.3.a: "Як вони сміють!"
 MUN_slovakia_little_war.4.t: "Патова ситуація в регіоні [71.Getname]"
 MUN_slovakia_little_war.4.d: "Незважаючи на всі наші зусилля, наші сили не змогли виграти сутичку в регіоні [71.Getname]. Нездатність вчасно зібрати достатню кількість боєприпасів та моторизованої техніки для конфлікту стала ключовим фактором нашої неможливості здобути перемогу. Попри цю невдачу, командири, які брали участь у битві, засвоїли кілька дуже важливих уроків."
 MUN_slovakia_little_war.4.a: "Прикро."

### Exile ###
 MUN_czech_exile.1.t: "[CZE.GetAdjective]і вигнанці прибувають на [ROOT.GetAdjective]і території"
 MUN_czech_exile.1.d: "Після того, як [GER.GetNameDef] ліквідувала їхню країну внаслідок Мюнхенської конференції, [CZE.GetAdjective]і вигнанці прибули до багатьох країн, зокрема й до нашої. Вони готові взяти до рук зброю, щоб допомогти нам, роблячи це з надією, що одного дня зможуть визволити свою країну за нашої допомоги."
 MUN_czech_exile.1.a: "Ласкаво просимо."

### NEWS EVENTS ###
 MUN_czech.news.1.t: "Судетська криза"
 MUN_czech.news.1.desc: "Населення Судетської області розпочало збройне повстання проти [CZE.GetAdjective]ого уряду. Почали надходити повідомлення про те, що воєнізовані формування атакують поліцейські дільниці та урядові будівлі по всьому регіону. Це було спровоковано нещодавніми новинами про те, що [FROM.getname] прагне анексувати цей регіон.\n\nЦі повстання, схоже, є прелюдією до більшого конфлікту між [FROM.GetAdjective]ими загарбницькими інтересами та [CZE.GetAdjective]им сувернітетом. Конфлікту, який тепер здається неминучим."
 MUN_czech.news.1.a: "Це не віщує Європі нічого хорошого."
 MUN_czech.news.1.b: "Хаос — це драбина."
 MUN_czech.news.1.c: "Ми переможемо!"
 MUN_czech.news.1.d: "Сподіваємось, дипломатія переможе."
 MUN_czech.news.2.t: "[FROM.GetNameDefCap] вторгається в [RUT.GetAdjective]і території"
 MUN_czech.news.2.desc: "\nДесь у нещодавньому ланцюгу подій, що послідували за політичним хаосом у Чехії, невеликий регіон [RUT.getname] опинився поза межами будь-якої країни. Мала сепаратистська держава згодом оголосила себе незалежною нацією і почала формувати ополчення, щоб спробувати захистити свою нову державність.\n\n[FROM.getnamedefcap] давно мала плани на цей регіон і, побачивши можливість, негайно здійснила вторгнення в цю невелику сепаратистську державу. Їхня перемога над [RUT.getname] багатьом спостерігачам здається заздалегідь визначеною."
 MUN_czech.news.2.a: "Карпатська що?"
 MUN_czech.news.2.b: "Це буде легко."
 MUN_czech.news.2.c: "Ідіть, якщо наважитесь!"
 MUN_slovakia.news.1.t: "Прикордонні сутички в регіоні [71.Getname]"
 MUN_slovakia.news.1.desc: "Незважаючи на повернення регіону [664.Getname] після «$GER_first_vienna_award$», [HUN.getnamedef] все ще прагне зробити додаткові коригування свого кордону зі [SLO.GetAdjective]им урядом у регіоні [71.Getname].\n\nЦей конфлікт виглядає як привід для [HUN.GetAdjective]ої влади перевірити, наскільки сильна її армія проти значно слабшого суперника. Молода [SLO.GetAdjective]а армія, можливо, не готова відповісти на виклик, який постав перед нею."
 MUN_slovakia.news.1.a: "Дітлахи, що сваряться."
 MUN_slovakia.news.1.b: "Ми готові до цього завдання."
