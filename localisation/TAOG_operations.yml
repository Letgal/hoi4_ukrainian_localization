 operation_rescue_general: "Врятуйте захопленого командира"
 operation_rescue_general_desc: "§LOдного з наших командирів захопив ворог і утримує в полоні. Ми повинні розпочати операцію з їх порятунку.§!"
 free_general_free_in_transit: "Вільно під час транспортування"
 free_general_free_in_transit_desc: "Наші оперативники виявили майбутнє переміщення активу та спланують можливість перехопити та влаштувати засідку на транспорті по дорозі."
 free_general_assault_holding_area: "Зона очікування штурмовиків"
 free_general_assault_holding_area_desc: "Ворог утримує нашого командира в безпечному місці, яке знайшли наші оперативники. Вони підготують зухвалий штурм, щоб вирвати полоненого."
 free_general_disguise_and_extract: "Маскування та евакуація"
 free_general_disguise_and_extract_desc: "Використовуючи майстерну хитрість, наші оперативники допоможуть захопленому командиру створити маскування, що дозволить їм обдурити своїх викрадачів та втекти на дружню територію."
