### ФОКУСИ ###
 # Літера Č відображається під час прокручування фокусів, але не в назві детального перегляду фокусу (хоча працює в описі)
 CZE_coalition_building: "Створення коаліції"
 CZE_coalition_building_desc: "Коаліція, що виникла після виборів, має досягти більшої єдності серед своїх членів, якщо хоче функціонувати ефективно. Нещодавня відставка Яна Малипетра з посади прем'єр-міністра створила додатковий тиск на Широку коаліцію щодо консолідації підтримки."
 CZE_merge_the_paramilitaries: "Об'єднати воєнізовані групи"
 CZE_merge_the_paramilitaries_desc: "Наші воєнізовані формування розпорошені та розділені на безліч різних груп. Якщо ми сподіваємося використати їх у військових цілях, нам доведеться змусити їх об'єднатися."
 CZE_integrated_paramilitaries: "Інтегрувати воєнізовані формування"
 CZE_integrated_paramilitaries_desc: "Військові можуть бути не в захваті від цієї ідеї, але інтеграція воєнізованих груп до складу нашої армії дасть нам збільшений резерв тоді, коли він буде найбільше потрібен."
 CZE_wielding_the_hammer: "Тримаючи молот"
 CZE_wielding_the_hammer_desc: "Ми можемо використати нашу конституційну більшість у Національних зборах, щоб зробити процес ухвалення законів набагато швидшим, ніж зараз. Вкрай важливо навести лад у нашому законодавчому органі."
 CZE_emergency_measures: "Надзвичайні заходи"
 CZE_emergency_measures_desc: "Запровадивши надзвичайні заходи, щоб допомогти нам впоратися з численними кризами, з якими стикається наша нація, і водночас використовуючи деякі з цих заходів, щоб пильніше стежити за тими, хто може бути ідеологічно ненадійним для нашого уряду, ми будемо краще підготовлені до викликів, які стоять перед нашою нацією."
 CZE_king_of_the_castle: "Король замку"
 CZE_king_of_the_castle_desc: "Ми всі знаємо, хто насправді керує в нашому уряді. У час великої невизначеності варто припинити прикидатися і дозволити $CZE_edvard_benesh$ керувати більш прямо. Від цього залежить безпека нашої країни."
 CZE_closer_ties_with_the_moderate_germany_parties: "Згуртувати помірковані партії Судетської області"
 CZE_closer_ties_with_the_moderate_germany_parties_desc: "Деякі партії Судетської області готові співпрацювати з нашою коаліцією та налагоджувати зв'язки з урядом. Поглибмо ці зв'язки."
 CZE_complete_reconciliation: "Повне примирення"
 CZE_complete_reconciliation_desc: "Ми доклали зусиль, щоб побудувати мости довіри. Настав час примиритися з нашими співвітчизниками."
 CZE_complete_reconciliation_cooldown_flag: "Виконано фокус §Y«$CZE_closer_ties_with_the_moderate_germany_parties$»§!"
 CZE_complete_reconciliation_cooldown_flag_tt: "Поточна кількість днів: [?CZE_complete_reconciliation_cooldown_flag:days|Y0]"
 CZE_bastion_of_liberty: "Бастіон свободи"
 CZE_bastion_of_liberty_desc: "Протягом цього десятиліття ми були однією з небагатьох справді плюралістичних країн Європи на схід від Рейну. Зробімо так, щоб люди цього не забули."
 CZE_standing_against_the_storm: "Протистояння бурі"
 CZE_standing_against_the_storm_desc: "Незважаючи на наші недоліки та можливу нестачу підготовки, ми зустрінемо будь-який виклик віч-на-віч і вистоїмо перед прийдешньою бурею."
 CZE_truth_prevails: "Правда перемагає"
 CZE_truth_prevails_desc: "Навіть перед обличчям великих труднощів та нездійсненних завдань наша країна знає, що наш національний девіз «Правда перемагає» виявиться істинним, коли все закінчиться. Шукайте правду, кажіть правду, і вона переможе."
 CZE_negotiations_with_the_autonomous_bloc: "Переговори з Автономним блоком"
 CZE_negotiations_with_the_autonomous_bloc_desc: "Якщо ми хочемо сформувати коаліцію, яка не поступиться владою легіону посіпак Бенеша в Національних зборах, нам доведеться співпрацювати з Автономним блоком. Однак здобуття їхньої повної підтримки коштуватиме дуже дорого."
 CZE_slovakia_autonomy_agreement: "Угода про автономію Словаччини"
 CZE_slovakia_autonomy_agreement_desc: "Ціною співпраці Автономного блоку з нашою коаліцією є угода про автономію з урядом. Це висока ціна, але наслідки невиконання нашої частини угоди можуть бути гіршими."
 CZE_slovakia_autonomy_agreement_tt: "§Y[RUT.getname]§! захоче таку ж угоду, яку ми надаємо §Y[SLO.getname]§!!"
 CZE_slovakia_autonomy_agreement_2_tt: "Завдання «$CZE_the_autonomous_bloc_demands$» буде відкладено на §Y35 днів§! після вибору цього фокусу."
 CZE_topple_the_king: "Повалити короля"
 CZE_topple_the_king_desc: "Вплив $CZE_edvard_benesh$ на наш уряд є задушливим. Його влада є більшою, ніж його роль президента, завдяки легіону лоялістів у парламенті. Тепер, коли умови підходящі, ми можемо витіснити його вплив у Верхній палаті (Horní komora)."
 CZE_comprise_with_the_carpathians: "Компроміс з карпатцями"
 CZE_comprise_with_the_carpathians_desc: "Регіон Рутенія прагне до угоди про федералізацію, подібної до тієї, яку ми надали [SLO.getnamedef]. Це значно послабило б наші позиції в регіоні та в [9.getname]. Укласти з ними угоду може бути краще, ніж повністю поступитися їхнім вимогам."
 CZE_the_rut_demands_add_35_CZE_comprise_with_the_carpathians_tt: "Завдання «$CZE_the_rut_demands$» буде відкладено на §Y35 днів§! після вибору цього фокусу."
 CZE_cut_carpathia_loose: "Відпустити Карпатію"
 CZE_cut_carpathia_loose_desc: "Оскільки Словаччина тепер є федеративною державою, регіон Рутенія сподівається укласти подібну угоду. Хоча це здається нерозумним, без Словаччини під нашим прямим контролем спроби приборкати їх будуть складними. Можливо, нам слід просто поступитися їхнім вимогам."
 CZE_compromise_with_the_veteran_agrarian: "Компроміс з аграріями-ветеранами"
 CZE_compromise_with_the_veteran_agrarian_desc: "Стара гвардія аграріїв є перешкодою на шляху до налагодження відносин зі зростаючим міським електоратом. Нам потрібно піти на компроміс з ними, щоб досягти своїх цілей."
 CZE_reorient_the_broad_coalition: "Переорієнтація Широкої коаліції"
 CZE_reorient_the_broad_coalition_desc: "Широка коаліція була провідним блоком у нашому уряді багато років. Різноманітні політичні партії, які вона охоплює, роблять коаліцію дедалі складнішою в управлінні. Переорієнтація міністерської політики давно назріла."
 CZE_leverage_sokol: "Сокільський рух"
 CZE_leverage_sokol_desc: "Сокільський рух був важливою організацією в нашій країні протягом десятиліть. У часи кризи ми повинні використати їх, щоб допомогти забезпечити воєнізовану підготовку та новобранців для нашої армії."
 CZE_urbanist_policies: "Урбаністична політика"
 CZE_deepend_ties_with_the_trademans: "Поглибити зв'язки з торговцями"
 CZE_deepend_ties_with_the_trademans_desc: "Партія торговців популярна серед міських виборців середнього класу. Якщо ми надамо їм повноваження та працюватимемо з ними, ми зможемо знайти підхід до міського електорату, не відштовхуючи при цьому нашу сільську базу виборців."
 CZE_apart_but_togather: "Окремо, але разом"
 CZE_apart_but_togather_desc: "Наші регіони тепер мають більше автономії, ніж будь-коли, але ми також сильніші, ніж будь-коли. Ми готові до будь-яких випробувань."
 CZE_contact_henlein: "Зв'язатися з Генлейном"
 CZE_contact_henlein_desc: "$CZE_konrad_henlein$ вже багато років є постійною кісткою в горлі нашого уряду. Однак у світлі нещодавніх міжнародних подій, можливо, настав час розпочати з ним діалог."
 CZE_contact_henlein_cooldown_flag: "Виконано фокус §Y«$CZE_no_compromise_with_the_sdp$»§!"
 CZE_contact_henlein_cooldown_flag_tt: "Поточна кількість днів: [?CZE_contact_henlein_cooldown_flag:days|Y0]"
 CZE_contact_henlein_focus_warning_tt: "Якщо ми виконаємо §Y«$CZE_no_compromise_with_the_sdp$»§!, нам доведеться чекати §Y350§! днів, перш ніж ми зможемо вибрати цей §Yнаціональний фокус§!."
 CZE_contact_henlein_focus_order_warning_tt: "Якщо ми виконаємо §Y«$CZE_no_compromise_with_the_sdp$»§! після завершення цього §Yнаціонального фокусу§!, §Y$CZE_konrad_henlein$§! піде у відставку."
 CZE_no_compromise_with_the_sdp: "Продовжувати блокувати SdP"
 CZE_no_compromise_with_the_sdp_desc: "SdP не має чого запропонувати нашій коаліції. Вони прагнуть лише створити політичну напругу та очорнити дії нашого уряду. В ім'я ефективного управління вони повинні й надалі залишатися поза будь-якими коаліціями."
 CZE_no_compromise_with_the_sdp_cooldown_flag: "Виконано фокус §Y«$CZE_contact_henlein$»§!"
 CZE_no_compromise_with_the_sdp_cooldown_flag_tt: "Поточна кількість днів: [?CZE_no_compromise_with_the_sdp_cooldown_flag:days|Y0]"
 CZE_no_compromise_with_the_sdp_focus_warning_tt: "Якщо ми виконаємо §Y«$CZE_contact_henlein$»§!, нам доведеться чекати §Y350§! днів, перш ніж ми зможемо вибрати цей §Yнаціональний фокус§!."
 # CZE_economic_integration: "Економічна інтеграція"
 # CZE_economic_integration_desc: "Навіщо зупинятися на митному союзі? Економічна інтеграція сприятиме подальшому зростанню наших економік і забезпечить заможне майбутнє для всіх членів."
 CZE_form_a_federation: "Формування Федерації"
 CZE_form_a_federation_desc: "Мрія про центральноєвропейську федерацію більше не є недосяжною. Ми нарешті досягнемо її і станемо гігантом демократії. Разом ми матимемо силу самостійно протистояти великим державам!"
 CZE_bend_the_bars: "$ITA_bend_the_bars$"
 CZE_bend_the_bars_desc: "$GER_european_confederation_desc$"
 CZE_reassure_the_army: "Заспокоїти армію"
 CZE_reassure_the_army_desc: "Армія нервує через деякі з наших нещодавніх рішень та політику уряду. Настав час запевнити їх, що ми підтримуємо їх незалежно від того, що говорить чи робить уряд."
 CZE_outreach_to_the_western_powers: "Подальше зближення із західними державами"
 CZE_outreach_to_the_western_powers_desc: "Західні демократії кажуть, що підтримують нас, але нам потрібно ще більше зблизитися з ними, щоб переконатися, що їхні слова також будуть підкріплені діями, коли це буде найважливіше."
 CZE_demand_guarantees: "Вимагати сильніших гарантій"
 CZE_demand_guarantees_desc: "Незважаючи на існуючі договори та альянси, ми повинні переконатися, що наші партнери не покинуть нас у скрутний час лише тому, що їм так легше. Нам потрібно щось сильніше за гарантію."
 CZE_guardian_of_central_europe: "Вартовий Центральної Європи"
 CZE_guardian_of_central_europe_desc: "Зараз ми маємо можливість стати наглядачем за демократією в центрі Європи. Ми можемо бути вартовим для націй, які не можуть постояти за себе, і забезпечити непохитність демократії."
 CZE_central_european_faction: "Повелитель Центральної Європи"
 CZE_central_european_faction_desc: "Незважаючи на те, що ми зосередилися на зміцненні власних сил, а не надто покладалися на дипломатію, критично важливо не перенапружувати свій вплив. Можливо, настав час поглянути назовні."
 CZE_strike_at_the_heart_of_bolshevism: "[THIS.GetAntiSovietFocusName]"
 CZE_strike_at_the_heart_of_bolshevism_1: "Удар у серце більшовизму"
 CZE_strike_at_the_heart_of_bolshevism_2: "Убезпечити східний фланг"
 CZE_strike_at_the_heart_of_bolshevism_desc: "Експансія [SOV.GetNameDef] є екзистенційною загрозою для Європи та нашої нації. Ми повинні стати оплотом проти них."
 CZE_destroy_the_fascist_threats: "Знищити фашистські загрози"
 CZE_destroy_the_fascist_threats_desc: "[CZE_get_fascist_threats_desc]"
 CZE_destroy_the_fascist_threats_desc_enemy_ger: "Ми всі знаємо, хто є найбільшою загрозою миру в Європі. [GER.getnamedefCAP] потрібно зупинити чим швидше, тим краще. Якщо ніхто інший не бажає цього зробити, це доведеться зробити нам."
 CZE_destroy_the_fascist_threats_desc_backup: "Для нашої безпеки вкрай важливо, щоб сусідні країни не дотримувалися експансіоністської риторики, яка рано чи пізно може бути спрямована проти нас."
 CZE_peace_on_our_time: "Мир для нашого часу"
 CZE_peace_on_our_time_desc: "Протягом надто довгого часу ми були на другому плані в європейських міжнародних відносинах. Так більше не буде! Ми можемо міцно стояти на ногах і диктувати власні умови. Хай то буде війна чи мир."
 CZE_reach_out_for_military_assistance: "Звернутися за військовою допомогою"
 CZE_free_tuka: "Звільнити $CZE_vojtech_tuka$"
 CZE_free_tuka_desc: "Тюремний термін $CZE_vojtech_tuka$ закінчився, і замість того, щоб шукати привід для продовження покарання, ми могли б звільнити його вчасно і залучити до роботи в нашому уряді. Краще, щоб він працював на нас, а не проти нас."
 CZE_grow_the_anglo_czechoslovak_prague_credit_bank: "Англо-Чехословацький банк"
 CZE_grow_the_anglo_czechoslovak_prague_credit_bank_desc: "Англо-Чеський кредитний банк був одним із головних рушіїв нашої промисловості. Без їхніх коштів ми б не змогли підтримувати масштабний експортний бізнес, який маємо зараз. Відкриття нових відділень у Нью-Йорку та поглиблення зв'язків з [ENG.GetNameDef] сприяли б ще більшому зростанню банку. Це також дало б [ENG.getname] певну зацікавленість у нашому подальшому виживанні."
 CZE_feeding_the_alligator: "Годівля крокодила"
 CZE_feeding_the_alligator_desc: "Претензії [GER.getname] на Судетську область є загрозою самому існуванню нашої нації. Можливо, якщо ми віддамо їм те, чого вони бажають, вони дадуть нам спокій."
 CZE_complete_capitulation: "Повна капітуляція"
 CZE_complete_capitulation_desc: "Який у нас вибір, окрім як здатися? Ми не можемо протистояти бурі, що насувається на горизонті. Можливо, якщо ми укладемо угоду з [GER.getnamedef], поки маємо хоч якісь важелі впливу, вони залишать нам певну незалежність під своїм ярмом."
 CZE_stabilize_the_protectorate: "Стабілізувати Протекторат"
 CZE_stabilize_the_protectorate_desc: "Протекторат зовсім не є стабільним. Нам потрібно докласти зусиль, щоб переконати наше населення, що ми є легітимним урядом і подбаємо про їхні потреби."
 CZE_stabilize_the_protectorate_unretire_henlein_tt: "Повертає §Y$CZE_konrad_henlein$§! з відставки до §Y[ROOT.getname]§!."
 CZE_full_faith_in_hacha: "Повна віра в Гаху"
 CZE_full_faith_in_hacha_desc: "$CZE_emil_hacha$ набагато популярніший і шанованіший серед нашого населення, ніж $CZE_emanuel_moravec$. Те, що він робить, може викликати підозри, але не можна замінити більш популярну підставну особу."
 CZE_moravecs_bohemia: "Богемія Моравеца"
 CZE_moravecs_bohemia_desc: "Ходять чутки, що $CZE_emil_hacha$ намагається підірвати наш новий уряд. Якщо ми сподіваємося досягти успіху та зростати в наших нинішніх умовах, нам потрібне керівництво, яке більше відповідає ідеології наших сюзеренів."
 CZE_form_the_government_army: "Сформувати Урядову армію"
 CZE_form_the_government_army_desc: "Якщо ми хочемо, щоб наша країна досягла успіху, нам потрібно сформувати нову армію, яка врахує помилки своєї попередниці. Ми також повинні переконатися, що її керівництво політично більш прихильне до уряду."
 CZE_forced_administration_of_companies: "Примусове управління компаніями"
 CZE_forced_administration_of_companies_desc: "Попри масштабний нагляд, деякі компанії досі діють поза нашим контролем. Настав час примусово підпорядкувати їх нашому нагляду."
 CZE_revisit_custom_union_talks: "Переглянути переговори про митний союз"
 CZE_revisit_custom_union_talks_desc: "Переговори про митний союз із деякими з наших сусідів могли пройти набагато гірше, ніж з іншими. Настав час переглянути їх і зробити новий крок до митного союзу між нашими країнами."
 CZE_revisit_custom_union_talks_tt: "Ми все одно зможемо переконати їх приєднатися іншими §Rметодами§!."
 CZE_revisit_custom_union_talks_2_tt: "Вони з набагато більшою ймовірністю приймуть наші вимоги приєднатися до нашої Федерації"
 CZE_reintegrate_cross_border_rail_connections: "Покращити транскордонне залізничне сполучення"
 CZE_reintegrate_cross_border_rail_connections_desc: "Покращення залізничного сполучення з нашими сусідами — це хороший спосіб здобути їхню прихильність. Особливо, якщо ми намагаємося розвивати економічні зв'язки між нашими країнами."
 CZE_reintegrate_cross_border_rail_connections_flag: "Транскордонне залізничне сполучення було покращено"
 CZE_vonapo_20: "VONAPO 20"
 CZE_vonapo_20_desc: "Ми не єдині, хто бачить зростаючу загрозу з боку [GER.GetNameDef], тому було розроблено план співпраці з [SOV.GetNameDef] у зборі розвідданих, щоб ми могли краще протистояти [GER.GetAdjective]им амбіціям."
 CZE_increase_funding_from_moscow: "Збільшити фінансування з регіону [SOV.capital.GetCapitalVictoryPointName]"
 CZE_increase_funding_from_moscow_desc: "[ROOT.GetCommunistParty] настільки недофінансована, що наразі оплачує свої приміщення із зарплат власних представників. Щоб зростати, ми маємо звернутися до [SOV.GetNameDef] з проханням збільшити фінансування для поширення нашої газети та залучення нових членів."
 CZE_zdenek_fierlinger_tt: "Призначити радника §Y$CZE_zdenek_fierlinger$§!"
 CZE_expand_the_communist_press: "Розширити комуністичну пресу"
 CZE_expand_the_communist_press_desc: "Наша газета «Червоне право» (Rudé právo) могла б слугувати для інформування тих, хто зараз не читає жодних газет, для цього потрібно лише збільшення фінансування."
 CZE_anti_rearmament_propaganda: "Пропаганда проти переозброєння"
 CZE_anti_rearmament_propaganda_desc: "Падіння фашистського уряду нашого головного супротивника, [GER.GetNonIdeologyName], означає, що ми можемо стверджувати, що завжди мали рацію у своїй позиції проти нарощування військового потенціалу."
 CZE_anti_democratic_propaganda: "Антидемократична пропаганда"
 CZE_anti_democratic_propaganda_desc: "Щоб заручитися підтримкою нашої партії, ми повинні висвітлити недоліки попередніх урядів Республіки та продемонструвати, як ми могли б краще впоратися із ситуацією."
 CZE_form_workers_brigades: "Сформувати робітничу міліцію"
 CZE_form_workers_brigades_desc: "Робітники, яких ми звільняємо, повинні бути готові брати участь у боротьбі. Можливо, вони не є навченими солдатами, але все одно можуть зробити свій внесок як фахівці у своїх галузях."
 CZE_kohler_faction: "Фракція Келера"
 CZE_kohler_faction_desc: "Фракція Бруно Келера вважає, що для створення успішної комуністичної чехословацької держави необхідне насильницьке повалення буржуазії."
 CZE_gottwald_faction: "Фракція Ґотвальда"
 CZE_gottwald_faction_desc: "Віддана Москві до нестями, сталінська фракція Клемента Ґотвальда бачить чехословацьку державу за образом і подобою СРСР."
 CZE_zapotocky_faction: "Фракція Запотоцького"
 CZE_zapotocky_faction_desc: "Засновники комуністичної партії Богумір Шмераль та Антонін Запотоцький передбачали більш помірковану політику, ніж та, яку Клемент Ґотвальд нав'язав партії. Ми повинні повернутися до цих коренів, щоб по-справжньому привернути увагу всіх [CZE.GetAdjective]их народів."
 CZE_ally_with_moderate_socialists: "Співпраця з поміркованими соціалістами"
 CZE_ally_with_moderate_socialists_desc: "Не кожна країна готова прийняти комунізм виборчим шляхом або розвинути захоплення таким лідером, як [SOV.GetLeader], тому нам не слід уникати співпраці з більш поміркованими рухами."
 CZE_democracies_willing_to_join_faction_tt: "§YДемократичні нації з більшою ймовірністю приєднаються до нашої комуністичної фракції§!."
 CZE_limited_cooperation: "Обмежена співпраця з [SOV.GetLeader]"
 CZE_limited_cooperation_desc: "Незважаючи на ідеологічні розбіжності, навіть [SOV.GetNameDef] може визнати нашу цінність як партнера і брати участь у деяких прагматичних угодах, навіть якщо вони засуджують нас у своїх газетах."
 CZE_denounce_stalinism: "Засудити сталінізм"
 CZE_denounce_stalinism_desc: "Репутація комунізму назавжди заплямована несправедливістю Сталіна, настав час вжити військових заходів, щоб звільнити людей від режимів, подібних до його."
 CZE_country_leader_has_ideology_stalinism_tt: "Лідер країни має ідеологію §Y$stalinism$§!"
 CZE_cooperate_with_tito: "Співпраця з Тіто"
 CZE_cooperate_with_tito_desc: "[YUG.GetNameDefCap] намагається побудувати прагматичну версію комунізму, як і ми. Вони так само прагнуть об'єднати різні народи під червоним прапором. Зіткнувшись із цими викликами, ми маємо співпрацювати у військових та політичних питаннях."
 CZE_reduce_divided_nation_cost_tt: "Зменшує вартість та тривалість більшості рішень §Y«Розділена нація»§!."
 CZE_balkan_union: "Розширення Союзу"
 CZE_balkan_union_desc: "Хоча тепер більше країн регіону приймають комунізм, ми не зможемо захистити себе від великих держав без міцної співпраці. Союз був би найефективнішим способом досягти цього."
 CZE_cooperation_with_the_ussr: "Співпраця з [SOV.GetLeader]"
 CZE_cooperation_with_the_ussr_desc: "Навіть найпалкіші прихильники [SOV.GetNameDef] серед керівництва партії усвідомлюють недоліки її колективізації після відвідин країни. Навіть у цьому випадку співпраця з ними в колективізації означає, що ми зможемо ретельно проаналізувати, що пішло не так, а що спрацювало, і як це найкраще втілити для [ROOT.GetNameDef]."
 CZE_exchange_military_expertise: "Обмін військовим досвідом"
 CZE_exchange_military_expertise_desc: "[SOV.GetNameDefCap], як і більшість держав зі значною армією, експериментує з військовою тактикою. Ми маємо попросити їх поділитися своїми напрацюваннями, а ми, своєю чергою, можемо поділитися нашими."
 CZE_pressure_romania: "Тиск на Румунію"
 CZE_pressure_romania_desc: "[ROM.GetNameDefCap] може становити серйозну загрозу, якщо об'єднається з нашими ворогами, можливо, розірвавши наш зв'язок із [SOV.GetNameDef] або надаючи цінну нафту нашим супротивникам. Завдяки [SOV.GetAdjective]ій підтримці, ми становимо достатню загрозу, щоб потенційно змусити їх приєднатися до нас без війни."
 CZE_facility_in_state_tt: "Якщо в $STATE|Y$ немає інших §YЕкспериментальних комплексів§!, ми отримаємо §G1§! $FACILITY_TYPE|Y$ у $STATE|Y$."
 CZE_spread_the_revolution: "Поширити революцію"
 CZE_spread_the_revolution_desc: "Після успішної революції в [ROOT.GetNameDef] ми повинні тепер заохочувати пролетаріат за кордоном боротися за свою свободу, і ми можемо підтримати цю боротьбу."
 CZE_agrarian_reform: "Відновити Земельне управління"
 CZE_agrarian_reform_desc: "Нещодавно розформоване земельне управління відповідало за перерозподіл переважно сільськогосподарських земель; настав час реформувати цю установу для більш рішучих заходів."
 CZE_realign_the_church: "Державний атеїзм"
 CZE_realign_the_church_desc: "Релігія занадто довго була елементом, що розділяє [CZE.GetAdjective]і народи. Ми повинні зменшити її вплив на державні справи, такі як освіта та новини, щоб створити більш об'єднане суспільство."
 CZE_create_a_secret_police_branch: "Створити відділення таємної поліції"
 CZE_create_a_secret_police_branch_desc: "Щоб забезпечити стабільність, ми повинні захищатися як від зовнішніх, так і від внутрішніх ворогів. Населенню знадобиться час, щоб звикнути до нової системи, особливо з огляду на те, що вона ще вдосконалюється."
 CZE_promote_urbanization: "$ARG_promote_urbanization$"
 CZE_promote_urbanization_desc: "Тепер, коли ми створили ефективні комунальні господарства, ми можемо розпочати програми для залучення частини сільського населення до міст та підвищення там продуктивності."
 CZE_confiscate_church_lands: "Конфіскувати церковні землі"
 CZE_confiscate_church_lands_desc: "Церква контролює набагато більше земель і багатств, ніж необхідно для її цілей. Ми повинні перерозподілити частину цих земель, як ми це зробили для фермерів."
 CZE_change_the_narrative: "Змінити наратив"
 CZE_change_the_narrative_desc: "Хоча досі церква не підтримувала нашу революцію, узгодження її цінностей з нашими може зіграти важливу роль у створенні підтримки нового режиму."
 CZE_the_second_fortification_program: "Розпочати Другу програму фортифікації"
 CZE_the_second_fortification_program_desc: "Перша програма фортифікації заклала фундамент оборони, який ми повинні негайно розбудовувати. Заради майбутнього нашої нації ми повинні якомога швидше розпочати другу програму фортифікації та розширювати наші оборонні лінії."
 CZE_redirect_the_fortification_councils_funds: "Перенаправити кошти Ради з фортифікації"
 CZE_redirect_the_fortification_councils_funds_desc: "Ці фортифікаційні програми завдають величезного удару по нашій економіці. Ці кошти краще використати для фінансування інших програм. Армії все одно не потрібно більше оборонних споруд, у них їх достатньо."
 CZE_jachymov_uranium_mine: "Яхимівська уранова шахта"
 CZE_jachymov_uranium_mine_desc: "Шахти в Яхимові довго слугували джерелом урану та інших руд, проте до недавніх відкриттів у фізиці від урану було мало користі."
 CZE_skoda_internal_competition: "Заохочувати внутрішню конкуренцію"
 CZE_skoda_internal_competition_desc: "У такій великій компанії, як «Шкода», важко підтримувати максимальну працездатність кожного. Заохочення внутрішньої конкуренції значно покращить ефективність роботи співробітників на наших заводах."
 CZE_skoda_max_optimization_tt: "Максимальний рівень оптимізації фокусу §Y«Шкоди»§! буде збільшено до 7."
 CZE_skoda_increase_cooperation: "Посилити співпрацю всередині «Шкоди»"
 CZE_skoda_increase_cooperation_desc: "Щоб стати кращими, ми можемо підвищити нашу ефективність шляхом посилення співпраці між заводами. Це також може призвести до обміну досвідом між нашими підприємствами."
 CZE_skoda_fast_optimization_tt: " Швидкість, з якою рівень оптимізації фокусу §Y«Шкоди»§! £GFX_prod_eff_cap зростає з часом до максимального рівня: §G+100.0%§!"
 CZE_master_of_armaments: "Майстер озброєнь"
 CZE_master_of_armaments_desc: "Заводи «Шкоди» були найбільшим виробником зброї в межах наших кордонів ще з часів Австро-Угорської імперії. Їхній досвід та кваліфікація не мають рівних серед промислових конгломератів нашої країни. Настав час дати їм звання Майстра озброєнь."
 CZE_only_the_best_is_good_enough: "Тільки найкраще є достатньо добрим"
 CZE_only_the_best_is_good_enough_desc: "Заводи «Шкоди» завжди керувалися етикою наполегливої праці та духом інновацій. Наші засновники завжди дотримувалися девізу: «Тільки найкраще є достатньо добрим для наших клієнтів!» Останнім часом цей девіз звучить як ніколи правдиво."
 CZE_an_industrial_legacy: "Промислова спадщина"
 CZE_an_industrial_legacy_desc: "Розвинувши промисловість нашої країни до висот, які раніше здавалися неможливими, ми нарешті можемо прийняти та заявити про свою промислову спадщину. Ми є неперевершеним промисловим гігантом."
 CZE_powerhouse_of_europe: "Рушійна сила Європи"
 CZE_powerhouse_of_europe_desc: "Нашій промисловості тепер заздрить весь світ. Тепер ми повинні переконатися, що наш енергетичний сектор зможе належним чином її забезпечувати."
 CZE_supply_fighters_for_allies: "Постачати винищувачі Союзникам"
 CZE_supply_fighters_for_allies_desc: "[FRA.GetAdjective]і та [ENG.GetAdjective]і уряди дуже бояться, що [GER.GetAdjective]і літаки швидко прорвуть їхню оборону та атакують їхні міста в разі початку конфлікту. Тому посилення їхніх ВПС може додати їм трохи впевненості у своїй здатності зупинити експансію [GER.GetNameDef] без значних людських втрат."
 CZE_allies_more_likely_to_defend_us_tt: "§YСоюзники з більшою ймовірністю підтримають нас проти німецької експансії щодо Судетської області.§!"
 CZE_allies_more_likely_to_defend_us_2_tt: "§YСоюзники зі значно більшою ймовірністю підтримають нас проти німецької експансії щодо Судетської області.§!"
 CZE_allies_more_likely_to_defend_us_3_tt: "§YСоюзники з дещо більшою ймовірністю підтримають нас проти німецької експансії щодо Судетської області.§!"
 CZE_establish_the_state_defense_guard: "Створити Гвардію оборони держави"
 CZE_german_nonagressionpact: "Пакт Гаусгофера — Крофти"
 CZE_german_nonagressionpact_desc: "Переговори про пакт про ненапад із [GER.GetNameDef] тривають уже деякий час. Однак після ознак нестабільності в [SOV.GetNameDef] та нових експансіоністських планів вони зупинилися. Оскільки зараз [GER.GetNameDef] зайнята іншими ворогами, ми повинні спробувати відновити ці переговори."
 CZE_revive_the_czechoslovak_legion_dynamic: "[CZE_revive_the_czechoslovak_legion]"
 CZE_revive_the_czechoslovak_legion_default: "Відродити Чехословацький легіон"
 CZE_revive_the_czechoslovak_legion_communist: "Створити волонтерську організацію"
 CZE_revive_the_czechoslovak_legion_dynamic_desc: "У світі знову назрівають заворушення, і хоробрі солдати [ROOT.GetNameDef] готові стати на захист батьківщини. Але як довело минуле, захист батьківщини іноді вимагає, щоб наші війська, воюючи за кордоном, знову знайшли тих, хто готовий покинути свій дім саме заради його захисту."
 CZE_revive_the_czechoslovak_legion_nsb_tt: "§Y$CZE_legacy_of_the_czechoslovak_legion_army_spirit$§! буде перетворено з §YДуху армії§! на §YНаціональний дух§!."
 CZE_state_sponsored_recruitment_for_spain: "Спонсорований державою набір для Іспанії"
 CZE_state_sponsored_recruitment_for_spain_desc: "В умовах нового конфлікту, де іноземне втручання може відіграти вирішальну роль, ми повинні заохочувати досвідчених добровольців [ROOT.GetNameDef] підтримати ту сторону, яка найбільше відповідає нашій політиці. У процесі ми навіть можемо засвоїти деякі уроки про досягнення у веденні війни за останнє десятиліття."
 CZE_support_spain_reward_tt: "§YНаслідки, якщо іспанська фракція має наших добровольців у разі своєї перемоги або поразки:§!"
 CZE_profit_off_the_spanish_civil_war: "Зиск з Громадянської війни в Іспанії"
 CZE_profit_off_the_spanish_civil_war_desc: "Громадянська війна в Іспанії стає проксі-війною великих держав. Ми не повинні ризикувати життями наших хоробрих солдатів, вплутуючись у такий конфлікт. Натомість це ідеальна можливість профінансувати розбудову нашої промисловості шляхом продажу зброї, можливо, навіть обом сторонам."
 CZE_skoda_sell_weapons_to_SPR_tt: "Відкриває рішення: §YТаємно продавати зброю іспанській фракції§!"
 CZE_placate_benes_faction: "Поступитися фракції Бенеша"
 CZE_placate_benes_faction_desc: "$CZE_milan_hodza$ повинен змиритися з тим, що його перебування на посаді міністра закордонних справ пройшло жахливо. $CZE_edvard_benesh$ готовий виступити зі своїми прихильниками серед аграріїв та зміцнити позиції $CZE_milan_hodza$ як прем'єр-міністра за умови, що той відмовиться від посади міністра закордонних справ."
 CZE_claim_lands_of_the_bohemian_crown: "Заявити права на землі Богемської корони"
 CZE_claim_lands_of_the_bohemian_crown_desc: "Оскільки в минулі століття наша нація знаходилася на околицях різних імперій, наші кордони зміщувалися через конфлікти, а не за волею жителів; настав час виправити ці зрушення."
 CZE_demand_katowice: "Вимагати [762.GetName]"
 CZE_demand_katowice_desc: "Здобуття контролю над [762.GetName] означатиме не лише відновлення наших колишніх кордонів, але й послабить [POL.GetAdjective]і претензії на [72.GetName]."
 CZE_fight_over_silesia: "Боротьба за Сілезію"
 CZE_fight_over_silesia_desc: "Сілезія може бути по праву [ROOT.GetAdjective]ою землею, але повномасштабна війна з [66.owner.GetNameDef] є небажаною. Тому нам слід продемонструвати свою силу за допомогою масштабних прикордонних сутичок, а не великої війни. Якщо [66.owner.GetNameDef] не захоче воювати за захист Сілезії, ми все ж можемо позбавити їх цієї території."
 CZE_dismantle_poland: "Демонтувати Польщу"
 CZE_dismantle_poland_desc: "Тепер, коли виявилася її нездатність захистити себе, стає зрозуміло, що [POL.GetNameDef] не може стати надійною буферною державою проти наших ворогів. Натомість ми повинні перейти до зміцнення нашої власної держави."
 CZE_proclaim_the_restoration_of_bohemia: "Проголосити реставрацію Богемського королівства"
 CZE_proclaim_the_restoration_of_bohemia_desc: "З відновленням наших старих кордонів ми тепер можемо повернути свою спадщину та зосередитися на інтеграції наших нових земель."
 CZE_integrate_lost_territories: "Інтегрувати втрачені території"
 CZE_integrate_lost_territories_desc: "Історичні землі Богемського королівства простягалися від Балтійського аж до Адріатичного моря; настав час звернутися до цієї історії під час інтеграції наших нових володінь."
 CZE_deepen_ties_with_puppet_kingdoms: "Поглибити зв'язки з маріонетковими королівствами"
 CZE_deepen_ties_with_puppet_kingdoms_desc: "Хоча тепер ми маємо чітку сферу впливу, нам потрібно буде зробити наш вплив ще сильнішим, щоб отримати максимальну вигоду від цих союзних країн."
 CZE_poland_alliance_monarchist: "Угода з Польщею"
 CZE_poland_alliance_monarchist_desc: "$CZE_ally_poland_desc$"
 CZE_a_strong_poland: "Сильна [POL.GetNonIdeologyName]"
 CZE_a_strong_poland_desc: "Володіючи однією з найсильніших армій Східної Європи, [POL.GetNameDef] має потенціал стати цінним союзником."
 CZE_mend_balkan_relations: "Налагодити відносини на Балканах"
 CZE_facilitate_a_strong_hungary: "Сприяти сильній Угорщині"
 CZE_facilitate_a_strong_hungary_desc: "З моменту здобуття незалежності [HUN.GetNameDef] мала з нами хиткі відносини. Але з назріванням конфлікту ми можемо залучити їх на свій бік."
 CZE_subjegate_romania: "Тиснути на Румунію за допомогою [HUN.GetAdjective]их претензій"
 CZE_subjegate_romania_desc: "Претензії нашої [HUN.GetAdjective]ої маріонетки є корисним інструментом проти [ROM.GetNameDef]. Погрожуючи дозволити [HUN.GetNameDef] висунути свої претензії на [ROM.GetAdjective]і територію і допомогти їм здобути її, ми можемо вимагати від [ROM.GetNameDef] стати на наш бік."
 CZE_demanded_overlordship_HUN: "Підкорена Угорщина"
 CZE_demanded_overlordship_ROM: "Підкорена Румунія"
 CZE_integrate_hungary: "Інтегрувати колишні австрійські території"
 CZE_integrate_hungary_desc: "Тепер, коли ми встановили значну сферу впливу, інтеграція нещодавно розширеної Угорщини та інших територій могла б призвести до відновлення австро-угорських кордонів, але під [ROOT.GetAdjective]им керівництвом."
 CZE_subjegate_serbia: "Підкорити Югославію"
 CZE_subjegate_serbia_desc: "Нині ослаблена [YUG.GetName] більше не слугує ефективною буферною державою для захисту нашого південного флангу. Після інтеграції Словенії ми повинні прагнути до ще більшого розширення."
 CZE_strike_the_eastern_threat: "Ударити по східній загрозі"
 CZE_strike_the_eastern_threat_desc: "Лицемірний [SOV.GetName], виправдовуючи свої імперські амбіції критикою нашого уряду, становить екзистенційну загрозу для [CZE.GetName], яку необхідно усунути."
 CZE_assist_austria: "Захистити Австрію"
 CZE_assist_austria_desc: "Утримання Австрії осторонь будь-яких конфліктів є життєво важливим для нашої національної безпеки. [AUS.GetAdjective]і кордони є одним із найуразливіших місць у нашій обороні. Їхня економіка також була б цінним активом для наших ворогів, чого ми не можемо допустити."
 CZE_return_to_democracy: "Повернення до демократії"
 CZE_return_to_democracy_desc: "Захистивши свій дім, населення дедалі більше усвідомлює, що військова диктатура більше не є продуктивною. Тому настав час провести вибори та повернути владу демократичній цивільній адміністрації."
 CZE_cooperate_with_the_allies: "Співпрацювати із Союзниками"
 CZE_cooperate_with_the_allies_desc: "Із встановленням більшої стабільності в регіоні ми повинні докласти зусиль для відновлення зв'язків з нашими традиційними союзниками."
 CZE_eliminate_austrian_defeatists: "Перемогти [AUS.GetAdjective]их капітулянтів"
 CZE_eliminate_austrian_defeatists_desc: "[AUS.GetNameDefCap] відмовилася від готовності захищати свою державу; ми повинні втрутитися зараз, поки не опинилися в оточенні."
 CZE_the_legacy_of_ottokar: "Спадщина Оттокара"
 CZE_the_legacy_of_ottokar_desc: "Легендарний король Оттокар II розширив Богемське королівство на Австрію та до Адріатики завдяки схваленню австрійської знаті. Ми повинні знову звернутися до австрійців, як знатних, так і незнатних."
 CZE_demand_the_istrian_peninsula: "Вимагати півострів Істрія"
 CZE_demand_the_istrian_peninsula_desc: "Те, що [ROOT.GetNameDefCap] не має виходу до моря, занадто довго було перешкодою для нашої торгівлі та впливу. Ми більше не можемо миритися з тим, що наша економіка перебуває на милості сусідніх країн, і повинні вимагати доступу до Адріатики."
 CZE_demand_slovenia: "Вимагати Словенію"
 CZE_demand_slovenia_desc: "Словенія в минулому була помітною частиною Австрійської імперії, і тепер, коли ми взяли під контроль ядро цієї імперії, ми повинні спробувати повернути її територію."
 CZE_demand_overlordship_of_yugoslav_league: "Вимагати верховенства над [YUG.GetAdjective]ою лігою"
 CZE_demand_overlordship_of_yugoslav_league_desc: "Хоча ми так само добре, як і [YUG.GetName], знаємо, що місцева автономія іноді необхідна в багатонаціональній країні, їхній альянс зараз занадто слабкий, щоб захистити себе. Ми повинні закликати [YUG.GetNameDef] визнати це і дозволити нам втрутитися."
 CZE_expand_the_rome_protocols: "Розширити Римські протоколи"
 CZE_expand_the_rome_protocols_desc: "Наш новий уряд набагато більше солідарний з урядом у [ITA.capital.GetCapitalVictoryPointName], ніж у [GER.capital.GetCapitalVictoryPointName]. Враховуючи розбіжності між ними щодо Австрії, приєднання до Римських протоколів може дати [ITA.GetNameDef] необхідну впевненість, щоб дотримуватися свого нинішнього курсу замість того, щоб звертатися до [GER.GetNameDef]."
 CZE_prague_protocols: "Празькі протоколи"
 CZE_soviet_alliance: "Розширити Договір про союз 1935 року"
 CZE_soviet_alliance_desc: "Нинішній договір про союз з [SOV.GetNameDef] є занадто неоднозначним, щоб бути впевненими у їхньому втручанні у разі нападу на нас. Тому ми повинні звернутися до них щодо нової угоди, якщо ми хочемо гарантувати свою безпеку."
 CZE_airlift_soviet_support: "Перекидання радянської підтримки повітрям"
 CZE_airlift_soviet_support_desc: "Відсутність спільних кордонів з нашим [SOV.GetAdjective]им союзником призвела до новаторської ідеї перекидання [SOV.GetAdjective]их військ повітрям. Транспортна операція такого масштабу ще ніколи не проводилася, але це означатиме, що [SOV.GetAdjective]им військам не доведеться входити на територію наших сусідів, принаймні по суші."
 CZE_unlocks_volunteer_transport_raid_tt: "Відкриває §YРейд§!:\nПовітряний міст для радянських добровольців до §Y[73.GetName]§!"
 CZE_intervene_in_the_ussr: "Втрутитися у [SOV.GetAdjective]у громадянську війну"
 CZE_intervene_in_the_ussr_desc: "Знову у [SOV.GetNameDef] виникли заворушення, і хоча стара королівська сім'я, яку ми колись підтримували, не повернеться, не можна ігнорувати можливість появи більш дружнього уряду."
 CZE_forgive_trading_debts: "Пробачити торгові борги"
 CZE_forgive_trading_debts_desc: "Економічна нестабільність та Велика депресія обтяжили деяких із наших потенційних союзників боргами перед нами, які вони насилу виплачують, що створює напругу у відносинах. Уряд міг би пробачити ці борги та виплатити компенсацію нашим вітчизняним компаніям, які постраждають від цього кроку."
 CZE_improve_balkan_trade_relations: "Покращити торгові відносини на Балканах"
 CZE_improve_balkan_trade_relations_desc: "Наш найбільший актив у залученні потенційних союзників на Балканах — це наша економіка; ми повинні продемонструвати нашу готовність витрачати ресурси на покращення економічної ситуації наших потенційних союзників."
 CZE_ally_austria: "Укласти союз із [AUS.GetName]"
 CZE_ally_austria_desc: "Її уряд ледь не повалили нацистські головорізи всього кілька років тому; [AUS.GetNameDef] повинна почати розуміти потенційні переваги співпраці з [ROOT.GetNameDef]."
 CZE_demand_the_czech_corridor: "Вимагати Чеський коридор"
 CZE_demand_the_czech_corridor_desc: "У міру того, як ми перетворюємо Малу Антанту на справжній альянс, стає дедалі очевиднішим, що передислокація військ до наших союзників або отримання їхніх військ може виявитися дуже складною в разі конфлікту. Наявність смуги території, що з'єднує нашу країну та [YUG.GetNameDef], як це колись пропонувалося після Великої війни, могла б підвищити нашу безпеку та убезпечити нашу торгівлю."
 CZE_ally_hungary: "Укласти союз із [HUN.GetName]"
 CZE_ally_hungary_desc: "Незважаючи на конфлікти, які шкодили нашим відносинам з [HUN.GetNonIdeologyName] з моменту народження [CZE.GetNonIdeologyName], нещодавно вони продемонстрували потенціал стати цінним союзником."
 CZE_ally_yugoslavia: "Укласти союз із [YUG.GetName]"
 CZE_ally_yugoslavia_desc: "Можливо, останнім часом [YUG.GetNameDefCap] відчувала економічні труднощі, але їхні стратегічні ресурси та розташування не можна залишати поза увагою."
 CZE_protect_neutrality: "Захистити нейтралітет"
 CZE_protect_neutrality_desc: "Велика війна дала зрозуміти, що намагатися залишатися нейтральними марно, коли ти під прицілом ворога. Захист цих країн означає примушування наших ворогів до війни на два фронти під час експансії замість того, щоб дозволяти їм розділяти і володарювати."
 CZE_if_cooperate_with_moderate_socialists_completed_tt: "Ефекти, якщо фокус §Y«Співпраця з поміркованими соціалістами»§! виконано:"
 CZE_mutual_protection_agreement_with_switzerland: "Договір про захист з [SWI.GetNonIdeologyName]"
 CZE_mutual_protection_agreement_with_switzerland_desc: "І ми, і [SWI.GetNameDef] працюємо над тим, щоб вторгнення на наші землі стало неможливим без непідйомних втрат; завдяки співпраці ми могли б виставити армію, достатню не лише для оборони, але й для рішучої контратаки."
 CZE_exchange_technology: "Співпрацювати в дослідженнях"
 CZE_exchange_technology_desc: "Незважаючи на велику кількість природних ресурсів, Балканам бракує прибуткових колоній або розвиненої промисловості великих держав. Тому ключовим є співробітництво в галузі досліджень, щоб дозволити зосередитися на наших відповідних спеціалізаціях."
 CZE_demand_corridor_to_ussr: "Вимагати коридор до [SOV.GetAdjective]их території"
 CZE_demand_corridor_to_ussr_desc: "Якщо [POL.GetNameDef] не співпрацюватиме з нами, ми повинні вжити серйозніших заходів для забезпечення доступу до наших [SOV.GetAdjective]их союзників."
 CZE_ally_poland: "Укласти союз із [POL.GetName]"
 CZE_ally_poland_desc: "Пам'ятаючи польсько-радянську війну та стикаючись зі зростаючою загрозою на заході, [POL.GetNameDef] перебуває в такому ж пошуку безпеки, як і ми. Ми повинні переконати [POL.GetAdjective]ий уряд в тому, що нейтралітет їх не врятує, і їм слід пов'язати свою долю з нами."
 CZE_realize_the_polish_czechoslovak_confederation: "Реалізувати конфедерацію"
 CZE_realize_the_polish_czechoslovak_confederation_desc: "Попри свою мужню боротьбу, [POL.GetNameDef] зазнала поразки. Оскільки її уряд зараз перебуває у вигнанні, з'явилися ідеї про союз із нами. Об'єднавши їхній уряд із нашим, ми могли б згуртувати [POL.GetAdjective]ий народ навколо цієї нової держави та скоординовано докласти зусиль для звільнення нашої спільної батьківщини."
 CZE_integrate_western_ukrainians: "Інтегрувати західних українців"
 CZE_integrate_western_ukrainians_desc: "Українцям в [CZE.GetNameDef] було запропоновано значну допомогу та автономію; тепер ми можемо спробувати інтегрувати нещодавно набуті землі до нашої української провінції."
 CZE_ally_russia: "Укласти союз із [SOV.GetNonIdeologyName]"
 CZE_ally_russia_desc: "Тепер, коли уряд [SOV.GetNameDef] тісніше узгоджується з нашим, ми могли б спробувати розширити розмиту угоду, підписану з їхнім попереднім урядом."
 CZE_claim_ukraine: "Створити дружній український уряд"
 CZE_claim_ukraine_desc: "Україна є важливою частиною [SOV.GetNameDef]; захопивши її, ми могли б утворити потужну буферну державу."
 CZE_strengthen_the_little_entente: "Офіційно оформити Малу Антанту"
 CZE_strengthen_the_little_entente_desc: "Спрямована переважно на стримування [HUN.GetNonIdeologyName], Мала Антанта має потенціал стати серйозним альянсом зі значною армією."
 CZE_seek_french_leadership: "Шукати [FRA.GetAdjective]ого лідерства"
 CZE_seek_french_leadership_desc: "Незважаючи на нашу ініціативу щодо створення цього альянсу, очевидно, що армія [FRA.GetNonIdeologyName] була б чудовим доповненням до будь-якого союзу. Навіть якщо це означатиме поступку лідерством."
 CZE_increase_food_and_resource_imports: "Збільшити імпорт продовольства та ресурсів"
 CZE_increase_food_and_resource_imports_desc: "Оскільки наші нові союзники мають потужну сільськогосподарську промисловість, тепер менше потреби субсидувати власну. Дешевий імпорт ресурсів не лише заощадить наші гроші, але й дасть поштовх економіці наших союзників."
 CZE_double_down_on_heavy_industry: "Подвоїти ставку на важку промисловість"
 CZE_double_down_on_heavy_industry_desc: "Нові угоди з нашими союзниками дозволять нам зосередитися на найбільш конкурентоспроможних галузях, таких як збройова промисловість. Будь-які надлишки потім можна буде продати."
 CZE_neutralize_the_hungarian_threat: "Нейтралізувати [HUN.GetAdjective]у загрозу"
 CZE_neutralize_the_hungarian_threat_desc: "[HUN.GetNameDefCap] є перешкодою для торгівлі з потенційними союзниками на півдні, і якщо вона об'єднається з нашими ворогами, то може відволікти потенційно важливу частину нашої армії, незважаючи на наслідки Тріанонського договору."
 CZE_cancel_anti_hungary_focus: "Відступили після [GER.GetAdjective]ого втручання"
 CZE_ally_romania: "Укласти союз із Ромунією"
 CZE_ally_romania_desc: "[ROM.GetNameDefCap] є однією з найбільш самодостатніх країн у регіоні, що виробляє продовольство та цінну нафту. Укладення союзу з ними не лише дасть нам легший доступ до ресурсів одне одного, але й позбавить наших ворогів сировини, необхідної для ведення війни проти нас."
 CZE_divide_germany: "Розділити Німеччину"
 CZE_divide_germany_desc: "Загрозі з боку [GER.GetNameDef] важко протистояти наодинці, тому нам слід шукати союзників, які так само стурбовані [GER.GetAdjective]ою експансією та мають силу волі діяти на випередження."
 CZE_if_FRA_ally_tt: "Ефекти, якщо §YФранція є монархічною§! і ще не уклала союз із кимось іншим:"
 CZE_if_POL_ally_tt: "Ефекти, якщо фокус §Y«Сильна Польща»§! був виконаний і призвів до гарантії від [POL.GetNonIdeologyName]:"
 CZE_revolutionary_brigades: "Створити революційні бригади"
 CZE_revolutionary_brigades_desc: "Наші революціонери, які тепер мають досвід боротьби за [ROOT.GetNameDef], повинні бути надалі інтегровані в регулярну армію."
 CZE_recruit_communist_exiles: "Вербувати комуністів-вигнанців"
 CZE_recruit_communist_exiles_desc: "[ROOT.capital.GetCapitalVictoryPointName] вже давно є безпечною гаванню для революціонерів-вигнанців; наш новий уряд міг би використати цих іноземних радикалів."
 CZE_destabilize_potential_adversaries: "Дестабілізувати потенційних супротивників"
 CZE_destabilize_potential_adversaries_desc: "Комуністи-вигнанці, з якими ми співпрацюємо, мають таке розуміння своєї рідної країни, з яким навіть нашим шпигунам важко зрівнятися. Ми повинні повною мірою використати ці знання, розробляючи стратегію звільнення їхньої батьківщини."
 CZE_nationalize_key_industries: "Націоналізувати банки та шахти"
 CZE_nationalize_key_industries_desc: "Шахти забезпечують сировиною, з якої наша промисловість кує зброю для війни. Забезпечення постачання матеріалів у час кризи найкраще залишити в руках уряду, а не фінансистів та промисловців."
 CZE_rehabilitate_the_army: "Реабілітувати армію"
 CZE_rehabilitate_the_army_desc: "Більшість генералів [CZE.GetAdjective]ої армії є ветеранами Чехословацького легіону, який найбільше відзначився в боротьбі проти червоних у їхній громадянській війні. Буде необхідно забезпечити їхню лояльність до нового [CZE.GetAdjective]ого уряду."
 CZE_unlock_civil_war_army_generals_tt: "Повернути командирів, втрачених у Громадянській війні"
 CZE_recruit_ideologically_aligned_generals: "Набрати ідеологічно надійних генералів"
 CZE_recruit_ideologically_aligned_generals_desc: "Настав час скоригувати наші навчальні програми, щоб збагатити армію новими кандидатами, які розуміють наші нові цінності."
 CZE_recruit_communist_generic_general_tt: "Отримує генерала-комуніста."
 CZE_purge_two_random_commanders_tt: "Двоє випадкових командирів будуть піддані репресіям."
 CZE_czechoslovak_union: "Чехословацький союз"
 CZE_czechoslovak_union_desc: "Місцева автономія в [CZE.GetNameDef] має бути розширена, це дозволить адаптувати комуністичну систему до місцевих умов."
 CZE_continue_industrial_relocation_schemes: "Продовжити плани переміщення зброярень"
 CZE_continue_industrial_relocation_schemes_desc: "Заради нашої національної безпеки ми повинні продовжувати переміщувати наші найвразливіші заводи в райони, де вони будуть краще захищені від повітряних та наземних атак. Ми не можемо ризикувати, піддаючи небезпеці таку критично важливу галузь."
 CZE_continue_industrial_relocation_schemes_tt: "Видалити §Y1 військовий завод§!."
 CZE_continue_industrial_relocation_schemes_2_tt: "§RЗаводи потрібно буде відбудувати.§!"
 CZE_establish_a_armament_factory_in_uhersky_brod: "Заснувати збройовий завод в Угерському Броді"
 CZE_establish_a_armament_factory_in_uhersky_brod_desc: "Завод в Угерському Броді — це збройовий завод, який спеціалізується на виробництві та розробці автоматичної зброї для піхоти та авіації. Ми плануємо зробити його найсучаснішим заводом такого типу у світі."
 CZE_appeal_to_the_castle: "Звернутися до «Граду»"
 CZE_appeal_to_the_castle_desc: "«Град» у Чехословаччині — це розгалужена мережа впливових організацій та людей, які підтримують її президентів. Ця влада, у свою чергу, дозволяє президентам здійснювати більший вплив, ніж передбачають їхні обмежені конституційні обов'язки. Звернення за підтримкою до цієї групи дало б неймовірний поштовх нашій заявці на лідерство."
 CZE_petition_the_nobles: "Звернутися до знаті"
 CZE_petition_the_nobles_desc: "Дворянський клас [ROOT.GetNameDef] може більше й не мати визнаних титулів, але він все ще є впливовою частиною [ROOT.GetAdjective]ого суспільства; їхня підтримка дасть нам як легітимність, так і ресурси, необхідні для залучення подальшої підтримки."
 CZE_unify_the_fascist_parties: "Об'єднати фашистські партії"
 CZE_unify_the_fascist_parties_desc: "Ландшафт фашистських партій є роздробленим, багато з них є настільки екстремальними, що ніколи не можуть сподіватися на значну підтримку. Для захисту нації необхідно, щоб ці партії об'єдналися і створили бачення Чехословаччини, яке приваблювало б не лише маргінальні верстви суспільства."
 CZE_pro_rearmament_propaganda: "Пропаганда переозброєння"
 CZE_pro_rearmament_propaganda_desc: "Щоб підвищити підтримку більш централізованого уряду, ми повинні підкреслити нинішню крихку ситуацію в навколишньому світі. Це також допоможе мотивувати населення підтримати плани посилення армії, коли це буде необхідно."
 CZE_align_nationalist_parties: "Залучити чеські націоналістичні партії"
 CZE_align_nationalist_parties_desc: "Хоча ми повинні намагатися апелювати до всіх [ROOT.GetAdjective]их народів, не можна заперечувати, що традиційні чеські націоналістичні партії є найвпливовішими на політичній арені, і саме з ними нам найлегше заручитися підтримкою."
 CZE_align_slovak_catholics: "Залучити словацьких католиків"
 CZE_align_slovak_catholics_desc: "Католицькі та націоналістичні партії наразі мають велику підтримку в Словаччині. Хоча домовитися з націоналістами буде важко без серйозних поступок, ми, можливо, зможемо згуртувати католицькі елементи навколо нашої справи."
 CZE_jozef_tiso_tt: "Призначити радником §Y$CZE_jozef_tiso$§!"
 CZE_align_catholic_parties: "Залучити ЧСЛ"
 CZE_align_catholic_parties_desc: "ЧСЛ та інші католицькі партії були традиційною базою підтримки монархічної системи в Австро-Угорській імперії; настав час спробувати схилити їх повернутися до цієї позиції."
 CZE_restore_the_monarchy: "Відновити монархію"
 CZE_restore_the_monarchy_desc: "Заручившись підтримкою нової системи, настав час запропонувати вдосконалену ідею народу. З обранням $CZE_karel_schwarzenberg$ монархом ми звертаємося як до старих прихильників монархії, так і до нових, оскільки він — [ROOT.GetAdjective]ий, а не [AUS.GetAdjective]ий монарх, яких раніше нам нав'язували."
 CZE_semi_constitutional_monarchy: "Напівконституційна система"
 CZE_semi_constitutional_monarchy_desc: "Тепер, коли монарх обраний, настав час внести зміни до конституції. Хоча дехто виступає за централізацію влади, щоб уникнути міжусобиць у ці неспокійні часи, зрозуміло, що монарх не може робити все сам. Тому, можливо, найкраще частково зберегти нинішню систему для допомоги в управлінні країною, водночас маючи монарха, який направлятиме її."
 CZE_restore_noble_titles: "Відновити дворянські титули"
 CZE_restore_noble_titles_desc: "Свого часу скасовані при заснуванні республіки, зараз настав час винагородити знать за співпрацю відновленням їхніх титулів. Це також дозволить нам надавати почесні звання таким героям, як офіцери-ветерани, які раз за разом боролися за [ROOT.GetAdjective]у державу."
 CZE_restore_the_austro_hungarian_customs_union: "Відновити Митний союз імперії"
 CZE_restore_the_austro_hungarian_customs_union_desc: "Однією з незаперечних переваг Австро-Угорської імперії були обмежені торгові бар'єри для нашої промисловості. Відновлення цього союзу стало б першим кроком до залучення інших колишніх складових країн у нашу сферу впливу."
 CZE_customs_union: "Митний союз"
 CZE_catholic_focus: "Католицький фокус"
 CZE_catholic_focus_desc: "Хоча гусити є відомою частиною [ROOT.GetAdjective]ої історії, багато хто все ще дотримується католицьких вірувань, до яких ми повинні апелювати, посиливши їхню роль у суспільстві."
 CZE_hussite_legacy: "Гуситська спадщина"
 CZE_hussite_legacy_desc: "Гусити не просто просували більш протестантський стиль християнства, вони також виділялися своєю терпимістю до інших думок з цього питання, на відміну від тиранів, які вели війни, щоб протистояти їм."
 CZE_align_with_germany: "Зблизитися з [GER.GetNonIdeologyName]"
 CZE_align_with_germany_desc: "Новий уряд в [GER.GetNameDef] може й не бути менш експансіоністським, але він може виявитися більш прагматичним у тому, з ким укладати союзи, а кого засуджувати. Ми повинні докласти зусиль, щоб опинитися в першій групі."
 CZE_rally_against_germany: "Згуртуватися проти [GER.GetNonIdeologyName]"
 CZE_rally_against_germany_desc: "Чехословаки хоробро боролися за свою незалежність, і тепер ми повинні закликати всіх людей захистити цю незалежність."
 CZE_integrate_sudeten_germans: "Інтегрувати Судетську область"
 CZE_integrate_sudeten_germans_desc: "Розкол серед населення Судетської області нікому не допомагає. Ми повинні прагнути врахувати їхні проблеми і працювати над їх вирішенням. Одне лише це може обеззброїти будь-яких прихильників незалежності, оскільки в їхні заяви про погане поводження буде важко повірити."
 CZE_cooperate_with_the_sdp: "Співпрацювати із SdP"
 CZE_cooperate_with_the_sdp_desc: "Хоча SdP і є дестабілізуючою силою, вона може піти на поступки, якщо її належним чином заохотити, наприклад, включивши до керівної коаліції."
 CZE_revive_the_december_bloc: "Відродити Грудневий блок"
 CZE_revive_the_december_bloc_desc: "Грудневий блок фашистських, меншинних і правих партій, які виступали проти того, щоб Едвард Бенеш став президентом, слід відновити, щоб запропонувати альтернативу нинішньому уряду."
 CZE_revert_1926_anti_military_laws: "Скасувати Антивоєнні закони 1927 року"
 CZE_revert_1926_anti_military_laws_desc: "Після спроби державного перевороту $CZE_radola_gajda$ армія та жандармерія втратили право голосу, а також деякі інші привілеї. Враховуючи вирішальну роль армії в ці важкі часи, було б справедливо зняти ці обмеження та усунути прірву між армією і політикою."
 CZE_bop_to_fascism_support_tt: "Додає третину від значення §Y$CZE_bop_army_readiness$§! до підтримки фашизму:"
 CZE_power_to_the_military: "Влада військовим"
 CZE_power_to_the_military_desc: "Очевидно, що для захисту нації не можна шкодувати жодних ресурсів. Це робить критично важливим, щоб ті, хто перебуває при владі, розуміли потреби армії, і немає кращого способу забезпечити це, ніж через військовий уряд."
 CZE_militarize_the_associations: "Мілітаризувати асоціації"
 CZE_militarize_the_associations_desc: "Численні асоціації [CZE.GetNameDef] могли б зробити внесок в оборону країни, навчаючи навичок, необхідних солдату, ще до мобілізації населення."
 CZE_aggressive_foreign_policy: "Агресивна зовнішня політика"
 CZE_aggressive_foreign_policy_desc: "Час довіряти крихким пактам минув, ми повинні діяти рішуче, щоб захистити нашу безпеку, навіть якщо це вимагатиме серйозних жертв."
 CZE_work_with_germany: "Співпрацювати з [GER.GetNameDef]"
 CZE_work_with_germany_desc: "З вирішенням Судетського питання, можливо, [GER.GetNameDef] тепер визнає, наскільки цінною союзницею могла б стати [ROOT.GetNameDef]."
 CZE_control_the_associations: "Контролювати асоціації"
 CZE_control_the_associations_desc: "[CZE.GetNonIdeologyName] має багато організацій: від людей зі спільною професією до гуртків за інтересами чи спортивних асоціацій. Контролюй їх — і ти контролюватимеш значну частину суспільства."
 CZE_diversify_bata: "Диверсифікувати компанію «Батя»"
 CZE_diversify_bata_desc: "«Батя» — це велика споживча компанія, яку ми могли б використати на свою користь у нашому ланцюжку постачання ресурсів. Вони можуть допомогти нам, надаючи критично важливі матеріали, які інакше важко дістати."
 CZE_devaluate_the_koruna: "Девальвувати крону"
 CZE_devaluate_the_koruna_desc: "Мати сильну валюту — це небезпечне економічне становище для країни, значна частина економіки якої залежить від експорту. Ослаблення нашої валюти може призвести до короткочасних труднощів, але в довгостроковій перспективі це піде нам на користь."
 CZE_continue_the_central_bohemia_plan: "План «Центральна Богемія»"
 CZE_continue_the_central_bohemia_plan_desc: "Продовження нашого плану з розширення промислових зон у центрі країни дозволить нам скористатися ефектом масштабу. Розширення нашої промисловості подалі від кордонів також було б розумним кроком з точки зору національної безпеки."
 CZE_balance_industrial_invevestments: "Збалансувати зусилля з промислового розвитку"
 CZE_balance_industrial_invevestments_desc: "Залишення територій за межами [9.getname] та [75.getname] недостатньо розвиненими є однією з причин, чому наша країна почала розколюватися на початку десятиліття. Розвиток регіонів на периферії нашої країни допоміг би подолати розрив у промисловому розвитку між ними."
 CZE_expand_prf_science_facilities: "Розширити наукові установи PrF"
 CZE_expand_prf_science_facilities_desc: "Наукові установи PrF сповнені армією світлих голів, які чекають на можливість зробити щось більше, ніж те, чим вони займаються зараз. Розширення факультету та залучення їх до співпраці з урядом є гарним початком для покращення наших досліджень."
 CZE_raise_more_industrial_funds: "Залучити більше промислових коштів"
 CZE_raise_more_industrial_funds_desc: "Від часів Австро-Угорщини і до наших днів промисловість була серцем нашої нації. Забезпечивши необхідний бюджет та фінансування, ми сприятимемо її подальшому процвітанню в цій неспокійній Європі."
 CZE_skoda_priority_focus_info_tt: "Деякі §YНаціональні фокуси§! вимагатимуть від нас дотримання певного фокусу £GFX_CZE_skoda_text_icon §YПріоритету «Шкоди»§! для їх виконання. Ці фокуси позначені невеликою іконкою, пов'язаною з необхідним £GFX_CZE_skoda_text_icon §YПріоритетом «Шкоди»§!."
 CZE_joint_stock_schemes: "Акціонерні схеми"
 CZE_joint_stock_schemes_desc: "Акціонерні схеми слугували джерелом економічного зростання, коли бракувало традиційних джерел фінансування. Подальше використання цих тактик призведе до подальшого зростання нашої економіки."
 CZE_the_slovak_arrow: "«Словацька стріла»"
 CZE_the_slovak_arrow_desc: "Створення швидкісного потягу між двома нашими великими містами стало б головним джерелом національної гордості. Це також дало б нам вагомий привід для покращення залізничної інфраструктури."
 CZE_finish_double_tracking_efforts: "Зусилля з прокладання других колій"
 CZE_finish_double_tracking_efforts_desc: "Завершення зусиль із прокладання других колій на деяких із наших важливих другорядних залізничних ліній дозволить збільшити їхню пропускну здатність. Це призведе до кращого сполучення між деякими з наших другорядних міст."
 CZE_realize_motorway_proposals: "Реалізувати проєкти автомагістралей"
 CZE_realize_motorway_proposals_desc: "Нашому уряду було представлено кілька проєктів автомагістралей, які б значно покращили дорожнє сполучення в межах наших кордонів. Ми повинні розглянути ці пропозиції та втілити їх у реальність."
 CZE_build_additional_rail_stations: "Побудувати додаткові залізничні станції"
 CZE_build_additional_rail_stations_desc: "З нашою нещодавно розвиненою залізничною інфраструктурою деякі з наших існуючих залізничних станцій не можуть впоратися зі збільшенням пропускної здатності. Їхня модернізація значно покращила б нашу здатність доставляти людей і товари туди, куди їм потрібно, у більших обсягах."
 CZE_build_additional_rail_stations_focus_cost_tt: "Виконання фокусу §Y$CZE_devaluate_the_koruna$§! скоротить час його виконання до §G35§! днів."
 CZE_grow_ckd_secondary_facilities: "Другорядні підприємства ČKD"
 CZE_grow_ckd_secondary_facilities_desc: "ČKD має багато невеликих другорядних заводів, які виробляють деякі важливі промислові товари, такі як електрогенератори. Розширення цих заводів сприяло б зростанню нашої важкої промисловості."
 CZE_bolster_domestic_construction: "Підтримати вітчизняне будівництво"
 CZE_bolster_domestic_construction_desc: "Наш вітчизняний будівельний сектор неухильно зростає відтоді, як ми здобули незалежність після закінчення Великої війни. Надання додаткових інвестицій деяким середнім будівельним підрядникам ще більше посилило б це зростання."
 CZE_invest_in_vhht: "Інвестувати у VHHT"
 CZE_invest_in_vhht_desc: "VHHT — це компанія, яка об'єднує багато різних металообробних заводів по всій країні. Інвестиції та їх розширення допоможуть нам у майбутньому покращити багато різних напрямків нашого металургійного виробництва."
 CZE_expand_vitkovice_ironworks: "Розширити Вітковицький металургійний завод"
 CZE_expand_vitkovice_ironworks_desc: "Вітковицький металургійний завод є важливим постачальником заліза в межах [74.getname]. Його розширення значно збільшить виробничі потужності заводу."
 CZE_expand_central_bohemian_mines: "Розширити Центральнобогемські шахти"
 CZE_expand_central_bohemian_mines_desc: "Шахти в центрі нашої країни є найважливішими для нашої енергетичної безпеки. Ми повинні розширити їх якомога швидше."
 CZE_increase_bauxite_imports: "Збільшити імпорт бокситів"
 CZE_increase_bauxite_imports_desc: "Можливо, наша країна не багата на алюміній, але, використовуючи певні процеси переробки та збільшивши імпорт бокситів, ми можемо виробляти невелику кількість цього ресурсу на внутрішньому ринку. Це допомогло б зменшити дефіцит ресурсів."
 CZE_merge_the_oil_companies: "Об'єднати нафтові компанії"
 CZE_merge_the_oil_companies_desc: "Наші нафтові компанії заледве можуть так називатися. Усі вони є невеликими корпораціями, побудованими навколо кількох свердловин. Об'єднавши їх і взявши нафтову промисловість під державний контроль, ми зможемо досягти більшого з меншими витратами."
 CZE_expand_trinec_ironworks: "Тршинецький металургійний завод"
 CZE_expand_trinec_ironworks_desc: "Тршинецький металургійний завод був титаном промисловості в [72.getname] з моменту свого заснування. Подальші інвестиції принесли б нам величезні дивіденди у виробництві ресурсів."
 CZE_consolidate_mining_operations: "Консолідувати гірничодобувні операції"
 CZE_consolidate_mining_operations_desc: "Наші гірничодобувні операції можна було б краще оптимізувати, якби адміністрації цих компаній були об'єднані для підвищення ефективності. Це дозволило б зробити їхні дослідження та зусилля з розширення існуючих шахт більш ефективними."
 CZE_expand_praga: "Контракти з «Прагою»"
 CZE_expand_praga_desc: "Компанія «Прага» вже роками є джерелом різноманітних комплектуючих для нашої військової промисловості. Логічно винагородити їх додатковими контрактами, щоб допомогти їм зростати й надалі."
 CZE_shrink_educational_disparities: "Скоротити освітню нерівність"
 CZE_shrink_educational_disparities_desc: "Нашим сільським районам бракує належної освіти, яка пропонується в містах. Ми повинні боротися з цією нерівністю за допомогою великих освітніх програм, спрямованих на ці території."
 CZE_kickstart_rapid_rearmanent: "Дати поштовх швидкому переозброєнню"
 CZE_kickstart_rapid_rearmanent_desc: "Багато політиків і бізнесменів можуть вважати це жахливим рішенням, але ми повинні розпочати переозброєння негайно. Країни навколо нас не роззброюються, насправді вони роблять протилежне, і це ні для кого не секрет. Ми повинні підготувати нашу армію, поки ще є час."
 CZE_keep_focus_on_weapon_exports: "Зберегти фокус на експорті зброї"
 CZE_keep_focus_on_weapon_exports_desc: "Наша потужна збройова експортна промисловість — це те, що вивело нас з економічної депресії. Зміна цієї тенденції була б небезпечною як політично, так і економічно. Дотримуватися поточного курсу — найкращий план дій у цей час. Будь-які загрози для нас все одно перебільшені."
 CZE_force_the_industrialists_hand: "Натиснути на промисловців"
 CZE_force_the_industrialists_hand_desc: "Промисловці та конгломерати занадто довго стримували нашу здатність до ефективного переозброєння. Настав час зробити вибір за них заради блага нації."
 CZE_embrace_corporatism: "Прийняти корпоративізм"
 CZE_embrace_corporatism_desc: "Ми могли б домовитися з промисловцями, щоб вони допомогли відновити наше переозброєння, якщо ми погодимося на деякі їхні умови. Певні зміни в політиці на їхню користь є цілком розумними і в наших інтересах."
 CZE_expand_existing_armory_plants: "Розширити існуючі збройові заводи"
 CZE_expand_existing_armory_plants_desc: "Перенесення деяких із наших існуючих збройових заводів буде дорогою інвестицією з невеликою довгостроковою вигодою. Розширення існуючих підприємств дасть переваги та можливості для збільшення виробництва, а також досліджень і розробок на цих поточних локаціях. Навіть із ризиком того, що вони перебуватимуть у місцях, які легше атакувати потенційним ворогам."
 CZE_expand_skoda_offices: "Розширити представництва «Шкоди»"
 CZE_expand_skoda_offices_desc: "Наші міжнародні представництва — це те, що стимулює продажі нашої зброї. Їх розширення на нові локації є розумним рішенням."
 CZE_skoda_office_unlock_tt: "Відкриває рішення: §Y«Побудувати офіс продажу зброї»§!"
 CZE_complete_the_power_grid: "Завершити розбудову енергомережі"
 CZE_complete_the_power_grid_desc: "Енергомережа в наших сільських районах потребує подальшої роботи. Вона відстала від решти країни і є перешкодою для більшого економічного прогресу."
 CZE_build_the_slapy_reservoir: "Побудувати Слапське водосховище"
 CZE_build_the_slapy_reservoir_desc: "Будівництво дамби біля Слапи призведе до збільшення виробництва електроенергії та економічних можливостей у цьому районі. Зростання генерації енергії значно допоможе розвитку нашої промисловості в регіоні."
 CZE_diversify_refinery_processes: "Диверсифікувати процеси нафтопереробки"
 CZE_diversify_refinery_processes_desc: "Наші свердловини могли б виробляти широкий спектр різних нафтопродуктів. Єдина проблема полягає в тому, що нам бракує ноу-хау для цього. Якщо мы інвестуємо час у дослідження, щоб з'ясувати як, ми зможемо втілити цю мрію в реальність."
 CZE_enlarge_smaller_wells: "Розширити менші свердловини"
 CZE_enlarge_smaller_wells_desc: "Незважаючи на свій розмір, наші менші свердловини можуть давати набагато більше, ніж та мізерна кількість нафти, яку вони виробляють зараз. Усе, що нам потрібно зробити, — це інвестувати час, щоб втілити це в життя."
 CZE_develop_sudetenland_resources: "Освоїти ресурси Судетської області"
 CZE_develop_sudetenland_resources_desc: "Судетська область має багато родовищ ресурсів, які ми зараз не використовуємо. Було б помилкою не інвестувати в будівництво нових шахт у цьому регіоні."
 CZE_grow_tatras_capabilities: "Розширити можливості «Татри»"
 CZE_grow_tatras_capabilities_desc: "Нині невеликий танковий відділ «Татри» має кілька нових виробничих проєктів. Надання їм додаткових ресурсів дозволить продовжувати робити успіхи в проєктуванні бронетехніки."
 CZE_bailout_moser: "Врятувати компанію «Мозер»"
 CZE_bailout_moser_desc: "Компанія «Мозер» переживає важкі часи після Великої депресії. Її підприємства потребують фінансової допомоги, заводи мають бути знову відкриті, а звільнені люди — повернуті на роботу."
 CZE_merge_skodas_consumer_good_plants: "Об'єднати заводи споживчих товарів «Шкоди»"
 CZE_merge_skodas_consumer_good_plants_desc: "У портфоліо «Шкоди» є багато менших заводів із виробництва споживчих товарів, які не є централізованими. Це допомогло б оптимізувати їхнє виробництво в багатьох сферах цих підприємств. Це також могло б мати позитивний ефект для «Шкоди» в цілому."
 CZE_giant_of_central_europe_industry: "Гігант промисловості"
 CZE_giant_of_central_europe_industry_desc: "Висоти, які раніше вважалися неможливими. Тепер ми титан промисловості в Європі!"
 CZE_continue_armed_force_reform: "Продовжити реформу збройних сил"
 CZE_continue_armed_force_reform_desc: "Продовжуючи модернізацію наших збройних сил відповідно до наміченого графіка та перепідпорядковуючи військові округи нашим штабам у провінціях, ми досягнемо кращої координації в будь-яких потенційних конфліктах."
 CZE_air_force_officer_recruitment: "Набір офіцерів військово-повітряних сил"
 CZE_air_force_officer_recruitment_desc: "Аероклуби по всій країні у співпраці зі Школою офіцерів запасу ВПС задовольняють критичну потребу в офіцерах запасу, пропонуючи льотні курси та бойові стрільби."
 CZE_national_defense_act: "Закон про оборону держави"
 CZE_national_defense_act_desc: "Цей закон про оборону охоплює всі заходи, військові чи інші, спрямовані на протидію будь-якій загрозі або нападу на суверенітет, цілісність, єдність і безпеку нашої нації під наглядом Вищої ради національної оборони (NROS)."
 CZE_car_and_oil_rationing: "Нормування автомобілів та нафти"
 CZE_car_and_oil_rationing_desc: "Нормування приватного автотранспорту та його реквізиція за потреби дозволять нам зосередити автомобільне виробництво та нафтові ресурси на військових потребах."
 CZE_expand_airfield_capacity: "Розширити місткість аеродромів"
 CZE_expand_airfield_capacity_desc: "3-й департамент авіації запланував будівництво нових аеродромів та ангарів для належної експлуатації, зберігання та ремонту наших літаків, а також казарм для наших нещодавно створених ескадрилей та наземного персоналу."
 CZE_trust_in_old_guard: "Довіра до старої гвардії"
 CZE_trust_in_old_guard_desc: "Навички польотів та досвід Великої війни будуть передані новому поколінню ветеранами, яким ми висловлюємо непохитну довіру."
 CZE_expand_the_aero_clubs: "Розширити аероклуби"
 CZE_expand_the_aero_clubs_desc: "Аероклуби довели свою корисність у забезпеченні постійного припливу талановитих пілотів для нашої країни; ми повинні надалі розширювати їх."
 CZE_invest_in_the_smaller_air_plants: "Інвестувати в менші авіаційні заводи"
 CZE_invest_in_the_smaller_air_plants_desc: "Інвестиції в нових і менших виробників літаків створюють необхідну конкуренцію для наших визнаних підприємств; вони могли б допомогти задовольнити наші ширші виробничі потреби."
 CZE_continue_avia_expansion: "Продовжити розширення компанії «Авіа»"
 CZE_continue_avia_expansion_desc: "Інвестиції в «Авіа» забезпечують додаткове обладнання, необхідне для подальшого зміцнення їхніх виробничих потужностей; це могло б допомогти досягти більшої ефективності у виробництві планерів літаків, які мають високий попит."
 CZE_increase_military_aeronautical_institute_funding: "Збільшити фінансування військової авіації"
 CZE_increase_military_aeronautical_institute_funding_desc: "Будівництво додаткових об'єктів для Науково-дослідного та випробувального авіаційного інституту (VZLÚ) забезпечить краще розуміння аеродинаміки, що дозволить далі розвивати та вдосконалювати конструкцію наших літаків."
 CZE_air_training_abroad: "Льотна підготовка за кордоном"
 CZE_air_training_abroad_desc: "Відправляючи курсантів до військово-повітряних сил дружніх до нас країн, ми отримуємо цінний досвід та різнобічні погляди, коли вони повертаються на службу."
 CZE_establish_air_defense_zones: "Створити зони протиповітряної оборони"
 CZE_establish_air_defense_zones_desc: "Ми могли б розмістити наші нові зенітні батареї в ключових точках і на заводах, а також створити зони протиповітряної оборони через вузли зв'язку на територіальному рівні для оптимізації точності нашої ППО."
 CZE_establish_air_defense_zones_enable_tt: "Активує: §Y«Зони протиповітряної оборони»§!"
 CZE_establish_air_defense_zones_tt: "Множник шансу влучання статичної ППО: §G+10%§!"
 CZE_the_air_is_our_sea: "Небо — наше море"
 CZE_the_air_is_our_sea_desc: "Завдяки систематичній підготовці пілотів, дайте їм можливість літати сміливо та впевнено: «У нас немає ні морських портів, ні океанських кораблів. Небо — наше море»."
 CZE_bring_kramer_and_lobel_under_state_control: "Встановити державний контроль над «Крамер і Лобль»"
 CZE_bring_kramer_and_lobel_under_state_control_desc: "Націоналізувавши компанію «Крамер і Лобль», ми зможемо забезпечити безперервні дослідження та своєчасне постачання важливих електротоварів і радіоаксесуарів."
 CZE_second_to_none: "Нікому не поступляться"
 CZE_second_to_none_desc: "Проєкти літаків нашої авіаційної промисловості вдосконалюються з кожним днем. Завдяки подальшим дослідженням наші розробки нікому не поступляться у світі!"
 CZE_diversify_airframe_production: "Диверсифікувати виробництво планерів"
 CZE_diversify_airframe_production_desc: "Ми не можемо покладатися лише на наші винищувачі в небі. Інші літаки та більші планери необхідні для виконання інших типів місій."
 CZE_projekt_l_52: "Проєкт L 52"
 CZE_projekt_l_52_desc: "Технологія реактивних двигунів — це майбутнє військової авіації. Наразі ця технологія ще трохи сира, але якщо ми знайдемо час для розробки спеціального проєкту та сконструюємо планер, створений саме під неї, ми зможемо випередити час."
 CZE_fund_vladimir_mandl_research: "Профінансувати дослідження Володимира Мандла"
 CZE_fund_vladimir_mandl_research_desc: "Юрист на ім'я $CZE_vladimir_mandl$ захоплений ідеєю ракетних технологій. Якщо ми співпрацюватимемо з ним і надамо ресурси, необхідні для перетворення його досліджень на практичні технології, ми зможемо отримати величезну вигоду від цього партнерства."
 CZE_mobilize_the_reserves: "Мобілізувати резерви"
 CZE_mobilize_the_reserves_desc: "Напруга на нашому кордоні посилюється. Ми повинні призвати резервістів та заздалегідь відібраних військових спеціалістів відповідно до наших мобілізаційних карток."
 CZE_three_kings: "Три королі"
 CZE_three_kings_desc: "Офіційна допомога нашим групам опору значно підвищить їхню здатність завдавати шкоди ворожій армії. Це також може допомогти і нашій армії на полі бою."
 CZE_form_the_state_defense_guard: "Сформувати Гвардію оборони держави"
 CZE_form_the_state_defense_guard_desc: "Створюючи SOS (Гвардію оборони держави), ми отримуємо організацію, що спеціалізується на захисті наших довгих корнів. Оскільки члени гвардії військово організовані та навчені, вони слугуватимуть першою лінією оборони проти будь-го вторгнення через кордон."
 CZE_expand_the_horska_divisions: "Розширити гірські дивізії"
 CZE_expand_the_horska_divisions_desc: "Оскільки наша країна складається переважно з невисоких пагорбів і плато, наші солдати, спеціально навчені для ведення війни в гірських умовах, відіграватимуть вирішальну роль на цій складній місцевості."
 CZE_develop_horska_artillery: "Розробити гірську артилерію"
 CZE_develop_horska_artillery_desc: "Модифікувавши нашу нинішню артилерію, щоб вона була легкою та розбірною, ми забезпечимо наші війська достатньою вогневою міццю в гірській та горбистій місцевості."
 CZE_develop_horska_artillery_tech_tt: "Відкриває: §Y«Гірська артилерія»§!\n§YАртилерія (Гори)§!\n  Атака: §G+10%§!\n  Пересування: §G+10%§!\n§YАртилерія (Пагорби)§!\n  Атака: §G+10%§!\n  Пересування: §G+10%§!"
 CZE_bribery_investigations: "Розслідування хабарництва"
 CZE_bribery_investigations_desc: "Ми отримали анонімний лист щодо харчування та поводження з солдатами. Деякі докази вказують на неналежну поведінку певних офіцерів інтендантської служби. Ми повинні покласти цьому край, поки це не завдало більшої шкоди нашому війську."
 CZE_bribery_investigations_remove_effect_tt: "Цей національний дух буде вилучено після виконання фокусу «§Y$CZE_bribery_investigations$§!»"
 CZE_opl_exercises: "Навчання OPL"
 CZE_opl_exercises_desc: "Проводячи навчання з протиповітряної оборони (OPL), наша армія зможе відпрацювати маневрування з покращеною координацією та збереженням сил, тим самим покращуючи загальне пересування військ та безпеку."
 CZE_rapid_response_divisions: "Швидка дивізія"
 CZE_rapid_response_divisions_desc: "Іноземні військові продемонстрували ефективність мобільних підрозділів, здатних передислоковуватися швидше за ворога, підкресливши їхній потенціал. Ми могли б створити подібні підрозділи для оцінки."
 CZE_redouble_tank_development_efforts: "Подвоїти зусилля з розробки танків"
 CZE_redouble_tank_development_efforts_desc: "Наш нинішній проєкт легкого танка можна вдосконалити порівняно з проєктами інших операторів бронетехніки в Європі. Ми повинні подвоїти наші зусилля, щоб переконатися, що ми перебуваємо на одному рівні з ними."
 CZE_rearmed_and_retooled: "Переозброєні та переоснащені"
 CZE_rearmed_and_retooled_desc: "Наше нинішнє важче танкове шасі демонструє потенціал для модернізації. Ми повинні продовжувати досліджувати цей напрямок, щоб забезпечити майбутнє розширення нашого танкового корпусу."
 CZE_establish_the_fall_backlines: "Створити лінії відступу"
 CZE_establish_the_fall_backlines_masterful_delay_tactic_tt: "\nДозволяє тактику: §Y$tactic_masterful_delay$§!"
 CZE_establish_the_fall_backlines_desc: "Ми повинні бути реалістами щодо того, що в деяких місцях наша оборона буде прорвана. Якщо це станеться, наявність готових ліній відступу стане вирішальним фактором між перемогою та поразкою."
 CZE_anti_tank_development: "Розробка протитанкових гармат"
 CZE_anti_tank_development_desc: "Оскільки все більше армій розгортають дедалі більші бронетанкові сили, вдосконалення наших протитанкових гармат є обов'язковим. Здатність боротися з танками за допомогою польових гармат — це те, що вирішує, чи стримаємо ми ворога, чи він прорветься."
 CZE_anti_tank_development_tech_tt: "Відкриває: §Y«Протитанкові вдосконалення»§!\nБронепробивність §Yартилерії§!: §G+5%§!\nБронепробивність §Yартилерії підтримки§!: §G+5%§!\nБронепробивність §Yпротитанкової зброї§!: §G+5%§!\nБронепробивність §Yпротитанкової підтримки§!: §G+5%§!"
 CZE_recon_in_force: "Розвідка боєм"
 CZE_recon_in_force_tech_tt: "Відкриває: §Y«Розвідка боєм»§! \n§YРозвідка§!: ОЗ: §G+5§!\nРозвіддані: §G+10.0%§!."
 CZE_recon_in_force_desc: "Встановлення контакту нашої розвідки з ворогом під час зондування його оборони — це безцінний спосіб отримання розвідданих."
 CZE_integrate_fortification_engineers: "Залучити інженерів-фортифікаторів"
 CZE_integrate_fortification_engineers_desc: "Коли інженери-фортифікатори нашої армії не зайняті будівництвом стаціонарних споруд, мы можемо швидко перекинути їх на передову для покращення нашої оборони. Це допомогло б передовим силам створювати кращі тимчасові захисні споруди для наших військ."
 CZE_integrate_fortification_engineers_tech_tt: "Відкриває: §Y«Залучені інженери-фортифікатори»§!\n§YІнженерна рота§!:\nУкріплення §G+10.00%§!.\n§Y(Форт)§!\n Оборона §G+10.0%§!"
 CZE_concealment_efforts: "Заходи з маскування"
 CZE_concealment_efforts_desc: "Широке використання штурмовиків і розвідувальних літаків зробило маскувальні сітки та інші тактики приховування необхідністю. Нам потрібно посилити наші зусилля, щоб переконатися, що наші війська добре замасковані на полі бою."
 CZE_concealment_efforts_tech_tt: "Відкриває: §Y«Покращена маскувальна сітка»§! \n§YПіхота (Ліс)§!\n Оборона: §G+10%§!"
 CZE_elevate_the_vsv: "Підняти статус Військової академії"
 CZE_elevate_the_vsv_desc: "Бути мозком армії — це величезна національна та державна відповідальність. Тому служба в Генеральному штабі вимагає офіцерів із найкращими якостями як з точки зору професійної підготовки, так і з точки зору надійності, самоконтролю, такту та характеру."
 CZE_continue_with_snejdareks_plan_dynamic: "[CZE_continue_with_snejdareks_plan]"
 CZE_continue_with_snejdareks_plan_default: "Продовжити план Шнейдарека"
 CZE_continue_with_snejdareks_plan_no_snejdareks: "Продовжити план статичної оборони"
 CZE_continue_with_snejdareks_plan_dynamic_desc: "Ведення ефективної оборонної мережі запобігає несподіваному прориву ворожих військ. Це забезпечує захист і створює міцну базу для переходу від стратегічної оборони до наступу."
 CZE_go_with_vojcechovskys_plan_dynamic: "[CZE_go_with_vojcechovskys_plan]"
 CZE_go_with_vojcechovskys_plan_default: "Обрати план Лужі"
 CZE_go_with_vojcechovskys_plan_no_luza: "Доктрина активної оборони"
 CZE_go_with_vojcechovskys_plan_dynamic_desc: "Недоліком статичної оборони є те, що вона позбавлена маневреності. Після прориву її вже не можна використовувати для наступальних цілей, а лише як залишки укріплень на початковій позиції."
 CZE_improve_the_current_officer_pool: "Покращити поточний офіцерський склад"
 CZE_improve_the_current_officer_pool_desc: "Ми будемо просувати по службі персонал, який продемонстрував здатність бути кістяком нашої армії, оскільки вони відіграють важливу роль у виконанні наглядових та координаційних функцій між вищим командуванням і місцевими підрозділами."
 CZE_elevate_slovak_officers: "Просувати словацьких офіцерів"
 CZE_elevate_slovak_officers_desc: "Ми зосередимося на просуванні словаків, щоб забезпечити краще представництво в лавах армії. Знижуючи деякі вимоги до кандидатів зі словацьких округів, ми очікуємо покращення згуртованості в армії в майбутньому."
 CZE_promote_moravec_writings: "Популяризувати праці Моравця"
 CZE_promote_moravec_writings_desc: "Незважаючи на те, що праці Моравця «Солдати і час» та «Оборона держави» викликали дуже суперечливі реакції, його нещодавно опублікована робота «Військове значення нашої держави в Центральній Європі» обговорювалася в щоденній пресі по всій Європі. Ми повинні заохочувати його продовжувати свою роботу як беззаперечного експерта з питань оборонної політики та військової історії."
 CZE_lessons_of_war: "Уроки війни"
 CZE_lessons_of_war_desc: "Маючи за плечима бойовий досвід проти рівного суперника, мы можемо використати ці уроки для вдосконалення нашого вищого командування. Ніщо не замінить уроків, отриманих у реальних зіткненнях армії."
 CZE_lessons_of_war_i_had_war_with_major_flag: "Брала участь у війні з великою державою"
 CZE_for_the_homeland: "За Батьківщину!"
 CZE_for_the_homeland_desc: "Коли наші військові повністю готові до майбутніх випробувань, ми можемо з упевненістю сказати, що готові захищати батьківщину. Ми готові до будь-якого завдання, що стоїть перед нами."
 CZE_the_lions_roar: "Рик лева"
 CZE_the_lions_roar_desc: "Символ чехословацького лева уособлює найкращі якості нашої армії. Мужність, силу та героїзм найвищого ступеня. Усі дізнаються про незрівнянний дух наших збройних сил."
 CZE_diversify_our_specialists: "Диверсифікувати наших спеціалістів"
 CZE_diversify_our_specialists_desc: "Нам потрібно диверсифікувати наших спеціалістів за межі гірських військ. Війна ведеться не лише на гірських вершинах та пагорбах."
 CZE_merge_the_financial_and_state_guard: "Об'єднати Фінансову та Державну гвардію"
 CZE_merge_the_financial_and_state_guard_desc: "З зі створенням Гвардії оборони держави фінансова варта більше не потрібна. Їхнє об'єднання з Гвардією оборони держави допоможе швидко збільшити чисельність SOS."
 CZE_merge_the_financial_and_state_guard_tt: "Відкриває: §Y«Об'єднана фінансова варта»§! \n§YВійськова поліція§!: ОЗ: §G+5§!."
 CZE_logistics_beyond_the_sudetes: "Логістика за межами Судетів"
 CZE_logistics_beyond_the_sudetes_desc: "Якщо ми сподіваємося вести бойові дії за межами Судетських гір, нам потрібно навчитися того, як працює логістика на великих відстанях. Це суттєво відрізняється від дій виключно в нашому рідному регіоні."
 CZE_logistics_beyond_the_sudetes_tt: "Відкриває: §Y«Покращені склади припасів»§!\n§YРота забезпечення§!: Використання припасів: §G-10%§!"
 CZE_expand_the_river_monitor_fleet: "Розширити флот річкових моніторів"
 CZE_expand_the_river_monitor_fleet_desc: "Наш флот річкових моніторів є одним із найбільших у Європі і допомагає нашій армії захищати внутрішні території. Його розширення значно підвищить їхню здатність виконувати це завдання."
 CZE_the_tvp_project: "Проєкт TVP"
 CZE_the_tvp_project_desc: "Наша армія запропонувала програму Танка загального призначення (TVP) для розробки вітчизняного проєкту танка. Деякі з наших виробників, які мають значний досвід у виробництві танків, виявили інтерес до нашого проєкту."
 CZE_expand_the_land_department_of_vtu: "Розширити сухопутний відділ VTÚ"
 CZE_expand_the_land_department_of_vtu_desc: "Розширивши сухопутний відділ Військово-технічного інституту (VTÚ), вони отримають додаткове обладнання та випробувальні полігони для посилення своїх досліджень задля нашого майбутнього оснащення."
 CZE_department_two_expansion: "Другий департамент"
 CZE_department_two_expansion_desc: "Наше розвідувальне крило, 2-й департамент, потребує більше ресурсів, щоб краще захистити нас від ворожих шпигунів. Це також може призвести до розширення окремих крил у межах відомства."
 CZE_military_intelligence: "Крило військової розвідки"
 CZE_military_intelligence_desc: "Військова розвідка є одним із найважливіших аспектів розвідувального відомства. Виділення більшої кількості ресурсів на цю сферу принесе значні переваги."
 CZE_air_intelligence: "Крило повітряної розвідки"
 CZE_air_intelligence_desc: "Знання кількості літаків у ворожих ВПС є критичним компонентом для перемоги в повітряній війні. Точна інформація про повітряні сили противника є ключовою при зіткненні з ними в регіоні."
 CZE_within_the_eagles_nest: "У «Орлиному гнізді»"
 CZE_within_the_eagles_nest_desc: "Наявність армії інформаторів і диверсантів прямо біля нашого порогу була б величезною перевагою для наших військових. За підтримки 2-го департаменту наші шпигунські мережі в цих місцях можуть стати надзвичайно розгалуженими."
 CZE_restart_naval_gun_production: "Відновити виробництво корабельних гармат"
 CZE_restart_naval_gun_production_desc: "Заводи «Шкода» колись були найбільшим розробником та виробником корабельних гармат в Австро-Угорській імперії. Відновлення виробництва створить можливості для відродження вітчизняного суднобудування."
 CZE_restart_naval_gun_production_tt: "Військово-морський фокус §YПріоритет «Шкоди»§! стає §YАктивним§!"
 CZE_reform_the_naval_detachment: "Реформувати військово-морський загін"
 CZE_reform_the_naval_detachment_desc: "Військово-морський загін нещодавно був розформований, оскільки вважалося більш доцільним інтегрувати його в армію. Проте через останні події його відновлення стало необхідністю."
 CZE_build_2_dockyards_when_we_have_coast_tt: "Миттєво побудує §G2§! §Yвійськові верфі§! у випадковому прибережному §Yрегіоні§!, коли він буде під контролем."
 CZE_skoda_naval_yards: "Військові верфі «Шкоди»"
 CZE_skoda_naval_yards_desc: "Тепер, коли ми знову маємо доступ до моря, ми можемо відновити стару військово-морську промисловість Австро-Угорської імперії, використовуючи існуючий досвід, який досі є в межах наших кордонів. Запуск вітчизняних верфей має стати нашим головним пріоритетом."
 CZE_build_3_dockyards_when_we_have_coast_tt: "Миттєво побудує §G3§! §Yвійськові верфі§! у випадковому прибережному §Yрегіоні§!, коли він буде під контролем."
 CZE_legacy_of_the_kriegsmarine: "Спадщина Кріґсмаріне"
 CZE_legacy_of_the_kriegsmarine_desc: "Допомагаючи будувати великі лінкори не так давно, ми досі маємо всі можливості для цього. Це спадщина тих самих заводів, які допомагали розбудовувати австро-угорський Кріґсмаріне."
 CZE_build_off_old_ganz_danubius_designs: "Спиратися на старі проєкти «Ганц-Данубіус»"
 CZE_build_off_old_ganz_danubius_designs_desc: "Відродження проєктів компанії «Ганц-Данубіус» може виявитися корисним для будівництва нових кораблів класу крейсер. Люди, обізнані з цими проєктами, досі живуть у межах наших кордонів."
 CZE_modernize_trieste_designs: "Модернізувати проєкти «Трієсте»"
 CZE_modernize_trieste_designs_desc: "Використовуючи старі проєкти менших лінкорів австро-угорського флоту, ми краще зрозуміємо, як будувати кораблі цього класу."
 CZE_leverage_gunboat_experience: "Використати досвід створення канонерських човнів"
 CZE_leverage_gunboat_experience_desc: "Наш досвід проєктування канонерських човнів можна використати для створення есмінців. Наша поточна база знань допоможе прискорити процес проєктування."
 CZE_revive_kraljevica_designs: "Відродити проєкти «Кральєвиці»"
 CZE_revive_kraljevica_designs_desc: "Використовуючи наші знання про канонерські човни та вивчаючи старі проєкти верфі в Кральєвиці, ми можемо відродити цей клас есмінців для нашої держави."
 CZE_wolfs_of_bohemia: "Вовки Богемії"
 CZE_wolfs_of_bohemia_desc: "Зважаючи на досвід роботи з підводними човнами, який досі зберігся в межах наших кордонів, створити власні «вовчі зграї» буде не так вже й важко."
 CZE_raider_lineage: "Родовід рейдерів"
 CZE_raider_lineage_desc: "Ми маємо традиції рейдерства від колишніх офіцерів, які служили в австро-угорському флоті. Ми повинні скористатися цим досвідом."
 CZE_a_modern_navy: "Сучасний флот"
 CZE_a_modern_navy_desc: "Тепер, коли ми досягли успіхів у наших військово-морських технологіях, ми нарешті можемо сказати, що маємо сучасний і боєздатний флот."
 CZE_build_1_dockyards_when_we_have_coast_tt: "Миттєво побудує §G1§! §Yвійськову верф§! у випадковому прибережному §Yрегіоні§!, коли він буде під контролем."
 CZE_naval_aviation: "Морська авіація"
 CZE_naval_aviation_desc: "Авіаносці та їхні літаки здаються майбутнім морської війни. Нам потрібно інвестувати час у ці нові напрями морського бою."
 CZE_across_the_atlantic: "Крізь Атлантику"
 CZE_across_the_atlantic_desc: "Щоб бути ефективним, флот має діяти за океаном. Ми повинні зробити наш флот здатним переміщатися на великі відстані."
 CZE_joint_equipment_designs: "Спільні проєкти оснащення"
 CZE_joint_equipment_designs_desc: "І [ROOT.GetNameDef], і [GER.GetNameDef] знаходяться в авангарді танко- та авіабудування, кожна зі своїми особливостями. Ми маємо прагнути ділитися інформацією, щоб і надалі зосереджуватись на тому, що в нас виходить найкраще."
 CZE_negotiate_sphere_of_influence: "Домовитися про сферу впливу"
 CZE_negotiate_sphere_of_influence_desc: "Беззаперечно, військові ресурси, які має [ROOT.GetNameDef], становлять велику цінність для [GER.GetAdjective]ого альянсу. Цілком справедливо, що натомість ми вимагаємо деяких територіальних здобутків."
 CZE_set_up_polish_puppet_state: "Створити Південну [POL.GetAdjective]у маріонеткову державу"
 CZE_set_up_polish_puppet_state_desc: "Оскільки [GER.GetNameDef] зацікавлена у створенні маріонеткової держави в Польщі, очевидно, що нам варто розглянути таку саму можливість."
 CZE_usurp_the_mantle: "Узурпувати титул"
 CZE_usurp_the_mantle_desc: "Маючи королівство, що простягається від Балтійського до Адріатичного моря і панує над землями історичної регіональної потуги — Австрії, тепер ми можемо проголосити себе законним наступником Священної Римської імперії."
 CZE_austro_hungary_puppets: "Кожен §Yсуб'єкт§!, який підпадає під вимоги фокусу"
 CZE_decrease_autonomy_tier: "Кожен суб'єкт рівня §Y$autonomy_dominion$§! або §Y$autonomy_puppet$§! втратить один рівень автономії."

 ## Exile Focus
 CZE_prepare_for_exile: "Підготовка до вигнання"
 CZE_prepare_for_exile_desc: "Держава має таємно сприяти зусиллям наших політичних лідерів втекти за кордон і створити уряд у вигнанні."
 CZE_joins_government_in_exile_tt: "Приєднується до §YУряду у вигнанні§!"
 CZE_infiltrate_collaborationist_organizations: "Проникнення до колаборантів"
 CZE_administrative_chaos_tt: "Ефект §Yдля Райхскомісаріату§!, коли фокус §Y$CZE_enter_exile$§! буде виконано:"
 CZE_infiltrate_collaborationist_organizations_desc: "Призначення ([ROOT.GetAdjective]их) осіб, лояльних до уряду у вигнанні, на керівництво колабораціоністськими організаціями може здатися дивним, але це ідеальний спосіб підірвати їхню діяльність і бути в курсі подій."
 CZE_enter_exile: "Піти у вигнання"
 CZE_enter_exile_desc: "З потенційними союзниками, які нарешті борються з [GER.GetAdjective]им алігатором, наш уряд може підготуватися та боротися за повернення нашого суверенітету."
 CZE_refused_exile: "Відмовлено в наданні притулку [ROOT.GetName]"
 CZE_contact_the_czech_and_slovak_legion: "Зв'язатися з Чеським і Словацьким легіоном"
 CZE_contact_the_czech_and_slovak_legion_desc: "Хоробрі [ROOT.GetAdjective]і громадяни втекли в [POL.GetNameDef] і [FRA.GetNameDef], щоб продовжити боротьбу за вільну державу ([CZE.GetName]). Ми повинні зв'язатися з цими силами і координувати їхні дії."
 CZE_skoda_priority_shortcut_finder: "Пріоритет «Шкоди»"
 CZE_skoda_priority_shortcut_finder_desc: "Це поточний пріоритет «Шкоди»"

