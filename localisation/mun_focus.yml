 CZE_demand_regime_change_tt: "$CZE_decision_unlock$§Y«Вимагати зміни режиму в країні»§!"
 CZE_propose_unification_tt: "$CZE_decision_unlock$§Y«Запросити країну до Чехословацького союзу»§!"
