###Germany ###
 GER_integrate_czech_manufacturers: "Інтегрувати чеських виробників"
 GER_integrate_czech_manufacturers_desc: "Промисловість, розташована в Богемії, є золотою жилою виробничого досвіду та промислових ресурсів для нашої економіки. Додаткова промислова потужність, яку додадуть богемські виробники, стане величезним стимулом для нашої військової промисловості. Цілком логічно інтегрувати їх у наші виробничі лінії."
 GER_integrate_czech_manufacturers_no_aat_tt: "§GДоступно§! як §Yконструкторські бюро§!:\n§Y$CZE_skoda_works_german_organization$§!, §Y$CZE_bohmische_mahrische_maschinenfabrik_ag_german_organization$§!, §Y$CZE_zlin_aircraft_organization$§! та §Y$CZE_ceska_zbrojovka_uhersky_brod_organization$§!"
 CZE_unlocks_sokolov_raid_pfot_tt: "Відкриває: §Y«Рейд десантників»§! на §YФалкнов§!"
