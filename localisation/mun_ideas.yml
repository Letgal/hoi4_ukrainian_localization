 ## Dynamic Modifiers National Spritits
 CZE_ceskoslovenska_armada_dynamic_modifier: "Československá Armáda"
 CZE_ceskoslovenska_armada_dynamic_modifier_desc: "Армія постала з попелу австро-угорських чеських підрозділів та ветеранів Чехословацького легіону. Спадщина обох досі впливає на управління армією."
 CZE_ceskoslovenske_letectvo_dynamic_modifier: "Československé Letectvo"
 CZE_ceskoslovenske_letectvo_dynamic_modifier_desc: "Літаки не завжди можуть бути готові, але наші пілоти готові завжди. З огляду на можливі повітряні загрози з усіх боків, ми повинні зробити повітря нашим морем. Кожен пілот має битися за трьох."
 CZE_a_divided_nation_dynamic_modifier: "Розділена нація"
 CZE_a_divided_nation_dynamic_modifier_desc: "[CZE.GetAdjective] держава залишалася єдиною в Центральній Європі плюралістичною країною, яка захищала всіх у межах своїх кордонів. Однак Велика депресія змінила це. Економічні труднощі викликали обурення урядом з боку різних рухів усередині країни. Ці образи тепер глибоко розділяють націю."
 CZE_skoda_works_dynamic_modifier: "Заводи «Шкода»"
 CZE_skoda_works_dynamic_modifier_desc: "Компанія «Шкода» охоплює виробництво, будівництво та інвестиції в усіх секторах нашої важкої промисловості. Її вплив не знає меж у межах наших кордонів."
 CZE_ceskoslovenske_alecne_lodstvo_dynamic_modifier: "Československé válečné loďstvo"

 ## Dynamic State Modifiers
 CZE_sudetenland_german_state_modifier: "Судетський сепаратизм"
 CZE_sudetenland_german_state_modifier_desc: "Нещодавні економічні труднощі вдарили по промисловості в Судетській області. Через це люди, які проживають у регіоні, звинувачують у своїх нещастях уряд країни [ROOT.GetName]."
