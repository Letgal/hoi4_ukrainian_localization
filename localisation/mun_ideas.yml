 ## National Spirits
 CZE_taticek_of_czechoslovakia: "Татічек Масарик"
 CZE_taticek_of_czechoslovakia_desc: "Томаш Масарик, якого часто називають «Татічек Масарик», що означає «татусь» або «батько» (нації), був опорою чехословацької нації з моменту її заснування. Коли здавалося, що коаліції створити неможливо, а політичні безвиході надто великі, щоб їх подолати, Масарик раз за разом здійснював політичні дива, допомагаючи зміцнювати та розвивати Чехословаччину. Навіть на пенсії його думки та пропозиції політичному керівництву сприймаються скоріше як накази, ніж поради."
 CZE_industrialists_veto: "Вето промисловців"
 CZE_industrialists_veto_desc: "Промисловці мають значний вплив на політику країни, оскільки вони стоять на чолі багатьох найбільших конгломератів країни [CZE.GetNameDef]. Їхні інтереси не можна ігнорувати в питаннях економічної політики, а економічна мобілізація є одним із заходів, яким вони б найзапекліше опиралися."
 CZE_agrarian_politics_1: "Аграрна політика"
 CZE_agrarian_politics_1_desc: "Незважаючи на промисловий характер нашої країни, фермери та сільські селяни мають значний політичний вплив у багатьох політичних партіях. Їхні настрої часто впливають на рішення щодо економічної політики і є постійною політичною перешкодою для подальшого промислового прогресу."
 CZE_directorate_of_fortification_works_no_gd_idea: "Управління фортифікаційних робіт"
 CZE_directorate_of_fortification_works_no_gd_idea_desc: "$CZE_directorate_of_fortification_works_no_gd_idea$, краще відоме як ROP, є керівним органом, що відповідає за нагляд за фортифікаційними зусиллями в країні."
 CZE_czech_corporatism: "Чеський корпоратизм"
 CZE_broken_shield: "Розбитий щит"
 CZE_redirected_fortification_council_funds: "Перенаправлені кошти Фортифікаційної ради"
 CZE_army_readiness_1: "Непідготовлена армія"
 CZE_army_readiness_1_desc: "Готовність армії — це не лише люди та техніка на полі бою. Впевненість у своїй підготовці та підтримка політичних і промислових лідерів країни мають велике значення перед лицем загроз. Мати засоби для боротьби — це одне, а здатність робити це ефективно — зовсім інше."
 CZE_army_readiness_3: "Підготовлена армія"
 CZE_army_readiness_3_desc: "Готовність армії — це не лише люди та техніка на полі бою. Впевненість у своїй підготовці та підтримка політичних і промислових лідерів країни мають велике значення перед лицем загроз. Мати засоби для боротьби — це одне, а здатність робити це ефективно — зовсім інше."
 CZE_ready_for_anything_idea: "Готові до всього"
 CZE_sudeten_german_quandary: "Судетська дилема"
 CZE_sudeten_german_quandary_desc: "Хоча більшість людей, які проживають у Судетській області, просто хочуть більшої автономії за чинного уряду, багато судетських політичних партій та їхні прихильники можуть швидко стати п'ятою колоною, якщо німецька держава спробує анексувати будь-яку частину регіону."
 CZE_sudeten_german_quandary_modifier_tt: "§YПасивний ефект§!:\nЯкщо §Y[AUS.GetFlag][AUS.GetNonIdeologyName]§!, §Y[GER.GetFlag][GER.GetNonIdeologyName]§!, або будь-яка інша [BAY.GetFlag]§Yнімецька держава§!, яка межує з нами, виправдовує або отримує §Rмету війни§! проти нас, поки ми контролюємо §Y[69.GetName]§!, §Y[972.GetName]§! або §Y[74.GetName]§!:\n - (§YУсі контрольовані регіони Судетської області§!):\n    Додає §Y$CZE_sudetenland_paramilitaries_modifier$§!, що дає:\n        $MODIFIER_LOCAL_INTEL_TO_ENEMIES$: §R+10%§!\n        $MODIFIERS_ARMY_CORE_DEFENCE_FACTOR$: §R-10.0%§!\n        $modifier_state_repair_speed_bunker_factor$: §R-10.00%§!\n\n - Цей §Yефект§! може спрацювати лише один раз"
 CZE_sudeten_challenge: "Судетський виклик"
 CZE_sudeten_challenge_desc: "Нещодавня активність судетських воєнізованих формувань у Судетській області змусила багатьох у міжнародній спільноті повірити, що нинішні агресивні дії проти нас виправдані! Знадобиться час, щоб переконати світ у зворотному."
 CZE_sudeten_facde: "Судетський фасад"
 CZE_sudeten_facde_desc: "Оскільки ми не підтримали місцеві воєнізовані формування, наші виправдання дій проти [CZE.GetAdjective] держави тепер розглядаються в усьому світі як фасад."
