 CZE_czech_state_modifier: "Нестача кваліфікованих чеських робітників"
 CZE_czech_state_modifier_desc: "Швидкий економічний розвиток 20-го століття став випробуванням для переважно аграрного чеського населення. Заповнити робочі місця кваліфікованими чеськими працівниками важко. Необхідно докласти зусиль, щоб допомогти підготувати молодих громадян Чехії до мінливих потреб сучасної економіки."
