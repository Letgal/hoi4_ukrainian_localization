 AST_communism_support_text: "[?party_popularity_100@communism|Y]% Communist Support"
 AST_union_control_1_cat: "Union Control"
 AST_union_control_1_cat_desc: "Our union members have begun mobilizing support among the general populace across Australia. We can infiltrate the legislature in each individual state, building support for a Communist-led government from within. This will cost a significant amount of political power and threaten to destabilize the nation. \n\nThe New Guard Veterans are watching our movements closely, and should the government fail to act in time, or if the nation becomes too unstable, this conflict could tear the nation apart entirely.\n\nCommunism Support: [?party_popularity_100@communism|Y]§Y%§!\n\n§RA Civil War will break out if stability drops below 40%, or if the Veterans Revolt times out.§!"
 AST_veterans_revolt_stability_tt: "Stability is above §Y40%§! (dropping below will cause a civil war!)"
 AST_union_control_1_cat_name: "Select where to rile up unions in your support"
 AST_union_control_1_map_area_name: "States which can still be influenced"
 AST_nationalizing_cat: "Nationalization"
 AST_union_control_2_cat: "Union Control"
 AST_union_control_2_cat_desc: "The workers of [ROOT.GetNonIdeologyName] did not overthrow their oppressors only to watch the imperial powers continue to hold our comrades overseas in chains. The spread of communism beyond our borders is not merely an ideological goal, it is a strategic necessity. We must fan the flames of revolution across the oceans, giving hope and resources to those who would cast off the yoke of imperialism, until the old order has no footing left to stand on."
 AST_union_control_2_foreign_cat: "Suppress Communism"
 AST_union_control_tt: "Unions must establish themselves in states across Australia, however, the New Guard Veterans are working to thwart the spread of Communism."
 AST_seize_local_leadership_in_state_major: "Seize Local Leadership in [FROM.GetName]"
 AST_seize_local_leadership_in_state_mid: "Seize Local Leadership in [FROM.GetName]"
 AST_seize_local_leadership_in_state_low: "Seize Local Leadership in [FROM.GetName]"
 AST_seize_local_leadership_in_queensland: "Seize Local Leadership in Queensland"
 AST_union_strike: "Organize a Strike"
 AST_union_strike_desc: "Our workers are walked out from their places of work, demanding better conditions and rights. This is sure to put pressure on the government to instate new reforms."
 AST_veterans_revolt: "The Veterans Revolt"
 AST_veterans_revolt_desc: "The army has a lot of anti-communist members, many who were previously parts of fascist-groups. They have a disdain for communism, and would sooner take up arms than see it rise to power.\nIf we take too long in bringing about our revolution, or should we let stability fall too low, they'll take matters into their own hands to prevent it from happening."
 AST_organize_in_nation: "Infiltrate Trade Unions in §Y[FROM.GetName]§!"
 AST_organize_in_nation_desc: "The labour movement knows no borders. By channelling resources into our comrades' networks, we can embed communist organisers within the trade unions of [FROM.GetName], building grassroots support for the revolution from within the working class."
 AST_civil_war_in_nation: "Instigate Revolution in §Y[FROM.GetName]§!"
 AST_civil_war_in_nation_desc: "The seeds we have sown are ready to bear fruit. Communist support in [FROM.GetName] has grown to the point where open revolution is within reach. With funding, agitators, and a carefully timed push, we can turn popular discontent into an armed uprising, bringing [FROM.GetName] one step closer to the worker's state it deserves."
 AST_take_it_to_foreign_streets: "Organize International Workers Solidarity March"
 AST_take_it_to_foreign_streets_desc: "Workers have no borders. We will launch a coordinated international campaign, sending Australian communist organisers into the streets of every nation where our influence has already taken hold, reinvigorating local movements and keeping the flame of revolution burning."
 AST_take_it_to_foreign_streets_tt: "Extends the duration of Foreign Communist Influence by 60 days in all currently infiltrated nations."
 AST_raj_locked_tt: "The Raj cannot be targeted until New Zealand, Malaya, Burma, the Philippines, and Indonesia have all fallen to communist rule."
 AST_supply_arms_to_nation: "Supply arms to §Y[FROM.GetName]§!"
 AST_supply_arms_to_nation_desc: "We will supply weapons to our comrades"
 AST_strikes_tt: "You will only be able to complete §Y$AST_workers_educational_association$§!, §Y$AST_off_leash$§!, §Y$AST_a_national_housing_commission$§!, §Y$AST_guaranteed_employment$§!, and §Y$AST_equal_pay$§! while a strike is ongoing."
