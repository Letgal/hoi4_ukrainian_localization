 INS_soetardjo_petition: "Soetardjo Petition Pending Approval"
 INS_soetardjo_petition_desc: "The round table conference Soetardjo called for has been held, concluding that [INS.GetNameDef] must meet a series of economic requirements to ensure self-sufficiency. We must demonstrate clear progress towards these goals, or else [HOL.GetNameDef] will eventually overrule the decision in order to maintain the status quo. "
 INS_soetardjo_petition_refresh_tt: "Reactivates Mission: §YSoetardjo Petition Pending Approval§! with a duration of §Y120 days§!."
 INS_soetardjo_pending: "Volksraad Debating Soetardjo's Petition for Autonomy"
 INS_soetardjo_pending_desc: "Soetardjo is a Volksraad member who is known for leading the peaceful nationalist movement. He is currently organizing a petition requesting that [INS.GetNameDef] be given more autonomy, and for a round table conference to be organized between Dutch and Indonesian representatives, in order to discuss the desire of Indonesians to become autonomous as part of a Dutch commonwealth. This petition is currently being debated within the Volksraad. Once these debates conclude, we must decide how to respond, as the petition's consequences are of great significance."

