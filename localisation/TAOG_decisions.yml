 SIA_poster_center_days_remaining_text: "Залишилося §Y[?SIA_propaganda_center_days_remaining_flag:days_left|Y0]§! днів"
 SIA_poster_right_days_remaining_text: "Залишилося §Y[?SIA_propaganda_right_days_remaining_flag:days_left|Y0]§! днів"
 SIA_propaganda_campaign_cooldown_tt: "Ця кампанія знову буде доступна через §Y[?constant:propaganda.SIA.default_propaganda_campaign_cooldown] днів§! після її завершення. Вартість буде помножена на §R[?constant:propaganda.SIA.propaganda_empty_slot_index]§!."
 SIA_public_credit_repayment: "Погашення державного кредиту"
 SIA_public_credit_repayment_tt: "Ми погасимо весь наш борг за державним кредитом одразу, знявши всі борги ціною великого тимчасового штрафу на §YСпоживчі товари§!."
 idea_SIA_deficit_spending: "Дефіцитне фінансування"
 idea_SIA_deficit_spending_desc: "Уряд витрачає більше, ніж дозволяють його можливості, спрямовуючи позичені кошти на програму прискореного будівництва. Промислові здобутки реальні, але за рахунками доведеться платити."
 SIA_print_additional_money: "Надрукувати додаткові гроші"
 SIA_print_additional_money_tt: "Ми надрукуємо ще більше грошей для Японії."
 SIA_appeal_to_industrialists: "Звернення до промисловців"
 SIA_implement_industrialists_reforms_countdown: "Впровадження реформ промисловців"
 SIA_implement_industrialists_reforms_countdown_trigger: "Побудувати §Y2 цивільні фабрики§! (Крім фабрик, отриманих від фокусів та торгівлі)"
 SIA_appeal_to_industrialists_tt: "Ми заручимося підтримкою промисловців.\n\nВони допоможуть нам у громадянській війні, надавши додаткове обладнання. Однак вони очікуватимуть, що ми розширимо нашу промислову базу, побудувавши §Y2§! додаткові §YЦивільні фабрики§! до тих, які ми матимемо наприкінці громадянської війни, протягом §Y720 днів§! після здобуття влади (Крім фабрик, отриманих від фокусів або торгівлі). \n\nНевиконання цього призведе до падіння §YСтабільності§! та §YПідтримки війни§!\n\nНа початку громадянської війни ми отримаємо: "


 SIA_seek_support_from_constitutional_monarchists: "Шукати підтримки конституційних монархістів"
 SIA_implement_constitutionalist_reforms_countdown: "Впровадження конституційних реформ"
 SIA_seek_support_from_constitutional_monarchists_tt: "Ми заручимося підтримкою конституційних монархістів.\n\nВони допоможуть нам у громадянській війні, створивши додаткові дивізії. Однак вони очікуватимуть, що ми залишимося конституційною монархією, виконавши фокус §Y$SIA_a_constitutional_monarchy$§! протягом §Y720 днів§! після здобуття влади.\n\nНевиконання цього призведе до падіння §YСтабільності§! та §YПідтримки війни§!"

 SIA_appeal_to_rural_people: "Звернення до селянства"
 SIA_appeal_to_rural_people_tt: "Ми заручимося підтримкою селянства.\n\nВони допоможуть нам у громадянській війні, надавши ополчення. Однак вони очікуватимуть від нас вигідної сільськогосподарської політики взамін, шляхом виконання фокусу §Y$SIA_mechanization_of_agriculture$§! або §Y$SIA_reduction_of_agricultural_yield_taxes$§! протягом §Y720 днів§! після здобуття влади.\n\nНевиконання цього призведе до падіння §YСтабільності§! та §YПідтримки війни§!\n\nНа початку громадянської війни ми отримаємо: "
 SIA_implement_rural_reforms_countdown: "Впровадження сільських реформ"

 SIA_implement_absolutist_reforms_countdown: "Впровадження абсолютистських реформ"
 SIA_seek_support_from_absolutists_monarchists: "Шукати підтримки абсолютистських монархістів"
 SIA_seek_support_from_absolutists_monarchists_tt: "Ми заручимося підтримкою абсолютистських монархістів.\n\nВони допоможуть нам у громадянській війні, створивши додаткові дивізії. Однак вони очікуватимуть, що ми повернемося до абсолютної монархії, виконавши фокус §Y$SIA_an_absolute_monarchy$§! протягом §Y720 днів§! після здобуття влади.\n\nНевиконання цього призведе до падіння §YСтабільності§! та §YПідтримки війни§!"

 SIA_appeal_to_navy_clique: "Звернення до військово-морської кліки"
 SIA_appeal_to_navy_clique_countdown: "Впровадження військово-морських реформ"
 SIA_appeal_to_navy_clique_tt: "Ми заручимося підтримкою військово-морської кліки.\n\nВони допоможуть нам у громадянській війні, надавши весь свій флот та дивізію морської піхоти. Однак вони очікуватимуть від нас вигідної військово-морської політики шляхом виконання фокусу §Y$SIA_thonburi_class_coastal_defense_ship$§! протягом §Y720 днів§! після здобуття влади.\n\nНевиконання цього призведе до падіння §YСтабільності§! та §YПідтримки війни§!\n\nНа початку громадянської війни ми отримаємо:\n§YВесь наш флот§!\nДивізію морської піхоти §YКоролівського корпусу морської піхоти Таїланду§!\nТехнологію §YМорська піхота§!"

 SIA_appeal_for_support_cat: "Звернення по підтримку"
 SIA_appeal_for_support_cat_desc: "Жоден політичний рух не досягає успіху самотужки. Монархісти, конституціоналісти, солдати та цивільні — кожен має вплив на частину країни. Їхню підтримку необхідно ретельно культивувати, якщо ми хочемо мати сили діяти, коли настане слушний момент."
 SIA_demand_independence: "Вимагати незалежності для §Y[FROM.GetName]§! від §Y[FROM.OVERLORD.GetNameDef]§!"
 SIA_demand_independence_VIN: "Вимагати звільнення §Y[VIN.GetName]§!"
 SIA_demand_independence_VIN_tt: "Ми вимагатимемо, щоб контролери [VIN.GetName] звільнили їх"
 SIA_demand_independence_LAO: "Вимагати звільнення §Y[LAO.GetName]§!"
 SIA_demand_independence_LAO_tt: "Ми вимагатимемо, щоб контролери [LAO.GetName] звільнили їх"
 SIA_demand_independence_CAM: "Вимагати звільнення §Y[CAM.GetName]§!"
 SIA_demand_independence_CAM_tt: "Ми вимагатимемо, щоб контролери [CAM.GetName] звільнили їх"
 SIA_invite_to_adc: "Запросити §Y[FROM.GetName]§! до нашої фракції"

 SIA_asian_democratic_compact_cat: "Азійський демократичний договір"
 SIA_asian_democratic_compact_cat_desc: "Народи Азії мають право на самоврядування. Як прапороносець азійського самовизначення, ми можемо тиснути на колоніальні держави, щоб вони звільнили нації, які утримують."

 SIA_khana_ratsadon_cat: "Хана Ратсадон"
 SIA_khana_ratsadon_cat_desc: "Хана Ратсадон, Народна партія, що поклала край абсолютній монархії, не є монолітом. Її військове та цивільне крила мають власне бачення розвитку країни, і напруга між ними проходить червоною ниткою через кожне рішення. Тримайте обидві фракції задоволеними, або ризикуєте тим, що коаліція розірве себе на частини."

 SIA_army_navy_reform_cat: "Армія і Флот"
 SIA_army_navy_reform_cat_desc: "Армія і флот змагаються за один і той самий обмежений пул ресурсів. Перерозподіл коштів між двома гілками — це постійне балансування, де кожен перерозподіл має наслідки для боєготовності іншої."
 SIA_divert_army_funds_to_navy_toggle: "[SIA_GetDivertingArmyFundsToNavyTitle]"
 SIA_divert_army_funds_to_navy_toggle_tt: "[SIA_GetDivertingArmyFundsToNavyTT]"
 SIA_divert_army_funds_to_navy_toggle_do: "Спрямувати кошти армії на флот"
 SIA_divert_army_funds_to_navy_toggle_do_tt: "Ми перенаправимо частину армійських коштів на флот, щоб прискорити його розвиток."
 SIA_divert_army_funds_to_navy_toggle_undo: "Припинити спрямовувати кошти армії на флот"
 SIA_divert_army_funds_to_navy_toggle_undo_tt: "Ми більше не будемо перенаправляти частину армійських коштів на флот."

 SIA_standing_our_ground_mission: "Стійкість до кінця"
 SIA_standing_our_ground_mission_tt: "Ми повинні боротися за нашу свободу."

 SIA_sway_generals_to_seri_thai: "Схилити генералів на бік Сері Тай"
 SIA_sway_generals_to_seri_thai_tt: "Більше представників генерального штабу приєднаються до нашого повстання."

 SIA_khana_ratsadon_dummy_military: "Ризик військового перевороту"
 SIA_khana_ratsadon_dummy_military_tt: "Військові влаштують переворот, якщо ми занадто їх роздратуємо. Щоб уникнути громадянської війни, ми не повинні утримувати §Y$idea_SIA_military_rebellious$§! занадто довго."
 SIA_khana_ratsadon_dummy_military_desc: "Військові — потужна кліка партії Хана Ратсадон. Вони не схвалять політику, яка, на їхню думку, суперечить їхнім інтересам, але схвалять те, що розглядають як підтримку мілітаризації країни."
 SIA_khana_ratsadon_military_coup_mission: "Військові планують скинути уряд!"
 SIA_khana_ratsadon_military_coup_mission_desc: "Військові вбачають у політиці нинішнього уряду загрозу своїм інтересам. Вони активно планують усунути уряд, якщо їхнє становище не покращиться."

 SIA_khana_ratsadon_dummy_civilian: "Ризик перевороту цивільного крила"
 SIA_khana_ratsadon_dummy_civilian_tt: "Цивільне крило влаштує переворот, якщо ми занадто їх роздратуємо. Щоб уникнути громадянської війни, ми не повинні утримувати §Y$idea_SIA_civilian_rebellious$§! занадто довго."
 SIA_khana_ratsadon_dummy_civilian_desc: "Цивільне крило — потужна кліка партії Хана Ратсадон. Вони не схвалять політику, яка, на їхню думку, суперечить їхнім інтересам, але схвалять те, що розглядають як підтримку демократії та цивільного населення."
 SIA_khana_ratsadon_civilian_coup_mission: "Цивільне крило планує скинути уряд!"
 SIA_khana_ratsadon_civilian_coup_mission_desc: "Цивільне крило вбачає у політиці нинішнього уряду загрозу своїм інтересам. Вони активно планують усунути уряд, якщо їхнє становище не покращиться."

