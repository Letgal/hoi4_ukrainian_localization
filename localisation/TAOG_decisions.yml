 AST_war_angst_cat: "War Angst"
 AST_deteriorating_prime_minister_nerves_mission: "Deteriorating Prime Minister Nerves"
 AST_deteriorating_prime_minister_nerves_desc: "[AST.GetLeader] is straining under the pressure of the inevitable war. If relief cannot be found soon, his nerves may not hold."

 AST_australian_demands_cat: "Australian Demands"
 AST_aid_australian_military_construction: "Aid Australian Military Construction"
 AST_aid_australian_military_construction_desc: "Britain is not ready for war. By aiding Australia with military construction, we may ease their impatience."
 AST_japanese_war_mission: "Japanese War"
 AST_japanese_war_mission_desc: "Australia do not want to face its overwhelming enemy alone — [JAP.GetNameDef]. They are pressing us to take the first step and settle the looming conflict at the earliest convenience."

