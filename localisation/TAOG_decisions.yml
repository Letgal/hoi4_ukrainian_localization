 SIA_new_territories_administration_cat: "Управління новими територіями"
 SIA_new_territories_administration_cat_desc: "Завоювання — це лише початок. Здобутими територіями необхідно керувати, розвивати їх та захищати, якщо вони мають стати невід'ємною частиною нації, а не тягарем, що провокує на відвоювання."
 SIA_finish_the_triangular_defense_network: "Завершення трикутної оборонної мережі"
 SIA_finish_the_triangular_defense_network_desc: "Після завершення двох фортець на Півночі та Півдні ми можемо об'єднати їх з Бангкоком, щоб створити трикутну оборонну мережу. Якщо впаде одна, інші все одно залишатимуться в робочому стані."
 has_built_fortress_saigon: "Побудовано фортецю Сайгон"
