 SIA_war_fervor_cat: "Воєнний запал"
 SIA_war_fervor_cat_desc: "Апетит народу до конфлікту потрібно ретельно контролювати. Якщо його не стримувати, воєнний запал обернеться всередину — уряд, який розпалює бойовий дух, не спрямовуючи його, ризикує стати його наступною мішенню."
 SIA_war_fervor_coup_dummy: "Воєнний запал закипає"
 SIA_war_fervor_coup_dummy_desc: "Якщо апетит народу до війни закипить і не знайде виходу, він неминуче буде спрямований на нас."
 SIA_urge_restraint: "Закликати до стриманості"
 SIA_war_fervor_coup: "Неминучий переворот"
 SIA_modify_cultural_mandates: "Модифікує $idea_SIA_thai_cultural_mandates$ на:"

 SIA_mandate_1: "Перший мандат"
 SIA_mandate_1_desc: "Країна, народ і національність мають називатися тайськими"
 SIA_mandate_1_tt: "§Y[THIS.GetName]§! буде відома як §Y$SIA_thailand$§!"
 SIA_mandate_2: "Другий мандат"
 SIA_mandate_2_desc: "Тайський народ не повинен займатися жодною справою, не враховуючи вигоду та безпеку нації\n\nТайський народ ніколи не повинен розкривати іноземцям нічого, що може зашкодити нації. Такі дії є зрадою нації\n\nТайський народ не повинен діяти як агент або речник іноземців, не враховуючи інтереси тайської нації, і не повинен висловлювати думку або ставати на бік іноземців у міжнародних суперечках. Такі дії є зрадою нації.\n\nТайський народ не повинен таємно купувати землю від імені іноземців у спосіб, що ставить під загрозу націю. Ці дії є зрадою нації.\n\n Коли людина зрадила націю, обов'язок тайського народу — активно і швидко покласти цьому край."
 SIA_mandate_3: "Третій мандат"
 SIA_mandate_3_desc: "Припинити називати тайців невідповідно до назви національності або за вподобаннями групи.\n\nВикористовувати назву 'тайці' для позначення всього тайського народу без його поділу."
 SIA_mandate_4: "Четвертий мандат"
 SIA_mandate_4_desc: "Побачивши підняття або спуск державного прапора згідно з урядовим звичаєм, почувши звук сигнального горна чи свистка, або коли подається сигнал до підняття чи спуску прапора, слід вшанувати прапор згідно з правилами або звичаєм.\n\nКоли звучить державний гімн, незалежно від того, чи він виконується в офіційних цілях, чи як частина будь-якої церемонії, учасники або присутні повинні вшанувати гімн згідно з правилами або звичаєм.\n\nПомітивши будь-яку особу, яка не виявляє належної поваги, слід зробити їй зауваження, щоб вона зрозуміла важливість вшанування державного прапора, державного гімну та королівського гімну."

 SIA_mandate_5: "П'ятий мандат"
 SIA_mandate_5_desc: "Тайський народ повинен намагатися споживати лише їжу, виготовлену з тайських продуктів.\n\nТайський народ повинен намагатися носити лише одяг, виготовлений з тайських продуктів.\n\nТайський народ повинен підтримувати сільськогосподарські, комерційні, промислові та інші професійні зусилля своїх співвітчизників.\n\nТайський народ повинен використовувати та підтримувати будь-які комунальні підприємства, створені урядом або тайським народом.\n\nТайці, які займаються сільським господарством, комерцією, промисловістю чи іншою професією, що підтримується цим мандатом, повинні намагатися підтримувати стандарти, покращувати якість і вести свій бізнес чесно."
 SIA_mandate_6: "Шостий мандат"
 SIA_mandate_6_desc: "Музика до державного гімну має бути написана Пхра Чендуріянгом і зберігатися в Департаменті образотворчих мистецтв\n\nТекст державного гімну має бути тим, який подала армія"

 SIA_mandate_7: "Сьомий мандат"
 SIA_mandate_7_desc: "Кожна тайська людина повинна допомагати будувати націю. Кожна працездатна людина повинна мати стабільну роботу. Будь-яка людина без професії є некорисною для нації і не заслуговує на повагу з боку тайського народу."
 SIA_mandate_8: "Восьмий мандат"
 SIA_mandate_8_desc: "Щодо королівського гімну, ми скоротимо текст королівського гімну і замінимо слово Сіам на слово Тай"

 SIA_mandate_9: "Дев'ятий мандат"
 SIA_mandate_9_desc: "Тайський народ повинен звеличувати, шанувати та поважати тайську мову, і повинен вважати за честь розмовляти нею.\n\nТайський народ повинен вважати обов'язком хорошого громадянина вивчати державну мову, і повинен щонайменше вміти читати й писати; тайці також повинні вважати своїм важливим обов'язком допомагати та підтримувати громадян, які не розмовляють тайською або не вміють читати тайською, у її вивченні.\n\nТайський народ не повинен розглядати місце народження, проживання або регіональний акцент як ознаку поділу. Кожен повинен визнавати істиною, що всі, хто народився тайцями, мають ту саму тайську кров і розмовляють тією ж тайською мовою. Місце народження чи акцент не мають значення.\n\nТайський народ повинен вважати своїм обов'язком поводитися так, як належить хорошим тайським громадянам, а також заохочувати й наставляти тих, хто ще не знає і не розуміє своїх обов'язків щодо того, якими є обов'язки хорошого громадянина тайської нації."
 SIA_mandate_10: "Десятий мандат"
 SIA_mandate_10_desc: "Тайці не повинні з'являтися на публічних зібраннях, у громадських місцях або в межах міста без належного одягу. До неналежного одягу належить носіння лише спідньої білизни, відсутність сорочки або носіння тканини, обгорнутої навколо тіла.\n\nНалежний одяг для тайців складається з: Уніформи, якщо це дозволяє посада та нагода; Ввічливого одягу міжнародного стилю; Ввічливого традиційного одягу."
 SIA_mandate_11: "Одинадцятий мандат"
 SIA_mandate_11_desc: "Тайський народ повинен ділити свій час на три частини. Одна для роботи, одна для особистих справ, і одна для відпочинку та сну. Це має бути впорядковано і відбуватися за графіком, поки не стане звичкою.\n\nТайський народ повинен виконувати свої звичайні особисті справи таким чином: Їсти у визначений час, не більше чотирьох разів на день; Спати приблизно 6-8 годин.\n\nТайський народ повинен сумлінно виконувати свої робочі обов'язки без розчарувань або ухиляння. Південний відпочинок та обідня перерва не повинні тривати довше однієї години. Наприкінці робочого дня слід займатися спортом щонайменше одну годину або іншими видами діяльності, такими як садівництво, догляд за домашніми тваринами або посадка дерев. Потім, прийнявши душ, повечеряти.\n\nТайський народ повинен використовувати свій вільний час увечері для завершення необхідної роботи, спілкування з родиною та друзями, пошуку знань шляхом прослуховування радіоновин або читання, або інших розваг чи мистецтва, наскільки дозволяють можливості"

 SIA_mandate_12: "Дванадцятий мандат"
 SIA_mandate_12_desc: "У громадських місцях або на дорогах люди повинні допомагати і захищати дітей, людей похилого віку або осіб з інвалідністю.\n\nКожен, хто дотримується пункту 1, вважається культурною людиною, яка заслуговує на повагу тайського народу."
 SIA_movie_theater_cat: "$SIA_sala_chaloem_thai_movie_theater$"
 SIA_movie_theater_cat_desc: "Срібний екран є одним із найпотужніших інструментів сучасної держави. За допомогою ретельно підібраних фільмів та пропагандистських кампаній уряд може формувати громадську думку, розпалювати патріотизм і заглушати голоси незгодних."
 SIA_celebrating_the_constitution: "Святкування Конституції"
 SIA_the_revolution_of_24th_june: "Революція 24 червня"
 SIA_suppressing_the_rebellion_of_1933: "Придушення повстання 1933 року"
 SIA_the_king_of_krung_thon: "Король Крунг Тхона"
 SIA_blood_of_suphan: "Кров Супхана"
 SIA_thai_soldiers_blood: "Кров тайських солдатів"
 SIA_undauntedly_love_nation: "Безстрашна любов до нації"

 #LIMITED WAR
 SIA_limited_war_cat: "Обмежена війна"
 SIA_limited_war_cat_desc: "Ми не можемо сподіватися перемогти великі держави регіону у відкритій війні — поки що. Висуваючи наші претензії крок за кроком, за допомогою ретельно спланованих кампаній, ми підточуємо їхні позиції, тоді як наша власна сила продовжує зростати."
 SIA_start_limited_war_indochina: "Почати обмежену війну в Індокитаї проти [FROM.GetName]"
 SIA_start_limited_war_indochina_tt_main: "Починає §YОбмежену війну§! проти §Y[FROM.GetName]§!.\nКонтролюючи всі виділені регіони, що належать §Y[FROM.GetName]§!, ми зможемо забрати ці регіони без ескалації до повномасштабної війни.\n§RВтрата понад [?var:global.limited_war_surrender_threshold|%.0] прогресу капітуляції призведе до нашої поразки в обмеженій війні§!\n\n§RПоразка в обмеженій війні може змусити нас повернути раніше завойовані території§!"
 SIA_start_limited_war_rejoin_faction: "Ми тимчасово покинемо нашу нинішню фракцію і повернемося до неї після закінчення §YОбмеженої війни§!."
 SIA_start_limited_war_can_join_faction: "Ми знову зможемо приєднуватися до фракцій після закінчення §YОбмеженої війни§!"
 is_not_engaged_in_a_limited_war: "Не бере участі в §YОбмеженій війні§!"
 SIA_limited_war_indochina: "[SIA_GetLimitedWarTarget]"
 SIA_limited_war_indochina_desc: "Візьміть під контроль усі виділені регіони, щоб виграти §YОбмежену війну§! і заявити на них права без ескалації до повномасштабної війни.\n§RВтрата понад [?var:global.limited_war_surrender_threshold|%.0] прогресу капітуляції призведе до нашої поразки в обмеженій війні§!"
