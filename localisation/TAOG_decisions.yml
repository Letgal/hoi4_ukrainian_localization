 SIA_use_abandoned_french_tools: "Використання покинутих французьких інструментів"
 SIA_use_abandoned_french_tools_desc: "Французи залишили частину своїх важких інструментів на наших окупованих територіях. Ми можемо використовувати їх для себе."
 SIA_fortress_saigon: "Фортеця Сайгон"
 SIA_fortress_saigon_desc: "Північ нашої нової Імперії захищатиме Ханой. З горами на півночі та річкою Хонгха спереду він ідеально розташований для стримування будь-яких загарбників."
 SIA_fortress_hanoi: "Фортеця Ханой"
 SIA_fortress_hanoi_desc: "Південь Імперії захищатиме Сайгон. Це місто-фортеця стане вартовим Бангкока, захищаючи Сіамську затоку [ROOT.GetName] від загарбників."
 SIA_propaganda_poster_slot_available_tt: "Має вільний слот для постера до фільму."
