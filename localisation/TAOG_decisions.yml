 AST_election_approaching_cat: "Наближення виборів"
 AST_election_approaching_cat_desc: "Щойно один уряд облаштувався, як наближаються наступні вибори. Демократичні партії хапаються за все, що може підвищити їхню підтримку, сподіваючись, що цього буде достатньо для перемоги, коли відкриються виборчі дільниці, а урни наповняться бюлетенями."
 AST_final_reforms_mission: "Останні реформи"
 AST_final_reforms_mission_desc: "Завдяки стабільному керівництву, консервативним поглядам та лояльності до Британії, Об'єднана партія Австралії (UAP) зміцнила свою підтримку та зробила ще один термін дедалі більш імовірним. Щоб зберегти підтримку громадськості, її лідери повинні прискорити реформи.\n\n§YЕфекти, поки активно:§!\n§W(§YДемократичні§! фокуси):\n§Y7§! днів зменшення часу виконання§!"
 AST_final_reforms_effect_tt: "\nЕфекти, поки місія §Y$AST_final_reforms_mission$§! активна (§Y180§! днів):"
 AST_labor_campaign_tour_mission: "Передвиборчий тур лейбористів"
 AST_labor_campaign_tour_mission_desc: "У своїй місії представляти кожного громадянина Австралійська лейбористська партія (ALP) прийняла інший погляд на імперіалізм та лояльність Австралії до Імперії. Внутрішні потреби повинні бути на першому місці, а іноземні інтереси більше не повинні бути пріоритетом.\n\nЩоб донести це повідомлення як до нинішньої правлячої партії, так і до виборців, ALP вирушить у загальнонаціональний передвиборчий тур.\n\n§YЕфекти, поки активно:§!\n§WЩоденне зростання голосів за §YА.Л.П (A.L.P)§!: §G+0.05§!§!"
 AST_labor_campaign_tour_effect_tt: "\nЕфекти, поки місія §Y$AST_labor_campaign_tour_mission$§! активна (§Y180§! днів):\nЩоденне зростання голосів за §YА.Л.П (A.L.P)§!: §G+0.05§!\n\nЕфекти через §Y180§! днів:"

 AST_election_season_cat: "Сезон виборів"
 AST_election_season_cat_desc: "Щойно один уряд облаштувався, як наступний готується зайняти його місце. На даному етапі мало що можна зробити, щоб вплинути на громадську підтримку, хоча це не зупинить партії від спроб. Нічого не закінчено, поки не закінчено, і цей день настане на виборчих дільницях."
 AST_election_countdown: "Відлік до виборів"
 AST_election_countdown_desc: "До відкриття виборчих дільниць залишилися лічені дні.\n\n§W$AST_expected_election_winner_tt$§!"
 AST_government_formation_period: "Період формування уряду"
 AST_government_formation_period_desc: "Кожна партія хоче мати владу для визначення власної політики, але якщо певні обставини цього вимагають, уряд національної єдності може бути найрозумнішим варіантом.\n\n§W§YЕфекти, поки активно:§!\n£GFX_trigger_yes $AST_election_recently_concluded$\n\nПартія $AST_ruling_party$ може сформувати §YУряд національної єдності§!.\n\nСформуйте §YУряд національної єдності§! у вікні демократичних виборів, розташованому в дереві фокусів Австралії.§!"
 AST_war_is_coming_cat: "Наближається війна"
 AST_war_is_coming_cat_desc: "Напруженість зростає, і як австралійські чиновники, так і громадяни починають усвідомлювати, що війна може бути неминучою, незалежно від того, наскільки їхня політика чи інтереси бажають іншого.\n\nМи повинні скликати засідання Кабінету міністрів, щоб визначити процедури на випадок вторгнення. Проте, перш ніж це зробити, можливо, варто вжити дій, з якими повний склад Кабінету може не погодитися."
 AST_seize_civilian_industry: "Конфіскувати цивільну промисловість"
 AST_seize_civilian_industry_desc: "Хоча споживчі товари є необхідністю як для наших громадян, так і для економіки, немає жодного способу обійти той факт, що воєнний час диктує ще більшу необхідність. Наближається війна; ми повинні бути готові до неї."
 AST_scorch_the_north: "Спалити Північ"
 AST_scorch_the_north_desc: "Якщо ми підозрюємо вторгнення з півночі, існують способи зірвати такі просування, хоча вони мають свою ціну. Попри те, що розвиток наших північних штатів буде відкинутий назад політикою випаленої землі, це може бути саме тим, що необхідно для стримування агресорів."
 AST_scorch_the_north_tt: "§YЕфекти, коли на Північний штат здійснюється морське вторгнення:§!"
 AST_the_brisbane_line: "Лінія Брісбена"
 AST_the_brisbane_line_desc: "Оборонні можливості Австралії можуть бути недостатньо сильними, щоб повністю стримати іноземну агресію. Прийнявши політику, яка надає пріоритет міцній обороні життєво важливих територій, а не слабкій обороні всіх, ми можемо гарантувати, що найбільш розвинені та населені частини [AST.GetName] залишаться під нашим контролем.\n\nХоча така політика безсумнівно зустріне опір тих, хто відкидає будь-яку можливість здачі, уряд несе відповідальність за те, щоб спрямувати [AST.GetName] в розумному напрямку."
 AST_summon_the_cabinet_mission: "Скликати Кабінет міністрів"
 AST_summon_the_cabinet_mission_desc: "Скликати дипломатів, чиновників і теоретиків до Канберри; перспектива вторгнення повинна бути обговорена."
 AST_summon_the_cabinet_tt1: "\nЦя подія порушить роботу діючого уряду, потенційно призвівши до його §Yкраху§!."
 AST_australian_accusations_modifier: "Австралійські звинувачення"

 AST_cabinet_trust_cat: "Довіра до Кабінету"
 AST_cabinet_trust_increase_tt: "\n§GЗбільшити§! §YДовіру до Кабінету§!\n"
 AST_cabinet_trust_decrease_tt: "\n§RЗменшити§! §YДовіру до Кабінету§!\n"
 AST_cabinet_trust_remove_tt: "§GВидалити§! духів §YДовіри до Кабінету§!"
 AST_australian_comforts_fund: "£BoP_right_texticon Австралійський фонд комфорту"
 AST_australian_comforts_fund_desc: "Уряд має вшанувати пам'ять однієї з жертв авіакатастрофи в Канберрі, інвестувавши в Австралійський фонд комфорту, в якому дружина загиблого є активною працівницею.\n\nФонд має на меті полегшити час, який австралійські солдати проводять у полі, надсилаючи їм речі, що доповнюють їхні армійські пайки та особисті комплекти, тому військові зусилля також виграють від цієї інвестиції."
 AST_eminent_successors: "£BoP_right_texticon Видатні наступники"
 AST_eminent_successors_desc: "Деякі з жертв авіакатастрофи в Канберрі були дуже поважними урядовцями. Хоча немає жодного способу компенсувати їхню жахливу долю, можливо, призначення кількох видатних наступників стабілізувало б уряд і відновило довіру як громадськості, так і міністрів."
 AST_critics_to_shame: "£BoP_right_texticon Присоромити критиків"
 AST_critics_to_shame_desc: "Авіакатастрофа в Канберрі вплинула на всю націю, не залишивши жодного австралійця осторонь скорботи. У такі часи завжди знайдуться ті, хто прагне цим скористатися. Ми маємо викрити найгучніших критиків, показавши, чим насправді є їхня критика; спробою порушити порядок."
 AST_approach_the_independents: "£BoP_left_texticon Звернутися до незалежних"
 AST_approach_the_independents_desc: "Уряд нестабільний, оскільки віра в його здатність провести Австралію через недавні потрясіння згасає з кожним днем. Звернувшись до незалежних політиків, можна переконати їх, що зміна уряду була б найкращим виходом."
 AST_a_sound_voice: "£BoP_left_texticon Здоровий голос"
 AST_a_sound_voice_desc: "У цей період політичних потрясінь один впевнений голос, здається, вселяє довіру серед австралійського народу. Можливо, це голос наступного лідера [AST.GetName]?"
 AST_challenge_government_narrative: "£BoP_left_texticon Кинути виклик наративу уряду"
 AST_challenge_government_narrative_desc: "Деталі, якими поділився уряд щодо авіакатастрофи в Канберрі, здаються незвичними, неминуче викликаючи припущення, що деяка інформація може приховуватися. Як міг досвідчений офіцер Королівських ВПС Австралії (RAAF) розбити свій літак в ідеальних умовах для польоту? Необхідно вимагати від уряду відповідей."
 AST_make_a_common_enemy: "Створити спільного ворога"
 AST_make_a_common_enemy_desc: "Голоси недовіри помножилися після втрати урядовців, які загинули в авіакатастрофі в Канберрі. Незвичні обставини катастрофи — не єдиний фактор, що спонукає підозрювати іноземне втручання; зрештою, ніщо не об'єднує більше, ніж спільний ворог."
 AST_make_a_common_enemy_tt: "§RМожливі наслідки події:§!"
 AST_ensure_cabinet_loyalty: "Забезпечити лояльність Кабінету"
 AST_ensure_cabinet_loyalty_desc: "Загроза вотуму недовіри не становить небезпеки, поки більшість кабінету голосує за діючий уряд. Ми маємо забезпечити лояльність Кабінету."
 AST_castle_crumbling_mission: "Замок руйнується"
 AST_castle_crumbling_mission_desc: "Австралія дивиться на своїх лідерів після трагічної авіакатастрофи в Канберрі. Чи залишиться діючий уряд вартим довіри громадськості навіть після втрати членів кабінету, чи зміна керівництва просто була б на краще?"
 AST_castle_crumbling_mission_event_tt: "§YЕфекти події:§!"
 AST_castle_crumbling_mission_complete_tt: "Завершити місію §YЗамок руйнується§!"
 AST_cabinet_trust_complete_1_flag: "Прийнято рішення: §YСтворити спільного ворога§!"
 AST_cabinet_trust_complete_2_flag: "Прийнято рішення: §YЗабезпечити лояльність Кабінету§!"
 AST_cabinet_trust_complete_not_tt: "Не взято фокус §YПередусім Австралія§!"
 AST_canberra_air_disaster_flag: "$AST_canberra_air_disaster_events.1.t$"

 AST_war_angst_cat: "Страх війни"
 AST_deteriorating_prime_minister_nerves_mission: "Погіршення нервів Прем'єр-міністра"
 AST_deteriorating_prime_minister_nerves_desc: "[AST.GetLeader] напружується під тиском неминучої війни. Якщо полегшення не знайдеться найближчим часом, його нерви можуть не витримати."
 AST_australian_demands_cat: "Австралійські вимоги"
 AST_aid_australian_military_construction: "Допомогти австралійському військовому будівництву"
 AST_aid_australian_military_construction_desc: "Британія не готова до війни. Допомагаючи Австралії з військовим будівництвом, ми можемо пом'якшити їхнє нетерпіння."
 AST_japanese_war_mission: "Японська війна"
 AST_japanese_war_mission_desc: "Австралія не хоче стикатися зі своїм переважним ворогом наодинці — [JAP.GetNameDef]. Вони тиснуть на нас, щоб ми зробили перший крок і врегулювали назріваючий конфлікт за першої ж нагоди."
 AST_resource_acquisition_cat: "Придбання ресурсів"
 AST_request_resource_rights_in_indonesia: "Запросити права на ресурси у [INS.GetNameDef]"
 AST_request_resource_rights_in_malaya: "Запросити права на ресурси у [MAL.GetNameDef]"
 AST_request_resource_rights_in_burma: "Запросити права на ресурси у [BRM.GetNameDef]"
 AST_request_resource_rights_in_indochina: "Запросити права на ресурси у Французькому Індокитаї"
 AST_resource_request_ongoing_flag: "Запит на ресурси §YТриває§!"
 AST_australia_first_movement_cat: "Рух «Передусім Австралія»"
 AST_summons_to_australian_hall: "Виклик до Австралійського залу"
 AST_summons_to_australian_hall_desc: "У нашому прагненні розширити [AST.GetFascistParty], ми повинні об'єднати та мобілізувати наших прихильників. Австралійський зал чекає."
 AST_summons_to_australian_hall_upgrade: "$AST_summons_to_australian_hall$"
 AST_summons_to_australian_hall_upgrade_desc: "$AST_summons_to_australian_hall_desc$"
 AST_print_the_publicist: "Друк видання «The Publicist»"
 AST_print_the_publicist_desc: "«The Publicist», інформаційний бюлетень руху «Передусім Австралія», відіграє важливу роль в охопленні потенційних прихильників. Випустивши ще один номер, ми можемо поширити наше повідомлення."
 AST_print_the_publicist_upgrade: "$AST_print_the_publicist$"
 AST_print_the_publicist_upgrade_desc: "$AST_print_the_publicist_desc$"
 AST_call_on_fascists: "[GET_AST_CALL_ON_FASCISTS]"
 AST_call_on_fascists_desc: "Як невеликий рух із нечисленними прихильниками, «Передусім Австралія» не завжди зводить кінці з кінцями. Однак, іноземна група зі схожими ідеями виявила готовність фінансувати наші амбіції, пропонуючи рішення для забезпечення нашого подальшого просування."
 AST_call_on_japanese_fascists: "Заклик до японських фашистів"
 AST_call_on_foreign_fascists: "Заклик до іноземних фашистів"
 AST_a_convenient_disaster: "Зручна катастрофа"
 AST_a_convenient_disaster_desc: "Наскільки б популярним не став рух «Передусім Австралія», консерватори завжди чинитимуть опір ідеології групи. Щоб «Передусім Австралія» успішно здобула владу, може знадобитися щось більш драматичне, ніж звичайні вибори; щось, що вкине уряд у хаос.\n\nНаш рух не має можливості спровокувати таку подію самостійно, але наш іноземний фашистський прихильник має. Допомогши нашому приходу до влади, іноземні фашисти знайдуть друга в особі [AST.GetName]."
 AST_a_convenient_disaster_tt: "\nЦя подія порушить роботу діючого уряду, що в кінцевому підсумку дозволить §Y[AST.GetFascistParty]§! стати правлячою партією."
 AST_a_convenient_disaster_flag: "§YАвіакатастрофа в Канберрі§! була спровокована через рішення §YЗручна катастрофа§!."
 AST_insufficient_funds_mission: "$AST_insufficient_funds$"
 AST_sufficient_funds_tt: "Достатньо коштів (Буде досягнуто через §Y[?AST_insufficient_funds:days_left]§! днів)"
 AST_sufficient_funds_tt_2: "§GОтримати§! Достатньо коштів"
 AST_lose_sufficient_funds_tt_100: "§RВтратити§! Достатньо коштів (На §Y100§! днів)\n"
 AST_lose_sufficient_funds_tt_50: "§RВтратити§! Достатньо коштів (На §Y50§! днів)\n"
 AST_insufficient_funds: "Недостатньо коштів"
 AST_afm_decisions_fascism_upgrade_tt: "\nПокращити щоденний приріст підтримки фашизму від рішень §YРуху «Передусім Австралія»§!.\n\n"
 AST_afm_decisions_autonomy_upgrade_tt: "\nПокращити приріст автономії від рішень §YРуху «Передусім Австралія»§!.\n\n"

 AST_vichy_out_of_africa_cat: "Віші, геть з Африки!"
 AST_demand_madagascar: "Вимагати Мадагаскар"
 AST_demand_central_africa: "Вимагати Центральну Африку"
 AST_demand_southwestern_territories: "Вимагати Південно-Західні території"
 AST_vichy_req_ongoing_flag: "Запит на території §YТриває§!"
 AST_remove_vichy_out_of_africa_decisions: "\nВидалити рішення §YВіші геть з Африки§!.\n"

 AST_big_business_pact_cat: "Пакт з великим бізнесом"
 AST_big_business_request_ongoing_flag: "Запит великого бізнесу §YТриває§!"
 AST_naval_expansion: "$NOR_alt_dem_naval_expansion$"
 AST_naval_expansion_desc: "В обмін на те, що [ROOT.GetFascistParty] проводитиме вигідну для них політику, провідні діячі бізнесу погодилися інвестувати в галузеві реформи, які узгоджуються з цілями партії.\n\nФлот має бути розширений, якщо [AST.GetName] хоче мати шанс проти ворогів із вищою військово-морською потужністю. Протягом обмеженого часу всі сили будуть кинуті на верфі, забезпечуючи збільшення виробництва кораблів."
 AST_factory_conversions: "Конверсія фабрик"
 AST_factory_conversions_desc: "В обмін на те, що [ROOT.GetFascistParty] проводитиме вигідну для них політику, провідні діячі бізнесу погодилися інвестувати в галузеві реформи, які узгоджуються з цілями партії.\n\nОборонна промисловість має бути пріоритетною, і тому австралійські фабрики мають бути переобладнані для її підтримки."
 AST_land_development: "Освоєння земель"
 AST_land_development_desc: "В обмін на те, що [ROOT.GetFascistParty] проводитиме вигідну для них політику, провідні діячі бізнесу погодилися інвестувати в галузеві реформи, які узгоджуються з цілями партії.\n\nЗанадто багато територій [ROOT.GetName] залишаються неіндустріалізованими та нерозвиненими. Розвиваючи ці регіони, ми зробимо їх придатними для будівництва."
 AST_electrical_grid_expansions: "Розширення електромереж"
 AST_electrical_grid_expansions_desc: "В обмін на те, що [ROOT.GetFascistParty] проводитиме вигідну для них політику, провідні діячі бізнесу погодилися інвестувати в галузеві реформи, які узгоджуються з цілями партії.\n\nРозширюючи нашу електромережу, ми можемо сприяти внутрішньому виробництву енергії, яке не залежить від імпорту."
 AST_factory_investments: "Інвестиції у фабрики"
 AST_factory_investments_desc: "В обмін на те, що [ROOT.GetFascistParty] проводитиме вигідну для них політику, провідні діячі бізнесу погодилися інвестувати в галузеві реформи, які узгоджуються з цілями партії.\n\nЯкщо ми хочемо гарантувати, що як військові, так і цивільні запаси залишатимуться достатніми в часи конфлікту, нам потрібно розширити наші промислові потужності."
 AST_develop_port_kemla_steel_medium_decision: "Побудувати другу доменну піч у Порт-Кембла"
 AST_develop_port_kemla_steel_medium_decision_desc: "Порт-Кембла добре функціонував лише з однією доменною піччю, але попит зріс настільки, що ми, можливо, захочемо побудувати другу. Це приблизно вдвічі збільшить виробництво сталі в регіоні."
 AST_prospect_pilbara_iron_decision: "Відкрити регіон Пілбара для видобутку"
 AST_prospect_pilbara_iron_decision_desc: "Регіон Пілбара має величезні запаси залізної руди, одні з найбільших у світі. Однак у цій надзвичайно віддаленій частині країни інвестиції, необхідні для освоєння цього ресурсу, були б величезними... але, з іншого боку, такими ж були б і прибутки."
 AST_scale_up_pilbara_mines_steel_decision: "Масштабувати шахти Пілбари"
 AST_scale_up_pilbara_mines_steel_decision_desc: "Тепер, коли регіон Пілбара відкрито для великомасштабного видобутку, настав час дозволити інвестиціям текти рікою!"
 AST_pilbara_mining_tt: "Відкриття §Y$STATE_870$§! для подальшої розвідки розблокує повторюване рішення для збільшення виробництва сталі без обмежень."
 AST_scale_up_middleback_mines_steel_decision_1: "Розширити шахту Айрон-Ноб"
 AST_scale_up_middleback_mines_steel_decision_1_desc: "Хоча шахта Айрон-Ноб вже деякий час працює, зі зростанням попиту на залізну руду, настав час розширити наші зусилля тут."
 AST_scale_up_middleback_mines_steel_decision_2: "Відкрити шахту Айрон-Монарх"
 AST_scale_up_middleback_mines_steel_decision_2_desc: "Шахти Айрон-Ноб недостатньо для наших потреб, на щастя, гори Міддлбек багаті на залізо. Настав час заснувати нашу найбільшу шахту!"
 AST_scale_up_middleback_mines_steel_decision_3: "Відкрити шахту Айрон-Прінс"
 AST_scale_up_middleback_mines_steel_decision_3_desc: "Вимоги воєнного часу до металів високі як ніколи, але гори Міддлбек продовжують забезпечувати нас."
 AST_expand_iron_mining_tt: "Наявність обох фокусів §Y$AST_exports_for_economic_recovery$§! та §Y$AST_within_reach$§! дозволить експлуатувати регіон Пілбара у штаті §Y$STATE_870$§!, відкриваючи майже невичерпне джерело §YСталі§!. Ми можемо використовувати це для підживлення нашої економіки."
 AST_develop_port_kemla_steel_tt: "Це дозволить нам прийняти рішення §YПобудувати другу доменну піч у Порт-Кембла§!, що значно підвищить наше виробництво §YСталі§!."
 AST_develop_middleback_tt: "Це розблокує три рішення для розвитку нашого виробництва §YСталі§! у штаті §Y$STATE_519$§!"
 AST_expand_planned_extraction_pilbara_tt: "Фокус §Y$AST_planned_extraction$§! дозволить експлуатувати регіон Пілбара у штаті §Y$STATE_870$§!, відкриваючи майже невичерпне джерело §YСталі§!. Ми можемо використовувати це для підживлення нашої економіки."
