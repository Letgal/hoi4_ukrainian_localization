 AST_election_approaching_cat: "Election Approaching"
 AST_election_approaching_cat_desc: "No sooner has one government settled in than the next election begins to approach. The democratic parties are scrambling for whatever might raise their support, hoping that it will be enough to secure victory once the polling stations open, and the ballot boxes fill with votes."
 AST_final_reforms_mission: "Final Reforms"
 AST_final_reforms_mission_desc: "Through stable leadership, conservative leanings, and loyalty to Britain, the UAP has strengthened its support and made another term increasingly likely. To preserve public support, its leaders must accelerate reforms.\n\n§YEffects while active:§!\n§W(§YDemocratic§! Focuses):\n§Y5§! days Completion Time decrease§!"
 AST_final_reforms_effect_tt: "\nEffects while §Y$AST_final_reforms_mission$§! is active (§Y180§! days):"
 AST_labor_campaign_tour_mission: "Labor Campaign Tour"
 AST_labor_campaign_tour_mission_desc: "In its mission to represent every citizen, the ALP has adopted a different perspective on imperialism and Australia’s loyalty to the Empire. Domestic needs shall come first, and foreign interests should no longer take priority.\n\nTo spread the message to both the current ruling party and the voters, the ALP shall set out on a nationwide campaign tour.\n\n§YEffects while active:§!\n§WDaily §YA.L.P§! Votes increase: §G+0.05§!§!"
 AST_labor_campaign_tour_effect_tt: "\nEffects while §Y$AST_labor_campaign_tour_mission$§! is active (§Y180§! days):\nDaily §YA.L.P§! Votes increase: §G+0.05§!\n\nEffects in §Y180§! days:"

 AST_election_season_cat: "Election Season"
 AST_election_season_cat_desc: "No sooner has one government settled in than the next prepares to take its place. Little can be done to sway public support at this point, though that will not stop the parties from trying. It is not over until it is over, and that day will come at the ballot box."
 AST_election_countdown: "Election Countdown"
 AST_election_countdown_desc: "Only days remain until the polling stations open.\n\n§W$AST_expected_election_winner_tt$§!"
 AST_government_formation_period: "Government Formation Period"
 AST_government_formation_period_desc: "Every party wants the power to decide its own policies, but if certain circumstances demand it, a national unity government may be the most reasonable option.\n\n§W§YEffects while active:§!\n£GFX_trigger_yes $AST_election_recently_concluded$\n\nThe $AST_ruling_party$ may form a §YNational Unity Government§!.\n\nForm a §YNational Unity Government§! in the Democratic Elections window, located in the Australian Focus Tree.§!"

 AST_war_is_coming_cat: "War Is Coming"
 AST_war_is_coming_cat_desc: "Tensions are rising, and Australian officials and citizens both are beginning to realize that war may be unavoidable, regardless of how much their policies or interests wish otherwise.\n\nWe must call a Cabinet meeting to decide on procedures in the event of an invasion. Yet before doing so, it may be worth taking actions that the full Cabinet might not agree with."
 AST_seize_civilian_industry: "Seize Civilian Industry"
 AST_seize_civilian_industry_desc: "Although consumer goods are a necessity for our citizens and the economy both, there is no way around the fact that wartime comes with greater necessities. War is coming; we shall be prepared when it does."
 AST_scorch_the_north: "Scorch the North"
 AST_scorch_the_north_desc: "If we suspect invasion from the north there are ways to thwart such advances, although they come at a price. Although the development of our northern states will be set back by a scorched-earth policy, it might be what is needed to hold off the aggressors."
 AST_the_brisbane_line: "The Brisbane Line"
 AST_the_brisbane_line_desc: "Australian defense capabilities may not be strong enough to hold off foreign aggression completely. By adopting a policy that prioritizes the strong defense of vital territories, rather than the weak defense of all, we can ensure that the most developed and inhabited parts of [AST.GetName] remain under our control.\n\nAlthough such a policy doubtlessly will be opposed by those who reject any degree of surrender, the Government has a responsibility to guide [AST.GetName] in a reasonable direction."
 AST_summon_the_cabinet_mission: "Summon the Cabinet"
 AST_summon_the_cabinet_mission_desc: "Summon diplomats, officials, and theorists to Canberra; the prospect of invasion must be discussed."
 AST_summon_the_cabinet_tt1: "\nThis event will disrupt the sitting government, potentially leading to its §Ycollapse§!."
 AST_australian_accusations_modifier: "Australian Accusations"

 AST_cabinet_trust_cat: "Cabinet Trust"
 AST_cabinet_trust_increase_tt: "\n§GIncrease§! §YCabinet Trust§!\n"
 AST_cabinet_trust_decrease_tt: "\n§RDecrease§! §YCabinet Trust§!\n"
 AST_cabinet_trust_remove_tt: "§GRemove§! §YCabinet Trust Spirits§!"
 AST_australian_comforts_fund: "£BoP_right_texticon  Australian Comforts Fund"
 AST_australian_comforts_fund_desc: "The Government shall honor one of the Canberra Air Crash victims by investing in the Australian Comforts Fund, for which the surviving wife is an enthusiastic worker.\n\nThe fund aims to ease the time Australian soldiers spend in the field by sending them items that supplement their army rations and personal kits, and thus the war effort will benefit from an investment as well."
 AST_eminent_successors: "£BoP_right_texticon  Eminent Successors"
 AST_eminent_successors_desc: "Some of the Canberra Air Disaster victims were highly respected government officials. Although there is no way to compensate for their terrible fates, perhaps the appointment of a few eminent successors would stabilize the government and restore both the public's and the ministers' trust."
 AST_critics_to_shame: "£BoP_right_texticon  Critics to Shame"
 AST_critics_to_shame_desc: "The Canberra Air Disaster has affected the entire nation, leaving no Australian untouched by mourning. In times such as these, there will always be those who seek to take advantage. We shall expose the loudest critics for what their criticism truly is; an attempt to disrupt order."
 AST_approach_the_independents: "£BoP_left_texticon  Approach the Independents"
 AST_approach_the_independents_desc: "The government is unstable, as faith in its ability to guide Australia through the recent turmoil fades by the day. By approaching the independents, they may be persuaded to realize that a change in government would be for the best."
 AST_a_sound_voice: "£BoP_left_texticon  A Sound Voice"
 AST_a_sound_voice_desc: "In this period of political turmoil, one confident voice seems to inspire trust among the Australian people. Might it be the voice of [AST.GetName]'s next leader?"
 AST_challenge_government_narrative: "£BoP_left_texticon  Challenge Government Narrative"
 AST_challenge_government_narrative_desc: "The details shared by the government concerning the Canberra Air Disaster seem unusual, inevitably leading to speculation that some information may be withheld. How could an experienced RAAF officer crash his aircraft in ideal flying conditions? Answers must be demanded from the government."
 AST_make_a_common_enemy: "Make A Common Enemy"
 AST_make_a_common_enemy_desc: "Voices of distrust have multiplied following the loss of the officials who perished in the Canberra Air Disaster. The unusual circumstances of the crash are not the only factor encouraging suspicion of foreign involvement; after all, nothing unites more than a common enemy."
 AST_make_a_common_enemy_tt: "§RPossible Effects of event:§!"
 AST_ensure_cabinet_loyalty: "Ensure Cabinet Loyalty"
 AST_ensure_cabinet_loyalty_desc: "The threat of a no-confidence motion poses no danger so long as the majority of the cabinet votes in favor of the sitting government. We shall ensure the cabinet's loyalty."
 AST_castle_crumbling_mission: "Castle Crumbling"
 AST_castle_crumbling_mission_desc: "Australia looks to its leaders in the aftermath of the tragic Canberra Air Disaster. Will the sitting government remain worthy of the public's trust even after the loss of cabinet officials, or would a change in leadership simply be for the best?"
 AST_castle_crumbling_mission_event_tt: "§YEffects of event:§!"
 AST_castle_crumbling_mission_complete_tt: "Complete §YCastle Crumbling§! mission"
