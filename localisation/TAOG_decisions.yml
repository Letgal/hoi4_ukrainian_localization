 INS_national_revolution_cat: "Indonesian National Revolution"
 INS_national_revolution_cat_desc: "After 350 years of Dutch tyranny, we have taken matters into our own hands and declared independence. The Netherlands does not recognize our authority, still continuing to govern the Indies as their colony while treating us as criminals.\n\nWe must continue to take control over more regions and important cities and topple the Dutch government from within. However, we should be careful to not be too aggressive without careful planning, as rapid escalation from us might provoke Dutch military action."
 INS_national_revolution_cat_map: "Launch Feint Uprisings"

 INS_national_revolution_dutch_cat: "Revolutionary Militias in the Indies"
 INS_national_revolution_dutch_cat_desc: "Revolutionaries in the East Indies have illegally declared independence, and have taken control over regions of the Indies with militia forces. Despite our best efforts, we have been unable to reestablish control in these regions due to the sheer number of militia forces present.\n\nWe need to stop them before they take control over more cities and destabilize the Indies administration further. While extreme, military force may be necessary if they continue to act like this."
 INS_HOL_revolution_not_going_well_tt: "§RWithout Batavia we cannot govern the Indies, and we will have no choice but to negotiate a peace agreement with the revolutionaries.§!"

 INS_gradual_escalation_republic: "Gradual Escalation"
 INS_gradual_escalation_HOL: "Gradual Escalation"
 INS_gradual_escalation_republic_desc: "Dutch reprisals have grown heavier after each of our raids, and their patrols press into districts they had abandoned months ago. Our commanders report harder fighting in places long thought settled, and our casualties mount faster than the recruiters can replace them. The conflict has spread into provinces that were quiet last year."
 INS_gradual_escalation_HOL_desc: "The reports from our residencies worsen by the week. The rebels strike in districts where they were not thought to operate, and the military command in Batavia presses for measures heavier than any tried before. In The Hague, those who once counselled patience grow fewer at every cabinet meeting."
 INS_national_revolution_republic_win_ins_tt: "[INS.GetAdjective] Republican Militias will assert §Gde-facto control§! over the region, and the conflict will end in a §GRepublican Victory§!."
 INS_national_revolution_republic_win_hol_tt: "[INS.GetAdjective] Republican Militias will assert §Rde-facto control§! over the region, and the conflict will end in a §RRepublican Victory§!."

 INS_national_revolution_dutch_cat_map: "View states occupied by militias"

 INS_take_batavia: "Seize control over Java"
 INS_take_batavia_desc: "The Dutch greed that caused them to invest almost exclusively in Java, ignoring the eastern islands has left Java as the Achilles' heel of the entire colony. This will be their downfall! We must storm our forces into Java and destroy Dutch communications and supply networks, making the Indies administration unable to operate."
 INS_hold_batavia_HOL: "Hold Java"
 INS_hold_batavia_HOL_desc: "The Republican forces have begun an operation to relocate most of their forces into Java, attempting to take control over the entire island. We must continue to resist, their operation is risky, and has given us an opportunity to topple their government if they fail."

 INS_militias_moestopo_mission: "Moestopo demands promotion for his efforts"
 INS_militias_pki_uprising_mission: "Communist Uprising Inevitable"

 INS_pacific_revolution_cat: "Pacific Revolution"
 INS_instigate_in_country: "Instigate Revolution in [FROM.GetName]"
 INS_instigate_in_country_desc: "Our revolution did not end when the last colonial soldier was driven from [ROOT.GetAdjective] soil. The workers and peasants of [FROM.GetName] suffer under the same yoke we have cast off, and they look to us now as proof that the oppressor can be beaten. We shall send our agitators among them, distribute pamphlets, fund their unions, and fan the flames of discontent until the conditions for revolution are ripe."

 INS_launch_revolution: "Call for Revolution"
 INS_launch_revolution_desc: "The conditions in [FROM.GetName] are ripe. Our agents report growing unrest in the factories and fields, and the local party cells are prepared to act. The time has come to call the workers and peasants of [FROM.GetName] to rise and seize what is rightfully theirs."

 INS_anti_colonialist_bonus: "Spread Anti-Colonialist Sentiment in [FROM.GetName]"
 INS_anti_colonialist_bonus_desc: "The people of [FROM.GetName] toil for the benefit of a foreign master, made to serve interests not their own. We shall remind them that submission is a choice, and that their masters are not as strong as they pretend to be."

 INS_revolutionary_sentiment: "Cooperate with [FROM.GetAdjective] Revolutionaries"
 INS_revolutionary_sentiment_desc: "There are those within [FROM.GetName] who have already taken up the cause on their own. They lack organization and resources, but not conviction. By coordinating with these groups we can hasten the collapse of the existing order, even if the resulting instability makes the country harder to govern in the short term."

 INS_arm_militias: "Arm Local [FROM.GetAdjective] Militias"
 INS_arm_militias_desc: "Pamphlets and speeches will carry the revolution only so far. When the moment comes, our comrades in [FROM.GetName] must be able to fight. Surplus arms and supplies are to be smuggled to sympathetic militias so that the forces of reaction will face an armed populace, not a defenceless one."
 INS_arm_militias_tt: "If a civil war starts, the Communists will start with additional divisions."

 INS_propoganda_mission: "Spread Communism through [FROM.GetName]"
 INS_propoganda_mission_desc: "Party organisers are to be dispatched throughout [FROM.GetName] to establish reading circles, recruit among the trade unions, and bring the message of revolution to the villages. The seeds we plant today will bear fruit soon enough."

 INS_abandon_mission: "Abandon the Mission"
 INS_abandon_mission_desc: "Our resources are not limitless, and the struggle in [FROM.GetNameDef] demands more than we can presently afford to give. We shall withdraw our agents and redirect our efforts where they are needed most."

