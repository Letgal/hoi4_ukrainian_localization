 AST_special_forces_cat: "Special Forces Training"
 AST_you_can_switch_sf: "You will be able to switch between specializations."
 AST_training_camps_specialization: "Our training camps stand ready to offer specialist training to our troops, making them more effective in a variety of different theatres."
