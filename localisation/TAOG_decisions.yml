 # Formables
 AST_australasia_flag: "Утворено §YАвстралазію§!"
 AST_australia_formables_category: "Австралазія"
 AST_australia_formables_category_desc: "Хоча коріння [AST.GetName] завжди прив'язуватиме нас до далекого півдня, наші руки стали довгими й далекосяжними, і зробили неможливим для інших замітати наші погляди на світові справи під килим. Ми розширилися і можемо розширюватися далі, і нова назва нашої нації зробить це зрозумілим. З кокона [AST.GetName] ми виходимо, розправляючи крила, щоб світ міг захоплюватися та визнавати, називаючи наші кольори та візерунок новою нацією на півдні — Австралазією."
