# == (*) ==
 HOL_recall_conrad_helfrich: "Recall Conrad Helfrich From the Indies"
 HOL_recall_conrad_helfrich_desc: "In these pressing times, we must prioritize the homeland above all else. Conrad Helfrich, as the Royal Dutch Navy's best Admiral, must return to the Netherlands."
 INS_is_taking_volksraad: "Is currently passing a law in the Volksraad"
 INS_volksraad_cat: "The Volksraad"
 INS_volksraad_cat_desc: "The People’s Council, known in Dutch as the Volksraad, was established in 1918 as an attempt to bring democracy to the East Indies, as part of the implementation of the so-called “Ethical Policies”. The seats are filled by both Dutch and Indonesian officials, selected through various means. While the Netherlands maintains an unconditional veto right, the Volksraad can pass motions and bills to the government."
 INS_volksraad_allow_language_in_schools: "Allow the Indonesian Language in Schools"
 INS_volksraad_allow_language_in_schools_desc: "Access to higher education in the indies is largely limited to the Dutch and wealthy classes of Indonesians who speak Dutch, as it is the only language higher education is taught in. An ongoing motion in the Volksraad to open Indonesian-language schools is awaiting a vote from the Governor General."
 INS_volksraad_allow_language_in_government: "Allow the Indonesian Language in Government"
 INS_volksraad_allow_language_in_government_desc: "Governmental roles in the Indies, including the Volksraad all require fluency in the Dutch language, which has led to many members of the Volksraad, especially representatives of native communities, to question the validity of its democracy. They have put together a motion which insists that government positions should be able to be filled by Indonesian speakers when possible."
 INS_volksraad_remove_education_quotas: "Abolish the Education-Quota System"
 INS_volksraad_remove_education_quotas_desc: "The education system in the East Indies currently operates using education quotas, where a certain number of Indonesian students must be accepted, and a certain number of Dutch students must be accepted. This has been controversial in the Volksraad due to the common belief that it is skewed unfairly toward the Dutch favor. While we could let the Volksraad continue arguing for years over how to reform the system, it may be worth abolishing the quota system all-together."
 INS_volksraad_reduce_rubber_export_tax: "Reduce the Private Rubber-Export Tax"
 INS_volksraad_reduce_rubber_export_tax_desc: "There is currently an extremely high tax on private companies exporting rubber, allowing us to maintain a monopoly over the market. However, this has resulted in economic stagnation in some regions due to private plantations being unable to operate. This was deemed worthwhile at the time of implementation, but international protectionism from the Great Depression has left our rubber export economy far less lucrative. It may be worth reducing the tax in order to stimulate the economy."
 INS_volksraad_knil_rank_limit: "Pass Anti-Discrimination Laws for Military Ranks"
 INS_volksraad_knil_rank_limit_desc: "While there is no formal rule stopping Indonesian natives from rising the ranks of the KNIL, there is an unwritten rule forbidding this, limiting even the most well-performing of military personnel unable to progress beyond Colonel status. Several parties in the Volksraad have been pressuring the government to recognize the efforts of high performing Indonesian officers."
 INS_volksraad_legalize_displaying_flag: "Legalize the Display of the Red/White Flag"
 INS_volksraad_legalize_displaying_flag_desc: "The red and white flag of “Indonesia” is currently illegal to display in public due to its connections to nationalist, anti-colonial organizations. Legalizing its display would likely be a demonstration of our willingness to cooperate, and stop the ongoing radicalization of nationalists across the archipelago."
 INS_volksraad_education_subsidies_for_indonesians: "Open Education Subsidies for Non-Dutch Residents"
 INS_volksraad_education_subsidies_for_indonesians_desc: "There has been an ongoing debate within the Volksraad regarding the subsidies and scholarships given to Dutch students in the East Indies. Several representatives of native communities in the Volksraad have argued that this system should be expanded to any student, regardless of background. This would buy us a lot of good-will with the population, though it would not be cheap."
 INS_volksraad_indonesian_national_language: "Make Indonesian an official National Language"
 INS_volksraad_indonesian_national_language_desc: "The Indonesian language has grown to become a common language in many parts of the archipelago, bridging language gaps between several cultures. With the Indonesian language now being permitted within education and government roles, many Volksraad representatives have been petitioning for its legal recognition as an official language of the colony, sharing equal status with Dutch."
 INS_volksraad_official_flag: "Officialize the Indonesian Flag"
 indonesia_volksraad_official_flag_effect_tt: "Our flag will be changed to the Red/White flag."
 INS_volksraad_official_flag_desc: "The motions in the Volksraad pushing for autonomy have ultimately succeeded, and what was called the Dutch East Indies only a few years ago is now the Dominion of Indonesia. Our flag should be adjusted to represent these changes."
 indonesia_volksraad_passed_6: "Has passed anti-discrimination laws in the military"

