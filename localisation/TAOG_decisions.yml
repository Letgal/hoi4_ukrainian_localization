 AST_big_business_pact_cat: "Big Business Pact"
 AST_big_business_request_ongoing_flag: "Big Business Request §YOngoing§!"
 AST_naval_expansion: "$NOR_alt_dem_naval_expansion$"
 AST_factory_conversions: "Factory Conversions"
 AST_factory_conversions_desc: "In exchange for the [ROOT.GetFascistParty] pursuing policies that benefit them, leading business figures have agreed to invest in industry reforms that align with the party's aims.\n\nThe defense industry must be prioritized, and Australian factories must therefore be converted to support it."
 AST_land_development: "Land Development"
 AST_land_development_desc: "In exchange for the [ROOT.GetFascistParty] pursuing policies that benefit them, leading business figures have agreed to invest in industry reforms that align with the party's aims.\n\nToo much of [ROOT.GetName]'s territory remains unindustrialized and underdeveloped. By developing these regions, we will make them suitable for construction."
 AST_electrical_grid_expansions: "Electrical Grid Expansions"
 AST_electrical_grid_expansions_desc: "In exchange for the [ROOT.GetFascistParty] pursuing policies that benefit them, leading business figures have agreed to invest in industry reforms that align with the party's aims.\n\nBy expanding our electrical grid, we can promote domestic energy production that does not rely on imports."
 AST_factory_investments: "Factory Investments"
 AST_factory_investments_desc: "In exchange for the [ROOT.GetFascistParty] pursuing policies that benefit them, leading business figures have agreed to invest in industry reforms that align with the party's aims.\n\nIf we want to ensure that both military and civilian supplies remain sufficient in times of conflict, we need to expand our industrial capacity."

 AST_develop_port_kemla_steel_medium_decision: "Build Second Port Kembla Blast Furnace"
 AST_develop_port_kemla_steel_medium_decision_desc: "Port Kembla has functioned well with only one blast furnace, but demand has grown such that we may wish to build a second. This will roughly double the steel output of the region."
 AST_prospect_pilbara_iron_decision: "Open Pilbara Region to Mining"
 AST_prospect_pilbara_iron_decision_desc: "The Pilbara region has enormous reserves of iron ore, among the largest found in the world. However, in this extremely remote part of the country, the investment required to tap into this resource would be enormous... but then again so would the profits."
 AST_scale_up_pilbara_mines_steel_decision: "Scale Up Pilbara Mines"
 AST_scale_up_pilbara_mines_steel_decision_desc: "Now that the Pilbara region has been opened to large-scale mining, it's time to let the investment flow!"
 AST_pilbara_mining_tt: "Opening §Y$STATE_870$§! to further prospecting will enable a repeatable decision to increase steel production without limits."
 AST_scale_up_middleback_mines_steel_decision_1: "Expand the Iron Knob Mine"
 AST_scale_up_middleback_mines_steel_decision_1_desc: "Although the Iron Knob Mine has been active for a while, with expanding demand for iron ore, it's time to expand our efforts here."
 AST_scale_up_middleback_mines_steel_decision_2: "Open the Iron Monarch Mine"
 AST_scale_up_middleback_mines_steel_decision_2_desc: "The Iron Knob mine is not enough for our needs, thankfully the Middleback Mountains are rich in iron. It's time to establish our largest mine yet!"
 AST_scale_up_middleback_mines_steel_decision_3: "Open the Iron Prince Mine"
 AST_scale_up_middleback_mines_steel_decision_3_desc: "Wartime demands for metals are at an all time high, but the Middleback Mountains continue to provide."
 AST_expand_iron_mining_tt: "Having both §Y$AST_exports_for_economic_recovery$§!, and §Y$AST_within_reach$§! will enable exploitation of the Pilbara region of §Y$STATE_870$§!, unleashing a near inexhaustible source of §YSteel§!. We can use this to fuel our economy."
 AST_develop_port_kemla_steel_tt: "This will allow us to take the §YBuild Second Port Kemla Blast Furnace§! decision which will significantly boost our §YSteel§! output."
 AST_develop_middleback_tt: "This will unlock three decisions to develop our §YSteel§! production in §Y$STATE_519$§!"

 AST_ireland_weapon_smuggling_cat: "Arming the Irish"
 AST_smuggle_arms_to_ireland: "Smuggle Arms to Ireland"
 AST_smuggle_arms_to_ireland_desc: "We must supply the Irish with the arms needed to fight the British."
 AST_smuggle_arms_to_ireland_ongoing_flag: "Arms Smuggling §YOngoing§!"
 AST_smuggle_arms_to_northern_ireland: "Smuggle Arms to Northern Ireland"
 AST_smuggle_arms_to_northern_ireland_desc: "If we can make Northern Ireland well-supplied enough with weapons, and well-connected enough with Ireland, then we can ensure that it can unite with Ireland before the British have the chance to intervene."
 AST_northern_ireland_rises_up: "Northern Ireland Uprising"

