 AST_australia_first_movement_cat: "Australia First Movement"
 AST_summons_to_australian_hall: "Summons to Australian Hall"
 AST_summons_to_australian_hall_desc: "In our endeavor to grow the [AST.GetFascistParty], we must unite and mobilize our supporters. The Australian Hall awaits."
 AST_summons_to_australian_hall_upgrade: "$AST_summons_to_australian_hall$"
 AST_summons_to_australian_hall_upgrade_desc: "$AST_summons_to_australian_hall_desc$"
 AST_print_the_publicist: "Print the Publicist"
 AST_print_the_publicist_desc: "The Publicist, the Australia First newsletter, plays an important role in reaching potential supporters. By publishing another issue, we can spread our message."
 AST_print_the_publicist_upgrade: "$AST_print_the_publicist$"
 AST_print_the_publicist_upgrade_desc: "$AST_print_the_publicist_desc$"
 AST_call_on_fascists: "[GET_AST_CALL_ON_FASCISTS]"
 AST_call_on_fascists_desc: "As a small movement with few supporters, Australia First does not always make ends meet. However, a foreign group of similar ideas have shown a willingness to fund our ambitions, offering a solution to ensure our continued advance."
 AST_call_on_japanese_fascists: "Call on Japanese Fascists"
 AST_call_on_foreign_fascists: "Call on Foreign Fascists"
 AST_a_convenient_disaster: "A Convenient Disaster"
 AST_a_convenient_disaster_desc: "However popular Australia First becomes, conservatives will always resist the group's ideology. For Australia First to successfully gain power, something more dramatic than regular elections may be necessary; something that throws the government into turmoil.\n\nOur movement lacks the capacity to provoke such an event itself, but our foreign fascist supporter does not. By aiding our rise to power, foreign fascists shall find a friend in [AST.GetName]."
 AST_a_convenient_disaster_tt: "\nThis event will disrupt the sitting government, ultimately allowing the §Y[AST.GetFascistParty]§! to become ruling party."
