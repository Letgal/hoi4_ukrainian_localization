 AST_communism_support_text: "[?party_popularity_100@communism|Y]% Підтримки комуністів"
 AST_union_control_1_cat: "Контроль профспілок"
 AST_union_control_1_cat_desc: "Члени наших профспілок почали мобілізувати підтримку серед широких верств населення по всій Австралії. Ми можемо проникнути в законодавчі органи кожного окремого штату, створюючи підтримку комуністичного уряду зсередини. Це коштуватиме значної політичної сили та загрожує дестабілізацією нації. \n\nВетерани Нової гвардії уважно стежать за нашими рухами, і якщо уряд не вживе заходів вчасно, або якщо нація стане занадто нестабільною, цей конфлікт може розірвати націю на частини.\n\nПідтримка комуністів: [?party_popularity_100@communism|Y]§Y%§!\n\n§RГромадянська війна вибухне, якщо стабільність впаде нижче 40%, або якщо час на Повстання ветеранів вичерпається.§!"
 AST_union_control_1_cat_name: "Виберіть, де підбурювати профспілки на вашу підтримку"
 AST_union_control_1_map_area_name: "Штати, на які ще можна вплинути"
 AST_nationalizing_cat: "Націоналізація"
 AST_union_control_2_cat: "Контроль профспілок"
 AST_union_control_2_cat_desc: "Робітники [ROOT.GetNonIdeologyName] скинули своїх гнобителів не для того, щоб дивитися, як імперіалістичні держави продовжують тримати наших товаришів за океаном у кайданах. Поширення комунізму за наші кордони — це не просто ідеологічна мета, це стратегічна необхідність. Ми повинні роздмухати полум'я революції за океанами, даючи надію та ресурси тим, хто хоче скинути ярмо імперіалізму, поки старий порядок повністю не втратить підґрунтя."
 AST_union_control_2_foreign_cat: "Придушення комунізму"
 AST_union_control_tt: "Профспілки повинні закріпитися в штатах по всій Австралії, однак ветерани Нової гвардії працюють над тим, щоб перешкодити поширенню комунізму."
 AST_seize_local_leadership_in_state_major: "Захопити місцеве керівництво у штаті [FROM.GetName]"
 AST_seize_local_leadership_in_state_mid: "Захопити місцеве керівництво у штаті [FROM.GetName]"
 AST_seize_local_leadership_in_state_low: "Захопити місцеве керівництво у штаті [FROM.GetName]"
 AST_seize_local_leadership_in_queensland: "Захопити місцеве керівництво у Квінсленді"
 AST_union_strike: "Організувати страйк"
 AST_union_strike_desc: "Наші робітники залишили свої робочі місця, вимагаючи кращих умов та прав. Це неодмінно чинитиме тиск на уряд, щоб запровадити нові реформи."
 AST_veterans_revolt: "Повстання ветеранів"
 AST_veterans_revolt_desc: "В армії є багато антикомуністично налаштованих членів, багато з яких раніше належали до фашистських угруповань. Вони зневажають комунізм і радше візьмуться за зброю, ніж дозволять йому прийти до влади.\nЯкщо ми будемо занадто довго зволікати з нашою революцією, або якщо ми дозволимо стабільності впасти занадто низько, вони візьмуть справу у свої руки, щоб запобігти цьому."
 AST_organize_in_nation: "Проникнути в профспілки в §Y[FROM.GetName]§!"
 AST_organize_in_nation_desc: "Робітничий рух не знає кордонів. Спрямовуючи ресурси в мережі наших товаришів, ми можемо впровадити комуністичних організаторів у профспілки [FROM.GetName], створюючи низову підтримку революції зсередини робітничого класу."
 AST_civil_war_in_nation: "Спровокувати революцію в §Y[FROM.GetName]§!"
 AST_civil_war_in_nation_desc: "Насіння, яке ми посіяли, готове дати плоди. Підтримка комуністів у [FROM.GetName] зросла до такого рівня, що відкрита революція в межах досяжності. За допомогою фінансування, агітаторів та ретельно спланованого поштовху ми можемо перетворити народне невдоволення на збройне повстання, наблизивши [FROM.GetName] ще на один крок до робітничої держави, на яку вони заслуговують."
 AST_take_it_to_foreign_streets: "Організувати міжнародний марш солідарності робітників"
 AST_take_it_to_foreign_streets_desc: "Робітники не мають кордонів. Ми розпочнемо скоординовану міжнародну кампанію, відправляючи австралійських комуністичних організаторів на вулиці кожної нації, де наш вплив уже закріпився, пожвавлюючи місцеві рухи та підтримуючи полум'я революції."
 AST_take_it_to_foreign_streets_tt: "Подовжує тривалість іноземного комуністичного впливу на 60 днів у всіх наразі інфільтрованих націях."
 AST_raj_locked_tt: "Британська Індія не може бути ціллю, поки Нова Зеландія, Малайя, Бірма, Філіппіни та Індонезія не потраплять під комуністичне правління."
 AST_supply_arms_to_nation: "Постачати зброю в §Y[FROM.GetName]§!"
 AST_supply_arms_to_nation_desc: "Ми постачатимемо зброю нашим товаришам"
 AST_strikes_tt: "Ви зможете завершити §Y$AST_workers_educational_association$§!, §Y$AST_off_leash$§!, §Y$AST_a_national_housing_commission$§!, §Y$AST_guaranteed_employment$§! та §Y$AST_equal_pay$§! лише під час триваючого страйку."
 AST_nationalization: "Почати націоналізацію"
 AST_nationalizing_process_tt: "Розблоковує рішення §YПочати націоналізацію§!, застосовуючи §YНаціоналізація триває§!. Необхідно для фокусів нижче та видаляється після завершення §YНародна Австралія§!. §RНевибрані фокуси тоді будуть заблоковані!§!"
 AST_nationalization_underway_tt: "§YНаціоналізація триває§! \nВиробництво фабрик: §R-30%§! \nВиробництво верфей: §R-30%§!"
 AST_nationalizing_process_ends_tt: "§RВиконання цього фокусу заблокує всі фокуси вище!§!"
