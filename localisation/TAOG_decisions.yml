 AST_smuggle_arms_to_ireland_ongoing_flag: "Контрабанда зброї §YТриває§!"
 AST_smuggle_arms_to_northern_ireland: "Контрабанда зброї до Північної Ірландії"
 AST_smuggle_arms_to_northern_ireland_desc: "Якщо ми зможемо забезпечити Північну Ірландію достатньою кількістю зброї та хорошим зв'язком з Ірландією, то ми зможемо гарантувати, що вона об'єднається з Ірландією до того, як британці матимуть шанс втрутитися."
