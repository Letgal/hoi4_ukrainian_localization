 INS_escalate_the_conflict: "Escalate the Conflict"
 INS_escalate_the_conflict_desc: "We will organize riots and skirmishes with the enemy forces in order to raise tension and escalation, laying the groundwork to ensure more severe operations later face less international scrutiny."
 INS_escalate_the_conflict_HOL: "$INS_escalate_the_conflict$"
 INS_escalate_the_conflict_HOL_desc: "$INS_escalate_the_conflict_desc$"
 INS_deescalate_the_conflict: "Request International Mediation"
 INS_deescalate_the_conflict_2: "Order a Ceasefire"
 INS_deescalate_the_conflict_desc: "The Dutch will not negotiate with us in good faith. To them we remain rebels, an inconvenience to be suppressed rather than a nation to be reckoned with. But the great powers of the world are another matter, and The Hague cannot dismiss them so easily. We will appeal to the international community to mediate, and let foreign pressure compel what our own voice cannot."
 INS_deescalate_the_conflict_2_desc: "Our raids have done their work. The colonial garrison knows our reach, and The Hague knows we are not cowed. Yet each strike gives the Netherlands fresh cause to send more men and more ships, and we are not ready for open war. Word will go to our commanders to hold their fire. The next blow falls when we say so, not when the Dutch goad us into it."

