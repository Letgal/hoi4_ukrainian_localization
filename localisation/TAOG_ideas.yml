 AST_poor_population_growth: "Слабкий приріст населення"
 AST_poor_population_growth_desc: "Коли в 1929 році вдарила Велика депресія, рівень народжуваності в Австралії різко впав. У поєднанні зі зниженням імміграції, приріст населення відтоді так і не зміг відновитися."
