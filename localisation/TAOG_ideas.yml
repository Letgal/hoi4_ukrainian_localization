 AST_anti_fascist_measures: "Anti-Fascist Measures"
 AST_anti_fascist_measures_desc: "Fascism has not yet dug its claws into Australia, and democratic forces want it to remain that way. The Commonwealth Investigation Branch will surveil and detain all suspicious elements to keep any fascist groups from gaining influence."
 ABDA_corps_expeditionnaire_spirit: "Corps Expéditionnaire"
 ABDA_corps_expeditionnaire_spirit_desc: "French forces committed to the Pacific theatre have been hardened by colonial service and accustomed to operating far from home in difficult conditions. Their experience fighting in Southeast Asia gives them a particular awareness of Japanese tactics and terrain, making them a resilient force when the enemy presses forward."
 ABDA_maintain_strategic_flexibility_spirit: "Strategic Flexibility"
 ABDA_maintain_strategic_flexibility_spirit_desc: "American industrial output is being directed toward the Pacific theatre, with dockyard production accelerated to sustain a fleet capable of projecting power across the ocean's full breadth. By refusing to overcommit to any single front, the United States ensures its naval strength can be brought to bear wherever the situation demands."
 AST_toe_the_line_spirit: "Toe the Line"
 AST_toe_the_line_spirit_desc: "The state has called for sacrifice and the population has answered. Rationing, longer working hours, and the redirection of civilian production toward the national effort have freed up resources the government had no other means of obtaining. It is an austere arrangement, and not a universally popular one."
