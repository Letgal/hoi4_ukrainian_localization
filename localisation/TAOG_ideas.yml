 AST_a_sense_of_place: "A Sense of Place"
 AST_a_sense_of_place_desc: "National identity is the bond that holds a people together. Under a prospering culture the Australians have united, committed to resisting any who might threaten their borders."
 AST_a_sense_of_place_upgraded: "A Sense of Place"
 AST_a_sense_of_place_upgraded_desc: "The national identity that once flourished quietly has been given a harder edge. This is no longer just pride in a land and a way of life — it is the conviction that what Australia has built is worth fighting for, and that the men and women who live under the Southern Cross are prepared to do so."
 AST_the_promise_of_nauru: "The Promise of Nauru"
 AST_the_promise_of_nauru_tt: "Effects once §Y[AST.GetName]§! finalizes the agreement:\n§YNauru§! Becomes owned and controlled by §Y[GER.GetName]§!\n(§Y[GER.GetFlag][GER.GetName]§!) Guarantee §Y[AST.GetName]§!\n§Y[AST.GetName]§! becomes free"
