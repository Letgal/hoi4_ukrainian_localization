 ABDA_supreme_command: "ABDACOM Supreme Command"
 ABDA_supreme_command_desc: "The American-British-Dutch-Australian Command has established a unified naval doctrine across all member navies. As the alliance deepens, shared intelligence, coordinated patrol assignments, and mutual logistical support steadily improve the combat effectiveness of every fleet that flies under ABDACOM's banner."
 modify_ABDA_supreme_command_tt: "Modifies §Y$ABDA_supreme_command$§! by:"
