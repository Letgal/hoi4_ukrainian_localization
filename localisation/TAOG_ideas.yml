############
 idea_SIA_civilian_full_support: "Цивільне крило: §GПовна підтримка§!"
 idea_SIA_civilian_full_support_desc: "Цивільне крило твердо стоїть за урядом. Адміністратори та технократи діляться своїм досвідом, просуваючи розвиток."
 idea_SIA_civilian_slight_support: "Цивільне крило: Незначна підтримка"
 idea_SIA_civilian_slight_support_desc: "Цивільне крило загалом підтримує курс уряду. Їхня співпраця приносить скромні, але відчутні переваги."
 idea_SIA_civilian_neutral: "Цивільне крило: Нейтралітет"
 idea_SIA_civilian_neutral_desc: "Цивільне крило не допомагає, але й не перешкоджає уряду. Адміністрація функціонує, але без ентузіазму справжньої політичної прихильності."
 idea_SIA_civilian_opposition: "Цивільне крило: В опозиції"
 idea_SIA_civilian_opposition_desc: "Цивільне крило обернулося проти уряду. Чиновники зволікають, а бюджети розподіляються неправильно, гальмуючи державний механізм."
 idea_SIA_civilian_rebellious: "Цивільне крило: §RБунтує§!"
 idea_SIA_civilian_rebellious_desc: "Цивільне крило відкрито кидає виклик. Нестабільність поширюється, і загроза політичного розколу зростає з кожним днем."
 idea_SIA_military_full_support: "Військове крило: §GПовна підтримка§!"
 idea_SIA_military_full_support_desc: "Військове крило твердо стоїть за урядом. Офіцери підтримують кампанії з призову та виробництво зброї, спрямовуючи ресурси армії на національні цілі."
 idea_SIA_military_slight_support: "Військове крило: Незначна підтримка"
 idea_SIA_military_slight_support_desc: "Військове крило здебільшого співпрацює. Їхня підтримка приносить скромні покращення в призові та виробництві, хоча і без повної віддачі."
 idea_SIA_military_neutral: "Військове крило: Нейтралітет"
 idea_SIA_military_neutral_desc: "Військове крило не зайняло жодної позиції. Армія виконує свої обов'язки без ентузіазму чи опору, чекаючи на розвиток подій."
 idea_SIA_military_opposition: "Військове крило: В опозиції"
 idea_SIA_military_opposition_desc: "Військове крило працює проти уряду. Офіцери підривають виробничі зусилля, а ентузіазм щодо урядової справи зникає з лав."
 idea_SIA_military_rebellious: "Військове крило: §RБунтує§!"
 idea_SIA_military_rebellious_desc: "Військове крило на межі відкритої непокори. Призов саботується, виробництво зброї страждає, і нависає привид державного перевороту."
 idea_SIA_defenders_of_constitutional_liberty: "Захисники конституційної свободи"
 idea_SIA_civil_service_heroism_1: "Героїзм державної служби"
 idea_SIA_civil_service_heroism_1_desc: "Державна служба виявилася на висоті, її відданість і досвід непомітно прискорюють темпи досліджень і розвитку держави."
 idea_SIA_civil_service_heroism_2: "$idea_civil_service_heroism_1$"
 idea_SIA_civil_service_heroism_2_desc: "$idea_SIA_civil_service_heroism_1_desc$"
 idea_SIA_redirected_military_funds: "Переспрямовані військові кошти"
 idea_SIA_thai_irredentism: "Тайський ірредентизм"
 idea_SIA_oss_special_forces_training: "Підготовка спецназу OSS"
 idea_SIA_seized_japanese_funds: "Конфісковані японські кошти"
 idea_SIA_seized_japanese_funds_desc: "Оскільки угоду з японцями розірвано, кошти та запаси, які вони залишили після себе, переходять до нас, що стимулює зростання будівництва та промислового виробництва."
 idea_SIA_oss_special_forces_training_desc: "Наші агенти тренувалися разом з OSS у сфері диверсій, інфільтрації та повітряно-десантних операцій. Отримані уроки перетворили наші спеціальні сили на грізну зброю."
 idea_SIA_sold_privy_purse_lands: "Продані землі королівської скарбниці"
 idea_SIA_sold_privy_purse_lands_desc: "Продаж земельних угідь королівського двору влив капітал у державу, послабивши економічний тиск і вивільнивши ресурси для будівництва."
 idea_SIA_war_fervor: "Воєнний запал"
 idea_SIA_bloodlusted_irredentism: "Кровожерливий ірредентизм"
 idea_SIA_bloodlusted_irredentism_desc: "Територіальні амбіції переросли в щось жорстокіше. Армія б'ється з переконанням тих, хто вірить, що повертає те, що належить їм по праву."
 idea_SIA_the_royal_police_counterweight: "Вірність Королівської поліції"
 idea_SIA_civilian_technocrats_in_institutions: "Цивільні технократи"
 idea_SIA_civilian_technocrats_in_institutions_desc: "Цивільні експерти, призначені в ключові державні установи, покращили як видобуток ресурсів, так і ефективність політичних призначень."
 idea_SIA_yuvachon: "Ювачон"
 idea_SIA_yuvachon_desc: "Рух «Ювачон» прищеплює молоді нації військову дисципліну, створюючи резерв підготовленої робочої сили та розпалюючи націоналістичні настрої."
 idea_SIA_yuvachon_2: "$idea_SIA_yuvachon$"
 idea_SIA_yuvachon_2_desc: "$idea_SIA_yuvachon_desc$"
 idea_SIA_rebuilding_the_war_torn_economy: "Відбудова зруйнованої війною економіки"
 idea_SIA_specialist_marine_forces: "Спеціальні сили морської піхоти"
 idea_SIA_specialist_marine_forces_desc: "Кадри спеціалістів-амфібій були навчені та оснащені для проведення берегових штурмових операцій."
 idea_SIA_rehabilitated_military: "Реабілітовані військові"
 idea_SIA_desperate_gambit: "Відчайдушний гамбіт"
 idea_SIA_desperate_gambit_desc: "Можливо, є вихід із цієї ями, в якій ви опинилися, лізьте вгору!"
 idea_SIA_purged_senior_military: "Репресоване вище військове командування"
 idea_SIA_purged_senior_military_desc: "Вищих офіцерів, яких вважали загрозою для уряду, було усунуто з посад. Втрата досвідчених командирів залишила свій слід на згуртованості та професійному розвитку армії."
 idea_SIA_cemented_control: "Зміцнений контроль"
 idea_SIA_cemented_control_desc: "Уряд зміцнив свій контроль над державними інститутами. Політичну опозицію відсунуто на другий план, і механізм влади тепер надійно працює на користь уряду."
 idea_SIA_cemented_control_2: "Укорінений контроль"
 idea_SIA_cemented_control_2_desc: "$idea_SIA_cemented_control_desc$"
 idea_SIA_cemented_control_3: "Закон про обов'язок тайців під час війни"
 idea_SIA_cemented_control_3_desc: "Обов'язок кожного тайця полягає в тому, що в разі війни, яка загрожує суверенітету корони та її народу, кожен гідний таєць повинен чинити опір окупації будь-якими можливими засобами, зі зброєю в руках чи інакше."
 idea_SIA_suspend_ordinary_legal_procedures: "Призупинено звичайні правові процедури"
 idea_SIA_thai_cultural_mandates: "Тайські культурні мандати"
 idea_SIA_military_humiliation: "Військове приниження"
 idea_SIA_death_defiant: "Непокорна смерть"
 idea_SIA_death_defiant_desc: "Ми вже мертві. Прийди і візьми своє, якщо зможеш."
 idea_SIA_songsuradet_ascendant_0: "Зростання Сонгсурадета"
 idea_SIA_songsuradet_ascendant_0_desc: "Успішно переживши гнів уряду, Пхрая Сонгсурадет зміцнив свої позиції і вийшов із ситуації ще сильнішим. Тепер він те, що люди назвали б «недоторканним», занадто відомим і вкоріненим, щоб його позбутися.\nВін, швидше за все, втручатиметься в урядову політику, сповільнюючи прийняття рішень, щоб переконатися, що він знову не стане мішенню чисток."
 idea_SIA_songsuradet_ascendant_1: "$idea_SIA_songsuradet_ascendant_0$"
 idea_SIA_songsuradet_ascendant_1_desc: "$idea_SIA_songsuradet_ascendant_0_desc$"
 idea_SIA_rebuilding_after_civil_war: "Відбудова після Громадянської війни"
 idea_SIA_rebuilding_after_civil_war_desc: ""
 idea_SIA_anti_burmese_sentiment: "Антибірманські настрої"
 idea_SIA_sued_king_prajadhipok: "Позов проти короля Прачадіпока"
 idea_SIA_pan_thaiism: "Пантайїзм"
 idea_SIA_pan_thaiism_desc: "Ідеологія пантайїзму стверджує, що всі народи тайського походження повинні бути об'єднані в одній державі. Це спонукає націю до експансії, підтримуючи бойовий дух через наступальні дії."
 idea_SIA_pan_thaiism_2: "$idea_SIA_pan_thaiism$"
 idea_SIA_pan_thaiism_2_desc: "$idea_SIA_pan_thaiism_desc$"
 idea_SIA_unity_propaganda: "Пропаганда єдності"
 idea_SIA_royal_palace_bureau_directive_no_1523: "Директива Бюро Королівського палацу №1523"
 idea_SIA_foreign_diplomatic_relationships: "Зовнішні дипломатичні відносини"
 modify_idea_SIA_foreign_diplomatic_relationships: "Модифікує §Y$idea_SIA_foreign_diplomatic_relationships$§! на:"
 idea_SIA_bank_of_siam: "Банк Сіаму"
 idea_SIA_bank_of_siam_desc: "Банк Сіаму слугує фінансовою опорою держави, скеровуючи капітальні інвестиції та керуючи монетарною політикою для підтримки промислового розширення."
