 idea_SIA_farmers_moving_to_bangkok_good: "Фермери переїжджають до Бангкока"
 idea_SIA_farmers_moving_to_bangkok_bad: "$idea_SIA_farmers_moving_to_bangkok_good$"
 idea_SIA_irrigation: "Іригація"
 idea_SIA_debt_repayment: "Погашення боргу"
 idea_SIA_debt_repayment_desc: "Наслідки програми дефіцитних витрат дають про себе знати. Доходи переспрямовуються на користь кредиторів, а темпи будівництва, які раніше забезпечувалися позиками, більше не можуть підтримуватися."
 idea_SIA_an_unceasy_alliance: "Хиткий альянс"
 idea_SIA_an_unceasy_alliance_desc: "Альянс тримається, але напруга починає проявлятися. Сумніви в уряді непомітно тягнуть націю до більш нейтрального курсу."
 idea_SIA_rural_support: "Підтримка села"
 idea_SIA_the_sacred_hierarchy: "Священна ієрархія"
 idea_SIA_order_discipline_and_unity: "Порядок, дисципліна та єдність"
 idea_SIA_constitutional_virtue: "Конституційна доброчесність"
 idea_SIA_an_absolute_monarchy: "Абсолютна монархія"
 idea_SIA_an_absolute_monarchy_desc: "Вся політична влада зосереджена в руках корони. Слово короля — закон, інакомислення придушується, а вся вага королівського престижу спрямована на національну мобілізацію. Трон вимагає вірності, а армія є його інструментом."
 idea_SIA_a_constituional_monarchy: "Конституційна монархія"
 idea_SIA_a_constituional_monarchy_desc: "Конституційні рамки визначають межі королівської влади та закріплюють права народу. З короною як об'єднуючим символом, а не абсолютною владою, нація стає більш стабільною, відкритою до нових ідей та більш узгодженою з демократичним світом."
 idea_SIA_restoring_order: "Відновлення порядку"
 idea_SIA_military_expansion_costs: "Витрати на розширення армії"
 idea_SIA_a_modern_economy: "Сучасна економіка"
 idea_SIA_death_to_communists: "Смерть комуністам"
 idea_SIA_death_to_communists_desc: "Антикомуністичний запал пронизує ряди, даючи нашим силам перевагу над комуністичними арміями Китаю."
 idea_SIA_death_to_nationalists: "Смерть націоналістам"
 idea_SIA_death_to_nationalists_desc: "Антинаціоналістичні настрої пронизують ряди, даючи нашим силам перевагу над націоналістичними арміями Китаю."

 idea_SIA_breaking_the_burmese_line: "Прорив бірманської лінії"
 idea_SIA_the_yellow_dossier: "Жовте досьє"
 idea_SIA_the_yellow_dossier_desc: "Секретний звіт про стан вітчизняної промисловості змусив звернути увагу на глибоко вкорінену неефективність. Реформи, яких він вимагає, приносять плоди на наших заводах, хоча порушення, які вони викликають, не обходяться без витрат."
 idea_SIA_the_yellow_dossier_2: "$idea_SIA_the_yellow_dossier$"
 idea_SIA_the_yellow_dossier_2_desc: "$idea_SIA_the_yellow_dossier_desc$"
 idea_SIA_pacific_war_preparations: "Підготовка до Тихоокеанської війни"
 idea_SIA_a_race_against_time: "Гонка з часом"
 idea_SIA_overheated_economy: "Перегріта економіка"
 idea_SIA_overheated_economy_desc: "Економіка вийшла за межі своїх природних можливостей. Споживчий попит випередив потужності, а будівельний бум зупинився, поки ситуація не охолоне."
 idea_SIA_ending_military_grift: "Кінець військовому хабарництву"
 idea_SIA_the_military_oversight_bureau: "$SIA_military_oversight_bureau$"
 idea_SIA_the_military_oversight_bureau_desc: "Бюро військового нагляду встановлює вищі стандарти для нових командирів і прискорює розвиток експертних знань серед усього офіцерського корпусу."
 idea_SIA_public_credit_debt: "Державний кредитний борг"
 idea_SIA_public_credit_debt_desc: "Кредитні зобов'язання держави є постійним тягарем для економіки, поглинаючи ресурси, які інакше пішли б у виробництво та цивільні товари."
 idea_SIA_public_credit_debt_2: "$idea_SIA_public_credit_debt$ — Погашення"
 idea_SIA_public_credit_debt_2_desc: "$idea_SIA_public_credit_debt_desc$"
 idea_SIA_revision_of_unequal_treaties: "Перегляд нерівноправних договорів"
 idea_SIA_purged_military: "Репресована армія"
 idea_SIA_purged_military_desc: "Усунення офіцерів, яких вважали політично ненадійними, залишило армію без досвідченого керівництва, що ускладнює організацію та розвиток військ, які залишилися."

 SIA_khana_ratsadon_inlay_title: "Кхана Ратсадон"
 SIA_civilian_wing_label: "Цивільне крило"
 SIA_military_wing_label: "Військове крило"
 SIA_wing_state_full_support: "§GПовна підтримка§!"
 SIA_wing_state_slight_support: "§GНезначна підтримка§!"
 SIA_wing_state_neutral: "§YНейтралітет§!"
 SIA_wing_state_opposition: "§RВ опозиції§!"
 SIA_wing_state_rebellious: "§RБунт§!"
 SIA_civilian_wing_history_tt: "Цивільну фракцію Кхана Ратсадон очолюють прогресивні адміністратори та технократи, насамперед §YПріді Паноміонг§!. Вивчавши право у Франції, Пріді повернувся з амбіціями щодо земельної реформи, державного економічного планування та конституційної демократії, яка б по-справжньому розширила права простих людей.\n\nЦивільне крило в цілому виступає §Gза розвиток§!, віддаючи перевагу інвестиціям в освіту, інфраструктуру та промисловість. Вони скептично ставляться до великих військових витрат і остерігаються будь-якого дрейфу до диктатури. Їхню підтримку найлегше здобути за допомогою політики, яка модернізує державу та захищає конституційний лад."
 SIA_military_wing_history_tt: "У військовій фракції Кхана Ратсадон домінують армійські офіцери, які вважають себе справжніми вартовими революції. Їхня найамбітніша фігура — §YПлек Пібунсонгкрам§!, полковник, чиє захоплення націоналістичними рухами Європи зростає з кожним роком.\n\nВійськове крило виступає §Gза переозброєння§! і тяжіє до сильної, централізованої держави. Вони з підозрою ставляться до економічних ідей Пріді, які вважають небезпечно радикальними, і не терплять втручання цивільних в оборонні питання. Їхню лояльність найлегше забезпечити шляхом військових інвестицій та політики, що демонструє національну міць."

