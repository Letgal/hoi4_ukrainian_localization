 AST_singapore_strategy_idea: "Оборонні споруди Сінгапуру"
 AST_singapore_strategy_idea_desc: "На прохання Австралії ми докладемо зусиль для покращення оборонних споруд у Сінгапурі. Зрештою, Сінгапурська стратегія є ключовим компонентом тихоокеанської оборонної політики.\n\n§W§YПри видаленні§! (§YSingapore§!):\n Додає §G2§! §YAir Base§!.\n Додає §G2§! §YNaval Base§!.\n Додає §G1§! §YCoastal Fort§!.§!\n"
