 ABDA_supreme_command: "Верховне командування ABDACOM"
 ABDA_supreme_command_desc: "Американо-британсько-голландсько-австралійське командування (ABDACOM) запровадило єдину військово-морську доктрину для флотів усіх учасників. З поглибленням альянсу, обмін розвідданими, скоординоване патрулювання та взаємна логістича підтримка неухильно підвищують бойову ефективність кожного флоту, що ходить під прапором ABDACOM."
 modify_ABDA_supreme_command_tt: "Змінює §Y$ABDA_supreme_command$§! на:"
