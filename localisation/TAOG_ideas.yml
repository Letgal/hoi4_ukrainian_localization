 AST_faction_training_initiative_idea_1: "Тренувальна ініціатива"
 AST_faction_training_initiative_idea_1_desc: "Спільна тренувальна ініціатива Тихоокеанського опору — це програма співпраці між його учасниками, яка гарантує, що всі солдати союзників проходять однаково сувору військову підготовку."
 AST_faction_training_initiative_idea_1_tt: "\nЕфекти духу подвояться, якщо §Y[AST.GetFactionName]§! має більше §Yчотирьох§! учасників"
 AST_faction_training_initiative_idea_2: "Тренувальна ініціатива"
 AST_faction_training_initiative_idea_2_desc: "Спільна тренувальна ініціатива Тихоокеанського опору — це програма співпраці між його учасниками, яка гарантує, що всі солдати союзників проходять однаково сувору військову підготовку."
 AST_faction_training_initiative_idea_2_tt: "\nЕфекти духу зменшаться вдвічі, якщо §Y[AST.GetFactionName]§! має менше ніж §Y5§! учасників"
