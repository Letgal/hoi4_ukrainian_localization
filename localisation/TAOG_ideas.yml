 idea_INS_volksraad: "The Volksraad"
 idea_INS_volksraad_desc: "The Volksraad is a council established by the Netherlands in 1918 as part of the “Ethical Policies” system, aiming to create a system of semi-democracy where various ethnic minorities and cultures across the archipelago can be represented. While it is in theory democratic in nature, the Governor General and Dutch Crown hold an unconditional veto."
 INS_volksraad_custom_tt: "Allows you to hire §YVolksraad Advisors§!\nAllows you to use §YVolksraad Decisions§!"
 INS_great_depression: "The Great Depression"
 INS_great_depression_desc: "While the direct impact that the Great Depression has caused the Indies is small, the subsequent protectionist policies countries have undertaken worldwide have had devastating effects on the Indies' economy, which is reliant on continuous export of raw materials such as rubber and oil."
 INS_great_depression_tt: "Modifies §Y$INS_great_depression$§! by:"
 INS_dutch_east_indies: "Mismanaged Administration"
 INS_dutch_east_indies_desc: "The East Indies is a vast archipelago containing hundreds of distinct cultures and languages, making it a notoriously difficult colony to administrate. The various independence movements, cultural barriers, and economic effects of the Great Depression have not helped this issue, and the administration is operating very inefficiently. The “Ethical Policies” which were established in 1918 attempted to improve the situation by mandating ethical labor regulations and giving democratic representations to minority groups, however the great depression has left them mostly unenforced."
 INS_dutch_east_indies_tt: "Modifies §Y$INS_dutch_east_indies$§! by:"
 INS_volksraad_tt: "Modifies §Y$INS_dutch_east_indies$§! by:"
 INS_royal_netherlands_east_indies_army_desc: "The Koninklijk Nederlands Indisch Leger (KNIL) is the long-standing army of the East Indies, operating independently from the Netherlands. The KNIL is made up of both European and Indonesian soldiers, though the cultural and linguistic barriers between the archipelago's many cultures, and the Netherlands, make recruitment a difficult and slow process."
 idea_INS_netherlands_most_precious_jewel: "Netherlands Most Precious Jewel"
 idea_INS_netherlands_most_precious_jewel_desc: "The Dutch East Indies has been a colony of the Netherlands for roughly 350 years, and the administration of the colony is tightly integrated with the Dutch government. The East Indies is often referred to as “the jewel in the Dutch crown”, and the Netherlands has shown no desire to loosen their grip over their precious jewel."
 INS_netherlands_most_precious_jewel_tt: "£GFX_trigger_no Can raise autonomy to Free"
