### MISC ###
 NZL_railways_board: "The Government Railways Board"
 NZL_railways_board_desc: "The Government Railways Board was created in 1931 as a restructuring of the Railways Department in an attempt to separate decision making away from government departments. However, there has been little sign of improvement to the rail network since it was established. There is mounting pressure for the government to abolish the board and to take back direct control."
 NZL_great_depression: "The Great Depression"
 NZL_great_depression_desc: "The collapse of the global economy in 1929 hit New Zealand's largely agricultural economy very hard. With countries purchasing less produce from New Zealand, many found themselves unemployed, reducing consumer purchasing power and in turn causing other industries to collapse. Years of austerity has left the nation yearning for a change in direction. "
 NZL_commonwealth_loyalty: "British Commonwealth Loyalty"
 NZL_commonwealth_loyalty_desc: "New Zealand remains a committed member of the British Commonwealth and retains the King as the rightful head of state. The economy of New Zealand is also highly integrated into the wider imperial economic system."
 NZL_national_coal_board_idea: "National Coal Board"
 NZL_ministry_of_public_works_dynamic_modifier: "Ministry of Public Works"
