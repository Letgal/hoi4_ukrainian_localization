### MISC ###
 NZL_railways_board: "Урядова рада залізниць"
 NZL_railways_board_desc: "Урядову раду залізниць було створено в 1931 році в результаті реструктуризації Департаменту залізниць з метою відокремити процес прийняття рішень від урядових відомств. Однак з моменту її створення майже не спостерігалося покращення залізничної мережі. Зростає тиск на уряд з вимогою скасувати раду та повернути прямий контроль."
 NZL_great_depression: "Велика депресія"
 NZL_great_depression_desc: "Крах глобальної економіки в 1929 році дуже сильно вдарив по переважно сільськогосподарській економіці Нової Зеландії. Оскільки інші країни купували менше новозеландської продукції, багато людей залишилися без роботи, що знизило купівельну спроможність споживачів і, своєю чергою, призвело до занепаду інших галузей. Роки жорсткої економії змусили націю прагнути зміни курсу. "
 NZL_commonwealth_loyalty: "Вірність Британській Співдружності"
 NZL_commonwealth_loyalty_desc: "Нова Зеландія залишається відданим членом Британської Співдружності і визнає Короля законним главою держави. Економіка Нової Зеландії також глибоко інтегрована в ширшу імперську економічну систему."
 NZL_national_coal_board_idea: "Національна вугільна рада"
