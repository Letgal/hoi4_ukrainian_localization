 AST_invasion_planning_desc: "§YПри видаленні§!:\nДодає §YВійськовий план «Японія»§!.\n"
 AST_war_plan_japan: "Військовий план «Японія»"
 AST_australian_culture_investments_idea: "Інвестиції в австралійську культуру"
 AST_australian_culture_investments_idea_desc: "§W§YПри видаленні§!:\nДодає §YВідчуття Батьківщини§!, що надає\nСтабільність: §G+10.00%§!\nПідтримка війни: §G+10.00%§!.§!\n"
 AST_a_sense_of_place: "Відчуття Батьківщини"
 AST_a_sense_of_place_desc: "Національна ідентичність — це зв'язок, що тримає народ разом. Завдяки розквіту культури австралійці об'єдналися, сповнені рішучості протистояти будь-кому, хто може загрожувати їхнім кордонам."
 AST_a_sense_of_place_upgraded: "Відчуття Батьківщини"
 AST_a_sense_of_place_upgraded_desc: "Національна ідентичність, яка колись тихо процвітала, набула жорсткіших рис. Це вже не просто гордість за землю та спосіб життя — це переконання, що те, що побудувала Австралія, варте того, щоб за нього боротися, і що чоловіки та жінки, які живуть під Південним Хрестом, готові це зробити."
 AST_the_promise_of_nauru: "Обіцянка Науру"
 AST_the_promise_of_nauru_tt: "Ефекти після того, як §Y[AST.GetName]§! фіналізує угоду:\n§YНауру§! переходить у власність та під контроль §Y[GER.GetName]§!\n§Y[AST.GetName]§! стає вільною\n[GET_AST_NAURU_PACT_FACTION_EFFECT]"
 AST_nauru_pact_guarantee_tt: "Гарантує незалежність §Y[AST.GetName]§!"
