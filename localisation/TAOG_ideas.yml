 idea_SIA_boon_rawd_brewery: "Пивоварня Boon Rawd"
 idea_SIA_boon_rawd_brewery_desc: "Пивоварня Boon Rawd перетворилася на символ вітчизняного підприємництва, її комерційний успіх створює добру волю та політичний капітал для тих, хто її підтримує."
