 AST_anti_fascist_measures: "Антифашистські заходи"
 AST_anti_fascist_measures_desc: "Фашизм ще не вп'явся своїми пазурами в Австралію, і демократичні сили хочуть, щоб так залишалося й надалі. Слідче управління Співдружності буде стежити за всіма підозрілими елементами та затримувати їх, щоб не дати фашистським групам отримати вплив."
 ABDA_corps_expeditionnaire_spirit: "Експедиційний корпус"
 ABDA_corps_expeditionnaire_spirit_desc: "Французькі сили, направлені на Тихоокеанський театр воєнних дій, були загартовані колоніальною службою та звикли діяти далеко від дому в складних умовах. Їхній досвід бойових дій у Південно-Східній Азії дає їм особливе розуміння японської тактики та місцевості, що робить їх стійкою силою, коли ворог тисне вперед."
 ABDA_maintain_strategic_flexibility_spirit: "Стратегічна гнучкість"
 ABDA_maintain_strategic_flexibility_spirit_desc: "Американське промислове виробництво спрямовується на Тихоокеанський театр, з прискореним виробництвом на верфях для підтримки флоту, здатного проектувати силу через увесь океан. Відмовляючись від надмірної концентрації на якомусь одному фронті, Сполучені Штати гарантують, що їхня військово-морська міць може бути застосована там, де цього вимагає ситуація."
 AST_toe_the_line_spirit: "Тримати стрій"
 AST_toe_the_line_spirit_desc: "Держава закликала до самопожертви, і населення відгукнулося. Нормування, довші робочі години та переорієнтація цивільного виробництва на національні потреби вивільнили ресурси, які уряд не мав інших можливостей отримати. Це суворі заходи, і далеко не всім вони до вподоби."
