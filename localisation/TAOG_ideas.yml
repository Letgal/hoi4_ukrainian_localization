 AST_unratified_westminster_act_idea: "Нератифікований Вестмінстерський статут"
 AST_unratified_westminster_act_idea_desc: "Вестмінстерський статут було прийнято в 1931 році, що дозволило самоврядним домініонам Сполученого Королівства підвищити свій суверенітет. Якщо ми ратифікуємо його, британський парламент не зможе впливати на більшість наших законів."
 AST_australian_war_cabinet_idea: "Австралійський військовий кабінет"
 AST_australian_war_cabinet_idea_tt: "\nУ стані війни §Y$AST_australian_war_cabinet_idea$§! буде змінено на:\n §Y2§! позамапові §Y$arms_factory$§!"
