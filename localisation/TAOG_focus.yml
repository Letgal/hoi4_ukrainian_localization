 ###########################
 ##### FABDA BRANCH ########
 ###########################

 # Root
 ABDA_abdacom: "Establish the ABDACOM"
 ABDA_abdacom_desc: "With enemy powers advancing rapidly across Southeast Asia and the Pacific, allied forces in the region must act as one to hold them back. By establishing a joint supreme command we can pool our resources, coordinate our naval assets, and present a unified front against the enemy."

 # Tier 1 - country-locked
 ABDA_fortress_singapore: "Fortress Singapore"
 ABDA_fortress_singapore_desc: "Singapore is the linchpin of our defensive strategy in the region. Reinforcing its fortifications and garrisoning it in strength will buy critical time for the broader ABDACOM effort and deny the enemy a rapid strategic victory."

 ABDA_corps_expeditionnaire: "CEFEO"
 ABDA_corps_expeditionnaire_desc: "French Indochina sits at the northern flank of the ABDACOM defensive perimeter. By committing the Corps Expéditionnaire Français en Extrême-Orient to active operations, [FRA.GetNameDef] will bring vital manpower and experience from its colonial forces to the joint command."

 ABDA_maintain_strategic_flexibility: "Maintain Strategic Flexibility"
 ABDA_maintain_strategic_flexibility_desc: "The United States must not overcommit its forces to any single theatre. By carefully managing our strategic reserve, we ensure that American industrial and military power can be brought to bear wherever it is needed most across the Pacific."

 # Tier 2
 ABDA_the_malay_barrier: "The Malay Barrier"
 ABDA_the_malay_barrier_desc: "The chain of islands stretching from Malaya through [INS.GetNonIdeologyName] forms a natural defensive barrier. ABDA forces must exploit this geography, establishing a coordinated naval and ground defence to slow the enemy advance."

 ABDA_develop_naval_infrastructure: "Develop Naval Infrastructure"
 ABDA_develop_naval_infrastructure_desc: "Sustained naval operations in the Pacific require bases, fuel depots, and repair facilities. Investing in the infrastructure of our ports and anchorages will extend the reach and endurance of ABDA naval forces."

 # Tier 3
 ABDA_unified_naval_command: "Unified Naval Command"
 ABDA_unified_naval_command_desc: "With land defences established and infrastructure in place, ABDA can now bring all naval forces under a single unified command. Standardised signals, shared intelligence, and coordinated patrol routes will multiply the effectiveness of every vessel in the theatre."

 # Tier 4
 ABDA_ship_a_day_sinking_quotas: "Ship-A-Day Sinking Quotas"
 ABDA_ship_a_day_sinking_quotas_desc: "Enemy supply lines stretching across the Pacific are their strategic vulnerability. By setting aggressive and coordinated sinking quotas for our submarine and surface forces, ABDACOM can bleed the enemy logistically and force them onto the defensive."

 ABDA_naval_procurement: "Naval Procurement"
 ABDA_naval_procurement_desc: "The losses already suffered demand urgent replacement. A coordinated ABDACOM procurement programme will prioritise destroyers, submarines, and patrol vessels best suited to the Pacific theatre, ensuring our combined fleet can match enemy expansion."

 ABDA_keep_trade_open: "Keep Trade Open"
 ABDA_keep_trade_open_desc: "The rubber and oil of the [INS.GetNonIdeologyName] are critical to the Allied war effort. ABDACOM must safeguard the sea lanes that carry these vital resources, protecting convoys from enemy interdiction and keeping trade flowing to our industries."

 # Tier 5 - capstone
 ABDA_expand_the_command: "Expand the Command"
 ABDA_expand_the_command_desc: "ABDACOM has proven its worth. Now we must build on that foundation, extending membership to other Allied nations in the region and deepening our research and intelligence sharing to stay ahead of the enemy."

