 HOL_curtail_colonial_autonomy_taog_desc: "$HOL_curtail_colonial_autonomy_desc$"
 HOL_taog_guarantee_colonial_loyalty: "Guarantee Colonial Loyalty"
 HOL_taog_guarantee_colonial_loyalty_desc: "Nationalism is on the rise in the Indies and it is clear another revolution is in the works. While the one we faced in 1927 was crushed with ease, our sources tell us that we may be dealing with a much more prepared group of revolutionaries. Perhaps if we grant some concessions to Soetardjo's peaceful nationalist movement we can draw the attention of civilians away from the revolution, and towards Soetardjo?"
 HOL_taog_guarantee_colonial_loyalty_tt: "§WGuarantees that [INS.GetNameDef] will not have a revolution.§!\n[INS.GetNameDefCap] will attempt to declare independence peacefully. This can be stopped by completing the focus §Y$INSHOL_industrialized_colony$§!, which will require heavy investment into the colony."






