 AST_natunity_desc: "§YУряд національної єдності§!\n§LУ моменти кризи дрібні суперечки поступаються місцем більшим. Нації навколо нас стикаються з конфліктами один за одним, і хоча внутрішні проблеми мають свою актуальність, ця актуальність зникає, коли загроза кровопролиття стає дедалі більш неминучою. Демократичні партії [AST.GetName] повинні відкласти свої розбіжності та зустріти світ об'єднаними.§!"
