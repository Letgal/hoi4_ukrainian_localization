 AST_australian_military_forces: "Australian Military Forces"
 AST_australian_military_forces_desc: "Tempered by fire in the Great War, the Australian military proved its mettle on distant shores, standing firm in some of the most brutal campaigns of the conflict. In the years since, the army has been reduced in size and reshaped into a defensive force, tasked primarily with safeguarding the home isles. The hard earned lessons of past endure, ready to be called upon once more."
 AST_permanant_military_forces: "Permanent Military Forces"
 AST_permanant_military_forces_desc: "Australia’s primary military force is the militia, tasked with defending the mainland. However, in this time of rising global tensions, it is prudent to establish a cadre of professional officers and soldiers, many of whom gained experience during the Great War. Even if initially serving in a reserve capacity, this force would provide permanence and a standardized level of training."
 AST_invoke_the_1903_defence_act: "Invoke the 1903 Defence Act"
 AST_invoke_the_1903_defence_act_desc: "Traditionally, Australia has relied on its militia for national defense. However, in times of significant threat, we can invoke the Defence Act of 1903. This allows us to call up additional manpower for defensive purposes."
 AST_lithgow_small_arms_factory: "Lithgow Small Arms Factory"
 AST_lithgow_small_arms_factory_desc: "Established in 1912, the Lithgow Small Arms Factory was created to reduce reliance on British-made arms and equipment in time of war. With global tensions rising once again, we should expand production to meet the growing needs of our armed forces."
 AST_dingo_scout_car: "Dingo Scout Car"
 AST_dingo_scout_car_desc: "Australia does not have a strong tradition of armored vehicle development, but our armed forces are increasingly calling for reinforcement in this area. As such, we should more rigorously adopt homegrown designs such as the Dingo Scout Car."
 AST_volunteer_defence_corps_taog: "Volunteer Defence Corps"
 AST_volunteer_defence_corps_taog_desc: "Established as a force akin to the British Home Guard, the Volunteer Defence Corps is an unpaid citizen militia made up of those ineligible for regular service. Despite these limitations, their knowledge of local terrain makes them well suited for guerrilla warfare if the worst occurs."
 AST_war_carriers: "War Carriers"
 AST_war_carriers_desc: "Logistics win wars, and much of the terrain Australia operates in is poorly suited to conventional transport such as trucks or trains. Instead, we should rely on local manpower, well adapted to the conditions and familiar with hidden paths and shortcuts."
 AST_anzac_spirit: "ANZAC Spirit"
 AST_anzac_spirit_desc: "The Australian and New Zealand Army Corps earned a formidable reputation during the Great War, expending great effort and much blood in pursuit of victory for the Empire. Their qualities were evident to all: endurance, courage, ingenuity, and good humor — combined with a casual defiance in the face of danger and hardship."
 AST_lee_enfield_no1_mark3: "Lee-Enfield No.1 Mk III*"
 AST_lee_enfield_no1_mark3_desc: "That little star matters — the Lee-Enfield No. 1 Mk III* denotes wartime modifications for faster, cheaper production. As demand outpaces even these gains, we must adopt a 'peddled scheme,' with components produced by smaller firms and assembled at Lithgow to boost output."
 AST_new_south_wales_government_railways: "New South Wales Government Railways"
 AST_new_south_wales_government_railways_desc: "The New South Wales Government Railways workshops provide a unique capability: large steel components, cast in a single piece. As one of the few Commonwealth nations able to produce fully cast tank hulls and turrets, we should put this capacity to good use."
 AST_second_australian_imperial_force: "Second Australian Imperial Force"
 AST_second_australian_imperial_force_desc: "Australia deployed the First Australian Imperial Force during the Great War, sending troops abroad to fight. With war once again threatening to engulf the world, we should raise a Second Imperial Force to demonstrate Australian strength overseas."
 AST_expeditionary_leader: "The §YGeneral§! will have the §YExpeditionary Leader§! trait which improves their capabilities overseas, but will limit the number of divisions they can command."
 AST_expeditionary_leader_plural: "Both §YGenerals§! will have the §YExpeditionary Leader§! trait which improves their capabilities overseas, but will limit the number of divisions they can command."
 AST_larrikinism: "Larrikinism"
 AST_larrikinism_desc: "Defined as ‘an uncultivated, rowdy but good-hearted person,’ larrikinism has come to embody Australian culture; rugged endurance, irreverence toward authority, and good-humored defiance in the face of danger. Australian soldiers earned a reputation in the Great War for facing hardship with resilience and taking it all in stride."
 AST_diggers: "Diggers"
 AST_diggers_desc: "“Dig, dig, dig, until you are safe” came the order to General William Birdwood when the ANZACs landed at Gallipoli, words that became synonymous with the Australian way of war. Yet the spirit of the Digger runs deeper, binding Australian and New Zealand soldiers through ‘mateship’: the enduring bond of fighting alongside, and for, one’s comrades."
 AST_owen_gun: "Owen Gun"
 AST_owen_gun_desc: "The innovative, homegrown Owen Gun has earned a reputation for rugged reliability, much like our soldiers. As our forces fight across the world, we should embrace this weapon not only as a symbol of Australian ingenuity and design, but of our very spirit in war."
 AST_department_of_supply_and_development_taog: "Department of Supply and Development"
 AST_department_of_supply_and_development_taog_desc: "As the demands of war push our production and logistics systems to their limits, we must centralize our efforts under a dedicated body responsible for coordinating and sustaining them."
 AST_sentinel_tank_development: "Sentinel Tank Development"
 AST_sentinel_tank_development_desc: "Historically, we have relied on imported tank designs, even when producing them domestically. We should build on the lessons learned from these machines and, with a measure of Australian innovation, develop our own tank, one tailored to our capabilities and resources."
 AST_establish_training_camps: "Establish Training Camps"
 AST_establish_training_camps_desc: "As in the Great War, the Second Imperial Force may be called upon to fight anywhere in the world. We must therefore develop comprehensive training programs to prepare our soldiers for any environment, from the deserts of North Africa to the jungles of the South Pacific."
 AST_jungle_tanks_if_sentinel_tank_development: "If we have completed 'Sentinel Tank Development':"
 jungle_heavy_tanks: "Jungle Heavy Tanks"
 AST_anti_malaria_campaign: "Anti-Malaria Campaign"
 AST_anti_malaria_campaign_desc: "Our forces may be called to fight across the jungles of the Pacific, where a threat more deadly than enemy bullets awaits: malaria. We must take decisive action to protect our troops from this invisible enemy."
 AST_defence_citizen_military_forces_act: "Defence Citizen Military Forces Act"
 AST_defence_citizen_military_forces_act_desc: "Until now, only volunteer professional soldiers could be deployed overseas. As the conflict continues to escalate, we must establish the legal framework to allow militia units to serve abroad if required."
 AST_call_that_a_knife: "No Worries!"
 AST_call_that_a_knife_desc: "'That’s not a knife… THIS is a knife!' A bit of bravado and humor goes a long way. Our soldiers face danger with confidence, grit, and no shortage of swagger."
 AST_army_inventions_directorate_taog: "Army Inventions Directorate"
 AST_army_inventions_directorate_taog_desc: "One of the few upsides of war, if it can be called that, is the rapid pace of technological innovation driven by necessity. We should establish a centralized organization to develop, refine, and harness these breakthroughs."
 AST_yeramba: "Yeramba"
 AST_yeramba_desc: "Building on the success of Australian-developed vehicles like the Sentinel, we have taken the next step with the Yeramba,a powerful new addition to our arsenal. A 25-pounder gun mounted on a tank chassis, it delivers mobile, devastating firepower against our enemies."
 AST_alice_springs: "Alice Springs"
 AST_alice_springs_desc: "The Outback is big...really big. At its heart lies the small town of Alice Springs, which can serve as a central logistical hub for operations across Australia. We should develop it and establish an army base to train troops ready for any environment."
 AST_australian_regular_army: "Australian Regular Army"
 AST_australian_regular_army_desc: "We have learned many lessons, from the beaches of Gallipoli to the deserts of North Africa, the mountains of Greece, and the jungles of Southeast Asia. This hard-earned experience has forged a military that is more flexible and adaptable than any other."

 AST_no1_flying_training_school: "No. 1 Flying Training School"
 AST_no1_flying_training_school_desc: "Established in 1921 with the formation of the Royal Australian Air Force, the Flying Training School has been opened and closed as demand for air personnel has fluctuated. With global tensions rising, we should reopen it to train a new generation of pilots and aircrew."
 AST_empire_air_training_scheme_taog: "Empire Air Training Scheme"
 AST_empire_air_training_scheme_taog_desc: "The British Commonwealth Air Training Plan offers significant funding and expertise to a Commonwealth nation to train large numbers of pilots and aircrew. Competition to host it is fierce, with Australia and Canada as the leading contenders. We have submitted our own bid under the Empire Air Training Scheme."
 AST_volunteer_air_corps: "Volunteer Air Observer Corps"
 AST_volunteer_air_corps_desc: "Australian airspace is vast, far beyond the reach of official units alone. We should instead rely on local volunteers, manning thousands of observation posts scattered across the country to keep watch over our skies."
 AST_improved_ground_crews: "Improved Ground Crews"
 AST_improved_ground_crews_desc: "For every pilot, there is an entire team of ground crew required to ensure proper aircraft maintenance, flight coordination, and base operations. Not to mention the navigators, gunners, and bombers who accompany them in the air. We must establish proper training facilities to ensure our air force operates at maximum efficiency."
 AST_advanced_pilot_training: "Advanced Pilot Training"
 AST_advanced_pilot_training_desc: "As aircraft become more complex, faster, and more advanced, the skill of our pilots must improve accordingly to make full use of these technologies."
 AST_advanced_pilot_training_tt: "§G+10%§! Mastery Gain Speed for §YAir Doctrines§!."
 AST_commonwealth_aircraft_corporation_taog: "Commonwealth Aircraft Corporation"
 AST_commonwealth_aircraft_corporation_taog_desc: "With growing interest in the war for the skies, we must ensure we are not left behind. Civilian enthusiasts and innovators have already begun to see the potential of the aeronautical industry; by providing them with initial funding, we can foster and expand this emerging sector."
 AST_reestablish_central_flying_school: "Re-establish Central Flying School"
 AST_reestablish_central_flying_school_desc: "Another of Australia’s flying schools, operating alongside No. 1 Flying Training School, the Central Flying School will help meet the growing demands of a modern air force. As tensions rise, we must ensure our personnel have the facilities they need."
 AST_aerodrome_of_democracy_democracy: "Aerodrome of Democracy"
 AST_aerodrome_of_democracy_fascism: "Aerodrome of Domination"
 AST_aerodrome_of_democracy_communism: "Aerodrome of Emancipation"
 AST_aerodrome_of_democracy_neutrality: "Aerodrome of Strength"
 AST_aerodrome_of_democracy: "[GET_AERODOME_NAME]"
 AST_aerodrome_of_democracy_desc: "Having reached the forefront of aeronautical capability, the Australian Air Force has earned the title '[GET_AERODOME_NAME].' Our fliers engage in aerial combat across the globe, while our bombers cast a deadly shadow over the industries of our enemies."
 AST_government_aircraft_factories: "Government Aircraft Factories"
 AST_government_aircraft_factories_desc: "Given our distance from Europe, we cannot rely on traditional sources of aircraft supply in wartime. It is therefore essential that we develop our own domestic manufacturing capabilities, allowing us to produce aircraft frames and engines to our own specifications."
 AST_death_from_down_under_taog: "Death From Down Under"
 AST_death_from_down_under_taog_desc: "From the far reaches of the Southern Hemisphere, we have forged an air force without equal. Our aircraft range across the globe, striking with precision and devastating force, wherever our enemies may hide, death will come from Down Under."
 AST_ride_the_lightning: "Ride the Lightning"
 AST_ride_the_lightning_desc: "Our fighter pilots are the spearhead of our air power; fast, aggressive, and relentless. Riding the lightning into battle, they seize control of the skies, intercept enemy aircraft, and ensure that wherever our forces go, air superiority follows close behind."
 AST_the_gathering_storm: "The Gathering Storm"
 AST_the_gathering_storm_desc: "A storm is gathering on the horizon. Our growing air strength brings mounting pressure from above, striking where the enemy is weakest and supporting our advance. What begins as a distant rumble will soon break into a relentless tempest of destruction."
 AST_hear_the_thunder: "Hear the Thunder"
 AST_hear_the_thunder_desc: "Can you hear, can you hear the thunder? From the land down under, our strategic bombers carry Australia’s power across the globe. When the skies roar and the ground trembles, our enemies will know: the storm has come, and it brings destruction."
 AST_department_of_aircraft_production: "Department of Aircraft Production"
 AST_department_of_aircraft_production_desc: "The rapid expansion of the Royal Australian Air Force has placed significant strain on our production capacity. We must think more ambitiously, expanding and coordinating our industrial base to meet demand, and ensure we can turn the skies dark with our aircraft."

 AST_royal_australian_navy: "Royal Australian Navy"
 AST_royal_australian_navy_desc: "Formed after federation by uniting colonial fleets, the Royal Australian Navy served across nearly every theatre in the Great War. Since then, it has been reduced by limited funding, but with rising global tensions, it is time for the fleet to return to the seas."
 AST_coast_watchers: "Coastwatchers"
 AST_coast_watchers_desc: "While most of our forces remain focused on the mainland, our northern approaches offer a vital early warning network. By deploying local intelligence operatives across these outlying islands, we can detect enemy air and naval movements long before they threaten Australian shores."
 AST_marines: "Marines"
 AST_marines_desc: "As the largest island in an ocean of islands, we must ensure we possess the amphibious capabilities to project power beyond our shores. Should we need to shift from defense to offense, these forces will enable effective island-hopping operations."
 AST_naval_auxiliary_patrol_taog: "Naval Auxiliary Patrol"
 AST_naval_auxiliary_patrol_taog_desc: "With our professional forces otherwise engaged, we can turn to eager local volunteers to safeguard our ports and coastal facilities. Their intimate knowledge of local waterways makes them invaluable, and no one would suspect a local fisherman to be in our service."
 AST_cockatoo_island_shipyards_taog: "Cockatoo Island Shipyards"
 AST_cockatoo_island_shipyards_taog_desc: "The Cockatoo Island Shipyards have long served as an imperial repair and maintenance hub, supporting Royal Navy operations abroad. Now a cornerstone of the Royal Australian Navy, we must expand its capacity to meet the growing demands of our fleet and sustain our naval strength."
 AST_kangaroo_point_dry_dock_taog: "Kangaroo Point Dry Dock"
 AST_kangaroo_point_dry_dock_taog_desc: "Although Evans Deakin and Company are primarily an engineering firm, they have rightly identified the need for expanded shipbuilding capacity as global tensions rise, setting their sights on Kangaroo Point. We should facilitate their taking over of this land to support the continued growth of our fleet."
 AST_scrap_iron_flotilla_taog: "Scrap Iron Flotilla"
 AST_scrap_iron_flotilla_taog_desc: "Dismissed by critics as outdated and worn, a number of our older destroyers have nonetheless been brought together into a single formation. Though lacking the prestige of modern vessels, these ships represent a resourceful use of what we already possess."
 AST_cruising_for_a_bruising: "Cruising for a Bruising"
 AST_cruising_for_a_bruising_desc: "Our navy has long made skillful use of cruisers, and it is a tradition worth expanding. Fast, versatile, and hard-hitting, these ships will soon earn a reputation worldwide—any enemy that crosses their path will find themselves in for a very serious bruising."
 AST_strike_from_down_under: "Strike From Down Under"
 AST_strike_from_down_under_desc: "Beneath the waves they glide, no roll of thunder, and if they find you, your ships they’ll plunder. Have you heard, have you heard of the subs from Down Under? You better run, or your fleet you will squander. Yee-aaah!"
 AST_hmas_sydney: "HMAS Sydney"
 AST_hmas_sydney_desc: "The battleship's age is over. The future of naval power lies in the skies above the fleet, and Australia will not be left behind. After years of rebuilding and modernising our navy, we are ready to take that final step; a carrier that will define Australian sea power for a generation to come."

