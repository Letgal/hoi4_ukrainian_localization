 NZL_ministry_of_public_works: "Ministry of Public Works"
 NZL_ministry_of_public_works_desc: "Through coordinated planning and disciplined investment, roads, railways and power schemes will be advanced according to a coherent national strategy rather than piecemeal effort."
 NZL_abolish_the_railways_board: "Abolish the Railways Board"
 NZL_abolish_the_railways_board_desc: "The Government Railways Board has been ineffective in modernizing the network. It is time for us to abolish this aberration and return the railways to ministerial control."
 NZL_rail_standardization: "Locomotive Standardization"
 NZL_rail_standardization_desc: "[ROOT.GetName] has a number of workshops across the country that have manufactured locomotives of varying quality. In order to make the railway system more efficient, we shall establish a number of standard locomotives for them to manufacture, each specialized for a specific purpose. "
 NZL_full_employment: "Full Employment"
 NZL_full_employment_desc: "Through sustained public works, careful planning and steady industrial expansion, unemployment has at last given way to opportunity. The idle workshops of the depression years are active once more, and the nation’s labor is fully engaged in productive enterprise. Having restored confidence and stability, we stand not only recovered, but strengthened for the challenges ahead."
 NZL_direct_the_coal_industry: "Direct the Coal Industry"
 NZL_direct_the_coal_industry_desc: "As coal becomes ever more vital to our railways, industry and power stations, the government must step in to coordinate production and distribution in the national interest."
 NZL_establish_the_ncb: "Establish the National Coal Board"
 NZL_establish_the_ncb_desc: "By establishing a National Coal Board, we can bring the country’s scattered mines under coordinated direction and secure a stable supply of fuel for railways, industry and power generation. Central oversight will allow us to rationalize production, improve efficiency and ensure that strategic needs take precedence over private interest."
 NZL_electrification: "Expand Power Generation"
 NZL_electrification_desc: "By harnessing our rivers and expanding hydroelectric generation, we can lay the foundations for lasting industrial strength. New dams and transmission works will increase capacity across the country, ensuring that factories, railways and ports have the power they require."
 NZL_bureau_of_industry_taog: "$NZL_bureau_of_industry$"
 NZL_bureau_of_industry_taog_desc: "$NZL_bureau_of_industry_desc$"
 NZL_wairarapa_sheep_farms_taog: "$NZL_wairarapa_sheep_farms$"
 NZL_wairarapa_sheep_farms_taog_desc: "$NZL_wairarapa_sheep_farms_desc$"
 NZL_national_roads_board_taog: "$NZL_national_roads_board$"
 NZL_national_roads_board_taog_desc: "$NZL_national_roads_board_desc$"
 NZL_taranaki_oil_taog: "$NZL_taranaki_oil$"
 NZL_taranaki_oil_taog_desc: "$NZL_taranaki_oil_desc$"
 NZL_women_in_the_workforce: "Women in the Workforce"
 NZL_women_in_the_workforce_desc: "As manpower shortages intensify, women are stepping forward to fill vital roles in factories, farms and public services and ensuring that production does not falter under wartime strain. Expanding training and employment opportunities will allow us to sustain industrial output while maintaining national defense."
 NZL_restart_the_onekaka_ironworks: "Restart the Onekaka Ironworks"
 NZL_restart_the_onekaka_ironworks_desc: "The Onekaka ironworks once represented our ambition to produce iron and steel domestically, reducing reliance on overseas supplies. To kick-start the economy and increase national security, there has been interest in restarting Onekaka’s furnaces once more."
 NZL_new_zealand_steel_taog: "$NZL_new_zealand_steel$"
 NZL_new_zealand_steel_taog_desc: "$NZL_new_zealand_steel_desc$"
 NZL_scrap_metal_recycling: "Recycling Campaign"
 NZL_scrap_metal_recycling_desc: "An import heavy economy such as ours cannot afford to be wasteful with strategic resources. To strengthen our economic resilience, we shall establish scrap recycling facilities to process and reuse metals and rubber."
 NZL_domestic_car_industry: "Invest in Vehicle Assembly Plants"
 NZL_domestic_car_industry_desc: "Production of vehicles in [ROOT.GetName] has been limited to assembling the parts from foreign manufactures that are shipped here for final construction. With our recent investment in domestic steel production, we may be able to begin manufacturing components ourselves."
 NZL_department_of_scientific_and_industrial_research_taog: "$NZL_department_of_scientific_and_industrial_research$"
 NZL_department_of_scientific_and_industrial_research_taog_desc: "$NZL_department_of_scientific_and_industrial_research_desc$"
 NZL_project_seal_taog: "$NZL_project_seal$"
 NZL_project_seal_taog_desc: "$NZL_project_seal_desc$"
 NZL_industrial_conscription_taog: "$NZL_industrial_conscription$"
 NZL_think_big_taog: "$NZL_think_big$"
 NZL_industrial_conscription_taog_desc: "$NZL_industrial_conscription_desc$"
 NZL_think_big_taog_desc: "$NZL_think_big_desc$"
 NZL_expand_the_university_of_auckland_taog: "$NZL_expand_the_university_of_auckland$"
 NZL_expand_the_university_of_auckland_taog_desc: "$NZL_expand_the_university_of_auckland_desc$"
 NZL_national_broadcasting_service: "National Broadcasting Service"
 NZL_national_broadcasting_service_desc: "Following the interference in the 1935 election by the Post Office and their oversight of state broadcasting services, it seems apparent that we need to reform the organizations management. We should also investment in updating the broadcasting equipment used by it."
 NZL_support_allies_with_meat: "Utilize the Meat Industry"
 NZL_support_allies_with_meat_desc: "Our allies in the Pacific are often stretching their supply lines to their limits. In order to reduce the strain and to keep their troops fed, we shall begin supplying them with meat."
 NZL_support_allies_with_meat_tt: "Every Ally will receive §G1§! §YOffmap Civilian Factory§!"

