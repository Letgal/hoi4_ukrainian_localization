 ################
 SIA_the_khana_ratsadon: "Кхана Ратсадон"
 SIA_the_khana_ratsadon_desc: "Народна партія поклала край абсолютизму і відкрила шлях до конституційного уряду. Її спадщина була спірною, зрадженою та кривавою, але вона залишається фундаментом, на якому можна побудувати сучасне [SIA.GetName]."
 SIA_the_khana_ratsadon_tt: "\n§YКхана Ратсадон§! стає активною.\n\n§YКхана Ратсадон§! є провідною партією в [ROOT.GetName], яка поділяється на §YВійськове крило§! та §YЦивільне крило§!.\n\n§YЦивільне крило§! загалом підтримує продемократичну політику з акцентом на цивільну промисловість, тоді як §YВійськове крило§! загалом підтримує профашистську політику та мілітаризацію промисловості.\n\nНаші рішення змусять їх ставитися до нас краще або гірше, даючи різні бонуси або штрафи.\nЯкщо вони стануть бунтівними, то можуть спробувати влаштувати переворот.\n\nРізні стани схвалення: §YБунтівний§!, §YВ опозиції§!, §YНейтральний§!, §YНезначна підтримка§! та §YПовна підтримка§!"
 SIA_shuffle_pridi_to_the_minister_of_interior: "Посилення позицій цивільного крила"
 SIA_shuffle_pridi_to_the_minister_of_interior_desc: "Перевівши Пріді на посаду міністра внутрішніх справ з міністра закордонних, він зможе ефективніше контролювати розподіл урядових ресурсів і слугувати гальмом для зростаючого впливу військових."
 SIA_shuffle_pridi_to_the_minister_of_interior_tt: "§Y$anti_fascist_raids$§! тепер збільшуватимуть схвалення §YЦивільного крила§! та зменшуватиме схвалення §YВійськового крила§!"
 SIA_civil_nationalism: "Громадянський націоналізм"
 SIA_civil_nationalism_desc: "Кожен таєць, незалежно від статусу, повинен знати, що його лояльність має належати не одному уряду чи одній особі, а скоріше підтримці цінностей свободи, незалежності та рівності, незалежно від того, хто зараз сидить на троні влади."
 SIA_the_true_heirs_of_1932: "Справжні спадкоємці 1932 року"
 SIA_the_true_heirs_of_1932_desc: "Військові люблять представляти революцію 1932 року як виключно своє досягнення, відкидаючи той факт, що це була перемога народу. Людям потрібно лише нагадувати про цей факт, і з них ми черпатимемо силу."
 SIA_thammasat_university: "Університет Таммасат"
 SIA_thammasat_university_desc: "Таммасат, як новостворений університет, може і повинен бути розширений, щоб прокласти шлях для нової ери тайських інновацій."
 SIA_defenders_of_constitutional_liberty: "Захисники конституційної свободи"
 SIA_defenders_of_constitutional_liberty_desc: "Вчителі, банкіри, медсестри — освічені середні верстви суспільства можуть бути згуртовані та мобілізовані на захист свободи, якщо військове крило зайде занадто далеко."
 SIA_dominate_public_symbols: "Домінування над публічними символами"
 SIA_dominate_public_symbols_desc: "Військове крило довго домінувало над публічними символами, зводячи статуї та оголошуючи державні свята на свою честь. Ми повинні протистояти цьому, створивши власні свята та монументи, що святкують право народу на самовизначення та перемогу над старою автократією."
 SIA_civil_service_heroism: "Героїзм державної служби"
 SIA_civil_service_heroism_desc: "Кожному громадянину має бути прищеплений невід'ємний обов'язок захищати верховенство права, якщо будь-яка сила, іноземна чи внутрішня, спробує захопити цю владу для себе. Нам потрібна не лише підтримка народу, якщо хтось спробує відібрати наші свободи, але й щоб сам народ діяв як прапороносець."
 SIA_spread_democratic_sentiment_in_universities: "Поширення демократичних настроїв в університетах"
 SIA_spread_democratic_sentiment_in_universities_desc: "В академічних колах криється майбутній напрямок розвитку [SIA.GetName]. Те, що вони вивчають сьогодні, відгукнеться в майбутньому, і, прищепивши сьогоднішнім вченим сильне почуття демократичного обов'язку, ми можемо поширити його за межі наукових залів."
 SIA_sideline_disloyal_officers: "Усунення нелояльних офіцерів"
 SIA_sideline_disloyal_officers_desc: "Офіцерський корпус армії не є монолітом. У його лавах є люди, чия лояльність належить колишнім покровителям, конкуруючим фракціям або власним амбіціям, а не уряду. Завдяки обережним перепризначенням та адміністративному тиску ці фігури можуть бути переведені на посади, де вони не становлять загрози, тоді як ті, хто довів свою надійність, отримають обов'язки, на які вони заслуговують."
 SIA_sideline_disloyal_officers_tt: "Два випадкових генерала отримають рису §YReassigned§! на 4 роки, через що вони не даватимуть бонусів.\nДва випадкових генерала, які не мають риси §YReassigned§!, отримають додаткові характеристики та додаткову позитивну рису."
 SIA_direct_funds_from_the_military_towards_development: "Спрямувати кошти з військових потреб на розвиток"
 SIA_direct_funds_from_the_military_towards_development_desc: "Хоча Військове крило буде незадоволене тим, що його фінансування перенаправляється на розвиток, саме вони, а не ми, повинні будуть пояснити громадськості, чому ця нестача інвестицій зрештою є для них вигідною."

 SIA_as_the_eyes_turn_towards_southeast_asia: "...Коли погляди звертаються до Азії"
 SIA_as_the_eyes_turn_towards_southeast_asia_desc: "Південно-Східна Азія більше не є віддаленим театром дій. Це перехрестя імперій, революцій та воєн. [SIA.GetName] повинен вирішити, чи буде пішаком у цій боротьбі, чи державою з власними планами."
 SIA_support_songsuradets_military_clique: "Підтримати Сонгсурадета"
 SIA_support_songsuradets_military_clique_desc: "Не кожен офіцер є ворогом нації. Сонгсурадет і його лоялісти пропонують дисципліновану військову альтернативу корумпованим генералам, які привели Сіам на край прірви. З їхньою підтримкою можна відновити порядок, не віддаючи державу в руки хаосу."
 SIA_support_songsuradets_military_clique_tt: "Якщо почнеться §YГромадянська війна§!, Сонгсурадет підтримає нас, надавши §Y3§! додаткові дивізії.\n§RЯкщо ми посилимо Сонгсурадета, а потім спробуємо заарештувати його через $SIA_the_songsuradet_rebellion$, він може чинити опір.§!"
 SIA_the_royal_police_counterweight: "Королівська поліція"
 SIA_the_royal_police_counterweight_desc: "Королівська поліція діє як незалежна сила і може бути використана проти нашої опозиції, якщо вони спробують захопити владу для себе."
 SIA_the_royal_police_counterweight_tt: "Якщо почнеться §YГромадянська війна§!, Королівська поліція підтримає нас, надавши §Y2§! додаткові дивізії."
 SIA_for_the_preservation_of_siamese_independence: "Консолідація контролю військового крила"
 SIA_for_the_preservation_of_siamese_independence_desc: "Протягом останнього століття, держави світу зазіхали на територіальну цілісність [SIA.GetAdjective], і це століття, нічим не відрізняється. Ми повинні діяти рішучіше, якщо хочемо зберегти нашу країну, щоб не залишитися державою-обрубком, скаліченою, розділеною та розірваною на частини."
 SIA_for_the_preservation_of_siamese_independence_tt: "§Y$anti_democratic_raids$§! тепер збільшуватиме схвалення §YВійськового крила§! та зменшуватиме схвалення §YЦивільного крила§!"
 SIA_the_peoples_day: "День Народу"
 SIA_the_peoples_day_desc: "Замість того, щоб ще більше наголошувати на ролі військових у поваленні старої монархії, ми повинні підвищити роль самого народу. Встановлення Дня Народу згуртує націю і навчить наших громадян не погоджуватися на менше."
 SIA_hold_military_parades: "Проведення військових парадів"
 SIA_hold_military_parades_desc: "Щоб підняти бойовий дух військових, винагородити наших лояльних генералів і нагадати нашим громадянам про міць збройних сил Сіаму, ми проведемо грандіозний парад у Бангкоку. Нехай газетам буде про що писати!"
 SIA_embed_technocrats_in_civilian_institutions: "Інтеграція технократів у цивільні інституції"
 SIA_embed_technocrats_in_civilian_institutions_desc: "Ми можемо створювати альянси з технократами в уряді, використовуючи їх як продовження руки цивільного крила, щоб проникати глибше і протидіяти впливу військових."
 SIA_military_academies_indoctrination: "Індоктринація у військових академіях"
 SIA_military_academies_indoctrination_desc: "Наші військові академії є ідеальними мішенями для ідеологічної підготовки. В цьому нам допоможуть інструктори, які забезпечать військову підготовку нашої молоді. Сильна армія, лояльна до правлячого класу, є основою будь-якої потужної держави, і цією державою будемо ми."
 SIA_the_king_of_the_white_elephant: "Король білого слона"
 SIA_the_king_of_the_white_elephant_desc: "Істерія з приводу повернення втрачених територій загрожує охопити націю, і світ спостерігає за цим. Щоб стримати цей запал, ми випустимо антивоєнний фільм, перший тайський фільм, знятий англійською мовою, щоб показати світу справжнє обличчя [SIA.GetName]."
 SIA_the_king_of_the_white_elephant_tt: "Відмикає кампанію пропаганди §Y$SIA_the_king_of_the_white_elephant$§! після виконання фокусу §Y$SIA_sala_chaloem_thai_movie_theater$§!, що дає:\n$MODIFIER_STABILITY_WEEKLY$: §G+0.45%§! на 180 дн." # (@LH)
 SIA_drum_up_irredentism: "Розпалювання іредентизму"
 SIA_drum_up_irredentism_desc: "Недостатньо заручитися підтримкою військових для майбутньої війни, ми також повинні здобути підтримку населення загалом. Через вірші, фільми та промови ми підготуємо [SIA.GetName] до розплати з імперіалістичними державами, які вкрали наші історичні землі."
 SIA_sell_privy_purse_lands: "Продаж королівських земель"
 SIA_sell_privy_purse_lands_desc: "Королівська родина володіє величезними ділянками землі, які зараз знаходяться під нашим контролем. Ці маєтки могли б значно поповнити нашу скарбницю, а їхні частини можна було б продати за вигідними цінами обраним офіцерам, щоб забезпечити їхню лояльність."
 SIA_sell_privy_purse_lands_tt: "Коли дія духу закінчиться, §Y[SIA_phraya_phahon.GetName]§! опиниться в центрі скандалу, що дозволить вам обійти вимогу фашизму для фокусу "§Y$SIA_phibuns_premiership$§!""
 SIA_war_fervor: "Воєнний запал"
 SIA_war_fervor_desc: "Барабани б'ють в очікуванні майбутнього конфлікту. Народ підготовлений, сірник запалений, і воєнний запал скоро досягне свого зеніту. Ми повинні подбати про те, щоб спрямувати цю енергію на гідну справу."
 SIA_war_fervor_tt: "Підтримка війни буде постійно зростати, поки ми не оголосимо війну будь-якій іншій країні, після чого дух буде вилучено.\n\nЯкщо §YПідтримка війни§! залишатиметься вище §Y95%§! без оголошення війни занадто довго, розпочнеться громадянська війна.\nПри оголошенні війни: "
 SIA_the_midnight_meeting: "Зустріч опівночі"
 SIA_the_midnight_meeting_tt: "[SIA_plaek_phibunsongkhram.GetName] захопить владу в [SIA.GetNameDef], очоливши уряд. Нам потрібно буде усунути його, щоб відновити справжню Монархію."
 SIA_the_midnight_meeting_desc: "Фельдмаршал Сонгсурадет спостерігає, як Пібун зосереджує у своїх руках все більше влади, і бачить у цьому обіцянку розплати. Якщо монархія і Сонгсурадет мають вижити, то роялісти, старші офіцери та цивільні посадовці повинні таємно зустрітися і домовитися про усунення Пібуна, перш ніж він виступить проти них."
 SIA_meet_with_king_prajadhipok: "Зустріч з королем Прачадіпоком"
 SIA_meet_with_king_prajadhipok_desc: "Змова без короля — це лише ще одна військова інтрига. Зустрівшись із королем Прачадіпоком у вигнанні, ми можемо поставити їхню справу під мантію королівської легітимності і заручитися благословенням єдиної людини, чиє повернення може згуртувати вагаючихся і розколоти режим."
 SIA_prajadhipok_audience_with_churchill: "Зустріч короля з прем'єром"
 SIA_prajadhipok_audience_with_churchill_desc: "Присутність Прачадіпока в [ENG.GetName] пропонує більше, ніж просто престиж. Якщо він зможе переконати [ENG.GetLeader], що повстання лоялістів служить британським інтересам в Азії, тоді зброя з Малайї все ще може потрапити до рук людей, відданих трону."
 SIA_prajadhipok_audience_with_churchill_tt: "[ENG.GetName] надасть нам "
 SIA_prajadhipok_audience_with_churchill_tt2: "На початку громадянської війни."
 SIA_facilitate_prajadhipoks_move_to_japan: "Сприяння переїзду Прачадіпока до Японії"
 SIA_facilitate_prajadhipoks_move_to_japan_desc: "Британія — не єдина держава, яка може отримати вигоду з потрясінь у [ROOT.GetNameDef]. Організувавши переїзд Прачадіпока до Японії, ми можемо забезпечити прихильність Токіо і, можливо, навіть гарантії того, що нам буде надана військова допомога, якщо повстання роялістів переросте у громадянську війну."
 SIA_facilitate_prajadhipoks_move_to_japan_tt: "3 дивізії рейнджерів з [JAP.GetNameDef] підтримають нас під час громадянської війни."
 SIA_the_kings_gambit: "Королівський гамбіт"
 SIA_the_kings_gambit_desc: "Прачадіпок має повернутися до Бангкока з повним очікуванням того, що режим його заарештує. Цей акт забезпечить роялістів обуренням, легітимністю та авторитетом, необхідними для того, щоб відкинути вагання і повстати від його імені. Як тільки король-вигнанець буде схоплений, буде дано сигнал, і почнеться боротьба за [ROOT.GetName]."
 SIA_the_kings_gambit_tt: "Наша підтримка залежатиме від того, скільки клік на нашому боці."
 SIA_restore_order: "Відновлення порядку"
 SIA_restore_order_desc: "Громадянська війна виграна, але сама лише перемога не зцілить королівство. Руїни необхідно відбудувати, стару гвардію умиротворити, а адміністрацію відновити, щоб [ROOT.GetName] могла вийти з безладу з безпечною Короною і повернутим у належне русло громадським життям."
 SIA_ananda_age_trigger_12: "Королю Ананді щонайменше §Y12§! років (Зараз §Y[?var:SIA_anandas_age]§!). Його день народження 20 вересня."
 SIA_ananda_age_trigger_15: "Королю Ананді щонайменше §Y15§! років (Зараз §Y[?var:SIA_anandas_age]§!). Його день народження 20 вересня."
 SIA_ananda_trait_tt: "Коли Ананда зійде на престол, він отримає: "
 SIA_to_forge_a_king: "Викувати короля"
 SIA_to_forge_a_king_desc: "Король Ананда залишається далеко у Швейцарії, він достатньо молодий, щоб його розум і характер все ще формувалися. Якщо ми будемо обережно спрямовувати його навчання, ми все ще можемо викувати не просто короновану маріонетку, а правителя, який відповідає долі, яку ми готуємо для [ROOT.GetNameDef]."
 SIA_to_forge_a_king_tt: "Майбутній король Ананда Махідол наразі молодий і навчається в [SWI.GetName]. Ми можемо вплинути на його майбутні інтереси та навчання, гарантуючи, що він стане великим королем.\n\nКожного року в день його народження, поки йому не виповниться 15 років, ми зможемо обирати для нього інтерес до вивчення, що дасть різні бонуси, коли він зрештою зійде на престол.\n\nЙого день народження 20 вересня, а його вік — §Y[?var:SIA_anandas_age]§!"
 SIA_ascend_the_throne: "Сходження на престол"
 SIA_ascend_the_throne_desc: "Роки регентства не можуть тривати вічно. Ананда досяг повноліття, щоб самостійно взяти на себе тягар королівської влади, і його формальне сходження на престол дозволить відновленій монархії перейти від опіки та інтриг до нового і легітимного правління."
 SIA_the_provincial_council_of_state: "Провінційна державна рада"
 SIA_the_provincial_council_of_state_desc: "Бої залишають державний механізм зламаним, а владу невизначеною. Поки молодий король Ананда не зможе правити від свого імені, Провінційна державна рада повинна виконувати функції тимчасового уряду і проголосити, що лоялісти борються не за себе, а за відновлення законної монархії."
 SIA_the_regency_of_boworadet: "Регентство Боворадета"
 SIA_the_regency_of_boworadet_desc: "Принц Боворадет несе в собі престиж старого порядку, і ніхто не може сумніватися, кому належить його лояльність. Призначивши його регентом від імені Ананди, ми віддаємо державу в консервативні руки і даємо зрозуміти, що реставрація має стати чимось більшим, ніж просто зміною міністрів."
 SIA_the_sacred_hierarchy: "Священна ієрархія"
 SIA_the_sacred_hierarchy_desc: "Боворадет вважає, що королівство найсильніше, коли кожен стан знає своє місце, а Корона стоїть вище будь-яких світських амбіцій. Монархію, віру та природну ієрархію [ROOT.GetNameDef] слід знову розглядати як священні стовпи, а не як реліквії, які можна продати."
 SIA_the_regency_of_songsuradet: "Регентство Сонгсурадета"
 SIA_the_regency_of_songsuradet_desc: "Сонгсурадет — не ліберал, але він і не сліпий до потреб сучасної держави. Як регент, він може зберегти королівську владу, довіривши майбутнє [ROOT.GetNameDef] дисципліні, плануванню та військовій програмі національного розвитку."
 SIA_order_discipline_and_unity: "Порядок, дисципліна та єдність"
 SIA_order_discipline_and_unity_desc: "Хаос фракційної політики та громадянської війни ледь не знищив державу. Відповідь Сонгсурадета проста: порядок в уряді, дисципліна в суспільстві та єдність у меті, щоб королівство могло перетворитися на сильнішу і сучаснішу державу."
 SIA_the_regency_of_rangsit: "Регентство Рангсіта"
 SIA_the_regency_of_rangsit_desc: "Принц Рангсіт розуміє, що монархія може вижити, лише примирившись з представницьким урядом. Його регентство пропонує королівську реставрацію, яка є консервативною за своєю гідністю, але демократичною за методами і готовою дати [ROOT.GetNameDef] стабільне парламентське майбутнє."
 SIA_constitutional_virtue: "Конституційна чеснота"
 SIA_constitutional_virtue_desc: "Монархію, яка поважає закон, важче повалити і легше захищати. Під керівництвом Рангсіта ми відновимо конституційне правління, обмежимо свавільну владу і навчимо націю, що Корона знаходиться у найбільшій безпеці, коли вона виступає гарантом законної свободи."
 SIA_an_absolute_monarchy: "Абсолютна монархія"
 SIA_an_absolute_monarchy_desc: "Експеримент з обмеженою монархією приніс лише приниження, переворот та узурпацію королівської влади амбітними офіцерами. Якщо трон хоче знову командувати лояльністю, то Корона повинна відновити свої повні прерогативи і правити без підпорядкування партіям чи парламенту."
 SIA_a_constitutional_monarchy: "Конституційна монархія"
 SIA_a_constitutional_monarchy_desc: "Трону не обов'язково домінувати в державі, щоб зберегти королівство. Відновивши монархію в рамках надійного конституційного врегулювання, ми зможемо зв'язати Корону і народ разом і забезпечити співіснування королівської гідності з відповідальним урядом."
 SIA_to_lay_the_bait: "Закласти наживку"
 SIA_to_lay_the_bait_tt: "Ми зіллємо сфабрикований економічний план, щоб налаштувати військових проти нас.\nЧим довше ми будемо відкладати §Y$SIA_and_spring_the_trap$§!, тим більшим буде опір проти військових і тим сильнішою стане наша підтримка.\n\n$SIA_dem_event_count_cw_scale_tt$\n\nКожного разу, коли військові критикують фальшивий проект, наша підтримка в громадянській війні зростатиме, аж до максимуму у §Y75%§! підтримки в громадянській війні. Додаткові §Y25%§! підтримки в громадянській війні можна отримати з нашої загальної демократичної підтримки (масштабовано від §Y0%-100%§!)"
 SIA_dem_event_count_cw_scale_tt: "§YПоточна прогнозована підтримка§!: §G[?var:SIA_dem_event_count_cw_scale|%]§!"
 SIA_to_lay_the_bait_desc: "Жовте досьє закликає до економічних реформ, але військові назвуть їх комуністичними. Спершу випустивши підроблений радикальний проект, ми можемо спровокувати їхнє обурення, а потім дискредитувати їх, коли буде випущено справжню, м'якшу версію."
 SIA_and_spring_the_trap: "І закрити пастку"
 SIA_and_spring_the_trap_desc: "Генерали клюнули на наживку. Їхнє обурення переросло в повстання, їхнє повстання викрило їхні амбіції, а цивільний уряд був готовий. Тепер пастка закривається, і майбутнє [ROOT.GetName] буде вирішуватися тими, хто відданий конституції."
 SIA_and_spring_the_trap_tt: "Якщо наша загальна підтримка перевищить §Y80%§!, ми уникнемо громадянської війни і миттєво усунемо військових."
 SIA_rebuild_the_war_torn_economy: "Відбудова зруйнованої війною економіки"
 SIA_rebuild_the_war_torn_economy_desc: "Громадянська війна розірвала дороги, фабрики, рисові поля та торгові шляхи. Відбудова має розпочатися негайно. Заробітна плата, зерно, залізниця і кредити зроблять для стабілізації [ROOT.GetName] більше, ніж будь-яка промова з Бангкока."
 SIA_end_military_grift: "Кінець військовому розкраданню"
 SIA_end_military_grift_desc: "Занадто довго військові бюджети підживлювали приватні статки, патронажні мережі та марні престижні проекти. Війна викрила цю гниль. Кожен корупційний контракт, підставний підрозділ і вкрадений вантаж має бути розслідуваний і відібраний у старої кліки."
 SIA_the_purge: "Чистка"
 SIA_the_purge_desc: "Військова кліка втопила націю в крові, замість того, щоб підкоритися цивільному правлінню. Зі зрадниками не може бути компромісів. Офіцери, колабораціоністи та співчуваючі повинні бути усунуті з кожного командування, перш ніж вони зможуть знову загрожувати державі."
 SIA_achieve_foreign_legitimacy: "Досягти іноземної легітимності"
 SIA_achieve_foreign_legitimacy_desc: "Іноземні держави спостерігали за нашою кризою з підозрою, чекаючи, чи скотиться Сіам у правління хунти або революцію. Ми повинні довести, що цивільний уряд є стабільним, законним і здатним захистити країну."
 SIA_achieve_foreign_legitimacy_trigger: "Будь-яка велика держава має понад §Y75§! ставлення до нас"
 SIA_countries_that_like_me_doctrine_tt: "§Y[?var:SIA_countries_that_like_me]x§! §G50%§! зниження вартості для: §YСухопутна доктрина§!"
 SIA_achieve_foreign_legitimacy_tt: "Отримайте §G[?var:SIA_achieve_foreign_legitimacy_base_stab_gain|%.0]§! стабільності за кожну велику країну, яка має понад §Y75§! ставлення до нас.\n\nЯкщо вимогам відповідають більше ніж §Y3§! великі країни, ми також отримаємо §Y1x§! §G50%§! Зниження вартості для: §YСухопутна доктрина§! за кожну таку велику країну понад цей ліміт.\n\nЯкщо вимогам відповідають §Y6§! або більше великих країн, ми отримаємо §G+2§! §YЦивільні фабрики§!."
 SIA_secure_the_state: "Безпека держави"
 SIA_secure_the_state_desc: "Перемога в громадянській війні не означає стабільності. Залізниці, порти, арсенали та вузли зв'язку повинні бути убезпечені до того, як реакційні офіцери зможуть перегрупуватися. Бангкок має залишатися спокійним, на зв'язку та під твердим цивільним контролем."
 SIA_expand_upon_the_dossier: "Розширення Досьє"
 SIA_expand_upon_the_dossier_desc: "Жовте досьє було написано під час крихкого моменту. Цей момент минув. Після поразки військової кліки ми можемо піти далі: глибша земельна реформа, сильніший захист праці та держава, здатна перебудувати Сіам з нуля."
 SIA_military_oversight_bureau: "Бюро військового нагляду"
 SIA_military_oversight_bureau_desc: "Армії не можна дозволити знову стати державою в державі. Очолюване цивільними бюро нагляду контролюватиме призначення, бюджети та політичну діяльність у збройних силах, гарантуючи, що казарми підпорядковуватимуться Бангкоку, а не навпаки."
 SIA_military_oversight_bureau_tt: "§YБюро§! проводитиме розслідування щодо генералів кожні 5-9 місяців. У цей період генерали діють зі зниженою ефективністю через посилений контроль."
 SIA_the_yellow_dossier: "Жовте досьє"
 SIA_the_yellow_dossier_desc: "Підроблений радикальний проект зробив свою справу. Тепер можна впроваджувати справжнє Жовте досьє: зважені реформи, економічна модернізація та політичні запобіжники, покликані зламати домінування військових, не віддаючи націю в руки хаосу."
 SIA_achieve_domestic_legitimacy: "Досягнення внутрішньої легітимності"
 SIA_achieve_domestic_legitimacy_desc: "Уряд вижив завдяки силі зброї, але тепер він повинен перемогти завдяки закону, хлібу та порядку. Довіра громадськості має бути відновлена, надзвичайні заходи мають бути обґрунтовані, і народ повинен побачити, що цивільне правління пропонує більше, ніж просто виживання."
 SIA_achieve_domestic_legitimacy_tt: "Система §YКхана Ратсадон§! буде відключена.\n§YВійськове крило§! буде остаточно розпущено, що повністю вилучить його національний дух.\n\n§YЦивільне крило§! буде остаточно реорганізовано в §Y$idea_SIA_unwavering_civilian_support$§!."
 SIA_allies_integration: "Інтеграція з Союзниками"
 SIA_allies_integration_desc: "Наші сили повинні навчитися битися пліч-о-пліч із Союзниками. Структури управління, зв'язок, процедури постачання та стандарти озброєння повинні бути узгоджені, перш ніж Сіам зможе стати чимось більшим, ніж просто символічним партнером."
 SIA_prepare_for_a_pacific_war: "Підготовка до війни в Тихому океані"
 SIA_prepare_for_a_pacific_war_desc: "Погляди імперій звертаються до Тихого океану. Амбіції Японії, європейські колонії та стратегія Союзників вказують на наближення бурі. Сіам повинен підготуватися до того, як перші постріли досягнуть наших берегів."
 SIA_the_end_of_gunboat_diplomacy: "Кінець дипломатії канонерок"
 SIA_the_end_of_gunboat_diplomacy_desc: "Більше ніколи іноземні військові кораблі не диктуватимуть умови з гирла Чаопхрая. Сіам повинен мати гармати, доки, міни та берегову оборону, необхідні для того, щоб будь-яка загроза Бангкоку стала актом божевілля."
 SIA_preemtive_strike: "Превентивний удар"
 SIA_preemtive_strike_desc: "Чекати, поки Японія вибере час для війни, було б дурістю. Якщо імперія має намір розірвати Азію, то [SIA.GetName] має завдати удару до того, як її армії та флоти будуть повністю задіяні в іншому місці."
 SIA_the_siamese_armada: "Армада [SIA.GetAdjective]"
 SIA_the_siamese_armada_desc: "Сучасна [SIA.GetName] потребує сучасного флоту. З новими кораблями, підготовленими екіпажами та розширеною військово-морською інфраструктурою, армада [SIA.GetAdjective] стане силою, здатною захищати наші береги і проектувати силу за їхні межі."
 SIA_asian_democratic_compact: "Азійський демократичний договір"
 SIA_a_more_moderate_option: "Більш поміркований варіант"
 SIA_a_more_moderate_option_desc: "Реформи повинні тривати, а не згоріти у бурі опозиції. Зберігаючи Жовте досьє в поміркованих межах, ми можемо ізолювати екстремістів, заспокоїти середній клас і побудувати цивільний порядок, який переживе свою першу перемогу."
 SIA_asian_democratic_compact_desc: "Азія не може вічно покладатися на віддалені імперії чи обіцянки великих держав. Демократичні країни регіону повинні об'єднатися, захищати одне одного і довести, що незалежність і свобода можуть вижити в Азії."
 SIA_asian_democratic_compact_tt: "Відкриває можливість вимагати незалежності для азійських суб'єктних держав і дозволяє нам запрошувати їх до нашої фракції."
 SIA_asian_democratic_compact_modify: "Змінює ідею §Y$SIA_asian_democratic_compact$§!:"
 SIA_southeast_asia_joint_command: "Об'єднане командування Південно-Східної Азії"
 SIA_southeast_asia_joint_command_desc: "Наш договір має стати чимось більшим, ніж просто дипломатичною обіцянкою. Об'єднане командування координуватиме стратегію, постачання, розвідку та оборонне планування по всій Південно-Східній Азії, перетворюючи окремі армії на спільний щит."
 SIA_pan_asian_weapon_standardization: "Паназійська стандартизація озброєння"
 SIA_pan_asian_weapon_standardization_desc: "Кожен союзник, який використовує різні гвинтівки, калібри, рації та транспортні засоби, — це запрошення до логістичного провалу. Стандартизована зброя та спільні плани виробництва зроблять нашу коаліцію сильнішою, дешевшою та швидшою в озброєнні."
 SIA_united_against_aggression: "Об'єднані проти агресії"
 SIA_united_against_aggression_desc: "Жоден член нашого договору не залишиться наодинці. Незалежно від того, чи походить загроза від імперій, фашизму, мілітаризму або опортуністичних сусідів, нації Азії відповідатимуть разом."
 SIA_the_hammers_that_strike: "Молоти, що б'ють"
 SIA_the_hammers_that_strike_desc: "Наш альянс — це більше не набір малих держав, які сподіваються вижити. Це зброя. Кожна нація — це молот, і разом ми вдаримо по будь-якій державі, яка прагне домінувати в Азії."
 SIA_mobilize_the_defenders_of_siam: "Мобілізація захисників Сіаму"
 SIA_mobilize_the_defenders_of_siam_desc: "Старі військові підвели націю, але Сіам все ще потребує захисників. Добровольці, лояльні офіцери, провінційна гвардія та патріотичні громадяни повинні бути організовані в силу, яка захищатиме конституцію від ворогів внутрішніх і зовнішніх."
 SIA_join_the_allies: "Приєднатися до Союзників"
 SIA_join_the_allies_desc: "[ROOT.GetName] не може стояти осторонь, поки світ поглинутий війною. Союзники пропонують зброю, визнання і місце серед націй, що чинять опір агресії. Приєднавшись до них, ми пов'язуємо виживання Сіаму з ширшою боротьбою за вільний світ."
 SIA_the_malay_peninsular_defense_plan: "План оборони Малайського півострова"
 SIA_the_malay_peninsular_defense_plan_desc: "Якщо війна прийде до Південно-Східної Азії, Малайя стане одним з її перших полів битви. Укріплення, склади постачання та спільне планування з британцями перетворять півострів на щит проти вторгнення."
 SIA_the_malay_peninsular_defense_plan_tt: "Збудує залізницю між Бангкоком і Сінгапуром.\n\nКожен переможний бал у [MAL.GetName], Сінгапурі, [724.GetName], [289.GetName] та [1076.GetName]\nДодає §G2§! §YБерегового форта§!\nДодає §G2§! §YСухопутного форта§!\nКожен із цих регіонів:\nДодає §G1§! §YСтаціонарна ППО§!"
 SIA_join_the_united_front: "Приєднатися до Об'єднаного фронту"
 SIA_join_the_united_front_desc: "Китай стікає кров'ю під [JAP.GetAdjective] агресією, але він все ще бореться. Приєднавшись до Об'єднаного фронту, [SIA.GetName] може допомогти перетворити війну на суші у кладовище для імперських амбіцій."
 SIA_a_land_war_in_asia_desc: "Війну не виграти лише деклараціями. Сіамські солдати повинні маршувати, битися і терпіти на складній місцевості Азії. Наша відданість Об'єднаному фронту має вимірюватися в діях."
 SIA_death_to_the_communists: "Смерть комуністам"
 SIA_death_to_the_communists_desc: "Поразка військової кліки не повинна відкрити двері для іншої тиранії. Комуністичні агітатори вірять, що криза послабила державу. Незабаром вони дізнаються, що цивільна демократія не є беззахисною."
 SIA_death_to_the_nationalists: "Смерть націоналістам"
 SIA_death_to_the_nationalists_desc: "Японію було відкинуто, але питання про майбутнє Азії залишається відкритим. Старий націоналістичний порядок лише замінить одну ієрархію на іншу. Якщо Азія має бути перебудована, комуністи повинні перемогти."
 SIA_a_new_dawn_over_asia: "Новий світанок над Азією"
 SIA_a_new_dawn_over_asia_desc: "Японська імперія впала, а корумповані сили, що прагнули успадкувати її руїни, були відкинуті. По всій Азії піднімається новий світанок над націями, сповненими рішучості будувати своє майбутнє вільним від імперського панування."
 SIA_phibuns_premiership: "Прем'єрство Пібуна"
 SIA_phibuns_premiership_desc: "Коли прем'єрство [SIA_phraya_phahon.GetName] добігає кінця, обраний партією наступник Плаєк Пібунсонгкрам готовий перейняти владу. Це значно покращить ставлення до нас військових, але змусить цивільне крило здійнятися з тривогою.\nДля нас є лише один шлях вперед у цю нову епоху; з великою переконаністю!"
 SIA_siamese_youth_movement: "[THIS.GetAdjective] молодіжний рух"
 SIA_siamese_youth_movement_desc: "Молодь [THIS.GetName] потрібно загартовувати, як сталь над гарячим полум'ям. Вони навчаться поважати державу, захищати батьківщину і стануть повноцінними членами тайського суспільства."
 SIA_territorial_defense_student: "Студент територіальної оборони"
 SIA_territorial_defense_student_desc: "Розширюючи молодіжний рух, найперспективніших кандидатів можна перевести до тренувальних таборів молодших солдатів, де вони допомагатимуть в обороні [SIA.GetNameDef]. Вони отримають належну військову підготовку і діятимуть як додатковий інструмент, який зможе використовувати армія."
 SIA_expand_domestic_arms_workshops: "Розширення вітчизняних збройових майстерень"
 SIA_expand_domestic_arms_workshops_desc: "Наші внутрішні можливості з виробництва військових матеріалів жалюгідно відстають від інших розвинених країн. Нам потрібно зосередитися на розширенні військового виробництва на рідній землі, щоб переконатися, що наші сили постійно отримують нове обладнання."
 SIA_look_to_european_fascism: "Погляд на європейський фашизм"
 SIA_look_to_european_fascism_desc: "У нас є можливість реформувати цю країну, не скуту минулим, ми будемо дивитися в нове майбутнє, натхненні тим, що відбувається на Заході. Очевидно, що старий світовий порядок руйнується, і ті, хто залишиться позаду, страждатимуть від наслідків відсутності свого бачення."
 SIA_the_songsuradet_rebellion: "Повстання Сонгсурадета"
 SIA_the_songsuradet_rebellion_desc: "Старший офіцер Прая Сонгсурадет є загрозою для нинішнього режиму, якщо він цього захоче. Ця небезпека для режиму не може залишатися непоміченою, і як головний супротивник Пібуна він повинен піти.\nБезсумнівно, існує вдосталь компрометуючих матеріалів, які можна використати проти Сонгсурадета та його прихильників, що допомогло б нам консолідувати нашу владу та усунути наших внутрішніх опонентів."
 SIA_the_songsuradet_rebellion_historical_tt: "Генерала Праю Сонгсурадета звинуватять у змові проти держави. Він та радник §Y[SIA_rangsit_prayurasakdi.GetName]§! будуть очищені.\n\nМи отримаємо\n"
 SIA_the_songsuradet_rebellion_historical_tt2: "Коли час дії вичерпається, ви отримаєте: "
 SIA_the_songsuradet_rebellion_historical_tt3: "на §Y[?var:SIA_purged_military_timer]§! днів"
 SIA_the_songsuradet_rebellion_alt_tt: "Генерала Праю Сонгсурадета звинуватять у змові проти держави.\n\nОднак, оскільки ми посилили його військову кліку, він може осміліти і відмовитися від виклику, що призведе до протистояння або потенційно до громадянської війни."
 SIA_sue_the_king_in_exile: "Подати до суду на короля у вигнанні"
 SIA_sue_the_king_in_exile_desc: "Ходять чутки, що король-вигнанець вивіз із собою досить багато цінностей до [ENG.GetNameDefCap]. Ми повинні повернути їх, і якщо для цього доведеться подати до суду на нього та його дружину, нехай так і буде."
 SIA_suspend_ordinary_legal_procedures: "Призупинення звичайних правових процедур"
 SIA_suspend_ordinary_legal_procedures_desc: "Повстання Сонгсурадета дає нам можливість провести масштабні реформи в ім'я національної безпеки. Система стримувань і противаг, яка утримується судами та іншими політичними органами, буде нейтралізована, що дасть нам необхідний час для централізації влади."
 SIA_the_duty_of_the_thai_people_during_the_war_act: "Закон про обов'язок тайського народу під час війни"
 SIA_the_duty_of_the_thai_people_during_the_war_act_desc: "$idea_SIA_cemented_control_3_desc$"
 SIA_recognize_manchukuo: "Визнання Маньчжоу-Го"
 SIA_recognize_manchukuo_desc: "TODO_CM"
 SIA_press_censorship: "Цензура преси"
 SIA_press_censorship_desc: "Вільна преса ризикує підірвати стабільність держави. Хоча певна свобода дій повинна існувати, нам потрібно переконатися, що голос і воля уряду є пріоритетними в засобах масової інформації."
 SIA_department_of_publicity: "Департамент публічності"
 SIA_department_of_publicity_desc: "Машина пропаганди є обов'язковою для будь-якої держави, особливо для такої, як наша, з територіальними амбіціями. Фінансування департаменту публічності дозволить нам досягти цього."
 SIA_thai_cultural_mandates: "Тайські культурні мандати"
 SIA_thai_cultural_mandates_desc: "Ми можемо згуртувати тайський народ і побудувати сильну національну культуру, видаючи мандати, зміцнюючи єдність народу та формуючи єдину ідентичність."
 SIA_thai_cultural_mandates_tt: "Відкриває рішення для ухвалення культурних мандатів, що дає різні посилення за ціною §YПолітичної влади§!. Перший мандат та перший інший мандат безкоштовні."
 SIA_relocate_the_capital_to_phetchabun: "Перенесення столиці до Пхетчабуна"
 SIA_relocate_the_capital_to_phetchabun_desc: "Уряд під загрозою! Як довела історія, Бангкок вразливий до військово-морських атак, і хоча це, безперечно, буде непопулярним рішенням, перенесення столиці далі вглиб країни є рішенням, яке необхідно прийняти."
 SIA_relocate_the_capital_to_phetchabun_tt: "Переміщує до §G3§! §YВійськових заводів§! з §Y[1076.GetName]§! до §Y[1077.GetName]§!\nПереміщує §G3§! §YЦивільні фабрики§! з §Y[1076.GetName]§! до §Y[1077.GetName]§!\nБудує форти рівня §G3§! навколо Пхетчабуна"
 SIA_relocate_the_capital_to_phetchabun_tt2: "Після закінчення дії духу - Ви отримаєте базову стабільність: §R-25%§!"
 SIA_radio_propaganda: "Радіопропаганда"
 SIA_radio_propaganda_desc: "Радіо стає основою, оскільки [SIA.GetName] електрифікується, і так само, як ми повинні контролювати пресу, ми повинні контролювати те, що транслюється."
 SIA_sala_chaloem_thai_movie_theater: "Кінотеатр Сала Чалоем Тхай"
 SIA_sala_chaloem_thai_movie_theater_tt: "Відкриває рішення для створення пропагандистських фільмів, що дають різні посилення. Наприклад:\n"
 SIA_sala_chaloem_thai_movie_theater_desc: "Кіно — це нове середовище в нашій країні, але його потенціал очевидний для всіх. Так само, як і вірші, книги та радіо, воно може наповнити серця і уми простих людей та еліти. Використовуючи це середовище, ми можемо зміцнити рішучість громадян побачити, як піднімається велика [SIA.GetName]."
 SIA_pan_thaiism: "Пан-тайїзм"
 SIA_pan_thaiism_desc: "Для [ROOT.GetName] недостатньо лише жити, вона повинна процвітати. Майбутнє [ROOT.GetAdjective] народу полягає не в тому, щоб змиритися з роллю третьосортної держави, а в тому, щоб стати активним гравцем у світових справах. Спочатку серця і уми людей повинні бути згуртовані проти імперіалістів, які відібрали те, що колись належало нам, і нагадати людям про те, що у нас забрали."
 vichy_exist_trigger: "§YВішістська Франція§! існує"
 vichy_exist_not_trigger: "§YВішістська Франція§! не існує"
 SIA_retake_lost_british_states: "Повернення втрачених британських територій"
 SIA_retake_lost_british_states_tt: "Відкриває можливість почати обмежені війни проти британських колоній у §YБірмі§! та §YМалайзії§!"
 INS_retake_lost_british_states_tt: "Відкриває можливість почати обмежені війни проти британських територій у §YМалайзії§!"
 SIA_retake_lost_british_states_desc: "Не лише [FRA.GetAdjective] розділили наше велике королівство, але й [ENG.GetAdjective], гнані амбіціями, також користалися кожною можливістю, щоб забрати свою частку. Оскільки їхня увага прикута до більших суперників, для нас настав час діяти."
 SIA_recover_indochina: "Повернення Індокитаю"
 SIA_recover_indochina_desc: "У минулому столітті наша країна була роздроблена [FRA.GetAdjective], урядом на іншому кінці світу, який не має права вказувати нам, що робити чи як жити, і все ж з канонерками та зброєю вони забрали те, що належало нам. У цьому столітті міць [FRA.GetAdjecive] згасає; це століття — наше."
 SIA_recover_indochina_tt: "Відкриває можливість почати обмежені війни проти §YІндокитайських§! територій"
 SIA_demand_the_return_of_lost_territory: "Вимогти повернення втрачених територій"
 SIA_demand_the_return_of_lost_territory_desc: "[FRA.GetNameDefCap] показала свою слабкість, ставши не більше ніж паперовим тигром, що чіпляється за залишки свого згасаючого впливу. Після розвалу своїх збройних сил вона більше не може проектувати ту силу, яку колись мала, і не в змозі протистояти нашим вимогам."
 SIA_demand_the_return_of_lost_territory_tt: "Ми попросимо власників §YІндокитаю§! та частин §Y[MAL.GetName]§! повернути нам §Y[1069.Getname]§!, §Y[1067.Getname]§!, §Y[741.Getname]§!, §Y[1068.Getname]§!, §Y[1061.Getname]§!, §Y[1064.Getname]§!, §Y[1065.Getname]§! та §Y[670.Getname]§!.\n\nФактори впливу:\n-Бойова міць не менше 30% у порівнянні з власником\n-Власник у стані війни з мажором\n-Власник не у фракції\n-Власник — §YВішістська Франція§!\n-Ми у фракції\n-Власник недолюблює нас"
 SIA_the_greater_thai_empire: "Велика Тайська Імперія"
 SIA_the_greater_thai_empire_available_trigger: "§Y[ROOT.GetName]§! контролює кожний індокитайський регіон\nПідкорення кожного індокитайського регіону становить більше: §Y[?var:SIA_greater_thai_empire_compliance_requirement]%§!\n\nДодатково потребує: "
 SIA_the_greater_thai_empire_desc: "Час нашого піднесення настав. Те, що колись було відібрано, відновлено, і оскільки народ визнав нас де-факто владою, ми твердо встановили свою легітимність як законних лідерів цієї оновленої Великої Тайської Імперії."
 SIA_crack_down_of_foreign_merchants: "Репресії проти іноземних купців"
 SIA_crack_down_of_foreign_merchants_desc: "Торгівля довго формувалася зовнішніми інтересами, створюючи вразливості, які можуть вплинути на нашу національну стійкість. Щоб захистити нашу економічну безпеку, ми повинні мати змогу контролювати власну торгівлю, гарантуючи, що процвітання та стабільність будуються на фундаменті, який ми контролюємо самі."
 SIA_royal_palace_bureau_directive_no_1523: "Директива Бюро Королівського палацу № 1523"
 SIA_royal_palace_bureau_directive_no_1523_desc: "Зі сплеском націоналізму в країні навіть корона виступила на підтримку уряду, попросивши кожного співробітника Королівського палацу пожертвувати 10% свого доходу на купівлю сучасного озброєння."
 SIA_end_factionalism: "Покласти край фракційності"
 SIA_end_factionalism_desc: "Розкол між військовим та цивільним крилами Кхана Ратсадон затьмарював кожне рішення з часів революції. Якщо ми зможемо утримувати обидві фракції твердо на боці уряду достатньо довго, ми нарешті зможемо об'єднати їх у єдину Народну партію та назавжди позбутися примари перевороту."
 SIA_end_factionalism_available_tt: "Як §YЦивільне крило§!, так і §YВійськове крило§! перебувають під §GПовною підтримкою§! протягом §Y270§! днів поспіль."
 SIA_end_factionalism_tt: "Фракційне суперництво в Кхана Ратсадон припинено:\n   §YЦивільне§! та §YВійськове§! крила розпускаються та об'єднуються в §GЄдину Народну партію§!\n   Отримано національний дух §Y$idea_SIA_unified_khana_ratsadon$§!"
 SIA_turn_off_the_khana_ratsadon: "Кхана Ратсадон деактивована"

 SIA_factionalism_overcome: "Фракційність подолано"
 SIA_new_territories_administration: "Управління новими територіями"
 SIA_new_territories_administration_tt: "Відкриває рішення для управління §Yіндокитайськими§! територіями, забезпечуючи підвищене підкорення, промисловість та укріплення."
 SIA_new_territories_administration_desc: "Повернення наших втрачених територій — це лише початок. Ми повинні довести тим, хто там живе, що ми — кращий вибір. Буде здійснено комплексну програму з підвищення рівня життя для всіх, гарантуючи, що кожен громадянин відчує себе рівним у цій новій великій країні."
 SIA_new_territories_administration_available_trigger: "Будь-який регіон в §YІндокитаї§!\n   Контролюється §Y[ROOT.GetName]§!"
 SIA_industrialization_drive: "Курс на індустріалізацію"
 SIA_industrialization_drive_desc: "Протягом поколінь багатство [ROOT.GetName] спиралося на рисові поля та сільські поселення. Проте сучасний світ формується не плугом, а фабрикою та машиною. Якщо ми хочемо зберегти нашу незалежність серед великих держав, ми повинні перетворити наше аграрне королівство на індустріальну націю."
 SIA_industrialization_drive_trigger: "§YКхана Ратсадон§! активна"
 SIA_asian_financial_compact: "Азійський фінансовий договір"
 SIA_asian_financial_compact_desc: "Європейський капітал все ще домінує у значній частині азійської торгівлі, залишаючи нашу економіку вразливою до іноземного тиску. Шукаючи тісніших фінансових угод із нашими сусідами, ми можемо розширити наш доступ до кредитів, ринків та інвестицій, не відмовляючись від нашої незалежності."
 SIA_revision_of_unequal_treaties: "Перегляд нерівноправних договорів"
 SIA_revision_of_unequal_treaties_desc: "Старі угоди, підписані через слабкість, все ще надають іноземним інтересам привілеї, які не повинна терпіти жодна сучасна держава. Ми повинні переглянути ці нерівноправні договори та відновити повну владу [ROOT.GetNameDef] над своєю торгівлею, судами та концесіями."
 SIA_renegotiate_teak_control: "Перегляд контролю над тиком"
 SIA_renegotiate_teak_control_desc: "Наші північні ліси збагачують концесіонерів, у той час як занадто мало повертається до держави. Переглянувши контроль над тиковим деревом, ми зможемо повернути доходи, врегулювати видобуток і гарантувати, що сіамська деревина служитимите сіамському розвитку."
 SIA_a_fledgling_tobacco_industry: "Зародження тютюнової промисловості"
 SIA_a_fledgling_tobacco_industry_desc: "Тютюн залишається незначним напрямком торгівлі, розпорошеним і погано організованим. Завдяки помірному захисту та обережним інвестиціям ця невелика культура може стати надійним джерелом акцизних надходжень, доходів сільського населення та фабричної роботи."
 SIA_a_fledgling_tobacco_industry_tt: "Перебування на §Y$limited_exports$§! або §Y$closed_economy$§! принесе нам додаткову §YЦивільну фабрику§!"
 SIA_all_weather_roads: "Всепогодні дороги"
 SIA_all_weather_roads_desc: "Занадто багато доріг зникає під час дощів, залишаючи провінції відрізаними від столиці та ринків. Мережа всепогодних доріг зв'яже королівство воєдино і дозволить товарам та солдатам пересуватися у будь-яку пору року."
 SIA_the_bank_of_siam: "Банк Сіаму"
 SIA_the_bank_of_siam_desc: "Промислове зростання не може відбуватися лише на основі звичаїв і приватних привілеїв. Сильніший національний банк дасть державі більший контроль над кредитами, валютою та обігом капіталу."
 SIA_thai_rice_company: "Тайська рисова компанія"
 SIA_thai_rice_company_desc: "Рис залишається джерелом життя [ROOT.GetName], проте занадто багато його торгівлі є фрагментованою, спекулятивною і вразливою до іноземного тиску. Національна рисова компанія дозволить державі керувати експортом, стабілізувати ціни і перетворити врожай наших полів на міцніший фундамент для національної могутності."
 SIA_uk_japan_focus_tt: "Дозволяє вибрати між [ENG.GetNameDef] та [JAP.GetNameDef] з такими ефектами:\n\n§Y[ENG.GetFlag][ENG.GetNameDefCap]§!:"
 SIA_japan_option_tt: "§Y[JAP.GetFlag][JAP.GetNameDefCap]§!"
 SIA_send_bureaucrats_abroad: "Відправка бюрократів за кордон"
 SIA_send_bureaucrats_abroad_desc: "Інші країни вже побудували міністерства, школи та технічні служби, які нам зараз потрібні. Відправляючи перспективних чиновників за кордон, ми можемо перейняти адміністративний досвід без нав'язування іноземного правління."
 SIA_baht_stabilization_act: "Акт про стабілізацію бата"
 SIA_baht_stabilization_act_desc: "Сучасна економіка вимагає валюти, якій довіряють купці та яку приймають інвестори. Стабілізація бата зменшить невизначеність у торгівлі і дасть [ROOT.GetNameDef] твердіший ґрунт на міжнародному ринку."
 SIA_siamese_development_cooperative: "Сіамський кооператив розвитку"
 SIA_siamese_development_cooperative_desc: "Приватний капітал обережний, і держава не може побудувати все сама. Національний кооператив розвитку дозволить чиновникам, купцям і землевласникам об'єднувати ресурси для проектів, що служать загальній економіці."
 SIA_boon_rawd_brewery: "Броварня Boon Rawd"
 SIA_boon_rawd_brewery_desc: "Вітчизняна пивоварна промисловість — це більше, ніж питання споживання. Такі підприємства, як Boon Rawd, показують, що сіамський капітал, обладнання та управління можуть створити сучасну промисловість на сіамській землі."
 SIA_national_savings_bond: "Національні ощадні облігації"
 SIA_national_savings_bond_desc: "Багатство нації не повинно лежати без діла у сейфах та прикрасах, поки дороги та фабрики залишаються незбудованими. Національна ощадна облігація перетворить приватну ощадливість на державні інвестиції."
 SIA_national_savings_bond_tt: "Отримує дух $SIA_national_savings_bond$, сила якого залежить від вашого §YЗакону про призов§!. Чим нижчий ваш закон про призов, тим сильніші позитивні ефекти, тоді як чим він вищий, тим гіршим він стає.\n\nЗа умови §Y$disarmed_nation$§! отримуємо: "
 SIA_national_savings_bond_scraping_the_barrel: "За умови §Y$scraping_the_barrel$§! отримуємо:"
 SIA_national_savings_bond_volunteer_only: "За умови §Y$volunteer_only$§! отримуємо:"
 SIA_national_savings_bond_limited_conscription: "За умови §Y$limited_conscription$§! отримуємо:"
 SIA_national_savings_bond_extensive_conscription: "За умови §Y$extensive_conscription$§! отримуємо:"
 SIA_national_savings_bond_service_by_requirement: "За умови §Y$service_by_requirement$§! отримуємо:"
 SIA_national_savings_bond_all_adult_serve: "За умови §Y$all_adults_serve$§! отримуємо:"
 SIA_national_savings_bond_current: "Наш поточний закон про мобілізацію надасть нам: "
 SIA_deficit_spending: "Дефіцитне фінансування"
 SIA_deficit_spending_desc: "Ортодоксальна бухгалтерія не побудує сучасну економіку вчасно, щоб зустріти небезпечний світ. Держава повинна бути готова витрачати більше своїх поточних доходів, використовуючи громадські роботи та закупівлі для стимулювання промислового зростання."
 SIA_deficit_spending_tt: "Коли час дії духу вичерпається, ви отримаєте: "
 SIA_acquire_light_tools: "Придбання легких інструментів"
 SIA_acquire_light_tools_desc: "Перш ніж ми зможемо створювати великі машини, ми повинні спочатку освоїти прості знаряддя промисловості. Імпорт легких інструментів та цехового обладнання дозволить розмножити невеликі фабрики та ремонтні майстерні по всій [ROOT.GetName]."
 SIA_railway_and_port_extensions: "Розширення залізниць та портів"
 SIA_railway_and_port_extensions_desc: "Рис, деревина та олово нічого не варті, якщо вони не можуть досягти ринку. Розширення залізниць та наших портів залучить провінції до національної торгівлі та з'єднає [ROOT.GetNameDef] з ширшим світом."
 SIA_mechanization_of_agriculture: "Механізація сільського господарства"
 SIA_mechanization_of_agriculture_desc: "Занадто багато праці залишається прив'язаною до традиційної обробки землі, даючи мало надлишку для промисловості. Впровадивши сучасні інструменти та машини в сільську місцевість, ми зможемо збільшити виробництво і вивільнити робочі руки для фабрик."
 SIA_irrigation: "Іригація"
 SIA_irrigation_desc: "Доля селянина все ще залежить від повеней та посух. Ширша система зрошення стабілізує врожаї, розширить площі оброблюваних земель і зробить сільську місцевість міцнішою базою для національного розвитку."
 SIA_siam_cement_group: "Цементна група [ROOT.GetName]"
 SIA_siam_cement_group_desc: "Заснована під королівським патронажем, Цементна група [ROOT.GetName] є одним з найважливіших промислових підприємств [ROOT.GetNameDef]. Завдяки цільовим інвестиціям та урядовій підтримці компанія може перетворитися з внутрішнього постачальника на наріжний камінь нашої ширшої промислової потужності — заклавши фундамент, у буквальному сенсі, для майбутнього нації."
 SIA_chemical_imports: "Імпорт хімікатів"
 SIA_chemical_imports_desc: "Сучасне сільське господарство та промисловість однаково залежать від сполук, які ми ще не виробляємо в достатній кількості. Імпорт хімікатів забезпечить нас добривами, ліками, барвниками та вибухівкою, поки вітчизняна промисловість не візьметься за це завдання."
 SIA_chemical_imports_tt: "Додає §G+1§! позамапову §YЦивільну фабрику§!, якщо ставлення вище §Y[?var:ROOT.SIA_chemical_imports_opinion_threshold]§! на момент завершення цього фокусу."

 INS_chemical_imports_stolen_tt: "Додає §G[?var:ROOT.INS_guns_from_seek_help_focus]§! одиниць Піхотного спорядження, якщо ставлення вище §Y75§! на момент завершення цього фокусу."

 SIA_foreign_currency_exchange: "Обмін іноземної валюти"
 SIA_foreign_currency_exchange_desc: "Індустріалізація вимагає іноземного обладнання, ліків і палива, але їх можна купити лише за дефіцитну валюту. Контрольована система обміну валют спрямує іноземні кошти на найважливіші для держави галузі."
 SIA_farmers_into_the_city: "Фермерів до міста"
 SIA_farmers_into_the_city_desc: "Сучасна економіка не може підтримуватися лише сільською працею. З розширенням промисловості держава повинна заохочувати впорядковану міграцію з полів до міст, де можна буде сформувати нову міську робочу силу."
 SIA_textile_mills: "Текстильні фабрики"
 SIA_textile_mills_desc: "Одяг — це щоденна необхідність, але надто багато його тчуть за кордоном і продають нам назад. Текстильні фабрики замінять імпортні товари, забезпечать роботою містян і дадуть [ROOT.GetNameDef] одну з базових галузей сучасного життя."
 SIA_public_credit: "Державний кредит"
 SIA_public_credit_desc: "Купці, фермери та виробники однаково обмежені в доступі до капіталу. Розширюючи державний кредит, уряд може позичати там, де приватні фінансисти вагаються, і стимулювати розвиток у занедбаних секторах."
 SIA_public_credit_trigger: "$idea_SIA_public_credit_debt$ активний щонайменше §Y180 днів§!"
 SIA_a_modern_economy: "Сучасна економіка"
 SIA_a_modern_economy_desc: "Старий аграрний лад не зникає за один день, але він більше не може визначати майбутнє [ROOT.GetNameDef]. Оскільки банки, школи, заводи та інфраструктура зараз набувають форми, ми починаємо будувати економіку, гідну незалежної сучасної нації."
 SIA_reduction_of_agricultural_yield_taxes: "Зниження податків на врожайність"
 SIA_reduction_of_agricultural_yield_taxes_tt: "Зменшує §YСпоживчі товари§! від $idea_SIA_agricultural_tax_reduction$ на §Y[?var:SIA_agricultural_tax_reduction_cg_decrease_rate|%]§! щомісяця та підвищує §YСтабільність§! на §Y[?var:SIA_agricultural_tax_reduction_stability_gain|%]§! щомісяця, поки штраф §YСпоживчих товарів§! не досягне §Y0%§!\n\nКоли цей дух буде видалено, ви отримаєте:\n"
 SIA_reduction_of_agricultural_yield_taxes_desc: "Не можна вимагати від селянства годувати королівство, фінансувати державу і терпіти всілякі труднощі без жодного полегшення. Знижуючи податки на сільськогосподарський врожай, ми залишаємо більше надлишку в сільській місцевості, зміцнюємо лояльність серед землеробів і стимулюємо до більшого виробництва з землі."
 SIA_fuel_oil_act: "Акт про мазут"
 SIA_fuel_oil_act_desc: "Сучасний транспорт, промисловість і оборона залежать від палива, однак доступ до нього може бути перекритий у разі війни. Акт про паливо поставить під жорсткіший державний нагляд споживання, зберігання та надзвичайний розподіл, щоб дефіцитні запаси не були змарновані."
 SIA_siam_electricity_company: "Енергетична компанія Сіаму"
 SIA_siam_electricity_company_desc: "Жодна економіка не може витримати сучасних навантажень без надійної електроенергії. Зміцнивши Енергетичну компанію Сіаму, ми зможемо розширити генерацію, покращити координацію і гарантувати, що майстерні, склади і міста залишатимуться забезпеченими навіть у скрутні часи."
 SIA_revise_the_taxation_system: "Перегляд податкової системи"
 SIA_revise_the_taxation_system_desc: "Нинішня податкова структура не відповідає належним чином державі, яка готується до труднощів і самозабезпечення. Переглянута система збиратиме доходи більш рівномірно, зменшить марнотратство і спрямує тягар національної оборони та розвитку з більшою дисципліною."
 SIA_census_the_hill_tribes: "Перепис гірських племен"
 SIA_census_the_hill_tribes_desc: "Високогір'я залишаються поза зоною повного досяжності адміністрації, оподаткування та постачання. Належний перепис дасть уряду знання, необхідні для більш ефективного управління цими регіонами і залучення їхніх людей та ресурсів у ширше життя нації."
 SIA_increase_rice_exports: "Збільшення експорту рису"
 SIA_increase_rice_exports_desc: "Рис є найнадійнішим джерелом іноземного доходу, доступним для [ROOT.GetNameDef]. Розширюючи експорт, поки ринки залишаються відкритими, ми можемо наростити резерви, профінансувати стратегічний імпорт і підготувати скарбницю до можливих потрясінь."
 SIA_pad_thai: "Пад Тай"
 SIA_pad_thai_desc: "Сучасна нація підтримується не лише міністерствами і заводами, а й спільними звичками, що об'єднують народ. Популяризуючи національну страву з рису, виготовлену з сіамських інгредієнтів, ми стимулюємо внутрішнє споживання, підтримуємо наших фермерів і зменшуємо залежність від іноземних продуктів у нестабільні часи."
 SIA_rice_husk_steam_turbines: "Парові турбіни на рисовому лушпинні"
 SIA_rice_husk_steam_turbines_desc: "Те, що іноземець вважає відходами, необхідність вчить нас цінувати. Спалюючи рисове лушпиння для виробництва пари, ми можемо отримувати енергію з наших власних врожаїв і зменшити нашу залежність від імпортного вугілля та нафти."
 SIA_domestic_tin_smelters: "Вітчизняні оловоплавильні заводи"
 SIA_domestic_tin_smelters_desc: "Більше недостатньо просто викопувати руду з землі і відправляти її за кордон. Будуючи вітчизняні оловоплавильні заводи, ми зберігаємо більшу частину вартості наших ресурсів вдома і забезпечуємо себе промисловим металом, важливим як для комерції, так і для війни."
 SIA_use_ships_as_generators: "Використання кораблів як генераторів"
 SIA_use_ships_as_generators_tt: "Розміщення §YВеликих кораблів§!, якими ми володіємо, у §YПортах національних регіонів§! дасть нам бонус §G-2%§! до Енергоспоживання фабриками на кожен §YВеликий корабель§!, максимум до §G-15%§!.\n\nКоли ці кораблі покинуть порт, бонус відповідно зменшиться, але його можна відновити, повернувши кораблі в порт."
 SIA_use_ships_as_generators_desc: "Навіть старі судна ще можуть послужити нації, коли вони більше не придатні для бою чи торгівлі. Пришвартувавши кораблі як плавучі електростанції, ми зможемо забезпечити аварійною електроенергією порти та прибережну промисловість, зберігаючи при цьому дорогоцінне паливо та інфраструктуру."
 SIA_diversity_foreign_reserves: "Диверсифікація іноземних резервів"
 SIA_diversity_foreign_reserves_desc: "Для [ROOT.GetNameDef] небезпечно довіряти свою фінансову безпеку валюті або кредитам однієї іноземної держави. Диверсифікуючи наші резерви, ми зменшуємо ризик зовнішніх потрясінь і зберігаємо більшу свободу дій у торгівлі та дипломатії."
 SIA_diversity_foreign_reserves_tt: "Додає ще §G2§! позамапових §YВійськових заводи§! при вступі у війну.\nДодає Виробництво §G8§! Сталі у випадковому національному регіоні при вступі у війну."
 SIA_exclusivity_resource_contract: "Контракт на ексклюзивні ресурси"
 SIA_exclusivity_resource_contract_desc: "Єдиний іноземний партнер пропонує капітал та гарантовані закупівлі в обмін на привілейований доступ до наших ресурсів. Такий ексклюзивний контракт може прискорити розвиток, хоча він і прив'язує частину майбутнього [ROOT.GetNameDef] до апетитів іншої нації."
 SIA_maintain_resource_independence: "Збереження ресурсної незалежності"
 SIA_maintain_resource_independence_desc: "Іноземні контракти можуть принести швидкий прибуток, але за ним слідує залежність. Зберігаючи контроль над нашими ресурсами, ми зберігаємо свободу спрямовувати їх відповідно до сіамських потреб, а не іноземних вимог."
 SIA_kasetsart_university: "Університет Касецарт"
 SIA_kasetsart_university_desc: "Якщо сільське господарство має стати продуктивнішим, воно повинно керуватися наукою, а не лише спадщиною. Університет Касецарт навчатиме агрономів, ветеринарів та технічних спеціалістів для модернізації сільського господарства."
 SIA_mahidol_university: "Університет Махідол"
 SIA_mahidol_university_desc: "Сучасна держава потребує лікарів, дослідників і адміністраторів так само, як солдатів та інженерів. Університет Махідол зміцнить вищу освіту і підготує кваліфіковані кадри, необхідні для національних реформ."
 SIA_silpakorn_university: "Університет Сілпакорн"
 SIA_silpakorn_university_desc: "TODO_CM"
 SIA_contingency_funds: "Резервні фонди"
 SIA_contingency_funds_desc: "Процвітання в мирний час має невелику цінність, якщо держава входить у кризу непідготовленою. Створюючи резервні фонди вже зараз, ми гарантуємо, що блокада, неврожай або раптова війна не зупинять одразу роботу державного механізму."
 SIA_contingency_funds_tt: "Ми збиратимемо резервний фонд у мирний час. Під час збору цього фонду ми отримаємо помірну кількість §Yфактора споживчих товарів§!.\n\nПід час війни ми можемо розкрити цей фонд, якщо захочемо, отримавши великий виробничий бонус.\nТе, як довго триватиме бонус фонду, залежить від того, як довго ми збирали фонд перед тим, як його застосувати."
 SIA_prepare_for_the_next_blockade: "Підготовка до наступної блокади"
 SIA_prepare_for_the_next_blockade_desc: "Якщо моря стануть ворожими, [ROOT.GetNameDef] може опинитися відрізаною від ринків, обладнання та палива. Тому ми повинні готуватися до наступної блокади вже зараз, створюючи запаси, плани на випадок надзвичайних ситуацій та замінники, перш ніж необхідність змусить нас діяти."
 SIA_domestic_arms_industry: "Вітчизняна військова промисловість"
 SIA_domestic_arms_industry_desc: "Королівство, яке змушене імпортувати кожну гвинтівку і снаряд, не може називати себе безпечним. Якими б скромними не були її починання, вітчизняна військова промисловість дозволить [ROOT.GetNameDef] озброювати своїх солдатів із власних майстерень і вистояти, коли іноземне постачання припиниться."
 SIA_war_material_substitutions: "Замінники військових матеріалів"
 SIA_war_material_substitutions_desc: "У час блокади ідеальний матеріал менш цінний, ніж доступний. Ми повинні вивчити замінники для металів, хімікатів та імпортних компонентів, щоб виробництво могло продовжуватися навіть тоді, коли іноземні товари більше не досягають наших берегів."
 SIA_royal_thai_ordnance_factory: "Королівський тайський збройовий завод"
 SIA_royal_thai_ordnance_factory_desc: "Безпечна держава потребує більшого, ніж імпортна зброя та розкидані ремонтні майстерні. Королівський тайський збройовий завод зосередить навички, обладнання та нагляд під керівництвом корони, даючи [ROOT.GetNameDef] постійний центр для виробництва зброї та боєприпасів."
 SIA_built_to_withstand_every_flame: "Побудовано, щоб витримати будь-яке полум'я"
 SIA_built_to_withstand_every_flame_desc: "Фабрика, що згорає за одну ніч, не може служити нації на ранок. Наші склади, заводи та майстерні повинні будуватися з урахуванням розосередження, вогнестійкості та аварійного захисту, щоб саботаж, бомбардування або аварія не могли так легко паралізувати виробництво."
 SIA_the_army_of_siam: "Армія Сіаму"
 SIA_the_army_of_siam_desc: "Стара структура наших збройних сил більше не відповідає вимогам часу. Якщо [ROOT.GetName] хоче захистити свій суверенітет та відстоювати свої інтереси за кордоном, ми повинні побудувати нову сучасну армію, оснащену, навчену та організовану для воєн, які зараз розгортаються по всьому світу."
 SIA_plan_for_a_short_war: "План короткої війни"
 SIA_plan_for_a_short_war_desc: "Наші ресурси обмежені, а наших ворогів може бути багато. [ROOT.GetNameDefCap] не може дозволити собі довгу війну на виснаження. Якщо війна прийде, вона має бути швидкою, рішучою і завершеною до того, як ворог зможе зібратися з силами."
 SIA_intermediate_war_preparation: "Підготовка до середньої війни"
 SIA_intermediate_war_preparation_desc: "Небезпечно готуватися лише до блискавичної кампанії, але й марнотратно організовуватися виключно для нескінченної боротьби. Збалансована доктрина дозволить [ROOT.GetName] завдавати ударів з енергією, зберігаючи при цьому витривалість, необхідну для зустрічі з більш упертим ворогом."
 SIA_prepare_for_a_long_war: "Підготовка до довгої війни"
 SIA_prepare_for_a_long_war_desc: "Великі держави можуть вирішити війну за місяці, але менші країни часто змушені витримувати їх роками. Тому ми повинні підготувати зброю, промисловість і транспорт [ROOT.GetAdjective] до довгого виснажливого конфлікту, в якому терпіння і стійкість мають таке ж значення, як і мужність."
 SIA_specialized_warfare: "Спеціалізована війна"
 SIA_specialized_warfare_desc: "Рельєф нашого регіону не сприяє однорідній армії. Гори, джунглі та річкові долини вимагають різних навичок. Створюючи спеціалізовані війська, ми можемо гарантувати, що [ROOT.GetNameDef] зустріне ворога з відповідною силою на будь-якому полі бою."
 SIA_artillery_reigns_supreme: "Артилерія панує нероздільно"
 SIA_artillery_reigns_supreme_desc: "Сучасна битва не виграється лише бойовим духом. Гармата залишається королем поля бою, розбиваючи опорні пункти, розтрощуючи атаки і прокладаючи шлях для нашої піхоти. Якщо ми хочемо тріумфувати, вогнева міць [ROOT.GetAdjective] має стати рясною та точною."
 SIA_yield_the_air_war: "Поступки в повітряній війні"
 SIA_yield_the_air_war_desc: "Ми не можемо сподіватися кинути виклик великим державам у небі на рівних умовах. Замість того, щоб марнувати дорогоцінні ресурси у змаганні, в якому ми навряд чи виграємо, ми зміцнимо нашу протиповітряну оборону і позбавимо ворожі літаки свободи безкарно бити по наших людях і містах."
 SIA_the_thunder_at_the_gates: "Грім біля воріт"
 SIA_the_thunder_at_the_gates_desc: "Існують фортеці, які звичайні гармати не можуть пробити, і атаки, які повинні бути заявлені з непереборною силою. Важка артилерія, облогові гармати та залізничні гармати дадуть [ROOT.GetNameDef] міць, щоб розбити ворота будь-якого ворога, який сприйме нашу стриманість за слабкість."
 SIA_night_time_training: "Нічні тренування"
 SIA_night_time_training_desc: "Сміливі атаки серед білого дня проти підготовленого ворога запрошують до катастрофи. Навчаючи наших людей проникненню, пересуванню та атаці під покровом темряви, ми можемо перехопити ініціативу, коли ворог сліпий, розгублений і найменш підготовлений до відповіді нам."
 SIA_steel_arteries: "Сталеві артерії"
 SIA_steel_arteries_desc: "Жодна армія не просунеться далеко без залізниць і доріг, що її забезпечують. Сталеві артерії нації повинні бути зміцнені, щоб війська, запаси і гармати могли бути швидко доставлені до кожного кордону, що перебуває під загрозою. У цій справі військова безпека і національний розвиток йдуть пліч-о-пліч."
 SIA_prepare_northern_infrastructure_for_war: "Підготовка північної інфраструктури до війни"
 SIA_prepare_northern_infrastructure_for_war_desc: "Північні підступи стануть життєво важливими в будь-якому змаганні з Бірмою і тими, хто стоїть за нею. Дороги, залізниці та склади в цьому регіоні повинні бути розширені негайно, щоб сили [ROOT.GetAdjective] могли наступати або чинити там опір без затримок."
 SIA_unconventional_tank_construction: "Нестандартне танкобудування"
 SIA_unconventional_tank_construction_desc: "Ми не можемо імітувати бронетанкові програми великих держав деталь за деталлю. Якщо [ROOT.GetNameDef] взагалі планує розгортати танки, ми повинні шукати дешевші та більш адаптивні методи будівництва, жертвуючи грандіозністю на користь кількості та практичності."
 SIA_conventional_tank_construction: "Традиційне танкобудування"
 SIA_conventional_tank_construction_desc: "Бронетехніка стала загальноприйнятим родом військ у сучасній війні, і імпровізовані рішення далеко нас не заведуть. Тому ми повинні створити належну танкову промисловість на основі надійних принципів, стандартних конструкцій та перевірених методів виробництва, гідних сучасної армії."
 SIA_reverse_engineer_allied_tanks: "Зворотня розробка танків Союзників"
 SIA_reverse_engineer_allied_tanks_desc: "Інші вже понесли витрати на експерименти. Захоплені танки та імпортовані машини можна розібрати, вивчити та імітувати. Навчаючись на іноземних конструкціях, [ROOT.GetName] може скоротити шлях до створення власних бронетанкових сил."
 SIA_tankettes: "Танкетки"
 SIA_tankettes_desc: "Легкі, дешеві та прості у виробництві, танкетки, можливо, й не вирішуватимуть великих битв самі по собі, але вони все ще можуть служити для розвідки, колоніальних воєн та підтримки піхоти. Для нації зі скромними коштами такі малі броньовані машини пропонують практичний вхід у механізовану війну."
 SIA_jungle_armor: "Броня у джунглях"
 SIA_jungle_armor_desc: "Джунглі нашого регіону — не місце для громіздких машин, створених для рівнин Європи. Якщо бронетехніка має служити [ROOT.GetNameDef], вона повинна бути адаптована до вузьких шляхів, поганого ґрунту і гнітючого клімату, промінявши вагу на мобільність там, де цього вимагають джунглі."
 SIA_mountain_tanks: "Гірські танки"
 SIA_mountain_tanks_desc: "Скелясті пагорби і гірські перевали не можна просто залишити піхоті. Створюючи компактні броньовані машини, пристосовані для пересіченої місцевості, ми зможемо дати нашим арміям засіб для доставлення захищеної вогневої моці в регіони, де звичайні танки не впораються."
 SIA_reluctant_submission: "Вимушене підкорення"
 SIA_reluctant_submission_desc: "Якщо [ROOT.GetNameDef] зіткнеться з вторгненням сильнішого ворога, може настати момент, коли відкритий опір обіцятиме лише руїну. Схилитися — гірко, але іноді уряд повинен поступитися, щоб врятувати націю від знищення і дочекатися більш сприятливого часу."
 SIA_reluctant_submission_trigger: "Цей фокус буде автоматично виконано, якщо на нас нападуть і ми оберемо варіант §YПідкорення§! у відповідній події."
 SIA_reluctant_submission_tt: "Ми зможемо укласти мир з атакуючою великою державою. Проте вони очікуватимуть, що ми друкуватимемо для них гроші.\nНаш фактор §YФабрик споживчих товарів§! буде зростати на §Y[?idea_SIA_printing_money_monthly_change|%]§! щомісяця, до максимуму у §Y[?idea_SIA_printing_money_monthly_change_max|%]§!.\n\nВзяття фокусу §Y$SIA_thai_rice_company$§! зменшить темп зростання на §G50%§!\n\nВзяття фокусу §Y$SIA_demand_repatriation$§! зніме необхідність друкувати гроші."
 SIA_seri_thai: "Сері Тай"
 SIA_seri_thai_desc: "Підкорення не повинно означати капітуляцію національного духу. Під поверхнею окупації та підпорядкування можна організувати лояльне підпілля, щоб зберегти справу незалежності, збирати розвіддані та підготувати день, коли [ROOT.GetName] знову повстане."
 SIA_contact_the_south_east_asia_command: "Зв'язок із командуванням Південно-Східної Азії"
 SIA_contact_the_south_east_asia_command_desc: "Якщо опір має стати чимось більшим, ніж просто сміливими жестами, він повинен бути прив'язаний до ширшої стратегії. Встановивши контакт з командуванням Союзників у Південно-Східній Азії, патріоти [ROOT.GetName] зможуть отримати керівництво, запаси і місце у великій боротьбі."
 SIA_broadcast_weather_reports_to_the_allies: "Трансляція прогнозів погоди Союзникам"
 SIA_broadcast_weather_reports_to_the_allies_desc: "Небо і моря регіону визначаються погодою не менше, ніж флотами та арміями. Надійні звіти з [ROOT.GetNameDef] можуть допомогти плануванню Союзників, захистити їхні операції від несподіванок і зробити нашу батьківщину мовчазним, але цінним партнером у їхній війні."
 SIA_american_investment_aid: "Американська інвестиційна допомога"
 SIA_american_investment_aid_desc: "Сполучені Штати володіють багатством, якого немає ні в кого в нашому регіоні. Якщо ми зможемо забезпечити американську допомогу та інвестиції для наших підпільних та національних зусиль, [ROOT.GetNameDef] отримає матеріальні засоби, щоб витримати труднощі і підготуватися до визволення."
 SIA_thai_students_in_the_oss: "Тайські студенти в OOS"
 SIA_thai_students_in_the_oss_desc: "Нове покоління патріотичної молоді може пройти підготовку за кордоном у мистецтві шпигунства, саботажу та нерегулярної війни. Відправивши надійних тайських студентів на орбіту розвідки Союзників, ми підготуємо здібних служителів для прихованої війни, що чекає попереду."
 SIA_prepare_to_drop: "Підготуватися до висадки"
 SIA_prepare_to_drop_desc: "Коли настане час визволення, Союзники можуть спробувати спуститися на нашу батьківщину з неба. Тому ми повинні визначити майданчики для приземлення, підготувати контакти та організувати мережі підтримки, щоб повітряно-десантні війська можна було прийняти та спрямувати туди, де вони найбільше потрібні."
 SIA_unseat_the_government: "Усунути уряд"
 SIA_unseat_the_government_desc: "Режиму, який прив'язав [ROOT.GetNameDef] до іноземного панування, не можна дозволити існувати вічно. Через опір, інтриги та своєчасні дії ми можемо усунути тих, хто скомпрометував націю, і відновити уряд, більш гідний Сіаму."
 SIA_unseat_the_government_tt: "[ROOT.GetName] покине свою нинішню фракцію і перейде на інший бік у війні, приєднавшись до §YСоюзників§!.\n\nЛоялісти повстануть проти цих змін, спровокувавши громадянську війну.\n\nЯкщо наша спільна підтримка становить §Yбільше 80%§!, ви усунете уряд і уникнете громадянської війни. Наша загальна підтримка становить §Y5%§! за кожного залученого генерала, на додачу до нашої демократичної підтримки.\n\nНаша підтримка від залучених генералів: §Y[?var:SIA_seri_thai_cw_scale|%]§!, а наша демократична підтримка: §Y[?var:party_popularity@democratic|%]§!"
 SIA_choose_new_leader_tt: "Оскільки старий режим зломлений, переможці повинні обрати, хто очолить новий уряд."
 SIA_the_phayap_army: "Армія Паяп"
 SIA_the_phayap_army_desc: "Якщо ми зв'язуємо свою долю з загарбником, то наші армії повинні отримати своє місце в новому порядку війни. Спеціальне польове командування для операцій на заході та півночі дозволить [ROOT.GetName] просуватися пліч-о-пліч зі своїм могутнім партнером і прагнути власних здобутків."
 SIA_securing_the_rubber_islands: "Захоплення каучукових островів"
 SIA_securing_the_rubber_islands_desc: "Каучук — це джерело життєвої сили сучасної війни, що забезпечує шини, ущільнювачі та незліченну кількість інструментів механізованого конфлікту. Багаті на ресурси території на південь від нас є водночас і можливістю, і необхідністю. Ми повинні діяти, щоб захистити їх, перш ніж це зроблять інші."
 SIA_breaking_the_burmese_line: "Прорив бірманської лінії"
 SIA_breaking_the_burmese_line_desc: "Бірма стоїть як бар'єр між нашими амбіціями і землями за нею. Якщо зброя [ROOT.GetAdjective] має довести свою цінність, ворожа лінія там повинна бути прорвана рішучістю, плануванням і зосередженим використанням сили."
 SIA_pacific_war: "Війна на Тихому океані"
 SIA_pacific_war_desc: "Конфлікт у Східній Азії більше не можна розглядати як віддалений. Війна на Тихому океані визначає долю всіх країн нашого регіону, і [ROOT.GetNameDef] має визначити своє місце в цій боротьбі — як послідовник, партнер чи жертва."
 SIA_joint_asian_military_command: "Об'єднане азійське військове командування"
 SIA_joint_asian_military_command_desc: "Наші зусилля будуть сильнішими, якщо їх координувати з зусиллями наших регіональних партнерів. Структура об'єднаного командування обіцяє більшу ефективність, чіткіше планування та спільний напрям кампаній, які інакше ризикують бути змарновані через суперництво та плутанину."
 SIA_demand_repatriation: "Вимагати репарацій"
 SIA_demand_repatriation_desc: "Ті, хто увійшов на нашу землю під приводом необхідності, заборгували [ROOT.GetNameDef]. Коли наші справи покращаться, ми повинні вимагати повернення того, що було взято, і змусити окупанта відшкодувати витрати на його вторгнення."
 SIA_standing_our_ground: "Стійкість до кінця"
 SIA_standing_our_ground_desc: "Настає момент, коли відступ і переговори обіцяють лише подальше приниження. [ROOT.GetNameDefCap] має показати, що вона все ще має волю стояти, битися і виганяти тих, хто бере на себе сміливість диктувати нам долю під дулом пістолета."
 SIA_standing_our_ground_trigger: "Цей фокус буде автоматично виконано, якщо на нас нападуть і ми оберемо варіант §YОпіру§! у відповідній події."
 SIA_ask_for_the_release_of_american_commodities: "Запит на розблокування американських товарів"
 SIA_ask_for_the_release_of_american_commodities_desc: "Американські запаси, обладнання і товари можуть надати перепочинок, якого потребує наша нація. Завдяки обережній дипломатії ми можемо подати запит на розблокування таких товарів, зменшивши дефіцит і зміцнивши матеріальну базу наших військових зусиль."
 SIA_japanese_fighters: "Японські винищувачі"
 SIA_japanese_fighters_desc: "Хоча наша власна авіаційна промисловість залишається слабкою, іноземні літаки можуть допомогти заповнити цю прогалину. Японські винищувачі в руках [ROOT.GetAdjective] принаймні дали б нам певну міру сучасної повітряної могутності, нехай навіть у межах, встановлених нашою промисловою слабкістю."
 SIA_get_off_our_shores: "Геть з наших берегів!"
 SIA_get_off_our_shores_desc: "Присутність іноземних військ на сіамській землі — це образа, яку не можна пом'якшити виправданнями. Силою зброї чи під тиском подій за кордоном, ми повинні наполягати на тому, щоб загарбник покинув наші береги і відновив гідність [ROOT.GetNameDef].\n\nВони боягузи, як і всі жорстокі люди. Тепер, забирайтеся з нашої землі!"
 SIA_singaporean_reinforcements: "Сінгапурські підкріплення"
 SIA_singaporean_reinforcements_desc: "Боротьба в Малайї та за її межами невіддільна від нашої власної безпеки. Підкріплення, залучені з сил, що збираються навколо Сінгапуру, могли б зміцнити нашу лінію, розширити співпрацю з Союзниками і зв'язати театр воєдино спільною метою."
 SIA_directorate_of_aeronautical_engineering: "Модифікує §YУправління авіаційної інженерії§! на:"
 SIA_aid_for_resources: "Допомога в обмін на ресурси"
 SIA_aid_for_resources_desc: "Наша нація має ресурси, яких бажають іноземні держави, і не має певних інструментів, які вони можуть надати. Розумний обмін допомоги на матеріали допоможе забезпечити [ROOT.GetNameDef] постачанням, гарантуючи при цьому, що наше багатство сприятиме нашому власному збереженню."
 SIA_aid_for_resources_tt: "Ми попросимо [JAP.GetNameDef] приєднатися до нашої війни в обмін на надання їм прав на видобуток каучуку в §Y[724.GetName]§!"
 SIA_how_quickly_the_tables_turn: "Як швидко все змінюється"
 SIA_how_quickly_the_tables_turn_desc: "Ті, хто колись ставився до [ROOT.GetNameDef] як до слабкої та покірної, можуть побачити, що баланс змінився на протилежний. Доля на війні змінюється швидко, і ми повинні бути готові схопити момент, коли наші гнобителі спіткнуться і ситуація нарешті обернеться проти них."
 SIA_how_quickly_the_tables_turn_trigger: "На нас напала велика держава, і ми змусили її капітулювати."
 SIA_royal_thai_navy: "Королівський військово-морський флот Таїланду"
 SIA_royal_thai_navy_desc: "Оборона [ROOT.GetNameDef] не закінчується на береговій лінії. Наші узбережжя, річки і морська торгівля вимагають флоту, гідного королівства. Зміцнюючи Королівський військово-морський флот Таїланду, ми гарантуємо, що Сіам залишиться господарем власних вод."
 modify_royal_thai_navy: "Модифікує §Y$idea_SIA_thai_royal_navy$§! на:"
 SIA_direct_army_fundings_towards_the_navy: "Спрямувати фінансування армії на флот"
 SIA_direct_army_fundings_towards_the_navy_desc: "Армія довго споживала левову частку військових витрат, проте стратегічні потреби [ROOT.GetNameDef] не є суто континентальними. Перенаправивши кошти на флот, ми зможемо почати виправляти цей дисбаланс і убезпечити моря, які захищають нашу торгівлю та узбережжя."
 SIA_thonburi_class_coastal_defense_ship: "Корабель берегової оборони класу Тонбурі"
 SIA_thonburi_class_coastal_defense_ship_desc: "Скромний флот все ще може мати гострі зуби, якщо він належним чином спроектований для місцевих умов. Клас Тонбурі пропонує [ROOT.GetNameDef] практичний засіб берегової оборони, поєднуючи солідну вогневу міць із роллю, що відповідає водам, які нам найбільше потрібно захищати."
 SIA_acquire_submarines: "Придбати підводні човни"
 SIA_acquire_submarines_desc: "Підводні човни дають невеликому флоту шанс завдати удару вище своєї вагової категорії. Сховані під хвилями, вони можуть загрожувати судноплавству, стримувати сильніші флоти і ускладнювати будь-які ворожі задуми проти нашого узбережжя. [ROOT.GetNameDefCap] не повинна нехтувати такою зброєю."
 SIA_submarine_day: "День підводника"
 SIA_submarine_day_desc: "Введення підводної війни в наш флот заслуговує на суспільне визнання і національний ентузіазм. Святкуючи день підводного флоту, ми можемо стимулювати набір персоналу, підняти престиж і закріпити в суспільній свідомості думку про те, що Сіам входить у нову військово-морську епоху."
 SIA_the_thonburi_dockyard_project: "Проект верфі Тонбурі"
 SIA_the_thonburi_dockyard_project_desc: "Флот не може підтримуватися лише імпортними корпусами. Якщо [ROOT.GetNameDef] має намір утримувати і розширювати свої військово-морські сили, вона повинна інвестувати у верфі, майстерні та робочу силу, які формують справжній фундамент морської могутності."
 SIA_expand_the_slipways: "Розширення стапелів"
 SIA_expand_the_slipways_desc: "Наші нинішні потужності занадто тісні для амбіцій, які зараз формуються. Збільшивши стапелі, ми розширимо наші можливості будувати і ремонтувати судна, що дозволить флоту зростати в розмірах і боєготовності."
 SIA_a_new_drydock: "Новий сухий док"
 SIA_a_new_drydock_desc: "Серйозне військово-морське обслуговування вимагає сучасного сухого доку. Без нього ремонт великих кораблів залишатиметься повільним, неефективним і залежним від іноземної допомоги. Новий сухий док дасть [ROOT.GetNameDef] більш жорсткий контроль над власним військово-морським майбутнім."
 SIA_install_heavy_cranes_and_power_plant: "Встановлення важких кранів та електростанції"
 SIA_install_heavy_cranes_and_power_plant_desc: "Суднобудування — це не лише деревина і сталь, а й техніка та енергія. Важкі крани та надійне електропостачання перетворять наші верфі з примітивних об'єктів на справжні інструменти сучасної промисловості."
 SIA_establish_the_foundry_and_machine_shop: "Створення ливарного та механічного цехів"
 SIA_establish_the_foundry_and_machine_shop_desc: "Суверенний флот вимагає більшого, ніж просто корпуси, зібрані з імпортних деталей. Створивши власне ливарне виробництво та механічний цех, ми зміцнимо промислові м'язи, які дозволять [ROOT.GetNameDef] відливати, формувати та ремонтувати життєво важливі компоненти військових кораблів вдома."
 SIA_the_thonburi_arsenal: "Арсенал Тонбурі"
 SIA_the_thonburi_arsenal_desc: "Верф без озброєння залишається неповноцінною. Створення арсеналу в Тонбурі дозволить виробляти і зберігати корабельні гармати, боєприпаси та відповідне обладнання, що ще тісніше прив'яже наш флот до національної промисловості."
 SIA_focus_on_commercial_civilian_ships: "Зосередитися на комерційних цивільних суднах"
 SIA_focus_on_commercial_civilian_ships_desc: "Не кожен закладений кіль повинен призначатися для бою. Торгові судна, транспортні кораблі та інші цивільні судна формують кровоносну систему національної економіки. Стимулюючи комерційне суднобудування, [ROOT.GetNameDef] зміцнює як процвітання, так і стійкість у воєнний час."
 SIA_empower_the_coastguard: "Посилення берегової охорони"
 SIA_empower_the_coastguard_desc: "Флот не може бути скрізь одночасно, і багато завдань прибережної безпеки краще виконувати більш легким службам. Посилена берегова охорона захистить наше рибальство, патрулюватиме наші береги і звільнить флот для протидії серйознішим загрозам."
 SIA_river_patrols: "Річкові патрулі"
 SIA_river_patrols_desc: "Річки [ROOT.GetNameDef] — це дороги, кордони і лінії життя водночас. Патрульні катери на цих водах допоможуть нам підтримувати порядок, підтримувати місцеві гарнізони і поширювати вплив держави в регіони, де віддалена столиця інакше діє надто повільно."
 SIA_sell_bangkok_dock_co: "Продаж компанії Bangkok Dock Co"
 SIA_sell_bangkok_dock_co_desc: "Приватний капітал може здійснити те, що державне управління робить занадто повільно. Продавши компанію Bangkok Dock Company у надійні руки, ми можемо залучити інвестиції, стимулювати ефективність і перенаправити державні кошти на більш нагальні військові потреби."
 SIA_a_race_against_time: "Гонка з часом"
 SIA_a_race_against_time_desc: "Наш флот застарілий, недофінансований і не підготовлений до сучасної війни. Кошти повинні бути негайно перенаправлені на суднобудування, ремонт, берегову оборону та військово-морську підготовку. Годинник цокає швидше, ніж працюють наші верфі."
 SIA_a_race_against_time_tt: "Після закінчення дії духу ми отримаємо: "
 SIA_a_race_against_time_tt2: "на §Y280§! днів"
 #Tech
 the_thunder_at_our_gates_artillery: "Грім біля наших воріт"
 SIA_siamese_tankettes: "Сіамські танкетки"
 SIA_siamese_tankettes_desc: "Наша армія освоїла свій парк легких танкеток, підвищивши їхню надійність і знизивши витрати на їх утримання в польових умовах."

