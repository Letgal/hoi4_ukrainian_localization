 idea_SIA_short_war_temp_debuff: "Виснаження від короткої війни"
 SIA_no_supply_grace_tt: " $MODIFIER_NO_SUPPLY_GRACE$ $RIGHT|+=1$ год"
 idea_SIA_standing_our_ground_mission_temp_buff: "Стійкість до кінця"
 idea_SIA_german_tank_studies: "Вивчення німецьких танків"
 idea_SIA_german_tank_studies_desc: "Наші офіцери витратили час на вивчення іноземної бронетанкової доктрини та конструкцій, повернувшись із технічними знаннями, які безпосередньо впливають на розвиток наших власних бронетанкових сил."
