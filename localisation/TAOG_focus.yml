 # <Military Branch - Modernize our Army>
 INS_revolution_ended_tt: "The National Revolution has concluded"

 # <Empower the Volksraad>
 INS_the_jewel_in_the_crown: "The Jewel in the Crown"
 INS_the_jewel_in_the_crown_desc: "The East Indies are the brightest jewel in the Dutch colonial crown, and we intend to keep it that way. Through the Volksraad, our voice carries to The Hague."
 INSHOL_java: "$HOL_java$"
 INSHOL_java_desc: "$HOL_java_desc$"
 INSHOL_sumatra: "$HOL_sumatra$"
 INSHOL_sumatra_desc: "$HOL_sumatra_desc$"
 INSHOL_borneo_and_the_grote_oost: "$HOL_borneo_and_the_grote_oost$"
 INSHOL_borneo_and_the_grote_oost_desc: "$HOL_borneo_and_the_grote_oost_desc$"
 INSHOL_foundations_of_defense: "$HOL_the_foundations_of_defense$"
 INSHOL_foundations_of_defense_desc: "$HOL_the_foundations_of_defense_desc$"
 INSHOL_investments_in_civ_railways_tt: "If [HOL.GetFlag]§Y[HOL.GetName]§! completes the focus:\n         ([INS.GetFlag]§Y[INS.GetName]§!): Add §Y£autonomy_texticon -250.00§!\n   If [INS.GetFlag]§Y[INS.GetName]§! completes the focus:\n         Add §Y£autonomy_texticon 250.00§!"
 INSHOL_investments_in_civ_railways: "Investments in Civilian Railways"
 INSHOL_investments_in_civ_railways_desc: "Winning over the support of the people of the Indies requires investing in civilian infrastructure. Currently, our railways are primarily used for cargo transportation. We should purchase passenger trains to run across our pre-existing railways in Java and Sumatra."
 INSHOL_continue_exclusive_rights: "Exclusive Rights for De Javasche Bank"
 INSHOL_continue_exclusive_rights_desc: "The East Indies Guilder has lost most of its value during the great depression, and our economic growth has reached a standstill. We could try to stabilize the Guilder by giving the Bank of Java exclusive printing rights, which it had until 1922."
 INSHOL_peg_indies_guilder_to_dutch_guilder: "Peg the Indies Guilder to the Dutch Guilder"
 INSHOL_peg_indies_guilder_to_dutch_guilder_desc: "The East Indies Guilder has lost most of its value during the great depression, and our economic growth has reached a standstill. The easiest solution is to peg the Indies Guilder to the Dutch Guilder, a far more stable currency. This will also tie us closer to our overlord."
 INSHOL_peg_indies_guilder_to_us_dollar: "Peg the Indies Guilder to the US Dollar"
 INSHOL_peg_indies_guilder_to_us_dollar_desc: "The East Indies Guilder has lost most of its value during the great depression, and our economic growth has reached a standstill. While we could peg the Indies Guilder to the Dutch Guilder, the US dollar is a far more stable currency. Pegging the Guilder to the Dollar also allows us to have more economic independence, making self rule a more attainable goal."
 indonesia_currency_pegged_to_dollar_modifier: "Indies Guilder pegged to the US Dollar"
 INS_direct_rule_tt: "Unlocks the §Y$INS_direct_rule_occupation_law$§! occupation law in indonesian princely states.\nEffects:\n     §GIncreases§! factories and resources from the state\n     §RDecreases§! compliance growth\n     §RIncreases§! resistance growth"
 INS_local_autonomy_tt: "Unlocks the §Y$INS_local_autonomy_occupation_law$§! occupation law in indonesian princely states.\nEffects:\n     Gives §Ysmall§! boosts all around\n     §GIncreases§! compliance growth"
 INS_invest_in_batavian_education_req_tt: "Has successfully completed at least §Y3§! Volksraad missions"
 INS_invest_in_batavian_education_req_2_tt: "Has successfully completed at least §Y6§! Volksraad missions"
 INSHOL_eventual_autonomy_req_tt: "Has successfully completed at least §Y4§! Volksraad missions"
 indonesia_volksraad_passed_12: "The Indonesian national flag has been officially recognized "
 INS_stronghold_java_tt: "Any Indonesian State: Is not occupied by [ROOT.GetFlag][ROOT.GetNameDefCap]"
 INSHOL_request_east_timor: "Demand the Return of East Timor"
 INSHOL_request_east_timor_desc: "Timor has no right being occupied by Portugal, it is a remnant of colonial history that we mustn’t continue to tolerate, for it is rightful Indonesian territory. We will issue a formal demand to Portugal that they return Timor to us immediately."

 INS_resist_occupation: "Resisting Occupation"
 INS_resist_occupation_desc: "The anger held by many Indonesians against the Netherlands cannot allow us to fall to Fascism. We must do all that we can to resist the Japanese invasion and defend the motherland."
 INS_local_resistance: "Local Resistance"
 INS_local_resistance_desc: "We will establish resistance cells in territory that hasn’t been occupied yet, ensuring that if it does get occupied, we will be prepared to take it back when the time is right."
 INS_stronghold_java: "Stronghold Java"
 INS_stronghold_java_desc: "The Indies is a vast archipelago home to many peoples and extremely harsh terrain. Attempting to defend every last island, jungle, and mountain from an army far greater than ours is guaranteed to fail. While it is not easy to abandon our fellow men, evacuating all islands but Java, allowing us to station our entire army there, may be the best move for the nation as a whole."
 INS_silence_nationalists: "Silence the Nationalist Symphasizers"
 INS_silence_nationalists_desc: "The Japanese invasion has caused the revolutionary nationalist movements to begin supporting the Japanese invaders due to their shared enemy of the Netherlands. The instability resulting from the invasion has caused these movements to grow at a pace never seen before. If we do not do something about it now, it may grow entirely out of our control."
 INS_east_indies_exile_government: "East Indies Exile Government"
 INS_east_indies_exile_government_desc: "Alas, despite our best efforts, the Indies have fallen. We cannot lose hope yet, however. We must continue to do all we can with the limited resources available to us. We may have lost the battle, but we have not yet lost the war."
 INS_establish_nefis: "Establish NEFIS"
 INS_establish_nefis_desc: "We will create the Netherlands East Indies Forces Intelligence Service together with the Allies, which we will station in Australia. Through this we will conduct clandestine operations to sabotage the Japanese occupying forces. Through each small victory, we move closer to our return to the homeland."
 INS_evacuate_soldiers_to_australia: "Evacuate Soldiers to Australia"
 INS_evacuate_soldiers_to_australia_desc: "We will create a military base near the NEFIS base in Northern Australia. There, we will station the KNIL soldiers who avoided capture during the occupation, allowing us to continue fighting."
 INS_australian_weapons: "Australian Weapons"
 INS_australian_weapons_desc: "Clandestine operations are not easy to operate, and we will need proper equipment in order to succeed. We can license Australian factories and repurpose them to produce weapons for the NEFIS."

 INS_defenders_of_homeland: "Defenders of the Homeland"
 INS_defenders_of_homeland_tt: "This focus will be automatically completed if the Defenders of the Homeland are established."
 INS_resist_occupation_tt: "This focus will be automatically completed if we get invaded and do not surrender."
 INS_defenders_of_homeland_desc: "The Indies Government has fallen, and a new regime has taken its place. Led by the Nationalists and the Japanese Government, we will create a new army superior to the KNIL, and win the war. However, there is no denying that this alliance between Nationalists and Imperialists is fragile. Will the alliance last, or will it end in bloodshed?"
 INS_embrace_co_prosp_sphere: "Embrace the Co-Prosperity Sphere"
 INS_embrace_co_prosp_sphere_desc: "We have finally ended Dutch rule, and while we have just replaced one overlord with another, the promises of economic prosperity and pan-asianism are very enticing. We will continue to help the Japanese war effort in order to ensure the Netherlands will never attempt to come back for Indonesia."
 INS_seize_oppurtunity: "Seize the Opportunity"
 INS_seize_oppurtunity_desc: "[JAP.GetNameDefCap] is losing, and their occupation government is weak. For the first time in many centuries, we have a real chance of breaking the shackles around Indonesia for good, creating an independent nation. If we do not take this opportunity to declare independence now, there’s no telling how long it will take until we get the next one."
 INS_japanese_resource_infrastructure: "Fund the Greater War Effort"
 INS_japanese_resource_infrastructure_desc: "Giving control over our core resource extraction infrastructure to [JAP.GetNameDef] is a necessary step towards winning the war, as it is of utmost priority that [JAP.GetAdjective] units remain fully supplied at all times. [JAP.GetNameDefCap] will also be developing our local infrastructure in order to increase efficiency of resource exports."
 INS_japanese_army_training: "Reform the Army"
 INS_japanese_army_training_desc: "We have a lot to learn from our [JAP.GetAdjective] overlords, and now that the KNIL is disbanded, we should create a new army taught by the IJA, ready to defend Indonesia from outside threats."

 INS_governor_general_de_jonge: "Governor General de Jonge"
 INS_governor_general_de_jonge_desc: "Bonifacius Cornelis de Jonge is known for ruling with an iron fist, opposing any form of nationalism and often ignoring the wishes of the Volksraad. His rule over the Indies has lasted a long time, and his experience stretches all the way back to the great war where he served as the Indies Minister of War."
 INS_governor_general_tjarda: "Governor General Tjarda"
 INS_tjarda_explain_tt: "§YBonifacius Cornelis de Jonge§!'s term has expired, and §YAlidius Tjarda van Starkenborgh Stachouwer§! was chosen as a replacement Governor in September of 1936."
 INS_governor_general_tjarda_desc: "Alidius Tjarda van Starkenborgh Stachouwer has a slightly different vision for the Indies than his predecessor. While he is still opposed to Nationalism, he has slightly more liberal policies and is more willing to listen to the wishes of the Volksraad."
 INS_electrical_investments: "Electrical Investments"
 INS_electrical_investments_desc: "Every European industrialized nation has a strong electrical grid to support their industry. If we want to stop relying on material exports and create our own manufacturing industry like them, we should build a high capacity electrical grid that stretches across the entirety of Java."
 INS_reduce_land_taxes: "Reduce Land Taxes"
 INS_reduce_land_taxes_desc: "The high taxes imposed on land ownership has made it difficult for native Indonesians to own plantations and businesses. While this has made it easy for us to hold a monopoly on the rubber industry, it has caused economic problems throughout the country. We should consider reducing these taxes to their previous rates, making it possible for smaller, privately owned rubber plantations to operate."
 INS_invest_in_batavian_education: "Investments in Batavian Education"
 INS_invest_in_batavian_education_desc: "The Volksraad has made it clear that the will of the Indonesian people is for education to become more accessible, as currently it is primarily Dutch Indonesians and the small group of Indonesian elite who can afford it. In order to comply with the Volksraad motion, we should construct several primary and secondary schools in and around Batavia."
 INS_javanese_education_investments: "Javanese Education Investments"
 INS_javanese_education_investments_desc: "In addition to our ongoing project to construct primary and secondary schools, we could build a community college and specialized vocational schools, which would make further education much more accessible for middle-class families."

 INS_allow_local_autonomy: "Allow Local Autonomy"
 INS_allow_local_autonomy_desc: "The Vorstenlanden system granting princely states self governance has made nationalist movements much easier to manage and increased the stability of the nation as a whole. We should increase the level of autonomy granted to princely states even more, allowing the government to focus on more important matters."
 INS_direct_rule: "Direct Rule"
 INS_direct_rule_desc: "The Vorstenlanden system granting princely states self governance has added a layer of difficulty to administration, requiring additional bureaucracy and wasting time. It is time to abolish the system altogether and enforce direct rule over the entire archipelago."

 INS_seize_oppurtunity_tt: "§Y[JAP.GetFlag][JAP.GetName]§! has been pushed back, and controls less than §Y[?var:temp_states_plus_more]§! states. (currently: §Y[?var:JAP.num_controlled_states]§!)"
 INS_seize_oppurtunity_refuse_warn_tt: "§RThe national revolution will begin, which may lead to a war with [HOL.GetNameDef]§!."

 INS_economic_stabilization: "Economic Stabilization"
 INS_economic_stabilization_desc: "The great depression and worldwide protectionism has left us economically crippled, and many Indonesians who once worked in the raw materials industry have found themselves without a job. We must take drastic measures and create a labour program where citizens without a job will be assigned one."
 INS_restore_order_in_indies: "Restore Order in the Indies"
 INS_restore_order_in_indies_desc: "The rising nationalist movement in the Indies has destabilized several regions, and could grow out of control if we do not stop it. We must restore order and stability as our top priority."
 INS_detangle_supply_chains: "Detangle the Supply Chains"
 INS_detangle_supply_chains_desc: "Our export economy requires goods to go through dozens of middlemen until it finally reaches the final destination, each time requiring a fee, a tax, or any other reason for them to take a little off the top. We should work to detangle this mess and control the majority of the supply chain directly."
 INS_prioritize_industrial_growth: "Prioritize Industrial Growth"
 INS_prioritize_industrial_growth_desc: "Our export economy is too volatile and keeps us dependent on Dutch collaboration. We should work on establishing a manufacturing industry by building factories across Batavia. We could become the most industrialized country in the pacific"
 INS_closer_economic_ties_to_netherlands: "Closer Economic Ties to the Netherlands"
 INS_closer_economic_ties_to_netherlands_desc: "We have a lot to learn from our overlord, especially economically. If we were to further integrate our export economy with the Netherlands, we could utilize their infrastructure and connections to secure more lucrative trade deals."

 INS_prioritize_dutch_companies: "Prioritize Dutch Companies"
 INS_prioritize_dutch_companies_desc: "Dutch companies such as Shell and Fokker have been the backbone of our economy for centuries now, with our raw material exports being heavily integrated with Shell. This has brought significant wealth to the Indies, and we should prioritize them over smaller, local businesses in order to ensure our cooperation remains strong."

 INSHOL_java_factories: "Open Weapons Factories in Java"
 INSHOL_java_factories_desc: "While basic, there is no denying that simply building more arms factories goes a long way towards improving the strength of an army. As the industrial powerhouse of the colony, Java is an obvious location to build them in."
 INSHOL_license_dutch_weapon_blueprints: "License Dutch Weapon Blueprints"
 INSHOL_license_dutch_weapon_blueprints_desc: "Rather than investing in building an entire domestic manufacturing process and creating our own technology designs, we should cooperate with Dutch companies in order to purchase their weapon blueprints."
 INSHOL_bangka_production_lines: "Bangka Production Lines"
 INSHOL_bangka_production_lines_desc: "The exponential development of Bangka’s infrastructure as a result of the Bangka Project has turned this once tiny, mostly unimportant island into the perfect site for new industrial projects. We have an opportunity to strengthen the KNIL by building a new weapon factory in Bangka, which, due to the island's concentrated roads, railways, and ports, will operate more efficiently than if we had built them elsewhere."
 INSHOL_artillerie_inrichtingen: "Artillerie Inrichtingen"
 INSHOL_artillerie_inrichtingen_desc: "Artillerie Inrichtingen has been manufacturing artillery and other arms in the Netherlands for over 250 years, and has been operating in the Indies for several decades. Expanding their manufacturing capabilities by opening new manufacturing facilities in the Indies would significantly improve the capabilities of the KNIL, whilst strengthening the economy of underfunded areas by creating new jobs."
 INSHOL_ai_pyrotechnische: "Artillerie Inrichtingen Pyrotechnische"
 INSHOL_ai_pyrotechnische_desc: "Continuing the expansion of Artillerie Inrichtingens production facilities within the East Indies, we should fund the establishment of an East Indies division of Artillerie Inrichtingen’s pyrotechnical subsidiary."
 INSHOL_bio_pharma: "Bio Pharma"
 INSHOL_bio_pharma_desc: "Expanding the Indies pharmaceutical industry is the obvious next step in reforming the KNIL, in order to ensure wounded soldiers receive adequate treatment and recover safely. The prevalence of quinine in the Indies makes the cost of this project substantially lower than normal."
 INSHOL_develop_fighters: "Develop New Fighters"
 INSHOL_develop_fighters_desc: "We will send Batavian engineers to Amsterdam to study Fokker’s fighter production firsthand, gaining access to its closely guarded manufacturing secrets. They will return with the knowledge and technical expertise required to establish a modern domestic fighter industry in the Indies."
 INSHOL_develop_bombers: "Develop New Bombers"
 INSHOL_develop_bombers_desc: "We will send Batavian engineers to Amsterdam to study Fokker’s bomber plane production firsthand, gaining access to its closely guarded manufacturing secrets. They will return with the knowledge and technical expertise required to establish a modern domestic bomber industry in the Indies."
 INSHOL_bandung_aircraft_facility: "Bandung Aircraft Manufacturing Facility"
 INSHOL_bandung_aircraft_facility_desc: "While blueprints and manufacturing secrets are useful, they’re useless until we build planes from them. We will open new aircraft facilities in Bandung in order to meet the current needs of the ML-KNIL."
 INSHOL_netherlands_indies_air_doctrine: "The Netherlands-Indies Air Doctrine"
 INSHOL_netherlands_indies_air_doctrine_desc: "We will study the air forces of nations facing challenges similar to our own, drawing on their hard-won experience to shape a doctrine suited to the realities of the East Indies, without repeating these historical mistakes."
 INSHOL_manado_military_academy: "Makassar Military Academy"
 INSHOL_manado_military_academy_desc: "Establishing a military academy outside of Java will help mitigate our manpower shortage significantly by making conscription feasible in the eastern islands. Makassar, located around the middle of the East Indies is the perfect location for it."
 INSHOL_infantry_training_in_borneo: "Infantry Training in Borneo"
 INSHOL_infantry_training_in_borneo_desc: "The East Indies are defined by dense jungles, rugged mountains, and unforgiving terrain. Our soldiers, primarily based in Java, are woefully unprepared to fight in these conditions. We must expand military training beyond Java and conduct exercises in harsher environments. Few places on earth rival the jungles and mountains of Borneo, making it the perfect spot to train world-class rangers."
 INSHOL_knil_engineers: "Genie Corps"
 INSHOL_knil_engineers_desc: "We mustn't focus all our efforts on infantry and rifle production, and remember that logistics and communications play an essential role in winning battles. We should train engineers and fund Batavian vocational schools to ensure our army is not bottlenecked by poor logistics."
 INSHOL_work_with_oil_barons: "Cooperate With the Oil Barons"
 INSHOL_work_with_oil_barons_desc: "The Great Depression has left our export based economy in a depressing state. It might be time to consider offloading some of the trade negotiations to the oil barons of Sumatra, in order to guarantee the oil gets sold. This will however come at a cost, as for them to agree to this deal, we will need to sell the oil at prices significantly lower than the market rate."
 INSHOL_rubber_taxation: "Rubber Taxation"
 INSHOL_rubber_taxation_desc: "Dutch investment and expertise have transformed the rubber plantations of the East Indies into one of the Empire’s most valuable assets. It is only just that the Crown claims its rightful share of the wealth it has created. Though certain local politicians protest, the interests of the Empire cannot be dictated by provincial agitation."
 INSHOL_padang_port: "International Port in Padang"
 INSHOL_padang_port_desc: "Resources produced in Padang must first be routed through Java before reaching international markets, as the region lacks facilities capable of handling large convoys. This unnecessary detour strains our supply chain and limits Sumatra’s economic potential. By constructing a major cargo harbor in Padang, we can remove this detour, increasing the profitability of Padang’s plantations."
 INSHOL_subsidize_bauxite: "Subsidize Bauxite Projects"
 INSHOL_subsidize_bauxite_desc: "The ongoing project in the Indies to modernize the bauxite-rich Bangka-Belitung islands is very promising, and the potential for long term profit is high. We should support the Indies government with economic subsidies in order to expedite the project."
 INSHOL_agricultural_subsidies: "Privatize the Agricultural Sector"
 INSHOL_agricultural_subsidies_desc: "By permitting the establishment of privately owned farms of varying sizes, we can accelerate infrastructure development in underfunded rural regions while simultaneously increasing government revenue. To achieve this, we will establish a structured tax framework wherein all tax income generated by these farms is remitted directly to the Netherlands, rather than first going through the Indies."
 INSHOL_import_sugar: "Import Sugar"
 INSHOL_import_sugar_desc: "We will mandate price controls in the growing agricultural sector in the Indies in order to import all of the nation's sugar from plantations in the Indies, at prices no other government can match, and establish a government monopoly on sugar."
 INSHOL_import_lumber: "Import Lumber"
 INSHOL_import_lumber_desc: "We will mandate price controls in the growing agricultural sector in the Indies in order to import all of the nation's lumber from plantations in the Indies, at prices no other government can match, and establish a government monopoly on lumber."
 INSHOL_industrialized_colony: "The Industrialized Colony"
 INSHOL_industrialized_colony_desc: "The East Indies, once a humble colony, has become one of the most industrialized, wealthy regions in all of Asia. This marks a monumental moment in the history of the Netherlands, and humanity. Our efforts have paid off, and we will continue to invest in the development of our colony, and reestablish the Netherlands as a global power once more."
 INS_no_peta_tt: "Indonesia will be unable to cooperate with foreign invaders."
 INSHOL_economic_integration: "Economic Integration"
 INSHOL_economic_integration_desc: "The Dutch East Indies is the shining jewel of our Empire, their prosperity secured through the steady leadership of the Queen, the Prime Minister, and the Governor-General. This stability must not be endangered by reckless calls for independence, which would bring only disorder and decline. We will bind the economies of the Netherlands and the Indies ever tighter, ensuring continued stability and greatness."

 INSHOL_republic_of_indonesia: "The Republic of Indonesia"
 INSHOL_republic_of_indonesia_desc: "When the Netherlands begrudgingly agreed to the Soetardjo Petition, the resulting legislation bound Indonesian Independence to a long list of conditions to qualify as economically. self-sufficient. Despite this, these conditions have now been met in full thanks to the determination held by the Indonesian people, and the Netherlands has no choice but to accept our formal declaration of independence."
 INSHOL_propose_malay_unification: "Propose Malay Unification"
 INSHOL_propose_malay_unification_desc: "Indonesia is an archipelago home to hundreds of cultures, languages, and ethnicities. While some are similar, others are distinctly different. Yet through the shared struggle of colonial rule, we have found unity under one nation; Indonesia. Perhaps we should ask ourselves why this unity must stop here, when across the straits the people of Malaya share much the same history and aspirations as our own?"
 INSHOL_singapore_compromise: "The Singapore Compromise"
 INSHOL_singapore_compromise_desc: "Singapore is Indonesian land in history and culture, and it is only natural that it should be included in a united Indonesia. Yet Britain is not willing to give up Singapore due to its strategic importance and necessity as a military base. We should propose a compromise wherein Singapore joins the union, on the condition that Britain retains the right to station forces on the island."
 INSHOL_request_ceylon: "Request Transfer of Ceylon"
 INSHOL_request_ceylon_desc: "The British colony of Ceylon shares deep cultural and linguistic ties with the wider Malay world. As the pan-Malayan federation of Maphilindo grows, it is only natural that this island too should find its place within the confederation."
 INSHOL_papua_referendum: "The Papua Referendum"
 INSHOL_papua_referendum_desc: "Today, the island of Papua is divided between Indonesia and Australia. While our investments and development have transformed our half into a growing and prosperous region, the Australian-administered territory remains neglected and underdeveloped. The future of the island should rest in the hands of its people, and therefore we must demand an official referendum on the unification of Papua."
 INSHOL_invite_phillipines: "Propose Maphillindo"
 INSHOL_invite_phillipines_desc: "The many peoples of our union speak different languages and uphold different traditions, yet nearly all trace their roots to the Malay world. We should reform our union state into a pan-Malayan confederation, inviting the Philippines as a member state. What was once several insignificant colonies will now stand strong as Southeast Asia’s regional power."

