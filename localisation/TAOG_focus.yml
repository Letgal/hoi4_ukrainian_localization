 idea_SIA_land_war_in_asia: "Наземна війна в Азії"
 # Alternative Communist Focus
 SIA_the_peoples_war_in_asia: "Народна війна в Азії"
 SIA_the_peoples_war_in_asia_desc: "Боротьба проти [JAP.GetAdjective] імперіалізму — це не просто змагання між державами. Це війна робітників, селян і солдатів проти домінування з-за кордону. Підтримуючи комуністичні сили в Китаї, [ROOT.GetNameDef] бере на себе зобов'язання до ширшої народної війни по всій Азії."


 SIA_peoples_war_in_asia_idea: "Народна війна в Азії"
 SIA_peoples_war_in_asia_idea_desc: "Війну підтримують не лише регулярні формування. Місцеві комітети, партизанські провідники та селянські колони постачання тепер служать армії в польових умовах. Кожне село стає складом, кожна дорога — можливою засідкою, а кожен відступ — шансом затягнути ворога глибше вглиб країни."

 # Alternative Nationalist Focus
 SIA_national_defense_in_asia: "Національна оборона в Азії"
 SIA_national_defense_in_asia_desc: "Оборона Азії вимагає дисципліни, ієрархії та спільної стратегічної мети. Виступаючи на боці націоналістичного уряду Китаю, [ROOT.GetNameDef] приєднується до коаліції, сповненої рішучості протистояти [JAP.GetAdjective] експансії за допомогою організованих армій та скоординованого командування."
 SIA_national_defense_in_asia_tt: "§Y[ROOT.GetNameWithFlag]§! об'єднується з націоналістичними силами в Об'єднаному фронті.\nДодає §Y$SIA_national_defense_in_asia_idea$§!, що надає:\n $MODIFIER_ARMY_ORG_FACTOR$: §G+5%§!\n $MODIFIER_PLANNING_SPEED$: §G+10%§!\n $MODIFIER_MAX_PLANNING$: §G+10%§!\n $MODIFIERS_ARMY_DEFENCE_FACTOR$: §G+5%§!"
 SIA_stronger_together: "Сильніші разом"
 SIA_stronger_together_desc: "Війна перетворила далекі обіцянки та паралельні альянси на не більше ніж перешкоди. Якщо [ROOT.GetNameDef] хоче визначати курс Азії, ми повинні попросити наших партнерів прив'язати їхню фракцію до нашої і прийняти єдине командування в майбутній боротьбі."
 idea_SIA_national_defense_in_asia: "Національна оборона в Азії"


 SIA_directorate_of_aeronautical_engineering_desc: "Майбутнє повітряних сил [ROOT.GetNameDef] не забезпечуватиметься лише пілотами. Воно потребує інженерів, інспекторів, майстерень та центрального органу, здатного перетворювати іноземні закупівлі на справні літаки. Управління авіаційної інженерії стане фундаментом цих зусиль."

 idea_SIA_aeronautical_engineering_directorate: "Управління авіаційної інженерії"

 SIA_standardize_aircraft_maintenance: "Стандартизація технічного обслуговування літаків"
 SIA_standardize_aircraft_maintenance_desc: "Наші літаки надходять з багатьох джерел, кожне з яких має власні запчастини, інструменти та звички ремонту. Стандартизувавши процедури технічного обслуговування під егідою Управління, [ROOT.GetNameDef] зможе утримувати більше літаків у повітрі та зменшити втрати, спричинені плутаниною на землі."

 SIA_expand_aircraft_workshops: "Розширення авіаційних майстерень"
 SIA_expand_aircraft_workshops_desc: "Управління потребує більшого, ніж офіси та інспекторські папери. Нові майстерні, верстати та навчені механіки дозволять ремонтувати пошкоджені літаки всередині країни, тоді як прості компоненти можна буде виробляти, не чекаючи іноземних поставок."

 SIA_license_modern_airframes: "Ліцензування сучасних планерів"
 SIA_license_modern_airframes_desc: "[ROOT.GetNameDefCap] ще не може сама спроектувати кожен потрібний їй літак. Більш практичним курсом є ліцензування іноземних моделей, вивчення їхньої конструкції та адаптація їх до нашого клімату, аеродромів та умов постачання під наглядом Управління."

 SIA_tropical_air_operations: "Повітряні операції в тропіках"
 SIA_tropical_air_operations_desc: "Спека, вологість, мусонні дощі та нерівні передові аеродроми висувають власні вимоги до літаків та екіпажів. Адаптуючи двигуни, графіки технічного обслуговування та доктрину пілотів до цих умов, Управління може зробити наші військово-повітряні сили надійнішими в небі над Південно-Східною Азією."

 ###################
 #### AUSTRALIA ####
 ###################
 effects_of_event_tt: "\n§YНаслідки події§!:"
 AST_war_is_coming: "Війна наближається"
 AST_war_is_coming_desc: "Протягом останніх трьох десятиліть ми стикалися з одним викликом за іншим, проте попереду маячить ще один, останній, який назавжди випробує на міцність австралійську демократію. Колишній прем'єр-міністр Біллі Г'юз висловлюється з цього приводу дуже чітко, і було б безвідповідально з нашого боку ігнорувати його заяви про те, що — подобається нам це чи ні — війна наближається."
 AST_war_is_coming_tt: "\nРозблоковує §YДемократичні вибори§!"
 AST_war_is_coming_uap_advisors_tt: "§Y$AST_billy_hughes$§!:"
 AST_war_is_coming_alp_advisors_tt: "§Y$AST_james_scullin$§!:"
 AST_war_is_coming_decrease_advisors_tt: "§Y$AST_maurice_blackburn$§!:"
 AST_war_is_coming_advisors_tt: "\nЗмінює політичного радника на:"
 AST_advance_pacific_initiatives: "Просування тихоокеанських ініціатив"
 AST_advance_pacific_initiatives_desc: "Завдяки укладеним пактам про ненапад наші відносини з азійськими сусідами покращилися. Ми продовжимо максимально використовувати ці зв'язки та закличемо наших нових союзників допомогти нашому промисловому розвитку."
 AST_advance_pacific_initiatives_tt: "\nУкласти пакт про ненапад з:"
 AST_advance_pacific_initiatives_jap_tt: " §Y[JAP.GetName]§!, щоб додати §G2§! позамапові §YВерфі§! до ефектів."
 AST_advance_pacific_initiatives_ins_tt: " §Y[INS.GetName]§!, щоб додати §G1§! позакартовий §YНафтопереробний завод§! до ефектів."
 AST_advance_pacific_initiatives_chi_tt: " §Y[CHI.GetName]§!, щоб додати §G2§! позамапові §YФабрики§! до ефектів."
 AST_advance_pacific_initiatives_jap_2_tt: "§Y[JAP.GetName]§! пропонує:"
 AST_advance_pacific_initiatives_ins_2_tt: "§Y[INS.GetName]§! пропонує:"
 AST_advance_pacific_initiatives_chi_2_tt: "§Y[CHI.GetName]§! пропонує:"
 AST_advance_pacific_initiatives_2_tt: "\nБудівлі будуть видалені, якщо почнеться війна з відповідною нацією."
 AST_pacific_initiatives_modifier: "Дипломатичні ініціативи"
 AST_domestic_industry: "Вітчизняна промисловість"
 AST_domestic_industry_desc: "Ми не можемо покладатися на оборонну промисловість союзників у разі війни. Ми повинні розширювати власну промисловість, щоб бути готовими до того, що насувається."
 AST_a_democratic_bulwark: "Демократичний оплот"
 AST_a_democratic_bulwark_desc: "Щоб міцно стояти проти фашистських і комуністичних загроз, демократія повинна вказувати шлях. Уряд має вжити активних заходів, щоб громадяни були представлені в апараті управління, а невдоволення політиків могло бути задоволене через вступ до різних демократичних партій замість шкідливих ідеологій."
 AST_the_pacific_pact: "Тихоокеанський пакт"
 AST_the_pacific_pact_desc: "Тихоокеанські ініціативи Лайонса у 1934 році налагодили контакт між Австралією та великими азійськими державами, що дозволило нам більше не покладатися на британських чиновників у представленні наших інтересів. Якби ми могли використати ці відносини для забезпечення ненападу азійських держав на Австралію, це стало б кінцевою метою наших дипломатичних зусиль. Це може бути складним завданням, але воно того варте."
 AST_a_collapsing_league_of_nations: "Падіння Ліги Націй"
 AST_a_collapsing_league_of_nations_desc: "Ліга Націй розпадається — ініціатива з добрими намірами, на жаль, ґрунтувалася на нереалістичних сподіваннях. Політика санкцій легко перетворюється на порожні жести, особливо коли немає збройних сил для стримування непокірних країн. Наше переозброєння повинно розпочатися."
 AST_department_of_munitions: "Міністерство боєприпасів"
 AST_department_of_munitions_desc: "Щоб належним чином постачати наших хлопців на фронті, нам потрібно прискорити виробництво боєприпасів. Створивши Міністерство боєприпасів, ми зможемо забезпечити посилений контроль за виробництвом оборонних компонентів."
 AST_call_for_a_referendum: "Скликати референдум"
 AST_call_for_a_referendum_desc: "Ми хочемо збільшити контроль федерального уряду; однак спочатку нам потрібне схвалення виборців. Скликавши референдум, ми можемо отримати їхню згоду."
 AST_rural_concessions: "Поступки селу"
 AST_rural_concessions_desc: "Сільські представники Аграрної партії отримують надто мало голосів, щоб правити самостійно, але вітаючи їхній вплив в австралійській політиці, ми, як нині правляча партія, можемо отримати додаткову підтримку."
 AST_rural_concessions_tt: "\n§Y$AST_country_party_influence_uap$§! збільшить кількість голосів за партію, яка перебуває при владі, коли фокус буде завершено."
 AST_solidarity_by_the_empire: "Солідарність Імперії"
 AST_solidarity_by_the_empire_desc: "До цього часу Британська імперія вела нас через війни та мир. Ми продовжуватимемо цінувати її поради та співпрацювати у підготовці до потенційних конфліктів."
 AST_solidarity_by_the_empire_modifier: "Солідарність Імперії"
 AST_wool_agreement: "Вовняна угода"
 AST_wool_agreement_desc: "Оскільки вовна є одним із найбільших комерційних продуктів Австралії, її експорт не лише приносить прибуток, але й покращує відносини з країнами-імпортерами. Однак Британія вимагає все, маючи намір використовувати її для уніформи своїх солдатів, а також у переговорах з державами, що мають дефіцит вовни. Ми повинні поступитися британським вимогам."
 AST_australian_war_cabinet: "Австралійський воєнний кабінет"
 AST_australian_war_cabinet_desc: "На вимогу Сполученого Королівства ми створимо власний Воєнний кабінет. Роблячи це, ми зможемо забезпечити ефективне та стратегічне прийняття рішень, дозволивши цьому органу зосередитися виключно на національній безпеці."
 AST_singapore_strategy: "Сінгапурська стратегія"
 AST_singapore_strategy_desc: "Сінгапурська стратегія є ключовим компонентом австралійської оборонної політики, і як база для кораблів Королівського флоту, розміщених у Тихому океані, сама територія Сінгапуру має надзвичайно важливе значення. Ми переконаємо британців провести додаткове оборонне будівництво, тоді як самі зміцнимо австралійські військово-морські сили."
 AST_singapore_strategy_tt: "Через §Y180§! днів §YСингапур§!:\n Додасть §G2§! §YАвіабази§!.\n Додасть §G2§! §YМорські бази§!.\n Додасть §G1§! §YБереговий форт§!."
 AST_british_war_cabinet: "Британський воєнний кабінет"
 AST_british_war_cabinet_desc: "Почалася війна, і Сполучене Королівство сформувало Воєнний кабінет для забезпечення ефективного ведення війни союзниками. Вони викликали нас, щоб ми також поділилися своїми поглядами на цю справу, тож наш прем'єр вирушить представляти австралійські інтереси."
 potential_consequence_tt: "§YМожливий наслідок§!:\n"
 AST_british_pacific_fleet: "Британський Тихоокеанський флот"
 AST_british_pacific_fleet_desc: "Британська присутність у Тихому океані є критично важливою для стримування та захисту від ворожих кораблів, що розширюють своє панування на південь. Як частина альянсу, ми вживемо заходів для створення спільної командної структури з метою захисту наших прибережних вод."
 AST_all_dressed_up: "При повному параді"
 AST_all_dressed_up_desc: "Якщо австралійські солдати воюють у британських війнах, нехай британські заводи будуть їх екіпірувати."
 AST_overseas_loyalties: "Заморська лояльність"
 AST_overseas_loyalties_desc: "Ми продовжуватимемо робити свій внесок у війни за кордоном, знову доводячи, що жодна територія не є чужою для австралійських солдатів. Війни не трапляються з нами — ми трапляємося з ними."
 AST_the_ultimate_overseas_duty: "Найвищий заморський обов'язок"
 AST_the_ultimate_overseas_duty_desc: "Прем'єр-міністр Британії настільки погано виконував свої обов'язки, що серед його власних міністрів поширилася недовіра. Мензіс справив неймовірно сильне враження під час своїх візитів на засідання Британського воєнного кабінету, і тепер дехто припускає, що він цілком може бути кращим варіантом для Британії. З ним на чолі Співдружності ми зможемо використати лояльність Мензіса до Австралії щоб підвищити свій авторитет."
 AST_the_ultimate_overseas_duty_tt: "\nЯкщо §Y$AST_robert_menzies$§! очолить Британію, у Фокусі §Y$AST_a_change_of_authority$§! ми зможемо стати §Y$autonomy_associated_dominion$§!."
 AST_pleading_britain: "Благання до Британії"
 AST_pleading_britain_desc: "Війна, безумовно, наближається, і це змушує наші коліна тремтіти. З усією повагою до духу ANZAC та репутації Діггерів, воєнний потенціал Австралії швидко вичерпався б без допомоги [ENG.GetName]. Прем'єр-міністр надішле телеграму у Британію за першої ж нагоди."
 AST_bound_once_more: "Знову пов'язані"
 AST_bound_once_more_desc: "Наші шляхи розійшлися, але зійдуться знову. [ENG.GetNameDefCap] та [AST.GetName] переживають зміни, але відстань між нами, до якої це призвело, є лише ненавмисним і несприятливим наслідком. Принаймні з нашого боку. Ми об'єднаємося знову і подолаємо перешкоди наших мінливих країн разом."
 AST_eng_to_ast_faction_tt: "§Y[ENG.GetName]§! та її суб'єкти приєднуються до альянсу §Y[AST.GetFactionName]§!."
 AST_faction_leader_tt: "Встановлено як лідера альянсу §Y[AST.GetFactionName]§!"
 AST_eng_as_faction_leader_tt: "\n[ENG.GetFlag]§Y[ENG.GetName]§! $AST_faction_leader_tt$."
 AST_australian_command: "Австралійське командування"
 AST_australian_command_desc: "Оскільки важливість оборони та безпеки Австралії стала очевидною навіть у [ENG.GetNameDef], необхідна реорганізація наших спільних сил. З передачею більшої кількості британських сил під австралійське командування можна буде вести війну ефективніше."
 AST_taking_the_helm: "Узятися за штурвал"
 AST_taking_the_helm_desc: "Оскільки наш вплив розширюється по всій Південно-Східній Азії, наші військово-морські можливості повинні зростати для його захисту. Ми визначимо пріоритетом постійні інвестиції в Королівський австралійський флот і затвердимо контроль над східними морями."
 AST_eastern_focus: "Сфокусуватися на сході"
 AST_eastern_focus_desc: "Якщо британські війни є австралійськими, то австралійські війни також є британськими. Японське вторгнення вже давно стало незаперечною загрозою, і ми більше не миритимемося з нинішньою пасивністю, яка чекає, поки конфлікт впаде нам на голову. Ми покажемо Японії, що означає австралійська рішучість, тоді як Британія доведе свою лояльність найсміливішою заявою з усіх: оголошенням війни."
 AST_eastern_focus_tt: "\nМісія дозволить §Y[ENG.GetNameDef]§! оголосити війну §Y[JAP.GetNameDef]§!. Якщо вони не зроблять цього протягом 180 днів, війна почнется автоматично. §Y[ENG.GetNameDefCap]§! може відстрочити дату завершення місії, фінансуючи австралійське оборонне будівництво."
 AST_holding_the_battlefield: "Утримання поля бою"
 AST_holding_the_battlefield_desc: "Багато австралійських солдатів полягли за океаном лише для того, щоб їхні зусилля були зараховані як британські. Австралія вимагає більшого впливу за столом перемовин нарівні з [ENG.GetNameDef] на мирних конференціях; інакше наша допомога може припинитися."
 AST_holding_the_battlefield_tt: "§YЗнижена вартість§! для дій "§YВстановлення маріонеточного режиму§!" та "§YЗабрати область§!" на Мирних конференціях разом із §Y[ENG.GetNameDef]§!."
 AST_a_change_of_authority: "Зміна влади"
 AST_a_change_of_authority_desc: "З покірного суб'єкта Австралія перетворилася на шановану та впевнену націю, і настав час зробити останній крок до того, щоб стати однією зі світових держав. Як лідера альянсу, друзі поважатимуть нас, а вороги — боятимуться. Окопавшись і міцно тримаючись, Австралія не здасться."
 AST_a_change_of_authority_tt: " §Y[ROOT.GetName]§! тепер може оголошувати війни.\n §Y[ROOT.GetName]§! тепер може відхиляти заклики до війни.\n §Y[ROOT.GetName]§! більше не передає жодних балів мирної конференції своєму власнику."
 AST_reinforcements: "Підкріплення"
 AST_reinforcements_desc: "Ми підготуємо значною мірою нерозвинені північні регіони, збудувавши оборонні споруди та авіабази."
 AST_weekly_stability_tt: "Щотижнева стабільність: §G+1.00%§!"
 AST_ending_overseas_conscription: "Скасування заморського призову"
 AST_ending_overseas_conscription_desc: "Наші солдати повинні негайно відплисти з чужих берегів; вони потрібні тут."
 AST_unlocking_conscription_1903_tt: "Розблоковує §YЗакони про призов§!."
 AST_unlocking_further_conscription_tt: "Для законів §YРозширений призов§! або §YОбов'язкова служба§!, вам також знадобиться будь-який із цих фокусів; §Y$AST_british_pact$§! Фашизм, §Y$AST_refuse_british_wars$§! Фашизм, §Y$AST_toe_the_line$§! Фашизм, §Y$AST_from_picket_line_to_front_line$§! Комунізм, або §Y$AST_part_with_colonizer$§! Комунізм."
 AST_unlocking_conscription_tt: "Якщо у вас також є §Y$AST_invoke_the_1903_defence_act$§!, ви розблокуєте всі решта §YЗаконів про призов§!."
 AST_an_uncle_for_father_figure: "Дядько замість батька"
 AST_an_uncle_for_father_figure_desc: "Нам бракує сучасного озброєння, тому ми звернемося до [USA.GetName] з проханням про постачання."
 AST_seven_million_britishers: "Сім мільйонів британців"
 AST_seven_million_britishers_desc: "Хоча [ENG.GetLeader] не наважувався давати нам будь-які обіцянки, ми віритимемо в його і Британії відданість [AST.GetNameDef], коли настане критичний момент. Зрештою, ми — лише сім мільйонів британців."
 AST_seven_million_britishers_reinforcements_tt: "\n§YЯкщо $AST_reinforcements$ не завершено§!:"
 AST_seven_million_britishers_conscription_tt: "\n§YЯкщо $AST_ending_overseas_conscription$ не завершено§!:"
 AST_seven_million_britishers_uncle_tt: "\n§YЯкщо $AST_an_uncle_for_father_figure$ не завершено§!:"
 AST_we_endured: "Ми вистояли"
 AST_we_endured_desc: "Передбачення майбутнього конфлікту могло спочатку приголомшити, але використання його для прискорення розвитку нашої обороноздатності зрештою принесло користь. Ми вистояли, і ми продовжимо боротьбу, тепер повністю віддані нашому головному завданню: перемогти у війні."
 AST_under_the_rule_of_canberra: "Під владою Канберри"
 AST_under_the_rule_of_canberra_desc: "Зростання напруженості серед тихоокеанських держав викликає занепокоєння, і з огляду на те, що Британія зайнята власними справами, її здатність прийти нам на допомогу видається неправдоподібною. Якби ми реконструювали Британську Співдружність так, щоб управління країнами Тихого та Індійського океанів здійснювалося безпосередньо з Канберри, ми могли б об'єднатися в єдиний фронт — навіть без [ENG.GetNameDef]."
 AST_its_fight_work_or_perish: "Бийся, працюй або помри"
 AST_its_fight_work_or_perish_desc: "Війна почалася, і залишається тільки одне: довести, що ми до неї готові."
 AST_no_foreign_battlefields: "Жодних чужих війн"
 AST_no_foreign_battlefields_desc: "Це тривало довго, але нарешті уряд заявить, що жоден громадянин не буде примусово відправлений на службу на заморські землі."
 AST_no_foreign_battlefields_modifier: "Жодних чужих війн"
 AST_platypus_modifier: "Обдарований качкодзьоб"
 AST_aerial_defense: "Протиповітряна оборона"
 AST_aerial_defense_desc: "Якщо ми не можемо дозволити собі флот, рівний світовим державам, в наших силах утримування повітряного флоту, рівному будь-якому, що може бути висунутий проти нас."
 AST_ratify_westminster_adoption_act: "Ратифікувати Вестмінстерський статут"
 AST_ratify_westminster_adoption_act_desc: "Незважаючи на суперечки, які може викликати зміна давно усталених політик, нам давно час ратифікувати Акт про прийняття Вестмінстерського статуту. Ми самі обиратимемо, які війни є нашими."
 AST_ratify_westminster_adoption_act_tt: "£GFX_trigger_yes Може відхилити заклик до війни"
 AST_administer_the_mandate: "Керувати мандатом"
 AST_administer_the_mandate_desc: "Оскільки ми керували Новою Гвінеєю за мандатом Ліги Націй з 1920 року, а Папуа майже з часів Федерації була зовнішньою територією [AST.GetName], східна частина Папуа Нової Гвінеї стала б природним доповненням до основних територій [AST.GetName]. Тепер, коли Ліга Націй розпущена, з'явилася можливість здійснити таку федеральну реорганізацію."
 AST_a_rational_request: "Раціональне прохання"
 AST_a_rational_request_desc: "Сінгапурська стратегія працює в теорії і тільки там. Генрі Вінтер та інші рішучі голоси мали рацію від самого початку; Британія, швидше за все, буде зайнята на своєму власному континенті, якщо вибухне тихоокеанська війна, стратегія, побудована на британській допомозі не витримає. Ми вимагатимемо контролю над Сінгапуром, щоб самі відповідати за оборону наших океанів."
 add_trait_to_theorist_tt: "Додано рису до §YТеоретика§!:"
 AST_volunteers: "Добровольці"
 AST_volunteers_desc: "Важливим є мати вибір; здатність відхилити заклик до зброї не означає, що Австралія завжди це робитиме. Австралійці матимуть повне право боротися за те, що є правильним, як на своїй, так і на чужій землі."
 AST_until_the_tide_of_battle_swings: "Поки хід битви не зміниться"
 AST_until_the_tide_of_battle_swings_desc: "У публічній заяві ми дамо зрозуміти, що час ігнорувати загрозу, що зріє на нашому задньому дворі, минув. Ми відмовляємося приймати політику, за якою боротьба в Тихому океані розглядається як підлеглий сегмент загального конфлікту; Австралія повинна негайно готуватися до вторгнення."
 AST_walls_and_whispers: "Стіни та шепіт"
 AST_walls_and_whispers_desc: "Неприступні стіни у поєднанні з вухом, припалим до землі, створюють величезний потенціал для національної безпеки. Буде вжито заходів для покращення сухопутної та берегової оборони по всій нашій країні, а також для створення розвідувальної штаб-квартири всередині."
 AST_united_states_as_our_keystone: "Сполучені Штати як наша опора"
 AST_united_states_as_our_keystone_desc: "Ми знаємо про проблеми, з якими стикається Сполучене Королівство. Ми знаємо про небезпеку розпорошення сил, але ми також знаємо, що Австралія може впасти, а Британія все ще триматиметься. Тому ми твердо вирішили, що Австралія не впаде, і ми докладемо всіх зусиль для формування плану, в якому Сполучені Штати стануть ключовою опорою."
 AST_liberty_loans: "Позики свободи"
 AST_liberty_loans_desc: "Зі свого досвіду на посаді скарбника — чи не найкращого в країні на сьогодні, як стверджують дехто — Бен Чіфлі довів свою здатність керувати економікою воєнного часу. За його рекомендацією ми заохочуватимемо наших громадян переказувати надлишок особистих доходів на заощадження та інвестувати у військові позики."
 AST_inevitably_independent: "Неминуче незалежні"
 AST_inevitably_independent_desc: "Хоча Партія об'єднаної Австралії завжди цінувала британське громадянство, байдужість [ENG.GetNameDef] до австралійських інтересів змусила нас проголосити незалежність і поставити на перше місце власну оборону. Тепер, коли заморська служба у британських війнах природним чином перестала бути проблемою, навіть антилоялісти більш схильні підкорятися правилам; отже, розширення призову зустріне менше опору."
 AST_bring_on_the_giant: "Викликати гіганта"
 AST_bring_on_the_giant_desc: "Як об'єднана та автономна нація, нарешті, ми незабаром пройдемо випробування нашої хоробрості. Інший берег Тихого океану, здається, поділяє наші інтереси, і з її розвиненою військовою промисловістю, [USA.GetNameDef] може принести велику користь і собі, і Австралії, надавши частину своїх багатих запасів у лізинг нашим військам."
 AST_bring_on_the_giant_tt: "  Якщо §Y[USA.GetNameDefCap]§! погоджується:\n §Y+50§! одиниць §YКонвоїв§! додається до національних запасів."
 AST_allied_after_all: "Зрештою союзники"
 AST_allied_after_all_desc: "Хоча незалежність Австралії була необхідністю, вся співпраця з нашою старою метрополією не припиниться. Ми залишатимемося лояльними до альянсу [ENG.GetFactionName], як і завжди, але прагнутимемо до більшого впливу всередині нього."
 AST_the_pacific_resistance: "Тихоокеанський опір"
 AST_the_pacific_resistance_desc: "Незалежність Австралії нарешті настала, і буде правильним відмовитися від участі у британських війнах. Прагнучи до єдності з [USA.GetNameDef] натомість, ми можемо формувати стратегії спільного командування, які цінують австралійські інтереси, поки ми самостійно беремо повний контроль над власною оборонною промисловістю та її розширенням."
 AST_the_pacific_resistance_tt1: "§YАвстралія§! приєднується до альянсу §Y[USA.GetFactionName]§!."
 AST_the_pacific_resistance_tt2: "§Y[USA.GetName]§! приєднується до альянсу §YТихоокеанський опір§!."
 AST_conscription_at_last: "Нарешті призов"
 AST_conscription_at_last_desc: "Незалежність солодка, адже ми усвідомлюємо, що тепер маємо владу ставити пріоритетом власну оборону — але ця влада також несе відповідальність. Обов'язковий призов не слід розширювати легковажно, але з війною, яка вже на порозі, це стало необхідним."
 AST_equal_training: "Рівноцінна підготовка"
 AST_equal_training_desc: "Співпраця із союзниками має вдосконалюватися, а не просто сліпо вважатися дієвою. Австралія візьме на себе ініціативу з організації спільних тренувальних таборів для країн альянсу [ROOT.GetFactionName] та забезпечить, щоб усі солдати отримували однаково сувору підготовку."
 AST_a_northern_barrier: "Північний бар'єр"
 AST_a_northern_barrier_desc: "Ворог насувається з півночі, і перед ним лежать менші, непідготовлені нації, по яких він може завдати удару за власним бажанням, перш ніж остаточно дістатися нашого порогу. Якщо ми об'єднаємося з [INS.GetNameDef] для створення єдиного бар'єру, ми ще маємо шанс стримати їх."
 AST_demand_resources: "Вимагати ресурси"
 AST_demand_resources_desc: "Експансіоністські агресори дивляться на Індокитай не лише через саму територію, але й через ресурси, якими він володіє. Якщо ці багатства потраплять до ворожих рук, вони лише затягнуть війну, тоді як у наших руках вони допомогли б покласти їй край. Ми вимагатимемо контролю над цими ресурсами; якщо їхні власники відмовляться співпрацювати, вони не кращі за ворога."
 AST_demand_resources_tt: "Розблоковує рішення з категорії §Y$AST_resource_acquisition_cat$§! для запиту частки ресурсів країн Південно-Східної Азії."
 AST_reclaim_the_lost_territory: "Повернути втрачену територію"
 AST_reclaim_the_lost_territory_desc: "Під час процесу об'єднання австралійських колоній у федерацію Нова Зеландія врешті-решт вирішила не брати участі. Однак з того часу Конституція продовжує визначати Нову Зеландію як один із потенційних штатів Австралійської Співдружності та дозволяє її прийняття. Ми нагадаємо про це нашим східним сусідам і переконаємо, що нинішня світова ситуація вимагає єдності."
 AST_reclaim_the_lost_territory_tt: "[NZL.GetFlag]§Y[NZL.GetName]§! Передає всі сухопутні, військово-морські та військово-повітряні сили до §Y[AST.GetNameDef]§!"

 AST_australia_first: "Австралія понад усе"
 AST_australia_first_desc: "Ультраправа енергія Центристської партії була недовговічною, закінчившись її розпуском у 1935 році. Однак щось нове починає закипати, походячи від ідей бізнесмена та політичного активіста Вільяма Джона Майлза. Якщо не вжити заходів для мобілізації цих настроїв, вони можуть згаснути так само швидко, як і виникли. Тому ми будемо діяти."
 AST_pankhurst_walsh: "Адела Панкгерст Волш"
 AST_pankhurst_walsh_desc: "Для формального заснування Руху «Австралія понад усе» ми призначимо Аделу Панкгерст Волш президентом. Як засновниця Австралійської жіночої гільдії імперії, Панкгерст Волш — зберігаючи тісні зв'язки з лондонською Жіночою гільдією — давно відстоювала цінність британського громадянства. Ця цінність стане основним принципом нашого руху: збереження зв'язків з Британією."
 AST_stephensen: "П. Р. Стівенсен"
 AST_stephensen_desc: "Для формального заснування Руху «Австралія понад усе» ми призначимо П. Р. Стівенсена президентом. Будучи літературним радником Вільяма Джона Майлза, Стівенсен поділяє ізоляціоністські та націоналістичні погляди свого наставника. Вони ляжуть в основу двох ключових принципів статуту нашого руху: незалежність від Британії та об'єднання австралійської культури."
 AST_stephensen_tt: "\nВибір президента для §YРуху «Австралія понад усе»§! визначає можливі подальші дії."
 AST_a_growing_womens_guild: "Зростаюча жіноча гільдія"
 AST_a_growing_womens_guild_desc: "З моменту свого заснування у 1928 році Австралійська жіноча гільдія імперії відстоює промислову співпрацю для подолання національних економічних проблем. На благо нації громадяни повинні допомагати своєму уряду, а не працювати проти нього. З Панкгерст Волш на посаді президента «Австралії понад усе» ми зможемо поширити цей заклик через політичний рух."
 AST_realize_the_value_of_british_citizenship: "Усвідомити цінність британського громадянства"
 AST_realize_the_value_of_british_citizenship_desc: "Панування [ENG.GetNameDefCap] над [AST.GetName] довго слугувало нашій нації як захисним щитом, так і дороговказом. Ми походимо від Британії, і ми залишимося з Британією — доки це буде нам на користь."
 AST_the_bolsheviks_counterforce: "Протидія більшовикам"
 AST_the_bolsheviks_counterforce_desc: "Слідчий відділ десятиліттями проводив розслідування діяльності підривних груп. Його робота з придушення лівих загроз має високу цінність, і нею не слід нехтувати лише тому, що опоненти «Австралії понад усе» прагнуть протидіяти нашому зростанню. Ми шукатимемо посади в австралійському розвідувальному управлінні та забезпечимо, щоб реальній загрозі національній безпеці приділявся пріоритет."
 AST_public_meetings_tt: "Розблоковує рішення §YРуху «Австралія понад усе»§! для мобілізації членів та підвищення підтримки фашизму."
 AST_rile_up_veterans: "Збурити ветеранів"
 AST_rile_up_veterans_desc: "На початку Великої депресії ветерани Першої світової війни об'єдналися в ультраправі воєнізовані групи для протидії поширенню комунізму. Навіть якщо ці групи відтоді розпалися, їхні колишні члени нікуди не зникли; «Австралія понад усе» поглине їх, і факел антикомунізму горітиме далі."
 AST_eureka_stockade_monument_rally: "Мітинг біля монумента Еврикського повстання"
 AST_eureka_stockade_monument_rally_desc: "У 1854 році, в Битві за Еврикський частокіл, австралійські золотошукачі запекло боролися проти колоніальних військ через нерозумну вартість ліцензій на видобуток і оподаткування золотих копалень. Невдоволення британським пануванням було очевидним тоді, і таким воно є зараз. Ми зберемося біля пам'ятника тій битві і виступимо за розрив з Британією."
 AST_australian_pivot_modifier: "Австралійський розворот"
 AST_well-being_of_the_community: "Добробут громади"
 AST_well-being_of_the_community_desc: "Християнські ідеали життя та сім'ї мають високо цінуватися австралійським населенням. Однак, з огляду на низький рівень народжуваності в останні роки, ці ідеали беззаперечно недостатньо шанувалися. Заради добробуту громади ми запустимо кампанію з популяризації сімейного життя."
 AST_covert_networks: "Приховані мережі"
 AST_covert_networks_desc: "Оскільки «Австралія понад усе» діє всередині Слідчого відділу, ми шукатимемо транскордонної співпраці з рухом однодумців у [ENG.GetNameDef]. Наш альянс з нашою метрополією може послужити нам ще в один спосіб, дозволяючи таємно зв'язуватися з ідеологічно близькими союзниками і розширювати наші розвідувальні можливості."
 AST_refuse_british_wars: "Відмовитися від британських війн"
 AST_refuse_british_wars_desc: "Ґалліполійська кампанія Великої війни продемонструвала безрозсудність, з якою [ENG.GetNameDef] ставиться до наших експедиційних сил, роблячи ідею ще однієї закордонної кампанії від її імені абсолютно немислимою. Австралійці вимагають, щоб наша кров більше ніколи не проливалася під британським командуванням, змушуючи уряд діяти; Вестмінстерський акт буде ратифіковано."
 AST_walls_like_uluru: "Стіни як Улуру"
 AST_walls_like_uluru_desc: "Австралія — це континент сам по собі. Якщо ми збираємося стояти без щита Імперії, ми повинні створити свій власний. Берегова лінія буде укріплена, порти захищені, а підступи зроблені небезпечними для будь-кого, хто вважає цю націю легкою здобиччю."
 AST_at_the_gates: "Біля воріт"
 AST_at_the_gates_desc: "Світ рухається до війни, і Австралія не повинна виявитися неготовою. Заводи та верфі країни повинні переключитися на вищу передачу. Це не підготовка до чужого конфлікту, це підготовка до власного виживання."
 AST_the_guild_for_the_war_effort: "Гільдія для військових потреб"
 AST_the_guild_for_the_war_effort_desc: "Австралійська жіноча гільдія імперії була створена для служіння Короні. Тепер її призначення повністю змінюється. Величезна організаційна мережа, яку вона побудувала, направить свою енергію на військову промисловість, госпіталі та ланцюги постачання самодостатньої Австралії."
 AST_for_the_southern_cross: "За Південний Хрест"
 AST_for_the_southern_cross_desc: "Південний Хрест не майорить над Британією. Він майорить над нами. Австралійська ідентичність — це щось справжнє, заслужене, те, що варто захищати. Формується нова національна гордість, не запозичена з Лондона і не визначена далекими інституціями, а вирощена тут, з цієї землі, під цими зірками."
 AST_through_the_gates: "Через ворота"
 AST_through_the_gates_desc: "Підготовка змінилася терміновістю. Програма національної оборони розширюється за повної підтримки австралійської промисловості. Поряд з існуючими об'єктами зводяться нові, планові показники випуску продукції переглядаються в бік збільшення, а межа між цивільним виробництвом і військовою необхідністю непомітно стирається."
 AST_toe_the_line: "Підкоритися правилам"
 AST_toe_the_line_desc: "Комфорт, до якого австралійці звикли в роки процвітання, тепер має бути відкладений убік. Нормування, подовжений робочий день і призов на службу — це ціна незалежності. Ті, хто відгукнеться, побачать, що нація готова стояти за ними. Але держава матиме мало терпіння до тих, хто вважає, що жертвувати повинні інші."
 AST_crush_the_gates: "Зруйнувати ворота"
 AST_crush_the_gates_desc: "Нарощування сил завершено. Австралійська промисловість тепер працює на повній воєнній основі, її продукція повністю спрямована на оборону та проєкцію національної могутності. Який би шторм не насувався, Австралія зустріне його не як неохочий домініон, що поспіхом намагається мобілізуватися."
 AST_national_defense: "Національна оборона"
 AST_national_defense_desc: "Шляхом цілеспрямованих інвестицій та державного управління Австралія побудувала промислову базу, здатну забезпечити власну оборону. Заводи та верфі працюють під наглядом держави, а їхня продукція вимірюється не прибутком, а потребами нації."
 modify_AST_national_defense_tt: "Змінює §Y$AST_national_defense$§! на:"
 AST_nauru_pact: "Пакт Науру"
 AST_nauru_pact_desc: "З початковою перешкодою у вигляді здобуття влади все ще попереду, питання незалежності здається далеким; однак австралійська автономія цікавить не лише нас. В обмін на гарантії суверенітету від [GER.GetNameDef] на випадок опору Британії руху «Австралія понад усе» або остаточного виходу зі Співдружності, ми, після приходу до влади, повернемо один з їхніх втрачених тихоокеанських островів: Науру."
 AST_australian_culture_investments: "Інвестиції в австралійську культуру"
 AST_australian_culture_investments_desc: "Своїм есеєм «Основи культури в Австралії» Стівенсен вплинув на формування поетичного руху Джіндіворобак і прояснив одне: австралійська культура має бути пріоритетом. Уряд, здається, повністю нехтує цінністю митців і письменників, але ми цього не робитимемо. Мобілізувавши прихильників Джіндіворобак та «Австралії понад усе», ми стимулюватимемо культурний розвиток."
 AST_australian_culture_investments_tt: "\nЧерез §Y365§! днів:"
 AST_australia_first_party_focus: "Партія «Австралія понад усе»"
 AST_australia_first_party_focus_desc: "Кількість членів «Австралії понад усе» зросла настільки, що просування руху вже неможливо стримати. Настав час австралійській громадськості вітати новозареєстрований, найгучніший націоналістичний голос: Партію «Австралія понад усе»."
 AST_australia_first_party_req_tt: "§YПартія «Австралія понад усе»§! заснована."
 AST_in_from_the_cold: "Повернення з холоду"
 AST_in_from_the_cold_desc: "«Австралії понад усе» та її прихильникам більше не потрібно ховатися. Погане ставлення, якого наша нація зазнала за довгої низки попередніх урядів, нарешті висвітлено, і настав час для нових голосів бути почутими."
 AST_absorb_the_uap: "Поглинути УАП"
 AST_absorb_the_uap_desc: "Хоча Партія об'єднаної Австралії завжди залишалася ліберальною, вона також схиляється вправо. Однак, з новою політичною партією при владі, членам УАП може не залишитися іншого вибору, окрім як підтримати курс нинішнього уряду. Ми звернемося до найвидатніших членів і завербуємо їх до Партії «Австралія понад усе»."
 AST_big_business_pact: "Пакт із великим бізнесом"
 AST_big_business_pact_desc: "Оскільки Партія «Австралія понад усе» прагне захистити вітчизняну промисловість, вона знайшла багато прихильників серед топ-керівників бізнесу. В обмін на проведення політики, що збільшує їхні прибутки, вони підтримуватимуть наші політичні та військові цілі."
 AST_big_business_pact_tt: "\nРозблоковує рішення §YПакт із великим бізнесом§! для впливу на цілі промисловості та будівництва."
 AST_autarky: "Автаркія"
 AST_autarky_desc: "Покладання на зовнішню торгівлю є непевним, особливо в часи конфлікту; австралійська промисловість повинна бути пріоритетною, а не витіснятися імпортом. Лише обмежуючи наші торговельні закони, ми зможемо захистити вітчизняну економіку і гарантувати, що Австралія зможе забезпечити саму себе."
 AST_energy_independence: "Енергетична незалежність"
 AST_energy_independence_desc: "Покладання на зовнішню торгівлю є непевним, особливо в часи конфлікту; енергетична незалежність є життєво важливою, щоб Австралія могла функціонувати навіть у найскрутніші часи. Інвестуючи в нафтопереробні заводи, ми можемо сприяти розвитку внутрішнього виробництва енергії."

 remove_2_offsite_dockyard: "Видалити §R2§! позамапові §YВерфі§!."
 AST_british_pact: "Британський пакт"
 AST_british_pact_desc: "Незважаючи на наше недавнє відділення від Британської Співдружності, в інтересах [AST.GetName] продовжувати співпрацю зі своєю старою метрополією. З огляду на те, наскільки розпорошені сили [ENG.GetNameDef] по всьому світу, наша готовність розділити їхній тягар, запропонувавши військову співпрацю, має бути оцінена."
 AST_naurus_return_to_german_hands: "Повернення Науру до німецьких рук"
 AST_naurus_return_to_german_hands_desc: "Тепер, коли «Австралія понад усе» повністю контролює країну, настав час виконати обіцянку щодо Науру, а нашим німецьким союзникам виконати свою частину угоди. [AST.GetName] нарешті звільниться від кайданів Співдружності, і британці не матимуть у цій справі права голосу."
 AST_naurus_return_to_german_hands_tt: "'§YПакт Науру§!' стає активним."
 AST_naurus_return_to_german_hands_tt_2: "'§YПакт Науру§!' активний."
 AST_the_winner_takes_it_all: "Переможець отримує все"
 AST_the_winner_takes_it_all_desc: "Хоча колись пожертвувати островом Науру заради німецької співпраці здавалося розумним, тепер це не так. Довівши свою могутність, ми прагнутимемо до експансії на Соломонові острови та Нову Зеландію, навіть якщо перше може додатись до нашої зради Пакту Науру. Зрештою, Соломонові Острови стануть ще однією німецькою територією, втраченою на користь Австралії."
 AST_resist_western_intruders: "Опір західним загарбникам"
 AST_resist_western_intruders_desc: "Західні країни здаються змушеними втручатися у справи Тихого океану, але цьому треба покласти край. Перш ніж вони досягнуть наших берегів, ми досягнемо їхніх, доводячи, що [AST.GetName] не та нація, яка підкоряється вимогам."
 AST_invasion_preparation_tt: "Час підготовки вторгнення: §G-20.0%§!"
 AST_naval_invasion_penalty_tt: "Штраф за морське вторгнення: §G-20.0%§!"
 AST_expand_the_fort: "Розширити форт"
 AST_expand_the_fort_desc: "Західна частина Тихого океану не призначена для командування нею [USA.GetNameDef]. Острови, на які претендують американці, належать східноазіатським державам, і з ростом австралійського впливу, ми будемо тими, хто заявить на них права."
 AST_integrate_the_fort: "Інтегрувати форт"
 AST_integrate_the_fort_desc: "Оскільки ми керували Новою Гвінеєю за мандатом Ліги Націй з 1920 року, а Папуа майже з часів Федерації була зовнішньою територією [AST.GetName], східна частина Папуа Нової Гвінеї стала б природним доповненням до основних територій [AST.GetName]. В рамках наших зусиль з об'єднання австралійської культури, це був би наступний крок."
 AST_defying_american_interference: "Ігнорування американського втручання"
 AST_defying_american_interference_desc: "Тінь [USA.GetNameDefCap] нависла над нами, погрожуючи втрутитися щоразу, коли наші дії не збігаються з її інтересами. Поки світова держава такого масштабу стискає свій залізний кулак навколо [PHI.GetNameDef], східноазіатські країни ніколи по-справжньому не належатимуть Східній Азії. [AST.GetName] не підкориться владі іноземних загарбників — Філіппіни будуть нашими."
 AST_the_pacific_garrison: "Тихоокеанський гарнізон"
 AST_the_pacific_garrison_desc: "Хоча захист Південно-Східної Азії та Тихого океану входить до інтересів Британії, цей регіон знаходиться далеко від Британських островів. В обмін на їхню підтримку в постачанні ми запропонуємо взяти на себе командування обороною цієї території, що дозволить [ENG.GetNameDef] спрямувати свою увагу в інше місце."
 AST_vichy_out_of_africa: "Віші геть з Африки"
 AST_vichy_out_of_africa_desc: "Падіння або співпраця з Вішістською Францією є однією з головних цілей [ENG.GetNameDef]. Як жест доброї волі, [AST.GetName] приєднається до боротьби і переслідуватиме французькі африканські колонії до їхнього підкорення."
 AST_vichy_out_of_africa_tt1: "Додає претензії на території §YВішістської Франції§! в §YАфриці§! через Фокус §YВіші геть з Африки§!.\n"
 AST_vichy_out_of_africa_tt2: "Додає претензії на території §YВішістської Франції§! в §YАфриці§! через рішення §YВіші геть з Африки§!.\n"
 AST_vichy_africa_claim_flag: "Претензії [AST.GetFlag]§Y[AST.GetName]§! на всі території §YВішістської Франції§! в §YАфриці§! додано до §YДосить втручатися§!."
 AST_vichy_claim_tt: "Претензії [AST.GetFlag]§Y[AST.GetName]§! додано до §YДосить втручатися§!."
 vichy_in_africa_trigger: "§YВішістська Франція§!: Будь-який контрольований регіон:\n Знаходиться в §YАфриці§!"
 vichy_wargoal: "Отримує ціль війни §YАнексія§! проти §YВішістської Франції§!."
 AST_britain_supplying_ships: "Британія постачає кораблі"
 AST_britain_supplying_ships_desc: "Оскільки [ROOT.GetName] несе тягар охорони берегів британських союзників, стало зрозуміло, що наш флот потребує розширення. Буде лише справедливо, якщо [ENG.GetNameDefCap] постачатиме нам кораблі."
 AST_hand_in_glove: "Рука об руку"
 AST_hand_in_glove_desc: "Просуваючись на північ, ми можемо збільшити австралійський вплив на дипломатію та конфлікти в Південно-Східній Азії. Ми вже довели свою здатність захищати британські інтереси поруч із власними, тому [ENG.GetNameDef] повинні зрозуміти, чому їхні віддалені території краще було б передати в наші руки."
 AST_claim_french_indochina: "Висунути претензії на Французький Індокитай"
 AST_claim_french_indochina_desc: "Оскільки доля Франції не вирішена, доля її колоній також залишається невизначеною. Інші нації можуть спробувати накласти свої жадібні руки на Французький Індокитай, але вони не виграють у нас."
 AST_undeniably_ours: "Беззаперечно наше"
 AST_undeniably_ours_desc: "Незалежно від того, що може дати нам дипломатія, вона ніколи не дасть нам усього. У своєму крихкому стані кордони Вішістської Франції діють радше як рекомендації, і згаяти можливість повністю окупувати їхні землі було б дуже нерозумно. Неминуче настав час для війни."
 AST_done_meddling: "Досить втручатися"
 AST_done_meddling_desc: "Завжди лояльна старій батьківщині, [AST.GetName] продовжує битися у британських битвах з високо піднятою головою. Австралійці — надійний народ, але це не означає, що їх слід сприймати як належне. Поки [AST.GetName] б'ється за [ENG.GetNameDef], [ENG.GetNameDef] також битиметься за [AST.GetName]."
 AST_northern_advancement: "Просування на північ"
 AST_northern_advancement_desc: "Хоча Австралія воліла б займатися власними політичними справами, ми не можемо очікувати, що нас залишать у спокої, якщо ми не становитимемо загрози. [INS.GetNameDefCap] — нація, подібна до нашої, жертва європейських загарбників, які не йдуть. Заявляючи власні претензії на цю територію, ми посилаємо чіткий сигнал: тихоокеанські нації слід залишити в спокої."
 AST_soothing_australian_fears: "Заспокоєння австралійських страхів"
 AST_soothing_australian_fears_desc: "Хоча деякі урядовці вірять у можливість співпраці між Австралією та Японією, австралійська громадськість у це не вірить. Після тривалого страху перед японським вторгненням, ідею об'єднання зусиль із тим самим потенційним агресором для більшості важко осягнути. Тому ми заспокоїмо їхні страхи, готуючись до війни."
 AST_soothing_australian_fears_tt: "\nЧерез §Y180§! днів:"
 AST_dividing_the_pacific: "Розділення Тихого океану"
 AST_dividing_the_pacific_desc: "«Австралія понад усе» виступає за мир із [JAP.GetNameDef], визначаючи націю — на відміну від більшості австралійських громадян — як потенційного тихоокеанського союзника, а не постійно навислу загрозу. З розширенням впливу [AST.GetName], цілком розумно, щоб [JAP.GetName] також з цим погодилася, і щоб потенційні конфлікти між нашими двома країнами були залагоджені до того, як вони встигнуть виникнути."
 AST_dividing_the_pacific_ast_gain_tt: "[GET_AST_DIVIDING_THE_PACIFIC_AST_GAIN]"
 AST_dividing_the_pacific_jap_gain_tt: "[GET_AST_DIVIDING_THE_PACIFIC_JAP_GAIN]"
 AST_dividing_the_pacific_tt1: "§GМи отримуємо§!:"
 AST_dividing_the_pacific_tt2: "§RВони отримують§!:"
 AST_dividing_the_pacific_tt3: "§Y[AST.GetName]§! передає наступні контрольовані території:"

 AST_against_war_and_fascism: "Проти війни та фашизму"
 AST_against_war_and_fascism_desc: "Рух проти війни та фашизму є австралійським відділенням фінансованої Комінтерном міжнародної ініціативи з мобілізації робітників проти реакційних сил. Хоча останніми роками він втратив оберти, ми повинні знову понести цей прапор вперед."
 AST_world_peace: "Світовий мир"
 AST_world_peace_desc: "Рух проти війни та фашизму наполегливо працював над виданням журналу під назвою «Світовий мир», який викриває зло фашистського руху в Німеччині, Італії, а особливо під час Громадянської війни в Іспанії. Натхненні статтями з нього, добровольці з нетерпінням прагнуть приєднатися до боротьби з фашизмом."
 AST_red_fred: "Червоний Фред"
 AST_red_fred_desc: "«Червоний» Фред Патерсон вперше став відомим у комуністичному русі як кандидат на посаду мера Брісбена у 1934 році, де зазнав нищівної поразки. Однак його амбіції залишаються незмінними, і тепер він балотується на виборах олдмена в Таунсвіллі. З нашою підтримкою він може стати першим комуністом, обраним на державну посаду."
 AST_workers_defence_corps_sparks_anew: "Новий спалах Робітничого корпусу оборони"
 AST_workers_defence_corps_sparks_anew_desc: "Робітничий корпус оборони спочатку був створений для захисту пікетів і страйків. Зі зростанням агресії з боку таких груп, як «Нова гвардія», його було перегруповано, щоб знову діяти як щит для тих, хто протестує за кращі права та можливості."
 AST_a_controversial_recruitment: "Суперечливе вербування"
 AST_a_controversial_recruitment_desc: "Моріс Блекберн — відомий юрист-соціаліст, знаний тим, що захищав права робітників у судових баталіях проти репресивних роботодавців. Будучи членом Лейбористської партії, його лояльність була поставлена під сумнів через зв'язки з більш радикальним Рухом проти війни та фашизму."
 AST_from_picket_line_to_front_line: "Від лінії пікету до лінії фронту"
 AST_from_picket_line_to_front_line_desc: "Оскільки тактики залякування тих, хто протистоїть визволенню робітничого класу, стають дедалі агресивнішими, наш власний захист має розвиватися у відповідь. З кожним інцидентом робітники стають більш рішучими, і все більше їх приєднується до Корпусу оборони."
 AST_pig_iron_protests: "Протести через чавун"
 AST_pig_iron_protests_desc: "Наші докери багато в чому не згодні зі своїм урядом, а надто у питанні продажу чавуну воюючим країнам. Австралійці не зацікавлені брати участь в агресії чи транспортуванні обладнання, яке використовується проти мирних громадян, тому [AST.GetName] цього не робитиме; закликайте до страйку."
 AST_part_with_colonizer: "Розірвати зв'язки з колонізатором"
 AST_part_with_colonizer_desc: "Корінь нашої боротьби лежить у Британській імперії та капіталістичній системі, яку вона нав'язала здалеку. Більше цього не буде. Оскільки Британія відволікається на кризи ближче до дому, зараз настав час взяти свою долю у свої руки і прокласти власний курс як вільна та незалежна нація."
 AST_take_it_to_the_streets: "Вийти на вулиці"
 AST_take_it_to_the_streets_desc: "Промислові акції — один із найпотужніших інструментів, які ми маємо для стимулювання змін у суспільстві, і ми повинні застосувати його проти системи, створеної лише для експлуатації. Настав час повернути засоби виробництва, робітники Австралії, єднайтеся!"
 AST_workers_educational_association: "Робітнича освітня асоціація"
 AST_workers_educational_association_desc: "Робітнича освітня асоціація — це міжнародна організація, що займається забезпеченням доступності освіти для робітників. Ми маємо створити власне відділення, адже справжня рівність можливостей починається в класі."
 AST_off_leash: "Зірватися з ланцюга"
 AST_off_leash_desc: "Докери є основою профспілкових дій в Австралії. Як острів розміром з континент, не дивно, що морська праця відіграє таку життєво важливу роль у нашій економіці. Настав час зняти нашийники та спустити з ланцюга морських псів промисловості."
 AST_a_national_housing_commission: "Національна житлова комісія"
 AST_a_national_housing_commission_desc: "Житло давно є суперечливим питанням. Кожен заслуговує мати дах над головою, але занадто часто цю базову потребу використовують проти робітників, а його вартість є формою економічного гноблення. Цьому кінець. Ми вимагатимемо справедливого доступу до житла для всіх."
 AST_guaranteed_employment: "Гарантоване працевлаштування"
 AST_guaranteed_employment_desc: "Соціалізм надто часто відкидають через звинувачення в лінощах або залежності, спрямовані на тих, хто потребує допомоги. Це має припинитися. Все, чого ми прагнемо — це справедливий шанс на працю та справедливу оплату, щоб утримувати наші сім'ї."
 AST_equal_pay: "Рівна оплата праці"
 AST_equal_pay_desc: "Існує стійка омана, що ті, хто володіє засобами виробництва, заслуговують на більше, ніж ті, хто працює на них. Власники і менеджери не працюють важче, і вони не є від природи більш кваліфікованими. Вирівнявши зарплати, плоди праці можна буде ділити більш справедливо по всьому суспільству."
 AST_all_for_one_one_for_all: "Один за всіх, і всі за одного"
 AST_all_for_one_one_for_all_desc: "«Всі за одного, і більше для мене» довго було бойовим кличем буржуазії, чия жадібність вимагає все більше, віддаючи все менше. Обіцянка того, що багатство потече вниз, — брехня. Воно повинно розподілятися порівну, усіма і для всіх."
 AST_abolition_of_private_property: "Скасування приватної власності"
 AST_abolition_of_private_property_desc: "Шестерні промисловості змащені кров'ю робітників. Ми повинні покласти край жорстокості накопичення та повністю скасувати приватну власність. Все буде спільним: від кожного за здібностями, кожному за потребами."
 AST_centralized_production: "Централізоване виробництво"
 AST_centralized_production_desc: "Ринкові сили хаотичні й нерівноправні. Якщо ми збираємося побудувати справді справедливе суспільство, держава повинна взяти на себе центральну роль у визначенні того, що, ким і де виробляється. Наша бюрократія веде ретельний облік і найкраще підходить для встановлення виробничих квот."
 AST_public_institutions: "Державні установи"
 AST_public_institutions_desc: "Для функціонування суспільству потрібні багато базових послуг: від охорони здоров'я та житла до догляду за дітьми і транспорту. Держава повинна забезпечити їх повсюдно, гарантуючи доступ для всіх без обмежень. Звільнені від необхідності приносити приватний прибуток, ці системи зможуть ефективно працювати на задоволення потреб усього населення."
 AST_planned_extraction: "Плановий видобуток"
 AST_planned_extraction_desc: "Нам пощастило володіти землею, такою багатою на ресурси. Ми маємо переконатися, що її багатства систематично видобуваються і спрямовуються в галузі, які їх найбільше потребують."
 AST_maritime_commission: "$USA_maritime_commission$"
 AST_maritime_commission_desc: "$USA_maritime_commission_desc$"
 AST_state_research_funding: "Державне фінансування досліджень"
 AST_state_research_funding_desc: "Щоб максимізувати ефективність наших дослідницьких установ, держава повинна стати їхнім основним джерелом фінансування, спрямовуючи зусилля туди, де вони найбільш потрібні, і гарантуючи, що інформація залишається під жорстким контролем. Зрештою, ми не можемо ризикувати, щоб наших громадян турбували неправильні ідеї."
 AST_graziers_to_industry: "Скотарів – у промисловість"
 AST_graziers_to_industry_desc: "Під час Великої депресії наші міста спорожніли, оскільки робітники шукали стабільності в селі. Тепер, контролюючи засоби виробництва, ми можемо повернути їх у промисловість. Ми повинні вселити в них розуміння потреби нації: печі промисловості мають живитися потом людей."
 AST_free_school_policy: "Політика безкоштовної освіти"
 AST_free_school_policy_desc: "Щоб сформувати зразкового громадянина, ми повинні сформувати його ідеї. Від колиски до університету держава направлятиме те, чого навчають наших дітей. Таким чином ми зможемо гарантувати, що майбутні покоління зрозуміють важливість соціалістичного ідеалу і небезпеку вільних ринків... та вільних думок."
 AST_free_healthcare_policy: "Політика безкоштовної медицини"
 AST_free_healthcare_policy_desc: "Наші люди заслуговують на те, щоб бути вільними від хвороб і травм, а якщо станеться найгірше, вони не повинні ставати жебраками через нещастя, як це буває в інших суспільствах. Ми забезпечимо загальний доступ до охорони здоров'я, лікарень та лікарів — бо здоровий народ це продуктивний народ."
 AST_the_publics_australia: "Народна Австралія"
 AST_the_publics_australia_desc: "Ми відкинули старий порядок і побудували країну, яка існує для багатьох, а не для обраних. Промисловість, праця та ресурси тепер служать народу в цілому. Це Народна Австралія. Рівна, єдина і незламна."
 # 'Cominwealth' over 'Commonwealth' is intentional
 AST_the_australian_commonwealth: "Австралійський Комінвелт"
 AST_the_australian_commonwealth_desc: "Британія колись претендувала на мантію лідера Співдружності, але її бачення було зіпсоване капіталістичними інтересами. Ми перехопимо цю роль і поведемо нації до спільної соціалістичної утопії."
 AST_union_control_commonwealth: "Розблоковує рішення §YКонтроль профспілок§!. \nДозволяє комуністичне проникнення в Нову Зеландію, Малайзію, Бірму і, зрештою, Індію."
 AST_a_comrade_emancipated: "Звільнений товариш"
 AST_a_comrade_emancipated_desc: "По всьому світу багато націй досі скуті ланцюгами капіталізму, а їхні народи позбавлені справжньої свободи. Як вільна соціалістична держава, наш обов'язок — допомогти їм звільнитися. Робітники всіх країн, єднайтеся, і ми разом скинемо ці ланцюги."
 AST_union_control_local: "Розблоковує рішення §YКонтроль профспілок§!. \nДозволяє комуністичне проникнення в Індонезію та Філіппіни."
 AST_comintern: "Приєднатися до Комінтерну"
 AST_comintern_desc: "Хоча Радянський Союз часом відступав від істинних марксистських принципів, він залишається прапороносцем робітничого інтернаціоналу. Приєднавшись до Комінтерну, ми зможемо об'єднати наші зусилля, щоб понести факел соціалізму по всьому світу."
 AST_comintern_tt: "Якщо §Y[AST.GetName]§! очолює альянс, він зіллється з Комінтерном. В іншому разі, §Y[AST.GetName]§! приєднається до Комінтерну самостійно."
 AST_for_greater_good: "Заради вищого блага"
 AST_for_greater_good_desc: "Наше бачення світової революції вимагає крові та жертв. У багатьох місцях факел соціалізму блимає; ми повинні відповісти на заклик і надіслати свою підтримку, щоб він не згас. Зрештою, це заради вищого блага вищого блага."
 AST_make_common_cause: "Створити спільну справу"
 AST_make_common_cause_desc: "Під нашим керівництвом Співдружність почала процвітати, ведена світлом соціалізму з темряви капіталістичного гноблення. У цей критичний момент ми маємо переконатися, що наша воля незламна, і ми маршируємо разом у краще майбутнє."
 AST_the_red_pacific: "Червоний Тихий океан"
 AST_the_red_pacific_desc: "Тихий океан має бути перебудований за образом революції. Від островів до узбережжя нашого регіону ми підтримуватимемо піднесення соціалістичних урядів і подбаємо, щоб червоний прапор майорів від берега до берега."
 AST_the_irish_anti-britain_pact: "Ірландський антибританський пакт"
 AST_the_irish_anti-britain_pact_desc: "Британія надто довго залишалася оплотом капіталізму, захищена своїм острівним становищем і морською міццю. Провокуючи заворушення серед докерів Ірландії та Північної Ірландії, ми можемо прорвати її оборону і відкрити шлях через Ірландське море для наших сил."
 AST_stretch_the_fleet: "Розширити флот"
 AST_stretch_the_fleet_desc: "Британія все ще стоїть як оплот капіталізму, захищена своїм могутнім флотом. Настав час розширити власні військово-морські можливості, перенести боротьбу до них і показати світові, чий острів більший."
 AST_chinese_relations: "Відносини з Китаєм"
 AST_chinese_relations_desc: "Наші товариші в Китаї борються за власне виживання. У нас є засоби допомогти їм, але діяти треба швидко, перш ніж їх розчавлять імперіалістичні сили, що вишикувалися проти них."
 AST_westward_battles: "Битви на заході"
 AST_westward_battles_desc: "Фашистські сили домінують на заході, загрожуючи самій основі нашого виживання. Тепер, бувши в союзі з Комінтерном, ми повинні перенести боротьбу на них і виступити проти тих, хто хотів би знищити робітничу утопію, яку ми будуємо."
 AST_strongholds: "Оплоти"
 AST_strongholds_desc: "Щоб закріпити нашу позицію на цьому новому театрі, ми повинні підтримати ірландських товаришів проти імперіалістичного серця капіталізму. Їхня попередня боротьба за незалежність дає цінні уроки для нашої спільної підготовки до наступного етапу глобального конфлікту."
 AST_out_of_the_den: "Вихід із лігва"
 AST_out_of_the_den_desc: "Багато хто в Ірландії досі має глибоку неприязнь до британського правління. Настав час показати нашу силу, витягнути їх із тіні та згуртувати навколо нашої справи проти спільного ворога."
 AST_end_the_kingdom: "Покінчити з Королівством"
 AST_end_the_kingdom_desc: "Час настав. Корінь імперіалістичного капіталізму отримає удар у своє гниле серце. Звільнення робітників по всій Британській імперії вже близько. Покінчити з монархією. Покінчити з королівством. Покінчити з пригніченням. Робітники Співдружності, єднайтеся!"
 AST_red_solidarity: "Червона солідарність"
 AST_red_solidarity_desc: "Боротьба в Китаї триває, мільйони страждають і гинуть. Їхня боротьба — наша боротьба, і ми не можемо стояти осторонь. Ми можемо втрутитися, розділити їхній тягар і гарантувати, що полум'я революції не згасне."
 AST_red_solidarity_tt: "§Y[AST.GetName]§! приєднується до війни §Y[PRC.GetNameDef]§! проти §Y[CHI.GetNameDef]§!. Менший альянс поглинає інший, або §Y[AST.GetName]§! вступає у війну безпосередньо, якщо вони вже союзники."
 AST_free_the_colonies: "Звільнити колонії"
 AST_free_the_colonies_desc: "Вогонь революції палає у розвалюваній Британській імперії. Колонії більше не будуть колоніями, а стануть вільними націями. Повстаньте, товариші! Скиньте свої кайдани і приєднуйтесь до революції!"
 AST_free_the_colonies_tt: "§Y[AST.GetName]§! знижує статус усіх колишніх британських колоній під її контролем до інтегрованих маріонеток."
 AST_battle_of_the_ocean: "Битва за океан"
 AST_battle_of_the_ocean_desc: "Океани довго служили артеріями світової торгівлі. Тепер настав час перенести боротьбу в Тихий океан і розірвати систему, яку він підтримує. Води стануть червоними від крові корумпованих капіталістів та героїв революції."
 AST_borderless_solidarity: "Солідарність без кордонів"
 AST_borderless_solidarity_desc: "Солідарність. Слово, що об'єднує робітників світу. Жоден кордон не може нас розділити, жодна нація не може стояти самотньо. Де б не палала боротьба, ми відповімо на заклик і станемо разом у глобальній битві за визволення."
 AST_an_equal_union: "Рівноправний союз"
 AST_an_equal_union_desc: "Хоча ми несемо прапор революції, всі, хто приєднується до нас, є рівними. У цьому союзі ресурси, праця та ідеї діляться вільно, формуючи майбутнє, де процвітання є колективним, і жодна нація не стоїть вище за іншу."
 AST_expanding_influence: "Розширення впливу"
 AST_expanding_influence_desc: "Стоячи на правильному боці історії, наші ідеї говорять самі за себе. Обіцянка робітничого раю — це не сон, а реальність, що створюється. Ми можемо поширити це бачення назовні, запрошуючи інших приєднатися до нас у побудові спільного майбутнього."

 AST_public_works: "Громадські роботи"
 AST_public_works_desc: "Велика депресія залишила австралійську економіку у важкому стані. Ми започаткуємо низку програм громадських робіт, щоб повернути людей на роботу та відновити споживчі витрати."
 AST_lang_plan: "План Ланґа"
 AST_lang_plan_desc: "Джек Ланґ вийшов на передній план економічної політики завдяки своїй гучній відмові виконувати зобов'язання за зовнішнім боргом, спрямовуючи натомість ці кошти на державні ініціативи, спрямовані на стимулювання внутрішнього зростання. Зрештою, не можна вичавити кров з каменя."
 AST_exports_for_economic_recovery: "Експорт для економічного відновлення"
 AST_exports_for_economic_recovery_desc: "Опоненти ідей Ланґа натомість пропонують використовувати зовнішні ринки та борги для заохочення закордонних інвестицій і продажів, зробивши ставку на експортно-орієнтовану економіку задля підвищення внутрішнього виробництва, зайнятості та, в кінцевому підсумку, споживчих витрат."
 AST_the_phosphate_commision: "Фосфатна комісія"
 AST_the_phosphate_commision_desc: "Після Великої війни Науру було передано під спільну опіку Австралії, Нової Зеландії та Великої Британії. У 1919 році права на весь продаж фосфатів на острові були передані цим опікунам, на чолі з Австралією. Використовуючи нашу лідерську позицію, ми можемо впливати на ціноутворення та забезпечити надзвичайно конкурентні ціни для нашого внутрішнього ринку."
 AST_goods_standard: "Товарний стандарт"
 AST_goods_standard_desc: "Основним принципом економічної теорії Джека Ланґа є скасування Золотого стандарту в Австралії та заміна його Товарним стандартом, який прив'язує грошову масу до фактичної кількості вироблених товарів. Це гарантує, що рух капіталу прив'язаний безпосередньо до внутрішньої продуктивності, а не до зовнішніх факторів."
 AST_standard_gauge_line_to_darwin: "Залізниця стандартної колії до Дарвіна"
 AST_standard_gauge_line_to_darwin_desc: "Нам занадто довго не вистачало належного сполучення з нашими північними територіями. У рамках ширшої програми громадських робіт, спрямованої на повернення грошей в економіку, ми можемо побудувати залізницю, що з'єднає наші південні міста з північчю."
 AST_lang_is_right: "Ланґ правий"
 AST_lang_is_right_desc: "Що ж, виявляється, що Ланґ мав рацію! Відмовляючись ставити в пріоритет іноземних кредиторів і замість цього агресивніше використовуючи нашу власну банківську систему, ми можемо вивільнити значні кошти. Потім їх можна спрямувати у внутрішню економіку, забезпечуючи такі необхідні інвестиції та стимулюючи зростання."
 AST_within_reach: "У межах досяжності"
 AST_within_reach_desc: "Так близько, і водночас так далеко. Австралія — надзвичайно багата на ресурси країна, і якщо ми копнемо трохи глибше, під нашими ногами лежать незліченні багатства. З розширенням нашої інфраструктури навіть віддалені шахти стали доступними, і ми стоїмо на порозі ери австралійського процвітання, заснованого на багатстві корисних копалин."
 AST_a_domestic_supply_chain: "Внутрішній ланцюг постачання"
 AST_a_domestic_supply_chain_desc: "Одним із побічних ефектів нашої зосередженості на внутрішній економіці є розвиток надзвичайно стійкої виробничої системи. З усіма рівнями виробництва, розташованими вдома, ми значною мірою захищені від зовнішніх потрясінь."
 AST_broken_hill_propietary_company: "Компанія «Broken Hill Proprietary»"
 AST_broken_hill_propietary_company_desc: "Компанія «Broken Hill Proprietary» є одним із провідних виробників корисних копалин і сталі в Австралії. Названа місцевими жителями «Великим Австралійцем», вона домінує в галузі. З різким збільшенням попиту на сировину, компанія має хороші позиції для ще швидшого зростання."
 AST_radium_hill: "Редіум-Гілл"
 AST_radium_hill_desc: "У Південній Австралії було знайдено уран, і шахта Редіум-Гілл має значний потенціал для розширення. Хоча ми все ще розкриваємо всі можливості цих нових технологій, очевидно, що ми стоїмо на порозі Атомного віку, і це може стати нашим квитком до нього."
 AST_industrial_expansion: "Промислова експансія"
 AST_industrial_expansion_desc: "Велика депресія завдавала шкоди економічним показникам нашої країни протягом більшої частини минулого десятиліття. Тепер, коли у нас є політична воля до більш рішучих дій, ми повинні спрямувати її на сміливе розширення нашої промислової бази, створюючи робочі місця, збільшуючи попит на ресурси та випускаючи більше товарів для ринку."
 AST_income_tax_assessment_act: "Закон про оцінку прибуткового податку"
 AST_income_tax_assessment_act_desc: "Наша система оподаткування перебуває в поганому стані, і людям важко в ній орієнтуватися, що вимагає жорсткого державного нагляду, який ми не можемо собі дозволити. Переглянувши та оптимізувавши відповідні положення, ми можемо зробити збір податків значно ефективнішим."
 AST_council_for_scientific_and_industrial_research: "Рада з наукових і промислових досліджень"
 AST_council_for_scientific_and_industrial_research_desc: "Рада з наукових і промислових досліджень була посилена після Імперської конференції 1923 року, щоб допомогти розширити економічну базу різних колоній і домініонів. Хоча її внесок був значним, настав час надати органу новий напрямок: розвиток виробництва та вторинної промисловості."
 AST_bring_home_the_farmers: "Повернути фермерів додому"
 AST_bring_home_the_farmers_desc: "Під час Великої депресії наші великі міста значно знелюдніли, оскільки робітники переїжджали до сіл у пошуках роботи в сільському господарстві. Тепер, коли умови починають покращуватися, ми повинні стимулювати повернення нашої робочої сили, щоб ми могли знову запустити фабрики і відновити виробництво."
 AST_reverse_wage_cuts: "Скасувати зниження зарплат"
 AST_reverse_wage_cuts_desc: "Щоб дати бізнесу шанс на виживання, ми впровадили серію скорочень заробітних плат в усій економіці. Тепер, коли ми бачимо ознаки відновлення, нам слід змінити курс. Зростання зарплат веде до збільшення купівельної спроможності, що допомагає стимулювати споживання та економічне зростання."
 AST_the_manpower_directorate: "Управління трудовими ресурсами"
 AST_the_manpower_directorate_desc: "Оскільки наша економіка стає дедалі складнішою, ми стикаємося зі зростаючими кадровими проблемами. Це управління має забезпечити, щоб правильні люди з правильними навичками призначалися на правильні посади у правильний час."
 AST_recovery: "Відновлення"
 AST_recovery_desc: "Вперше наш валовий внутрішній продукт перевищив додепресійний рівень. Це момент для святкування, оскільки тепер єдиним напрямком для нашої економіки є зростання. Ми вступаємо в період сильного зростання, і настав час пожинати плоди нашого оновленого процвітання."
 AST_devalued_currency: "Девальвована валюта"
 AST_devalued_currency_desc: "Один із найефективніших способів збільшити експорт — послабити валюту. Якщо іноземні покупці можуть придбати більше наших товарів, оскільки їхні гроші мають вищу цінність, ми стаємо більш конкурентоспроможними на міжнародному рівні. Проте це палиця з двома кінцями, оскільки імпорт з інших країн також подорожчає."
 AST_reverse_industry_tariffs: "Скасувати промислові мита"
 AST_reverse_industry_tariffs_desc: "У минулому ми використовували мита, щоб захистити нашу вітчизняну промисловість від іноземної конкуренції. Однак це призвело до торгових воєн і митних заходів у відповідь проти нашого експорту, підвищуючи ціни. Ми повинні знизити ці бар'єри та заохотити взаємне зниження для сприяння розширенню торгівлі."
 AST_foreign_competition: "Іноземна конкуренція"
 AST_foreign_competition_desc: "Конкуренція корисна для бізнесу; вона стимулює інновації та ефективність, водночас усуваючи самовдоволення. Це світ, де виживає сильніший, і нам треба переконатися, що наш пес найбільший, і що ми зняли з нього нашийник, щоб він був повністю вільний конкурувати."
 AST_expanding_into_new_markets: "Вихід на нові ринки"
 AST_expanding_into_new_markets_desc: "Перевага покладання на зовнішні ринки замість внутрішнього проста. Світовий ринок величезний. Завжди будуть нові ринки для освоєння; нам просто потрібно знайти свою перевагу і продемонструвати перевагу австралійських товарів і методів ведення бізнесу."

 AST_populate_or_perish: "Заселяй або помри"
 AST_populate_or_perish_desc: "Коли вдарила Велика депресія, рівень народжуваності стрімко впав, і з тих пір ніяк не міг відновитися. З метою продовження внутрішнього розвитку, ми створимо федеральний Департамент імміграції для керівництва та контролю за новою імміграційною програмою."
 AST_recruitment_drive: "Кампанія з вербування"
 AST_recruitment_drive_desc: "Слабка воля попередніх урядів, а також їхня надмірна залежність від Британії, призвели до тривалого періоду нехтування збройними силами Австралії. Це більше не може тривати, і ми запускаємо кампанію з вербування до Сил оборони Австралії."
 AST_new_deal: "Новий курс"
 AST_new_deal_desc: "Протест, що відбувся під час 150-річного ювілею [AST.GetName], зробив очевидним, що наші закони стосовно громадян з корінного населення повинні бути переглянуті. На прохання груп активістів з прав аборигенів, ми зустрінемося з ними, щоб разом визначити шлях до повноцінного громадянства для корінних народів."
 AST_the_1938_sesquicentenary_flag: "Відбулася подія §YПівторастолітній ювілей 1938 року§!."
 AST_the_1938_sesquicentenary_tt: "Фокус '§YНовий курс§!' у гілці §YЗаселяй або помри§! стає доступним."
 AST_repeal_immigration_restrictions: "Скасувати імміграційні обмеження"
 AST_repeal_immigration_restrictions_desc: "Департамент імміграції обмежений застарілими законами, що визначають, кому дозволено іммігрувати до [AST.GetName]. Незважаючи на ризик спровокувати суперечки, ми скасуємо ці закони і натомість запровадимо систему квот для контролю потоку іммігрантів."
 AST_womens_armed_services: "Жіночі збройні сили"
 AST_womens_armed_services_desc: "Попри шалений опір, формування жіночих збройних сил буде продовжено. Ми вітатимемо будь-яку допомогу в захисті [AST.GetName] від агресорів, незалежно від статі. Для стимулювання вербування та підготовки вибір директорів для сил має першочергове значення."
 AST_northern_territory_reconnaissance_unit: "Розвідувальний підрозділ Північної території"
 AST_northern_territory_reconnaissance_unit_desc: "Лейтенант авіації та антрополог Дональд Томсон виступав за включення аборигенного населення до збройних сил [AST.GetName], і до нього нарешті прислухаються. Ми доручимо особисто Томсону зібрати розвідувальний підрозділ з людей із місцевими знаннями та навичками виживання в буші для патрулювання навіть найвіддаленіших і найсуворіших наших земель."
 AST_northern_territory_reconnaissance_unit_tt: "Розблоковує роту підтримки §YРозвідувальний підрозділ Північної території§!."
 AST_torres_strait_battalion: "Батальйон Торресової протоки"
 AST_torres_strait_battalion_desc: "Зусилля роти Торресової протоки як гарнізону були добре організовані, але її люди мають потенціал для інших досягнень. З огляду на те, що її члени походять з островів біля північного узбережжя [AST.GetName], підрозділ має глибокі знання про Торресову протоку. Ми підготуємо цих людей як морську піхоту і закличемо додаткових добровольців для формування батальйону."
 AST_department_of_aboriginal_affairs: "Департамент у справах аборигенів"
 AST_department_of_aboriginal_affairs_desc: "Ми реалізуємо пропозицію груп активістів з прав аборигенів щодо створення нового Департаменту у справах аборигенів. Департамент буде консультувати комітет з представників аборигенної спадщини, і його метою буде забезпечення доступу корінного населення до належної їжі та медичної допомоги."
 AST_immediate_rights: "Негайні права"
 AST_immediate_rights_desc: "Жодна група населення в [AST.GetName] не буде обмежуватись федерацією, і жодна спадщина не має обмежувати надання громадянських прав. Створивши власний акт про громадянство і відійшовши від поняття, що наше населення складається виключно з британських підданих, австралійські права більше не будуть умовними."
 AST_diverse_army: "Різноманітна армія"
 AST_diverse_army_desc: "Захист своєї країни — це не лише привілей, але й право. Кожен охочий австралієць матиме змогу записатися на службу, і кожен амбітний солдат повинен мати можливість підніматися в званнях."

