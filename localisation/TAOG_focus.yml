 AST_natunity_desc: "§YNational Unity Government§!\n§LIn moments of crisis, small struggles give way for larger ones. Nations around us face conflict after conflict, and although domestic issues carry their own urgency, that urgency fades when the threat of bloodshed grows ever more imminent. [AST.GetName]'s democratic parties must lay aside their disagreements and face the world united.§!"
