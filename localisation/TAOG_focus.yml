 idea_SIA_weather_broadcasts: "Прогнози погоди"
 idea_SIA_weather_broadcasts_desc: "Регулярні прогнози погоди дають нашим повітряним та військово-морським силам чіткішу картину умов, підвищуючи їхню ефективність і зменшуючи ризики дій у погану погоду."
 idea_SIA_seri_thai_contacts: "Контакти Сері Тай"
 idea_SIA_seri_thai_contacts_desc: "Контакти з мережею опору Сері Тай доводять свою цінність, залучаючи досвідчених бійців та зміцнюючи зв'язки з Союзниками."
 idea_SIA_secure_rubber_islands: "Захист каучукових островів"
 idea_SIA_joint_military_command: "Об'єднане військове командування"
 idea_SIA_joint_military_command_desc: "Об'єднана структура командування покращила координацію між родами військ, прискоривши розвиток досвідчених офіцерів та бойової доктрини."
 idea_SIA_asian_democratic_compact: "$SIA_asian_democratic_compact$"
 idea_SIA_get_off_our_shores: "Забирайтеся з наших берегів"
 idea_SIA_how_quickly_the_table_turns: "Як швидко все змінилося"
