# == (*) ==
 INS_nationalize_companies_tt: "All Military Industrial Organizations and Industrial Concerns will be nationalized and given a new name."
 available_focus_tt: "§GAvailable§! focus(es):\n"

 INS_is_union_tt: "Has formed the Netherlands-Indonesia Union"
 INS_is_union_tt_NOT: "Has not formed the Netherlands-Indonesia Union"

 INS_denounce_soetardjo: "Denounce Soetardjo"
 INS_denounce_soetardjo_tt: "We will begin planning an underground revolution, infiltrating the government and establishing guerilla cells across the archipelago. Once we are sufficiently prepared, we will begin a guerilla war of independence against the Dutch."
 INS_soetardjo_petition_debate_done_tt: "The Volksraad debate on Soetardjo's petition for autonomy has concluded"
 INS_tkr_tt: "Modifies §YThe People's Security Army§! by:"
 INS_commander_sudirman_tt: "§YSudirman§!([INS.GetFlag]) Gets promoted to §YField Marshal§!"
 INS_the_declaration_of_independence: "The Declaration of Independence"
 INS_the_declaration_of_independence_desc: "We cannot risk waiting any longer, we must strike while the iron is hot! We should send our militias to seize control of ports, cities, and industrial centres quickly enough that the Dutch authorities will not have time to react. Then, we will declare independence, proclaiming the Republic of Indonesia."
 INS_the_declaration_of_independence_tt: "We will declare §YIndependence§!. Every state where we established a §YMilitia Base§! or §YHeadquarters§! will be under our control, with the rest staying with [HOL.GetNameDef]\n\n[HOL.GetNameDefCap] will not recognize our sovereignty and a low-intensity conflict will commence. This could escalate to a §Rwar§!.\n\nUnlocks land raids to take over states."
 INSHOL_the_declaration_of_independence: "The National Revolution"
 INS_laskar_rakjat: "Laskar Rakyat"
 INS_laskar_rakjat_desc: "The revolution is made up of many various militias across Indonesia, some big and some small. Organizing the militias is a necessary step to achieve victory. We mustn't be too hasty, however, as empowering militias with ties to our political rivals could pose catastrophe."
 INS_militia_tt: "Creates a new §YFreedom Fighter§! militia division template and unlocks decisions to manage them."
 INS_militia_warning_tt: "Militias are §Ysemi-autonomous§! groups of freedom fighters. They will fight for us, but their help is not free. They will expect to receive compensation for their efforts. §RStability will be drastically impacted if demands are not met!§!"
 INS_usa_tanks_opinion_mod: "Purchased Our Tanks"
 INS_republic_add_generals_tt: "(§Y$INS_sudirman$§!([INS.GetFlag]), §Y$INS_soengkono$§!([INS.GetFlag]), §Y$INS_supriyadi$§!([INS.GetFlag]), §Y$INS_djatikoesoemo$§!([INS.GetFlag]), §Y$INS_maludin_simbolan$§!([INS.GetFlag])) becomes a General."
 INS_big_militia_presence_tt: "Will be controlled by our Militias upon declaring independence."

 INS_prepare_raiding_bases: "Prepare Raiding Bases"
 INS_prepare_raiding_bases_desc: "We will utilize our network of spies to establish bunkers across the entire archipelago in secret, ensuring we are prepared to strike once the revolution begins."

 # <Joint Tree - Central Milestones>
 INSHOL_dutch_east_indies: "Dutch East Indies"
 INSHOL_dutch_east_indies_desc: "The colony was founded nearly 500 years ago, and has taken many shapes since then. The world is changing quickly, and our actions now will dictate the future of Dutch-Indonesian relations far into the future."
 INSHOL_the_war_in_europe: "The War in Europe"
 INSHOL_the_war_in_europe_desc: "The conflict in Europe is rapidly escalating, and the Netherlands is now at war. We can no longer rely on them to protect us and must stand our ground, or else we risk being overtaken by foreign powers."

 # <Joint Tree - Military Equipment Contracts>
 INSHOL_military_equipment_contracts: "Military Equipment Contracts"
 INSHOL_military_equipment_contracts_desc: "The Indies is a vast archipelago with tens of millions of citizens. We are far from having the Industrial capacity necessary to defend ourselves. However, we have enough resources to secure trade all across the world. By securing contracts with Democracies across the world, our problem can be solved."
 INSHOL_hawk_75a7: "The Hawk 75a-7"
 INSHOL_hawk_75a7_desc: "The American Hawk 75A-7 fighter is the perfect plane for the Indies, affordable and powerful. We can secure a deal with the manufacturer in order to make the much needed improvements to our Air Force."
 INSHOL_purchase_american_tanks: "Purchase American Tanks"
 INSHOL_purchase_american_tanks_desc: "While the Indies lacks the industry needed for Tank Manufacturing, we can purchase them directly from the United States funded by the Indies rubber industry."
 INSHOL_purchase_british_artillery: "Purchase British Artillery"
 INSHOL_purchase_british_artillery_desc: "We can outsource our Artillery manufacturing to the United Kingdom, allowing us to prioritize other equipment."
 INSHOL_produce_own_goods: "Produce Our Own Goods"
 INSHOL_produce_own_goods_desc: "While we have plenty of lucrative trade deals we can secure, we must not forget about our own production lines and military industrial companies. We should subsidize said companies so that we can decrease our dependence on foreign imports."

 # <Joint Tree - East Indies Investments>
 INSHOL_east_indies_investments: "East Indies Investments"
 INSHOL_east_indies_investments_desc: "A good overlord is one that invests in the development of her Colonies. Investing into the economic development of the Indies is in our best interest, and beneficial for the citizens of the Colony."
 INSHOL_east_indies_student_exchange: "East Indies Student Exchange Program"
 INSHOL_east_indies_student_exchange_desc: "Creating a system where Indonesians can move to the Netherlands to study in our Universities can be a significant boon to the economy of the Netherlands and Indies alike."
 INSHOL_east_indies_fokker_division: "Form an East Indies Fokker Division"
 INSHOL_east_indies_fokker_division_desc: "Fokker is being licensed by the Indies Air Force enough to where it is worth considering creating a dedicated subsidiary prioritizing the Indies Air Force."
 INSHOL_expand_shell: "Expand Shell's Infrastructure"
 INSHOL_expand_shell_desc: "Shell is gradually becoming a larger part of our economy. It is clear we must expand the oil infrastructure in the Indies to keep up with Shell's export capacity."
 INSHOL_increase_funding_for_tix: "Increase Funding for the T.IX Airplane Project"
 INSHOL_increase_funding_for_tix_desc: "Engineers at Fokker are developing a new twin-engine bomber to replace the obsolete models used by the Indies Air Force. This project has a very low budget, and is likely to not be completed for a very long time. We can increase their funding to greatly speed up progress."
 INSHOL_reduce_land_ownership_taxes: "Reduce Land Ownership Taxes"
 INSHOL_reduce_land_ownership_taxes_desc: "We should reduce the tax placed on Indonesian citizens that own land, encouraging the development of farms and businesses."
 INSHOL_coffee_plantations: "Coffee Plantations"
 INSHOL_coffee_plantations_desc: "We should focus on obtaining more state-owned land in the eastern islands. We can use this land to build Coffee plantations."
 INSHOL_overallwagen: "Overvalwagen"
 INSHOL_overallwagen_desc: "Tanks are not necessarily the solution for the East Indies Army. We lack the industrial strength necessary to produce them, and the harsh terrain renders them niche. We could invest in building Armored Cars for Indonesia to fill the gap."
 INSHOL_indonesian_cheap_labor: "Indonesian Cheap Labor"
 INSHOL_indonesian_cheap_labor_desc: "$CONGO_cheap_labor_desc$" #LL: stealing this to save time, hope you don't mind!
 INSHOL_eastern_development_fund: "Development Fund for the Eastern Islands"
 INSHOL_eastern_development_fund_desc: "We focus too much on investments into Java and Sumatra, ignoring most of the Colonies land. We must commit to developing infrastructure in the East to allow for future industrialization."
 INSHOL_increase_rubber_taxes: "Increase Rubber Taxes"
 INSHOL_increase_rubber_taxes_desc: "Many rubber companies in the Indies are acquiring great wealth using the resources of the Colony. It is only fair we put a hefty tax on these operations."

 INSHOL_reform_knil: "Reform the KNIL"
 INSHOL_reform_knil_desc: "Since the East Indies completed its conquest of the entire archipelago, the Royal Netherlands East Indies Army has remained immobile and has a severe lack of funding. With rising tensions worldwide, we must begin rearming the Indies sooner rather than later."
 INSHOL_fund_ml_knil: "Fund the ML-KNIL"
 INSHOL_fund_ml_knil_desc: "If we want to keep up with the armies of the world, we must build a proper air force of our own, otherwise we will be at a significant disadvantage."
 INSHOL_bandung_aircraft_facility_tt: "§YWest Java:§!\n    Add §G1§! Building Slots and §G1§! §YMilitary Factory§! per prerequisite focus completed."
 INSHOL_rangers: "Rangers"
 INSHOL_rangers_desc: "The Indies is a vast archipelago with a diverse environment. We should train Rangers adapted to combat in these harsh environments, to ensure we are ready to defend them."
 INSHOL_mountaineers: "Mountaineers"
 INSHOL_mountaineers_desc: "We should train Mountaineers that are prepared to fight in the hostile terrain of our archipelago."
 INSHOL_elevate_elite_infantry: "Depot Speciale Troepen"
 INSHOL_elevate_elite_infantry_desc: "We cannot rely on great war strategies forever, we must adapt to new technologies and ensure we do not fall behind. We should establish several elite infantry divisions that are ready to defend all sorts of environments."
 INSHOL_modernize_knil: "Modernize the KNIL"
 INSHOL_modernize_knil_desc: "We will study new strategies and doctrines for the East Indies Army, ensuring we maintain an advantage on the enemy."
 INSHOL_transfer_of_henri_winkelman: "Transfer of Henri Winkelman"
 INSHOL_transfer_of_henri_winkelman_desc: "Henri Winkelman previously served in the KNIL for many years. It is clear he is needed in the Indies once more, and we should arrange for his formal transfer to the East Indies."
 INSHOL_eastern_conscription: "Raise the Auxiliary Corps"
 INSHOL_eastern_conscription_desc: "There are several indigenous auxiliary corps on Java and Madura which are controlled by local princely rulers. In these dire times, we could negotiate an agreement with the local rulers wherein these divisions will be under our authority."
 INSHOL_establish_vk_knil: "Establish the VK-KNIL"
 INSHOL_establish_vk_knil_desc: "We will establish a Women's Volunteer Corps for the KNIL. Their contributions will serve an important role in improving our logistics and communications."
 INSHOL_emergency_dockyard_construction: "Emergency Dockyard Construction"
 INSHOL_emergency_dockyard_construction_desc: "The threat of a naval invasion cannot be understated, we must prioritize our naval defense as our top priority."
 INSHOL_emergency_powers_gov_general: "Emergency Powers For the Governor General"
 INSHOL_emergency_powers_gov_general_desc: "The ongoing war requires hard decisions to be made without delay, which is not possible when all decisions in the Indies must go through the Netherlands beforehand. We should grant emergency authority to [INS.GetLeader] so that he can act without delay."
 INSHOL_emergency_naval_purchases: "Emergency Naval Purchases"
 INSHOL_emergency_naval_purchases_desc: "Our coasts are unsafe and insufficiently defended. Time is of the essence, we must obtain a stronger navy or we will surely perish. We will purchase ships from private companies using debt, and refit them into naval destroyers."

 INSHOL_east_indies_navy: "East Indies Navy"
 INSHOL_east_indies_navy_desc: "[INS.GetNameDefCap] lacks an official Navy, leaving the Netherlands in charge of defending the colony. With the increasing tension in Europe and Asia, this will not continue to work. We must take the first step toward founding a dedicated [INS.GetAdjective] navy."
 INSHOL_marines: "Marines"
 INSHOL_marines_desc: "We should establish a dedicated Indies Marine Corps under the new Navy, and send marines in training to learn on Dutch ships."
 INSHOL_domestic_ship_production: "Domestic Ship Production"
 INSHOL_domestic_ship_production_desc: "If we want our Navy to stand against our neighbors, we must begin to ramp up domestic ship production."
 INSHOL_destroyers: "Destroyers"
 INSHOL_destroyers_desc: "Our heavier warships cannot work the narrow seas of the archipelago without escorts to screen them. By laying down modern destroyers, the [ROOT.GetAdjective] navy can guard its shipping lanes and drive off torpedo craft across the straits."
 INSHOL_cruisers: "Cruisers"
 INSHOL_cruisers_desc: "A fleet without battleships must rest its weight on its cruisers. Building a strong cruiser squadron gives the [ROOT.GetAdjective] navy a hard core able to patrol the long distances between the islands and answer any raider that enters our waters."
 INSHOL_submarines: "Submarines"
 INSHOL_submarines_desc: "The straits of the East Indies are made for ambush, and a submarine costs far less than the warship it sends to the bottom. A strong submarine arm lets the [ROOT.GetAdjective] navy hold the sea lanes and strike at enemy shipping without ever showing itself."
 INSHOL_outsourced_navy: "Outsource Production to Corporations"
 INSHOL_outsourced_navy_desc: "We have enough expenses as it is, we cannot continue to divert more and more of the colonial budget to the Navy. We can pay corporations to handle production for us."
 INSHOL_divert_civilian_to_navy: "Divert Civilian & Army Spending to the Navy"
 INSHOL_divert_civilian_to_navy_desc: "With the current state of the world, the risk of a naval invasion is higher than ever. We cannot afford to be frugal, we must divert funding from all sectors of government towards the Navy."

 INS_netherlands_can_remove_autonomy_tt_50: "\nIf [HOL.GetFlag]§Y[HOL.GetNameDefCap]§! completes this focus first:\n    ([INS.GetFlag]§Y[INS.GetName]§!): Add §Y£autonomy_texticon -50.00§!"
