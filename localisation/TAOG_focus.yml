 AST_uap_election_campaign_tt: "§YВиборча кампанія УАП§!\n§LЗгуртувати середній клас, власників бізнесу та імперських лоялістів; Партія об'єднаної Австралії запустить політичну кампанію.§!\n\n§YЕфект:§!\nЩоденна вартість політичної влади: §R1.00§!\nЩоденне зростання голосів §YУАП§!: §G+0.05%§!"
 AST_alp_election_campaign_tt: "§YВиборча кампанія АЛП§!\n§LЗгуртувати робітничий клас, членів профспілок та реформаторів, орієнтованих на внутрішні проблеми; Австралійська лейбористська партія запустить політичну кампанію.§!\n\n§YЕфект:§!\nЩоденна вартість політичної влади: §R1.00§!\nЩоденне зростання голосів §YАЛП§!: §G+0.05%§!"

