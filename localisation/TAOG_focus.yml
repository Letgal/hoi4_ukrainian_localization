 idea_SIA_yielded_the_air_war: "Поступка в повітряній війні"
 idea_SIA_yielded_the_air_war_desc: "Поступившись контролем над небом, ресурси перенаправляються на протиповітряну оборону замість прямої боротьби за перевагу в повітрі."
