 AST_alp_popularity_decrease_5: "Голоси §Y$AST_ruling_party$§! §Y$AST_alp$§!: §R-5.00%§!\n\n"

 AST_australian_military_forces: "Збройні сили Австралії"
 AST_australian_military_forces_desc: "Загартовані у вогні Великої війни, австралійські військові довели свою доблесть на далеких берегах, твердо стоячи в деяких з найжорстокіших кампаній того конфлікту. У роки по тому армія була зменшена в розмірах і переформована в оборонні сили, завданням яких переважно є захист рідних островів. Важко здобуті уроки минулого зберігаються, готові бути застосованими знову."
 AST_permanant_military_forces: "Постійні збройні сили"
 AST_permanant_military_forces_desc: "Основними збройними силами Австралії є міліція, якій доручено захищати материк. Однак у цей час зростання глобальної напруженості доцільно створити кадри професійних офіцерів і солдатів, багато з яких здобули досвід під час Великої війни. Навіть якщо спочатку вони служитимуть у резерві, ці сили забезпечать стабільність і стандартизований рівень підготовки."
 AST_invoke_the_1903_defence_act: "Застосувати Закон про оборону 1903 року"
 AST_invoke_the_1903_defence_act_desc: "Традиційно Австралія покладалася на свою міліцію для національної оборони. Проте в часи значної загрози ми можемо застосувати Закон про оборону 1903 року. Це дозволяє нам призивати додаткову робочу силу для оборонних цілей."
 AST_lithgow_small_arms_factory: "Завод стрілецької зброї Літгоу"
 AST_lithgow_small_arms_factory_desc: "Заснований у 1912 році, Завод стрілецької зброї Літгоу був створений, щоб зменшити залежність від британської зброї та обладнання у воєнний час. Оскільки глобальна напруженість знову зростає, ми повинні розширити виробництво для задоволення зростаючих потреб наших збройних сил."
 AST_dingo_scout_car: "Розвідувальна машина Dingo"
 AST_dingo_scout_car_desc: "Австралія не має сильних традицій розробки бронетехніки, але наші збройні сили дедалі частіше вимагають підсилення у цій сфері. Тому нам слід ретельніше приймати власні проєкти, такі як розвідувальна машина Dingo."
 AST_volunteer_defence_corps_taog: "Добровольчий корпус оборони"
 AST_volunteer_defence_corps_taog_desc: "Створений як сили, подібні до британської Національної гвардії, Добровольчий корпус оборони — це неоплачувана громадянська міліція, що складається з тих, хто не підлягає регулярній службі. Незважаючи на ці обмеження, їхнє знання місцевої місцевості робить їх добре придатними для партизанської війни, якщо станеться найгірше."
 AST_war_carriers: "Військові носії"
 AST_war_carriers_desc: "Логістика виграє війни, і більшість місцевості, в якій діє Австралія, погано підходить для звичайного транспорту, такого як вантажівки чи поїзди. Натомість ми повинні покладатися на місцеву робочу силу, добре пристосовану до умов і знайому з прихованими стежками та скороченнями."
 AST_anzac_spirit: "Дух АНЗАК"
 AST_anzac_spirit_desc: "Австралійський та новозеландський армійський корпус здобули грізну репутацію під час Великої війни, витративши багато зусиль і крові заради перемоги Імперії. Їхні якості були очевидні всім: витривалість, мужність, винахідливість і гарне почуття гумору — у поєднанні з недбалою непокорою перед лицем небезпеки та труднощів."
 AST_lee_enfield_no1_mark3: "Lee-Enfield No.1 Mk III*"
 AST_lee_enfield_no1_mark3_desc: "Ця маленька зірочка має значення — Lee-Enfield No. 1 Mk III* означає модифікації воєнного часу для швидшого і дешевшого виробництва. Оскільки попит випереджає навіть ці досягнення, ми повинні прийняти «схему розповсюдження», за якої компоненти вироблятимуться меншими фірмами та збиратимуться в Літгоу для збільшення випуску."
 AST_new_south_wales_government_railways: "Урядові залізниці Нового Південного Уельсу"
 AST_new_south_wales_government_railways_desc: "Майстерні урядових залізниць Нового Південного Уельсу забезпечують унікальну можливість: великі сталеві компоненти, відлиті одним шматком. Як одна з небагатьох націй Співдружності, здатна виготовляти повністю литі корпуси та башти танків, ми маємо використати цей потенціал з користю."
 AST_second_australian_imperial_force: "Другі Австралійські Імперські сили"
 AST_second_australian_imperial_force_desc: "Австралія розгорнула Перші Австралійські Імперські сили під час Великої війни, відправивши війська за кордон для бойових дій. Оскільки війна знову загрожує охопити світ, ми повинні створити Другі Імперські сили, щоб продемонструвати силу Австралії за кордоном."
 AST_expeditionary_leader: "Цей §YГенерал§! матиме рису §YЕкспедиційний лідер§!, яка покращує його можливості за кордоном, але обмежує кількість дивізій, якими він може командувати."
 AST_expeditionary_leader_plural: "Обидва §YГенерали§! матимуть рису §YЕкспедиційний лідер§!, яка покращує їхні можливості за кордоном, але обмежує кількість дивізій, якими вони можуть командувати."
 AST_larrikinism: "Ларрікінізм"
 AST_larrikinism_desc: "Визначаючись як «некультурна, галаслива, але добросерда людина», ларрікінізм став уособленням австралійської культури: сувора витривалість, неповага до авторитетів і добродушний виклик перед лицем небезпеки. Австралійські солдати заслужили репутацію у Великій війні за те, що з гідністю стикалися з труднощами і сприймали все спокійно."
 AST_diggers: "Діггери"
 AST_diggers_desc: "«Копай, копай, копай, поки не будеш у безпеці» — такий наказ отримав генерал Вільям Бірдвуд, коли АНЗАК висадилися в Ґалліполі, і ці слова стали синонімом австралійського стилю війни. Проте дух Діггера сягає глибше, пов'язуючи австралійських і новозеландських солдатів через «товариство»: міцний зв'язок боротьби пліч-о-пліч і заради своїх товаришів."
 AST_owen_gun: "Пістолет-кулемет Оуена"
 AST_owen_gun_desc: "Інноваційний вітчизняний пістолет-кулемет Оуена заслужив репутацію надійної та міцної зброї, як і наші солдати. Оскільки наші війська б'ються по всьому світу, ми маємо прийняти цю зброю не лише як символ австралійської винахідливості та дизайну, але й як символ самого нашого воєнного духу."
 AST_department_of_supply_and_development_taog: "Міністерство постачання та розвитку"
 AST_department_of_supply_and_development_taog_desc: "Оскільки вимоги війни доводять наші виробничі та логістичні системи до межі, ми повинні централізувати наші зусилля під спеціальним органом, відповідальним за їх координацію та підтримку."
 AST_sentinel_tank_development: "Розробка танка Sentinel"
 AST_sentinel_tank_development_desc: "Історично ми покладалися на імпортні проєкти танків, навіть коли виробляли їх у себе. Ми повинні спиратися на уроки, винесені з цих машин, і, додавши частку австралійських інновацій, розробити власний танк, пристосований до наших можливостей і ресурсів."
 AST_establish_training_camps: "Створити тренувальні табори"
 AST_establish_training_camps_desc: "Як і у Великій війні, Другі Імперські сили можуть бути закликані воювати в будь-якій точці світу. Тому ми маємо розробити комплексні програми тренувань, щоб підготувати наших солдатів до будь-якого середовища, від пустель Північної Африки до джунглів південної частини Тихого океану."
 AST_jungle_tanks_if_sentinel_tank_development: "Якщо ми завершили «Розробка танка Sentinel»:"
 jungle_heavy_tanks: "Важкі танки для джунглів"
 AST_anti_malaria_campaign: "Антималярійна кампанія"
 AST_anti_malaria_campaign_desc: "Наші сили можуть бути відправлені воювати в джунглях Тихого океану, де їх чекає загроза більш смертоносна, ніж ворожі кулі: малярія. Ми повинні вжити рішучих заходів, щоб захистити наші війська від цього невидимого ворога."
 AST_defence_citizen_military_forces_act: "Закон про оборону громадянських збройних сил"
 AST_defence_citizen_military_forces_act_desc: "До цього часу за кордон могли бути відправлені лише добровольці з числа професійних солдатів. Оскільки ескалація конфлікту триває, ми повинні створити правову базу, яка дозволить підрозділам міліції нести службу за кордоном, якщо це буде потрібно."
 AST_call_that_a_knife: "Без проблем!"
 AST_call_that_a_knife_desc: "«Це не ніж… ОСЬ ЦЕ ніж!» Трохи бравади та гумору мають велике значення. Наші солдати стикаються з небезпекою з упевненістю, мужністю та неабиякою зухвалістю."
 AST_army_inventions_directorate_taog: "Управління армійських винаходів"
 AST_army_inventions_directorate_taog_desc: "Однією з небагатьох позитивних сторін війни, якщо це можна так назвати, є швидкий темп технологічних інновацій, зумовлений необхідністю. Ми повинні створити централізовану організацію для розробки, вдосконалення та використання цих проривів."
 AST_yeramba: "Yeramba"
 AST_yeramba_desc: "Спираючись на успіх розроблених в Австралії машин, таких як Sentinel, ми зробили наступний крок, створивши Yeramba — потужне нове доповнення до нашого арсеналу. Це 25-фунтова гармата, встановлена на шасі танка, що забезпечує мобільну, руйнівну вогневу міць проти наших ворогів."
 AST_alice_springs: "Аліс-Спрінґс"
 AST_alice_springs_desc: "Глушина велика... дуже велика. У її центрі лежить невелике містечко Аліс-Спрінґс, яке може служити центральним логістичним хабом для операцій по всій Австралії. Ми маємо розвивати його та створити там армійську базу для тренування військ, готових до будь-яких умов."
 AST_australian_regular_army: "Австралійська регулярна армія"
 AST_australian_regular_army_desc: "Ми вивчили багато уроків: від пляжів Ґалліполі до пустель Північної Африки, гір Греції та джунглів Південно-Східної Азії. Цей важко здобутий досвід сформував армію, яка є більш гнучкою та адаптивною, ніж будь-яка інша."

 AST_no1_flying_training_school: "1-ша льотна тренувальна школа"
 AST_no1_flying_training_school_desc: "Заснована в 1921 році зі створенням Королівських ВПС Австралії, Льотна тренувальна школа відкривалася і закривалася в залежності від коливань попиту на авіаційний персонал. У зв'язку зі зростанням глобальної напруженості нам слід знову відкрити її для підготовки нового покоління пілотів та екіпажів."
 AST_empire_air_training_scheme_taog: "Імперська схема підготовки льотчиків"
 AST_empire_air_training_scheme_taog_desc: "План підготовки льотчиків Британської Співдружності пропонує значне фінансування та досвід одній з країн Співдружності для підготовки великої кількості пілотів та екіпажів. Конкуренція за право її проведення дуже висока, а головними претендентами є Австралія та Канада. Ми подали власну заявку в рамках Імперської схеми підготовки льотчиків."
 AST_volunteer_air_corps: "Добровольчий корпус повітряних спостерігачів"
 AST_volunteer_air_corps_desc: "Австралійський повітряний простір величезний і знаходиться далеко поза межами досяжності лише офіційних підрозділів. Натомість ми маємо покладатися на місцевих добровольців, які обслуговують тисячі спостережних пунктів, розкиданих по всій країні, щоб стежити за нашим небом."
 AST_improved_ground_crews: "Покращені наземні екіпажі"
 AST_improved_ground_crews_desc: "На кожного пілота потрібна ціла команда наземного екіпажу, щоб забезпечити належне технічне обслуговування літаків, координацію польотів і роботу бази. Не кажучи вже про штурманів, стрільців і бомбардирів, які супроводжують їх у повітрі. Ми повинні створити належні тренувальні бази, щоб наші ВПС працювали з максимальною ефективністю."
 AST_advanced_pilot_training: "Просунута підготовка пілотів"
 AST_advanced_pilot_training_desc: "Оскільки літаки стають складнішими, швидшими та сучаснішими, майстерність наших пілотів має відповідно вдосконалюватися, щоб повною мірою використовувати ці технології."
 AST_advanced_pilot_training_tt: "§G+10%§! Швидкість отримання досвіду для §YПовітряних доктрин§!."
 AST_commonwealth_aircraft_corporation_taog: "Авіаційна корпорація Співдружності"
 AST_commonwealth_aircraft_corporation_taog_desc: "У зв'язку зі зростаючим інтересом до війни в повітрі, ми повинні переконатися, що не залишимося позаду. Цивільні ентузіасти та інноватори вже почали бачити потенціал аеронавігаційної індустрії; надавши їм початкове фінансування, ми можемо сприяти розвитку та розширенню цього нового сектора."
 AST_reestablish_central_flying_school: "Відновлення Центральної льотної школи"
 AST_reestablish_central_flying_school_desc: "Ще одна австралійська льотна школа, що працює паралельно з 1-ю льотною тренувальною школою, Центральна льотна школа допоможе задовольнити зростаючі потреби сучасних військово-повітряних сил. В умовах зростання напруженості ми маємо забезпечити наш персонал необхідним обладнанням."
 AST_aerodrome_of_democracy_democracy: "Аеродром демократії"
 AST_aerodrome_of_democracy_fascism: "Аеродром панування"
 AST_aerodrome_of_democracy_communism: "Аеродром звільнення"
 AST_aerodrome_of_democracy_neutrality: "Аеродром сили"
 AST_aerodrome_of_democracy: "[GET_AERODOME_NAME]"
 AST_aerodrome_of_democracy_desc: "Досягнувши передових рубежів в авіаційних можливостях, ВПС Австралії заслужили звання '[GET_AERODOME_NAME].' Наші льотчики вступають у повітряні бої по всій земній кулі, в той час як наші бомбардувальники кидають смертельну тінь на промисловість наших ворогів."
 AST_government_aircraft_factories: "Урядові авіазаводи"
 AST_government_aircraft_factories_desc: "Враховуючи нашу віддаленість від Європи, ми не можемо покладатися на традиційні джерела постачання літаків у воєнний час. Тому нам необхідно розвивати власні внутрішні виробничі потужності, щоб виготовляти корпуси літаків та двигуни за нашими власними специфікаціями."
 AST_death_from_down_under_taog: "Смерть з півдня"
 AST_death_from_down_under_taog_desc: "З далеких просторів Південної півкулі ми створили військово-повітряні сили, яким немає рівних. Наші літаки літають по всій земній кулі, завдаючи точних та руйнівних ударів, де б не ховалися наші вороги, смерть прийде з півдня."
 AST_ride_the_lightning: "Осідлати блискавку"
 AST_ride_the_lightning_desc: "Наші пілоти-винищувачі — це вістря спису нашої повітряної могутності: швидкі, агресивні та невпинні. Сідлаючи блискавку в бою, вони захоплюють контроль над небом, перехоплюють ворожі літаки та гарантують, що куди б не йшли наші війська, за ними відразу слідуватиме панування в повітрі."
 AST_the_gathering_storm: "Буря насувається"
 AST_the_gathering_storm_desc: "На горизонті збирається шторм. Наша зростаюча повітряна міць несе дедалі більший тиск зверху, б'ючи туди, де ворог найслабший, і підтримуючи наш наступ. Те, що починається як далекий гуркіт, незабаром перетвориться на невпинну бурю руйнувань."
 AST_hear_the_thunder: "Почуй грім"
 AST_hear_the_thunder_desc: "Чуєш, чуєш гуркіт грому? З далекої південної землі наші стратегічні бомбардувальники несуть міць Австралії по всьому світу. Коли небо реве, а земля тремтить, наші вороги будуть знати: буря прийшла і принесла руйнування."
 AST_department_of_aircraft_production: "Департамент авіаційного виробництва"
 AST_department_of_aircraft_production_desc: "Швидке розширення Королівських ВПС Австралії створило значне навантаження на наші виробничі потужності. Ми повинні мислити амбітніше, розширюючи та координуючи нашу промислову базу, щоб задовольнити попит і гарантувати, що ми зможемо затьмарити небо нашими літаками."

 AST_royal_australian_navy: "Королівський австралійський військово-морський флот"
 AST_royal_australian_navy_desc: "Утворений після створення федерації шляхом об'єднання колоніальних флотів, Королівський австралійський військово-морський флот служив майже на всіх театрах Великої війни. Відтоді він був скорочений через обмежене фінансування, але зі зростанням глобальної напруженості настав час флоту повернутися на моря."
 AST_coast_watchers: "Берегові спостерігачі"
 AST_coast_watchers_desc: "У той час як більшість наших сил залишається зосередженою на материку, наші північні підступи пропонують життєво важливу мережу раннього попередження. Розгорнувши місцевих розвідників на цих віддалених островах, ми зможемо виявляти ворожі повітряні та військово-морські пересування задовго до того, як вони почнуть загрожувати австралійським берегам."
 AST_marines: "Морська піхота"
 AST_marines_desc: "Як найбільший острів в океані островів, ми маємо забезпечити наявність десантних можливостей для проєкції сили за межі наших берегів. Якщо нам доведеться перейти від оборони до нападу, ці сили дозволять проводити ефективні операції зі стрибків по островах."
 AST_naval_auxiliary_patrol_taog: "Військово-морський допоміжний патруль"
 AST_naval_auxiliary_patrol_taog_desc: "Поки наші професійні сили зайняті іншим, ми можемо звернутися до охочих місцевих добровольців, щоб захистити наші порти та прибережні об'єкти. Їхнє глибоке знання місцевих водних шляхів робить їх безцінними, і ніхто не запідозрить місцевого рибалку в роботі на нашу користь."
 AST_cockatoo_island_shipyards_taog: "Верфі острова Какаду"
 AST_cockatoo_island_shipyards_taog_desc: "Верфі острова Какаду тривалий час слугували імперським центром ремонту та обслуговування, підтримуючи операції Королівського флоту за кордоном. Тепер, як наріжний камінь Королівського австралійського флоту, ми маємо розширити їхні потужності, щоб задовольняти зростаючі потреби нашого флоту і підтримувати нашу військово-морську могутність."
 AST_kangaroo_point_dry_dock_taog: "Сухий док на Кенгуру-Пойнт"
 AST_kangaroo_point_dry_dock_taog_desc: "Хоча Evans Deakin and Company — це насамперед інженерна фірма, вони справедливо визначили потребу в розширенні суднобудівних потужностей у міру зростання глобальної напруженості, націлившись на Кенгуру-Пойнт. Ми повинні сприяти тому, щоб вони зайняли цю ділянку для підтримки подальшого зростання нашого флоту."
 AST_scrap_iron_flotilla_taog: "Флотилія з металобрухту"
 AST_scrap_iron_flotilla_taog_desc: "Розкритикована як застаріла і зношена, низка наших старих есмінців була тим не менш об'єднана в одне з'єднання. Хоча цим кораблям не вистачає престижу сучасних суден, вони є винахідливим використанням того, чим ми вже володіємо."
 AST_cruising_for_a_bruising: "Курс на проблеми"
 AST_cruising_for_a_bruising_desc: "Наш флот довго і вміло використовував крейсери, і цю традицію варто розширювати. Швидкі, універсальні та потужні, ці кораблі незабаром зароблять репутацію в усьому світі — будь-який ворог, що стане на їхньому шляху, зіткнеться з дуже серйозними проблемами."
 AST_strike_from_down_under: "Удар з півдня"
 AST_strike_from_down_under_desc: "Під хвилями вони ковзають, без гуркоту грому, і якщо вони знайдуть вас, ваші кораблі будуть розграбовані. Чули, чули ви про підводні човни з півдня? Краще тікайте, інакше ви втратите свій флот. Так!"
 AST_hmas_sydney: "HMAS Sydney"
 AST_hmas_sydney_desc: "Епоха лінкорів закінчилася. Майбутнє військово-морської сили лежить у небі над флотом, і Австралія не залишиться позаду. Після років відбудови та модернізації нашого флоту ми готові зробити останній крок; авіаносець, який визначатиме морську могутність Австралії для наступних поколінь."

 AST_conscription_level_allowed_tt: "Політична воля до збільшення призову шукайте значок живої сили на фокусах"
 AST_conscription_level_allowed_limited_conscription_tt: "Розблокувати додатковий рівень §YЗакону про призов§!, який зробить доступним §YОбмежений призов§!"
 AST_conscription_level_allowed_extensive_conscription_tt: "Розблокувати додатковий рівень §YЗакону про призов§!, який зробить доступним §YРозширений призов§!"
 AST_conscription_level_allowed_service_by_requirement_tt: "Розблокувати додатковий рівень §YЗакону про призов§!, який зробить доступним §YОбов'язкову службу§!"
 AST_conscription_level_allowed_all_adults_serve_tt: "Розблокувати додатковий рівень §YЗакону про призов§!, який зробить доступним §YУсі дорослі служать§!"
 AST_conscription_level_allowed_scraping_the_barrel_tt: "Розблокувати додатковий рівень §YЗакону про призов§!, який зробить доступним §YВишкрібання по засіках§!"
 AST_conscription_law_so_far: "[CONSCRIPTION_LAW_SO_FAR]"

 ############
 ### MISC ###
 ############
 add_random_stat_to_general_tt: "Додає одне випадкове додаткове очко навичок цьому генералу"
 generic_unlock_industrial_concern_tt: "Доступно як промисловий концерн: \n"
 NZL_rail_standardization_tt: "§Y[?NZL_train_var]§! одиниць §Y$NZL_train_equipment_1$§! додається до національних запасів."

 NZL_ministry_of_public_works: "Міністерство громадських робіт"
 NZL_ministry_of_public_works_desc: "Завдяки скоординованому плануванню та дисциплінованим інвестиціям дороги, залізниці та енергетичні проєкти будуть просуватися відповідно до узгодженої національної стратегії, а не розрізнених зусиль."
 NZL_abolish_the_railways_board: "Скасувати Залізничне управління"
 NZL_abolish_the_railways_board_desc: "Урядове залізничне управління виявилося неефективним у модернізації мережі. Настав час скасувати цю аберацію і повернути залізниці під міністерський контроль."
 NZL_rail_standardization: "Стандартизація локомотивів"
 NZL_rail_standardization_desc: "В [ROOT.GetName] є низка майстерень по всій країні, які виготовляли локомотиви різної якості. Щоб зробити залізничну систему ефективнішою, ми встановимо кілька стандартних локомотивів для їхнього виробництва, кожен із яких спеціалізуватиметься на конкретних цілях."
 NZL_full_employment: "Повна зайнятість"
 NZL_full_employment_desc: "Завдяки безперервним громадським роботам, ретельному плануванню та неухильному розширенню промисловості, безробіття нарешті поступилося місцем можливостям. Простійні майстерні часів депресії знову працюють, а робоча сила нації повністю задіяна у продуктивних підприємствах. Відновивши впевненість і стабільність, ми не лише відновилися, але й стали сильнішими для майбутніх викликів."
 NZL_direct_the_coal_industry: "Керівництво вугільною промисловістю"
 NZL_direct_the_coal_industry_desc: "Оскільки вугілля стає дедалі важливішим для наших залізниць, промисловості та електростанцій, уряд має втрутитися, щоб координувати виробництво і розподіл в національних інтересах."
 NZL_establish_the_ncb: "Створити Національну вугільну раду"
 NZL_establish_the_ncb_desc: "Створивши Національну вугільну раду, ми зможемо взяти розкидані по країні шахти під скоординоване управління та забезпечити стабільне постачання палива для залізниць, промисловості та генерації енергії. Централізований нагляд дозволить нам раціоналізувати виробництво, підвищити ефективність і гарантувати, що стратегічні потреби мають пріоритет над приватними інтересами."
 NZL_electrification: "Розширення генерації електроенергії"
 NZL_electrification_desc: "Освоюючи наші річки та розширюючи гідроелектростанції, ми можемо закласти основу для довготривалої промислової могутності. Нові греблі та лінії електропередач збільшать потужність по всій країні, гарантуючи, що заводи, залізниці та порти отримають необхідну їм енергію."
 NZL_bureau_of_industry_taog: "$NZL_bureau_of_industry$"
 NZL_bureau_of_industry_taog_desc: "$NZL_bureau_of_industry_desc$"
 NZL_wairarapa_sheep_farms_taog: "$NZL_wairarapa_sheep_farms$"
 NZL_wairarapa_sheep_farms_taog_desc: "$NZL_wairarapa_sheep_farms_desc$"
 NZL_national_roads_board_taog: "$NZL_national_roads_board$"
 NZL_national_roads_board_taog_desc: "$NZL_national_roads_board_desc$"
 NZL_taranaki_oil_taog: "$NZL_taranaki_oil$"
 NZL_taranaki_oil_taog_desc: "$NZL_taranaki_oil_desc$"
 NZL_women_in_the_workforce: "Жінки в робочій силі"
 NZL_women_in_the_workforce_desc: "У міру того як нестача робочої сили посилюється, жінки виходять уперед, щоб заповнити життєво важливі ролі на фабриках, фермах і в державних службах, гарантуючи, що виробництво не занепаде під тягарем воєнного часу. Розширення можливостей навчання і працевлаштування дозволить нам підтримувати обсяги промислового виробництва при збереженні національної оборони."
 NZL_restart_the_onekaka_ironworks: "Перезапуск чавуноливарного заводу Онекака"
 NZL_restart_the_onekaka_ironworks_desc: "Металургійний завод Онекака колись уособлював наші амбіції щодо вітчизняного виробництва чавуну та сталі, зменшуючи залежність від закордонних поставок. Щоб дати поштовх економіці та підвищити національну безпеку, виник інтерес знову запустити печі Онекаки."
 NZL_new_zealand_steel_taog: "$NZL_new_zealand_steel$"
 NZL_new_zealand_steel_taog_desc: "$NZL_new_zealand_steel_desc$"
 NZL_scrap_metal_recycling: "Кампанія з переробки"
 NZL_scrap_metal_recycling_desc: "Економіка з високою часткою імпорту, як наша, не може дозволити собі марнотратно ставитися до стратегічних ресурсів. Щоб зміцнити нашу економічну стійкість, ми створимо підприємства з переробки брухту для переробки та повторного використання металів і гуми."
 NZL_domestic_car_industry: "Інвестиції в автоскладальні заводи"
 NZL_domestic_car_industry_desc: "Виробництво автомобілів у [ROOT.GetName] обмежувалося збиранням деталей від іноземних виробників, які відправляються сюди для фінальної збірки. Завдяки нашим нещодавнім інвестиціям у внутрішнє виробництво сталі, ми можемо почати виробляти компоненти самостійно."
 NZL_department_of_scientific_and_industrial_research_taog: "$NZL_department_of_scientific_and_industrial_research$"
 NZL_department_of_scientific_and_industrial_research_taog_desc: "$NZL_department_of_scientific_and_industrial_research_desc$"
 NZL_project_seal_taog: "$NZL_project_seal$"
 NZL_project_seal_taog_desc: "$NZL_project_seal_desc$"
 NZL_industrial_conscription_taog: "$NZL_industrial_conscription$"
 NZL_think_big_taog: "$NZL_think_big$"
 NZL_industrial_conscription_taog_desc: "$NZL_industrial_conscription_desc$"
 NZL_think_big_taog_desc: "$NZL_think_big_desc$"
 NZL_expand_the_university_of_auckland_taog: "$NZL_expand_the_university_of_auckland$"
 NZL_expand_the_university_of_auckland_taog_desc: "$NZL_expand_the_university_of_auckland_desc$"
 NZL_national_broadcasting_service: "Національна служба мовлення"
 NZL_national_broadcasting_service_desc: "Після втручання Поштового відділення у вибори 1935 року та його нагляду за державними службами мовлення, стає очевидним, що нам потрібно реформувати керівництво цієї організації. Ми також повинні інвестувати в оновлення її телерадіомовного обладнання."
 NZL_support_allies_with_meat: "Використання м'ясної промисловості"
 NZL_support_allies_with_meat_desc: "Наші союзники в Тихому океані часто розтягують свої лінії постачання до межі. Щоб зменшити напругу і зберегти їхні війська нагодованими, ми почнемо постачати їм м'ясо."
 NZL_support_allies_with_meat_tt: "Кожен Союзник отримає §G1§! §YПозакартову Фабрику§!"

 AST_COMINWEALTH_FACTION: "Комінвелт"
 AST_cominwealth_tech_sharing_tt: "Ми укладемо §Yугоду про обмін технологіями§! з усіма членами нашого альянсу."
 AST_modify_offshore_advancements_spirit_tt: "Змінює §Y$AST_offshore_advancements_spirit$§! на:"
 AST_gain_claims_on_japan_tt: "Ми отримаємо претензії на §YРідні острови Японії§!"
 AST_ireland_anti_british_pact_offer_accept_tt: "Якщо вони погодяться:"
 AST_through_the_barricades_tt: "Якщо §Y[ENG.GetNameDef]§! має щонайменше §Y10%§! підтримки Комунізму, то на початку війни докери в §Y[132.GetCapitalVictoryPointName]§! повстануть на нашу підтримку!"
 AST_end_the_kingdom_ireland_join_tt: "Оскільки [IRE.GetName] підписала Антибританський пакт, вона вступить у війну на нашому боці після того, як ми оголосимо війну [ENG.GetNameDef]."

 ###########################
 ##### FABDA BRANCH ########
 ###########################

 # Root
 ABDA_abdacom: "Створити ABDACOM"
 ABDA_abdacom_desc: "З огляду на швидке просування ворожих сил у Південно-Східній Азії та Тихому океані, союзні сили в регіоні повинні діяти як єдине ціле, щоб стримати їх. Створивши об'єднане верховне командування, ми зможемо об'єднати наші ресурси, скоординувати наші військово-морські активи та виступити єдиним фронтом проти ворога."

 # Tier 1 - country-locked
 ABDA_fortress_singapore: "Фортеця Сінгапур"
 ABDA_fortress_singapore_desc: "Сінгапур є стрижнем нашої оборонної стратегії в регіоні. Зміцнення його укріплень та розміщення потужного гарнізону виграють критичний час для ширших зусиль ABDACOM і не дадуть ворогу здобути швидку стратегічну перемогу."

 ABDA_corps_expeditionnaire: "CEFEO"
 ABDA_corps_expeditionnaire_desc: "Французький Індокитай знаходиться на північному фланзі оборонного периметра ABDACOM. Залучивши Французький Далекосхідний експедиційний корпус до активних операцій, [FRA.GetNameDef] принесе об'єднаному командуванню життєво важливу живу силу та досвід своїх колоніальних військ."

 ABDA_maintain_strategic_flexibility: "Збереження стратегічної гнучкості"
 ABDA_maintain_strategic_flexibility_desc: "Сполучені Штати не повинні надмірно залучати свої сили до жодного з театрів воєнних дій. Ретельно керуючи нашим стратегічним резервом, ми гарантуємо, що американська промислова та військова міць може бути спрямована туди, де вона найбільше потрібна по всьому Тихому океану."

 # Tier 2
 ABDA_the_malay_barrier: "Малайський бар'єр"
 ABDA_the_malay_barrier_desc: "Ланцюг островів, що тягнеться від Малайї через [INS.GetNonIdeologyName], формує природний оборонний бар'єр. Сили ABDA повинні використати цю географію, створивши скоординовану морську та наземну оборону, щоб уповільнити просування ворога."

 ABDA_develop_naval_infrastructure: "Розвиток військово-морської інфраструктури"
 ABDA_develop_naval_infrastructure_desc: "Тривалі військово-морські операції в Тихому океані вимагають баз, складів пального та ремонтних потужностей. Інвестиції в інфраструктуру наших портів і якірних стоянок розширять радіус дії та витривалість військово-морських сил ABDA."

 # Tier 3
 ABDA_unified_naval_command: "Об'єднане військово-морське командування"
 ABDA_unified_naval_command_desc: "Зі створенням сухопутної оборони та інфраструктури ABDA тепер може об'єднати всі військово-морські сили під єдиним командуванням. Стандартизовані сигнали, спільна розвідка та скоординовані маршрути патрулювання примножать ефективність кожного судна на театрі воєнних дій."

 # Tier 4
 ABDA_ship_a_day_sinking_quotas: "Квота на затоплення корабля на день"
 ABDA_ship_a_day_sinking_quotas_desc: "Ворожі лінії постачання, що простягаються через Тихий океан, є їхнім стратегічним вразливим місцем. Встановивши агресивні та скоординовані квоти на затоплення для наших підводних і надводних сил, ABDACOM зможе логістично виснажити ворога і змусити його перейти до оборони."

 ABDA_naval_procurement: "Військово-морські закупівлі"
 ABDA_naval_procurement_desc: "Вже зазнані втрати вимагають термінового поповнення. Скоординована програма закупівель ABDACOM віддасть пріоритет есмінцям, підводним човнам і патрульним кораблям, які найкраще підходять для тихоокеанського театру воєнних дій, гарантуючи, що наш об'єднаний флот зможе протистояти ворожій експансії."

 ABDA_keep_trade_open: "Збереження торгівлі відкритою"
 ABDA_keep_trade_open_desc: "Гума та нафта з [INS.GetNonIdeologyName] є критично важливими для військових зусиль Союзників. ABDACOM має захистити морські шляхи, якими перевозяться ці життєво важливі ресурси, оберігаючи конвої від ворожого перехоплення та підтримуючи потік торгівлі до наших підприємств."

 # Tier 5 - capstone
 ABDA_expand_the_command: "Розширення командування"
 ABDA_expand_the_command_desc: "ABDACOM довів свою цінність. Тепер ми повинні спиратися на цей фундамент, розширюючи членство для інших країн-союзників у регіоні та поглиблюючи наш обмін дослідженнями і розвідувальною інформацією, щоб залишатися на крок попереду ворога."

