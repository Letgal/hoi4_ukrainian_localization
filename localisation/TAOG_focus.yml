 SIA_a_land_war_in_asia: "Наземна війна в Азії"


 idea_SIA_land_war_in_asia: "Наземна війна в Азії"
 # Alternative Communist Focus
 SIA_the_peoples_war_in_asia: "Народна війна в Азії"
 SIA_the_peoples_war_in_asia_desc: "Боротьба проти [JAP.GetAdjective] імперіалізму — це не просто змагання між державами. Це війна робітників, селян і солдатів проти домінування з-за кордону. Підтримуючи комуністичні сили в Китаї, [ROOT.GetNameDef] бере на себе зобов'язання до ширшої народної війни по всій Азії."


 SIA_peoples_war_in_asia_idea: "Народна війна в Азії"
 SIA_peoples_war_in_asia_idea_desc: "Війну підтримують не лише регулярні формування. Місцеві комітети, партизанські провідники та селянські колони постачання тепер служать армії в польових умовах. Кожне село стає складом, кожна дорога — можливою засідкою, а кожен відступ — шансом затягнути ворога глибше вглиб країни."

 # Alternative Nationalist Focus
 SIA_national_defense_in_asia: "Національна оборона в Азії"
 SIA_national_defense_in_asia_desc: "Оборона Азії вимагає дисципліни, ієрархії та спільної стратегічної мети. Виступаючи на боці націоналістичного уряду Китаю, [ROOT.GetNameDef] приєднується до коаліції, сповненої рішучості протистояти [JAP.GetAdjective] експансії за допомогою організованих армій та скоординованого командування."
 SIA_national_defense_in_asia_tt: "§Y[ROOT.GetNameWithFlag]§! об'єднується з націоналістичними силами в Об'єднаному фронті.\nДодає §Y$SIA_national_defense_in_asia_idea$§!, що надає:\n $MODIFIER_ARMY_ORG_FACTOR$: §G+5%§!\n $MODIFIER_PLANNING_SPEED$: §G+10%§!\n $MODIFIER_MAX_PLANNING$: §G+10%§!\n $MODIFIERS_ARMY_DEFENCE_FACTOR$: §G+5%§!"
 SIA_stronger_together: "Сильніші разом"
 SIA_stronger_together_desc: "Війна перетворила далекі обіцянки та паралельні альянси на не більше ніж перешкоди. Якщо [ROOT.GetNameDef] хоче визначати курс Азії, ми повинні попросити наших партнерів прив'язати їхню фракцію до нашої і прийняти єдине командування в майбутній боротьбі."
 idea_SIA_national_defense_in_asia: "Національна оборона в Азії"


 SIA_directorate_of_aeronautical_engineering_desc: "Майбутнє повітряних сил [ROOT.GetNameDef] не забезпечуватиметься лише пілотами. Воно потребує інженерів, інспекторів, майстерень та центрального органу, здатного перетворювати іноземні закупівлі на справні літаки. Управління авіаційної інженерії стане фундаментом цих зусиль."

 idea_SIA_aeronautical_engineering_directorate: "Управління авіаційної інженерії"

 SIA_standardize_aircraft_maintenance: "Стандартизація технічного обслуговування літаків"
 SIA_standardize_aircraft_maintenance_desc: "Наші літаки надходять з багатьох джерел, кожне з яких має власні запчастини, інструменти та звички ремонту. Стандартизувавши процедури технічного обслуговування під егідою Управління, [ROOT.GetNameDef] зможе утримувати більше літаків у повітрі та зменшити втрати, спричинені плутаниною на землі."

 SIA_expand_aircraft_workshops: "Розширення авіаційних майстерень"
 SIA_expand_aircraft_workshops_desc: "Управління потребує більшого, ніж офіси та інспекторські папери. Нові майстерні, верстати та навчені механіки дозволять ремонтувати пошкоджені літаки всередині країни, тоді як прості компоненти можна буде виробляти, не чекаючи іноземних поставок."

 SIA_license_modern_airframes: "Ліцензування сучасних планерів"
 SIA_license_modern_airframes_desc: "[ROOT.GetNameDefCap] ще не може сама спроектувати кожен потрібний їй літак. Більш практичним курсом є ліцензування іноземних моделей, вивчення їхньої конструкції та адаптація їх до нашого клімату, аеродромів та умов постачання під наглядом Управління."

 SIA_tropical_air_operations: "Повітряні операції в тропіках"
 SIA_tropical_air_operations_desc: "Спека, вологість, мусонні дощі та нерівні передові аеродроми висувають власні вимоги до літаків та екіпажів. Адаптуючи двигуни, графіки технічного обслуговування та доктрину пілотів до цих умов, Управління може зробити наші військово-повітряні сили надійнішими в небі над Південно-Східною Азією."

 ###################
 #### AUSTRALIA ####
 ###################
 effects_of_event_tt: "\n§YEffects of event§!:"
 AST_war_is_coming: "War is Coming"
 AST_war_is_coming_desc: "Over the last three decades we have been faced with one challenge after another, yet a final one seems to be looming ahead to test the strength of Australian democracy once and for all. Former Prime Minister Billy Hughes is very clear on the matter, and it would be irresponsible of us to disregard his claims that — whether we like it or not — war is coming."
 AST_war_is_coming_tt: "\nUnlock §YDemocratic Elections§!"
 AST_war_is_coming_uap_advisors_tt: "(§Y$AST_billy_hughes$§!):"
 AST_war_is_coming_alp_advisors_tt: "(§Y$AST_james_scullin$§!):"
 AST_war_is_coming_decrease_advisors_tt: "(§Y$AST_maurice_blackburn$§!):"
 AST_war_is_coming_advisors_tt: "\nModify Political Advisor by:"
 AST_advance_pacific_initiatives: "Advance Pacific Initiatives"
 AST_advance_pacific_initiatives_desc: "Due to the pacts of non-aggression we have succeeded to establish, our relations with our Asian neighbours have improved. We shall continue to make the most of these relations and call upon our new allies to aid our industrial development."
 AST_advance_pacific_initiatives_tt: "\nEnact a non-aggression pact with:"
 AST_advance_pacific_initiatives_jap_tt: " §Y[JAP.GetName]§! to Add §G2§! offmap §YDockyards§! to the effects."
 AST_advance_pacific_initiatives_ins_tt: " §Y[INS.GetName]§! to Add §G1§! offmap §YSynthetic Refinery§! to the effects."
 AST_advance_pacific_initiatives_chi_tt: " §Y[CHI.GetName]§! to Add §G2§! offmap §YCivilian Factories§! to the effects."
 AST_advance_pacific_initiatives_jap_2_tt: "§Y[JAP.GetName]§! offers:"
 AST_advance_pacific_initiatives_ins_2_tt: "§Y[INS.GetName]§! offers:"
 AST_advance_pacific_initiatives_chi_2_tt: "§Y[CHI.GetName]§! offers:"
 AST_advance_pacific_initiatives_2_tt: "\nBuildings will be removed if at war with related nation."
 AST_pacific_initiatives_modifier: "Diplomatic Initiatives"
 AST_domestic_industry: "Domestic Industry"
 AST_domestic_industry_desc: "We cannot rely on allied defense industries to supply us should war come. We must expand our own industries so that we are prepared for whatever is coming."
 AST_a_democratic_bulwark: "A Democratic Bulwark"
 AST_a_democratic_bulwark_desc: "To stand strong against fascist and communist threats both, democracy must lead the way. The government shall adopt a policy of proactive measures to ensure that citizens are represented within the governing apparatus, and that politicians' discontent can be satisfied by joining different democratic parties instead of harmful ideologies."
 AST_the_pacific_pact: "The Pacific Pact"
 AST_the_pacific_pact_desc: "Lyons's Pacific Initiatives in 1934 established contact between Australia and major Asian nations, allowing us to stop relying on British officials to represent our interests. If we could use those relations to ensure Asian powers' non-aggression toward Australia, that would be the ultimate goal of our diplomatic efforts. It might be a challenging undertaking, but a worthwhile one."
 AST_a_collapsing_league_of_nations: "A Collapsing League of Nations"
 AST_a_collapsing_league_of_nations_desc: "The League of Nations is collapsing — a well-meaning initiative, sadly rooted in unrealistic hopes. A policy of sanctions easily becomes one of empty gestures, even more so when no armed forces are available to keep unruly nations at bay. Our rearmament must begin."
 AST_department_of_munitions: "Department of Munitions"
 AST_department_of_munitions_desc: "In order to supply our men at the front properly, we need to speed up our munitions production. By instituting a Department of Munitions, we can ensure increased oversight of the production of defense components."
 AST_call_for_a_referendum: "Call for a Referendum"
 AST_call_for_a_referendum_desc: "We want to increase federal government control; however we need the voters' approval first. By calling a referendum, we can seek their consent."
 AST_rural_concessions: "Rural Concessions"
 AST_rural_concessions_desc: "The rural representatives of the Country Party gain far too few votes to govern alone, but by welcoming their influence in Australian politics, we as the current governing party may gain additional support."
 AST_rural_concessions_tt: "\n§Y$AST_country_party_influence_uap$§! will increase the votes for the party that is in power when the Focus is completed."
 AST_solidarity_by_the_empire: "Solidarity by the Empire"
 AST_solidarity_by_the_empire_desc: "Up to this point, the British Empire has guided us through war and peace both. We shall continue to value its counsel and collaborate in the preparation for potential conflicts."
 AST_solidarity_by_the_empire_modifier: "Solidarity by the Empire"
 AST_wool_agreement: "Wool Agreement"
 AST_wool_agreement_desc: "With wool being one of Australia's greatest commercial products, its exports does not only contribute to profits but also improved relations with importing nations. Britain, however, demands it all, partly intending to use it for its soldiers' uniforms, but also in negotiations with wool-deficient powers. We shall concede to British demands."
 AST_australian_war_cabinet: "Australian War Cabinet"
 AST_australian_war_cabinet_desc: "As adjured by the United Kingdom, we shall institute our own War Cabinet. By doing so, we can ensure effective and strategic decision-making by allowing the body to focus solely on national security."
 AST_singapore_strategy: "Singapore Strategy"
 AST_singapore_strategy_desc: "The Singapore Strategy is a core component of Australian defense policy, and as the base for Royal Navy ships stationed in the Pacific, the territory of Singapore itself is of utmost importance. We shall convince the British to undertake additional defense construction, while we ourselves strengthen Australian naval capabilities."
 AST_singapore_strategy_tt: "After §Y180§! days (§YSingapore§!):\n Add §G2§! §YAir Base§!.\n Add §G2§! §YNaval Base§!.\n Add §G1§! §YCoastal Fort§!."
 AST_british_war_cabinet: "British War Cabinet"
 AST_british_war_cabinet_desc: "War has broken out, and the United Kingdom has formed a War Cabinet to ensure the efficient conduct of the Allied war effort. They have summoned us to share our views on the matter too, and so the Prime Minister will depart to represent Australian interests."
 potential_consequence_tt: "§YPotential consequence§!:\n"
 AST_british_pacific_fleet: "British Pacific Fleet"
 AST_british_pacific_fleet_desc: "British presence in the Pacific will be crucial in order to both deter and defend against enemy ships expanding their naval dominance southward. As part of the [Root.GetFactionName], we shall take action toward establishing a joint command structure to protect our inshore waters."
 AST_all_dressed_up: "All Dressed Up"
 AST_all_dressed_up_desc: "If Australian soldiers fight British wars, British factories shall equip them."
 AST_overseas_loyalties: "Overseas Loyalties"
 AST_overseas_loyalties_desc: "We shall continue our contributions to overseas wars, proving anew that no territory is foreign to Australian soldiers. Wars do not happen to us — we happen to them."
 AST_the_ultimate_overseas_duty: "The Ultimate Overseas Duty"
 AST_the_ultimate_overseas_duty_desc: "Britain's Prime Minister has mismanaged his responsibilities to such a degree that distrust has spread among his own ministers. Menzies has made a furiously strong impression during his visits to attend the British War Cabinet, and now some are suggesting that he very well may be Britain's better option. With him at the Commonwealth's reins, we can utilize Menzies' loyalty to [AST.GetName] and rise in authority."
 AST_the_ultimate_overseas_duty_tt: "\nWith §Y$AST_robert_menzies$§! as Leader in §Y[ENG.GetNameDef]§!, we can in Focus §Y$AST_a_change_of_authority$§! become an §Y$autonomy_associated_dominion$§!."
 AST_pleading_britain: "Pleading Britain"
 AST_pleading_britain_desc: "War surely is coming, and it has us shaking at the knees. With all due respect to our ANZAC spirit and the reputation of the Diggers, Australia's war capacities would quickly run dry without [ENG.GetName] coming to our aid. The Prime Minister shall cable [ENG.GetLeader] at his earliest convenience."
 AST_bound_once_more: "Bound Once More"
 AST_bound_once_more_desc: "Our paths have split, but shall merge again. [ENG.GetNameDefCap] and [AST.GetName] are both undergoing national change, but the distance between us that this has resulted in, is merely an unintentional and adverse effect. At least on our end. We shall ally once more, and conquer the obstacles of our changing nations united."
 AST_eng_to_ast_faction_tt: "§Y[ENG.GetName]§! and its subjects joins §Y[AST.GetFactionName]§!."
 AST_faction_leader_tt: "Set as leader of §Y[AST.GetFactionName]§! Faction"
 AST_eng_as_faction_leader_tt: "\n([ENG.GetFlag]§Y[ENG.GetName]§!) $AST_faction_leader_tt$."
 AST_australian_command: "Australian Command"
 AST_australian_command_desc: "As the importance of Australian defense and security has become evident even in [ENG.GetNameDef], a reorganization of our joint forces is needed. With more British forces placed under Australian command, a more efficient war effort can be conducted."
 AST_taking_the_helm: "Taking the Helm"
 AST_taking_the_helm_desc: "With our influence expanding across Southeast Asia, our naval capabilities must grow to defend it. We shall prioritize continued investment into the Royal Australian Navy, and assert control over the eastern seas."
 AST_eastern_focus: "Eastern Focus"
 AST_eastern_focus_desc: "If British wars are Australian wars, then Australian wars are British wars too. A Japanese invasion has long been undeniably looming, and we will no longer accept the current passivity that waits for the conflict to fall into our laps. We shall show Japan what Australian determination means, while Britain proves its loyalty in the boldest declaration of all: a declaration of war."
 AST_eastern_focus_tt: "\nThe mission will allow §Y[ENG.GetNameDef]§! to declare war on §Y[JAP.GetNameDef]§! immediately, and force them to do so if they have not within 180 days. §Y[ENG.GetNameDefCap]§! can delay the mission's completion date by funding Australian defense construction."
 AST_holding_the_battlefield: "Holding the Battlefield"
 AST_holding_the_battlefield_desc: "Many Australian soldiers have fallen overseas, only for their efforts to be counted as British ones. Australia demands greater influence at the table alongside [ENG.GetNameDef] in peace conferences; otherwise, our contributions may cease."
 AST_holding_the_battlefield_tt: "§YReduced cost§! for §YPuppet§! and §YTake States§! actions in Peace Conferences with §Y[ENG.GetNameDef]§!."
 AST_a_change_of_authority: "A Change of Authority"
 AST_a_change_of_authority_desc: "From a compliant subject, Australia has grown into a respected and assertive nation, and it is time to take the final step in becoming one of the world powers. As leader of the [AST.GetFactionName], friends shall respect us, and enemies fear us. By digging in and holding fast, Australia shall not yield."
 AST_a_change_of_authority_tt: " §Y[ROOT.GetName]§! may now declare wars.\n §Y[ROOT.GetName]§! may now decline call to war.\n §Y[ROOT.GetName]§! no longer transfers any Peace Score to their Overlord."
 AST_reinforcements: "Reinforcements"
 AST_reinforcements_desc: "We shall prepare the largely undeveloped northern reaches with defensive installations and air bases."
 AST_weekly_stability_tt: " Weekly Stability: §G+1.00%§!"
 AST_ending_overseas_conscription: "Ending Overseas Conscription"
 AST_ending_overseas_conscription_desc: "Our soldiers must cast off from foreign shores immediately; they are needed here."
 AST_unlocking_conscription_1903_tt: "Required to unlock §YConscription Laws§!."
 AST_unlocking_further_conscription_tt: "For §YExtensive Conscription§! or §YService by Requirement§!, you will also need any of the following focuses; §Y$AST_british_pact$§! (Fascist), §Y$AST_refuse_british_wars$§! (Fascist), §Y$AST_toe_the_line$§! (Fascist), §Y$AST_from_picket_line_to_front_line$§! (Communist), or §Y$AST_part_with_colonizer$§! (Communist)."
 AST_unlocking_conscription_tt: "If you also have §Y$AST_invoke_the_1903_defence_act$§! you will unlock all remaining §YConscription Laws§!."
 AST_an_uncle_for_father_figure: "An Uncle for Father Figure"
 AST_an_uncle_for_father_figure_desc: "We are lacking modern armaments and shall therefore call upon [USA.GetName], requesting that they supply us."
 AST_seven_million_britishers: "Seven Million Britishers"
 AST_seven_million_britishers_desc: "Although [ENG.GetLeader] has been hesitant to swear us any promises, we shall trust in his and Britain's commitment to [AST.GetNameDef] when push comes to shove. We are only seven million Britishers after all."
 AST_seven_million_britishers_reinforcements_tt: "\n§YIf $AST_reinforcements$ is not completed§!:"
 AST_seven_million_britishers_conscription_tt: "\n§YIf $AST_ending_overseas_conscription$ is not completed§!:"
 AST_seven_million_britishers_uncle_tt: "\n§YIf $AST_an_uncle_for_father_figure$ is not completed§!:"
 AST_we_endured: "We Endured"
 AST_we_endured_desc: "The prediction of coming conflict may have been overwhelming at first, but by using it to accelerate the expansion of our defense capabilities, it served a purpose after all. We endured, and we will persist, now fully committed to our ultimate task: winning the war."
 AST_under_the_rule_of_canberra: "Under the Rule of Canberra"
 AST_under_the_rule_of_canberra_desc: "The rising tension among the Pacific nations is worrisome, and with Britain occupied in its own battles, its capacity to come to our rescue appears implausible. If we were to reconstruct the British Commonwealth so that the nations of the Pacific and Indian Oceans were managed directly from Canberra, we might be able to unite under a single front — even without [ENG.GetNameDef]."
 AST_its_fight_work_or_perish: "It's Fight, Work or Perish"
 AST_its_fight_work_or_perish_desc: "War has begun, and only one thing remains: proving that we are ready for it."
 AST_no_foreign_battlefields: "No Foreign Battlefields"
 AST_no_foreign_battlefields_desc: "It has been a long time coming, but finally, the government shall declare that no compulsion will be exercised upon any citizen for service on foreign battlefields."
 AST_no_foreign_battlefields_modifier: "No Foreign Battlefields"
 AST_platypus_modifier: "Gifted Platypus"
 AST_aerial_defense: "Aerial Defense"
 AST_aerial_defense_desc: "If we cannot afford, as we cannot, a floating navy equal to that of a world power, it is yet within our means to sustain an aerial fleet equal to any that can be brought against us."
 AST_ratify_westminster_adoption_act: "Ratify Westminster Adoption Act"
 AST_ratify_westminster_adoption_act_desc: "Despite the controversy a change of long-established policies may cause, it is long overdue that we ratify the Westminster Adoption Act. We shall choose for ourselves which wars are ours."
 AST_ratify_westminster_adoption_act_tt: "£GFX_trigger_no Can decline call to war"
 AST_administer_the_mandate: "Administer the Mandate"
 AST_administer_the_mandate_desc: "Having governed New Guinea under a League of Nations mandate since 1920, and with Papua having been an external territory of [AST.GetName] nearly since Federation, the eastern part of Papua New Guinea would be a natural addition to [AST.GetName]'s core territories. Now that the League of Nations has dissolved, the opportunity to carry out such a federal reorganization has opened up."
 AST_a_rational_request: "A Rational Request"
 AST_a_rational_request_desc: "The Singapore Strategy holds in theory, but in theory only. Henry Wynter and other fierce voices were right all along; Britain will most likely be occupied on its own continent if a Pacific war breaks out, and a strategy built around British aid will therefore not hold. We shall request control of Singapore so that we ourselves may be responsible for our oceans' defenses."
 add_trait_to_theorist_tt: "Add trait to §YTheorist§!:"
 AST_volunteers: "Volunteers"
 AST_volunteers_desc: "To have the choice is what matters; the ability to decline a call to arms does not mean Australia always will. Australians shall have every right to fight for what is right, on their own and foreign soil both."
 AST_until_the_tide_of_battle_swings: "Until the Tide of Battle Swings"
 AST_until_the_tide_of_battle_swings_desc: "In a public statement, we shall make it clear that the time to disregard the threat stirring in our backyard has run out. We refuse to accept the policy that the Pacific struggle must be treated as a subordinate segment of the general conflict; Australia shall prepare for invasion immediately."
 AST_walls_and_whispers: "Walls and Whispers"
 AST_walls_and_whispers_desc: "Impenetrable walls paired with an ear to the ground create great potential for national security. Steps shall be set in motion to place land and shore defenses on a better basis across our lands, and for an intelligence headquarters to be established within."
 AST_united_states_as_our_keystone: "United States as Our Keystone"
 AST_united_states_as_our_keystone_desc: "We know the problems that the United Kingdom faces. We know the dangers of dispersal of strength, but we know too, that Australia can go and Britain can still hold on. We are, therefore, determined that Australia shall not go, and we shall exert all our energies towards the shaping of a plan, with the United States as its keystone."
 AST_liberty_loans: "Liberty Loans"
 AST_liberty_loans_desc: "From his experience as Treasurer — the nation's greatest yet, some would even claim — Ben Chifley has proven his capacity to manage a wartime economy. On his recommendation, we shall encourage our citizens to transfer surplus personal income to savings, and to invest in war loans."
 AST_inevitably_independent: "Inevitably Independent"
 AST_inevitably_independent_desc: "Although the United Australia Party always have valued British citizenship, [ENG.GetNameDef] indifference toward Australian interests forced our hand to declare independence and prioritize our own defenses. Now when overseas service in British wars has naturally become a non-issue, even anti-loyalists are more inclined to toe the line; more extensive conscription will therefore meet less resistance."
 AST_bring_on_the_giant: "Bring On the Giant"
 AST_bring_on_the_giant_desc: "As a unified and autonomous nation at last, we shall soon have our bravery tested. The other side of the Pacific seems to share our interests, and with its well-developed military industry,  [USA.GetNameDef] can greatly benefit itself and Australia both by leasing some of its abundant supplies to our troops."
 AST_bring_on_the_giant_tt: "  If §Y[USA.GetNameDefCap]§! agrees:\n §Y+50§! units of §YConvoy§! is added to the national stockpile."
 AST_allied_after_all: "Allied After All"
 AST_allied_after_all_desc: "Although Australian independence was a necessity, all collaboration with our old overlord shall not cease. We will remain loyal to the [ENG.GetFactionName], as we always have, but aim for greater influence within the faction."
 AST_the_pacific_resistance: "The Pacific Resistance"
 AST_the_pacific_resistance_desc: "Australian independence has finally come, and it is only right that we break away from the British war effort as well. By pursuing unity with [USA.GetNameDef] instead, we can shape joint command strategies that value Australian interests while we independently take complete control of our own defense industry and its expansion."
 AST_the_pacific_resistance_tt1: "§YAustralia§! joins §Y[USA.GetFactionName]§!."
 AST_the_pacific_resistance_tt2: "§Y[USA.GetName]§! joins §YPacific Resistance§!."
 AST_conscription_at_last: "Conscription at Last"
 AST_conscription_at_last_desc: "Independence tastes sweet, as we realize we now have the power to prioritize our own defenses — but that power comes with responsibilities too. Mandatory conscription should not be increased lightly, but with war now upon us, it has become necessary."
 AST_equal_training: "Equal Training"
 AST_equal_training_desc: "Cooperation with allies must be honed, not merely assumed to function mindlessly. Australia shall take the initiative to organize joint training camps for nations of the [ROOT.GetFactionName], and ensure that all soldiers receive equally rigorous training."
 AST_a_northern_barrier: "A Northern Barrier"
 AST_a_northern_barrier_desc: "The enemy is coming from the north, and before it lie smaller, unprepared nations that they can strike at will before finally arriving at our own doorstep. If we unite with [INS.GetNameDef] to form a single barrier, we may yet have a chance to hold them back."
 AST_demand_resources: "Demand Resources"
 AST_demand_resources_desc: "Expansionist aggressors look to Indochina not only for the territory itself, but also the resources it possesses. If the riches end up in enemy hands they will only prolong the war, while they in ours could help end it. We shall request control over these resources; if their holders refuse to cooperate, they are no better than the enemy."
 AST_demand_resources_tt: "Unlock §Y$AST_resource_acquisition_cat$§! Decisions to request a share of the resources of Southeast Asian nations."
 AST_reclaim_the_lost_territory: "Reclaim the Lost Territory"
 AST_reclaim_the_lost_territory_desc: "During the process that united the Australian colonies into a federation, New Zealand ultimately decided not to take part. Ever since, however, the Constitution has continued to define New Zealand as one of the Australian Commonwealth's potential states, and does allow for its admission. We shall remind our eastern neighbors of this, and argue that the current world situation demands unity."
 AST_reclaim_the_lost_territory_tt: "([NZL.GetFlag]§Y[NZL.GetName]§!) Transfers all land, naval, and air forces to §Y[AST.GetNameDef]§!"

 AST_australia_first: "Australia First"
 AST_australia_first_desc: "The Centre Party's extreme-right vigor was short-lived, ending with its dissolution in 1935. Something new is beginning to simmer however, deriving from the ideas of businessman and political activist William John Miles. If no action is taken to mobilize the sentiments, however, they may dwindle as quickly as they arose. And so, action shall be taken."
 AST_pankhurst_walsh: "Adela Pankhurst Walsh"
 AST_pankhurst_walsh_desc: "In the formal establishment of the Australia First Movement, we shall appoint Adela Pankhurst Walsh as president. As the founder of the Australian Women's Guild of Empire, Pankhurst Walsh has — while maintaining close ties with the London-based Women's Guild — long advocated the value of British citizenship. That value shall form the core principle of our movement: continued ties to Britain."
 AST_stephensen: "P.R. Stephensen"
 AST_stephensen_desc: "In the formal establishment of the Australia First Movement, we shall appoint P.R. Stephensen as president. As a literary adviser to William John Miles, Stephensen shares his mentor's isolationist and nationalist views. These will form the two core principles of our movement's constitution: independence from Britain and the unification of Australian culture."
 AST_stephensen_tt: "\nThe choice of president for the §YAustralia First Movement§! decides possible future actions."
 AST_a_growing_womens_guild: "A Growing Women's Guild"
 AST_a_growing_womens_guild_desc: "Since its establishment in 1928, the Australian Women's Guild of Empire has advocated industrial cooperation to combat national economic issues. For the good of the nation, citizens shall assist their government, not work against it. With Pankhurst Walsh as president for Australia First, we can through its political movement spread this message further."
 AST_realize_the_value_of_british_citizenship: "Realize the Value of British Citizenship"
 AST_realize_the_value_of_british_citizenship_desc: "[ENG.GetNameDefCap]'s overlordship of [AST.GetName] has long served our nation as both a protective shield and a guiding light. From Britain we have come, and of Britain we shall remain — as long as it still serves us."
 AST_the_bolsheviks_counterforce: "The Bolsheviks' Counterforce"
 AST_the_bolsheviks_counterforce_desc: "The Investigation Branch has for decades conducted investigations into the activities of subversive groups. Its work to suppress left-wing threats is of high value, and should not be neglected because opponents to Australia First commit to resisting our growth instead. We shall seek positions within the Australian intelligence office, and ensure that the real threat to national security is prioritized."
 AST_public_meetings_tt: "Unlocks §YAustralia First Movement§! Decisions to mobilize members and raise Fascism Support."
 AST_rile_up_veterans: "Rile Up Veterans"
 AST_rile_up_veterans_desc: "At the onset of the Great Depression, the veterans of World War I united in far-right paramilitary groups to counter the rise of communism. Even if those groups have since dissolved, their former members have not disappeared; Australia First shall absorb them, and the torch of anti-communism pass on."
 AST_eureka_stockade_monument_rally: "Eureka Stockade Monument Rally"
 AST_eureka_stockade_monument_rally_desc: "In 1854, in the Battle of the Eureka Stockade, Australian gold miners fought fiercely against colonial forces over the unreasonable cost of mining permits and the taxation of gold mines. Dissatisfaction with British overlordship was apparent then, and so it is now. We shall gather at the battle’s monument and rally for the split from Britain."
 AST_australian_pivot_modifier: "Australian Pivot"
 AST_well-being_of_the_community: "Well-being of the Community"
 AST_well-being_of_the_community_desc: "Christian ideals of life and family should be highly valued by the Australian population. However, with the past years' poor birth rates, these ideals have undeniably not been revered enough. For the well-being of the community, we shall launch a campaign that promotes family life."
 AST_covert_networks: "Covert Networks"
 AST_covert_networks_desc: "With Australia First acting within the Investigation Branch, we shall seek cross-border cooperation with like-minded movements in [ENG.GetNameDef]. Our alliance with our overlord may serve us in yet another way, allowing us to covertly reach ideologically aligned allies and expand our intelligence capacities."
 AST_refuse_british_wars: "Refuse British Wars"
 AST_refuse_british_wars_desc: "The Gallipoli campaign of the Great War, demonstrated the recklessness with which [ENG.GetNameDef] treats our expeditionary forces, making the idea of another foreign campaign in its name completely unthinkable. Australians demand that blood never again be spilled under British command, forcing the government to act; the Westminster Act shall be ratified."
 AST_walls_like_uluru: "Walls Like Uluru"
 AST_walls_like_uluru_desc: "Australia is a continent unto itself. If we are to stand without the shield of the Empire, we must build our own. The coastline will be hardened, the ports fortified, and the approaches made treacherous to any who think this nation an easy prize."
 AST_at_the_gates: "At the Gates"
 AST_at_the_gates_desc: "The world is moving toward war and Australia must not be caught unready. The factories and dockyards of the nation must shift into a higher gear. This is not preparation for someone else's conflict, it is preparation for our own survival."
 AST_the_guild_for_the_war_effort: "The Guild for the War Effort"
 AST_the_guild_for_the_war_effort_desc: "The Australian Women's Guild of Empire was built to serve the Crown. Its purpose is being redirected entirely. The vast organisational network it built will now channel its energy into the war industries, the hospitals, and the supply chains of a self-reliant Australia."
 AST_for_the_southern_cross: "For the Southern Cross"
 AST_for_the_southern_cross_desc: "The Southern Cross does not fly over Britain. It flies over us. Australian identity is something real, something earned, something worth defending. A new national pride is being forged, not borrowed from London or defined by distant institutions, but grown here, from this soil, under these stars."
 AST_through_the_gates: "Through the Gates"
 AST_through_the_gates_desc: "Preparation has given way to urgency. The National Defense programme is being expanded with the full weight of Australian industry behind it. New facilities are rising alongside existing ones, output targets revised upward, and the line between civilian production and military necessity quietly erased."
 AST_toe_the_line: "Toe the Line"
 AST_toe_the_line_desc: "The comforts Australians grew accustomed to during the prosperity years must now be set aside. Rationing, longer hours, and the call to service are the price of independence. Those who answer will find a nation ready to stand behind them. But the state shall have little patience for those who believe sacrifice is someone else's burden."
 AST_crush_the_gates: "Crush the Gates"
 AST_crush_the_gates_desc: "The build-up is complete. Australian industry now operates on a full war footing, its output channelled entirely toward the defence and projection of national power. Whatever storm is coming, Australia will meet it not as a reluctant dominion scrambling to mobilise."
 AST_national_defense: "National Defense"
 AST_national_defense_desc: "Through deliberate investment and national direction, Australia has built an industrial base capable of sustaining its own defence. Factories and dockyards operate under the oversight of the state, their output measured not by profit but by the needs of the nation."
 modify_AST_national_defense_tt: "Modifies §Y$AST_national_defense$§! by:"
 AST_nauru_pact: "Nauru Pact"
 AST_nauru_pact_desc: "With the initial obstacle of taking power still before us, the matter of independence seems far away; however, Australian autonomy is not only an interest of ours. In exchange for [GER.GetNameDef]'s guarantee of our sovereignty in case of British resistance to Australia First or the eventual breakaway from the Commonwealth, we will, upon coming to power, return one of their lost Pacific islands: Nauru."
 AST_australian_culture_investments: "Australian Culture Investments"
 AST_australian_culture_investments_desc: "With his essay The Foundations of Culture in Australia, Stephensen has influenced the formation of the Jindyworobak poetry movement and made one thing clear: Australian culture must be prioritized. The government seems to completely neglect the value of artists and writers, but we shall not. By mobilizing supporters of Jindyworobak and Australia first both, we shall stimulate cultural development."
 AST_australian_culture_investments_tt: "\nAfter §Y365§! days:"
 AST_australia_first_party_focus: "Australia First Party"
 AST_australia_first_party_focus_desc: "The members of Australia First have risen to such numbers that the movement's advance can be held back no more. It is time for the Australian public to welcome the newly registered, loudest nationalist voice: the Australia First Party."
 AST_australia_first_party_req_tt: "§YAustralia First Party§! has been founded."
 AST_in_from_the_cold: "In From the Cold"
 AST_in_from_the_cold_desc: "Australia First and its supporters need to hide no more. The mistreatment our nation has endured under a long line of former governments is finally brought to light, and it is time for new voices to be heard."
 AST_absorb_the_uap: "Absorb the UAP"
 AST_absorb_the_uap_desc: "Although The United Australia Party has always remained liberal, it is also right-leaning. With a new political party at the reins, however, UAP members may not have much option but to support the current government's cause instead. We shall reach out to the most prominent members and recruit them to the Australia First Party."
 AST_big_business_pact: "Big Business Pact"
 AST_big_business_pact_desc: "Since the Australia First Party aims to protect domestic industries, it has found many supporters among top business leaders. In exchange for pursuing policies that increase their profits, they will support our political and military goals."
 AST_big_business_pact_tt: "\nUnlocks §YBig Business Pact§! Decisions to impact Industry and Construction goals."
 AST_autarky: "Autarky"
 AST_autarky_desc: "Reliance on foreign trade is precarious, especially in times of conflict; Australian industries must be prioritized, not outcompeted by imports. Only by restricting our trade laws can we protect the domestic economy and ensure that Australia can supply itself."
 AST_energy_independence: "Energy Independence"
 AST_energy_independence_desc: "Reliance on foreign trade is precarious, especially in times of conflict; energy independence is vital to ensure that Australia can function even in the direst of times. By investing in refineries, we can promote domestic energy production. "

 remove_2_offsite_dockyard: "Remove §R2§! offmap §YNaval Dockyard§!."
 AST_british_pact: "British Pact"
 AST_british_pact_desc: "Despite our recent partition from the British Commonwealth, it lies in [AST.GetName]'s interest to continue cooperating with its old motherland. Considering how [ENG.GetNameDef] is stretched thin across the globe, our willingness to share its burdens by offering military cooperation should be appreciated."
 AST_naurus_return_to_german_hands: "Nauru's Return to German Hands"
 AST_naurus_return_to_german_hands_desc: "Now that Australia First is fully at the nation's reins, it is time for the promise of Nauru to be fulfilled, and for our German allies to deliver their end of the bargain. [AST.GetName] shall finally break free from the Commonwealth's chains, and leave the British with no say in the matter."
 AST_naurus_return_to_german_hands_tt: "The '§YNauru Pact§!' becomes active."
 AST_naurus_return_to_german_hands_tt_2: "The '§YNauru Pact§!' is active."
 AST_the_winner_takes_it_all: "The Winner Takes It All"
 AST_the_winner_takes_it_all_desc: "Although sacrificing the island of Nauru for German cooperation once seemed reasonable, it no longer does. With our capabilities proven strong, we shall seek expansion into the Solomons and New Zealand, even if the former may add to our betrayal of the Nauru Pact. After all, the Solomon Islands will become another German territory lost to Australian hands."
 AST_resist_western_intruders: "Resist Western Intruders"
 AST_resist_western_intruders_desc: "Western nations seem compelled to intrude in the affairs of the Pacific, but that shall stand no more. Before they reach our shores, we will reach theirs, proving that [AST.GetName] is no nation that submits to demands."
 AST_invasion_preparation_tt: "Invasion Preparation Time: §G-20.0%§!"
 AST_naval_invasion_penalty_tt: "Invasion Penalty: §G-20.0%§!"
 AST_expand_the_fort: "Expand the Fort"
 AST_expand_the_fort_desc: "The western Pacific is not for [USA.GetNameDef] to command. The American-claimed islands belongs to East Asian nations, and as Australian influence grows, we shall be the ones who claim them. "
 AST_integrate_the_fort: "Integrate the Fort"
 AST_integrate_the_fort_desc: "Having governed New Guinea under a League of Nations mandate since 1920, and with Papua having been an external territory of [AST.GetName] nearly since Federation, the eastern part of Papua New Guinea would be a natural addition to [AST.GetName]'s core territories. As part of our efforts to unify Australian culture, this would be the next step."
 AST_defying_american_interference: "Defying American Interference"
 AST_defying_american_interference_desc: "[USA.GetNameDefCap]'s shadow looms over us, threatening to interfere whenever our actions do not align with its interests. With a global power of such magnitude grasping its iron fist around [PHI.GetNameDef], the East Asian nations will never truly belong to East Asia. [AST.GetName] shall not submit to any authority of foreign intruders — the Philippines shall be ours."
 AST_the_pacific_garrison: "The Pacific Garrison"
 AST_the_pacific_garrison_desc: "Although the protection of Southeast Asia and the Pacific lies in Britain's interests, the region is far from the British Isles. In exchange for their support in supply, we shall offer to assume command of the territory's defense, allowing [ENG.GetNameDef] to direct its attention elsewhere."
 AST_vichy_out_of_africa: "Vichy Out of Africa"
 AST_vichy_out_of_africa_desc: "The fall or cooperation of Vichy France is one of [ENG.GetNameDef]'s main objectives. As a gesture of goodwill, [AST.GetName] shall join in and pursue the French African colonies until they are subdued."
 AST_vichy_out_of_africa_tt1: "Add claims to §YVichy France§! territories in §YAfrica§! through §YVichy Out of Africa§! Focus.\n"
 AST_vichy_out_of_africa_tt2: "Add claims to §YVichy France§! territories in §YAfrica§! through §YVichy Out of Africa§! Decisions.\n"
 AST_vichy_africa_claim_flag: "Claims by [AST.GetFlag]§Y[AST.GetName]§! of all §YVichy France§! territories in §YAfrica§! are added to §YDone Meddling§!."
 AST_vichy_claim_tt: "Claims by [AST.GetFlag]§Y[AST.GetName]§! are added to §YDone Meddling§!."
 vichy_in_africa_trigger: "§YVichy France§!: Any Controlled state:\n    Is in §YAfrica§!"
 vichy_wargoal: "Gains §YAnnex§! war goal against §YVichy France§!."
 AST_britain_supplying_ships: "Britain Supplying Ships"
 AST_britain_supplying_ships_desc: "From carrying the weight of guarding the shores of British allies, it has become clear that [ROOT.GetName]'s fleet needs to be expanded. It is only right that [ENG.GetNameDefCap] shall supply us with ships."
 AST_hand_in_glove: "Hand in Glove"
 AST_hand_in_glove_desc: "By expanding northward, we can increase Australian influence over Southeast Asian diplomacy and conflicts. We have already proven our ability to safeguard British interests alongside our own, and so [ENG.GetNameDef] must understand why their remote territories would be better placed in our hands."
 AST_claim_french_indochina: "Claim French Indochina"
 AST_claim_french_indochina_desc: "With France's fate undetermined, the fate of its colonies is no more decided. Other nations may attempt to lay their greedy hands on French Indochina, but they shall not win over ours."
 AST_undeniably_ours: "Undeniably Ours"
 AST_undeniably_ours_desc: "Regardless of what diplomacy might grant us, it would never grant us all. In its fragile state, Vichy France's borders act merely as suggestions, and to forgo the opportunity to fully occupy their lands would be most unwise. Inevitably, the time for war has come."
 AST_done_meddling: "Done Meddling"
 AST_done_meddling_desc: "Ever loyal to the old country, [AST.GetName] continues fighting British battles with its head held high. Australians are a dependable kind, but that does not mean they should be taken for granted. While [AST.GetName] fights for [ENG.GetNameDef],  [ENG.GetNameDef] will fight for [AST.GetName] as well."
 AST_northern_advancement: "Northern Advancement"
 AST_northern_advancement_desc: "Although Australia would rather attend to its own political affairs, we cannot expect to be left alone unless we make ourselves a threat. [INS.GetNameDefCap] is a nation like ours, a victim of European intruders who do not leave. By making our own claim on the territory, we send a clear signal: the Pacific nations are to be left alone."
 AST_soothing_australian_fears: "Soothing Australian Fears"
 AST_soothing_australian_fears_desc: "Although some government officials believe in the possibility of Australian and Japanese cooperation, the Australian public does not. After fearing a Japanese invasion for so long, the idea of joining hands with that same potential aggressor is hard to grasp for most. And so we shall soothe their fears, by preparing for war."
 AST_soothing_australian_fears_tt: "\nAfter §Y180§! days:"
 AST_dividing_the_pacific: "Dividing the Pacific"
 AST_dividing_the_pacific_desc: "Australia First advocates for peace with [JAP.GetNameDef], defining the nation — unlike most Australian citizens — as a potential Pacific ally rather than an ever looming threat. As the power of [AST.GetName] expands, it is only reasonable that [JAP.GetName] agrees too, and that potential conflicts between our two nations is settled before they have the chance to arise."
 AST_dividing_the_pacific_ast_gain_tt: "[GET_AST_DIVIDING_THE_PACIFIC_AST_GAIN]"
 AST_dividing_the_pacific_jap_gain_tt: "[GET_AST_DIVIDING_THE_PACIFIC_JAP_GAIN]"
 AST_dividing_the_pacific_tt1: "§GWe gain§!:"
 AST_dividing_the_pacific_tt2: "§RThey gain§!:"
 AST_dividing_the_pacific_tt3: "§Y[AST.GetName]§! transfers following controlled territories:"

 AST_against_war_and_fascism: "Against War and Fascism"
 AST_against_war_and_fascism_desc: "The Movement Against War and Fascism is the Australian branch of a Comintern-sponsored international effort to mobilize workers against reactionary forces. Though it has lost momentum in recent years, it falls to us to carry the banner forward once more."
 AST_world_peace: "World Peace"
 AST_world_peace_desc: "The Movement Against War and Fascism have been hard at work producing a magazine dubbed 'World Peace' which exposes the evils of the Fascist movement in Germany, Italy, especially during the Spanish Civil War. Spurred on by the articles within, volunteers are eagerly seeking to join the fight against Fascism."
 AST_red_fred: "Red Fred"
 AST_red_fred_desc: "'Red' Fred Paterson first rose to prominence in the Communist movement as a candidate for Mayor of Brisbane in 1934, where he was soundly defeated. His ambitions remain undimmed, however, and he now stands for election as an alderman in Townsville. With our support, he could become the first Communist elected to public office."
 AST_workers_defence_corps_sparks_anew: "Workers Defence Corps Sparks Anew"
 AST_workers_defence_corps_sparks_anew_desc: "The Workers Defence Corps was originally formed to defend picket lines and strikes. With increasing aggression from groups like the New Guard, it has been regrouped to once again act as a shield for those protesting for better rights and opportunities."
 AST_a_controversial_recruitment: "A Controversial Recruitment"
 AST_a_controversial_recruitment_desc: "Maurice Blackburn is a well-known socialist lawyer, renowned for defending workers’ rights in legal battles against oppressive employers. A member of the Labor Party, his loyalty has been called into question due to his links with the more radical Movement Against War and Fascism."
 AST_from_picket_line_to_front_line: "From Picket Line to Front Line"
 AST_from_picket_line_to_front_line_desc: "As the intimidation tactics of those opposing working-class liberation grow more aggressive, our own defenses must evolve in response. With each incident, workers become more determined, and increasing numbers are stepping forward to join the Defence Corps."
 AST_pig_iron_protests: "Pig Iron Protests"
 AST_pig_iron_protests_desc: "Our wharfers do not agree with their government in many cases, and especially not in the case of selling pig iron to warring countries. Australians have no interest in participating in aggression or transporting equipment used against innocent civilians, and so [AST.GetName] shall not either; call a strike."
 AST_part_with_colonizer: "Part With Colonizer"
 AST_part_with_colonizer_desc: "The root of our struggles lies in the British Empire and the capitalist system it has imposed from afar. No longer. With Britain distracted by crises closer to home, now is the time to seize our destiny and chart our own course as a free and independent nation."
 AST_take_it_to_the_streets: "Take It to the Streets"
 AST_take_it_to_the_streets_desc: "Industrial action is one of the most powerful tools we possess to force change in society, and we must wield it against a system designed only to exploit. Now is the time to take back the means of production, workers of Australia, unite!"
 AST_workers_educational_association: "Workers Educational Association"
 AST_workers_educational_association_desc: "The Workers Educational Association is an international organization dedicated to making education accessible to working people. We should establish our own chapter, for true equality of opportunity begins in the classroom."
 AST_off_leash: "Off the Leash"
 AST_off_leash_desc: "Dockworkers are the backbone of union action in Australia. As a continent-sized island, it is no surprise that maritime labor plays such a vital role in our economy. It is time to take off the collars, and unleash the seadogs of industry."
 AST_a_national_housing_commission: "A National Housing Commission"
 AST_a_national_housing_commission_desc: "Housing has long been a contentious issue. Everyone deserves a roof over their head, yet too often this basic necessity is used against workers, its cost a form of economic oppression. No longer. We will demand fair access to housing for all."
 AST_guaranteed_employment: "Guaranteed Employment"
 AST_guaranteed_employment_desc: "Socialism is too often dismissed with accusations of laziness or dependency directed at those in need. This must end. All we seek is a fair chance at work, and a fair wage with which to support our families."
 AST_equal_pay: "Equal Pay"
 AST_equal_pay_desc: "It is a persistent fallacy that those who own the means of production deserve more than those who labor within it. Owners and managers toil no harder, nor are they inherently more skilled. By equalizing wages, the fruits of labor can be shared more fairly across society."
 AST_all_for_one_one_for_all: "All for One, One for All"
 AST_all_for_one_one_for_all_desc: "'All for one, and more for me' has long been the rallying cry of the bourgeoisie, their greed demanding ever more while giving back less and less. The promise that wealth will flow downward is a lie. It must be shared equally, by all and for all."
 AST_abolition_of_private_property: "Abolition of Private Property"
 AST_abolition_of_private_property_desc: "The gears of industry are oiled with the blood of the workers. We must put an end to the brutality of accumulation and abolish private property entirely. Everything will be shared, from each according to their ability, to each according to their need."
 AST_centralized_production: "Centralized Production"
 AST_centralized_production_desc: "Market forces are chaotic and unequal. If we are to build a truly fair society, the state must take the central role in determining what is produced, by whom, and where. Our bureaucracy maintains meticulous records and is best positioned to set production quotas."
 AST_public_institutions: "Public Institutions"
 AST_public_institutions_desc: "Society requires many essential services to function, from healthcare and housing to childcare and transport. The state must provide these universally, ensuring access for all without restriction. Freed from the imperative to generate private profit, these systems can operate efficiently to serve the needs of the whole population."
 AST_planned_extraction: "Planned Extraction"
 AST_planned_extraction_desc: "We are fortunate to possess a land so rich in resources. We must ensure its wealth is systematically extracted and directed to the industries that need it most."
 AST_maritime_commission: "$USA_maritime_commission$"
 AST_maritime_commission_desc: "$USA_maritime_commission_desc$"
 AST_state_research_funding: "State Research Funding"
 AST_state_research_funding_desc: "To maximize the effectiveness of our research institutions, the state must serve as their primary source of funding, directing efforts where they are needed most, and ensuring that information remains tightly controlled. After all, we cannot risk our citizens being troubled by the wrong ideas."
 AST_graziers_to_industry: "Graziers to Industry"
 AST_graziers_to_industry_desc: "During the Great Depression, our cities emptied as workers sought stability in the countryside. Now, with control of the means of production, we can draw them back into industry. We must impress upon them the nation’s need: that the furnaces of industry must be fed by the sweat of man."
 AST_free_school_policy: "Free School Policy"
 AST_free_school_policy_desc: "To shape the model citizen, we must shape their ideas. From cradle to university, the state will guide what our children are taught. In this way, we can ensure future generations understand the importance of the socialist ideal, and the dangers of free markets... and free thought."
 AST_free_healthcare_policy: "Free Healthcare Policy"
 AST_free_healthcare_policy_desc: "Our people deserve to be free from disease and injury, and should the worst happen, they must not be beggared by misfortune as happens in other societies. We will provide universal access to healthcare, hospitals, and doctors- for a healthy people are a productive people."
 AST_the_publics_australia: "The Public's Australia"
 AST_the_publics_australia_desc: "We have cast aside the old order and built a nation that exists for the many, not the few. Industry, labor, and resources now serve the people as a whole. This is the Public’s Australia. Equal, united, and unbreakable."
 # 'Cominwealth' over 'Commonwealth' is intentional
 AST_the_australian_commonwealth: "The Australian Cominwealth"
 AST_the_australian_commonwealth_desc: "Britain once claimed the mantle of leadership over the Commonwealth, but its vision has been corrupted by capitalist interests. We will seize that role and lead the nations toward a shared socialist utopia."
 AST_union_control_commonwealth: "Unlocks §YUnion Control§! decisions. \nAllows Communist infiltration of New Zealand, Malaysia, Burma and ultimately, India."
 AST_a_comrade_emancipated: "A Comrade Emancipated"
 AST_a_comrade_emancipated_desc: "Across the world, many nations still remain bound by the chains of capitalism, their people denied true freedom. As a free socialist state, it is our duty to aid in their emancipation. Workers of the world, unite, and we will cast off these chains together."
 AST_union_control_local: "Unlocks §YUnion Control§! decisions. \nAllows Communist infiltration of Indonesia and the Philippines."
 AST_comintern: "Join the Comintern"
 AST_comintern_desc: "Though they have at times wavered from true Marxist principles, the Soviet Union remains the standard-bearer of a workers’ international. By joining the Comintern, we can unite our efforts to carry the torch of socialism across the world."
 AST_comintern_tt: "If §Y[AST.GetName]§! leads a faction, then it will merge into the Comintern. Otherwise, §Y[AST.GetName]§! will join the Comintern alone."
 AST_for_greater_good: "For the Greater Good"
 AST_for_greater_good_desc: "Our vision of world revolution requires blood and sacrifice. In too many places, the torch of socialism flickers; we must answer the call and send our support to ensure it does not go out. After all, this is for the greater good (the greater good)."
 AST_make_common_cause: "Make Common Cause"
 AST_make_common_cause_desc: "Under our leadership, the Commonwealth has begun to prosper, guided by the light of socialism out of the darkness of capitalist oppression. At this critical moment, we must ensure our will is not broken and that we march together toward a better tomorrow."
 AST_the_red_pacific: "The Red Pacific"
 AST_the_red_pacific_desc: "The Pacific must be remade in the image of the revolution. Across the islands and coasts of our region, we will support the rise of socialist governments and ensure the red banner flies from shore to shore."
 AST_the_irish_anti-britain_pact: "The Irish Anti-Britain Pact"
 AST_the_irish_anti-britain_pact_desc: "Britain has stood as a stronghold of capitalism for too long, protected by its island position and naval strength. By inciting unrest among dockworkers in Ireland and Northern Ireland, we can breach its defenses and open a path across the Irish Sea for our forces."
 AST_stretch_the_fleet: "Stretch the Fleet"
 AST_stretch_the_fleet_desc: "Britain still stands as the stronghold of capitalism, protected by its mighty fleet. It is time to expand our own naval capabilities, take the fight to them, and show the world which island is bigger."
 AST_chinese_relations: "Chinese Relations"
 AST_chinese_relations_desc: "Our comrades in China struggle for their very survival. We have the means to aid them, but must act quickly before they are overwhelmed by the imperialist forces arrayed against them."
 AST_westward_battles: "Westward Battles"
 AST_westward_battles_desc: "Fascist forces dominate the west, threatening the very fabric of our survival. Now aligned with the Comintern, we must take the fight to them and stand against those who would destroy the workers’ utopia we are building."
 AST_strongholds: "Strongholds"
 AST_strongholds_desc: "To secure our position in this new theater, we must support our Irish comrades against the imperial heart of capitalism. Their earlier struggle for independence offers valuable lessons as we prepare together for the next stage of the global conflict."
 AST_out_of_the_den: "Out of the Den"
 AST_out_of_the_den_desc: "Many in Ireland still harbor deep resentment toward British rule. It is time to show our strength and draw them out of the shadows, rallying them to our cause against a common foe."
 AST_end_the_kingdom: "End the Kingdom"
 AST_end_the_kingdom_desc: "The time has come. The root of imperialist capitalism will be stabbed in its rotten heart. The liberation of workers throughout the British Empire is at hand. End the monarchy. End the kingdom. End the oppression. Workers of the Commonwealth, unite!"
 AST_red_solidarity: "Red Solidarity"
 AST_red_solidarity_desc: "The struggle in China rages on, as millions suffer and die. Their fight is our fight, and we cannot stand idle. We can intervene, share their burden, and ensure the flame of revolution does not falter."
 AST_red_solidarity_tt: "§Y[AST.GetName]§! joins §Y[PRC.GetNameDef]§!'s war against §Y[CHI.GetNameDef]§!. The smaller faction absorbs the other, or §Y[AST.GetName]§! joins the war directly if both are already allied."
 AST_free_the_colonies: "Liberate the Colonies"
 AST_free_the_colonies_desc: "The fires of revolution burn through the crumbling British Empire. The colonies will be colonies no more, but free nations. Rise, comrades! Throw off your shackles and join the revolution!"
 AST_free_the_colonies_tt: "§Y[AST.GetName]§! demotes all former British colonies under its control to integrated puppets."
 AST_battle_of_the_ocean: "Battle of the Ocean"
 AST_battle_of_the_ocean_desc: "The oceans have long served as the arteries of global trade. Now, it is time to take the fight to the Pacific and sever the system it sustains. The waters will run red with the blood of corrupt capitalists and heroes of the revolution alike."
 AST_borderless_solidarity: "Borderless Solidarity"
 AST_borderless_solidarity_desc: "Solidarity. The word that unites the workers of the world. No border can divide us, no nation can stand alone. Wherever the struggle burns, we will answer the call, and stand together in the global fight for liberation."
 AST_an_equal_union: "An Equal Union"
 AST_an_equal_union_desc: "Though we carry the banner of the revolution, all who join us stand as equals. In this union, resources, labor, and ideas are shared freely, forging a future where prosperity is collective and no nation stands above another."
 AST_expanding_influence: "Expanding Influence"
 AST_expanding_influence_desc: "Standing on the right side of history, our ideas speak for themselves. The promise of a workers’ paradise is not a dream, but a reality in the making. We can extend this vision outward, inviting others to join us in building a shared future."

 AST_public_works: "Public Works"
 AST_public_works_desc: "The Great Depression has left the Australian economy in dire straits. We will initiate a range of public works programs to put people back to work and restore consumer spending."
 AST_lang_plan: "Lang Plan"
 AST_lang_plan_desc: "Jack Lang has risen to the forefront of economic politics through his vocal refusal to honor foreign debt obligations, instead redirecting those funds toward public initiatives aimed at stimulating domestic growth. After all, you can’t get blood from a stone."
 AST_exports_for_economic_recovery: "Exports for Economic Recovery"
 AST_exports_for_economic_recovery_desc: "Opponents of Lang’s ideas instead propose leveraging foreign markets and debt to encourage overseas investment and sales, committing to an export-oriented economy to boost domestic production, employment, and ultimately consumer spending."
 AST_the_phosphate_commision: "The Phosphate Commission"
 AST_the_phosphate_commision_desc: "Following the Great War, Nauru was placed under the joint trusteeship of Australia, New Zealand, and the United Kingdom. In 1919, the rights to all phosphate sales on the island were transferred to these trustees, led by Australia. Using our position of leadership, we can influence pricing and secure highly competitive rates for our domestic market."
 AST_goods_standard: "Goods Standard"
 AST_goods_standard_desc: "A core tenet of Jack Lang’s economic theory is the abolition of the Gold Standard in Australia, to be replaced by a Goods Standard, which links the money supply to the actual quantity of goods produced. This ensures that capital flow is tied directly to domestic productivity rather than external factors."
 AST_standard_gauge_line_to_darwin: "Standard Gauge Line to Darwin"
 AST_standard_gauge_line_to_darwin_desc: "We have lacked proper connections to our northern territories for too long. As part of a broader program of public works aimed at directing money back into the economy, we can construct a railway linking our southern cities to the north."
 AST_lang_is_right: "Lang is Right"
 AST_lang_is_right_desc: "Well, turns out that Lang was right! By refusing to prioritize foreign creditors and instead leveraging our own banking system more aggressively, we can free up significant funds. These can then be directed toward the domestic economy, providing much-needed investment and stimulating growth."
 AST_within_reach: "Within Reach"
 AST_within_reach_desc: "So close, and yet so far. Australia is a highly resource-rich nation, and if we dig just a little deeper, untold wealth lies beneath our feet. With the expansion of our infrastructure, even remote mines have become accessible, and we stand on the verge of an era of mineral wealth-driven Australian prosperity."
 AST_a_domestic_supply_chain: "A Domestic Supply Chain"
 AST_a_domestic_supply_chain_desc: "One side effect of our focus on the domestic economy is the development of an exceptionally resilient production system. With all levels of production based at home, we are largely insulated from external shocks."
 AST_broken_hill_propietary_company: "Broken Hill Proprietary Company"
 AST_broken_hill_propietary_company_desc: "The Broken Hill Proprietary Company is one of the foremost mining and steel producers in Australia. Dubbed 'The Big Australian' by locals, it dominates the industry. With the dramatic increase in demand for raw materials, the company is well positioned for even more rapid growth."
 AST_radium_hill: "Radium Hill"
 AST_radium_hill_desc: "Uranium has been discovered in South Australia, and the Radium Hill mine has significant potential for expansion. While we are still uncovering the full possibilities of these emerging technologies, it is clear that we stand on the threshold of the Atomic Age, and this could be our entry into it."
 AST_industrial_expansion: "Industrial Expansion"
 AST_industrial_expansion_desc: "The Great Depression has crippled our nation’s economic output for much of the past decade. Now that we have the political will for more direct action, we should channel it into a bold expansion of our industrial base, creating jobs, increasing demand for resources, and producing more goods for market."
 AST_income_tax_assessment_act: "Income Tax Assessment Act"
 AST_income_tax_assessment_act_desc: "Our taxation system is in a poor state and difficult for people to navigate, requiring heavy-handed government oversight that we can ill afford. By overhauling and streamlining the relevant provisions, we can make tax collection significantly more efficient."
 AST_council_for_scientific_and_industrial_research: "Council for Scientific and Industrial Research"
 AST_council_for_scientific_and_industrial_research_desc: "The Council for Scientific and Industrial Research was strengthened following the 1923 Imperial Conference to help broaden the economic base of the various colonies and dominions. While its contributions have been significant, it is time to give the body a new focus: the development of manufacturing and secondary industries."
 AST_bring_home_the_farmers: "Bring Home the Farmers"
 AST_bring_home_the_farmers_desc: "During the Great Depression, our major cities were severely depopulated as workers moved to the countryside in search of agricultural labor. Now that conditions are beginning to improve, we should incentivize the return of our workforce so we can bring factories back online and resume production."
 AST_reverse_wage_cuts: "Reverse Wage Cuts"
 AST_reverse_wage_cuts_desc: "In order to give businesses a fighting chance, we implemented a series of wage cuts across the economy. Now that we are seeing signs of recovery, we should reverse course. Rising wages lead to greater spending power, helping to drive consumption and economic growth."
 AST_the_manpower_directorate: "The Manpower Directorate"
 AST_the_manpower_directorate_desc: "As our economy grows increasingly complex, we face mounting manpower challenges. This directorate will ensure that the right people are placed in the right roles, with the right skills, at the right time."
 AST_recovery: "Recovery"
 AST_recovery_desc: "For the first time, our gross domestic product has surpassed pre-Depression levels. This is a moment to celebrate, as the only trajectory for our economy now is upward. We are entering a period of strong growth, and it is time to reap the rewards of our renewed prosperity."
 AST_devalued_currency: "Devalued Currency"
 AST_devalued_currency_desc: "One of the most effective ways to increase exports is through a weaker currency. If foreign buyers can purchase more of our goods because their money holds greater value, we become more competitive internationally. This is a double-edged sword, however, as imports from other nations will also become more expensive."
 AST_reverse_industry_tariffs: "Reverse Industry Tariffs"
 AST_reverse_industry_tariffs_desc: "In the past, we have used tariffs to shield our domestic industries from foreign competition. However, this has led to trade wars and retaliatory tariffs against our exports, raising prices. We should reduce these barriers and encourage reciprocal reductions to help expand trade."
 AST_foreign_competition: "Foreign Competition"
 AST_foreign_competition_desc: "Competition is good for business; it encourages innovation and efficiency while eliminating complacency. It’s a dog-eat-dog world out there, and we need to make sure our dog’s the biggest, and that we’ve taken off its collar so it's completely free to compete."
 AST_expanding_into_new_markets: "Expanding Into New Markets"
 AST_expanding_into_new_markets_desc: "The advantage of relying on foreign markets over the domestic one is simple. The global market is vast. There will always be new markets to tap into; we just need to find our edge and demonstrate the superiority of Australian goods and business practices."

 AST_populate_or_perish: "Populate or Perish"
 AST_populate_or_perish_desc: "When the Great Depression struck, birth rates declined rapidly and have ever since struggled to recover. In the purpose of continued domestic development, we shall establish a federal Department of Immigration to conduct and oversee a new immigration program."
 AST_recruitment_drive: "Recruitment Drive"
 AST_recruitment_drive_desc: "The weak will of previous governments, as well as their excessive reliance on Britain, have resulted in a long period of neglect of Australia's armed forces. This shall no longer stand, as we launch a campaign to drive recruitment into the Australian Defence Force."
 AST_new_deal: "New Deal"
 AST_new_deal_desc: "The protest that took place on [AST.GetName]'s 150th sesquicentenary made it evident that our laws concerning Indigenous citizens must be reconsidered. At the request of Aboriginal rights activists, we shall meet with them to determine, together, a pathway toward full citizenship for Indigenous peoples."
 AST_the_1938_sesquicentenary_flag: "The event of §YThe 1938 Sesquicentenary§! has transpired."
 AST_the_1938_sesquicentenary_tt: "Focus '§YNew Deal§!' in the §YPopulate or Perish Branch§! becomes available."
 AST_repeal_immigration_restrictions: "Repeal Immigration Restrictions"
 AST_repeal_immigration_restrictions_desc: "The Department of Immigration is constrained by outdated laws that determine who is permitted to immigrate to [AST.GetName]. Despite the risk of provoking controversy, we shall repeal these laws and establish a quota system to control the flow of immigrants instead."
 AST_womens_armed_services: "Women's Armed Services"
 AST_womens_armed_services_desc: "Despite fierce opposition, the formation of women's armed services shall proceed. Every helping hand shall be welcomed to defend [AST.GetName] against its aggressors, regardless of gender. To spur recruitment and training, the choice of directors for the forces is of the utmost importance."
 AST_northern_territory_reconnaissance_unit: "Northern Territory Reconnaissance Unit"
 AST_northern_territory_reconnaissance_unit_desc: "Flight Lieutenant and anthropologist Donald Thomson has argued for the inclusion of the Aboriginal population in [AST.GetName]'s armed services, and shall at last be heeded. We shall task Thomson personally with raising a reconnaissance unit of men with local knowledge and bushcraft skills to surveil even our most remote and inhospitable lands."
 AST_northern_territory_reconnaissance_unit_tt: "Unlock support company §YNorthern Territory Reconnaissance Unit§!."
 AST_torres_strait_battalion: "Torres Strait Battalion"
 AST_torres_strait_battalion_desc: "The Torres Strait Company's efforts as a garrison have been well managed, but its men have the potential for other accomplishments. With its members originating from the islands off [AST.GetName]'s northern coast, the unit possesses extensive knowledge of the Torres Strait. We shall train its men as Marines and appeal for further volunteers to form a battalion."
 AST_department_of_aboriginal_affairs: "Department of Aboriginal Affairs"
 AST_department_of_aboriginal_affairs_desc: "We shall implement the suggestion of Aboriginal rights activist groups to establish a new Department of Aboriginal Affairs. The department shall be advised by a committee of Aboriginal heritage, and its aim shall be to ensure the Indigenous population's access to proper food and medical aid."
 AST_immediate_rights: "Immediate Rights"
 AST_immediate_rights_desc: "No population group within [AST.GetName] shall be regulated by the federation, and no heritage shall restrict one's grant of civil rights. By establishing our own citizenship act and moving away from the notion that our population consists merely of British subjects, Australian rights shall no longer be conditional."
 AST_diverse_army: "Diverse Army"
 AST_diverse_army_desc: "The act of defending one's country is not only a privilege, but a right. Every willing Australian shall be able to enlist, and every ambitious soldier should be able to rise through the ranks."

