 INSHOL_begin_negotiations_soetardjo: "Begin Negotiations With Soetardjo"
 INSHOL_begin_negotiations_soetardjo_desc: "Soetardjo's petition for autonomy is promising, giving us an opportunity to compromise between the Nationalists and Loyalists. We should begin official negotiations with his party."
 INSHOL_urge_gov_veto: "Urge A Governor Veto"
 INSHOL_urge_gov_veto_desc: "The Soetardjo Petition is a nationalist scheme the Indies government is falling for. We must urge the Governor General to veto the petition immediately, else we risk losing our colony."
 INSHOL_eventual_autonomy: "Agree to Eventual Autonomy"
 INSHOL_eventual_autonomy_desc: "The Indonesian desire for independence is strong and is not slowing down. We will agree to eventual autonomy for the Indies, but only once the colony has proven it can sustain itself, and will continue to uphold democratic ideals."
 INSHOL_autonomous_dominion: "The Soetardjo Act of [GetYear]"
 INSHOL_autonomous_dominion_desc: "Despite the unreasonable definition 'self-reliance' set by the Netherlands which we must meet for the terms of the Soetardjo petition to be valid, the Indonesian desire for independence is strong enough that we managed to meet these requirements. As per the agreement, we will declare total and unconditional independence from the Dutch crown."
 INS_cannot_become_independent_tt: "§W§Y[INS.GetFlag][INS.GetNameDefCap]§! will be §Rpermanently locked out of becoming independent§! without foreign intervention.§!"

 INSHOL_sideline_the_volksraad: "Sideline the Volksraad"
 INSHOL_sideline_the_volksraad_desc: "The petition called by Soetardjo is in clear violation of Article 1 of the Dutch Constitution, and will only cause difficulty for the Indies administration. The petition must be vetoed."
 INSHOL_prioritize_dutch_profits: "Prioritize Dutch Profits"
 INSHOL_prioritize_dutch_profits_desc: "We will focus our effort on increasing profits for the homeland. Their economic stability is for the good of the Kingdom as a whole."
 INSHOL_development_loans_netherlands: "Development Loans From the Netherlands"
 INSHOL_development_loans_netherlands_desc: "We can take out loans from Dutch companies to speed up our industrialization effort. While we will utilize our position as a developing colony to guarantee low interest rates, we will still have to pay interest."
 INSHOL_request_economic_dev_subsidy: "Request Economic Development Subsidies"
 INSHOL_request_economic_dev_subsidy_desc: "We have proven our value to our overlord as a profitable colony. We can utilize this as bargaining material to get industrial development subsidies."
 INSHOL_loyalty_to_crown: "Loyalty to the Crown"
 INSHOL_loyalty_to_crown_desc: "The East Indies is many things, but above all we are a loyal Dutch colony. Queen Wilhelmina will guide us to victory. We must not allow Nationalism to end nearly 500 years of history, and continue to affirm our absolute loyalty to the Crown."
 INS_loans_timer: "\nIn §Y365§! days:"
 INS_expand_batavia_med_school_tt: "§Y$INS_dutch_east_indies$§!: Research Speed modifier is at least §G1.00%§!."
 INS_subsidize_local_business: "Subsidize Local Businesses"
 INS_subsidize_local_business_desc: "We should give subsidies to local businesses to stimulate economic growth, boosting our economy in the long run."
 INSHOL_education_reforms: "Education Reforms"
 INSHOL_education_reforms_desc: "Many citizens of the East Indies lack the ability to get an education, and very few have graduated from secondary school. If we want the East Indies to become a wealthy industrialized state, we must ensure education is properly accessible to the population."
 INS_expand_batavia_med_school: "Expand Batavia Medical School"
 INS_expand_batavia_med_school_desc: "Expanding the Batavia Medical School by building new campus facilities and hiring more professors will make further education much more accessible, which is vital for our long term economic growth."
 INS_prepare_for_policy_shift: "Prepare for a Policy Shift"
 INS_prepare_for_policy_shift_desc: "The political landscape in the Indies has been impacted by the national awakening of the past decades, and our current policies are clearly outdated. We should consider making some changes in our governing structure."
 INS_reallocate_rubber_industry_funding: "Reallocate Rubber Industry Funding"
 INS_reallocate_rubber_industry_funding_desc: "Our reliance on selling rubber has had a disastrous effect on our economy. We should diversify our economy by prospecting for resources and opening mines and factories across the archipelago. This will not be a cheap endeavour, so we will have to reduce the budget for maintaining rubber plantations."
 INS_reallocate_rubber_industry_funding_tt: "Unlocks a decision to §Yremove rubber from a state§! and replace it with smaller quantities of §Yother resources§!."

 INSHOL_nationalist_coallition: "A Nationalist Coalition"
 INSHOL_nationalist_coallition_desc: "The Volksraad has spoken with one voice for too long, and that voice has been too quiet. The time for petitions and patient deferrals is past. A coalition of the chamber's nationalist members will set aside their quarrels and demand unconditional independence. Older voices from outside the chamber, men the Dutch once thought safely sidelined, will be welcomed back into the fold."

 INSHOL_volksraad_compromises: "Volksraad Compromises"
 INSHOL_volksraad_compromises_desc: "Reform within the chamber has carried us this far and there is no reason to abandon the road now. The Volksraad will continue its careful work, trading concession for concession with The Hague, pursuing self-rule through patience rather than rupture. A future inside a Dutch commonwealth offers more than a future spent fighting for one outside it."

 INSHOL_establish_the_princely_council: "Establish the Princely Council"
 INSHOL_establish_the_princely_council_desc: "The sultans and rajas of the archipelago command loyalties that no chamber in Batavia ever has. Their courts are older than the Company and older than the Republic that succeeded it. A formal council of the princely houses will give these rulers a seat at the table of the new nation, and bind their authority to ours."

 INSHOL_nationalize_dutch_companies: "Nationalize Dutch Companies"
 INSHOL_nationalize_dutch_companies_desc: "The great trading houses, the shipping lines, the plantation concerns and the banks have worn Dutch names for as long as anyone can remember. They will wear Indonesian ones from now on. The boards will be reseated, the signs taken down, and the capital that was extracted from these islands for three centuries will at last belong to the islands themselves."

 INSHOL_democracy: "A Democratic Indonesia"
 INSHOL_democracy_desc: "The Volksraad began its life as a half-measure, an advisory body with carefully limited teeth, designed to offer the appearance of representation while withholding the substance. It has outgrown its makers. The chamber will be reconstituted as a true legislature, with members chosen by the people it claims to represent and decisions binding on the government that once kept it on a short leash."

 INSHOL_princely_authority: "Princely Authority"
 INSHOL_princely_authority_desc: "A council of advisors is a fine thing in its place, but the sultans who lent their names to the founding of this nation may yet lend more than that. The parliament will not stand in the way of those who would see one of their number raised above the rest. The old courts have waited a long time for this question to be asked of them again."

 INSHOL_encourage_further_investment: "Encourage Further Investment"
 INSHOL_encourage_further_investment_desc: "The terms agreed at the Volksraad have settled the political question for now, and Dutch capital has taken note. Tariffs will be eased, guarantees extended, and the chambers of commerce in Amsterdam and Rotterdam reassured that the archipelago remains open for business. What was profitable under the old arrangement will be profitable under the new one."

 # <Joint Tree - ABDACOM>
 INSHOL_east_indies_artillery: "East Indies Artillery Manufacturing"
 INSHOL_east_indies_artillery_desc: "Opening up artillery manufacturing facilities in Java will allow us to rely less on foreign trade for our military effort."
 INSHOL_recall_gerardus_johannes_berenschot: "Recall General Berenschot"
 INSHOL_recall_gerardus_johannes_berenschot_desc: "Gerardus Johannes Berenschot is one of the most talented Generals in the Commonwealth. He has spent the majority of his career in the Indies but has spent several years in the Netherlands. In these dire times, we must recall him to the Indies to help in the war effort."
 INSHOL_east_indies_cruiser_manufacturing: "East Indies Cruiser Manufacturing"
 INSHOL_east_indies_cruiser_manufacturing_desc: "Manufacturing our own Cruiser ships instead of ordering them directly from the Dutch is the first step towards forming a real Navy, a necessary effort considering the Japanese threat."
 INSHOL_transfer_of_conrad_helfrich: "Transfer Conrad Helfrich to the Indies"
 INSHOL_transfer_of_conrad_helfrich_desc: "Transferring Admiral Conrad Helfrich to the Indies directly will critically improve the naval effort in the Indies."

 # <Joint Tree - Naval Program>
 INSHOL_naval_program: "Netherlands-Indonesia Naval Program"
 INSHOL_naval_program_desc: "The East Indies Navy is far behind other navies, even colonial navies. It is in the best interest of all parties that we aid in the development of this new navy, in order to ensure hasty progress."

 INSHOL_naval_program_transfer_25_tt: "Transfer §Y25%§! of our naval forces to [INS.GetNameDef]."
 INSHOL_naval_program_transfer_25_2_tt: "§Y[HOL.GetFlag] [HOL.GetNameDefCap]§! will transfer §Y25%§! of their naval forces to §Y[INS.GetNameDefCap]§!."
 INSHOL_naval_program_transfer_100_tt: "Transfer §Rour entire navy§! to [INS.GetNameDef]."
 INSHOL_naval_program_transfer_100_2_tt: "§Y[HOL.GetFlag] [HOL.GetNameDefCap]§! will transfer their entire navy to §Y[INS.GetNameDefCap]§!."
 INSHOL_naval_program_rejected_tt: "Unlocks national focus §Y$INSHOL_naval_secondchance$§!."

 INSHOL_hybrid_navy: "A Hybrid Navy"
 INSHOL_hybrid_navy_desc: "Our Navy cannot rely only on taking over the pacific fleet of [HOL.GetNameDef], we must begin manufacturing our own ships or else one mistake may cut off our entire naval supply."
 INSHOL_request_naval_control: "East Indies Squadron"
 INSHOL_request_naval_control_desc: "[HOL.GetNameDefCap] has fallen and is in no place to operate an entire navy. We should take control over it for the remainder of the war."
 INSHOL_naval_secondchance: "East Indies Naval Scheme"
 INSHOL_naval_secondchance_desc: "While [HOL.GetNameDef] have refused to sign over control over the Navy, we still need to defend the pacific unless we wish to be overtaken. While it may not work out as well as if they agreed to our proposal, we will figure out a good-enough alternative."

 # <Joint Tree - Netherlands in Exile>
 INSHOL_netherlands_in_exile: "Netherlands in Exile"
 INSHOL_netherlands_in_exile_desc: "The tragic fall of our kingdom is now a reality. We cannot sink to the point of defeatism. We must accept what has happened and focus on what we can salvage."
# INSHOL_relocate_prime_minister: "Relocate the Prime Minister to Java"
 INSHOL_relocate_our_generals: "Relocate our Army to Java"
 INSHOL_relocate_our_generals_desc: "The remaining exiled Generals, Commanders, and holdout Soldiers must be relocated to [1058.GetName] with utmost priority, before it is too late."
 #INSHOL_relocate_our_soldiers: "Transfer Holdout Soldiers to Java"
 INSHOL_netherlands_indonesia_union: "Netherlands-Indonesia Union"
 INSHOL_netherlands_indonesia_union_desc: "The concept of an equal union state between [HOL.GetNameDef] and [INS.GetNameDef] is laughable to many, but with the crisis we find ourselves in it is looking like the only way to maximize our chance of maintaining sovereignty."

 # <Sukarno Shared Branch - Resistance Buildup>
 INS_underground_revolution: "Underground Revolution"
 INS_underground_revolution_desc: "We will begin planning a revolution from the shadows, slowly increasing membership and militia activity until we are ready to strike."
 INS_infiltrate_the_media: "Infiltrate the Media"
 INS_infiltrate_the_media_desc: "Our movement has secured the membership of several high-ranking members of media organizations in the Indies. We can use this to our advantage to subtly plant pro-revolutionary sentiment in the minds of citizens."
 INS_infiltrate_the_army: "Infiltrate the Army"
 INS_infiltrate_the_army_desc: "Many of our members are enlisted in the KNIL, from low ranking soldiers to majors. We should collect as many secrets as possible, while elevating our own to high positions. Once we pull the trigger, we can stir chaos in the KNIL."
 INS_privately_owned_military_industry: "Privately Owned Military Industry"
 INS_privately_owned_military_industry_desc: "We will establish several shadow corporations in the military industrial sector, ensuring we will retain control over military industry once the revolution has begun."
 INS_privately_owned_military_industry_tt: "Add §G2§! §YMilitary Factory§! in your HQ"
 INS_instigate_chaos_sulawesi: "Instigate Chaos in Sulawesi"
 INS_instigate_chaos_sulawesi_desc: "We will cooperate with local nationalists in Sulawesi, organizing strikes, riots, and radicalizing the population."
 INS_instigate_chaos_sulawesi_tt: "Once we declare independence, we will gain a §Gcore§! on §Y[673.GetName]§! and §Y[1056.GetName]§!. They will continue to be uncored by the Dutch East Indies."
 INS_instigate_chaos_medan: "Instigate Chaos in Medan"
 INS_instigate_chaos_medan_desc: "We will cooperate with local nationalists in Medan and Riouw, organizing strikes, riots, and radicalizing the population."
 INS_instigate_chaos_medan_tt: "Once we declare independence, we will get a §Gcore§! on §Y[1049.GetName]§!. It will continue to be uncored by the Dutch East Indies."
 INS_embezzlement_scheme_in_batavia: "Embezzlement Scheme in Batavia"
 INS_embezzlement_scheme_in_batavia_desc: "We will setup a scheme to move our production from Batavia to republican territory upon declaring independence."
 INS_embezzlement_scheme_in_batavia_tt: "Upon declaring independence, half of all factories in §Y[1058.GetName]§! will be relocated to our §YRevolutionary Headquarters§!."
 INS_volksraad_rumors: "Rumors in The Volksraad"
 INS_volksraad_rumors_desc: "We will begin discreetly discussing the revolution within the Volksraad. If we are successful, we can convince the Indonesian Volksraad members to join our cause."
 INS_volksraad_rumors_tt: "All §YIndonesian §!Volksraad advisors will be §Gkept§! after declaring independence."

 INS_railway_youth_force: "Cooperate With the Railway Youth Force"
 INS_railway_youth_force_desc: "The railway youth force is an Islamic youth militia group primarily active in Central Java, named after their strategy of seizing railways. They would make for a valuable ally, however, they are energetic and want to engage in combat. They will become unhappy with the government if we stay in a ceasefire for too long."
 INS_sleeper_informant_network: "[GetInformantNetworkName]"
 INS_Sleeper_Informant_Network_name: "Sleeper Informant Network"
 INS_KNIL_Informant_Network_name: "KNIL Informant Network"
 INS_sleeper_informant_network_desc: "We will create an informant network that is embedded throughout the KNIL administrative apparatus, giving us advance warning of enemy plans."
 INS_sleeper_informant_network_tt: "§RWhen Independence is declared:§!\n"

 # <Sukarno Shared Branch - Peoples Security Army>
 INS_the_peoples_security_army: "The People's Security Army"
 INS_the_peoples_security_army_desc: "Our members, which are primarily young Indonesians are growing impatient, eager to contribute and fight for our Independence. We should establish a Revolutionary Armed Forces and begin training our future soldiers."
 INS_commander_sudirman: "Sudirman's Army"
 INS_commander_sudirman_desc: "Sudirman, despite being a young up-and-comer has shown great potential and is very popular among the young members of the resistance. He should guide the path of the People's Security Army and lead us to victory."
 INS_commander_oerip: "Oerip's Army"
 INS_commander_oerip_desc: "Oerip has served decades in the army and is the only Indonesian to ever be promoted to Major in the KNIL. His knowledge and experience far outreaches that of any other member. He should guide the path of the People's Security Army and lead us to victory."
 INS_sudirmans_promotion: "Sudirmans Promotion"
 INS_sudirmans_promotion_desc: "Sudirman has shown great leadership skills, and has orchestrated several successful assaults. It is time we recognize our Commander's efforts by giving him the title of General that he deserves."
 INS_tkr_steal_general: "Poach KNIL Generals"
 INS_tkr_steal_general_desc: "If we can convince high-ranking members of the East Indies Army to join our cause, we'll simultaneously improve our army while sabotaging theirs."
 INS_tkr_supply: "Every Revolutionary Must Fight"
 INS_tkr_supply_desc: "We will ensure every member of our movement receives formal military training, no exceptions."
 INS_tkr_professional_army: "A Professional Army"
 INS_tkr_professional_army_desc: "We mustn't rely only on militias, we should develop a professional Republican army to maintain order."

 INS_arm_the_revolutionaries: "Arm the Revolutionaries"
 INS_arm_the_revolutionaries_desc: "We must begin with the revolutionaries and nationalists who are full of energy and ready to give everything they have for Indonesia. We will provide them with training and equipment they need to fight for their country."
 INS_arm_the_youth: "Arm the Youth"
 INS_arm_the_youth_desc: "Beyond the revolutionaries, we must arm the youth. Still full of energy and hope, they will carry the flame of the revolution. We must ensure as many Indonesian young adults as possible are trained and equipped for combat. If fighting reaches their homes, they will be ready to act."
 INS_arm_the_students: "Arm the Students"
 INS_arm_the_students_desc: "Students have built the foundation of the revolution since decades ago, and they will continue to lead it forward."
 INS_guerilla_industry: "Guerilla Industry"
 INS_guerilla_industry_desc: "We will utilize our guerilla forces across the archipelago in order to seize control of factories, allowing us to produce new guns to arm our militias with."
 INS_indonesian_assault_doctrine: "The Indonesian Assault Doctrine"
 INS_indonesian_assault_doctrine_desc: "Soldiers are not all there is to a war. A million men means nothing if they do not have guns to fight with. We must prioritize obtaining high-quality artillery in order to push deeper into enemy-controlled territory."
 INS_tighter_tkr_integration: "Tighter TKR-Laskar Integration"
 INS_tighter_tkr_integration_desc: "The People’s Security Army and the various militia forces do not operate in unity, and coordination is limited. This is only going to cause more and more problems as the war continues, we need to intertwine the armed forces and militias into one unified organization, despite the inevitable protests from militia officers."
 INS_quality_over_quantity: "Quality Over Quantity"
 INS_quality_over_quantity_desc: "One well trained soldier with a thought-out strategy and modern equipment will beat five students with pistols. We must prioritize high-quality, well-armed soldiers and special forces over mobilizing as many soldiers as possible."
 INS_add_militia_cap_1_tt: "§YFreedom Fighter§! division cap increases by §Y1§!.\n"
 INS_add_militia_cap_2_tt: "§YFreedom Fighter§! division cap increases by §Y2§!.\n"
 INS_add_militia_cap_3_tt: "§YFreedom Fighter§! division cap increases by §Y3§!.\n"
 INS_add_3_militia_unit_tt: "Create three §YFreedom Fighter§! units, which can be used in §Yraids§! to increase §Gmilitia presence§! in Dutch states."
 INS_add_fully_trained_militia_unit_tt: "Create one trained §YFreedom Fighter§! unit.\n"

 # <Sukarno Shared Branch - Expand Resistance Membership>
 INS_expand_resistance_membership: "Expand Resistance Membership"
 INS_expand_resistance_membership_desc: "Centering our entire movement in one base will guarantee failure. We will draft members into groups of militias to send as envoys that will increase our popularity and control in various regions."

 # <Central Independence Branch - Militias>
 INS_deploy_the_kris: "Indonesian People's Service of Sulawesi"
 INS_deploy_the_kris_desc: "The Indonesian People's Service of Sulawesi, known in Indonesian as the KRIS are an active group of Militias and form the majority of militia presence in Sulawesi and Manado. We should recruit them to formally fight alongside the TKR."
 INS_assist_the_pemuda: "Assist the Pemuda"
 INS_assist_the_pemuda_desc: "Java is full of various Pemuda student militias. Joining forces with them and providing military assistance in their missions against the Dutch might secure us a useful ally."
 INS_mobilize_the_pemuda: "Mobilize the Pemuda"
 INS_mobilize_the_pemuda_desc: "Now that we have successfully earned the trust of the largest Pemuda groups, we should begin plans to mobilize them into the TKR."
 INS_organize_jakarta_pemuda: "Organize the Jakarta Pemudas"
 INS_organize_jakarta_pemuda_desc: "Java has many Pemuda groups of all sizes. While we have mobilized and recruited most of them, there are dozens of small ones in Jakarta still acting independently. We must contact them and establish collaboration."
 INS_recognize_moestopos_batallion: "Recognition of Moestopo's Batallion"
 INS_recognize_moestopos_batallion_desc: "A revolutionary named Moestopo has declared himself as the self-proclaimed 'Acting Minister of Defense' in Surabaya, maintaining control of the militia forces in Surabaya. His efforts deserve formal recognition, we should formally promote him to Major General of the TKR."
 INS_darul_islam_focus: "Darul Islam"
 INS_darul_islam_focus_desc: "Kartosoewirjo's hizbullah have proved themselves in the hills of West Java, and we cannot afford to leave such fighters outside our ranks. Let his irregulars stand among our own, and let the man himself bear the rank he has earned. The faithful will press their case in the Republic soon enough."

 # <Central Independence Branch - Navy>
 INS_just_a_fisherman: "Just a Fisherman"
 INS_just_a_fisherman_desc: "Fighting a war in an archipelago without a Navy is a difficult task and not one we can sustain much longer. We will try a possibly naive strategy, wherein we will send militias on fishing boats disguised as fishermen to Dutch-controlled ports."
 INS_a_cheap_navy: "A Cheap Navy"
 INS_a_cheap_navy_desc: "We do not have the time or money to build a big modern navy. We must make due with what we have, and scrap together anything we can find."
 INS_divert_army_funds_to_navy: "Divert Army Funds to the Navy"
 INS_divert_army_funds_to_navy_desc: "Indonesia is an archipelago, our infantry are nothing without ships to transport them. It is a worthy sacrifice to divert funding from the TKR to our new Navy."
 INS_indonesian_naval_doctrine: "Indonesian Naval Doctrine"
 INS_indonesian_naval_doctrine_desc: "Now that we are building a navy of our own, it is important to consider the doctrine by which we will fight and train. We should prioritize forming and adopting a Naval Doctrine as soon as possible."
 INS_domestic_shipbuilding: "Domestic Shipbuilding"
 INS_domestic_shipbuilding_desc: "We cannot rely on captured and purchased ships forever, it will not be long until there are no more Dutch ships left for us to capture. We should start building our own ships early."
 INS_acquire_modern_blueprints: "Acquire Modern Blueprints"
 INS_acquire_modern_blueprints_desc: "We will purchase blueprints from other countries and private corporations that we will use to construct our new Navy."
 INS_reclaiming_the_dutch_navy: "Reclaiming the Dutch Indies Navy"
 INS_reclaiming_the_dutch_navy_desc: "The Dutch have left plenty of ships stationed in ports we now occupy. We should claim these ships for ourselves while we have the chance."
 INS_admiral_mas_pardi: "Admiral Mas Pardi"
 INS_admiral_mas_pardi_desc: "Any good navy needs an Admiral to command it. Mas Pardi is the obvious choice."
 INS_akademi_angkatan_laut: "Construct Akademi Angkatan Laut"
 INS_akademi_angkatan_laut_desc: "We will construct a Naval Academy with facilities for Naval research, while educating more citizens into Engineers and Admirals."

 # <Central Independence Branch - Militia Logistics>
 INS_pki_militia_tt: "Tan Malaka has a very powerful militia, however, they fight not only for the will of Indonesia but for the will of §Rcommunism§! and the Soviet. §REventually, they will oppose any non-communist government violently.§!"
 INS_increase_laskar_funding_tt: "§WGain§! 1§Y Military Factory§! for every demand successfully granted to a militia (maximum of §G6§!)"
 INS_subsidize_laskar_armament: "Subsidize Laskar Armament"
 INS_subsidize_laskar_armament_desc: "Militias fighting with bamboo spears are not going to survive for long against heavily armed units. We need to prioritize producing more guns and ammunition for these militias."
 INS_loot_knil_weapons_caches: "Loot KNIL Weapons Caches"
 INS_loot_knil_weapons_caches_desc: "There are plenty of weapons caches the KNIL deposited before the revolution. Many of our members are former members of the KNIL, and we may be able to find and loot these caches."
 INS_utilize_tan_malakas_militia: "Utilize Tan Malaka's Militia"
 INS_utilize_tan_malakas_militia_desc: "Tan Malaka's Red Militia is perhaps the strongest singular militia in all of Indonesia, and it would be a huge boon to mobilize them in the TKR. This does not come without risks, giving a powerful militia with strong political motives this much influence will make it much easier for them to seize power for themselves."
 INS_increase_laskar_funding: "Increase Laskar Funding"
 INS_increase_laskar_funding_desc: "Our Militias make up the majority of our forces. We need to acknowledge this and fund them accordingly, even if they are not completely loyal to [INS.GetLeader]."
 INS_develop_a_functioning_airforce: "Develop a Proper Airforce"
 INS_develop_a_functioning_airforce_desc: "An Air force has a big impact on an army, we should prioritize creating one."

 # <Vice Presidential Edict - Intro>
 INS_political_stabilization: "Restore Order"
 INS_political_stabilization_desc: "Our nation is becoming more unstable for each passing day. If we do not react soon a civil war is all but inevitable. We must start negotiations between the National Committee, President, and Militia leaders to find a solution."
 INS_vice_presidential_edict: "Sign Vice Presidential Edict X"
 INS_vice_presidential_edict_desc: "The National Committee is almost unanimous in its demand for real legislative power. A petition has been handed to the President proposing a Hybrid system, where the National Committee will become an independent parliament, sharing joint legislative powers with the President. The offer is enticing, but there is a risk of Presidential power becoming negligible."
 INS_local_cooperatives: "Establish Local Cooperatives"
 INS_local_cooperatives_desc: "We should not create a capitalist system like that in the west, but we should not disregard the economic benefit privatization provides. We will allow for the creation of local cooperatives, wherein their success will grant riches to their owners. However, they will be overseen by the government, and will be forbidden from expanding outside of their locality."
 INS_local_unity: "Partial Princely Autonomy"
 INS_local_unity_desc: "We will grant partial autonomy to Princely States, as a temporary measure to decrease infighting during these already hectic times."
 INS_education_subsidies: "Education Subsidies"
 INS_education_subsidies_desc: "Investing in the future of the nations youths is absolutely necessary if we want an economically successful state. We will construct affordable schools across the republic."
 INS_land_reform: "Land Reform"
 INS_land_reform_desc: "The Netherlands directly owned large quantities of land before we declared independence. We should distribute this land to any Indonesian who will make use of it for low prices in order to encourage economic growth."
 INS_dominion_of_atjeh: "The Dominion of Atjeh"
 INS_dominion_of_atjeh_desc: "The separatist movement in Atjeh is large, and growing. There is no reason to escalate the situation, we should instead negotiate a compromise wherein they stay a part of Indonesia, while being mostly autonomous."

 # <Vice Presidential Edict - Presidential Balance>
 INS_dissolve_national_party: "Dissolve the National Party"
 INS_dissolve_national_party_desc: "The Hybrid system was created as a necessary compromise to avoid chaos. We should not allow the President to hold this much power undemocratically. The president must be deposed by parliament or else we will never achieve democracy."
 INS_womens_sufferage: "Women's Suffrage"
 INS_womens_sufferage_desc: "Extending the vote to women will lead to short term instability, but is necessary for long term stability and democracy."
 INS_women_in_military: "Women in the Military"
 INS_women_in_military_desc: "Allowing women to serve in the military is necessary to ensure our armed forces are as powerful as possible."
 INS_fair_election: "A Fair Election"
 INS_fair_election_desc: "With the President deposed, and the revolution over, we can finally hold the first truly fair election, with no authoritarian influence."

 # < Hybrid Politics >
 INS_continue_hybrid_politics: "Continue the Hybrid Politics"
 INS_continue_hybrid_politics_desc: "Hybrid politics is a necessary evil. While the end goal is true democracy, Indonesia is far too young and unstable for all power to be handed to the people. The President and Parliament will continue to moderate each other, ensuring neither body becomes too powerful."
 INS_guided_economy: "Guided Economy"
 INS_guided_economy_desc: "We will oversee the economy of Indonesia directly to ensure we maintain control. We will nationalize all banks, as well as the oil and agricultural sectors."
 INS_reform_education_system: "Mandatory Ideological Education"
 INS_reform_education_system_desc: "The revolution was proof that students and youths upset with the social order will always lead the rebellion. For the safety of our government and nation, we will require that schools teach according to our government ideology."
 INS_reform_education_system_2: "Education Reform"
 INS_reform_education_system_2_desc: "If we want Indonesia to become a wealthy nation in the future, all Indonesians, regardless of birthplace must be entitled to an education."
 INS_three_year_plan: "Three Year Plan"
 INS_three_year_plan_desc: "We can establish a three year plan to build infrastructure across the archipelago and connect the islands."

 INS_destroy_pacific_colonialism: "Destroy Pacific Colonialism"
 INS_destroy_pacific_colonialism_desc: "The revolution may have ended, but there are still battles to be fought. There are still many people living under colonial tyranny at our doorstep. We cannot idly sit and watch, we must take action to liberate them from their overlords!"
 INS_rapid_mobilization: "Rapid Mobilization"
 INS_rapid_mobilization_desc: "Any strong nation has a strong army to stand on. If we want to become a regional superpower capable of standing our ground, we must begin by making our army far stronger than it is today."
 INS_greater_indonesia: "Proclaim Greater Indonesia"
 INS_greater_indonesia_desc: "The ancient empire of Nusantara had once united the Malay-world as one entity, one people. With us having liberated Malaya from colonial tyranny, we should do like our ancestors in Nusantara, declaring the entire Malay world as one united nation."

 # < State Religion >
 INS_secularism: "Secularism"
 INS_secularism_desc: "Indonesia is home to many people of many religions. Mixing religion and politics together will only cause infighting, therefore we should ban religious political parties."
 INS_integrate_sarekat_islam: "Integrate Sarekat Islam"
 INS_integrate_sarekat_islam_desc: "The big Islamic political parties have a lot of popular support. It is in our best interest to integrate them into government."

 # <Vice Presidential Edict - Sjahrir>
 INS_sjahrirs_continued_tenure: "Sjahrirs Continued Tenure"
 INS_sjahrirs_continued_tenure_desc: "Prime Minister Sjahrir has proved himself as a great leader, guiding us through the revolution, improving our economy, and establishing democracy. We should reelect him as Prime Minister."
 INS_unity_in_diversity: "Unity in Diversity"
 INS_unity_in_diversity_desc: "For centuries the words Unity in Diversity have captured the spirit of our archipelago. During the revolution this idea became a rallying cry, reminding Indonesians that though we speak many languages and follow many different traditions, we stand together as one people. We should enshrine this phrase in our constitution, so that our unity will be preserved for generations to come."

 INS_the_timor_issue: "[INS_timor_issue_scripted_name]"
 INS_timor_issue_scripted_name_issue: "The Timor Issue"
 INS_timor_issue_scripted_name_attack: "Attack East Timor"
 INS_the_timor_issue_desc: "[INS_timor_issue_scripted_desc]"
 INS_timor_issue_scripted_desc_issue: "East Timor is clearly rightful Indonesian territory, and while the revolution has ended, it is still under colonial rule. We will send an ultimatum to [721.OWNER.GetName] demanding the immediate transfer of East Timor."
 INS_timor_issue_scripted_desc_attack: "East Timor is clearly rightful Indonesian territory. The rebels on the island may claim independence, but they clearly do not speak for the entire population. The remnants of portugese colonialism must be integrated into the Republic."

 INS_pledge_to_allies: "Pledge to the Allies"
 INS_pledge_to_allies_desc: "We are at risk of being invaded as part of the growing conflict across the world. While our relations with the Allies have been shaky, we have established ourselves as a Democratic power in the pacific and should align ourselves with the big democratic powers."
 INS_mixed_economy_system: "Mixed Economy System"
 INS_mixed_economy_system_desc: "Indonesia is a unique country and will not thrive under traditional Capitalism or Communism. We should establish a mixed economy system, with elements of both capitalism and communism."
 INS_social_democracy: "Social Democracy"
 INS_social_democracy_desc: "The [INS.GetAdjective] economy has grown massively since Sjahrirs economic policies were implemented. We should declare Indonesia as a fully Social Democratic state, and develop future economic policies based on the principles of social democracy."

 # <Vice Presidential Edict - Sjarifuddin>
 INS_prime_minister_sjarifuddin: "Prime Minister Sjarifuddin"
 INS_prime_minister_sjarifuddin_desc: "Sjarifuddin is the best candidate for Indonesia, his moderate policies allow for compromise between the communists and socialists."
 INS_concessions_to_communists: "Concessions to the Communists"
 INS_concessions_to_communists_desc: "The PKI has a significant number of seats in parliament, we should grant a few ministerial positions to PKI leaders to ensure stability."
 INS_sjarifuddin_focus_2: "Self-Managed Export Economy"
 INS_sjarifuddin_focus_2_desc: "With our newfound independence we should revisit our export economy system and reorganize it so that it no longer takes Dutch profits into accord. While an export-based economy is still dangerous, we can make it much more reliable than in previous years."

 # <Vice Presidential Edict - Hatta>
 INS_prime_minister_hatta: "Prime Minister Hatta"
 INS_prime_minister_hatta_desc: "Mohammad Hatta, known as the proclamator of the revolution has served as Vice President to Sukarno, and was generally the more democratic-leaning of the two. He will make a suitable Prime Minister that most political parties can compromise on."
 INS_hatta_focus_2: "The Next Steps"
 INS_hatta_focus_2_desc: "The revolution has ended, and while certain political figures are insisting the revolution must continue, these voices should be ignored. Instead we should look forward, we must build up Indonesia so that future generations will live in prosperity."
 INS_hatta_princely_advisors: "Integrate the Princely States"
 INS_hatta_princely_advisors_desc: "Through our shared diversity we find unity. We have based our nation on this principle, but the end of the revolution has put strain to the idea due to the lack of a shared struggle. In order to prevent resentment and uprisings from minority groups, we should establish an additional council where local rulers from princely states have a direct say in national politics."
 INS_prime_minister_tt: "The first Indonesian general election has been held"

 # < Guided Democracy >
 INS_guided_democracy: "Guided Democracy"
 INS_guided_democracy_desc: "Democracy may be the ideal, but giving up power to the people now will only end in chaos. We will elevate Sukarno to President for life, who will oversee the democratic parliament and intervene if necessary."
 INS_enact_militarism: "Enact Militarism"
 INS_enact_militarism_desc: "We should learn a few lessons from [JAP.GetNameDefCap] and its militarist policies. Adopting similar principles will serve to benefit our new government."
 INS_sukarnos_industrialization: "Empower Javanese Industry"
 INS_sukarnos_industrialization_desc: "Java's industries are the backbone of our economy and military. All roads must lead to Rome."
 INS_sukarnos_industrialization2: "Every Man Must Play His Part"
 INS_sukarnos_industrialization2_desc: "The war effort is the number one priority of this nation, and therefore it is the number one priority of every Indonesian to contribute. Luxury is the enemy, the military industrial complex must grow."
 INS_japanese_military_lessons: "Japanese Military Lessons"
 INS_japanese_military_lessons_desc: "We should study the military doctrines of Japan and adapt our own army accordingly."

 # < Support Tan Malaka's Coup>
 INS_support_tan_malakas_coup: "Support Tan Malaka's Coup"
 INS_support_tan_malakas_coup_desc: "Sukarno proclaimed our independence, but he has proven himself a man of half-measures and diplomatic concessions. Tan Malaka and his Persatuan Perjuangan demand what the people demand: one hundred percent independence, no negotiations, no compromise. If Sukarno will not fight for the revolution in full, then the revolution must find a leader who will."
 INS_minimum_program: "The Minimum Program"
 INS_minimum_program_desc: "The Persatuan Perjuangan has laid out its demands: a people's government, a people's army, and the nationalization of all foreign-owned plantations and industry. We need capable men to carry this program forward. Njono speaks for the workers, Setyadjit for the party intellectuals. Together they will see that the revolution is organized from the factory floor to the halls of government."
 INS_agrarian_reform: "Agrarian Reform"
 INS_agrarian_reform_desc: "For three centuries the land of Indonesia has fed the plantations of strangers. The peasants who worked it have known little else. A revolution that leaves this unchanged is no revolution at all. We will see the land pass to those who till it."
 INS_soviet_aid: "Soviet Aid"
 INS_soviet_aid_desc: "The Soviet Union has recognised our revolution and stands ready to supply it. Whatever differences divide our programme from Moscow's, we cannot afford to refuse what is on offer. We should take the arms and press on."
 INS_pacific_revolution: "The Pacific Revolution"
 INS_pacific_revolution_desc: "The colonial powers did not retreat from Asia, only from Indonesia. The old order still holds in places such as Malaya and the Phillipines, and in each of them there are men and women who wish to overturn it. Our revolution has given us both the standing and the obligation to assist them. We must."
 INS_purge_oppurtunists_tt: "Unlocks §Y$INS_launch_revolution$§! in countries with §Y60%§! or more communist support. Countries we instigate revolutions in will become our §Ypuppet§!."
 INS_purge_oppurtunists: "Purge the Opportunists"
 INS_purge_oppurtunists_desc: "Musso spent twenty years in Moscow learning to take orders. He returned with Soviet instructions in his pocket and a plan to turn our republic into a puppet of the Comintern. We did not throw off the Dutch only to kneel before another foreign master. The opportunists who would sell our revolution to Moscow must be rooted out, and the peoples we liberate shall look to Jakarta, not to the Kremlin."
 INS_federation_of_aslia: "Federation of Aslia"
 INS_federation_of_aslia_desc: "The nations we have liberated need not stand alone. Tan Malaka always envisioned something greater than one republic. A federation from the mainland to the Pacific, united against any colonial power that dares return. We will offer them full membership in our state."
 INS_aslia_tt: "Allows coring and annexing §YPacific§! subjects"
 INS_musso_ascends: "Musso Ascends"
 INS_musso_ascends_tt: "Unlocks §Y$INS_launch_revolution$§! in countries with §Y30%§! or more communist support. Countries we instigate revolutions in will remain independent."
 INS_musso_ascends_desc: "Tan Malaka is a dreamer. Musso brings what dreamers cannot: the full backing of the Soviet Union and the solidarity of the international communist movement. Our revolution need not stand alone."
 INS_soviet_economic_integration: "Soviet Economic Integration"
 INS_soviet_economic_integration_desc: "The revolution has given us our freedom, but freedom alone does not build factories or feed the masses. The Soviet Union offers what no capitalist power will: industrial expertise, development credits, and trade on terms that do not come with colonial strings attached. We would be fools to refuse."

 # <National Revolution - Reasserting Control>
 INSHOL_revolution_ongoing_tt: "Indonesian Revolution is Ongoing"

 INSHOL_reasserting_control: "Reassert Control over the Indies"
 INSHOL_reasserting_control_desc: "We cannot idly stand and watch as these opportunists attempt to ruin what we have spent centuries building, whilst destroying our infrastructure and radicalizing the youth. We must take action!"
 INSHOL_request_british_support: "Request British Support"
 INSHOL_request_british_support_desc: "[ENG.GetNameDefCap], as a fellow colonial power will likely be sympathetic to our situation, especially since if the revolutionaries succeed, it could set off a domino effect in east asia. We should request their economic and military aid."

 INS_eng_treaty_holside_tt: "§Y[ENG.GetNameDefCap]§! will officially declare themselves on our side of the conflict and provide substantial help. If the war ends in victory, §Y[ENG.GetNameDefCap]§! will be entitled to Borneo."
 INS_eng_treaty_engside_tt: "We will officially align ourselves with §Y[HOL.GetNameDefCap]§! in the East Indies conflict. If §Y[HOL.GetNameDefCap]§! wins, we will be entitled to ownership of Borneo."
 INS_fra_treaty_holside_tt: "§Y[FRA.GetNameDefCap]§! will officially declare themselves on our side of the conflict and provide substantial help. If the war ends in victory, §Y[FRA.GetNameDefCap]§! will be entitled to northeastern Sumatra."
 INS_fra_treaty_fraside_tt: "We will officially align ourselves with §Y[HOL.GetNameDefCap]§! in the East Indies conflict. If §Y[HOL.GetNameDefCap]§! wins, we will be entitled to ownership of northeastern Sumatra."

 INSHOL_franco_dutch_accord: "Franco-Dutch Accord"
 INSHOL_franco_dutch_accord_desc: "Despite our soldiers being better equipped and organized than the Republican militias, their overwhelming numbers have turned the conflict against us. To secure victory we need outside support, more than most would give. France may be willing to intervene if we offer them territory in the Indies to expand their presence in the Pacific."
 INSHOL_london_batavia_accord: "London-Batavia Accord"
 INSHOL_london_batavia_accord_desc: "Despite our soldiers being better equipped and organized than the Republican militias, their overwhelming numbers have turned the conflict against us. To secure victory we need outside support, more than most would give. [ENG.GetNameDefCap] may have an interest due to their presence in Malaya. Perhaps they could be persuaded if we offer something in return?"
 INSHOL_australian_divisions: "Send Australian Infantry to Java"
 INSHOL_australian_divisions_desc: "As per the London-Batavia Accord, Britain is required to send additional divisions to the Indies through Australia once we request it, as Australia’s proximity to the Indies makes them the perfect candidates to host a military base outside of the Indies itself."
 INSHOL_indian_divisions: "British Indian Army Divisions"
 INSHOL_indian_divisions_desc: "While Britain will most likely be unwilling to send their own men to the Indies, convincing them to send Indian divisions is much easier, especially due to their proximity to Batavia."
 INSHOL_undermine_the_militias: "Undermine the Militias"
 INSHOL_undermine_the_militias_desc: "The media is exaggerating the severity of this situation, the militias are just a group of rogue youths trying to reach for something unreachable. We do not need to divert all of our resources to stopping them, we should just hold the line and wait for them to tire."
 INSHOL_flag_will_fly_again: "The Flag Will Fly Once More"
 INSHOL_flag_will_fly_again_desc: "The Dutch flag has flown in the Indies for centuries, there is no world in which we would allow it to be lowered. If keeping our crown jewel colony requires sending in tanks and bomber planes then they will be sent!"
 INSHOL_flag_will_fly_again_tt: "§YOnce the revolution ends, the spirit will be removed and the rule changes will be reverted.§!"

 # <National Revolution - Escalation>
 INSHOL_mass_mobilization: "Mass Mobilization"
 INSHOL_mass_mobilization_desc: "We cannot win this conflict and crush the Republic without a well equipped army. We must rearm the Indies and divert funding from civilian sectors to the KNIL."
 INSHOL_batavia_storm_operation: "Storm Batavia"
 INSHOL_instigate_infighting: "Instigate Infighting in the Republic"
 INSHOL_ultimatum_to_republic: "An Ultimatum to the Republic"
 INSHOL_comite_rijkseenheid: "Comité Rijkseenheid"
 INSHOL_comite_rijkseenheid_desc: "The flag is being lowered in the Indies, and yet people are just watching it happen. We cannot allow this, we must convince the Indies Administration that the Dutch people want the revolution to be stopped!"

 INSHOL_increase_esclation_placeholder: "Rapid Escalation"
 INSHOL_increase_esclation_placeholder_desc: "Our militias have taken control of many vital ports, cities, and industrial centers. We will not continue to wait for the Netherlands to act, we will call for a major military offensive ourselves!"
 INS_take_batavia_explination_tt: "If we successfully occupy all of Java, we will destroy the colonial government from the inside and §Gwin the war§!. However, if we do not manage to do so within §Y730 days§!, we will §Rperish§!."

 INSHOL_linggadjati_agreement: "Negotiation of Ceasefire Agreements"
 INSHOL_linggadjati_agreement_desc: "Invading Java has proven difficult, and our administration is growing unstable. We must fall back and play defensively so as to not risk the fall of the entire Republic. We should negotiate local ceasefires with the Netherlands, allowing us to reorganize our forces before putting our focus back on Java."
 INSHOL_increase_esclation_placeholder_tt: "Unlocks a §YDecision§! to negotiate local ceasefires and §Yincrease the timer§! to occupy Java."

 # <National Revolution - Peace Negotiation>
 INSHOL_seek_foreign_help: "Seek Foreign Help"
 INSHOL_seek_foreign_help_desc: "It is no secret that attempting to win a war against a heavily industrialized colonial power as a newly formed nation without an established economy is a nearly impossible task. We should reach out to other countries that support our cause in order to see if they would be willing to help us."
 INSHOL_renville_agreement: "The Renville Agreement"
 INSHOL_renville_agreement_desc: "The unprecedented aggression taken by the Netherlands has brought international attention to the revolution, and yet the Netherlands has continued to violate ceasefires and bait a reaction out of us. We must try to make a call to [USA.GetNameDef], as if we convince them to stand up for Indonesia, the Netherlands will have no choice but to back down."
 INSHOL_no_compromise: "No Compromise, No Surrender"
 INSHOL_no_compromise_desc: "The Dutch greed that caused them to invest almost exclusively in Java, ignoring the eastern islands, has left Java as the Achilles' heel of the entire colony. This will be their downfall!"
 INSHOL_end_to_bloodshed: "Two State Solution"
 INSHOL_end_to_bloodshed_desc: "This conflict has gone on for far too long, with little progress in either direction, only more lives lost each and every day. Nobody wants this to continue, it is time we discuss with the Dutch leaders at the negotiating table."
 INSHOL_reorganize_colonies: "Reorganize the Colony"

 INS_we_will_need_another_tt: "As we already control all of Java, we will need to control one additional state in addition to Java."

 # Industry Branch - New
 INS_centralize_the_state: "Centralize the State"
 INS_centralize_the_state_desc: "From Sumatra to Sulawesi, from Borneo to Bangka, our development programs have brought roads, factories and institutions to territories that [1058.GetName] once administered in name only. These regions are no longer distant provinces. They are [INS.GetNameDefCap]."
 INS_centralize_the_state_1_tt: "Prerequisite states that are §Ycored§!:"
 INS_centralize_the_state_2_tt: "Prerequisite states that are §Yuncored§!:"
 INS_fate_of_de_javasche_bank: "[INS_fate_of_de_javasche_bank_scripted_name]"
 INS_fate_of_de_javasche_bank_scripted_name_colony: "Fate of De Javasche Bank"
 INS_fate_of_de_javasche_bank_scripted_name_independent: "Fate of Bank Indonesia"
 INS_fate_of_de_javasche_bank_desc: "[INS_fate_of_de_javasche_bank_scripted_desc]"
 INS_fate_of_de_javasche_bank_scripted_desc_colony: "The East Indies Guilder has been in freefall since the depression struck, and De Javasche Bank lacks the tools to arrest the decline. We must decide how to stabilize our currency before what remains of investor confidence evaporates entirely."
 INS_fate_of_de_javasche_bank_scripted_desc_independent: "We inherited a currency in crisis. The old colonial Guilder was already faltering, and the transition to the Rupiah has done nothing to steady the markets. Bank Indonesia needs clear direction from the government, or our young economy will suffer for it."

 INS_finish_the_bauxite_project: "Finish the Bangka Project"
 INS_finish_the_bauxite_project_desc: "With new roads, ports and railways operational across Bangka-Belitung, survey teams report deposits of tungsten and chromium beyond our initial expectations. These islands will yet prove their full worth to the republic."
 INS_australian_contracts: "Australian Contracts"
 INS_australian_contracts_desc: "Our rubber reserves have grown far beyond domestic needs. Australia, ever hungry for raw materials to feed its own industries, presents a natural trading partner. Securing long-term contracts with Australian firms would bring steady revenue and strengthen our position in the regional economy."
 INS_coopereate_with_chinese_businessmen: "Cooperate With the Chinese Businessmen"
 INS_coopereate_with_chinese_businessmen_desc: "A wealthy and well-connected merchant class has long facilitated trade across the archipelago. Rather than sideline these established networks, we should work with them. Their capital and commercial expertise could prove invaluable in pulling our economy out of its current malaise."

 INS_oil_decisions_unlock_tt: "Unlocks new §Y$INS_realign_supply_chains_cat$§! decisions to sell §YOil§!."
 INS_negotiate_new_contracts_unlock_tt: "Unlocks new §Y$INS_realign_supply_chains_cat$§! decisions."
 INS_realign_supply_chains_explain_tt: "Unlocks §Y$INS_realign_supply_chains_cat$§! Decisions to sell resources to private companies on a 2-year lease."

 INS_negotiate_new_contracts: "Negotiate New Contracts"
 INS_negotiate_new_contracts_desc: "Our growing reputation as a reliable supplier has opened doors that were previously closed to us. New buyers are circling, and we should move quickly to lock them into long-term agreements before our competitors can undercut us."
 INS_all_in_on_rubber: "All in on Rubber"
 INS_all_in_on_rubber_desc: "Rubber is our strongest hand, and we intend to play it. Every available acre of plantation land will be turned over to rubber cultivation, and our export apparatus reorganized to move it faster and cheaper than anyone else in the region."
 INS_more_market_resources: "Outsell the Great Depression"
 INS_more_market_resources_desc: "The world may be mired in economic crisis, but crisis breeds opportunity for those bold enough to seize it. By flooding the market with our commodities at prices no competitor can match, we will ensure that when the world recovers, Indonesian goods are already on every shelf and in every warehouse."

 # <Industry Branch - Trade Policy>
 INS_recovering_from_the_great_depression: "Recovering From The Great Depression"
 INS_recovering_from_the_great_depression_desc: "The Great Depression has had a devastating effect on [INS.GetNameDef]. With our economy being primarily export-based, protectionism around the world has crippled us. As global trade looks poised to open up again, we must seek out new markets, and work to re-establish our old trade routes."
 INS_first_come_first_serve: "First Come, First Serve"
 INS_first_come_first_serve_desc: "While the protectionism of the Great Depression is slowing down, increased production and an overvalued guilder has left the Dutch export market in tatters, as our old trading partners in the west have turned to South America to meet their demand. Rather than chasing them down for new trade agreements, we could use this as an opportunity to expand into new markets in Asia."
 INS_oil_export: "Increased Oil Export"
 INS_oil_export_desc: "We will improve the oil infrastructure in Sumatra and Kalimantan in order to secure trade deals with our new trading partners."
 INS_increased_trade_with_japan: "Increased Trade With Japan"
 INS_increased_trade_with_japan_desc: "[JAP.GetNameDefCap] has been an increasingly valuable trading partner and has not let us down. We should negotiate new trade agreements to further the economic cooperation between our two nations, and help us shake off the vestiges of the Great Depression. This may upset our allies in the West, especially the Netherlands. However, if we ever want a say in our own destiny, we will need to secure our own trade links."
 INS_asian_trade_investments: "Asian Trade Investments"
 INS_asian_trade_investments_desc: "The devastation of the Great Depression showed us how overreliant we’ve been on our long-term trade partners in the west. With our economy primarily being export-based, it is crucial now more than ever that we develop and expand new markets in Southeast Asia to ensure our economy will not depend on any individual country."
 INS_asian_trade_investments_tt: "Every §Y420§! days, the resources to market penalty from §YThe Great Depression§! will §GImprove§! by §Y5%§! until the negative modifiers are gone."
 INS_declare_free_trade: "Declare Free Trade"
 INS_declare_free_trade_desc: "We should not align ourselves exclusively to one country, we will allow the market to naturally make the best decisions for [INS.GetNameDef]."
 INS_japanese_export_contracts: "One Trade Contract To Rule Them All"
 INS_japanese_export_contracts_desc: "We will negotiate a major trade agreement with [JAP.GetNameDef], selling all the rubber in [1049.GetName] and [672.GetName]. While we will sell it at a very low cost, we will be guaranteed it all gets sold."
 INS_realign_supply_chains: "Realign Supply Chains"
 INS_realign_supply_chains_desc: "While the protectionism of the Great Depression is slowing down, increased production and an overvalued guilder has left the Dutch export market in tatters, as our old trading partners in the west have turned to South America to meet their demand. We must take steps to convince our allies to start trading with us again."
 INS_invite_foreign_companies: "Support American Oil Ventures"
 INS_invite_foreign_companies_desc: "Since 1930, Standard Oil California has been operating in our country through their Dutch subsidiary, Nederlandsche Pacific Petroleum Maatschappij. Their surveys in Riouw show promise, we should support their upstream operations in any way we can - a big discovery would both boost our revenue and encourage other international companies to pursue investments in our country."
 INS_expand_sea_routes: "Expand Sea Routes"
 INS_expand_sea_routes_desc: "Our country is rich in natural resources, but our extraction industry is too specialized and we lack the infrastructure necessary to extract certain rare minerals such as chromium and tungsten. If we want to improve our military production capabilities, we will need to import them from elsewhere. To take full advantage of our growing trade network, we will need to increase the capacity of our merchant fleet."
 INS_ship_contracts: "Secure Ship Contracts"
 INS_ship_contracts_desc: "Constructing a navy is necessary in order to maintain our trade routes in the event of war. We can utilize our newfound trade relationships to obtain naval contracts."

 # <Industry Branch - Sumatra>
 INS_developing_sumatra: "Developing Sumatra"
 INS_developing_sumatra_desc: "Sumatra is the most resource-rich island in the archipelago, yet the infrastructure is so poor that a great proportion of extracted resources never even make it back to Batavia. Transportation relies on a patchwork of dirt roads and unconnected railway lines, wholly insufficient to support our plans for the island. We can’t let this continue."
 INS_sumatra_railway: "The Sumatra Railway"
 INS_sumatra_railway_desc: "As part of our ongoing efforts to develop Sumatra’s infrastructure, we should construct a large railway stretching from northern Atjeh to the southernmost port in Sumatra, which connects to Batavia by ship very quickly. This way, resources will only have to be transported to the nearest train station, at which point we can move it to Batavia in a matter of days."
 INS_develop_borneo: "Develop Kalimantan"
 INS_develop_borneo_desc: "Kalimantan has the potential for great wealth, yet the island is very sparsely developed, and its people are plagued by poverty. Transport of freight is heavily reliant on the many rivers and waterways of the island, and any long-range communications are hindered by a lack of electricity. By building powerlines and roads, we can pave the way for future surveying and resource extraction."
 INS_kalimantan_mic: "Kalimantan Military Industry"
 INS_kalimantan_mic_desc: "Our infrastructure development efforts in Kalimantan have paid off. The spread of electricity and communications has brought us into contact with communities that used to be far beyond the government’s call. We can use this opportunity to meet our needs for increased military production, by building new factories in the region and manning them with this newfound pool of labor."
 INS_pontianak_to_balikpapan: "From Pontianak to Tanjung Selor"
 INS_pontianak_to_balikpapan_desc: "The idea of building a railway in Kalimantan has been discussed at length, but the harsh, largely unexplored terrain in the center of the island makes it a difficult task. The only solution is a U-shaped railway from coast to coast. It will not be cheap, but in the long run it will pay for itself."
 INS_develop_sulawesi: "Develop Sulawesi"
 INS_develop_sulawesi_desc: "Sulawesi is the center of the archipelago, and therefore an important strategic location. We should build roads, powerlines, and communications to ensure it can be used as a military hub in the event of war."

 # <Industry Branch - Bangka Project>
 INS_the_bangka_project: "The Bangka Project"
 INS_the_bangka_project_desc: "The Bangka-Belitung islands, while small, are a cornerstone of the Indonesian economy due to the islands’ bauxite deposits. We need to build roads, ports and railways on Bangka-Belitung, to ensure that we can reap the full rewards of the islands’ rich mineral wealth."
 INS_aluminium_factory: "Pangkalpinang Aluminium Factory"
 INS_aluminium_factory_desc: "Our raw bauxite extraction is growing, but our lack of domestic aluminum production is limiting our profits. As the provincial capital of the Bangkal-Belitung islands, Pangkalpinang would be an ideal location to establish our own factories. Doing so would allow us to cut out the middlemen and maximize our returns."
 INS_bauxite_export: "Double Down on Bauxite Export"
 INS_bauxite_export_desc: "The completion of the Bangka project has left us with more raw bauxite than we know what to do with. While attempting to sell it all would be difficult, we could offer a significantly reduced price for the bauxite than anyone else on the market, ensuring every gram gets sold. Due to the sheer quantity of bauxite we can sell, this would still yield a proportional growth in profit compared to our current exports."
 INS_tin_mining: "Investments in Tin Mining"
 INS_tin_mining_desc: "The history of tin mining in the Bangka-Belitung islands predates European presence in the archipelago. So it’s no wonder then, that the tin industry on the islands is overdue for some modernization. Overhauling the production capabilities is an expensive endeavour, and our existing tin industry will not be operational for some time as we rebuild it. However, there is significant potential for long-term profit."
 in_240_days_tt: "§YIn 240 days:§!\n"
 INS_tin_to_usa: "Sell Tin to [USA.GetNameDef]"
 INS_tin_to_usa_desc: "[USA.GetNameDefCap] is full of corporations and government institutions purchasing tin. Now that we have a proper mining operation, we have an opportunity to make a lot of profit here."
 INS_tin_to_japan: "Sell Tin to [JAP.GetNameDef]"
 INS_tin_to_japan_desc: "[JAP.GetNameDefCap] has many ships now considered outdated and replaceable, despite being a perfect fit for the [INS.GetAdjective] navy. We should purchase these ships with the money from our tin production."
 INS_tin_to_japan_tt: "[JAP.GetNameDefCap] will send §Y9§! older destroyers to us."
 INS_new_bauxite_routes: "New Bauxite Routes"
 INS_new_bauxite_routes_desc: "Our strategy of undercutting the market to increase our export volume of bauxite has worked out successfully, and we’ve increased our total income substantially. We mustn’t stop here, however. We should continue to expand our trade networks, optimize our supply chains, and look for any other opportunities to maximize our returns."
 INS_bangka_bauxite_export_flag: "Has completed focus §Y$INS_bauxite_export$§!:"
 INS_not_industry: "Plan for the Future"
 INS_not_industry_desc: "Java is the beating heart of our nation, home to the bulk of our population and the seat of our government. Before we can industrialize the island in earnest, we must first prepare the ground. Land surveys, zoning allocations and site clearances will ensure that when the factories come, they are built where they will do the most good."
 INS_construction_focus: "Industry Boom"
 INS_construction_focus_desc: "Foreign capital is flowing in, export revenues are climbing, and for the first time in years there is real money to invest in domestic industry. We must seize the moment and build while conditions favor us."

 # <Industry Branch - Java>
 INS_developing_java: "Expand Javanese Infrastructure"
 INS_developing_java_desc: "Java is by far the most industrialized island in the archipelago, and the source of a majority of our wealth. However, certain cities such as Batavia are becoming increasingly crowded due to population growth. We should expand these cities with new homes, commercial areas, trams, trains, and factories in order to support the growing population."
 INS_prioritize_sugar_economy: "Prioritize the Sugar Economy"
 INS_prioritize_sugar_economy_desc: "We should decrease our government budget for Batavian industrial development; It is already far more industrialized than any other city in the archipelago. Instead, we should use this money to establish many small palm plantations across the country. These plantations will produce palm sugar, which is a commodity with high international demand."
 INS_all_cards_into_industry: "All Cards in Industry"
 INS_all_cards_into_industry_desc: "Industrialization has had a massive impact on [1058.GetName]'s economy. If we industrialize the entire island, with its tens of millions of citizens, we could become influential on the global scale."
 INS_expand_batavia_technical_institute: "Expand the Batavia Institute of Technology"
 INS_expand_batavia_technical_institute_desc: "Expanding the Batavia Institute of Technology will allow a greater number of students to become educated and increase the rate of our technological development."
 INS_quinine_export: "More Lucrative Quinine Agreement"
 INS_quinine_export_desc: "The Cinchona Bureau in Amsterdam nearly has a monopoly on quinine exports, which is especially profitable as quinine is in high demand worldwide as malaria treatment. The Bureau sources a majority of its quinine from the East Indies. Despite this, we receive a very small portion of the profits. We should use our quinine production as leverage to negotiate a fairer agreement."
 INS_spend_profits_on_rural: "Spend Profits on Rural Development"
 INS_spend_profits_on_rural_desc: "With our new quinine agreement finalized, we find ourselves with an opportunity to use our additional income to develop the transportation and communications infrastructure in rural areas, paving the way for future industrial development."
 INS_spend_profits_on_urban: "Spend Profits on Urban Development"
 INS_spend_profits_on_urban_desc: "With our new quinine agreement finalized, we find ourselves with an opportunity to use our additional income to expand the Batavian manufacturing industry, which will diversify our economy and decrease our reliance on exporting raw materials."
 INS_spend_profits_on_military: "Spend Profits on Military Development"
 INS_spend_profits_on_military_desc: "With our new quinine agreement finalized, we find ourselves with an opportunity to improve our military significantly by spending our additional income on building and maintaining new weapon factories in Yogyakarta and Semarang."

 INS_end_to_bloodshed_tt: "The war will end, with new borders drawn based on current occupation. Java, Sumatra, and Borneo will be §Yannexed§! by the side that currently has the most control in the area."
 HOL_british_light_support: "[ENG.GetNameDefCap] has agreed to help in the revolution"

