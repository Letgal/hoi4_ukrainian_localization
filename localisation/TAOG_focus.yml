 idea_SIA_weather_broadcasts: "Прогнози погоди"
 idea_SIA_weather_broadcasts_desc: "Регулярні прогнози погоди дають нашим повітряним та військово-морським силам чіткішу картину умов, підвищуючи їхню ефективність і зменшуючи ризики дій у погану погоду."
 idea_SIA_seri_thai_contacts: "Контакти Сері Тай"
 idea_SIA_seri_thai_contacts_desc: "Контакти з мережею опору Сері Тай доводять свою цінність, залучаючи досвідчених бійців та зміцнюючи зв'язки з Союзниками."
