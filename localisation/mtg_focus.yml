### СПОЛУЧЕНЕ КОРОЛІВСТВО ###
 ENG_parachute_regiments: "Повітряно-десантний навчальний центр"
 ENG_parachute_regiments_desc: "Після успіху перших повітряно-десантних операцій на ворожій території стало зрозуміло, що за парашутно-десантними полками — майбутнє. Створення спеціальних тренувальних центрів та обладнання допоможе нам впровадити ці нові технології в нашу загальну стратегію." # (@)
 ENG_special_air_service: "Спеціальна повітряна служба"
 ENG_special_air_service_desc: "Офіцер на ім'я Дейвід Стірлінґ прийшов до думки, що невеликий підрозділ командос може дошкуляти ворогу в його тилу, завдаючи йому величезної шкоди. Називаючи їх «Повітряною службою», ми отримуємо додаткову перевагу, змушуючи ворога повірити в те, що він також мусить захищатися від десантників. Ця ідея може мати певні переваги." # (@)
 ENG_chiefs_of_staff_committee: "Комітет начальників штабів"
 ENG_chiefs_of_staff_committee_desc: "Ми мусимо дати можливість керівникам різних родів військ вести цю війну так, як вони вважають за потрібне. Об'єднаний комітет начальників штабів, сформований ще в 1923 році, тепер отримає можливість координувати операції по всьому світу, підпорядковуючись безпосередньо Військовому кабінету. Це значно спростить планування військових операцій." # (@)
 ENG_revisit_colonial_policy: "Переоглянути колоніальну політику"
 ENG_revisit_colonial_policy_desc: "Часи змінюються. Очевидно, що рухи за незалежність будуть продовжувати виникати по всій імперії, причому в дедалі сильніших формах. Якщо ми не хочемо, щоб нас змушували витрачати дедалі більше ресурсів на придушення цих рухів, ми мусимо визнати, що наша імперія вичерпала себе, і тепер ми мусимо дозволити їй знайти свій власний шлях у світі." # (@)
 ENG_guide_the_colonies: "Спрямувати колонії"
 ENG_guide_the_colonies_desc: "Робити перші кроки до повної незалежності після довгих періодів під нашим контролем нелегко. Наші домініони потребують нашої допомоги в реструктуризації їхніх урядів, щоб вони могли функціонувати так само добре, як зараз, під нашим керівництвом, коли стануть повністю незалежними." # (@)
 ENG_towards_dominion_independence: "Шлях до незалежності домініонів"
 ENG_towards_dominion_independence_desc: "Після реструктуризації урядів домініонів ми мусимо допомогти нашим домініонам зробити останні кроки до розриву їхніх офіційних зв'язків із Вестмінстером. Цілком ймовірно, що ми побачимо період масової міграції, оскільки ті, хто воліє залишатися частиною держави [Root.GetNameDef], будуть іммігрувати." # W # (@)
 ENG_foundations_for_an_indian_state: "Підвалини індійської держави"
 ENG_foundations_for_an_indian_state_desc: "Якщо вона хоче функціонувати як незалежна держава, ми мусимо подбати про підвищення рівня індустріалізації Індії, а також про радикальну реструктуризацію її уряду. Виклики управління цілим субконтинентом, як ми з'ясували, не є простими, і Індія мусить бути готова до них, якщо хоче досягти успіху." # (@)
 ENG_the_three_nation_solution: "Тридержавне рішення"
 ENG_the_three_nation_solution_desc: "Культурні та релігійні відмінності на Індійському субконтиненті надзвичайно великі. Вже зараз існують антагонізми між різними угрупуваннями з різною лояльністю. Замість об'єднувати їх усіх в одну державу, мабуть, кращим рішенням було б розділити субконтинент на три держави. Індуїстська Індія, мусульманський Пакистан на північному заході і мусульманська Банґладеш на північному сході." # (@)
 ENG_towards_indian_independence: "Шлях до незалежності Індії"
 ENG_towards_indian_independence_desc: "Настав час вивести Індію на шлях до незалежності. Ми почнемо поступово передавати державні завдання, збільшуючи їхню автономію, готуючись до повної незалежності." # (@)
 ENG_withdraw_from_contested_territories: "Вийти зі спірних територій"
 ENG_withdraw_from_contested_territories_desc: "На низку територій по всьому світу, які вважаються частиною Британських заморських територій, претендують сусідні держави. Це спричиняє дипломатичну напруженість, тому, можливо, варто переглянути їхній статус як таких, що перебувають під юрисдикцією Сполученого Королівства." # (@)
 ENG_self_government_for_the_mediterranean: "Самоврядування в Середземномор'ї"
 ENG_self_government_for_the_mediterranean_desc: "Країни Середземномор'я готові отримати широку автономію в рамках підготовки до повної незалежності. Це, ймовірно, призведе до припливу іммігрантів, які бажають отримати британське громадянство до того, як незалежність буде офіційно оформлена." # (@)
 ENG_self_government_for_africa: "Самоврядування в Африці"
 ENG_self_government_for_africa_desc: "Країни Африки готові отримати широку автономію в рамках підготовки до повної незалежності. Це, ймовірно, призведе до припливу іммігрантів, які бажають отримати британське громадянство до того, як незалежність буде офіційно оформлена." # (@)
 ENG_self_government_for_the_middle_east: "Самоврядування на Близькому Сході"
 ENG_self_government_for_the_middle_east_desc: "Країни Близького Сходу готові отримати широку автономію в рамках підготовки до повної незалежності. Це, ймовірно, призведе до припливу іммігрантів, які бажають отримати британське громадянство до того, як незалежність буде офіційно оформлена." # (@)
 ENG_self_government_for_the_americas: "Самоврядування в Америці"
 ENG_self_government_for_the_americas_desc: "Країни Америки готові отримати широку автономію в рамках підготовки до повної незалежності. Це, ймовірно, призведе до припливу іммігрантів, які бажають отримати британське громадянство до того, як незалежність буде офіційно оформлена." # (@)
 ENG_self_government_for_asia: "Самоврядування в Азії"
 ENG_self_government_for_asia_desc: "Країни Азії готові отримати широку автономію в рамках підготовки до повної незалежності. Це, ймовірно, призведе до припливу іммігрантів, які бажають отримати британське громадянство до того, як незалежність буде офіційно оформлена." # (@)
 ENG_decolonization: "Деколонізація"
 ENG_decolonization_desc: "Це кінець епохи, але кінець за нашою настановою. Замість страждати від приниження, марно борючися проти нестримного зростання рухів за незалежність, ми високо підняли голови та з гордістю вели тих, хто перебував під нашим захистом, як могли. Тепер залишилося лише розірвати решту зв'язків і привітати наших колишніх підданих на світовій арені як рівних." # (@)
 ENG_decolonized: "Британія провела деколонізацію"
 ENG_steady_as_she_goes: "Steady as she goes"
 ENG_steady_as_she_goes_desc: "Наростаюча криза — це саме та причина, чому ми мусимо залишатися вірними своєму корінню. Ми продовжимо курс, яким пливли останніми роками, а не робитимемо різких політичних змін, які можуть спричинити внутрішню нестабільність, коли ми найменше можемо собі це дозволити." # (@)
 ENG_global_defense: "Глобальна оборона"
 ENG_global_defense_desc: "Захист британського народу починається із запобігання поширенню того, що власне загрожує йому. Ми мусимо знайти вуглинки конфлікту і загасити їх, перш ніж вони перетворяться на пожежу, яка пошириться далеко і широко, спалюючи нас у наших домівках." # (@)
 ENG_every_man_will_do_his_duty: "Кожен мусить виконувати свій обов'язок"
 ENG_every_man_will_do_his_duty_desc: "У дусі відомих слів Нелсона ми мусимо прищепити людям почуття обов'язку. Подобається їм це чи ні, але нація потребує їхнього служіння перед обличчям кризи, що насувається." # (@)
 ENG_motion_of_no_confidence: "Вотум недовіри"
 ENG_motion_of_no_confidence_desc: "Нинішній уряд зазнав невдачі у своїх спробах розрядити світову кризу, що насувається. Будь-які подальші спроби зробити це зараз — лише ознаки слабкості. Ми потребуємо сильнішого лідерства, щоб пережити прийдешній шторм." # (@)
 ENG_no_further_appeasement: "Кінець політики умиротворення"
 ENG_no_further_appeasement_desc: "Умиротворення провалилося, і продовжувати цю політику зараз — нерозумно. Зрозуміло, що наші вороги не відступлять і вимагатимуть дедалі більше. Ми мусимо зупинити їх зараз, поки не дали їм ще більше переваг." # (@)
 ENG_no_further_appeasement_tt: "$EFFECT_SET_RULE$£trigger_yes£Може виправдовувати ціль війни проти та оголошувати війну однаковій ідеологічній групі.\n$EFFECT_SET_RULE$£trigger_yes£$CAN_PUPPET$.\n"
 ENG_kickstart_the_war_industry: "Запустити військову промисловість"
 ENG_kickstart_the_war_industry_desc: "Час не стоїть на місці, і ми не можемо чекати на природне зростання нашої військової промисловості. Ми мусимо зробити великі інвестиції для швидкого будівництва додаткових заводів, якщо хочемо бути готовими до війни." # (@)
 ENG_secure_the_oil_imports: "Убезпечити імпорт нафти"
 ENG_secure_the_oil_imports_desc: "Ми не можемо покладатися на мінливий характер торговельних угод з іноземними урядами щодо імпорту нафти. Краще вибороти контроль над нафтовими родовищами, щоб ми могли зберігати повний контроль над ними незалежно від політичного керівництва в інших країнах." # (@)
 ENG_maintaining_imperial_integrity: "Збереження цілісності імперії"
 ENG_maintaining_imperial_integrity_desc: "Захист нашої імперії починається з оволодіння морями і лояльності наших домініонів. Ми мусимо попередити інші морські держави, щоб вони не загрожували нашій морській перевазі, і в той же час ми мусимо здійснювати все більший контроль над нашими підданими, щоб ми були сильними в усьому світі." # (@)
 ENG_enforce_the_naval_treaties: "Примусити дотримання морських угод"
 ENG_enforce_the_naval_treaties_desc: "Нам стало відомо, що певні держави вирішили проігнорувати положення Вашинґтонського морського договору. З цим не можна миритися. Якщо ми хочемо зберегти перевагу і не допустити, щоб у інших виникла така ж ідея, ми мусимо завдати швидкого удару і показати приклад тим, хто нехтує нашою волею." # (@)
 ENG_enforce_the_naval_treaties_tt: "Цим можна скористатися, щоби вимогти від країн, які мають забагато §Yосновних кораблів§! порівняно з ними, §Gзменшити§! їхню кількість. У випадку відхилення ми отримаємо ціль війни §YМаріонетка§!.\n"
 ENG_maintaining_the_balance_of_power: "Збереження балансу сил"
 ENG_maintaining_the_balance_of_power_desc: "Сила імперії полягає у слабкості та паралічі Європи. Якщо ми хочемо зосередитися на глобальних питаннях, ми мусимо переконатися, що Європа занадто зайнята своїми справами, щоб дивитися на наші. Ми залишатимемося осторонь європейських справ, за винятком дій проти будь-яких експансіоністських режимів, які можуть загрожувати цьому крихкому балансу сил, якого ми прагнемо." # (@)
 ENG_continental_intervention: "Континентальна інтервенція"
 ENG_continental_intervention_desc: "Очевидно, що ми не зможемо зберегти баланс сил на європейському континенті, якщо не будемо діяти. Ми мусимо розгромити експансіоністські режими, які з'явилися останнім часом, гарантуючи, що ми ніколи не зіткнемося з загрозою об'єднаної Європи, здатної підготувати вторгнення на Британські острови, не відволікаючись на сторонні справи." # (@)
 ENG_continental_intervention_tt: "Отримає цілі війни проти великих держав Європи, які створили понад §R10%§! §Yсвітової напруженості§!:\n"
 ENG_prepare_for_the_inevitable: "Підготуватися до неминучого"
 ENG_prepare_for_the_inevitable_desc: "Здається, майже напевно, що наша країна буде втягнута в черговий світовий конфлікт. Ми мусимо збільшити наші промислові витрати, щоб прискорити темпи нашого переозброєння." # (@)
 ENG_mi6_ns: "MI6"
 ENG_a_change_in_course: "Зміна курсу"
 ENG_a_change_in_course_desc: "На тлі зростання напруженості у світі стає очевидним, що наше нинішнє політичне керівництво не здатне захистити інтереси нації. Настав час для радикального відходу від політики останніх десятиліть." # (@)
 ENG_the_kings_party: "Партія короля"
 ENG_the_kings_party_desc: "Тепер, коли криза минула і уряд впав, найпалкіші прихильники короля можуть сформувати свій власний уряд, набагато більш... прихильний до бажань короля. Ця Королівська партія складатиметься з Дейвіда Ллойда Джорджа, Вінстона Черчилла й Освалда Мослі, таким чином охоплюючи всі політичні партії та допомагаючи відновити єдність нашої нації." # (@)
 edward_viii_married_wallis_simpson: "Едуард VIII одружився на Уолліс Сімпсон" # W
 ENG_reassess_continental_commitments: "Переоглянути зобов'язання на континенті"
 ENG_reassess_continental_commitments_desc: "Хоча наша нещодавня політична позиція щодо Європи полягала у підтримці наших союзників у Великій війні, протистоянні відродженню держав [GER.GetName] і насуванню держави [SOV.GetName], політичні розбіжності між нами та нашими старими союзниками стали більш помітними. Можливо, настав час переглянути, кому ми віддані." # (@)
 ENG_isolate_the_mediterranean_threat: "Ізолювати середземноморську загрозу"
 ENG_isolate_the_mediterranean_threat_desc: "[ITA.GetAdjectiveCap]ий флот загрожує нашому судноплавству через Середземне море. Ми мусимо розпочати кампанію з їх дипломатичної ізоляції, щоб стримати загрозу." # (@)
 ENG_alliance_with_germany: "Альянс із Німеччиною"
 ENG_alliance_with_germany_desc: "Наші інтереси збігаються з інтересами німців — якщо вони прагнуть гегемонії на європейському континенті, то ми прагнемо Європу, яка не загрожуватиме Британським островам, допоки ми дбаємо про нашу глобальну імперію. Можливо, союз, як того бажає король, був би не такою вже й дивною співпрацею." # (@)
 ENG_alliance_with_germany_tt: "Половина поточної підтримки §Yдемократії§! буде застосована як штраф до §Rстабільності§!:\n"
 ENG_noninterference_treaty_with_germany: "Договір про невтручання з Німеччиною"
 ENG_noninterference_treaty_with_germany_desc: "Наші імперські амбіції ґрунтуються на тому, щоби не турбуватися про Європу. Можливо, цього легко досягти, якщо [GER.GetNameDef] отримає карт-бланш в Європі в обмін на продовження мирних відносин та їхню обіцянку не втручатися у справи, що стосуються Британської імперії." # (@)
 ENG_take_out_the_regia_marina: "Знищити Regia Marina"
 ENG_take_out_the_regia_marina_desc: "Настав час подбати про загрозу в Середземному морі. Ми убезпечимо судноплавні шляхи, що проходять через життєво важливий для нашої імперії Суецький канал, ліквідувавши флот, який його перекриває." # (@)
 ENG_organize_the_blackshirts: "Зорганізувати чорносорочників"
 ENG_organize_the_blackshirts_map_category_name: "Оберіть, де зорганізувати марші чорносорочників."
 ENG_organize_the_blackshirts_desc: "Успіх Британського союзу фашистів залежить від його публічного іміджу. Ми можемо продемонструвати дух єдності та особисту силу нашого руху, проводячи марші на військову тематику по всій країні. Ми залучимо більше прихильників, одночасно примусивши опозицію до бездіяльності. Кінцевою метою буде марш на саму Даунинґ-стріт із закликом до зміни керівництва." # (@)
 ENG_organize_the_blackshirts_tt: "Відкриває доступ до рішень §Y$ENG_organize_the_blackshirts$§!.\n"
 ENG_the_british_path_to_fascism: "Британський шлях до фашизму"
 ENG_the_british_path_to_fascism_desc: "Наш шлях до фашизму буде власним, і ми не станемо на коліно перед тими на континенті, хто вважає себе нашими ідеологічними зверхниками. Люди пам'ятають минулу війну, і будь-яка співпраця з режимом, що існує в державі [GER.GetName], обов'язково накличе на себе їхній гнів." # (@)
 ENG_secure_the_italian_alliance: "Затвердити альянс із Італією"
 ENG_secure_the_italian_alliance_desc: "Муссоліні має набагато більш прийнятний підхід до фашизму, і Мослі вже давно захоплюється ним. Цілком природно, що наші дві країни мусять налагодити більш тісні відносини, взаємовигідні для обох наших народів." # (@)
 ENG_gibraltar_for_spanish_support: "Ґібралтар в обмін на іспанську підтримку"
 ENG_gibraltar_for_spanish_support_desc: "Хоча Ґібралтар здавна вважається невід'ємною частиною нашої нації, можливо, варто домовитися про повернення Ґібралтару до рук Іспанії в обмін на підтримку Франко нашої справи." # (@)
 ENG_pre_empt_spanish_alignment: "Завадити зближенню Іспанії з Німеччиною"
 ENG_pre_empt_spanish_alignment_desc: "Існує ризик, що іспанці стануть на бік німців, якщо ми зробимо якісь наступальні дії по відношенню до останніх. Цього не можна допустити — ми мусимо розквитатися з цією можливою загрозою, перш ніж перейдемо до власне держави [GER.GetName]." # (@)
 ENG_prevent_a_continental_hegemony: "Завадити створенню континентальної гегемонії"
 ENG_prevent_a_continental_hegemony_desc: "Зрозуміло, що [GER.GetNameDef] має плани на весь європейський континент. Цього не можна допустити. Разом з нашими союзниками ми мусимо зупинити німців, поки вони не стали надто нездоланним викликом." # (@)
 ENG_enact_the_mosley_manifesto: "Увести в дію маніфест Мослі"
 ENG_enact_the_mosley_manifesto_desc: "У попередні роки Мослі підготував маніфест радикальних економічних реформ для подолання бідності. Настав час втілити пропозиції нашого лідера в життя." # (@)
 ENG_god_save_the_king: "God save the King"
 ENG_god_save_the_king_desc: "Понад усе стоїть наш обов'язок перед королем і Короною. Будучи символом опору та надії для народу, а також єдності Імперії для наших підданих і ворогів, короля треба звеличувати всередині та боятися зовні. Так ми й зробимо." # (@)
 ENG_ceylon_forward_operating_base: "База передового розгортання на Цейлоні"
 ENG_ceylon_forward_operating_base_desc: "Готуючися до масованого вторгнення, яке знадобиться для повернення контролю корони над Індією, ми мусимо значно розширити об'єкти на острові Цейлон." # (@)
 ENG_reclaim_the_jewel_in_the_crown: "Повернути перлину британської корони"
 ENG_reclaim_the_jewel_in_the_crown_desc: "Короткий період незалежності Індії має завершитися. Наші війська на позиціях, готові повернути перлину британської корони." # (@)
 ENG_reclaim_burma: "Повернути Бірму"
 ENG_reclaim_burma_desc: "Короткий період незалежності держави [BRM.GetName] мусить тепер закінчитися. Наші війська зайняли позиції, готові повернути країну її законному володарю." # (@)
 ENG_pre_empt_the_ideological_threat: "Випереджальний удар по ідеологічній загрозі"
 ENG_pre_empt_the_ideological_threat_desc: "Імперію зсередини атакують ті, хто думає інакше. Ми знаємо, що ця «п'ята колона» отримує накази з Москви, і тому ми можемо змусити їх замовкнути, вдаривши по джерелу цього зла." # (@)
 ENG_expose_the_belly_of_the_bear: "Оголити ведмеже черево"
 ENG_expose_the_belly_of_the_bear_desc: "Битися з Радянським Союзом без узбережних плацдармів — це неймовірний виклик. Ми виможемо прохід крізь держави [PER.GetName] та [AFG.GetName] і вдаримо по Радянському Союзі там, де вони найменше очікують: суходолом та в їхнє оголене черево." # (@)
 ENG_imperial_conscription: "Імперський призов"
 ENG_imperial_conscription_desc: "Ми довго нехтували багатством людських ресурсів, які надає наша імперія. Настав час кардинально покращити призов на військову службу по всій імперії та забезпечити достатню кількість людей для ведення війни. Всі мусять виконати свій обов'язок перед короною!" # (@)
 ENG_consolidate_the_british_isles: "Укріпити Британські острови"
 ENG_consolidate_the_british_isles_desc: "Ірландці продовжують обстоювати свої безглузді уявлення про незалежність, і нашій терпимості настав кінець. Настав час придушити їхній опір і повернути всю країну в лоно Сполученого Королівства як невід'ємну частину." # (@)
 ENG_unite_the_anglosphere: "Об'єднати англосферу"
 ENG_unite_the_anglosphere_desc: "Спадщина нашої золотої доби — це присутність наших культури та мови по всьому світі. Замість терпіти приниження та невдячність від того, що ці території залишаються незалежними, ми мусимо знову об'єднати їх під нашою владою." # (@)
 ENG_appeal_to_imperial_loyalists: "Звернутися до імперських лоялістів"
 ENG_appeal_to_imperial_loyalists_desc: "Незважаючи на номінальну незалежність домініонів, серед їхніх громадян все ще є багато лояльних до Корони. Якщо ми зможемо достукатися до них, ми зможемо підірвати уряди домініонів до вторгнення, яке буде необхідним для відновлення контролю над ними." # (@)
 ENG_appeal_to_imperial_loyalists_tt: "Відкриває доступ до рішень §Y$ENG_appeal_to_imperial_loyalists$§!, які дозволяють улаштувати пробританські громадянські війни в колишніх домініонах.\n"
 ENG_bring_the_dominions_back_into_the_fold: "Повернути домініони в лоно імперії"
 ENG_bring_the_dominions_back_into_the_fold_desc: "Дошка розставлена, фігури на своїх місцях. Настав час привести наш план у дію і «виправити» поняття незалежності, присутнє в головах лідерів домініонів." # (@)
 ENG_bring_the_dominions_back_into_the_fold_tt: "Відкриває доступ до рішень: §YAlly the Imperialist Uprising§!.\n"
 ENG_the_sun_never_sets: "Сонце ніколи не заходить"
 ENG_the_sun_never_sets_desc: "Імперія настільки велика, що над нею ніколи не заходить сонце. Її сила — це Королівські ВМС, які захищають торговельні шляхи та шляхи постачання, що сполучають її і є життєво важливими для нашого процвітання. Цей флот мусить навчитися долати ці величезні відстані з належною швидкістю, щоб ми могли швидко реагувати на будь-яку загрозу, де б вона не виникла." # (@)
 ENG_the_sun_never_sets_tt: "Ці бонуси будуть застосовані до всіх новодосліджених типів кораблів.\n"
 ENG_pre_empt_the_strategic_threat: "Випереджальний удар по стратегічній загрозі"
 ENG_pre_empt_the_strategic_threat_desc: "Імперія оточена ззовні тими, хто прагне наших багатств у ресурсах. Ми знаємо, хто і чому, а тому ніщо не заважає нам дати їм відсіч, перш ніж вони накинуться на нас у момент нашої невдалої слабкості." # (@)
 ENG_concessions_to_the_trade_unions: "Поступки профспілкам"
 ENG_concessions_to_the_trade_unions_desc: "Наші зусилля з переозброєння постійно затьмарюються конфліктами з профспілками. Ми могли б здійснити набагато більш плавний перехід, якби вирішили співпрацювати з ними, а не продовжувати боротьбу проти них." # (@)
 ENG_concessions_to_the_trade_unions_tt: "Відкриває доступ до рішень §Y$ENG_concessions_to_the_trade_unions$§!, які необхідно виконати для переходу на комунізм.\n"
 ENG_concessions_to_the_trade_unions_tt_2: "§RЯкщо деколонізація не була досягнута протягом 2 років із переходу на комунізм, у країні почнеться громадянська війна!§!\n"
 ENG_concessions_to_the_trade_unions_tt_3: "Відкриває доступ до рішень: §YПідтримка профспілок§!.\n"
 ENG_move_to_secure_the_dominions: "Убезпечити контроль над домініонами"
 ENG_move_to_secure_the_dominions_desc: "Домініони підозріло дивляться на нашу ідеологічну зміну. Не виключено, що вони переглянуть свої зв'язки з Вестмінстером, якщо ми їм дозволимо... Тому ми не мусимо цього робити. Діючи швидко, ми зможемо силою вплинути на зміну уряду до того, як дипломатичні відносини стануть надто напруженими." # (@)
 ENG_move_to_secure_the_dominions_tt: "Відкриває доступ до рішень §Y$ENG_move_to_secure_the_dominions$§!.\n"
 ENG_the_fate_of_the_royal_family: "Доля королівської сім'ї"
 ENG_the_fate_of_the_royal_family_desc: "Думка про те, що одна людина варта більше, ніж інша, лише завдяки своєму народженню, викликає у нас огиду. Величезне багатство, яким продовжує хизуватися королівська родина, дратує і, безсумнівно, було б набагато корисніше витратити його на переозброєння та промислову експансію. Можливо, настав час убити двох зайців одним пострілом..." # (@)
 ENG_eliminate_the_upper_class: "Знищити вищий клас"
 ENG_eliminate_the_upper_class_desc: "Робітники мусять повстати і порвати кайдани, створені вищими класами. Ми вправимося з ними та захопимо їхні компанії на користь держави." # (@)
 ENG_eliminate_the_upper_class_tt: "Аристократів-фельдмаршалів, -генералів і -адміралів буде усунуто.\n"
 ENG_for_the_good_of_the_revolution: "Заради добра революції"
 ENG_for_the_good_of_the_revolution_desc: "Усі мусять бути готові пожертвувати комфортом заради блага держави. Британський народ високо триматиме голову перед обличчям видачі продуктів за картками, будучи впевненим, що це забезпечить нашу остаточну перемогу." # (@)
 ENG_the_british_communist_alternative: "Британська комуністична альтернатива"
 ENG_the_british_communist_alternative_desc: "Замість стати на бік Москви, ми розпочнемо власну співпрацю між комуністичними державами. Британці не мають собі рівних на світовій арені, і ми не будемо кланятися Москві; ні зараз, ні коли-небудь." # (@)
 ENG_enforce_decolonization: "Примусова деколонізація"
 ENG_enforce_decolonization_desc: "Так само, як деколонізувалися ми, так само мусять зробити й інші народи світу. Ми висунемо ультиматум, і ті, хто не бачить мудрості наших слів, будуть змушені її побачити." # (@)
 ENG_reach_out_across_the_channel: "Простягнути руку через Ла-Манш"
 ENG_reach_out_across_the_channel_desc: "Комунізм поширився в країнах по той бік Ла-Маншу. Ми простягнемо до них руку допомоги, яка набагато ближча, ніж далека Москва." # (@)
 ENG_reach_out_across_the_channel_tt: "Запрошує державу §Y[FRA.GetName]§! або §YНижні землі§! в наш альянс, якщо вони комуністи.\n"
 ENG_soviet_cooperation: "Радянська співпраця"
 ENG_soviet_cooperation_desc: "Хоча у нас є відмінності, у нас також є спільний ворог. Ми запропонуємо атакувати з обох боків, розчавивши німців до того, як вони зрозуміють, що сталося." # (@)
 ENG_the_one_true_revolution: "Єдина істинна революція"
 ENG_the_one_true_revolution_desc: "З містом [SOU.Capital.GetCapitalVictoryPointName] ніколи не буде співпраці. Корупція процвітає в державі [SOU.GetNameDef]; єдина надія — вирізати їй серце та взяти на себе беззаперечне глобальне лідерство в робітничій справі." # (@)
 ENG_follow_moscow: "Слідувати за керівництвом із м. [SOU.Capital.GetCapitalVictoryPointName]"
 ENG_follow_moscow_desc: "У своєму корінні комунізм у Британії завжди виконував накази міста [SOU.Capital.GetCapitalVictoryPointName]. Продовжувати робити це зараз не тільки логічно, але й необхідно. Між Червоною армією і нашим флотом ми поширимо слово Маркса далеко і широко, і ніхто не зможе нас зупинити." # (@)
 ENG_tackle_fascism: "Побороти фашизм"
 ENG_tackle_fascism_desc: "Фашизм — головна загроза для робітничої справи. Ми мусимо зосередитися на тому, щоб усунути це згубне явище з обличчя Європи." # (@)
 ENG_preparing_the_second_front: "Підготовка другого фронту"
 ENG_preparing_the_second_front_desc: "Коли почнеться війна, ми мусимо відкрити другий фронт для допомоги нашим радянським союзникам. Підготовка до цього має розпочатися вже зараз." # (@)
 ENG_tackle_capitalism: "Побороти капіталізм"
 ENG_tackle_capitalism_desc: "Капіталізм — найлютіший ворог робітничої справи, і ми не можемо сидіти склавши руки, поки він процвітає, навіть за океаном. Ми мусимо готуватися до боротьби з ним у самому його серці." # (@)
 ENG_bermuda_invasion_launch_point: "База для вторгнень на Бермудах"
 ENG_bermuda_invasion_launch_point_desc: "Вторгнення в Північну Америку буде нелегким завданням. Ми мусимо розбудувати наші володіння на Бермудських островах, щоб мати змогу розмістити сили вторгнення на необхідний час, перш ніж їх можна буде відправити для поширення революції безпосередньо на американські береги." # (@)
 ENG_crush_the_dream: "Розбити Мрію"
 ENG_crush_the_dream_desc: "Американці люблять говорити про свою Мрію — мовляв, будь-хто може досягти успіху в Америці, якщо тільки готовий зробити це за спиною у своїх однолітків. Ми вважаємо це гідним осуду; нікого не можна заохочувати користатися іншими заради власної вигоди. Ми звільнимо їхній народ від цих безглуздих уявлень, розбивши цю Мрію так, що від неї не залишиться й сліду." # (@)
 ENG_socialist_science_pool: "Соціалістичний науковий фонд"
 ENG_socialist_science_pool_desc: "Ми мусимо координувати обмін технологічними знаннями, щоб усі наші союзники могли скористатися нашими досягненнями, а ми — їхніми. Тільки так боротьба робітників матиме успіх." # (@)
 ENG_liberate_the_home_of_marx: "Звільнити вітчизну Маркса"
 ENG_liberate_the_home_of_marx_desc: "Батьківщина Карла Маркса заражена фашизмом, що не лише паплюжить його пам'ять, але й слугує вічною образою для всього соціалізму. Настав час вигнати цю злу силу з німецької землі, звільнивши її народ від лжепророків, які ведуть його за собою." # (@)
 ENG_spirit_of_the_industrial_revolution: "Дух промислової революції"
 ENG_spirit_of_the_industrial_revolution_desc: "Британські острови були батьківщиною промислової революції. У цьому дусі ми покажемо світові, чого можуть досягти звільнені робітники в умовах контрольованої державою економіки." # (@)
 ENG_british_commonwealth_air_training_plan: "План вишколу пілотів Британської Співдружності"
 ENG_british_commonwealth_air_training_plan_desc: "Наш військовий успіх залежить від нашого володіння повітрям, а отже, від майстерності наших екіпажів. Ми розпочнемо наймасштабнішу програму авіаційної підготовки, яку коли-небудь бачив світ, щоб забезпечити наявність усіх підготовлених льотчиків та екіпажів, необхідних для оволодіння цим новим виміром ведення війни." # (@)
 ENG_indian_autonomy: "Автономія Індії"
 ENG_indian_autonomy_desc: "Замість обіцяти повну незалежність, можливо, нам вдасться послабити індійські рухи за незалежність, надавши їм широку автономію, подібну до тієї, якою вже користуються інші домініони." # (@)
 ENG_indian_autonomy_tt: "§RБез автономії або лорда Галіфакса як лідера держави [RAJ.GetNameDef] не підтримає жодні пропозиції щодо створення імперської федерації.§!"
 ENG_imperial_conference_defense_dominion: "Оборонні угоди імперської конференції"
 ENG_imperial_conference_economy_dominion: "Економічні угоди імперської конференції"
 ENG_federal_integration: "Федеративна інтеграція"
 ENG_imperial_conference: "Провести імперську конференцію"
 ENG_imperial_conference_desc: "Востаннє керівники урядів усіх наших самоврядних колоній і домініонів зустрічалися для обговорення питань, що становлять імперський інтерес, у 1932 році. Настав час провести ще одну конференцію, особливо якщо ми хочемо зміцнити Імперію в найближчому майбутньому." # (@)
 ENG_imperial_conference_tt: "Відкриває доступ до рішень §YІмперська конференція§! на 60 днів.\n§RПереконайтеся, що Ви накопичили достатньо політичної влади, щоби скористатися ними!§!\n"
 ENG_imperial_federation: "Імперська федерація"
 ENG_imperial_federation_desc: "Імперську федерацію вже давно розглядають як альтернативу самоврядуванню. Після тривалого періоду підготовки нарешті настав час об'єднати наш уряд із урядами наших домініонів і відновити нашу позицію провідної світової наддержави. Хай живе Британнія!" # (@)
 ENG_dominions_accepted_federation: "Домініони підтримали імперську федерацію\n"
 ENG_a_s_warfare: "Протичовнова війна"
 ENG_a_s_warfare_desc: "Атлантика — це наша «дорога життя», і ми мусимо забезпечити її чистоту від ворогів, які полюватимуть на наші вразливі судна, будь то над поверхнею чи під нею. Ми зосередимося на передових розробках у галузі протичовнової боротьби, гарантуючи, що наші кораблі супроводу будуть оснащені найкращим озброєнням і засобами виявлення, які ми можемо надати." # (@)
 ENG_anti_submarine_training_school: "Школа з навчання протичовновій війні"
 ENG_anti_submarine_training_school_desc: "Однією з наших переваг є можливість залучати до підготовки нових екіпажів великий пул кваліфікованих офіцерів з досвідом минулої війни. Під керівництвом експерта з протичовнової війни командора Ґілберта Стівенсона створення нової школи з протичовнової війни в Тоберморі забезпечить нашим екіпажам необхідні навички перед тим, як вони вирушать на службу супроводу в Атлантиці та зіткнуться з загрозою підводних човнів." # (@)
 ENG_expand_the_repair_yards: "Розширити ремонтні верфі"
 ENG_expand_the_repair_yards_desc: "Хоча наш морський флот є одним з найбільших у світі, ми також мусимо мати засоби для швидкого ремонту наших кораблів, якщо вони отримають пошкодження в бою, або наші вороги можуть виснажити нас через виснаження. Розширення наших ремонтних заводів не лише дозволить досягти цієї мети, але й дасть нам змогу вчасно переобладнати деякі з наших старих моделей." # (@)
 ENG_vanguard: "Vanguard"
 ENG_vanguard_desc: "[Root.GetVanguardDesc]"
 ENG_VANGUARD_DESC_HISTORICAL: "Ми мусимо не бути переважені нашими ворогам в морях. У нас досі зберігаються кілька 15-дюймових гармат, які можна використати для заміни трудомістких 16-дюймових гармат, необхідних для наших наступних запланованих лінкорів, що значно прискорить будівництво головного корабля класу: HMS Vanguard." # (@)
 ENG_VANGUARD_DESC_COMMUNIST: "Ми мусимо не бути переважені нашими ворогам в морях. У нас досі зберігаються кілька 15-дюймових гармат, які можна використати для заміни трудомістких 16-дюймових гармат, необхідних для наших наступних запланованих лінкорів, що значно прискорить будівництво головного корабля класу: WLNS Vanguard." # (@)
 ENG_vanguard_tt_hms: "Буде створено корабель HMS Vanguard.\n"
 ENG_vanguard_tt_communism: "Буде створено корабель WLNS Vanguard.\n"
 ENG_anti_non_contact_committee: "Комітет із безконтактних мін"
 ENG_anti_non_contact_committee_desc: "Наші технічні експерти з протимінної боротьби вважають, що нові типи мін, які активуються магнітними полями, звуком та іншими засобами, ймовірно, відіграватимуть важливу роль у наступній війні. Призначивши спеціальний комітет Адміралтейства з протимінної боротьби для дослідження способів їх знешкодження вже зараз, ми можемо допомогти зберегти наші кораблі в безпеці і, можливо, навіть досягти певного прогресу в наших власних мінних технологіях в цьому процесі." # (@)
 ENG_secure_the_imperial_shipping_routes: "Убезпека імперських торгових маршрутів"
 ENG_secure_the_imperial_shipping_routes_desc: "Згуртованість нашої колоніальної імперії залежить від нашої здатності захищати торговельне судноплавство, яке пов'язує її воєдино, і спрямовувати нашу силу туди, де це може бути необхідним. Для цього ми завжди покладалися на великий флот легких крейсерів, і ми повинні забезпечити наявність необхідної кількості цих кораблів, щоб мати змогу бути всюди одночасно." # (@)
 ENG_fortify_the_empire: "Зміцнити імперію"
