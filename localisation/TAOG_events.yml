### INS News
 taog_news.1.t: "Світанок союзу Нідерландів та Індонезії"
 taog_news.1.desc: "Королева Вільгельміна вчора зробила заяву в [1058.GetName], оголосивши про несподіване створення держави Нідерландсько-Індонезійського Союзу. Поки батьківщина перебуває під окупацією, уряд [HOL.GetAdjective] у вигнанні та адміністрація [INS.GetAdjective] погодилися керувати як єдине ціле під владою Корони. Чиновники обох країн описують цей крок як вимушений захід, а не вибір, як відчайдушну спробу зберегти єдність і авторитет Королівства на двох континентах."
 taog_news.1.a: "Цікавий розвиток подій."
 taog_news.2.t: "Декларація незалежності Індонезії"
 taog_news.2.desc: "Революціонер [INS.GetAdjective] [INS.GetLeader] виступив сьогодні на Яві з промовою, проголосивши незалежність новоствореної Республіки Індонезія. [HOL.GetNameDef] не визнає суверенітет цієї нової республіки, але республіканські ополчення вже де-факто контролюють певну територію."
 taog_news.2.a: "Це може спричинити великі зміни у світі."


############
### SIAM ###
############
 siam.1.t: "[SIA_phraya_phahon.GetName] замішаний у скандалі"
 siam.1.desc: "[SIA_phraya_phahon.GetName] звинувачують у продажі королівської нерухомості чиновникам за цінами, нижчими від ринкових — скандал, який суттєво підірвав його легітимність у Народних зборах. Схоже, що вплив [SIA_phraya_phahon.GetName] добігає кінця."
 siam.1.a: "Можливо, це звільнить шлях для когось іншого?"

 #Spmgsiradet rebellion historical
 siam.2.t: "Третій замах на життя [SIA_plaek_phibunsongkhram.GetName]"
 siam.2.desc: "Повідомлення від бангкокського кореспондента Reuters розкриває третю за чотири роки спробу отруїти прем'єр-міністра Сіаму (пана Пхун Сонгграма).\nМинулого тижня, як повідомляється, отруту було підмішано в їжу, що тимчасово вплинуло на пана Сонгграма, його дружину та доньку.\nБританський міністр закордонних справ (лорд Галіфакс) у посланні до пана Сонгграма висловлює тривогу з приводу боягузливої спроби замаху на життя прем'єр-міністра та радість з приводу його порятунку."
 siam.2.a: "Хто б міг це зробити?"

 siam.3.t: "Вигнання Прая Сонгсурадета"
 siam.3.desc: "Прая Сонгсурадета звинувачують у тому, що він був організатором одного або кількох замахів на [SIA_plaek_phibunsongkhram.GetName], а також у плануванні державного перевороту. Воля уряду полягає в тому, щоб позбавити Прая Сонгсурадета командування, його звань і титулів, змусити піти у відставку з армії без пенсії та вислати з країни.\nКритики стверджують, що це завуальована чистка, організована [SIA_plaek_phibunsongkhram.GetName] для усунення свого головного суперника, але це явно наклеп."
 siam.3.a: "Сумний кінець."

 siam.4.t: "Симпатиків Сонгсурадета заарештовано"
 siam.4.desc: "Рано вранці за допомогою Королівської тайської поліції уряд заарештував ще 51 підозрюваних та симпатиків, включаючи принца Рангсіта, Прая Тепахатсадіна та Прая Удом Понгпенсавада. Їх звинувачують у змові з Прая Сонгсурадетом проти держави, причому особливо відзначається, що Рангсіт, член королівської родини, має постати перед судом. Деякі оглядачі гадають, чи не був принц спеціальною ціллю, щоб подати сигнал решті роялістів у [THIS.GetName]: поводьтеся тихо або падете."
 siam.4.a: "Сюжет ускладнюється."

 siam.5.t: "Повстання 18 трупів"
 siam.5.desc: "Спеціальний трибунал, створений Пхуном, щоб судити 51 особу, причетну до повстання, ухвалив, що 25 з них будуть ув'язнені довічно, а 21 — розстріляні. З цих 21 трьох помилувано через їхні заслуги, а саме принца Рангсіта та Прая Тепахатсадіна."
 siam.5.a: "Цю справу завершено."

 #Songsuradet rebellion alternative

 siam.6.t: "Протистояння Сонгсурадета"
 siam.6.desc: "Прая Сонгсурадета звинувачують у тому, що він був організатором одного або кількох замахів на [SIA_plaek_phibunsongkhram.GetName], а також у плануванні перевороту проти його уряду. Воля уряду полягає в тому, щоб позбавити Сонгсурадета командування та вислати його з країни.\nОднак його арешту завадили військові, лояльні до Сонгсурадета, які назвали арешт політично вмотивованим. Уряд і військова кліка Сонгсурадета зараз перебувають у глухому куті, обидві сторони відмовляються поступатися."
 siam.6.a: "Ми не відступимо."
 siam.6.b: "Це обернулося проти нас. Давайте відступимо."

 siam.7.t: "Сонгсурадет шукає підтримки ВМС"
 siam.7.desc: "Поки напружене протистояння між урядовими силами та військовою клікою Сонгсурадета триває, урядові слідчі почали чути чутки про те, що сформувався союз між Королівським флотом і Сонгсурадетом з прямою метою протидії зростаючому авторитаризму Пхуна.\nЦе ще не все, деякі помічники Королівського двору повідомляли про зустрічі представників Сонгсурадета з високопоставленими принцами, що посилює побоювання, що роялісти також об'єднаються з опозицією."
 siam.7.a: "Ми - уряд, і нас не вдасться шантажувати!"
 siam.7.b: "Це виходить з під контролю. Давайте відступимо."

 #alt-hist actual rebellion
  siam.8.t: "Повстання Сонгсурадета"
  siam.8.desc: "Забезпечивши достатню політичну та військову підтримку, військова кліка Сонгсурадета разом із флотом ефективно захопила великі райони [THIS.GetName]. Рано вранці в передмістях Бангкока пролунали постріли, і вся країна, здається, опинилася на межі повномасштабної громадянської війни між урядом і Сонгсурадетом."
  siam.8.a: "Уряд повинен вижити."

 #alt-hist actual rebellion
  siam.9.t: "Кінець повстання Сонгсурадета"
  siam.9.desc: "Повстання розбите, і після захоплення Сонгсурадета залишився лише суд, хоча на даному етапі це лише формальність. Змову виявили не тільки в армії та на флоті, а й серед роялістів, причому принц Рангсіт відкрито підтримував бунтівників. Глибока чистка дисидентів стала необхідністю, а не альтернативою."
  siam.9.a: "Час будувати все заново."

 #Attack Indochina

 siam.10.t: "Перемога!"
 siam.10.desc: "Ворог тікає, і наша перемога здається забезпеченою. Оскільки територія під повним контролем, старі імперіалістичні сили мають тремтіти від страху. Як вони могли програти? Це знак нашого божественного провидіння."
 siam.10.a: "За [ROOT.GetName]!"
 siam.10.b: "Насправді все йде досить непогано."

 siam.11.t: "Стратегічний прорив [FROM.GetAdjective]"
 siam.11.desc: "Всупереч очікуванням, армія [FROM.GetAdjective] перехитрила наші сили і захопила контроль над спірним регіоном. Їхня окупація послабила наш авторитет і поставила під сумнів наші претензії на цю територію. Продовження конфлікту загрожує подальшою втратою дисципліни та впевненості, проте здача території була б публічним визнанням поразки."
 siam.11.a: "Ми повинні мінімізувати втрати та відступити."
 siam.11.b: "Ми не відмовимося від наших вимог!"

 siam.12.t: "[FROM.GetName] визнає поразку"
 siam.12.desc: "Наша кампанія проведена успішно. Опір ворога зломлено, і [FROM.GetName] офіційно відмовилася від контролю над спірними землями, щоб уникнути подальших руйнувань. Ця перемога підвищує наш авторитет і забезпечує наші кордони — принаймні на деякий час."
 siam.12.a: "Наша сила незаперечна."

 siam.13.t: "[FROM.GetName] відкидає будь-які домовленості"
 siam.13.desc: "[FROM.GetName] відхилила всі пропозиції щодо територіальних поступок, назвавши їх неприйнятними. Їхнє керівництво заявило, що конфлікт закінчиться лише знищенням нашої держави."
 siam.13.a: "Нехай буде так."

 siam.14.t: "[FROM.GetNameDefCap] прагне тотальної війни"
 siam.14.desc: "[FROM.GetNameDefCap] відкинула будь-які спроби переговорів. Їхній намір зрозумілий: повне завоювання та поглинання нашої нації. Ця війна буде вирішена не договорами, а тотальною перемогою або тотальним крахом."
 siam.14.a: "Ніяких компромісів, ніякої капітуляції."

 siam.15.t: "Наступ [SIA.GetAdjective] зупинився"
 siam.15.desc: "Швидкий наступ сил [SIA.GetAdjective] міг застати нас зненацька, але оскільки їхній авангард видихається під зростаючим напруженням, їхня слабкість стає очевидною. Те, що мало стати блискавичною кампанією, перетворилося на виснажливе випробування для армії [SIA.GetAdjective]. Ми могли б бути великодушними і запропонувати їм шлях до виходу через поступки, проте рішення за нами: чи краще нам послужить милосердя, ніж тотальна перемога."
 siam.15.a: "Запропонувати поступки."
 siam.15.b: "Прийнятна лише тотальна перемога."

 siam.16.t: "Зупинений наступ"
 siam.16.desc: "Наш наступ зупинився, це не проблема, проблема в тому, що ворог це знає. Вони надіслали нам ультиматум: або здатися зараз із мінімальними втратами, або продовжити війну з ще більшим кровопролиттям. Різниця лише в кількості загиблих, яких доведеться ховати."
 siam.16.a: "Нехай буде мир."
 siam.16.b: "Ми ніколи не здамося!"

 siam.17.t: "[FROM.GetName] відмовляється здаватися"
 siam.17.desc: "[FROM.GetName] прямо заявила, що краще побачить свою країну в руїнах, ніж поступиться нам хоча б чимось. Війна продовжується."
 siam.17.a: "Вони отримають те, чого бажають."

 siam.18.t: "[FROM.GetName] хоче нашої капітуляції!"
 siam.18.desc: "Перехоплені повідомлення ворожого командування підтвердили наші найгірші побоювання: ніяких переговорів, ніяких поступок для завершення цієї війни не буде. Вони вимагають нічого меншого, як повної капітуляції нашої нації, прирікаючи нас на життя під чоботом чергового імперіаліста. Якщо така їхня мета, то відповідь у нас одна: ми відмовляємося підкоритися."
 siam.18.a: "[ROOT.GetNameDefCap] стоїть!"

 siam.19.t: "[SIA.GetName] вимагає повернення територій"
 siam.19.desc: "[SIA.GetName], підбадьорений зростаючим націоналізмом та нашою нібито слабкістю в регіоні, вимагає повернення територій, які вважає основними для своєї держави. Вони явно намагаються стрибнути вище голови, але території, на які вони претендують, не обов'язково варті того, щоб воювати за них, коли світ котиться до Армагеддону."
 siam.19.a: "Це не варте війни."
 siam.19.b: "Дурниці!"

 siam.20.t: "[FROM.GetName] повертає території"
 siam.20.desc: "[FROM.GetName] вирішила повернути наші території; незалежно від того, чи визнають вони наш суверенітет над ними, чи просто піддалися тиску інших країн — це неважливо, наша справа справедлива."
 siam.20.a: "Чудовий день!"

 siam.21.t: "[FROM.GetName] відмовляється повертати території"
 siam.21.desc: "[FROM.GetName] відхилила наш запит. Ці імперіалісти чіпляються за минуле століття пазурами та ланцюгами, не в силах визнати, що час цих так званих «великих націй» сплив."
 siam.21.a: "Ми дамо їм це зрозуміти."

 SIA_sent_bureaucrats_to_us: "Навчання держслужбовців разом з нами"
 SIA_tied_their_currency_to_ours: "Прив'язали свою валюту до нашої"
 SIA_sent_started_cooperative_with_us: "Почали співпрацю з розвитку разом з нами"

 siam.22.t: "Відправити бюрократів [SIA.GetName] за кордон"
 siam.22.desc: "Наші бюрократи погано пристосовані до сучасної економіки, їм бракує навчання, необхідного для стимулювання зростання. На щастя, є багато країн із сучасною, розвиненою бюрократією, куди ми можемо їх відправити, щоб отримати досвід, не переймаючи їхні методи правління."
 siam.22.a: "Відправити їх до [ENG.GetName]"
 siam.22.b: "Відправити їх до [JAP.GetName]"

 siam.23.t: "Закон про стабілізацію бата"
 siam.23.desc: "Бат не може залишатися незакріпленим, поки [ROOT.GetName] прагне порядку в торгівлі та фінансах. Наші чиновники тепер стверджують, що монетарна стабільність потребує міцного зовнішнього якоря, прив'язаного до валюти, яка має вагу, щоб заспокоїти купців, кредиторів та іноземних партнерів. Вибір перед нами — не просто технічний. Він сформує напрямок нашої торгівлі, характер нашого розвитку та іноземний вплив, який ляже на економіку [SIA.GetAdjective]."
 siam.23.a: "Прив'язати до фунта стерлінгів"
 siam.23.b: "Прив'язати до єни"

 siam.24.t: "Кооператив розвитку [SIA.GetAdjective]"
 siam.24.desc: "Кооператив розвитку [SIA.GetAdjective] дав державі новий інструмент для національного вдосконалення, але амбіції все ще випереджають внутрішній капітал. Залізниці, майстерні та електричні станції потребують зовнішнього фінансування, якщо вони мають розвиватися швидко. Тепер перед нами два шляхи. Інвестиції [ENG.GetAdjective] пропонують доступ до встановлених ринків, досвідчених фірм та фінансового престижу Лондона. Інвестиції [JAP.GetAdjective] обіцяють тісніше промислове партнерство з азійською державою, яка прагне розширити свій вплив. Обидва шляхи можуть прискорити розвиток, хоча жоден з них не обійдеться без зобов'язань."
 siam.24.a: "Шукати інвестиції від [ENG.GetName]"
 siam.24.b: "Шукати інвестиції від [JAP.GetName]"

 siam.25.t: "Смерть Прачадіпока"
 siam.25.desc: "Король Прачадіпок помер. Колишній король, чиє ім'я несло пам'ять про старий порядок крізь роки вигнання та потрясінь, відходить зі справ людських в історію. Для декого його смерть закриває останній розділ боротьби, що почалася з кінця абсолютного правління. Проте справа, яку він уособлював, не вмирає разом з ним. Трон вистоїть, династія залишиться, і робота з відновлення гідності та стабільності [ROOT.GetName] повинна тепер продовжитися в ім'я молодого короля Ананди."
 siam.25.a: "Нехай Його Величність вознесеться на небо."

 siam.27.t: "Виховати короля"
 siam.27.desc: "Король Ананда залишається в [SWI.GetName], далеко від королівства, яким йому належить правити одного дня. Проте відстань не виводить його з-під нашого впливу. Вчителів можна підібрати, предмети акцентувати, а звички заохочувати, щоб його розум був спрямований у майбутнє, яке ми готуємо для [ROOT.GetNameDef]. Чи повернеться він як солдат, науковець чи хтось більший, значною мірою залежить від того, що він вивчатиме зараз.\n\nБо чим насправді є король, як не продовженням своєї країни?"
 siam.27.a: "Спрямувати його до наукових занять."
 siam.27.b: "Навчити його військовій справі."
 siam.27.c: "Спрямувати його до адміністрації та постачання."
 siam.27.d: "Дати освіту в галузі промисловості та розвитку."

 siam.28.t: "Коронація короля Ананди"
 siam.28.desc: "Довгі роки регентства добігають кінця. У Бангкоку, перед принцами, ченцями, міністрами та державними офіцерами, Ананда сходить на трон за власним правом і отримує почесті, належні королю з династії Чакрі. Церемонії проголошують наступність там, де були потрясіння, і священний порядок там, де були чвари. Для королівства ця коронація — не просто видовище, а декларація того, що Корона вистояла, що держава не була зламана вигнанням і громадянською війною, і що починається нове правління над [ROOT.GetNameDef]."
 siam.28.a: "Хай живе король."

 siam.29.t: "Дослідження звичайних танків"
 siam.29.desc: "Звичайні танки все ще є королями поля бою, тому ми повинні вчитися у найкращих, щоб створити потужний танковий корпус."
 siam.29.a: "Ми вчитимемося у німців"
 siam.29.b: "Ми вчитимемося у американців"
 siam.29.c: "Ми вчитимемося у британців"

 siam.31.t: "Закупівля підводних човнів"
 siam.31.desc: "Розширення флоту вимагає наявності підводних човнів, і ми повинні вирішити, де закуповувати наші судна. І [ENG.GetNameDef], і [JAP.GetNameDef] зробили пропозиції — але вибір має наслідки, що виходять за межі суднобудівні."
 siam.31.a: "[ENG.GetAdjective] човни послужать нам добре."
 siam.31.b: "Ми будуватимемо наш підводний флот за проектами [JAP.GetAdjective]."

 siam.32.t: "Закупівля кораблів берегової оборони"
 siam.32.desc: "Наші прибережні води потребують спроможних оборонних суден, і ми повинні обрати постачальника. [ENG.GetNameDefCap] і [JAP.GetNameDef] готові доставити їх — це рішення сформує і наш флот, і наші міжнародні відносини."
 siam.32.a: "Ми покладатимемося на судна [ENG.GetAdjective] для нашої берегової оборони."
 siam.32.b: "Ми покладатимемося на кораблі [JAP.GetAdjective] для нашого прибережного флоту."

 siam.33.t: "Продаж Bangkok Dock Co."
 siam.33.desc: "Продаж компанії Bangkok Dock завершено, і кошти тепер у скарбниці. Уряд має вирішити, куди найкраще спрямувати ці гроші — чи то на зменшення фінансового тягаря для звичайних громадян, чи на прискорення технічних амбіцій нації, чи на зміцнення впевненості у майбутньому країни."
 siam.33.a: "Зменшити податковий тягар для наших людей."
 siam.33.b: "Спрямувати кошти на морські дослідження."
 siam.33.c: "Використати прибуток, щоб заспокоїти націю."

 siam.34.t: "Вимоги [FROM.GetAdjective] біля наших берегів"
 siam.34.desc: "Сили [FROM.GetAdjective] тепер тиснуть на [ROOT.GetNameDef], і їхні дипломати говорять із впевненістю людей, які вірять, що питання вже вирішене. Вони пропонують нам звичну мову порядку та стабільності, проте насправді вони шукають покірності. Ми можемо підкоритися і зберегти державу в зменшеному вигляді, приєднатися до їхнього альянсу в надії зберегти деяку свободу дій, або відповісти на цей тиск відкритим викликом і наказати загарбнику забратися від наших берегів."
 siam.34.a: "Ми приєднаємося до їхнього альянсу і збережемо наше правління."
 siam.34.b: "Наказати їм забратися геть від наших берегів."

 siam.35.t: "[JAP.GetNameDefCap] вимагає, щоб ми друкували більше грошей"
 siam.35.desc: "[JAP.GetNameDefCap] чітко висловила свої очікування: ми повинні збільшити грошову масу, щоб задовольнити їхні економічні вимоги. Тягар ляже на наш народ через зростання цін, тоді як промисловість [JAP.GetAdjective] отримає вигоду. У нас мало можливостей відмовити."
 siam.35.a: "Виконати вимоги [JAP.GetNameDef]."

 siam.36.t: "[SIA.GetNameDefCap] вимагає погашення боргу"
 siam.36.desc: "[SIA.GetNameDefCap] офіційно зажадала, щоб ми покрили витрати, пов'язані з домовленістю про друк грошей, яку ми змусили їх укласти. Домовленість послужила нам добре, але рахунок тепер виставлено."
 siam.36.a: "Визнати борг і почати виплати."

 siam.37.t: "[JAP.GetNameDefCap] погоджується погасити наші борги"
 siam.37.desc: "Після наших вимог [JAP.GetNameDef] погодилася почати виплату економічних витрат за домовленістю про друк грошей. Компенсація не повністю скасує тягар, покладений на наш народ, але принесе певне полегшення скарбниці."
 siam.37.a: "Справедливе врегулювання. Наша економіка відновиться."

 siam.38.t: "[SIA.GetName] шукає умов"
 siam.38.desc: "[SIA.GetAdjective] Уряд прийшов до нас із закликом про умови. Їхні міністри тепер визнають те, що наші гармати вже довели: [ROOT.GetNameDef] утримує ініціативу в цій боротьбі. Ми можемо прийняти їхню капітуляцію і звести їх до покірності, зв'язати їх із нашим альянсом, щоб їхній уряд служив нашій ширшій справі, або відкинути будь-який компроміс і продовжити кампанію, поки Сіам не буде повністю окупований."
 siam.38.a: "Прийняти їхню капітуляцію."
 siam.38.b: "Ні. Ми закінчимо це силою."

 siam.39.t: "Уряд [FROM.GetAdjective] приймає нашу капітуляцію"
 siam.39.desc: "[FROM.GetLeader] вирішив прийняти наше підпорядкування. На даний момент [ROOT.GetNameDef] врятовано від подальших руйнувань, хоча не від приниження. Армії наказано скласти зброю, а уряд залишається на місці лише з дозволу сильнішої держави. Ми зберігаємо державу, але ціною гордості та свободи дій."
 siam.39.a: "Ми витримаємо те, що маємо."

 siam.40.t: "Уряд [FROM.GetAdjective] відхиляє нашу пропозицію"
 siam.40.desc: "[FROM.GetLeader] відхилив кожне звернення, надіслане з Бангкока. Жодного підпорядкування не визнано достатнім, жоден компроміс не прийнятний. Ворог має намір вирішити справу лише через повне завоювання. Для [ROOT.GetNameDef] не залишилося нічого, крім опору. Якщо вони не покинуть наші береги за домовленістю, їх потрібно вигнати силою."
 siam.40.a: "Тоді ми боремося."

 siam.41.t: "[FROM.GetNameDefCap] відправляє чиновників вивчати наші методи"
 siam.41.desc: "Делегація чиновників [FROM.GetAdjective] прибула, щоб спостерігати та вивчати нашу адміністративну та дослідницьку практику. [FROM.GetNameDefCap], здається, має намір модернізувати свою бюрократію, спираючись на іноземний досвід, і обрала [ROOT.GetNameDef] як свою модель. Візит є негласним визнанням наших методів і можливістю зміцнити доброзичливі відносини з іншим урядом."
 siam.41.a: "Ми вітаємо їхню делегацію."

 siam.42.t: "[FROM.GetNameDefCap] прив'язує свою валюту до нашої"
 siam.42.desc: "[FROM.GetNameDefCap] офіційно вирішила прив'язати свою валюту до нашої. Це рішення наближає [FROM.GetNameDef] до нашої економічної орбіти і свідчить про певну довіру до стабільності наших фінансових інституцій. Торгівля між нашими народами має стати більш передбачуваною, а купцям [FROM.GetAdjective] буде легше вести справи з нашими."
 siam.42.a: "Вітаємо розвиток наших торговельних відносин."

 siam.43.t: "[FROM.GetNameDefCap] запитує інвестиції в розвиток"
 siam.43.desc: "[FROM.GetNameDefCap] надіслала запрошення нашим інженерам і фахівцям допомогти в розвитку їхньої нації. Кооператив пропонує нашим галузям плацдарм у регіоні та зміцнює економічні зв'язки між нашими урядами. Це скромна пропозиція, але вона може принести значні результати з часом."
 siam.43.a: "Ми раді допомогти."

 siam.44.t: "[FROM.GetNameDefCap] розміщує замовлення на підводні човни"
 siam.44.desc: "[FROM.GetNameDefCap] розмістила замовлення на підводні човни, побудовані за нашими проектами. Продаж є значущим вотумом довіри до нашої військово-морської промисловості та поширює вплив [FROM.GetAdjective] у води Південно-Східної Азії."
 siam.44.a: "Вітаємо замовлення для наших верфей."
 SIA_purchased_submarines_from_us: "Придбали підводні човни у нас"

 siam.45.t: "[FROM.GetNameDefCap] пропонує об'єднання альянсів"
 siam.45.desc: "Делегація з [FROM.GetName] прибула з пропозицією від [FROM.GetLeader]. Вони стверджують, що наші окремі альянси тепер переслідують ті самі загальні цілі, водночас розділяючи людей, матеріали та дипломатичний вплив між конкуруючими командуваннями.\n\nОб'єднавши наші сили, ми створимо потужніший блок, здатний координувати стратегію на ширшому фронті. Така угода зміцнила б спільну справу, хоча вона також вимагала б від нас прийняти вплив [FROM.GetAdjective] на майбутній напрямок альянсу."
 siam.45.a: "Єдиний фронт необхідний."
 siam.45.b: "Наш альянс залишається нашим власним."

 siam.46.t: "[FROM.GetNameDefCap] приймає об'єднання"
 siam.46.desc: "[FROM.GetLeader] погодився на нашу пропозицію об'єднати наші альянси в одну коаліцію. Те, що раніше було окремими командуваннями та дипломатичними каналами, тепер згортається в одну структуру, дозволяючи нашим урядам координувати військові плани, заходи постачання та зовнішню політику з набагато більшою чіткістю.\n\nУгода не позбавлена ускладнень, але необхідність єдності перемогла."
 siam.46.a: "Разом ми сильніші."

 siam.47.t: "[FROM.GetNameDefCap] відхиляє об'єднання"
 siam.47.desc: "[FROM.GetLeader] відхилив нашу пропозицію про злиття альянсів. Їхній уряд стверджує, що співпраця може тривати там, де інтереси збігаються, але вони не розмістять свій альянс у межах ширшої коаліції під керівництвом з [ROOT.Capital.GetCapitalVictoryPointName].\n\nНаразі поділ між нашими блоками залишається. Ми повинні досягати наших цілей, не розраховуючи на їхню повну відданість."
 siam.47.a: "Тоді ми діємо самі."

 siam.48.t: "[SIA.GetName] запитує допомогу [JAP.GetAdjective]" #проверіт
 siam.48.desc: "[SIA.GetNameDefCap] офіційно запросив військову допомогу проти сил, що вторглися в їхню країну. Натомість [SIA.GetAdjective] уряд готовий надати фірмам [JAP.GetAdjective] привілейований доступ до стратегічних ресурсів, інфраструктури та комерційних прав.\n\nПідтримка [SIA.GetName] розширила б наш вплив у Південно-Східній Азії та забезпечила б цінні матеріали для Імперії, хоча це також може втягнути нас глибше в регіональні конфлікти."
 siam.48.a: "Прийняти їхню пропозицію."
 siam.48.b: "[JAP.GetName] не може виділити ресурси."

 siam.49.t: "[JAP.GetName] приймає наш заклик"
 siam.49.desc: "[JAP.GetNameDefCap] погодилася підтримати [ROOT.GetNameDef] у її боротьбі. Радники, обладнання та припаси [JAP.GetAdjective] скоро почнуть прибувати, тоді як економічні поступки були надані компаніям [JAP.GetAdjective] відповідно до угоди.\n\nХоча кабінет святкує виживання нації, багато хто потай задається питанням, скільки незалежності було виміняно на цю допомогу."
 siam.49.a: "Ми отримали союзника."

 SIA_japan_aid_request.4.t: "[JAP.GetName] відхиляє наш заклик"
 SIA_japan_aid_request.4.desc: "Уряд [JAP.GetNameDef] відхилив наш запит на військову допомогу. Токіо заявляє, що Імперія не може надіслати людей і матеріали для нашої боротьби в цей час.\n\nБез іноземної допомоги [ROOT.GetNameDef] повинна тепер покладатися на власні сили, щоб пережити вторгнення."
 SIA_japan_aid_request.4.a: "Тоді ми стоїмо самі."

 siam_adc.1.t: "[FROM.GetNameDefCap] вимагає звільнення [?var:SIA_adc_demand_country_to_be_released.GetNameDef]"
 siam_adc.1.desc: "Надійшла офіційна нота від [FROM.GetNameDef], де [FROM.GetLeader] засуджує нашу триваючу окупацію азійських країн як нестерпну образу їхнього права на самовизначення. Повідомлення стверджує, що Азія — це не приз, який можна розділити або адмініструвати за іноземним бажанням, і вимагає, щоб ми негайно вивели наші сили та відновили незалежний уряд у [?var:SIA_adc_demand_country_to_be_released.GetNameDef].\n\nВимога не залишає місця для непорозумінь. [FROM.GetNameDefCap] очікує виконання, і будь-яка відмова з нашого боку буде пам'ятатися як зумисна образа їхньої нації."
 siam_adc.1.a: "Ми звільнимо їх."
 siam_adc.1.b: "Вони залишаться під окупацією."

 siam_adc.2.t: "[FROM.GetNameDefCap] пропонує відновити нашу незалежність"
 siam_adc.2.desc: "Після прийняття [FROM.GetAdjective] вимог [SIA.GetNameDef] щодо майбутнього [ROOT.GetNameDef], [FROM.GetLeader] ставить перед нами остаточне питання. Окупаційна влада готова вивести війська та визнати суверенний уряд [ROOT.GetAdjective], якщо ми вирішимо знову стояти самі.\n\nНезалежність пропонує гідність і свободу дій, але вона також залишає нас відбудовувати державу без гарантій [FROM.GetNameDef]. Залишатися під їхнім захистом — скромніший шлях, але такий, що може вберегти країну від подальшого безладу в ці невизначені часи."
 siam_adc.2.a: "Ми будемо стояти як вільна нація."
 siam_adc.2.b: "Ми залишатимемося під захистом [FROM.GetAdjective]."

 siam_adc.3.t: "[?var:SIA_tag_that_was_released_due_to_sia_pressure.GetName] приймає незалежність"
 siam_adc.3.desc: "Уряд [?var:SIA_tag_that_was_released_due_to_sia_pressure.GetNameDef] обрав незалежність. Оскільки окупаційна адміністрація тепер має бути розпущена, [var:SIA_tag_that_was_released_due_to_sia_pressure.GetNameDef] готується відновити своє місце серед суверенних націй світу."
 siam_adc.3.a: "Яким буде їхнє майбутнє?"

 siam_adc.4.t: "[FROM.GetNameDefCap] відхиляє незалежність"
 siam_adc.4.desc: "Попри можливість здобути свободу, уряд [FROM.GetNameDef] відхилив негайну незалежність. Їхні міністри стверджують, що держава ще не готова витримати тягар повного суверенітету і віддає перевагу, поки що, збереженню статус-кво."
 siam_adc.4.a: "Тоді домовленість продовжується."

 siam_adc.5.t: "[FROM.GetNameDefCap] відхиляє наші вимоги"
 siam_adc.5.desc: "[FROM.GetName] чітко дала зрозуміти, що наші вимоги — це в кращому випадку смішно. Вони вказують на нашу мізерну армію як на доказ того, що ми не в змозі кинути виклик статус-кво."
 siam_adc.5.a: "Тоді ми покажемо їм."


 siam_dem_event_count: "Армія планує кампанію, щоб зганьбити нас, чим довше ми чекаємо"
 siam_dem.2.t: "Армія заперечує"
 siam_dem.2.desc: "На закритій зустрічі міністрів і старших офіцерів військовий представник виступив із суворою критикою пропозиції «Жовтого досьє». Він стверджує, що його автори занадто вільно говорять про державний контроль, перерозподіл і соціальні зобов'язання, приділяючи надто мало уваги дисципліні, власності та тягарям, які лягли б на офіцерський корпус і сільську місцевість. На його думку, [ROOT.GetNameDef] не можна переробити за допомогою теорій, написаних на папері, поки світ стає небезпечнішим з кожним місяцем."
 siam_dem.2.a: "Армія висловила свою позицію"

 siam_dem.3.t: "Публічна догана"
 siam_dem.3.desc: "Суперечка вийшла за межі комітету. Газета, яку вважають військовим рупором, надрукувала повне засудження «Жовтого досьє», представивши його як чужорідну програму, загорнуту в патріотичні гасла. Її редактори попереджають, що пропозиція ставить класові образи вище національної єдності, послаблює довіру до встановлених інституцій і заохочує небезпечні очікування серед робітників і селян. До обіду стаття вже повторюється в казармах, офісах і чайних, і те, що було внутрішньою суперечкою, стало публічним скандалом."
 siam_dem.3.a: "Критика поширюється"

 siam_dem.4.t: "Пхун засуджує Досьє"
 siam_dem.4.desc: "Пхун вступив у суперечку відкрито і з безпомилковою силою. Виступаючи перед прихильниками та офіцерами, він засуджує «Жовте досьє» як комуністичне за своєю суттю, незалежно від того, якою мовою віддають перевагу його захисники. Він заявляє, що будь-яка програма, яка підносить державу над власністю, обіцяє кардинальні соціальні зміни та розпалює агітацію серед нижчих верств, несе червону отруту в [ROOT.GetNameDef] під іншим іменем."
 siam_dem.4.a: "Він не залишає сумнівів"

 siam_dem.5.t: "Необхідно сформувати уряд"
 siam_dem.5.desc: "Старий режим зломлений, а Сері Тхай святкує тріумф. Але тріумф - це ще не уряд, і коаліція, що об'єдналася проти Пхібуна, далека від згоди щодо того, що має бути далі. У кулуарах влади звучать три імені: Пріді Баноміонг, совість опору; Куанг Апхайвонг, людина досить м'яка, щоб нікого не образити; та генерал Пхін Чунхаван, чиї офіцери чекають на своє. Кого ми піднесемо зараз, той і визначить майбутній мир."
 siam_dem.5.a: "Пріді Баноміонг має очолити країну. Опір це заслужив."
 siam_dem.5.b: "Куанг Апхайвонг - постать, яку можуть прийняти всі фракції."
 siam_dem.5.c: "Генерал Пхін Чунхаван. Армія отримає своє місце."

###################
#### AUSTRALIA ####
###################
 AST_election_events.1.t.a: "Перемога ОАП!"
 AST_election_events.1.t.b: "Перемога лейбористів!"
 AST_election_events.1.desc.a: "Голоси підраховано; на виборах перемогла Об'єднана австралійська партія.\n\nОАП пройде короткий період формування уряду, після чого наступні три роки доводитиме, що громадяни не дарма довірилися її представникам."
 AST_election_events.1.desc.b: "Голоси підраховано; на виборах перемогла Австралійська лейбористська партія.\n\nЛейбористи пройдуть короткий період формування уряду, після чого наступні три роки доводитимуть, що громадяни не дарма довірилися їхнім представникам."
 AST_election_events.1.a: "Народ сказав своє слово."

 AST_election_events.2.t: "Екватор до федеральних виборів"
 AST_election_events.2.desc: "$AST_democratic_party_long$ очолює [AST.GetName] з 1931 року, вивівши націю з Великої депресії та віддаливши від антидемократичних настроїв. Завдяки стабільному керівництву, консервативним поглядам і лояльності до Британії, ОАП зміцнила свою підтримку, і ще один термін стає все більш імовірним. Проте інша партія все ще має право голосу.\n\nВсе ще оговтуючись від вотуму недовіри, який усунув її від влади в 1931 році, $AST_labor_party_long$ починає відновлювати позиції. Коли комуністичні голоси змусили замовкнути, робочий клас шукає новий орієнтир. У своїй місії представляти кожного громадянина, АЛП прийняла інший погляд на імперіалізм та лояльність Австралії до Імперії. Внутрішні потреби мають бути на першому місці, а зовнішні інтереси більше не повинні бути пріоритетом.\n\nДо наступних федеральних виборів залишається півтора року. Якщо ОАП хоче забезпечити собі ще одну перемогу, її лідери повинні прискорити реформи, щоб зберегти підтримку громадськості. Інакше кампанія АЛП може знову відновити їхні позиції."
 AST_election_events.2.a: "ОАП запровадить свої останні реформи."
 AST_election_events.2.b: "Агітаційний тур Австралією підвищить підтримку АЛП."

 AST_election_events.3.t: "$AST_election_season_cat$"
 AST_election_events.3.desc: "$AST_election_season_cat_desc$"
 AST_election_events.3.a: "Починається."

 AST_diplomatic_events.1.t: "Австралійський пакт про ненапад"
 AST_diplomatic_events.1.desc: "У рамках своїх недавніх дипломатичних зусиль уряд Австралії прагне підписати угоди про ненапад з кількома обраними азійськими країнами; ми — одна з них. Чи викриває ця спроба уникнути війни австралійських чиновників як відірваних від реальності, чи малює їх у благородній невинності, наша відповідь частково вирішить це.\n\nЧи підпишемо ми пакт про ненапад з [AST.GetName]?"
 AST_diplomatic_events.1.a: "Безсумнівно — ні."
 AST_diplomatic_events.1.b: "Так, підпишемо."

 AST_diplomatic_events.2.t: "Опір Тихоокеанському пакту"
 AST_diplomatic_events.2.desc: "Делегація, відправлена до [FROM.GetNameDef], телеграфувала відповідь країни на нашу пропозицію щодо пакту про ненапад. Ми знали, що ця ініціатива була амбітною, тому відмова лідера [FROM.GetLeader] не стала великою несподіванкою."
 AST_diplomatic_events.2.a: "Принаймні, це була благородна спроба."

 AST_diplomatic_events.3.t: "Хай живе Тихоокеанський пакт"
 AST_diplomatic_events.3.desc: "Делегація, відправлена до [FROM.GetNameDef], телеграфувала відповідь країни на нашу пропозицію щодо пакту про ненапад. На превелику радість, [FROM.GetLeader] оцінив нашу ініціативу та погодився скріпити її своєю печаткою."
 AST_diplomatic_events.3.a: "Чудово!"

 AST_diplomatic_events.4.t: "Австралія просить Сінгапур"
 AST_diplomatic_events.4.desc: "[AST.GetNameDefCap] давно ставить під сумнів надійність Сінгапурської стратегії; за словами австралійських чиновників, наша здатність прийти їм на допомогу у разі війни на Тихому океані є невизначеною. Передача військово-морської відповідальності в Тихому океані [AST.GetName] зменшила б тягар на британських плечах, але водночас переклала б його на австралійські.\n\nЧи можемо ми бути впевнені, що посилення австралійського контролю забезпечить нашим тихоокеанським підданим і територіям сильніші позиції, ніж якби Сінгапур залишився з нами?"
 AST_diplomatic_events.4.a: "Так, можемо."
 AST_diplomatic_events.4.b: "Сінгапур залишиться нашим."

 AST_diplomatic_events.5.t: "Британія погоджується на наш запит"
 AST_diplomatic_events.5.desc: "Британія погоджується передати Сінгапур під австралійське управління. Це нарешті покладе край застарілій Сінгапурській стратегії, передавши нам керівництво власною обороною."
 AST_diplomatic_events.5.a: "Стратегію переписано!"
 AST_diplomatic_events.5.a.tt: "§YСінгапур§!:\n  Контролюється §YАвстралією§!.\n  Належить §YАвстралії§!.\n§YОстрів Різдва§!:\n  Контролюється §YАвстралією§!.\n  Належить §YАвстралії§!.\n§YКокосові острови§!:\n  Контролюється §YАвстралією§!.\n  Належить §YАвстралії§!."

 AST_diplomatic_events.6.t: "Британія відхиляє наш запит"
 AST_diplomatic_events.6.desc: "Британія відмовляється передати Сінгапур під австралійське управління. Статус-кво збережеться."
 AST_diplomatic_events.6.a: "Сінгапурська стратегія просто повинна вистояти."

 AST_diplomatic_events.7.t: "[AST.GetName] просить нашої допомоги"
 AST_diplomatic_events.7.desc: "[AST.GetNameDefCap] бажає отримати спорядження від союзників для своїх військових потреб і просить нашої допомоги в управлінні необхідними поставками. Чи можемо ми виділити конвої, щоб дозволити [AST.GetName] скористатися ними?"
 AST_diplomatic_events.7.a: "Ми можемо."
 AST_diplomatic_events.7.b: "Ми не можемо."

 AST_diplomatic_events.8.t: "[USA.GetName] погоджується на наш запит"
 AST_diplomatic_events.8.desc: "[USA.GetNameDefCap] погодилися виділити певну кількість конвоїв, щоб допомогти [AST.GetName] з постачанням."
 AST_diplomatic_events.8.a: "Вони стануть у великій нагоді!"

 AST_diplomatic_events.9.t: "[USA.GetName] відхиляє наш запит"
 AST_diplomatic_events.9.desc: "[USA.GetNameDefCap] не має вільних конвоїв для допомоги [AST.GetName] з постачанням."
 AST_diplomatic_events.9.a: "Ми повинні впоратися з поставками самостійно."

 AST_diplomatic_events.10.t: "Воєнний альянс"
 AST_diplomatic_events.10.desc: "[AST.GetNameDefCap] високо цінує союзництво з [USA.GetNameDef] і тепер просить формалізувати його у спільній міжнародній воєнній коаліції. Об'єднавши зусилля, наші дві нації могли б допомагати одна одній у нинішніх та майбутніх конфліктах."
 AST_diplomatic_events.10.a: "Ми маємо погодитися."
 AST_diplomatic_events.10.b: "[USA.GetNameDefCap] буде сильнішою без них."

 AST_diplomatic_events.11.t: "Воєнний альянс"
 AST_diplomatic_events.11.desc: "[USA.GetNameDefCap] погодилися об'єднати зусилля. Як члени [AST.GetFactionName], [AST.GetName] та [USA.GetName] допомагатимуть одна одній у нинішніх та майбутніх конфліктах."
 AST_diplomatic_events.11.a: "Наші вороги боятимуться нас."

 AST_diplomatic_events.12.t: "Відхилений воєнний альянс"
 AST_diplomatic_events.12.desc: "[USA.GetNameDefCap] відхилили нашу пропозицію об'єднати зусилля. [AST.GetNameDefCap] та [USA.GetName] залишаться розділеними у своїх відповідних військових зусиллях."
 AST_diplomatic_events.12.a: "Ми повинні вистояти без них."

 AST_diplomatic_events.13.t: "Стаття 6"
 AST_diplomatic_events.13.desc: "Під час процесу, який об'єднав австралійські колонії у федерацію, Нова Зеландія зрештою вирішила не брати участі. Проте з того часу Конституція Австралії продовжує визначати нас як один із потенційних штатів Співдружності та дозволяє наше приєднання.\n\n[AST.GetName] тепер стверджує, що нинішня ситуація у світі вимагає єдності, і просить, щоб [NZL.GetName] перейшла під австралійське управління. Чи варто нам скликати референдум з цього питання?"
 AST_diplomatic_events.13.a: "Ми скличемо."
 AST_diplomatic_events.13.a.tt: "Буде проведено референдум, що потенційно призведе до §Rанексії§! §Y[NZL.GetName]§!"
 AST_diplomatic_events.13.b: "Абсолютно ні!"

 AST_diplomatic_events.14.t: "[NZL.GetNameDefCap] стає австралійським штатом"
 AST_diplomatic_events.14.desc: "За підсумками нещодавно проведеного референдуму, [NZL.GetName] вирішила застосувати статтю 6 Конституції Австралії. Новозеландці погодилися, що їхні землі будуть у більшій безпеці під австралійським управлінням, і тому вирішили приєднатися до [AST.GetNameDef]."
 AST_diplomatic_events.14.a: "Австралія розширюється."

 AST_diplomatic_events.15.t: "Громадськість Нової Зеландії чинить опір"
 AST_diplomatic_events.15.desc: "За підсумками нещодавно проведеного референдуму, [NZL.GetName] вирішила не застосовувати статтю 6 Конституції Австралії. [NZL.GetNameDefCap] залишиться окремою нацією."
 AST_diplomatic_events.15.a: "Австралія залишиться такою, як є."

 AST_diplomatic_events.16.t: "Урядовці [NZL.GetNameDefCap] чинять опір"
 AST_diplomatic_events.16.desc: "Незважаючи на тиск з боку Австралії, [NZL.GetName] вирішила не проводити референдум щодо застосування статті 6 Конституції Австралії. [NZL.GetNameDefCap] залишиться окремою нацією."
 AST_diplomatic_events.16.a: "Австралія залишається такою, як є."

 AST_diplomatic_events.17.t: "Австралійське партнерство"
 AST_diplomatic_events.17.desc: "Ворог наближається з півночі, і це лише питання часу, коли він опиниться на нашому порозі, принаймні так стверджують австралійські чиновники. [AST.GetNameDefCap] пропонує нам об'єднатися для створення єдиного бар'єру, переважно шляхом передачі [INS.GetName] під австралійське управління, або, щонайменше, надавши право проходу військам."
 AST_diplomatic_events.17.a: "Погодитися на перехід під австралійське управління."
 AST_diplomatic_events.17.a.tt: "§Y[INS.GetNameDefCap]§! стане §Yмаріонеткою§! §Y[AST.GetNameDefCap]§!."
 AST_diplomatic_events.17.b: "Надати право проходу військам."
 AST_diplomatic_events.17.b.tt: "§Y[INS.GetNameDefCap]§! надасть §YПраво проходу військам§! для §Y[AST.GetNameDefCap]§!."
 AST_diplomatic_events.17.c: "Ми не погодимося на жодне."

 AST_diplomatic_events.18.t: "[INS.GetNameDefCap] погоджується на австралійський запит"
 AST_diplomatic_events.18.desc: "[INS.GetName] погодилися на наш запит; наша співпраця матиме великий вплив на обороноздатність обох наших країн."
 AST_diplomatic_events.18.a: "Фантастика!"

 AST_diplomatic_events.19.t: "[INS.GetNameDefCap] відмовляється"
 AST_diplomatic_events.19.desc: "[INS.GetName] відмовляється від нашого запиту; наші нації повинні будуть дбати про власну оборону самостійно."
 AST_diplomatic_events.19.a: "[AST.GetNameDefCap] має пережити конфлікти без них."

 AST_diplomatic_events.20.t: "Виклик до Британського воєнного кабінету"
 AST_diplomatic_events.20.desc: "[GET_AST_BWC_COUNT][ENG.GetNameDefCap] викликає прем'єр-міністра Австралії до Британського воєнного кабінету. Ситуація у світі є жахливою, що спонукає Британію шукати спільні стратегії та військову співпрацю зі своїми союзниками.\n\nОднак Австралія має власні проблеми. Чи можемо ми виділити трохи часу прем'єр-міністра, щоб догодити британцям?"
 AST_diplomatic_events.20.a: "[AST.GetLeader] вирушить до Британії."
 AST_diplomatic_events.20.b: "Він потрібен тут."
 AST_bwc_count_2: "Удруге [ENG.GetLeader] просить про присутність [AST.GetLeader], стверджуючи, що саме наша тісна співпраця визначить результат нашої спільної боротьби.\n\n"
 AST_bwc_count_3: "Укотре [AST.GetLeader] просять перетнути океан, щоб підтримати співпрацю Співдружності. Однак, не варто очікувати багато таких запитів, доки ми чітко не визначимо, чи наші інтереси також пов'язані зі спільними зусиллями, чи з турботою про власні справи.\n\n"
 AST_bwc_accept_effect_tt: "§YЕфекти при прийнятті виклику 3 рази:§!"
 AST_bwc_accept_tt: "Прийняти виклик §Y[?var:AST_bwc_accept]§!/§Y3§! раз(и)"

 AST_diplomatic_events.22.t: "Успішні внески до Британського воєнного кабінету"
 AST_diplomatic_events.22.desc: "Протягом минулого року прем'єр-міністр Австралії регулярно відвідував Британський воєнний кабінет. Хоча самій [AST.GetNameDef] іноді доводилося платити за це ціну, наша нація тепер стала сильнішою завдяки військовій співпраці з Британією."
 AST_diplomatic_events.22.a: "Врешті-решт, це було того варте."

 AST_diplomatic_events.23.t: "[ENG.GetLeader] більше не шукає військового впливу Австралії"
 AST_diplomatic_events.23.desc: "[ENG.GetNameDefCap] кілька разів викликала прем'єр-міністра Австралії до Британського воєнного кабінету, але після неодноразових відмов [ENG.GetLeader] більше не бачить сенсу продовжувати це робити."
 AST_diplomatic_events.23.a: "Це можна зрозуміти."

 AST_diplomatic_events.24.t: "Зміна керівництва"
 AST_diplomatic_events.24.desc: "Прем'єр-міністр Австралії мав великий вплив на військові зусилля Британської Співдружності. Під час своїх регулярних візитів до Лондона Роберт Мензіс здобув довіру британських міністрів, тоді як їхня віра у власного прем'єр-міністра згасла. Міністри тепер змусили лідера [ENG.GetNameDef] піти у відставку, а Мензіса — зайняти його місце.\n\nНавіть якщо [AST.GetName] втратить свого прем'єр-міністра, вона здобуде вічну вірність свого сюзерена, захищену австралійським співвітчизником, який тепер біля керма Британії. Країна на іншому кінці світу бажає більшої влади, і Роберт Мензіс є першим, хто під цим підпишеться."
 AST_diplomatic_events.24.a: "Вітри змінюються."

 AST_diplomatic_events.25.t: "Під владою Канберри"
 AST_diplomatic_events.25.desc: "Зростаюча напруга серед тихоокеанських націй викликає занепокоєння, і оскільки Британія зайнята у власних битвах, наша здатність прийти на допомогу нашим підданим виглядає неправдоподібною; або, принаймні, так стверджує [AST.GetName].\n\nВони прагнуть реконструювати Британську Співдружність так, щоб нації Тихого та Індійського океанів управлялися безпосередньо з Канберри. Чи маємо ми погодитися?"
 AST_diplomatic_events.25.a: "Ми погодимося; Тихоокеанський регіон буде зміцнений під централізованим контролем."
 AST_diplomatic_events.25.b: "Безумовно ні!"

 AST_diplomatic_events.26.t: "Тихоокеанська Співдружність"
 AST_diplomatic_events.26.desc: "[ENG.GetNameDefCap] погоджується; Тихоокеанський регіон буде зміцнений під централізованим контролем. Британські тихоокеанські території були передані під нашу владу."
 AST_diplomatic_events.26.a: "Тихоокеанські нації об'єднують зусилля."

 AST_diplomatic_events.27.t: "Британія відхиляє наш запит"
 AST_diplomatic_events.27.desc: "[ENG.GetNameDefCap] не погоджується; Тихоокеанський регіон не буде зміцнений під централізованим контролем. Тихоокеанські території залишаться під владою Британії."
 AST_diplomatic_events.27.a: "Тим не менш, Австралія вистоїть."

 AST_diplomatic_events.28.t: "[ENG.GetLeader] кидає слухавку"
 AST_diplomatic_events.28.desc: "Телеграфна суперечка прем'єр-міністра з [ENG.GetLeader] не принесла Австралії майже ніякого підкріплення, але посилила обурення британців щодо [AST.GetLeader] за просування інтересів Австралії."
 AST_diplomatic_events.28.a: "Австралія повинна подбати про власну оборону."

 AST_diplomatic_events.29.t: "Британія поспішає на допомогу"
 AST_diplomatic_events.29.desc: "Після тиску Австралії на [ENG.GetNameDef] з метою спровокувати конфлікт із [JAP.GetName], Британія погодилася підтримати наші зусилля з будівництва оборони."
 AST_diplomatic_events.29.a: "Допомога вітається, але вона не відверне японську війну."

 AST_diplomatic_events.30.t: "Австралія просить права на ресурси"
 AST_diplomatic_events.30.desc: "Агресори-експансіоністи дивляться на Індокитай не лише заради самої території, а й заради ресурсів, якими він володіє. Якщо багатства потраплять у ворожі руки, вони лише затягнуть війну, тоді як в австралійських руках вони могли б допомогти її закінчити; принаймні, так стверджує уряд Австралії.\n\nЧи маємо ми погодитися надати їм права на ресурси на нашій території?"
 AST_diplomatic_events.30.a: "Ми погодимося."
 AST_diplomatic_events.30.b: "Ці ресурси не для того, щоб [AST.GetName] їх забирала."

 AST_diplomatic_events.31.t: "[FROM.GetNameDefCap] надає [AST.GetName] права на ресурси"
 AST_diplomatic_events.31.desc: "Агресори-експансіоністи дивляться на Індокитай не лише заради самої території, а й заради ресурсів, якими він володіє. Якщо багатства потраплять у ворожі руки, вони лише затягнуть війну, тоді як в австралійських руках вони могли б допомогти її закінчити; принаймні, так стверджує уряд Австралії.\n\n[ROOT.OVERLORD.GetNameDefCap] погодилася на цей запит."
 AST_diplomatic_events.31.a: "Це поза нашим контролем."

 AST_diplomatic_events.32.t: "[FROM.GetNameDefCap] надає права на ресурси"
 AST_diplomatic_events.32.desc: "[FROM.GetNameDefCap] погоджується, що ресурси Індокитаю краще використовувати в австралійських руках, і надала нам права на них."
 AST_diplomatic_events.32.a: "Вони стануть у великій нагоді."

 AST_diplomatic_events.33.t: "[FROM.GetNameDefCap] відмовляється надати права на ресурси"
 AST_diplomatic_events.33.desc: "[FROM.GetNameDefCap] не погоджується, що ресурси Індокитаю краще використовувати в австралійських руках, і відмовляється надати нам права на них."
 AST_diplomatic_events.33.a: "Сподіваємося, вони не потраплять у ворожі руки."

 AST_diplomatic_events.34.t: "[AST.GetNameDefCap] пропонує розділити тихоокеанські території"
 AST_diplomatic_events.34.desc: "[AST.GetNameDefCap] пропонує пакт; такий, що врегулює потенційні конфлікти між нашими двома націями ще до того, як вони встигнуть виникнути. Розділивши тихоокеанські території між собою, ми зможемо планувати наші майбутні експансії, не побоюючись втручання іншої сторони."
 AST_diplomatic_events.34.a: "Пакт здається розумним."
 AST_diplomatic_events.34.b: "[JAP.GetNameDefCap] буде розширюватися так, як вважає за потрібне."

 AST_diplomatic_events.35.t: "Тихий океан було розділено"
 AST_diplomatic_events.35.desc: "[AST.GetNameDefCap] і [JAP.GetNameDefCap] домовилися, на які тихоокеанські території може поширювати свою експансію кожна країна. Сподіваємось, це дозволить запобігти будь-яким потенційним майбутнім конфліктам між нашими двома державами."
 AST_diplomatic_events.35.a: "Все вирішено!"

 AST_diplomatic_events.36.t: "Тихий океан розділить сам себе"
 AST_diplomatic_events.36.desc: "[JAP.GetNameDefCap] не погоджується розділити тихоокеанські території між нашими двома націями; японський уряд буде розширюватися так, як вважає за потрібне."
 AST_diplomatic_events.36.a: "Як і уряд Австралії."

 AST_diplomatic_events.37.t: "Передача суверенітету"
 AST_diplomatic_events.37.desc: "З невідомих причин [AST.GetName] вирішила передати контроль над нашими землями до [JAP.GetNameDef]. Щось зловісне назріває за лаштунками, і це лише питання часу, коли світ дізнається, що саме."
 AST_diplomatic_events.37.a: "Очевидно, ми не маємо права голосу в цьому питанні."

 AST_diplomatic_events.38.t: "Науруанський пакт"
 AST_diplomatic_events.38.desc: "У результаті Першої світової війни кілька німецьких територій у Тихому океані опинилися під контролем Австралії, але тепер може з'явитися спосіб повернути одну з них: острів Науру.\n\n[AST.GetFascistParty] поділяє цінності, що збігаються з нашими інтересами, однією з яких є повне відділення [AST.GetName] від [ENG.GetNameDef]. Через обмежений наразі вплив руху, його представники шукають нашої підтримки, щоб прискорити своє зростання, і як тільки вони повністю прийдуть до влади, вони наполягають на поверненні контролю над островом Науру — за умови, що ми гарантуємо їхню безпеку, коли вони будуть домагатися незалежності."
 AST_diplomatic_events.38.a: "Наша територія повернеться!"
 AST_diplomatic_events.38.b: "Ми не можемо давати порожні обіцянки."

 AST_diplomatic_events.39.t: "[GER.GetNameDefCap] погоджується на Науруанський пакт"
 AST_diplomatic_events.39.desc: "[GER.GetNameDefCap] та [AST.GetFascistParty] домовилися про спільну мету: [AST.GetName] здобуде незалежність. Через наразі обмежений політичний вплив [AST.GetFascistParty], [GER.GetNameDef] допоможе субсидією, щоб прискорити його зростання, і коли наш вплив більше не буде обмеженим, угода буде виконана в повному обсязі."
 AST_diplomatic_events.39.a: "Чудово!"

 AST_diplomatic_events.40.t: "Науруанський пакт розбитий"
 AST_diplomatic_events.40.desc: "Не маючи змоги взяти на себе обіцянки, які ще не можуть бути виконані, [GER.GetNameDef] відмовляється підтримати наш прихід до влади. Науруанський пакт закінчується, не встигнувши навіть початися, і амбіції [AST.GetFascistParty] повністю залишаться на наших плечах."
 AST_diplomatic_events.40.a: "[AST.GetFascistParty] діятиме без німецької підтримки."

 AST_diplomatic_events.41.t: "Повернення Науру в німецькі руки"
 AST_diplomatic_events.41.desc: "Тепер, маючи повну владу, [AST.GetFascistParty] дотримується своєї обіцянки і виконує свою частину угоди. Науру повертається до [GER.GetNameDef], і ми маємо гарантувати незалежність Австралії."
 AST_diplomatic_events.41.a: "Так ми і зробимо."

 AST_diplomatic_events.42.t: "[AST.GetFascistParty] порушує свою обіцянку"
 AST_diplomatic_events.42.desc: "Обіцянки мають одну фатальну ваду; їх можна порушити. Опинившись біля керма влади, лідери [AST.GetFascistParty] вирішили, що не тільки Науру залишається за ними, але й інші тихоокеанські острови теж.\n\nНаші старі тихоокеанські території залишатимуться такими ж далекими від нас, як і до підписання Науруанського пакту, і якщо ми хочемо змінити це, повинна бути війна."
 AST_diplomatic_events.42.a: "Майбутнє визначить наслідки."

 AST_diplomatic_events.43.t: "[AST.GetNameDefCap] вимагає Південно-Східну Азію"
 AST_diplomatic_events.43.desc: "[AST.GetName] стверджує, що через свою експансію на північ, ми зможемо збільшити наш спільний вплив на дипломатію та конфлікти в Південно-Східній Азії. Хоча це і не пряма вимога, [AST.GetLeader] натякає, що відмова не буде прийнята."
 AST_diplomatic_events.43.a: "Оскільки наша увага зосереджена в іншому місці, це буде на краще."
 AST_diplomatic_events.43.b: "Незважаючи на це, відмову вони й отримають."

 AST_diplomatic_events.44.t: "Передача Південно-Східної Азії"
 AST_diplomatic_events.44.desc: "[ENG.GetNameDefCap] мудро погодилася на передачу своїх територій у Південно-Східній Азії нам. У міру розширення австралійських кордонів зростає і наш вплив, і це лише питання часу, коли світ опиниться біля наших ніг."
 AST_diplomatic_events.44.a: "Майбутнє виглядає світлим."

 AST_diplomatic_events.45.t: "Південно-Східна Азія залишається як є"
 AST_diplomatic_events.45.desc: "[ENG.GetNameDefCap] відмовилася від передачі своїх територій у Південно-Східній Азії нам. Тим не менш, привабливість контролю над регіоном залишається для нас очевидною, і хоча він не стане нашим за запитом, він ще може стати нашим."
 AST_diplomatic_events.45.a: "Так, може."

 #AST_diplomatic_events.46.t was removed

 AST_diplomatic_events.47.t: "Поділ тягаря"
 AST_diplomatic_events.47.desc: "Незважаючи на недавнє відокремлення від Британської Співдружності, [AST.GetName] пропонує військову співпрацю. [AST.GetName] стверджує, що поділ тягаря піде на користь [ENG.GetNameDefCap], враховуючи, наскільки вона розтягнута по всьому світу."
 AST_diplomatic_events.47.a: "Ми маємо погодитися."
 AST_diplomatic_events.47.b: "Ми впораємося самі."

 AST_diplomatic_events.48.t: "Британо-австралійський пакт"
 AST_diplomatic_events.48.desc: "[ENG.GetNameDefCap] погодилася підписати пакт про ненапад, заклавши основу для військової співпраці."
 AST_diplomatic_events.48.a: "Це знаменує собою новий етап у наших відносинах."

 AST_diplomatic_events.49.t: "Непідписаний пакт"
 AST_diplomatic_events.49.desc: "[ENG.GetNameDefCap] відмовилася підписувати пакт про ненапад. Наша спроба налагодити військову співпрацю між нашими двома країнами зазнала невдачі, і ми повинні продовжувати наші наступи самостійно."
 AST_diplomatic_events.49.a: "Так, ми справді повинні."

 AST_diplomatic_events.50.t: "Австралійський тихоокеанський гарнізон"
 AST_diplomatic_events.50.desc: "Хоча захист Південно-Східної Азії та Тихого океану в інтересах Британії, цей регіон знаходиться далеко від Британських островів; це розуміє і [FROM.GetName]. В обмін на нашу підтримку в постачанні, вона запропонувала взяти на себе командування обороною території, що дозволить нам спрямувати нашу увагу на інше."
 AST_diplomatic_events.50.a: "Допомога [FROM.GetName] буде вітатися."
 AST_diplomatic_events.50.b: "Регіон розташований досить близько."

 AST_diplomatic_events.51.t: "Тихоокеанський гарнізон [ENG.GetNameDefCap]"
 AST_diplomatic_events.51.desc: "[FROM.GetNameDefCap] погоджується; води Південно-Східної Азії захищатимемо ми. В обмін на поставки палива від Британії, [ROOT.GetName] докладе зусиль для збільшення військово-морського домінування в сусідніх водах."
 AST_diplomatic_events.51.a: "Води будуть нашими."

 AST_diplomatic_events.52.t: "Власний тихоокеанський гарнізон Австралії"
 AST_diplomatic_events.52.desc: "[FROM.GetNameDefCap] не погоджується; їм не потрібна допомога у захисті вод Південно-Східної Азії. Проте, з підтримкою Британії чи без неї, [ROOT.GetName] докладе зусиль для збільшення військово-морського домінування в сусідніх водах."
 AST_diplomatic_events.52.a: "Води будуть нашими."

 AST_diplomatic_events.53.t: "Віші геть з Африки"
 AST_diplomatic_events.53.desc: "[AST.GetName] підозрює, що падіння або співпраця Вішістської Франції є однією з головних цілей [ENG.GetNameDef], і тому запропонувала приєднатися і переслідувати французькі африканські колонії, доки Віші не буде підкорено. Хоча за пропозицією можуть стояти невідомі мотиви, безсумнівно, збільшення присутності союзників у регіоні піде нам на користь.\n\nЯкщо ми дамо наш дозвіл, [AST.GetName] ініціює переговори з Вішістською Францією з метою мирної передачі їхніх колоній та створення австралійського гарнізону."
 AST_diplomatic_events.53.a: "Ми вітатимемо їхню підтримку."
 AST_diplomatic_events.53.b: "Ризик того, що [AST.GetName] використає це проти нас, занадто великий."

 AST_diplomatic_events.54.t: "Їм на допомогу"
 AST_diplomatic_events.54.desc: "[ENG.GetNameDefCap] погоджується: збільшення присутності союзників у Африці принесе користь Співдружності.\n\nМи ініціюємо переговори з Вішістською Францією з метою мирної передачі їхніх колоній та створення австралійського гарнізону."
 AST_diplomatic_events.54.a: "Так ми і зробимо."

 AST_diplomatic_events.55.t: "З дозволом або без"
 AST_diplomatic_events.55.desc: "[ENG.GetNameDefCap] відхиляє австралійську допомогу в Африці і сама займеться питанням Вішістської Франції. Проте наші амбіції не так легко відхилити.\n\nАвстралійський контроль над африканськими територіями Вішістської Франції зробить нас рівнею Британській Співдружності, а не її підлеглим. Ми повинні переслідувати їх попри бажання [ENG.GetNameDef], хоча це і доведеться робити силою."
 AST_diplomatic_events.55.a: "Ми розширюватимемося."

 AST_diplomatic_events.56.t: "[AST.GetName] вимагає африканські території"
 AST_diplomatic_events.56.desc: "Від імені [ENG.GetNameDef], [AST.GetName] стукає в наші двері, вимагаючи передачі африканських територій.\n\n[ENG.GetNameDefCap] налаштована розширити свій контроль в Африці, і якщо ми не схилимося перед австралійською окупацією, вони повернуться на наш поріг зі зброєю."
 AST_diplomatic_events.56.a: "Щоб уникнути конфлікту, території буде передано."
 AST_diplomatic_events.56.b: "Тоді нехай повертаються зі зброєю."

 AST_diplomatic_events.57.t: "Віші передає африканські території"
 AST_diplomatic_events.57.desc: "Вішістська Франція погодилася передати нам африканські території і дозволила австралійському гарнізону захопити контроль над регіоном."
 AST_diplomatic_events.57.a: "Подальша експансія в Африку триватиме!"

 AST_diplomatic_events.58.t: "Віші відмовляє [AST.GetName] у територіях"
 AST_diplomatic_events.58.desc: "Вішістська Франція відмовляється передавати нам африканські території. Втім, це було не прохання, а вимога.\n\nМи будемо домагатися контролю над регіоном, у якому вони нам відмовили, хоча це доведеться робити силою."
 AST_diplomatic_events.58.a: "Мирним шляхом чи ні, [AST.GetName] розширюватиметься."

 #AST_diplomatic_events.59 was removed

 #AST_diplomatic_events.60 was removed

 #AST_diplomatic_events.61 was removed

 AST_diplomatic_events.62.t: "Антибританський пакт?"
 AST_diplomatic_events.62.desc: "Дипломати з [AST.GetName] прийшли до нас із пропозицією укласти Антибританський пакт. Це передбачає їхню допомогу в поверненні північної Ірландії від англосаксів, без нашого прямого втручання.\n Натомість, у разі їхнього успіху, ми приєднаємося до їхньої фракції та допоможемо їм у майбутній війні проти Британії, якщо така станеться.\nХоча об'єднання з північчю є привабливим, ми повинні ретельно обдумати, чи в тому ми становищі, щоб так відкрито ворогувати з нашим сильнішим сусідом, і що важливіше, чи зможемо ми вийти переможцями у разі конфлікту — щоб уся Ірландія знову не стала простою британською колонією."
 AST_diplomatic_events.62.a: "Об'єднання не може чекати! Підписати пакт!"
 AST_diplomatic_events.62.b: "Це надто небезпечно."

 AST_diplomatic_events.63.t: "Ірландія відмовляється!"
 AST_diplomatic_events.63.desc: "Ірландія відмовилася підписувати Антибританський пакт."
 AST_diplomatic_events.63.a: "Тоді Ірландія залишиться розділеною."

 AST_diplomatic_events.64.t: "Ірландія погоджується!"
 AST_diplomatic_events.64.desc: "Ірландія погодилася підписати Антибританський пакт."
 AST_diplomatic_events.64.a: "Вперед, на Белфаст!"

 AST_diplomatic_events.65.t: "[FROM.GetName] надає підтримку"  ### Support for the Chinese Communists - Sends event from AST to PRC offering support
 AST_diplomatic_events.65.desc: "Зростаючий вплив [FROM.GetCommunistParty] у [FROM.GetNameDef] тепер приносить свої плоди: її представники перетнули Китай, щоб повідомити нас про формування [FROM.GetAdjective] добровольчих сил, які мобілізуються для підтримки наших військ. Крім того, ці добровольці привозять запасне спорядження, щоб допомогти оснастити наші власні сили."
 AST_diplomatic_events.65.a: "Хороший старт для співпраці з нашими [FROM.GetAdjective] товаришами"
 #AST_diplomatic_events.65.b: "Вони повинні зосередитися на власній революції"

 AST_diplomatic_events.66.t: "[FROM.GetName] дякує нам за підтримку" ### Support for the Chinese Communists - They accept
 AST_diplomatic_events.66.desc: "Представники [FROM.GetLeader] передали його подяку за підтримку наших добровольців та за надані військові матеріали. Багатий [FROM.GetAdjective] досвід громадянської війни, безумовно, означає, що ці ресурси будуть використані ефективно."
 AST_diplomatic_events.66.a: "Відмінний перший крок"

 AST_diplomatic_events.67.t: "[FROM.GetName] дякує нам за підтримку" ### Support for the Chinese Communists - They accept
 AST_diplomatic_events.67.desc: "Представники [FROM.GetLeader] передали його подяку за підтримку наших добровольців та за надані військові матеріали. Багатий [FROM.GetAdjective] досвід громадянської війни, безумовно, означає, що ці ресурси будуть використані ефективно."
 AST_diplomatic_events.67.a: "Відмінний перший крок"

 AST_diplomatic_events.68.t: "Австралійські вимоги"
 AST_diplomatic_events.68.desc: "Австралія не бажає сама протистояти своєму переважаючому ворогу — [JAP.GetNameDef]. Вони тиснуть на нас, щоб ми зробили перший крок і врегулювали назріваючий конфлікт якнайшвидше."
 AST_diplomatic_events.68.a: "Як все змінилося."

 AST_diplomatic_events.69.t: "Знову пов'язані"
 AST_diplomatic_events.69.desc: "Зв'язок між [ENG.GetNameDef] та [AST.GetName] проходить випробування, але остання рішуче налаштована відновити його на повну силу. [AST.GetName] має такі зв'язки та союзників у британському уряді, що її лідери просто не можуть їм відмовити; нації знову ввійдуть до однієї фракції, і Острови та країна на іншому кінці світу знову працюватимуть разом."
 AST_diplomatic_events.69.a: "Так і буде."

 AST_diplomatic_events.71.t: "Австралія вимагає Тихоокеанські острови"
 AST_diplomatic_events.71.desc: "[AST.GetName] вимагає контролю над нашими тихоокеанськими островами, стверджуючи, що західна частина Тихого океану не підпорядковується командуванню [USA.GetNameDef]. Острови можуть бути невеликою ціною за вгамування ворожості Австралії, але це все одно ціна. Чи варто нам ризикувати провокувати висхідну фашистську державу, хоча у нас і так повно клопоту?"
 AST_diplomatic_events.71.a: "Ні, ми не будемо."
 AST_diplomatic_events.71.b: "Тихоокеанські острови залишаться нашими."

 AST_diplomatic_events.72.t: "Передача тихоокеанських островів [USA.GetNameDef]"
 AST_diplomatic_events.72.desc: "Оскільки у них і так повно клопоту, тихоокеанські острови виявилися невеликою ціною для [USA.GetNameDef], щоб заспокоїти ворожість Австралії. Їхні тихоокеанські острови тепер наші."
 AST_diplomatic_events.72.a: "Чудово."

 AST_diplomatic_events.73.t: "[USA.GetNameDefCap] відмовляється"
 AST_diplomatic_events.73.desc: "[USA.GetNameDefCap] відмовилася здати нам свої тихоокеанські острови. Незважаючи на наші вимоги та зростаючий вплив у Тихому океані, Вашингтон не бажає відмовлятися від контролю над островами."
 AST_diplomatic_events.73.a: "Острови ще можуть стати нашими."

 AST_diplomatic_events.74.t: "Австралійська вимога про передачу Філіппін"
 AST_diplomatic_events.74.desc: "У своїх амбіціях розширити свої території, [AST.GetName] вимагає контролю над [PHI.GetNameDef]. У разі нашої відмови [AST.GetName] погрожує війною, вважаючи просто неприпустимим те, що [USA.GetNameDef] зберігає території в межах сфери впливу [AST.GetName]."
 AST_diplomatic_events.74.a: "Ми не можемо ризикувати війною; задовольнити їхні вимоги."
 AST_diplomatic_events.74.b: "Філіппіни залишаться нашими!"

 AST_diplomatic_events.75.t: "Передача [PHI.GetNameDef]"
 AST_diplomatic_events.75.desc: "Зрозуміло, що становлення [AST.GetName] як фашистської держави починає приносити певні плоди, коли нації настільки бояться нашого гніву. [USA.GetNameDefCap] погодилася; [PHI.GetNameDef] тепер наша."
 AST_diplomatic_events.75.a: "Виникає новий порядок."

 AST_diplomatic_events.76.t: "[USA.GetNameDefCap] відмовляється"
 AST_diplomatic_events.76.desc: "[USA.GetNameDefCap] відмовилася віддати нам [PHI.GetNameDef]. Незважаючи на наші вимоги та зростаючий вплив у Тихому океані, Вашингтон не бажає відмовлятися від контролю над територією."
 AST_diplomatic_events.76.a: "Це означає війну."

 AST_diplomatic_events.78.t: "[AST.GetName] просить гарантій проти гіганта"
 AST_diplomatic_events.78.desc: "[AST.GetNameDefCap] ділиться з нами своїми сміливими планами:\n\n'Тінь [USA.GetNameDefCap] нависла над нами, загрожуючи втрутитися щоразу, коли наші дії не збігаються з її інтересами. З глобальною державою такого масштабу, яка втручається у справи Австралії та Японії, Східна Азія ніколи не належатиме нам по-справжньому. Тому [AST.GetName] вступить у війну.'\n\nПрем'єр-міністр [AST.GetLeader] чітко висловлює свої наміри: [AST.GetName] збирається кинути виклик [USA.GetNameDef], і просить нашої допомоги у випадку, якщо американці виявляться занадто могутніми, щоб подолати їх наодинці."
 AST_diplomatic_events.78.a: "Ми гарантуємо їхню безпеку."
 AST_diplomatic_events.78.b: "[JAP.GetNameDefCap] має свої справи."

 AST_diplomatic_events.79.t: "[JAP.GetNameDefCap] гарантує незалежність [AST.GetName]"
 AST_diplomatic_events.79.desc: "Не лише нам зрозуміло, що втручання [USA.GetNameDef] у дипломатію Азії та Океанії є небажаним і неприйнятним. [JAP.GetNameDefCap] погодилася надати гарантії нашій нації, дозволяючи нам високо тримати наш стяг проти ворогів, знаючи, що союзник прийде на допомогу, якщо американці виявляться занадто могутніми, щоб подолати їх наодинці."
 AST_diplomatic_events.79.a: "Ми йдемо на війну."

 AST_diplomatic_events.80.t: "[JAP.GetNameDefCap] відмовляється нас гарантувати"
 AST_diplomatic_events.80.desc: "Втручання [USA.GetNameDef] у дипломатію Азії та Океанії є небажаним і неприйнятним, але, схоже, це зрозуміло лише нам. [JAP.GetNameDefCap] відмовляється гарантувати нашу незалежність, змушуючи нас кидати виклик нашим ворогам без них."
 AST_diplomatic_events.80.a: "Так ми і зробимо."

 AST_diplomatic_events.81.t: "Чарівний символ єдності"
 AST_diplomatic_events.81.desc: "Зацікавленість британського прем'єр-міністра тваринами навряд чи пройшла повз чиюсь увагу, оскільки його колекція досить вражаюча. Будь-яке поповнення до його різноманітної сім'ї істот обов'язково буде оцінене, а тим паче екзотичне.\n\nСам [ENG.GetLeader] висловив зацікавленість в австралійському качкодзьобі, і хоча його експорт наразі заборонений через ризики для здоров'я маленької істоти під час транспортування, можливо, варто зробити виняток.\n\nЧи маємо ми задовольнити бажання прем'єр-міністра як символ єдності?"
 AST_diplomatic_events.81.a: "[ENG.GetLeader] отримає свого качкодзьоба."
 AST_diplomatic_events.81.b: "Заборону на експорт не буде знято, навіть для прем'єр-міністра."

 AST_diplomatic_events.82.t: "Сумний звіт від [ENG.GetLeader]"
 AST_diplomatic_events.82.desc: "Транспорт з качкодзьобом, що відчалив із порту Мельбурна шість тижнів тому з повноцінним платипусорієм на борту, прибув до [ENG.GetNameDef]. Однак прибуття корабля не було радісним, адже тварина виявилася мертвою. [ENG.GetLeader] оплакує свого втраченого улюбленця, якого він навіть назвав на свою честь, очікуючи на його прибуття, але стверджує, що в його загибелі винні вороги. Очевидно, вибухи від підводної атаки налякали качкодзьоба до смерті.\n\nОднак бортовий журнал доглядача качкодзьоба вказує на іншу ймовірну причину смерті: температура води та повітря в платипусорії значно перевищувала допустимі норми.\n\nНезалежно від обставин, Качкодзьоб [ENG.GetLeader] мертвий, а британський прем'єр-міністр залишиться без качкодзьоба."
 AST_diplomatic_events.82.a: "Дійсно сумна новина."

 AST_political_events.1.t: "Заклик до референдуму"
 AST_political_events.1.desc: "Є дві сфери, в яких ми, як уряд, прагнемо посилити федеральний контроль: Авіація та Маркетинг.\n\nЩодо авіації, мета полягає у внесенні поправок до Конституції, щоб надати Парламенту Співдружності повноваження ухвалювати закони щодо аеронавігації та літальних апаратів.\n\nПоправка щодо маркетингу має дозволити співпрацю між Співдружністю та Штатами у сфері маркетингу, що наразі є конституційно неможливим.\n\nЗ якого питання ми скличемо референдум?"
 AST_political_events.1.a: "Авіація, щоб регулювати аеронавігацію по всій території [AST.GetName]."
 AST_political_events.1.a.tt: "Коли реформа буде прийнята:\n Додає §YПрийнята авіаційна реформа§!, що дає:\n Швидкість авіаційних досліджень: §G+15%§!\n Швидкість будівництва §YАвіабаз§!: §G+5.00%§!"
 AST_political_events.1.b: "Маркетинг, для координації загальнонаціональних схем збуту сільськогосподарської продукції."
 AST_political_events.1.b.tt: "Коли реформа буде прийнята:\n Додає §YПрийнята маркетингова реформа§!, що дає:\n Фабрики споживчих товарів: §Y-10.0%§!"

 AST_political_events.2.t: "Успішний референдум"
 AST_political_events.2.desc.a: "Громадськість погодилася на впровадження нашої авіаційної реформи. Оскільки авіація не існувала на момент написання Конституції Австралії, це цілком справедливо, що уряд нарешті бере під свій контроль аеронавігацію та її регулювання. Задля безпеки та ефективності тепер будуть запроваджені єдині національні авіаційні закони."
 AST_political_events.2.desc.b: "Громадськість погодилася на впровадження нашої маркетингової реформи. Маючи повноваження регулювати сільськогосподарську продукцію та її збут, уряд тепер зможе стабілізувати ринки та покращити співпрацю між штатами. Доходи фермерів стануть стабільнішими, як і національна економіка."
 AST_political_events.2.a: "Федеральний контроль розширюватиметься!"

 AST_political_events.4.t: "Прем'єр-міністр помирає"
 AST_political_events.4.desc: "Лідери [AST.GetName] довго працювали під тиском військових приготувань, і нарешті напруга забрала свою найбільшу жертву; прем'єр-міністр помер від серцевого нападу.\n\nЗ огляду на поточну ситуацію у світі, його керівництва дуже не вистачатиме. Тим не менш, Австралія повинна рухатися далі з новим лідером біля керма: [AST.GetLeader]."
 AST_political_events.4.a: "Національна трагедія."

 AST_political_events.5.t: "Австралійський уряд стає жорсткішим"
 AST_political_events.5.desc: "Утворилася група зухвалих і суперечливих голосів: Рух «Австралія передусім». Уряд побоюється, що його наміри можуть бути не зовсім демократичними, і вирішив взяти групу, а також її членів, під нагляд. Втручання демократів знизить наші можливості до організації та придушить вербування нових членів."
 AST_political_events.5.a: "Тільки час покаже справжню природу руху."

 AST_political_events.6.t: "Півторастолітній ювілей 1938 року"
 AST_political_events.6.desc: "Сьогодні, коли розгорталося святкування півторастолітнього ювілею, а процесія 'Австралійський марш до нації' пройшла головними вулицями Сіднея, в 'Австралія Гол' відбувся протест.\n\nАктивісти за права аборигенів та різні групи зібралися, щоб привернути увагу до того факту, що 150-річчя не лише знаменує початок британської колонізації, але й конституційну дискримінацію аборигенних народів. Активісти вимагали нових законів для освіти та піклування про аборигенів, а також нової політики, що дозволить надати корінним народам статус повноправних громадян."
 AST_political_events.6.a: "Необхідно вжити заходів."

 AST_political_events.7.t: "Імперський тиск"
 AST_political_events.7.desc: "Після недавніх подій вже неможливо заперечувати, що політика Австралії змінюється. [ENG.GetNameDefCap] вжила заходів, щоб дипломатично переконатися, що [AST.GetName] залишається на шляху, який підходить для нації під егідою їхньої Співдружності, сподіваючись, що їхнього мирного поштовху в правильному напрямку буде достатньо, щоб утримати їхній Домініон лояльним."
 AST_political_events.7.a: "Незважаючи на спроби Британії, [AST.GetName] сама визначатиме свій шлях."

 AST_political_events.8.t: "Війна наближається"
 AST_political_events.8.desc: "$AST_war_is_coming_cat_desc$"
 AST_political_events.8.a: "Ми повинні готуватися."

 AST_political_events.9.t: "Далфрамський конфлікт"
 AST_political_events.9.desc: "Те, що почалося як суперечка через завантаження чавуну, переросло в щось набагато більше. Робітники по всій Австралії кидають роботу на знак солідарності, кидаючи виклик як уряду, так і промисловості. У міру поширення страйків і зростання напруженості, криза розгортається і вимагає відставки тих, хто перебуває при владі. Тож, не зумівши повністю взяти ситуацію під контроль, уряд робить саме це, залишаючи посаду правлячої партії відкритою для [AST.GetCommunistParty]."
 AST_political_events.9.a: "І ми її займемо."

 AST_canberra_air_disaster_events.1.t: "Авіакатастрофа в Канберрі"
 AST_canberra_air_disaster_events.1.desc: "Сьогодні неподалік Канберри розбився літак Lockheed Hudson. Серед десяти людей на борту був командувач армії та його штаб, які летіли на виклик до Кабінету міністрів. Вони та екіпаж трагічно загинули.\n\nЩо спричинило катастрофу — залишається загадкою; погода була ідеальною для польотів, а літаком керував досвідчений офіцер Королівських ВПС Австралії Роберт Гічкок.\n\nНезалежно від причин, це похмурий день для всієї нації — не в останню чергу для родин і друзів жертв — і тепер Австралія дивиться на своїх лідерів. Як вони відреагують?"
 AST_canberra_air_disaster_events.1.a: "Жахливо трагічна подія."
 AST_canberra_air_disaster_events.1.a.tt: "Розблоковує §Yрішення 'Довіра Кабінету'§! та §Yмісію§! на збереження або усунення чинного уряду."

 AST_canberra_air_disaster_events.2.t: "[AST.GetRulingParty] здобуває перемогу"
 AST_canberra_air_disaster_events.2.desc: "Чинний уряд успішно провів Австралію через національні потрясіння, що виникли після авіакатастрофи в Канберрі. Немов дороговказ, [AST.GetRulingParty] довела свою надійність і силу в скрутні часи, зрештою підвищивши суспільну підтримку по всій країні."
 AST_canberra_air_disaster_events.2.a: "Майбутнє попереду."

 AST_canberra_air_disaster_events.3.t: "Вотум недовіри"
 AST_canberra_air_disaster_events.3.desc: "Після успішного вотуму недовіри чинний уряд нарешті замінюють, і він неохоче передає кермо влади своїм наступникам. Після періоду політичної нестабільності та суспільної недовіри Австралія готова до нового початку."
 AST_canberra_air_disaster_events.3.a: "Нове керівництво на допомогу Австралії."

 AST_canberra_air_disaster_events.4.t: "Зміна керівництва"
 AST_canberra_air_disaster_events.4.desc: "Після періоду політичної нестабільності та суспільної недовіри, [AST.GetRulingParty] замінює своє керівництво. Більшість голосів змушує прем'єр-міністра піти у відставку, дозволяючи його наступнику зайняти місце за трибуною."
 AST_canberra_air_disaster_events.4.a: "Сподіваємося, це прокладе шлях для Австралії."

 AST_canberra_air_disaster_events.5.t: "Австралійські звинувачення"
 AST_canberra_air_disaster_events.5.desc: "На прес-конференції [AST.GetName] кинула звинувачення в наш бік, стверджуючи, що ми несемо відповідальність за нещодавню авіакатастрофу на території Австралії, в результаті якої загинули кілька політичних чиновників.\n\nЦі звинувачення, звісно, є абсолютно неправдивими, що робить цю неповагу лише ще більш зловмисною."
 AST_canberra_air_disaster_events.5.a: "Претензії неправдиві, нам не потрібно діяти."
 AST_canberra_air_disaster_events.5.b: "Це не залишиться безкарним."

 AST_canberra_air_disaster_events.6.t: "[JAP.GetNameDefCap] відповідає ударом на удар"
 AST_canberra_air_disaster_events.6.desc: "[JAP.GetNameDefCap] не сприйняла наші звинувачення легковажно, вважаючи їх першим актом агресії. [JAP.GetLeader] пішов на подальшу ескалацію конфлікту, заявивши, що тепер його нація має повне право вторгнутися на наші землі."
 AST_canberra_air_disaster_events.6.a: "Ми більше не будемо посилювати напругу."
 AST_canberra_air_disaster_events.6.b: "Це не може залишитися без відповіді."

 INS_limited_war_events.1.t: "Знищити Малайю!"
 INS_limited_war_events.1.desc: "Ворожі лінії прорвано, і наші люди безперешкодно просуваються вперед. По той бік протоки британська клієнтська держава руйнується під тягарем народного гніву. Маріонетки Лондона думали, що їхні багнети захистять їх від історії. Вони помилялися."
 INS_limited_war_events.1.a: "Мердека!"
 INS_limited_war_events.1.b: "Чудовий день для Республіки."

 INS_limited_war_events.2.t: "Контрудар [FROM.GetAdjective]"
 INS_limited_war_events.2.desc: "Те, що обіцяли як швидкий удар по маріонетковому режиму, обернулося невдачею. Війська [FROM.GetAdjective], підсилені своїми імперськими спонсорами, витіснили наших людей із спірної території і тепер сидять на ній як окупанти. Щодня радіо розносить звістки про їхні хвастощі. Продовжувати натиск означає накликати на себе подальше приниження, але відступити — це визнати поразку перед усім архіпелагом."
 INS_limited_war_events.2.a: "Відведіть людей. Врятуйте все, що зможемо."
 INS_limited_war_events.2.b: "Ми не здамося маріонеткам!"

 INS_limited_war_events.3.t: "[FROM.GetName] схиляється перед Республікою"
 INS_limited_war_events.3.desc: "Надійшли звістки з Куала-Лумпура. Маріонетковий уряд, покинутий у вирішальний час своїми лондонськими господарями, прийняв наші умови, щоб не бачити, як горять їхні міста. Спірні землі — наші. Цей урок не пройде повз інші клієнтські держави регіону."
 INS_limited_war_events.3.a: "Індонезія піднімається."

 INS_limited_war_events.4.t: "[FROM.GetName] відкидає наші умови"
 INS_limited_war_events.4.desc: "[FROM.GetName] кинула нашу пропозицію нам в обличчя. Маріонеткові міністри, читаючи за сценарієм, написаним у Вайтголлі, заявляють, що жодної п'яді землі не буде здано, і що сама Республіка повинна бути підкорена до того, як замовкнуть гармати."
 INS_limited_war_events.4.a: "Тоді нехай говорять гармати."

 INS_limited_war_events.5.t: "[FROM.GetNameDef] закликає до нашого знищення"
 INS_limited_war_events.5.desc: "[FROM.GetNameDefCap] відкинула останню ілюзію зваженої війни. У їхніх ефірах тепер відкрито говорять про розчленування Республіки та поділ її островів між старими колоніальними господарями. Цій справі не буде тихого кінця. Індонезія або вистоїть у кінці, або не вистоїть взагалі."
 INS_limited_war_events.5.a: "Ми вистоїмо або впадемо разом."

 INS_limited_war_events.6.t: "Наступ [FROM.GetAdjective] сповільнюється"
 INS_limited_war_events.6.desc: "Удар [FROM.GetAdjective] застав нас зненацька, і на деякий час ми боялися найгіршого. Але їхній наступ загруз у багнюці. Їхні люди втомилися, лінії постачання довгі, а погрози з Лондона стають слабшими з кожним комюніке. Республіка ще може бути великодушною і запропонувати маріонеткам вихід з цієї ситуації, хоча багато хто скаже, що чиста перемога служить справі краще, ніж зважена."
 INS_limited_war_events.6.a: "Запропонуйте їм умови."
 INS_limited_war_events.6.b: "Жодної пощади маріонеткам."

 INS_limited_war_events.7.t: "Наш наступ зупиняється"
 INS_limited_war_events.7.desc: "Наш наступ зупинився, і що гірше, ворог про це знає. З-за протоки надійшла вимога. Скласти зброю зараз і прийняти їхні умови, або дивитися, як зростають списки жертв заради того самого результату. Вибір, який вони пропонують, — це лише масштаб похорону."
 INS_limited_war_events.7.a: "Краще поганий мир, ніж гірша війна."
 INS_limited_war_events.7.b: "Республіка не здається."

 INS_limited_war_events.8.t: "[FROM.GetName] відмовляється схилитися"
 INS_limited_war_events.8.desc: "[FROM.GetName] відповіла на нашу пропозицію зухвальством. Їхні міністри проголошують, що вони краще побачать, як кожен кампонг від Пенанга до Джохора спалять дотла, ніж поступляться Республіці хоч однією концесією. Отже, війна триває."
 INS_limited_war_events.8.a: "Тоді нехай буде так."

 INS_limited_war_events.9.t: "[FROM.GetName] має намір зламати Республіку!"
 INS_limited_war_events.9.desc: "Радіоперехоплення ворожого командування підтвердили найгірше. Не буде ніякого врегулювання, ніякого зваженого миру, ніякого повернення до рубежів, які ми тримали раніше. Маріонетки та їхні лондонські господарі вимагають повної капітуляції Республіки, щоб Індонезію зламали, а її острови повернули під імперіалістичний чобіт, з-під якого ми їх вирвали. На це є лише одна відповідь."
 INS_limited_war_events.9.a: "Індонезія вистоїть!"

### AST - Union Control Events ###
 AST_union_control_events.1.t: "Іноземні агенти в наших профспілках"
 AST_union_control_events.1.desc: "Спецслужби довели до відома уряду тривожний звіт. Австралійські комуністичні агенти встановлюють контакти з місцевими лідерами профспілок, поширюючи радикальну літературу та заохочуючи робітників об'єднуватися за революційними напрямками. Наразі рух залишається невеликим, але чиновники з безпеки попереджають, що саме з цього такі речі і починаються. Рішення потрібно прийняти до того, як воно вкоріниться."
 AST_union_control_events.1.a: "Тримайте їх під наглядом. Ми будемо спостерігати і чекати."

 AST_union_control_events.4.t: "Комуністичні диверсанти захоплюють території [MAL.GetAdjective]"
 AST_union_control_events.4.desc: "До уряду дійшов шокуючий звіт. У результаті скоординованої операції було захоплено один із наших штатів і оголошено його частиною революційного уряду. Швидкість та організація нападу викликали незручні запитання — наші спецслужби підозрюють, що повстанці діяли не самі, і що до наших берегів їх могли направити іноземні сили. Ті, хто врятувався під час захоплення, не здалися. Вони перегрупувалися і взялися за зброю, налаштовані повернути те, що у них забрали."
 AST_union_control_events.4.a: "Дізнайтеся, хто за цим стоїть. Ці повстанці недовго утримуватимуть цю землю."
 AST_union_control_events.4.a.tt: "Антикомуністичні формування ополчення об'єдналися і сформувалися для опору комуністичній окупації."

 AST_union_control_events.5.t: "Катастрофа [MAL.GetAdjective]"
 AST_union_control_events.5.desc: "Операція закінчилася катастрофою. Наші війська так і не дісталися берега. Вони були відкинуті лоялістськими патрулями, загубилися в протоках або були захоплені до того, як змогли закріпитися на позиціях. Деталі неясні, але результат очевидний. Гірше того, до преси дійшли чутки про цю справу. Тепер у парламенті лунають питання про те, що саме робили наші сили в тих водах. Реакцією громадськості стали шок і збентеження. Які б здобутки ми не сподівалися забезпечити для революції, нам доведеться шукати інший шлях."
 AST_union_control_events.5.a: "Жахлива невдача. Ми повинні звернутися до інших шляхів, щоб підтримати наших товаришів."

 AST_union_control_events.3.t: "Вибухає революція в [MAL.GetNonIdeologyName]"
 AST_union_control_events.3.desc: "Робітники [MAL.GetNonIdeologyName] повстали. Комуністичні осередки, які ми підтримували впродовж нашої довгої кампанії, взялися за зброю по всій країні — але картина з місця подій тривожна. Революційні сили опинилися сконцентрованими в невідповідних районах, відрізані від центру півострова водою і джунглями. Без плацдарму на материку уряд просто перечекає їх і заморить революцію голодом ще до того, як вона встигне поширитися. Австралія повинна діяти таємно і швидко, щоб висадити бійців на півострів і дати революції землю, необхідну для виживання."
 AST_union_control_events.3.a: "Ми не можемо дозволити революції померти на березі. Забезпечте їм плацдарм."

 AST_union_control_events.2.t: "Агітатори за підтримки [AST.GetAdjective] на наших вулицях"
 AST_union_control_events.2.desc: "Агенти австралійського комуністичного уряду прибули в наші міста. Вони не ховаються — біля воріт заводів лунають брошури, на площах звучать промови, а між австралійськими агентами та місцевими радикальними групами встановлюються мережі солідарності. Наявні мережі іноземного впливу нібито активізувалися за одну ніч. Це скоординована кампанія, і уряд повинен вирішити, як реагувати, перш ніж народне невдоволення перетвориться на щось важко кероване."
 AST_union_control_events.2.b: "Тривожний розвиток подій."

###########################
##### ABDACOM EVENTS ######
###########################

 ABDA_events.1.t: "Запрошення до нового Верховного командування"
 ABDA_events.1.desc: "[FROM.GetNameDef] створило спільне верховне командування для Тихоокеанського театру воєнних дій і надіслало нам запрошення приєднатися. Ця ініціатива — відома як ABDACOM — прагне об'єднати військово-морські, військово-повітряні та сухопутні сили союзних країн, що діють у регіоні, під єдиною структурою командування. Членство означатиме тіснішу координацію з [FROM.GetNameDef] та іншими партнерами, які вже віддані цій справі. Ми повинні вирішити, чи приймати запрошення."
 ABDA_events.1.a: "Ми будемо стояти разом."
 ABDA_events.1.b: "Ми не можемо взяти на себе ці зобов'язання в даний час."

 ABDA_events.2.t: "[FROM.GetName] приєднується до ABDACOM"
 ABDA_events.2.desc: "[FROM.GetNameDef] прийняла наше запрошення приєднатися до Верховного командування ABDACOM. Їхні сили відтепер діятимуть під спільним командуванням, що зміцнить наші позиції на Тихоокеанському театрі."
 ABDA_events.2.a: "Бажаний розвиток подій."

 ABDA_events.3.t: "[FROM.GetName] відмовляється приєднатися"
 ABDA_events.3.desc: "[FROM.GetNameDef] відхилила наше запрошення приєднатися до Верховного командування ABDACOM. Наразі їхні сили не будуть залучені до спільних зусиль, хоча двері все ще можуть залишатися відкритими."
 ABDA_events.3.a: "Прикро."

 ABDA_events.5.t: "Запрошення приєднатися до ABDACOM"
 ABDA_events.5.desc: "[FROM.GetNameDef] надіслала нам запрошення приєднатися до Американсько-Британсько-Голландсько-Австралійського командування. ABDACOM вже зарекомендував себе як верховний координаційний орган союзних військ на Тихоокеанському театрі, об'єднавши флоти та армії основних союзних держав під єдиним командуванням. Членство приведе наші збройні сили до цієї єдиної структури з доступом до спільної розвідки, узгодженої доктрини та всієї ваги підтримки союзників. Ми повинні вирішити."
 ABDA_events.5.a: "Ми будемо стояти разом."
 ABDA_events.5.b: "Ми не можемо взяти на себе ці зобов'язання в даний час."

 ABDA_events.4.t: "Оборона Сінгапуру"
 ABDA_events.4.desc: "Оскільки Сінгапур призначений як ключова ланка оборонного периметра ABDACOM, наші командири повинні вирішити, як інвестувати в його укріплення. Ми можемо віддати перевагу військово-морським підступам і обороні гавані, посилити сухопутні підступи проти атаки з суші, або розподілити наші ресурси на обидва напрямки. Кожен варіант визначить, як Сінгапур можна буде захистити, коли прийде ворог."
 ABDA_events.4.a: "Посилити військово-морські підступи. Сила Сінгапуру — його гавань."
 ABDA_events.4.b: "Укріпити сухопутний периметр. Справжня загроза прийде з суші."
 ABDA_events.4.c: "Збалансований підхід. Жоден напрямок атаки не повинен залишатися без захисту."

 ABDA_fortress_singapore_choice_tt: "Завершення цього фокусу надасть вибір щодо того, як укріпити Сінгапур."
 ABDA_faction_membership_requirement_tt: "Відповідні члени фракції отримають запрошення приєднатися."
