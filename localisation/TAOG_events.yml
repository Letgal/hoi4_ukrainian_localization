### INS News
 taog_news.1.t: "Світанок союзу Нідерландів та Індонезії"
 taog_news.1.desc: "Королева Вільгельміна вчора зробила заяву в [1058.GetName], оголосивши про несподіване створення держави Нідерландсько-Індонезійського Союзу. Поки батьківщина перебуває під окупацією, уряд [HOL.GetAdjective] у вигнанні та адміністрація [INS.GetAdjective] погодилися керувати як єдине ціле під владою Корони. Чиновники обох країн описують цей крок як вимушений захід, а не вибір, як відчайдушну спробу зберегти єдність і авторитет Королівства на двох континентах."
 taog_news.1.a: "Цікавий розвиток подій."
 taog_news.2.t: "Декларація незалежності Індонезії"
 taog_news.2.desc: "Революціонер [INS.GetAdjective] [INS.GetLeader] виступив сьогодні на Яві з промовою, проголосивши незалежність новоствореної Республіки Індонезія. [HOL.GetNameDef] не визнає суверенітет цієї нової республіки, але республіканські ополчення вже де-факто контролюють певну територію."
 taog_news.2.a: "Це може спричинити великі зміни у світі."


############
### SIAM ###
############
 siam.1.t: "[SIA_phraya_phahon.GetName] замішаний у скандалі"
 siam.1.desc: "[SIA_phraya_phahon.GetName] звинувачують у продажі королівської нерухомості чиновникам за цінами, нижчими від ринкових — скандал, який суттєво підірвав його легітимність у Народних зборах. Схоже, що вплив [SIA_phraya_phahon.GetName] добігає кінця."
 siam.1.a: "Можливо, це звільнить шлях для когось іншого?"

 #Spmgsiradet rebellion historical
 siam.2.t: "Третій замах на життя [SIA_plaek_phibunsongkhram.GetName]"
 siam.2.desc: "Повідомлення від бангкокського кореспондента Reuters розкриває третю за чотири роки спробу отруїти прем'єр-міністра Сіаму (пана Пхун Сонгграма).\nМинулого тижня, як повідомляється, отруту було підмішано в їжу, що тимчасово вплинуло на пана Сонгграма, його дружину та доньку.\nБританський міністр закордонних справ (лорд Галіфакс) у посланні до пана Сонгграма висловлює тривогу з приводу боягузливої спроби замаху на життя прем'єр-міністра та радість з приводу його порятунку."
 siam.2.a: "Хто б міг це зробити?"

 siam.3.t: "Вигнання Прая Сонгсурадета"
 siam.3.desc: "Прая Сонгсурадета звинувачують у тому, що він був організатором одного або кількох замахів на [SIA_plaek_phibunsongkhram.GetName], а також у плануванні державного перевороту. Воля уряду полягає в тому, щоб позбавити Прая Сонгсурадета командування, його звань і титулів, змусити піти у відставку з армії без пенсії та вислати з країни.\nКритики стверджують, що це завуальована чистка, організована [SIA_plaek_phibunsongkhram.GetName] для усунення свого головного суперника, але це явно наклеп."
 siam.3.a: "Сумний кінець."

 siam.4.t: "Симпатиків Сонгсурадета заарештовано"
 siam.4.desc: "Рано вранці за допомогою Королівської тайської поліції уряд заарештував ще 51 підозрюваних та симпатиків, включаючи принца Рангсіта, Прая Тепахатсадіна та Прая Удом Понгпенсавада. Їх звинувачують у змові з Прая Сонгсурадетом проти держави, причому особливо відзначається, що Рангсіт, член королівської родини, має постати перед судом. Деякі оглядачі гадають, чи не був принц спеціальною ціллю, щоб подати сигнал решті роялістів у [THIS.GetName]: поводьтеся тихо або падете."
 siam.4.a: "Сюжет ускладнюється."

 siam.5.t: "Повстання 18 трупів"
 siam.5.desc: "Спеціальний трибунал, створений Пхуном, щоб судити 51 особу, причетну до повстання, ухвалив, що 25 з них будуть ув'язнені довічно, а 21 — розстріляні. З цих 21 трьох помилувано через їхні заслуги, а саме принца Рангсіта та Прая Тепахатсадіна."
 siam.5.a: "Цю справу завершено."

 #Songsuradet rebellion alternative

 siam.6.t: "Протистояння Сонгсурадета"
 siam.6.desc: "Прая Сонгсурадета звинувачують у тому, що він був організатором одного або кількох замахів на [SIA_plaek_phibunsongkhram.GetName], а також у плануванні перевороту проти його уряду. Воля уряду полягає в тому, щоб позбавити Сонгсурадета командування та вислати його з країни.\nОднак його арешту завадили військові, лояльні до Сонгсурадета, які назвали арешт політично вмотивованим. Уряд і військова кліка Сонгсурадета зараз перебувають у глухому куті, обидві сторони відмовляються поступатися."
 siam.6.a: "Ми не відступимо."
 siam.6.b: "Це обернулося проти нас. Давайте відступимо."

 siam.7.t: "Сонгсурадет шукає підтримки ВМС"
 siam.7.desc: "Поки напружене протистояння між урядовими силами та військовою клікою Сонгсурадета триває, урядові слідчі почали чути чутки про те, що сформувався союз між Королівським флотом і Сонгсурадетом з прямою метою протидії зростаючому авторитаризму Пхуна.\nЦе ще не все, деякі помічники Королівського двору повідомляли про зустрічі представників Сонгсурадета з високопоставленими принцами, що посилює побоювання, що роялісти також об'єднаються з опозицією."
 siam.7.a: "Ми - уряд, і нас не вдасться шантажувати!"
 siam.7.b: "Це виходить з під контролю. Давайте відступимо."

 #alt-hist actual rebellion
  siam.8.t: "Повстання Сонгсурадета"
  siam.8.desc: "Забезпечивши достатню політичну та військову підтримку, військова кліка Сонгсурадета разом із флотом ефективно захопила великі райони [THIS.GetName]. Рано вранці в передмістях Бангкока пролунали постріли, і вся країна, здається, опинилася на межі повномасштабної громадянської війни між урядом і Сонгсурадетом."
  siam.8.a: "Уряд повинен вижити."

 #alt-hist actual rebellion
  siam.9.t: "Кінець повстання Сонгсурадета"
  siam.9.desc: "Повстання розбите, і після захоплення Сонгсурадета залишився лише суд, хоча на даному етапі це лише формальність. Змову виявили не тільки в армії та на флоті, а й серед роялістів, причому принц Рангсіт відкрито підтримував бунтівників. Глибока чистка дисидентів стала необхідністю, а не альтернативою."
  siam.9.a: "Час будувати все заново."

 #Attack Indochina

 siam.10.t: "Перемога!"
 siam.10.desc: "Ворог тікає, і наша перемога здається забезпеченою. Оскільки територія під повним контролем, старі імперіалістичні сили мають тремтіти від страху. Як вони могли програти? Це знак нашого божественного провидіння."
 siam.10.a: "За [ROOT.GetName]!"
 siam.10.b: "Насправді все йде досить непогано."

 siam.11.t: "Стратегічний прорив [FROM.GetAdjective]"
 siam.11.desc: "Всупереч очікуванням, армія [FROM.GetAdjective] перехитрила наші сили і захопила контроль над спірним регіоном. Їхня окупація послабила наш авторитет і поставила під сумнів наші претензії на цю територію. Продовження конфлікту загрожує подальшою втратою дисципліни та впевненості, проте здача території була б публічним визнанням поразки."
 siam.11.a: "Ми повинні мінімізувати втрати та відступити."
 siam.11.b: "Ми не відмовимося від наших вимог!"

 siam.12.t: "[FROM.GetName] визнає поразку"
 siam.12.desc: "Наша кампанія проведена успішно. Опір ворога зломлено, і [FROM.GetName] офіційно відмовилася від контролю над спірними землями, щоб уникнути подальших руйнувань. Ця перемога підвищує наш авторитет і забезпечує наші кордони — принаймні на деякий час."
 siam.12.a: "Наша сила незаперечна."

 siam.13.t: "[FROM.GetName] відкидає будь-які домовленості"
 siam.13.desc: "[FROM.GetName] відхилила всі пропозиції щодо територіальних поступок, назвавши їх неприйнятними. Їхнє керівництво заявило, що конфлікт закінчиться лише знищенням нашої держави."
 siam.13.a: "Нехай буде так."

 siam.14.t: "[FROM.GetNameDefCap] прагне тотальної війни"
 siam.14.desc: "[FROM.GetNameDefCap] відкинула будь-які спроби переговорів. Їхній намір зрозумілий: повне завоювання та поглинання нашої нації. Ця війна буде вирішена не договорами, а тотальною перемогою або тотальним крахом."
 siam.14.a: "Ніяких компромісів, ніякої капітуляції."

 siam.15.t: "Наступ [SIA.GetAdjective] зупинився"
 siam.15.desc: "Швидкий наступ сил [SIA.GetAdjective] міг застати нас зненацька, але оскільки їхній авангард видихається під зростаючим напруженням, їхня слабкість стає очевидною. Те, що мало стати блискавичною кампанією, перетворилося на виснажливе випробування для армії [SIA.GetAdjective]. Ми могли б бути великодушними і запропонувати їм шлях до виходу через поступки, проте рішення за нами: чи краще нам послужить милосердя, ніж тотальна перемога."
 siam.15.a: "Запропонувати поступки."
 siam.15.b: "Прийнятна лише тотальна перемога."

 siam.16.t: "Зупинений наступ"
 siam.16.desc: "Наш наступ зупинився, це не проблема, проблема в тому, що ворог це знає. Вони надіслали нам ультиматум: або здатися зараз із мінімальними втратами, або продовжити війну з ще більшим кровопролиттям. Різниця лише в кількості загиблих, яких доведеться ховати."
 siam.16.a: "Нехай буде мир."
 siam.16.b: "Ми ніколи не здамося!"

 siam.17.t: "[FROM.GetName] відмовляється здаватися"
 siam.17.desc: "[FROM.GetName] прямо заявила, що краще побачить свою країну в руїнах, ніж поступиться нам хоча б чимось. Війна продовжується."
 siam.17.a: "Вони отримають те, чого бажають."

 siam.18.t: "[FROM.GetName] хоче нашої капітуляції!"
 siam.18.desc: "Перехоплені повідомлення ворожого командування підтвердили наші найгірші побоювання: ніяких переговорів, ніяких поступок для завершення цієї війни не буде. Вони вимагають нічого меншого, як повної капітуляції нашої нації, прирікаючи нас на життя під чоботом чергового імперіаліста. Якщо така їхня мета, то відповідь у нас одна: ми відмовляємося підкоритися."
 siam.18.a: "[ROOT.GetNameDefCap] стоїть!"

 siam.19.t: "[SIA.GetName] вимагає повернення територій"
 siam.19.desc: "[SIA.GetName], підбадьорений зростаючим націоналізмом та нашою нібито слабкістю в регіоні, вимагає повернення територій, які вважає основними для своєї держави. Вони явно намагаються стрибнути вище голови, але території, на які вони претендують, не обов'язково варті того, щоб воювати за них, коли світ котиться до Армагеддону."
 siam.19.a: "Це не варте війни."
 siam.19.b: "Дурниці!"

 siam.20.t: "[FROM.GetName] повертає території"
 siam.20.desc: "[FROM.GetName] вирішила повернути наші території; незалежно від того, чи визнають вони наш суверенітет над ними, чи просто піддалися тиску інших країн — це неважливо, наша справа справедлива."
 siam.20.a: "Чудовий день!"

 siam.21.t: "[FROM.GetName] відмовляється повертати території"
 siam.21.desc: "[FROM.GetName] відхилила наш запит. Ці імперіалісти чіпляються за минуле століття пазурами та ланцюгами, не в силах визнати, що час цих так званих «великих націй» сплив."
 siam.21.a: "Ми дамо їм це зрозуміти."

 SIA_sent_bureaucrats_to_us: "Навчання держслужбовців разом з нами"
 SIA_tied_their_currency_to_ours: "Прив'язали свою валюту до нашої"
 SIA_sent_started_cooperative_with_us: "Почали співпрацю з розвитку разом з нами"

 siam.22.t: "Відправити бюрократів [SIA.GetName] за кордон"
 siam.22.desc: "Наші бюрократи погано пристосовані до сучасної економіки, їм бракує навчання, необхідного для стимулювання зростання. На щастя, є багато країн із сучасною, розвиненою бюрократією, куди ми можемо їх відправити, щоб отримати досвід, не переймаючи їхні методи правління."
 siam.22.a: "Відправити їх до [ENG.GetName]"
 siam.22.b: "Відправити їх до [JAP.GetName]"

 siam.23.t: "Закон про стабілізацію бата"
 siam.23.desc: "Бат не може залишатися незакріпленим, поки [ROOT.GetName] прагне порядку в торгівлі та фінансах. Наші чиновники тепер стверджують, що монетарна стабільність потребує міцного зовнішнього якоря, прив'язаного до валюти, яка має вагу, щоб заспокоїти купців, кредиторів та іноземних партнерів. Вибір перед нами — не просто технічний. Він сформує напрямок нашої торгівлі, характер нашого розвитку та іноземний вплив, який ляже на економіку [SIA.GetAdjective]."
 siam.23.a: "Прив'язати до фунта стерлінгів"
 siam.23.b: "Прив'язати до єни"

 siam.24.t: "Кооператив розвитку [SIA.GetAdjective]"
 siam.24.desc: "Кооператив розвитку [SIA.GetAdjective] дав державі новий інструмент для національного вдосконалення, але амбіції все ще випереджають внутрішній капітал. Залізниці, майстерні та електричні станції потребують зовнішнього фінансування, якщо вони мають розвиватися швидко. Тепер перед нами два шляхи. Інвестиції [ENG.GetAdjective] пропонують доступ до встановлених ринків, досвідчених фірм та фінансового престижу Лондона. Інвестиції [JAP.GetAdjective] обіцяють тісніше промислове партнерство з азійською державою, яка прагне розширити свій вплив. Обидва шляхи можуть прискорити розвиток, хоча жоден з них не обійдеться без зобов'язань."
 siam.24.a: "Шукати інвестиції від [ENG.GetName]"
 siam.24.b: "Шукати інвестиції від [JAP.GetName]"

 siam.25.t: "Смерть Прачадіпока"
 siam.25.desc: "Король Прачадіпок помер. Колишній король, чиє ім'я несло пам'ять про старий порядок крізь роки вигнання та потрясінь, відходить зі справ людських в історію. Для декого його смерть закриває останній розділ боротьби, що почалася з кінця абсолютного правління. Проте справа, яку він уособлював, не вмирає разом з ним. Трон вистоїть, династія залишиться, і робота з відновлення гідності та стабільності [ROOT.GetName] повинна тепер продовжитися в ім'я молодого короля Ананди."
 siam.25.a: "Нехай Його Величність вознесеться на небо."

 siam.27.t: "Виховати короля"
 siam.27.desc: "Король Ананда залишається в [SWI.GetName], далеко від королівства, яким йому належить правити одного дня. Проте відстань не виводить його з-під нашого впливу. Вчителів можна підібрати, предмети акцентувати, а звички заохочувати, щоб його розум був спрямований у майбутнє, яке ми готуємо для [ROOT.GetNameDef]. Чи повернеться він як солдат, науковець чи хтось більший, значною мірою залежить від того, що він вивчатиме зараз.\n\nБо чим насправді є король, як не продовженням своєї країни?"
 siam.27.a: "Спрямувати його до наукових занять."
 siam.27.b: "Навчити його військовій справі."
 siam.27.c: "Спрямувати його до адміністрації та постачання."
 siam.27.d: "Дати освіту в галузі промисловості та розвитку."

 siam.28.t: "Коронація короля Ананди"
 siam.28.desc: "Довгі роки регентства добігають кінця. У Бангкоку, перед принцами, ченцями, міністрами та державними офіцерами, Ананда сходить на трон за власним правом і отримує почесті, належні королю з династії Чакрі. Церемонії проголошують наступність там, де були потрясіння, і священний порядок там, де були чвари. Для королівства ця коронація — не просто видовище, а декларація того, що Корона вистояла, що держава не була зламана вигнанням і громадянською війною, і що починається нове правління над [ROOT.GetNameDef]."
 siam.28.a: "Хай живе король."

 siam.29.t: "Дослідження звичайних танків"
 siam.29.desc: "Звичайні танки все ще є королями поля бою, тому ми повинні вчитися у найкращих, щоб створити потужний танковий корпус."
 siam.29.a: "Ми вчитимемося у німців"
 siam.29.b: "Ми вчитимемося у американців"
 siam.29.c: "Ми вчитимемося у британців"

 siam.31.t: "Закупівля підводних човнів"
 siam.31.desc: "Розширення флоту вимагає наявності підводних човнів, і ми повинні вирішити, де закуповувати наші судна. І [ENG.GetNameDef], і [JAP.GetNameDef] зробили пропозиції — але вибір має наслідки, що виходять за межі суднобудівні."
 siam.31.a: "[ENG.GetAdjective] човни послужать нам добре."
 siam.31.b: "Ми будуватимемо наш підводний флот за проектами [JAP.GetAdjective]."

 siam.32.t: "Закупівля кораблів берегової оборони"
 siam.32.desc: "Наші прибережні води потребують спроможних оборонних суден, і ми повинні обрати постачальника. [ENG.GetNameDefCap] і [JAP.GetNameDef] готові доставити їх — це рішення сформує і наш флот, і наші міжнародні відносини."
 siam.32.a: "Ми покладатимемося на судна [ENG.GetAdjective] для нашої берегової оборони."
 siam.32.b: "Ми покладатимемося на кораблі [JAP.GetAdjective] для нашого прибережного флоту."

 siam.33.t: "Продаж Bangkok Dock Co."
 siam.33.desc: "Продаж компанії Bangkok Dock завершено, і кошти тепер у скарбниці. Уряд має вирішити, куди найкраще спрямувати ці гроші — чи то на зменшення фінансового тягаря для звичайних громадян, чи на прискорення технічних амбіцій нації, чи на зміцнення впевненості у майбутньому країни."
 siam.33.a: "Зменшити податковий тягар для наших людей."
 siam.33.b: "Спрямувати кошти на морські дослідження."
 siam.33.c: "Використати прибуток, щоб заспокоїти націю."

 siam.34.t: "Вимоги [FROM.GetAdjective] біля наших берегів"
 siam.34.desc: "Сили [FROM.GetAdjective] тепер тиснуть на [ROOT.GetNameDef], і їхні дипломати говорять із впевненістю людей, які вірять, що питання вже вирішене. Вони пропонують нам звичну мову порядку та стабільності, проте насправді вони шукають покірності. Ми можемо підкоритися і зберегти державу в зменшеному вигляді, приєднатися до їхнього альянсу в надії зберегти деяку свободу дій, або відповісти на цей тиск відкритим викликом і наказати загарбнику забратися від наших берегів."
 siam.34.a: "Ми приєднаємося до їхнього альянсу і збережемо наше правління."
 siam.34.b: "Наказати їм забратися геть від наших берегів."

 siam.35.t: "[JAP.GetNameDefCap] вимагає, щоб ми друкували більше грошей"
 siam.35.desc: "[JAP.GetNameDefCap] чітко висловила свої очікування: ми повинні збільшити грошову масу, щоб задовольнити їхні економічні вимоги. Тягар ляже на наш народ через зростання цін, тоді як промисловість [JAP.GetAdjective] отримає вигоду. У нас мало можливостей відмовити."
 siam.35.a: "Виконати вимоги [JAP.GetNameDef]."

 siam.36.t: "[SIA.GetNameDefCap] вимагає погашення боргу"
 siam.36.desc: "[SIA.GetNameDefCap] офіційно зажадала, щоб ми покрили витрати, пов'язані з домовленістю про друк грошей, яку ми змусили їх укласти. Домовленість послужила нам добре, але рахунок тепер виставлено."
 siam.36.a: "Визнати борг і почати виплати."

 siam.37.t: "[JAP.GetNameDefCap] погоджується погасити наші борги"
 siam.37.desc: "Після наших вимог [JAP.GetNameDef] погодилася почати виплату економічних витрат за домовленістю про друк грошей. Компенсація не повністю скасує тягар, покладений на наш народ, але принесе певне полегшення скарбниці."
 siam.37.a: "Справедливе врегулювання. Наша економіка відновиться."

 siam.38.t: "[SIA.GetName] шукає умов"
 siam.38.desc: "[SIA.GetAdjective] Уряд прийшов до нас із закликом про умови. Їхні міністри тепер визнають те, що наші гармати вже довели: [ROOT.GetNameDef] утримує ініціативу в цій боротьбі. Ми можемо прийняти їхню капітуляцію і звести їх до покірності, зв'язати їх із нашим альянсом, щоб їхній уряд служив нашій ширшій справі, або відкинути будь-який компроміс і продовжити кампанію, поки Сіам не буде повністю окупований."
 siam.38.a: "Прийняти їхню капітуляцію."
 siam.38.b: "Ні. Ми закінчимо це силою."

 siam.39.t: "Уряд [FROM.GetAdjective] приймає нашу капітуляцію"
 siam.39.desc: "[FROM.GetLeader] вирішив прийняти наше підпорядкування. На даний момент [ROOT.GetNameDef] врятовано від подальших руйнувань, хоча не від приниження. Армії наказано скласти зброю, а уряд залишається на місці лише з дозволу сильнішої держави. Ми зберігаємо державу, але ціною гордості та свободи дій."
 siam.39.a: "Ми витримаємо те, що маємо."

 siam.40.t: "Уряд [FROM.GetAdjective] відхиляє нашу пропозицію"
 siam.40.desc: "[FROM.GetLeader] відхилив кожне звернення, надіслане з Бангкока. Жодного підпорядкування не визнано достатнім, жоден компроміс не прийнятний. Ворог має намір вирішити справу лише через повне завоювання. Для [ROOT.GetNameDef] не залишилося нічого, крім опору. Якщо вони не покинуть наші береги за домовленістю, їх потрібно вигнати силою."
 siam.40.a: "Тоді ми боремося."

 siam.41.t: "[FROM.GetNameDefCap] відправляє чиновників вивчати наші методи"
 siam.41.desc: "Делегація чиновників [FROM.GetAdjective] прибула, щоб спостерігати та вивчати нашу адміністративну та дослідницьку практику. [FROM.GetNameDefCap], здається, має намір модернізувати свою бюрократію, спираючись на іноземний досвід, і обрала [ROOT.GetNameDef] як свою модель. Візит є негласним визнанням наших методів і можливістю зміцнити доброзичливі відносини з іншим урядом."
 siam.41.a: "Ми вітаємо їхню делегацію."

 siam.42.t: "[FROM.GetNameDefCap] прив'язує свою валюту до нашої"
 siam.42.desc: "[FROM.GetNameDefCap] офіційно вирішила прив'язати свою валюту до нашої. Це рішення наближає [FROM.GetNameDef] до нашої економічної орбіти і свідчить про певну довіру до стабільності наших фінансових інституцій. Торгівля між нашими народами має стати більш передбачуваною, а купцям [FROM.GetAdjective] буде легше вести справи з нашими."
 siam.42.a: "Вітаємо розвиток наших торговельних відносин."

 siam.43.t: "[FROM.GetNameDefCap] запитує інвестиції в розвиток"
 siam.43.desc: "[FROM.GetNameDefCap] надіслала запрошення нашим інженерам і фахівцям допомогти в розвитку їхньої нації. Кооператив пропонує нашим галузям плацдарм у регіоні та зміцнює економічні зв'язки між нашими урядами. Це скромна пропозиція, але вона може принести значні результати з часом."
 siam.43.a: "Ми раді допомогти."

 siam.44.t: "[FROM.GetNameDefCap] розміщує замовлення на підводні човни"
 siam.44.desc: "[FROM.GetNameDefCap] розмістила замовлення на підводні човни, побудовані за нашими проектами. Продаж є значущим вотумом довіри до нашої військово-морської промисловості та поширює вплив [FROM.GetAdjective] у води Південно-Східної Азії."
 siam.44.a: "Вітаємо замовлення для наших верфей."
 SIA_purchased_submarines_from_us: "Придбали підводні човни у нас"

 siam.45.t: "[FROM.GetNameDefCap] пропонує об'єднання альянсів"
 siam.45.desc: "Делегація з [FROM.GetName] прибула з пропозицією від [FROM.GetLeader]. Вони стверджують, що наші окремі альянси тепер переслідують ті самі загальні цілі, водночас розділяючи людей, матеріали та дипломатичний вплив між конкуруючими командуваннями.\n\nОб'єднавши наші сили, ми створимо потужніший блок, здатний координувати стратегію на ширшому фронті. Така угода зміцнила б спільну справу, хоча вона також вимагала б від нас прийняти вплив [FROM.GetAdjective] на майбутній напрямок альянсу."
 siam.45.a: "Єдиний фронт необхідний."
 siam.45.b: "Наш альянс залишається нашим власним."

 siam.46.t: "[FROM.GetNameDefCap] приймає об'єднання"
 siam.46.desc: "[FROM.GetLeader] погодився на нашу пропозицію об'єднати наші альянси в одну коаліцію. Те, що раніше було окремими командуваннями та дипломатичними каналами, тепер згортається в одну структуру, дозволяючи нашим урядам координувати військові плани, заходи постачання та зовнішню політику з набагато більшою чіткістю.\n\nУгода не позбавлена ускладнень, але необхідність єдності перемогла."
 siam.46.a: "Разом ми сильніші."

 siam.47.t: "[FROM.GetNameDefCap] відхиляє об'єднання"
 siam.47.desc: "[FROM.GetLeader] відхилив нашу пропозицію про злиття альянсів. Їхній уряд стверджує, що співпраця може тривати там, де інтереси збігаються, але вони не розмістять свій альянс у межах ширшої коаліції під керівництвом з [ROOT.Capital.GetCapitalVictoryPointName].\n\nНаразі поділ між нашими блоками залишається. Ми повинні досягати наших цілей, не розраховуючи на їхню повну відданість."
 siam.47.a: "Тоді ми діємо самі."

 siam.48.t: "[SIA.GetName] запитує допомогу [JAP.GetAdjective]" #проверіт
 siam.48.desc: "[SIA.GetNameDefCap] офіційно запросив військову допомогу проти сил, що вторглися в їхню країну. Натомість [SIA.GetAdjective] уряд готовий надати фірмам [JAP.GetAdjective] привілейований доступ до стратегічних ресурсів, інфраструктури та комерційних прав.\n\nПідтримка [SIA.GetName] розширила б наш вплив у Південно-Східній Азії та забезпечила б цінні матеріали для Імперії, хоча це також може втягнути нас глибше в регіональні конфлікти."
 siam.48.a: "Прийняти їхню пропозицію."
 siam.48.b: "[JAP.GetName] не може виділити ресурси."

 siam.49.t: "[JAP.GetName] приймає наш заклик"
 siam.49.desc: "[JAP.GetNameDefCap] погодилася підтримати [ROOT.GetNameDef] у її боротьбі. Радники, обладнання та припаси [JAP.GetAdjective] скоро почнуть прибувати, тоді як економічні поступки були надані компаніям [JAP.GetAdjective] відповідно до угоди.\n\nХоча кабінет святкує виживання нації, багато хто потай задається питанням, скільки незалежності було виміняно на цю допомогу."
 siam.49.a: "Ми отримали союзника."

 SIA_japan_aid_request.4.t: "[JAP.GetName] відхиляє наш заклик"
 SIA_japan_aid_request.4.desc: "Уряд [JAP.GetNameDef] відхилив наш запит на військову допомогу. Токіо заявляє, що Імперія не може надіслати людей і матеріали для нашої боротьби в цей час.\n\nБез іноземної допомоги [ROOT.GetNameDef] повинна тепер покладатися на власні сили, щоб пережити вторгнення."
 SIA_japan_aid_request.4.a: "Тоді ми стоїмо самі."

 siam_adc.1.t: "[FROM.GetNameDefCap] вимагає звільнення [?var:SIA_adc_demand_country_to_be_released.GetNameDef]"
 siam_adc.1.desc: "Надійшла офіційна нота від [FROM.GetNameDef], де [FROM.GetLeader] засуджує нашу триваючу окупацію азійських країн як нестерпну образу їхнього права на самовизначення. Повідомлення стверджує, що Азія — це не приз, який можна розділити або адмініструвати за іноземним бажанням, і вимагає, щоб ми негайно вивели наші сили та відновили незалежний уряд у [?var:SIA_adc_demand_country_to_be_released.GetNameDef].\n\nВимога не залишає місця для непорозумінь. [FROM.GetNameDefCap] очікує виконання, і будь-яка відмова з нашого боку буде пам'ятатися як зумисна образа їхньої нації."
 siam_adc.1.a: "Ми звільнимо їх."
 siam_adc.1.b: "Вони залишаться під окупацією."

 siam_adc.2.t: "[FROM.GetNameDefCap] пропонує відновити нашу незалежність"
 siam_adc.2.desc: "Після прийняття [FROM.GetAdjective] вимог [SIA.GetNameDef] щодо майбутнього [ROOT.GetNameDef], [FROM.GetLeader] ставить перед нами остаточне питання. Окупаційна влада готова вивести війська та визнати суверенний уряд [ROOT.GetAdjective], якщо ми вирішимо знову стояти самі.\n\nНезалежність пропонує гідність і свободу дій, але вона також залишає нас відбудовувати державу без гарантій [FROM.GetNameDef]. Залишатися під їхнім захистом — скромніший шлях, але такий, що може вберегти країну від подальшого безладу в ці невизначені часи."
 siam_adc.2.a: "Ми будемо стояти як вільна нація."
 siam_adc.2.b: "Ми залишатимемося під захистом [FROM.GetAdjective]."

 siam_adc.3.t: "[?var:SIA_tag_that_was_released_due_to_sia_pressure.GetName] приймає незалежність"
 siam_adc.3.desc: "Уряд [?var:SIA_tag_that_was_released_due_to_sia_pressure.GetNameDef] обрав незалежність. Оскільки окупаційна адміністрація тепер має бути розпущена, [var:SIA_tag_that_was_released_due_to_sia_pressure.GetNameDef] готується відновити своє місце серед суверенних націй світу."
 siam_adc.3.a: "Яким буде їхнє майбутнє?"

 siam_adc.4.t: "[FROM.GetNameDefCap] відхиляє незалежність"
 siam_adc.4.desc: "Попри можливість здобути свободу, уряд [FROM.GetNameDef] відхилив негайну незалежність. Їхні міністри стверджують, що держава ще не готова витримати тягар повного суверенітету і віддає перевагу, поки що, збереженню статус-кво."
 siam_adc.4.a: "Тоді домовленість продовжується."

 siam_adc.5.t: "[FROM.GetNameDefCap] відхиляє наші вимоги"
 siam_adc.5.desc: "[FROM.GetName] чітко дала зрозуміти, що наші вимоги — це в кращому випадку смішно. Вони вказують на нашу мізерну армію як на доказ того, що ми не в змозі кинути виклик статус-кво."
 siam_adc.5.a: "Тоді ми покажемо їм."


 siam_dem_event_count: "Армія планує кампанію, щоб зганьбити нас, чим довше ми чекаємо"
 siam_dem.2.t: "Армія заперечує"
 siam_dem.2.desc: "На закритій зустрічі міністрів і старших офіцерів військовий представник виступив із суворою критикою пропозиції «Жовтого досьє». Він стверджує, що його автори занадто вільно говорять про державний контроль, перерозподіл і соціальні зобов'язання, приділяючи надто мало уваги дисципліні, власності та тягарям, які лягли б на офіцерський корпус і сільську місцевість. На його думку, [ROOT.GetNameDef] не можна переробити за допомогою теорій, написаних на папері, поки світ стає небезпечнішим з кожним місяцем."
 siam_dem.2.a: "Армія висловила свою позицію"

 siam_dem.3.t: "Публічна догана"
 siam_dem.3.desc: "Суперечка вийшла за межі комітету. Газета, яку вважають військовим рупором, надрукувала повне засудження «Жовтого досьє», представивши його як чужорідну програму, загорнуту в патріотичні гасла. Її редактори попереджають, що пропозиція ставить класові образи вище національної єдності, послаблює довіру до встановлених інституцій і заохочує небезпечні очікування серед робітників і селян. До обіду стаття вже повторюється в казармах, офісах і чайних, і те, що було внутрішньою суперечкою, стало публічним скандалом."
 siam_dem.3.a: "Критика поширюється"

 siam_dem.4.t: "Пхун засуджує Досьє"
 siam_dem.4.desc: "Пхун вступив у суперечку відкрито і з безпомилковою силою. Виступаючи перед прихильниками та офіцерами, він засуджує «Жовте досьє» як комуністичне за своєю суттю, незалежно від того, якою мовою віддають перевагу його захисники. Він заявляє, що будь-яка програма, яка підносить державу над власністю, обіцяє кардинальні соціальні зміни та розпалює агітацію серед нижчих верств, несе червону отруту в [ROOT.GetNameDef] під іншим іменем."
 siam_dem.4.a: "Він не залишає сумнівів"

 siam_dem.5.t: "A Government Must Be Formed" # (!)
 siam_dem.5.desc: "The old regime is broken and the Seri Thai stand triumphant. But triumph is not government, and the coalition that united against Phibun is far from agreed on what should follow him. Three names are spoken in the corridors of power: Pridi Banomyong, the conscience of the resistance; Khuang Aphaiwong, a man mild enough to offend no one; and General Phin Choonhavan, whose officers expect their due. Whom we raise up now will shape the peace to come."
 siam_dem.5.a: "Pridi Banomyong shall lead. The resistance has earned it."
 siam_dem.5.b: "Khuang Aphaiwong, a face all factions can accept."
 siam_dem.5.c: "General Phin Choonhavan. The army will have its place."

###################
#### AUSTRALIA ####
###################
 AST_election_events.1.t.a: "UAP Win!"
 AST_election_events.1.t.b: "Labor Win!"
 AST_election_events.1.desc.a: "The votes are counted; the United Australia Party has won the election.\n\nThe UAP shall undergo a brief government formation period, before spending the next three years proving that the citizens' trust was rightfully placed on its representatives shoulders."
 AST_election_events.1.desc.b: "The votes are counted; the Australian Labor Party has won the election.\n\nLabor shall undergo a brief government formation period, before spending the next three years proving that the citizens' trust was rightfully placed on its representatives shoulders."
 AST_election_events.1.a: "The people have spoken."

 AST_election_events.2.t: "Halfway to Federal Election"
 AST_election_events.2.desc: "The $AST_democratic_party_long$ has led [AST.GetName] since 1931, guiding the nation out of the Great Depression and away from anti-democratic sentiment. Through stable leadership, conservative leanings, and loyalty to Britain, the UAP has strengthened its support and made another term increasingly likely. Yet another party still has a say in the matter.\n\nStill recovering from the no-confidence motion that removed it from power in 1931, the $AST_labor_party_long$ is beginning to regain momentum. With communist voices silenced, the working class now looks for another guiding light. In its mission to represent every citizen, the ALP has adopted a different perspective on imperialism and Australia’s loyalty to the Empire. Domestic needs shall come first, and foreign interests should no longer take priority.\n\nOne and a half years remain until the next federal election. If the UAP wishes to secure another victory, its leaders must accelerate reforms to preserve public support. Otherwise, ALP campaigning may restore its standing once more."
 AST_election_events.2.a: "UAP shall enact its last reforms."
 AST_election_events.2.b: "A campaign tour across Australia shall raise ALP support."

 AST_election_events.3.t: "$AST_election_season_cat$"
 AST_election_events.3.desc: "$AST_election_season_cat_desc$"
 AST_election_events.3.a: "It begins."

 AST_diplomatic_events.1.t: "Australian Non-Aggression Pact"
 AST_diplomatic_events.1.desc: "As part of its recent diplomatic endeavors, the Australian government seeks to sign non-aggression agreements with a few chosen Asian nations; we are one of them. Whether this attempt to avoid war exposes Australian officials as detached from reality, or if it paints them in honorable innocence, our response will partially decide.\n\nShall we sign a non-aggression pact with [AST.GetName]?"
 AST_diplomatic_events.1.a: "Without question — no."
 AST_diplomatic_events.1.b: "Indeed, we shall."

 AST_diplomatic_events.2.t: "Pacific Pact Resistance"
 AST_diplomatic_events.2.desc: "The delegation sent to [FROM.GetNameDef] has cabled the nation's response to our non-aggression pact proposal. We knew the initiative was far-reaching, and so [FROM.GetLeader]'s refusal comes as little surprise."
 AST_diplomatic_events.2.a: "It was an honorable attempt, at least."

 AST_diplomatic_events.3.t: "Long Live the Pacific Pact"
 AST_diplomatic_events.3.desc: "The delegation sent to [FROM.GetNameDef] has cabled the nation's response to our non-aggression pact proposal. Most pleasingly, [FROM.GetLeader] appreciated our initiative and has agreed to set his seal upon it."
 AST_diplomatic_events.3.a: "Splendid!"

 AST_diplomatic_events.4.t: "Australia Requests Singapore"
 AST_diplomatic_events.4.desc: "[AST.GetNameDefCap] has long questioned the dependability of the Singapore Strategy; according to Australian officials, our ability to come to their aid in case of a Pacific war is uncertain. Transferring Pacific naval responsibilities to [AST.GetName] would lessen the burden on British shoulders, but it would also place that same burden upon Australian ones instead.\n\nCan we trust that increased Australian control would place our Pacific subjects and territories in a stronger position than if Singapore were to remain with us?"
 AST_diplomatic_events.4.a: "Yes, we can."
 AST_diplomatic_events.4.b: "Singapore shall remain ours."

 AST_diplomatic_events.5.t: "Britain Agrees to Our Request"
 AST_diplomatic_events.5.desc: "Britain agrees to transfer Singapore to Australian authority. This will at last bring an end the outdated Singapore Strategy, placing us at the reins of our own defenses."
 AST_diplomatic_events.5.a: "The strategy is rewritten!"
 AST_diplomatic_events.5.a.tt: "§YSingapore§!:\n  Is controlled by §YAustralia§!.\n  Is owned by §YAustralia§!.\n§YChristmas Island§!:\n  Is controlled by §YAustralia§!.\n  Is owned by §YAustralia§!.\n§YCocos Islands§!:\n  Is controlled by §YAustralia§!.\n  Is owned by §YAustralia§!."

 AST_diplomatic_events.6.t: "Britain Rejects Our Request"
 AST_diplomatic_events.6.desc: "Britain refuses to transfer Singapore to Australian authority. The status quo will remain."
 AST_diplomatic_events.6.a: "The Singapore Strategy simply must hold."

 AST_diplomatic_events.7.t: "[AST.GetName] Requests Our Aid"
 AST_diplomatic_events.7.desc: "[AST.GetNameDefCap] wishes to receive equipment from allies for its war effort, and requests our aid in managing the required shipments. Can we spare convoys to allow [AST.GetName] to make use of them?"
 AST_diplomatic_events.7.a: "We can."
 AST_diplomatic_events.7.b: "We cannot"

 AST_diplomatic_events.8.t: "[USA.GetName] Agrees to Our Request"
 AST_diplomatic_events.8.desc: "[USA.GetNameDefCap] has agreed to spare a number of convoys in order to aid [AST.GetName]'s supply efforts."
 AST_diplomatic_events.8.a: "They will be of great use!"

 AST_diplomatic_events.9.t: "[USA.GetName] Rejects Our Request"
 AST_diplomatic_events.9.desc: "[USA.GetNameDefCap] has no convoys to spare for [AST.GetName]'s supply efforts."
 AST_diplomatic_events.9.a: "We must manage the shipments ourselves."

 AST_diplomatic_events.10.t: "A Wartime Alliance"
 AST_diplomatic_events.10.desc: "[AST.GetNameDefCap] values [USA.GetNameDef] allyship greatly and now requests that it be formalized in a common international wartime coalition. By joining forces, our two nations could assist each other in present and future conflicts."
 AST_diplomatic_events.10.a: "We must agree."
 AST_diplomatic_events.10.b: "[USA.GetNameDefCap] will stand stronger without them."

 AST_diplomatic_events.11.t: "A Wartime Alliance"
 AST_diplomatic_events.11.desc: "[USA.GetNameDefCap] has agreed to join forces. As members of the [AST.GetFactionName], [AST.GetName] and [USA.GetName] will assist each other in present and future conflicts."
 AST_diplomatic_events.11.a: "Our enemies shall fear us."

 AST_diplomatic_events.12.t: "A Rejected Wartime Alliance"
 AST_diplomatic_events.12.desc: "[USA.GetNameDefCap] has rejected our proposal to join forces. [AST.GetNameDefCap] and [USA.GetName] will remain divided in our respective war efforts."
 AST_diplomatic_events.12.a: "We must stand without them."

 AST_diplomatic_events.13.t: "Clause 6"
 AST_diplomatic_events.13.desc: "During the process that united the Australian colonies into a federation, New Zealand ultimately decided not to take part. Ever since, however, the Australian Constitution has continued to define us as one of its Commonwealth's potential states, and does allow for our admission.\n\n[AST.GetName] now claims that the current world situation demands unity, requesting that [NZL.GetName] transfer to Australian authority. Shall we call a referendum on the matter?"
 AST_diplomatic_events.13.a: "We shall."
 AST_diplomatic_events.13.a.tt: "A referendum will be held, potentially resulting in the §Rannexation§! of §Y[NZL.GetName]§!"
 AST_diplomatic_events.13.b: "Absolutely not!"

 AST_diplomatic_events.14.t: "[NZL.GetNameDefCap] Becomes an Australian State"
 AST_diplomatic_events.14.desc: "Following the recently held referendum, [NZL.GetName] has decided to invoke Clause 6 of the Australian Constitution. New Zealanders have agreed that their lands are more safe under Australian governance, and have therefore agreed to join [AST.GetNameDef]."
 AST_diplomatic_events.14.a: "Australia expands."

 AST_diplomatic_events.15.t: "The New Zealand Public Resists"
 AST_diplomatic_events.15.desc: "Following the recently held referendum, [NZL.GetName] has decided not to invoke Clause 6 of the Australian Constitution. [NZL.GetNameDefCap] will remain as its own nation."
 AST_diplomatic_events.15.a: "Australia will remain as it is."

 AST_diplomatic_events.16.t: "[NZL.GetNameDefCap]'s Officials Resist"
 AST_diplomatic_events.16.desc: "Despite Australian pressure, [NZL.GetName] has decided not to hold a referendum to invoke Clause 6 of the Australian Constitution. [NZL.GetNameDefCap] will remain as its own nation."
 AST_diplomatic_events.16.a: "Australia remains as it is."

 AST_diplomatic_events.17.t: "Australian Partnership"
 AST_diplomatic_events.17.desc: "The enemy is coming from the north, and it is only a matter of time before it arrives at our own doorstep, or so Australian officials claim at least. [AST.GetNameDefCap] proposes that we unite to form a single barrier, preferably by placing [INS.GetName] under Australian authority, but at the very least by granting military access."
 AST_diplomatic_events.17.a: "Agree to be placed under Australian authority."
 AST_diplomatic_events.17.a.tt: "§Y[INS.GetNameDefCap]§! will become a §Ypuppet§! of §Y[AST.GetNameDefCap]§!."
 AST_diplomatic_events.17.b: "Grant military access."
 AST_diplomatic_events.17.b.tt: "§Y[INS.GetNameDefCap]§! will enact §YMilitary Access§! with §Y[AST.GetNameDefCap]§!."
 AST_diplomatic_events.17.c: "We shall agree to neither."

 AST_diplomatic_events.18.t: "[INS.GetNameDefCap] Concedes to Australian Request"
 AST_diplomatic_events.18.desc: "[INS.GetName] has agreed to our request; our cooperation will have a great impact on both our nations' defense capabilities."
 AST_diplomatic_events.18.a: "Fantastic!"

 AST_diplomatic_events.19.t: "[INS.GetNameDefCap] Refuses"
 AST_diplomatic_events.19.desc: "[INS.GetName] has refused our request; our nations will have to see to their own defenses."
 AST_diplomatic_events.19.a: "[AST.GetNameDefCap] shall weather conflicts without them."

 AST_diplomatic_events.20.t: "Summons to the British War Cabinet"
 AST_diplomatic_events.20.desc: "[GET_AST_BWC_COUNT][ENG.GetNameDefCap] summons the Australian Prime Minister to the British War Cabinet. The world situation is dire, prompting Britain to seek common strategies and military cooperation with its allies.\n\nHowever, Australia has its own concerns. Can we spare some of the Prime Minister's time in order to please the British?"
 AST_diplomatic_events.20.a: "[AST.GetLeader] shall depart for Britain."
 AST_diplomatic_events.20.b: "He is needed here."
 AST_bwc_count_2: "For the second time, [ENG.GetLeader] requests [AST.GetLeader]'s attendance, claiming that our close cooperation is what will determine the outcome of our common struggle.\n\n"
 AST_bwc_count_3: "Yet again, [AST.GetLeader] is asked to cross the seas to maintain Commonwealth cooperation. Many more such requests are not expected, however, so long as we make clear whether our interests also lie with the common effort or in tending to our own affairs.\n\n"
 AST_bwc_accept_effect_tt: "§YEffects by accepting summons 3 times:§!"
 AST_bwc_accept_tt: "Accept summons for §Y[?var:AST_bwc_accept]§!/§Y3§! times"

 AST_diplomatic_events.22.t: "Successful Contributions to the British War Cabinet"
 AST_diplomatic_events.22.desc: "Over the past year, the Australian Prime Minister has regularly attended the British War Cabinet. Although [AST.GetNameDef] itself has had to pay the price at times, our nation has now grown stronger through British military cooperation."
 AST_diplomatic_events.22.a: "The cost was worth it in the end."

 AST_diplomatic_events.23.t: "[ENG.GetLeader] No Longer Seeks Australian War Influence"
 AST_diplomatic_events.23.desc: "[ENG.GetNameDefCap] has summoned the Australian Prime Minister to the British War Cabinet several times, but after repeated refusals [ENG.GetLeader] no longer sees any reason to continue doing so."
 AST_diplomatic_events.23.a: "It is understandable."

 AST_diplomatic_events.24.t: "A Change of Leadership"
 AST_diplomatic_events.24.desc: "Australia's Prime Minister has had a great influence on the British Commonwealth's war effort. During his regular visits to London, Robert Menzies has won the trust of the British ministers while their faith in their own Prime Minister has faded. The ministers have now pressured the leader of [ENG.GetNameDef] to resign, and for Menzies to take his place.\n\nEven if [AST.GetName] loses their Prime Minister, they gain everlasting loyalty from their overlord, guarded by the Australian countryman now at Britain's reins. The land down under wants increased authority, and Robert Menzies is the first one to put his name to it."
 AST_diplomatic_events.24.a: "The winds are changing."

 AST_diplomatic_events.25.t: "Under the Rule of Canberra"
 AST_diplomatic_events.25.desc: "The rising tension among the Pacific nations is worrisome, and with Britain occupied in its own battles, our capacity to come to the rescue of our subjects appears implausible; or so [AST.GetName] claims.\n\nThey seek to reconstruct the British Commonwealth so that the nations of the Pacific and Indian Oceans are managed directly from Canberra. Shall we agree?"
 AST_diplomatic_events.25.a: "We shall; the Pacific region will be strengthened under centralized control."
 AST_diplomatic_events.25.b: "Certainly not!"

 AST_diplomatic_events.26.t: "The Pacific Commonwealth"
 AST_diplomatic_events.26.desc: "[ENG.GetNameDefCap] agrees; the Pacific region will be strengthened under centralized control. The British Pacific territories have been placed under our authority."
 AST_diplomatic_events.26.a: "The Pacific nations join forces."

 AST_diplomatic_events.27.t: "Britain Refuses Our Request"
 AST_diplomatic_events.27.desc: "[ENG.GetNameDefCap] disagrees; the Pacific region will not be strengthened under centralized control. The Pacific territories will remain our British authority."
 AST_diplomatic_events.27.a: "Nevertheless, Australia shall endure."

 AST_diplomatic_events.28.t: "[ENG.GetLeader] Hangs Up"
 AST_diplomatic_events.28.desc: "The Prime Minister's cabled dispute with [ENG.GetLeader] resulted in little reinforcement for Australia, but added to British resentment toward [AST.GetLeader] for pressing Australia’s interests."
 AST_diplomatic_events.28.a: "Australia must see to her own defenses."

 AST_diplomatic_events.29.t: "Britain to Our Aid"
 AST_diplomatic_events.29.desc: "Following Australian pressure on [ENG.GetNameDef] to instigate a conflict with [JAP.GetName], Britain has agreed to support our defensive construction efforts."
 AST_diplomatic_events.29.a: "The aid is welcome, but it will not avert a Japanese war."

 AST_diplomatic_events.30.t: "Australia Requests Resource Rights"
 AST_diplomatic_events.30.desc: "Expansionist aggressors look to Indochina not only for the territory itself, but also the resources it possesses. If the riches end up in enemy hands they will only prolong the war, while they in Australia's could help end it; or so the Australian government claims.\n\nShall we agree to grant them resource rights within our territory?"
 AST_diplomatic_events.30.a: "We shall."
 AST_diplomatic_events.30.b: "The resources are not for [AST.GetName] to take either."

 AST_diplomatic_events.31.t: "[FROM.GetNameDefCap] Grants [AST.GetName] Resource Rights"
 AST_diplomatic_events.31.desc: "Expansionist aggressors look to Indochina not only for the territory itself, but also the resources it possesses. If the riches end up in enemy hands they will only prolong the war, while they in Australia's could help end it; or so the Australian government claims.\n\n[ROOT.OVERLORD.GetNameDefCap] has agreed to the request."
 AST_diplomatic_events.31.a: "It is beyond our control."

 AST_diplomatic_events.32.t: "[FROM.GetNameDefCap] Grants Resource Rights"
 AST_diplomatic_events.32.desc: "[FROM.GetNameDefCap] agrees that the resources of Indochina would be better used in Australian hands, and has granted us resource rights."
 AST_diplomatic_events.32.a: "They will be of great use."

 AST_diplomatic_events.33.t: "[FROM.GetNameDefCap] Refuses to Grant Resource Rights"
 AST_diplomatic_events.33.desc: "[FROM.GetNameDefCap] does not agree that the resources of Indochina would be better used in Australian hands, and refuse to grant us resource rights."
 AST_diplomatic_events.33.a: "We hope they will not end up in enemy hands."

 AST_diplomatic_events.34.t: "[AST.GetNameDefCap] Requests to Divide Pacific Territories"
 AST_diplomatic_events.34.desc: "[AST.GetNameDefCap] suggests a pact; one that would settle potential conflicts between our two nations before they have the chance to arise. By dividing Pacific territories between us, we can plan our future expansions without fearing interference from the other."
 AST_diplomatic_events.34.a: "A pact seems reasonable."
 AST_diplomatic_events.34.b: "[JAP.GetNameDefCap] will expand as it sees fit."

 AST_diplomatic_events.35.t: "The Pacific Has Been Divided"
 AST_diplomatic_events.35.desc: "[AST.GetNameDefCap] and [JAP.GetNameDefCap] have agreed on which Pacific territories each country may expand into. Hopefully, this will ward off any potential future conflicts between our two powers."
 AST_diplomatic_events.35.a: "It has been settled!"

 AST_diplomatic_events.36.t: "The Pacific Shall Divide Itself"
 AST_diplomatic_events.36.desc: "[JAP.GetNameDefCap] will not agree to divide the Pacific territories between our two nations; the Japanese government will expand as it sees fit."
 AST_diplomatic_events.36.a: "And so shall Australia's."

 AST_diplomatic_events.37.t: "Transfer of Overlordship"
 AST_diplomatic_events.37.desc: "For reasons unknown, [AST.GetName] has decided to transfer control of our lands to [JAP.GetNameDef]. Something ominous is simmering behind the scenes, and it is only a matter of time before the world finds out what."
 AST_diplomatic_events.37.a: "Evidently, we have no say in the matter."

 AST_diplomatic_events.38.t: "The Nauru Pact"
 AST_diplomatic_events.38.desc: "As a result of the First World War, several German territories in the Pacific were placed under Australian control, but there may now be a way to have one of them returned: the island of Nauru.\n\nThe [AST.GetFascistParty] holds values that align with our interests, one of which is the complete separation of [AST.GetName] from [ENG.GetNameDef]. Due to the movement's current limited influence, its representatives seek support from us to accelerate its growth, and once fully in power, they insist on returning control of the island of Nauru — provided that we Guarantee them when seeking independence."
 AST_diplomatic_events.38.a: "Our territory shall return!"
 AST_diplomatic_events.38.b: "We cannot commit to empty promises."

 AST_diplomatic_events.39.t: "[GER.GetNameDefCap] Agrees to Nauru Pact"
 AST_diplomatic_events.39.desc: "[GER.GetNameDefCap] and the [AST.GetFascistParty] have agreed on a common objective: [AST.GetName] shall achieve independence. Due to the [AST.GetFascistParty]'s currently limited political influence, [GER.GetNameDef] will contribute with a grant to accelerate its growth, and once our influence is limited no more, the agreement shall be fully carried out."
 AST_diplomatic_events.39.a: "Splendid!"

 AST_diplomatic_events.40.t: "The Nauru Pact Shatters"
 AST_diplomatic_events.40.desc: "Unable to commit to promises that cannot yet be fulfilled, [GER.GetNameDef] declines to support our rise to power. The Nauru Pact ends before it can even begin, and the ambitions of the [AST.GetFascistParty] shall remain on our shoulders completely."
 AST_diplomatic_events.40.a: "The [AST.GetFascistParty] will proceed without German support."

 AST_diplomatic_events.41.t: "Nauru's Return to German Hands"
 AST_diplomatic_events.41.desc: "Now fully in power, the [AST.GetFascistParty] honors its promise and fulfills its side of the bargain. Nauru is returned to [GER.GetNameDef], and we shall guarantee Australian independence."
 AST_diplomatic_events.41.a: "So we shall."

 AST_diplomatic_events.42.t: "The [AST.GetFascistParty] Breaks Its Promise"
 AST_diplomatic_events.42.desc: "Promises have one fatal flaw; they can be broken. Now at the reins of power, the leaders of the [AST.GetFascistParty] have decided that not only is Nauru theirs to keep, but so are other Pacific islands theirs to take.\n\nOur old Pacific territories will remain as far from being our as before the Nauru Pact was signed, and if we want it any other way, there must be war."
 AST_diplomatic_events.42.a: "The future will decide the consequences."

 AST_diplomatic_events.43.t: "[AST.GetNameDefCap] Requests Southeast Asia"
 AST_diplomatic_events.43.desc: "[AST.GetName] argues that through its expansion northward, we can increase our joint influence over Southeast Asian diplomacy and conflicts. Although not an outright demand, [AST.GetLeader] suggests that a refusal would not be accepted."
 AST_diplomatic_events.43.a: "With our attention elsewhere, it shall be for the best."
 AST_diplomatic_events.43.b: "Regardless, a refusal is what they shall receive."

 AST_diplomatic_events.44.t: "A Transfer of Southeast Asia"
 AST_diplomatic_events.44.desc: "[ENG.GetNameDefCap] has wisely agreed to the transfer of their Southeast Asian territories to us. As Australian borders expand, our influence follows suit, leaving it only a matter of time before the world becomes our oyster."
 AST_diplomatic_events.44.a: "The future looks bright."

 AST_diplomatic_events.45.t: "Southeast Asia Remains as Is"
 AST_diplomatic_events.45.desc: "[ENG.GetNameDefCap] has rejected the transfer of their Southeast Asian territories to us. Nonetheless, the appeal of controlling the region remains evident to us, and although it shall not be ours by request, it may yet become ours."
 AST_diplomatic_events.45.a: "Yes, it may."

 #AST_diplomatic_events.46.t was removed

 AST_diplomatic_events.47.t: "A Sharing of Burdens"
 AST_diplomatic_events.47.desc: "Despite its recent partition from the British Commonwealth, [AST.GetName] offers military cooperation. [AST.GetName] claims that a sharing of burdens would benefit [ENG.GetNameDefCap], considering how stretched thin it is across the globe."
 AST_diplomatic_events.47.a: "We shall agree."
 AST_diplomatic_events.47.b: "We will fend for ourselves."

 AST_diplomatic_events.48.t: "The British-Australian Pact"
 AST_diplomatic_events.48.desc: "[ENG.GetNameDefCap] has agreed to sign a non-aggression pact, laying the foundation for military cooperation."
 AST_diplomatic_events.48.a: "This marks a new chapter in our relations."

 AST_diplomatic_events.49.t: "Unsigned Pact"
 AST_diplomatic_events.49.desc: "[ENG.GetNameDefCap] has declined to sign a non-aggression pact. Our attempt to establish military cooperation between our two nations has therefore failed, and we must proceed alone with our outward advances."
 AST_diplomatic_events.49.a: "That we must indeed."

 AST_diplomatic_events.50.t: "The Australian Pacific Garrison"
 AST_diplomatic_events.50.desc: "Although the protection of Southeast Asia and the Pacific lies in Britain's interests, the region is far from the British Isles; so [FROM.GetName] has understood. In exchange for our support in supply, it has offered to assume command of the territory's defense, allowing us to direct our attention elsewhere."
 AST_diplomatic_events.50.a: "[FROM.GetName]'s assistance shall be welcomed."
 AST_diplomatic_events.50.b: "The region is located close enough."

 AST_diplomatic_events.51.t: "[ENG.GetNameDefCap]'s Pacific Garrison"
 AST_diplomatic_events.51.desc: "[FROM.GetNameDefCap] agrees; the Southeast Asian waters shall be protected by us. In exchange for British contributions of fuel, [ROOT.GetName] shall put its efforts into increasing naval dominance in our neighboring waters."
 AST_diplomatic_events.51.a: "The waters shall be ours."

 AST_diplomatic_events.52.t: "Australia's Own Pacific Garrison"
 AST_diplomatic_events.52.desc: "[FROM.GetNameDefCap] disagrees; they need no help defending the Southeast Asian waters. However, with or without British support, [ROOT.GetName] shall put its efforts into increasing naval dominance in neighboring waters. "
 AST_diplomatic_events.52.a: "The waters shall be ours."

 AST_diplomatic_events.53.t: "Vichy Out of Africa"
 AST_diplomatic_events.53.desc: "[AST.GetName] suspects that the fall or cooperation of Vichy France is one of [ENG.GetNameDef]'s main objectives, and has therefore offered to join in and pursue the French African colonies until Vichy is subdued. Although an unknown agenda may lie behind the proposal, there is no question that increased allied presence in the region would benefit us.\n\nIf we grant our permission, [AST.GetName] will initiate discussions with Vichy France, seeking a peaceful transfer of their colonies and the establishment of an Australian garrison."
 AST_diplomatic_events.53.a: "We shall welcome their support."
 AST_diplomatic_events.53.b: "The risk of [AST.GetName] leveraging it against us is too great."

 AST_diplomatic_events.54.t: "To Their Aid"
 AST_diplomatic_events.54.desc: "[ENG.GetNameDefCap] agrees: increased allied presence in Africa would benefit the Commonwealth.\n\nWe will initiate discussions with Vichy France, seeking a peaceful transfer of their colonies and the establishment of an Australian garrison."
 AST_diplomatic_events.54.a: "That we shall."

 AST_diplomatic_events.55.t: "With Permission or Not"
 AST_diplomatic_events.55.desc: "[ENG.GetNameDefCap] declines Australian aid in Africa and will handle the matter of Vichy France itself. Nevertheless, our ambitions are not easily diverted.\n\nAustralian control over the African territories of Vichy France would make us an equal of the British Commonwealth rather than its subordinate. We must pursue them despite [ENG.GetNameDef]'s wishes, although it will have to be by force."
 AST_diplomatic_events.55.a: "We shall expand."

 AST_diplomatic_events.56.t: "[AST.GetName] Demands African Territory"
 AST_diplomatic_events.56.desc: "On [ENG.GetNameDef]'s behalf, [AST.GetName] comes knocking on our door, demanding the transfer of African territories.\n\n[ENG.GetNameDefCap] is determined to expand its control in Africa, and should we not bow to Australian occupation, they shall return to our doorstep armed."
 AST_diplomatic_events.56.a: "To avoid conflict, the territories shall be transferred."
 AST_diplomatic_events.56.b: "Armed they must return, then."

 AST_diplomatic_events.57.t: "Vichy Transfers African Territory"
 AST_diplomatic_events.57.desc: "Vichy France has agreed to transfer the demanded African territories and has allowed an Australian garrison to seize control of the region."
 AST_diplomatic_events.57.a: "Further expansion into Africa shall continue!"

 AST_diplomatic_events.58.t: "Vichy Denies [AST.GetName] Territory"
 AST_diplomatic_events.58.desc: "Vichy France declines the transfer of African territories to us. However, this was not a request, but a demand.\n\nWe shall pursue the region they have denied us, though it will have to be by force."
 AST_diplomatic_events.58.a: "Peacefully or not, [AST.GetName] shall expand."

 #AST_diplomatic_events.59 was removed

 #AST_diplomatic_events.60 was removed

 #AST_diplomatic_events.61 was removed

 AST_diplomatic_events.62.t: "An Anti-Britain Pact?"
 AST_diplomatic_events.62.desc: "Diplomats from [AST.GetName] have come to us with an offer of establishing an Anti-British pact. This would entail their assistance in reclaiming northern Ireland from the Anglos, without us having to intervene directly.\n In return, should they succeed, we would join their Faction and assist them in a future war against Britain should it come to pass.\nWhile a unification with the north is alluring, we must carefully consider whether we're in a position to antagonize our stronger neighbor in such a way, and more importantly, if we could come out victorious in the case of conflict - lest all of Ireland once more becomes but a mere British colony."
 AST_diplomatic_events.62.a: "Unification cannot wait! Sign the pact!"
 AST_diplomatic_events.62.b: "It is too dangerous."

 AST_diplomatic_events.63.t: "Ireland rejects!"
 AST_diplomatic_events.63.desc: "Ireland has rejected signing the Anti-Britain Pact."
 AST_diplomatic_events.63.a: "Then Ireland will stay divided."

 AST_diplomatic_events.64.t: "Ireland accepts!"
 AST_diplomatic_events.64.desc: "Ireland has accepted signing the Anti-Britain Pact."
 AST_diplomatic_events.64.a: "Onwards, to Belfast!."

 AST_diplomatic_events.65.t: "[FROM.GetName] Provides Support"  ### Support for the Chinese Communists - Sends event from AST to PRC offering support
 AST_diplomatic_events.65.desc: "The growing influence of the [FROM.GetCommunistParty] in [FROM.GetNameDef] now bears fruit as its representatives have traversed China to inform us of a [FROM.GetAdjective] volunteer force that is mobilizing to support our forces. In addition, these volunteers are bringing spare equipment to help equip our own troops."
 AST_diplomatic_events.65.a: "A good start for cooperation with our [FROM.GetAdjective] comrades"
 #AST_diplomatic_events.65.b: "They should focus on their own revolution"

 AST_diplomatic_events.66.t: "[FROM.GetName] Thanks Us for Our Support" ### Support for the Chinese Communists - They accept
 AST_diplomatic_events.66.desc: "Representatives of [FROM.GetLeader] have communicated his thanks for the support of our volunteers and for the provided war material. The [FROM.GetAdjective] extensive experience in civil war surely means these resources will be used effectively."
 AST_diplomatic_events.66.a: "A great first step"

 AST_diplomatic_events.67.t: "[FROM.GetName] Thanks Us for Our Support" ### Support for the Chinese Communists - They accept
 AST_diplomatic_events.67.desc: "Representatives of [FROM.GetLeader] have communicated his thanks for the support of our volunteers and for the provided war material. The [FROM.GetAdjective] extensive experience in civil war surely means these resources will be used effectively."
 AST_diplomatic_events.67.a: "A great first step"

 AST_diplomatic_events.68.t: "Australian Demands"
 AST_diplomatic_events.68.desc: "Australia do not want to face its overwhelming enemy alone — [JAP.GetNameDef]. They are pressing us to take the first step and settle the looming conflict at the earliest convenience."
 AST_diplomatic_events.68.a: "How the tables have turned."

 AST_diplomatic_events.69.t: "Bound Once More"
 AST_diplomatic_events.69.desc: "The bond between [ENG.GetNameDef] and [AST.GetName] is being tested, but the latter is committed to fostering it back to full strength. [AST.GetName] has connections and allies within the British government to such an extent that its leaders simply cannot refuse them; the nations shall enter the same faction once more, and again, the Isles and the land down under shall work together."
 AST_diplomatic_events.69.a: "So it shall be."

 AST_diplomatic_events.71.t: "Australia Requests Pacfic Islands"
 AST_diplomatic_events.71.desc: "[AST.GetName] has demanded control over our Pacific islands, claiming that the western Pacific is not for [USA.GetNameDef] to command. The islands may be a small price to pay to calm Australian hostility, but a price nonetheless. Shall we risk provoking a rising fascist power, although we already have our hands full?"
 AST_diplomatic_events.71.a: "No we shall not."
 AST_diplomatic_events.71.b: "The Pacific islands shall remain ours."

 AST_diplomatic_events.72.t: "The Transfer of [USA.GetNameDef]'s Pacific Islands"
 AST_diplomatic_events.72.desc: "With their hands already full, the Pacific islands proved to be a small price for [USA.GetNameDef] to pay in order to calm Australian hostility. Their Pacific islands are now ours."
 AST_diplomatic_events.72.a: "Excellent."

 AST_diplomatic_events.73.t: "[USA.GetNameDefCap] Refuses"
 AST_diplomatic_events.73.desc: "[USA.GetNameDefCap] has refused to surrender their Pacific islands to us. Despite our demands and growing influence in the Pacific, Washington remains unwilling to relinquish its hold over the islands."
 AST_diplomatic_events.73.a: "The islands may not be ours, yet."

 AST_diplomatic_events.74.t: "Australian Demand for Philippine Transfer"
 AST_diplomatic_events.74.desc: "In its ambitions to expand its territories, [AST.GetName] has demanded control over [PHI.GetNameDef]. Should we refuse, [AST.GetName] threatens war, deeming it simply unthinkable that [USA.GetNameDef] retains territories within [AST.GetName]'s sphere of influence."
 AST_diplomatic_events.74.a: "We cannot risk war; meet their demands."
 AST_diplomatic_events.74.b: "The Philippines shall remain ours!"

 AST_diplomatic_events.75.t: "The Transfer of [PHI.GetNameDef]"
 AST_diplomatic_events.75.desc: "It is clear that [AST.GetName]'s' rise as a fascist power is beginning to bring certain benefits, when nations fear our wrath to such a degree. [USA.GetNameDefCap] has agreed; [PHI.GetNameDef] is ours."
 AST_diplomatic_events.75.a: "A new order emerges."

 AST_diplomatic_events.76.t: "[USA.GetNameDefCap] Refuses"
 AST_diplomatic_events.76.desc: "[USA.GetNameDefCap] has refused to surrender [PHI.GetNameDef] to us. Despite our demands and growing influence in the Pacific, Washington remains unwilling to relinquish its hold over the territory."
 AST_diplomatic_events.76.a: "This means war."

 AST_diplomatic_events.78.t: "[AST.GetName] Requests Guarantee Against the Giant"
 AST_diplomatic_events.78.desc: "[AST.GetNameDefCap] shares their bold objectives with us:\n\n'[USA.GetNameDefCap]'s shadow looms over us, threatening to interfere whenever our actions do not align with its interests. With a global power of such magnitude meddling in Australian and Japanese affairs, East Asia will never truly belong to us. And so, [AST.GetName] shall go to war.'\n\nPrime Minister [AST.GetLeader] makes his intentions very clear: [AST.GetName] intends to take on [USA.GetNameDef], and is requesting our aid should the Americans prove too mighty to overcome alone."
 AST_diplomatic_events.78.a: "Guarantee them we shall."
 AST_diplomatic_events.78.b: "[JAP.GetNameDefCap] has its own business to tend to."

 AST_diplomatic_events.79.t: "[JAP.GetNameDefCap] Guarantees [AST.GetName]"
 AST_diplomatic_events.79.desc: "It is clear, not only to us, that [USA.GetNameDef]'s interference in Asian and Oceanian diplomacy is both undesirable and unacceptable. [JAP.GetNameDefCap] has agreed to guarantee our nation, thereby allowing us to bear our standard high against our enemies, knowing that an ally will come to our aid should the Americans prove too mighty to overcome alone."
 AST_diplomatic_events.79.a: "To war we march."

 AST_diplomatic_events.80.t: "[JAP.GetNameDefCap] Refuses to Guarantee Us"
 AST_diplomatic_events.80.desc: "[USA.GetNameDefCap]'s interference in Asian and Oceanian diplomacy is both undesirable and unacceptable, but it seems to be clear only to us. [JAP.GetNameDefCap] refuses to guarantee us, forcing us to take on our enemies without them."
 AST_diplomatic_events.80.a: "And so we shall."

 AST_diplomatic_events.81.t: "A Charming Symbol of Unity"
 AST_diplomatic_events.81.desc: "The British Prime Minister's interest in animals has hardly escaped anyone's notice, his collection being rather impressive. Any addition to his diverse family of creatures is sure to be appreciated, but even more so, an exotic one.\n\n[ENG.GetLeader] himself has expressed an interest in the Australian platypus, and although its export currently is prohibited due to the health risks the transport poses to the small creature, it might be worth making an exception.\n\nShall we grant the Prime Minister's wish, as a symbol of unity?"
 AST_diplomatic_events.81.a: "[ENG.GetLeader] shall have his platypus."
 AST_diplomatic_events.81.b: "The export ban shall not be lifted, not even for the Prime Minister."

 AST_diplomatic_events.82.t: "A Grievous Report from [ENG.GetLeader]"
 AST_diplomatic_events.82.desc: "The platypus transport that cast off from the port of Melbourne six weeks ago, with a complete platypusory on board, has arrived in [ENG.GetNameDef]. The ship's arrival was not a joyous one, however, since the animal was revealed to be dead. [ENG.GetLeader] laments his lost pet, whom he had even named after himself while awaiting its arrival, but claims that enemies are to blame for its demise. Apparently, the blasts of a submarine attack frightened the platypus to death.\n\nHowever, the platypus attendant's logbook points to another likely cause of death: the water and air temperatures of the platypusory was well beyond the acceptable levels.\n\nRegardless, [ENG.GetLeader] the Platypus is dead, and the British Prime Minister will remain platypus-less."
 AST_diplomatic_events.82.a: "Sad news indeed."

 AST_political_events.1.t: "Call for a Referendum"
 AST_political_events.1.desc: "There are two areas in which we, as government, seek to increase federal control: Aviation, and Marketing.\n\nConcerning Aviation, the object is to amend the Constitution to confer upon the Commonwealth Parliament the power to make laws regarding air navigation and aircraft.\n\nThe Marketing amendment is one to permit co-operation between the Commonwealth and the States in the marketing field, which is at present constitutionally impossible.\n\nWhich one shall we call a referendum for?"
 AST_political_events.1.a: "Aviation, to regulate air navigation throughout [AST.GetName]."
 AST_political_events.1.a.tt: "Once the reform passes:\n Add §YPassed Aviation Reform§!, which grants:\n Air Research Speed: §G+15%§!\n §YAir Base§! construction speed: §G+5.00%§!"
 AST_political_events.1.b: "Marketing, to coordinate nationwide agricultural marketing schemes."
 AST_political_events.1.b.tt: "Once the reform passes:\n Add §YPassed Marketing Reform§!, which grants:\n Consumer Goods Factories factor: §Y-10.0%§!"

 AST_political_events.2.t: "A Successful Referendum"
 AST_political_events.2.desc.a: "The public has agreed to let our aviation reform be enacted. Since aviation did not exist when the Australian Constitution was written, it is only right that the government finally takes authority over air navigation and regulation. For the sake of safety and efficiency, uniform national aviation laws shall now follow."
 AST_political_events.2.desc.b: "The public has agreed to let our marketing reform be enacted. With the power to regulate agricultural products and their marketing, the government will now be able to stabilize markets and improve cooperation between the states. Farmers' incomes shall become steadier, and so shall the national economy."
 AST_political_events.2.a: "Federal control shall expand!"

 AST_political_events.4.t: "The Prime Minister Succumbs"
 AST_political_events.4.desc: "[AST.GetName]'s leaders have long labored under the pressure of war preparations, and at last, the strain claimed its highest victim; the Prime Minister has died of a heart attack.\n\nGiven the current state of the world, his leadership will be greatly missed. Nevertheless, Australia must carry on with a new leader at the reins: [AST.GetLeader]."
 AST_political_events.4.a: "A national tragedy."

 AST_political_events.5.t: "The Australian Government Gets Tough"
 AST_political_events.5.desc: "A group of defiant and controversial voices has formed: the Australia First Movement. The government fears that its intentions may not be entirely democratic and has chosen to place the group, as well as its members, under surveillance. The democrats' interference will reduce our capabilities to organize, and stifle the recruitment of new members."
 AST_political_events.5.a: "Only time will tell the true nature of the movement."

 AST_political_events.6.t: "The 1938 Sesquicentenary"
 AST_political_events.6.desc: "Earlier today, while the commemoration of the 1938 sesquicentenary unfolded and the pageant 'Australia's March to Nationhood' traversed through Sydney's main streets, a protest was held at Australia Hall.\n\nAboriginal rights activists and groups gathered to call attention to the fact that the 150th anniversary not only marked the beginning of British colonization, but also the constitutional discrimination of Aboriginal peoples. The activists demanded new laws for the education and care of Aboriginal peoples, as well as a new policy to allow for the elevation of Indigenous peoples to full citizen status."
 AST_political_events.6.a: "Action must be taken."

 AST_political_events.7.t: "Imperial Pressure"
 AST_political_events.7.desc: "Following recent events, it can no longer be denied that Australian politics are shifting. [ENG.GetNameDefCap] has taken action to diplomatically ensure that [AST.GetName] remains on a path suitable for a nation under their Commonwealth umbrella, hoping that their peaceful nudge in the right direction shall be enough to keep their Dominion loyal."
 AST_political_events.7.a: "Despite Britain's attempts, [AST.GetName] shall decide its own path."

 AST_political_events.8.t: "War is Coming"
 AST_political_events.8.desc: "$AST_war_is_coming_cat_desc$"
 AST_political_events.8.a: "We must prepare."

 AST_political_events.9.t: "The Dalfram Dispute"
 AST_political_events.9.desc: "What began as a dispute over the loading of pig iron has ignited something far greater. Workers across Australia are walking off the job in solidarity, defying both government and industry. As strikes spread and tensions rise, the crisis spirals, and demands the resignation of those in power. And so, having failed entirely to control the situation, the government does just that, leaving the position of ruling party open for the [AST.GetCommunistParty] to claim."
 AST_political_events.9.a: "And claim it we shall."

 AST_canberra_air_disaster_events.1.t: "Canberra Air Disaster"
 AST_canberra_air_disaster_events.1.desc: "Earlier today, a Lockheed Hudson aircraft crashed just outside Canberra. Among the ten people on board were the Chief of Army and his staff, who were answering a summons to a Cabinet meeting. They and the flight crew have all tragically perished.\n\nWhat caused the crash is a mystery; the weather offered ideal flying conditions, and the flight was piloted by the experienced RAAF officer Flight Lieutenant Robert Hitchcock.\n\nRegardless of the cause, it is a grim day for the entire nation — not least for the family and friends of the victims — and Australia now looks to its leaders. How will they respond?"
 AST_canberra_air_disaster_events.1.a: "A horribly tragic event."
 AST_canberra_air_disaster_events.1.a.tt: "Unlocks §Y'Cabinet Trust' decisions§! and §Ymission§! to save or remove the sitting government."

 AST_canberra_air_disaster_events.2.t: "[AST.GetRulingParty] Prevailed"
 AST_canberra_air_disaster_events.2.desc: "The sitting government has successfully led Australia through the national turmoil that followed the Canberra Air Disaster. Like a guiding light, the [AST.GetRulingParty] has proven its reliability and strength in trying times, ultimately increasing public support across the nation."
 AST_canberra_air_disaster_events.2.a: "The future lies ahead."

 AST_canberra_air_disaster_events.3.t: "A Motion of No-Confidence"
 AST_canberra_air_disaster_events.3.desc: "Following a successful no-confidence motion, the sitting government is replaced at last, reluctantly handing the reins over to its successors. After a period of political instability and public distrust, Australia is ready for a new beginning."
 AST_canberra_air_disaster_events.3.a: "A new leadership to Australia's aid."

 AST_canberra_air_disaster_events.4.t: "A Change of Leadership"
 AST_canberra_air_disaster_events.4.desc: "After a period of political instability and public distrust, [AST.GetRulingParty] replaces its leadership. A majority vote forces the Prime Minister to step down, and allows for his successor to take the podium."
 AST_canberra_air_disaster_events.4.a: "Hopefully, this will pave the way for Australia."

 AST_canberra_air_disaster_events.5.t: "Australian Accusations"
 AST_canberra_air_disaster_events.5.desc: "In a press conference, [AST.GetName] has thrown accusations our way, claiming we are responsible for a recent plane crash on Australian soil, resulting in the death of several political officials.\n\nThe accusations are completely false, of course, only making the disrespect all the more malicious."
 AST_canberra_air_disaster_events.5.a: "The claims are false, we need not act."
 AST_canberra_air_disaster_events.5.b: "This shall not go unpunished."

 AST_canberra_air_disaster_events.6.t: "[JAP.GetNameDefCap] Retaliates"
 AST_canberra_air_disaster_events.6.desc: "[JAP.GetNameDefCap] did not take our accusations lightly, deeming them a first act of aggression. [JAP.GetLeader] has escalated the conflict further, stating that it is now within his nation's full right to invade our lands."
 AST_canberra_air_disaster_events.6.a: "We shall not increase tensions any more."
 AST_canberra_air_disaster_events.6.b: "This cannot remain unanswered."

 INS_limited_war_events.1.t: "Crush Malaya!"
 INS_limited_war_events.1.desc: "The enemy lines have broken and our men press forward unopposed. Across the Strait, the British client state crumbles beneath the weight of the people's anger. The puppets of London thought their bayonets would shield them from history. They were wrong."
 INS_limited_war_events.1.a: "Merdeka!"
 INS_limited_war_events.1.b: "A fine day for the Republic."

 INS_limited_war_events.2.t: "[FROM.GetAdjective] Counter-Stroke"
 INS_limited_war_events.2.desc: "What was promised as a swift strike against the puppet regime has soured. The [FROM.GetAdjective] forces, stiffened by their imperial paymasters, have driven our men from the contested ground and now sit upon it as occupiers. Every day the wireless carries word of their boasting. To press on invites further humiliation, but to withdraw is to confess defeat before the whole archipelago."
 INS_limited_war_events.2.a: "Withdraw the men. Save what we can."
 INS_limited_war_events.2.b: "We will not yield to the puppets!"

 INS_limited_war_events.3.t: "[FROM.GetName] Bows to the Republic"
 INS_limited_war_events.3.desc: "Word has come from Kuala Lumpur. The puppet government, abandoned at the decisive hour by its London masters, has accepted our terms rather than see its towns burn. The disputed lands are ours. The lesson will not be lost on the other client states of the region."
 INS_limited_war_events.3.a: "Indonesia rises."

 INS_limited_war_events.4.t: "[FROM.GetName] Spurns Our Terms"
 INS_limited_war_events.4.desc: "[FROM.GetName] has thrown our offer back in our faces. The puppet ministers, reading from a script written in Whitehall, declare that no inch of soil shall be surrendered and that the Republic itself must be brought to heel before the guns fall silent."
 INS_limited_war_events.4.a: "Then let the guns speak."

 INS_limited_war_events.5.t: "[FROM.GetNameDef] Calls for Our Destruction"
 INS_limited_war_events.5.desc: "[FROM.GetNameDefCap] has cast off the last pretense of measured war. Their broadcasts now speak openly of dismembering the Republic and parceling its islands among the old colonial masters. There will be no quiet ending to this affair. Either Indonesia stands at the close of it, or it does not stand at all."
 INS_limited_war_events.5.a: "We stand or we fall together."

 INS_limited_war_events.6.t: "The [FROM.GetAdjective] Advance Falters"
 INS_limited_war_events.6.desc: "The [FROM.GetAdjective] thrust caught us unprepared and for a season we feared the worst. Yet their drive has run itself into the mud. Their men are tired, their lines are long, and the bluster from London grows thinner with each communique. The Republic may yet be magnanimous and offer the puppets a way to bow out of this affair, though many would say a clean victory serves the cause better than a measured one."
 INS_limited_war_events.6.a: "Offer them terms."
 INS_limited_war_events.6.b: "No mercy for the puppets."

 INS_limited_war_events.7.t: "Our Offensive Grinds to a Halt"
 INS_limited_war_events.7.desc: "Our advance has stalled, and worse than that, the enemy knows it. A demand has come from across the Strait. Lay down arms now and accept their terms, or watch the casualty lists grow longer for the same outcome. The choice they offer is the size of the funeral."
 INS_limited_war_events.7.a: "Better a poor peace than a worse war."
 INS_limited_war_events.7.b: "The Republic does not surrender."

 INS_limited_war_events.8.t: "[FROM.GetName] Refuses to Bend"
 INS_limited_war_events.8.desc: "[FROM.GetName] has answered our offer with defiance. Their ministers proclaim that they would sooner see every kampong from Penang to Johor put to the torch than yield a single concession to the Republic. So the war goes on."
 INS_limited_war_events.8.a: "Then so be it."

 INS_limited_war_events.9.t: "[FROM.GetName] Means to Break the Republic!"
 INS_limited_war_events.9.desc: "Wireless intercepts from the enemy command have confirmed the worst. There will be no settlement, no measured peace, no return to the lines we held before. The puppets and their London masters demand the total surrender of the Republic, that Indonesia be broken on the wheel and her islands handed back to the imperialist boot from which we tore them. To this there is only one answer."
 INS_limited_war_events.9.a: "Indonesia stands!"

### AST - Union Control Events ###
 AST_union_control_events.1.t: "Foreign Agents in Our Trade Unions"
 AST_union_control_events.1.desc: "Intelligence services have brought a troubling report to the government's attention. Australian communist operatives have been making contact with local trade union leaders, distributing radical literature and encouraging workers to organise along revolutionary lines. The movement remains small for now, but security officials warn that this is precisely how such things begin. A decision must be made before it takes root."
 AST_union_control_events.1.a: "Keep them under surveillance. We'll watch and wait."

 AST_union_control_events.4.t: "Communist Infiltrators Seize [MAL.GetAdjective] Territory"
 AST_union_control_events.4.desc: "A shocking report has reached the government. A coordinated operation has seized one of our states and declared it part of the revolutionary government. The speed and organisation of the assault has raised uncomfortable questions — our intelligence services suspect the insurgents did not act alone, and that foreign hands may have guided them to our shores. Those who escaped the takeover have not surrendered. They have regrouped and taken up arms, determined to reclaim what was taken from them."
 AST_union_control_events.4.a: "Find out who is behind this. These insurgents will not hold that ground for long."
 AST_union_control_events.4.a.tt: "Anti-communist militia forces have rallied and formed to resist the communist occupation."

 AST_union_control_events.5.t: "The [MAL.GetAdjective] Disaster"
 AST_union_control_events.5.desc: "The operation has ended in catastrophe. Our troops never made it ashore. They were turned back by loyalist patrols, lost in the straits, or captured before they could establish a position. The details are murky, but the outcome is not. Worse, the press has caught wind of the affair. Questions are now being asked in parliament about what exactly our forces were doing in those waters. The public response has been one of shock and embarrassment. Whatever gains we hoped to secure for the revolution, we will have to find another way."
 AST_union_control_events.5.a: "A terrible setback. We must turn to other avenues to support our comrades."

 AST_union_control_events.3.t: "Revolution Breaks Out in [MAL.GetNonIdeologyName]"
 AST_union_control_events.3.desc: "The workers of [MAL.GetNonIdeologyName] have risen up. Communist cells nurtured through our long campaign have taken up arms across the country — but the picture from the field is troubling. The revolutionary forces have found themselves concentrated in the wrong areas, separated from the heart of the peninsula by water and jungle. Without a foothold on the mainland, the government will simply wait them out and starve the revolution before it can spread. Australia must act covertly and quickly to land fighters on the peninsula and give the revolution the ground it needs to survive."
 AST_union_control_events.3.a: "We cannot let the revolution die on the beach. Secure them a foothold."

 AST_union_control_events.2.t: "[AST.GetAdjective] Backed Agitators on Our Streets"
 AST_union_control_events.2.desc: "Agents of the Australian communist government have arrived in our cities. They are not hiding — pamphlets are distributed at factory gates, speeches delivered in public squares, and solidarity networks established between Australian operatives and local radical groups. The existing networks of foreign influence appear to have been reinvigorated overnight. This is a coordinated campaign, and the government must decide how to respond before popular discontent becomes something harder to manage."
 AST_union_control_events.2.b: "A troubling development."

###########################
##### ABDACOM EVENTS ######
###########################

 ABDA_events.1.t: "An Invitation to a New Supreme Command"
 ABDA_events.1.desc: "[FROM.GetNameDef] has established a joint supreme command for the Pacific theatre and has extended an invitation for us to join. The initiative — known as ABDACOM — seeks to pool the naval, air, and ground forces of allied nations operating in the region under a unified command structure. Membership would mean closer coordination with [FROM.GetNameDef] and the other partners already committed to the effort. We must decide whether to accept."
 ABDA_events.1.a: "We will stand together."
 ABDA_events.1.b: "We cannot commit to this at the present time."

 ABDA_events.2.t: "[FROM.GetName] Joins the ABDACOM"
 ABDA_events.2.desc: "[FROM.GetNameDef] has accepted our invitation to join the ABDACOM Supreme Command. Their forces will now operate under the joint command structure, strengthening our position in the Pacific theatre."
 ABDA_events.2.a: "A welcome development."

 ABDA_events.3.t: "[FROM.GetName] Declines to Join"
 ABDA_events.3.desc: "[FROM.GetNameDef] has declined our invitation to join the ABDACOM Supreme Command. Their forces will not be committed to the joint effort at this time, though the door may yet remain open."
 ABDA_events.3.a: "Unfortunate, but noted."

 ABDA_events.5.t: "An Invitation to Join ABDACOM"
 ABDA_events.5.desc: "[FROM.GetNameDef] has extended an invitation for us to join the American-British-Dutch-Australian Command. ABDACOM has already established itself as the supreme coordinating authority for Allied forces in the Pacific theatre, bringing together the navies and armies of the major Allied powers under one command. Membership would bring our forces into this unified structure, with access to shared intelligence, coordinated doctrine, and the full weight of Allied support. We must decide."
 ABDA_events.5.a: "We will stand together."
 ABDA_events.5.b: "We cannot commit to this at the present time."

 ABDA_events.4.t: "The Defences of Singapore"
 ABDA_events.4.desc: "With Singapore designated as a linchpin of the ABDACOM defensive perimeter, our commanders must decide how to invest in its fortifications. We can prioritise the naval approaches and harbour defences, harden the landward approaches against an overland assault, or spread our resources across both. Each course of action will shape how Singapore can be defended when the enemy comes."
 ABDA_events.4.a: "Reinforce the naval approaches. Singapore's strength is its harbour."
 ABDA_events.4.b: "Fortify the landward perimeter. The real threat will come overland."
 ABDA_events.4.c: "A balanced approach. No single avenue of attack must go undefended."

 ABDA_fortress_singapore_choice_tt: "Completing this focus will present a choice for how to fortify Singapore."
 ABDA_faction_membership_requirement_tt: "Eligible faction members will receive invites to join."
