 CZE_a_divided_nation_category_2_tt: "§YЕфекти при виборі§!:\nРозблоковує рішення категорії §Y$CZE_a_divided_nation_category$§!, які §Yвидалять§! негативні модифікатори в наших §Yрегіонах§!, а також зменшать негативні ефекти від національного духу §Y$CZE_a_divided_nation_dynamic_modifier$§!, поки його не буде §Yвидалено§!."
 CZE_a_divided_nation_category_3_tt: "Розблоковує рішення категорії §Y$CZE_a_divided_nation_category$§!, які §Yвидалять§! негативні модифікатори в наших §Yрегіонах§!, а також зменшать негативні ефекти від національного духу §Y$CZE_a_divided_nation_dynamic_modifier$§!, поки його не буде §Yвидалено§!."
