 CZE_embezzle_quatermaster_funds: "£BoP_left_texticon Розкрадання інтендантських коштів"
 CZE_embezzle_quatermaster_funds_desc: "Про наших солдатів і так добре дбають. Звісно ж, ніхто не помітить і не засмутиться, якщо частина коштів, призначених для наших казарм, піде кудись інде."
 CZE_prioritize_export_contracts: "£BoP_left_texticon Пріоритет експортних контрактів"
 CZE_prioritize_export_contracts_desc: "Саме наша експортна промисловість допомогла нам вибратися з Великої депресії. Чому ми повинні змінювати свою поведінку зараз? Будь-яка загроза нашій нації все одно перебільшена. Армія може й почекати."
 CZE_focus_on_export_designs: "£BoP_left_texticon Фокус на експортних розробках"
 CZE_focus_on_export_designs_desc: "Армія дуже вимоглива до того, що вона хоче бачити в наших розробках. Експортний ринок більш поблажливий, і він також допомагає фінансувати вітчизняні проєкти для армії. Тож насправді армія мала б бути нам дуже вдячною за те, скільки грошей ми їй економимо на дослідженнях і розробках. Нема за що, арміє."
 CZE_bop_reservist_training: "£BoP_right_texticon Підготовка резервістів"
 CZE_junior_officer_recruitment: "£BoP_right_texticon Набір молодших офіцерів"
 CZE_send_foreign_attaches: "£BoP_right_texticon Відправити іноземних аташе"
 CZE_send_observers_to_the_italo_ethiopian_war: "£BoP_right_texticon Відправити спостерігачів до Ефіопії"
 CZE_send_observers_to_the_italo_ethiopian_war_bonus: "Відправлено спостерігачів на італо-ефіопську війну"
 CZE_send_observers_to_the_italo_ethiopian_war_desc: "Таємне відправлення осіб для спостереження та встановлення контактів з учасниками бойових дій на місцях забезпечить цінне розуміння сучасної військової доктрини. Це також може відкрити деякі інші можливості."
 CZE_send_observers_to_the_italo_ethiopian_war_tt: "§Y$CZE_zbrojovka_brno_organization$§! дізнається про можливості контрабанди зброї в §Y[ETH.getname]§!."
 CZE_recruit_red_cross_veterans: "£BoP_right_texticon Залучити ветеранів Червоного Хреста"
 CZE_warehouse_inspections: "£BoP_right_texticon Перевірки складів"
 CZE_warehouse_inspections_desc: "Ви не дізнаєтесь, чи чогось не вистачає, доки не підете і не перевірите."
 CZE_construction_telephone_stations: "£BoP_right_texticon Будівництво телефонних станцій"
 CZE_construction_telephone_stations_desc: "Будівництво телефонних станцій між нашими штабами значно покращить координацію вищого командування."
 CZE_state_defense_loans: "£BoP_right_texticon Державна позика на оборону"
 CZE_live_fire_exercise: "£BoP_right_texticon Бойові стрільби"
 CZE_live_fire_exercise_desc: "Ніщо не замінить дня, проведеного на стрільбищі."
 CZE_redirect_military_discretionary_spending: "£BoP_left_texticon Перенаправлення дискреційних військових витрат"
 CZE_redirect_military_discretionary_spending_desc: "Ці кошти є дискреційними, і в наших повноваженнях вирішувати не витрачати їх на армію."
