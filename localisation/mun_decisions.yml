 CZE_sudeten_promise_mission_desc: "Підтримуючи воєнізовані формування в Судетській області, ми пообіцяли допомогти їм відокремитися від [CZE.GETNAME] та приєднатися до нас. Відмова від цієї обіцянки призведе до політичних наслідків."
