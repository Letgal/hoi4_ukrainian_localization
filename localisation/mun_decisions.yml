 CZE_a_divided_nation_category: "Розділена нація"
 CZE_a_divided_nation_category_desc: "У різних рухах всередині країни зростає невдоволення урядом, яке більше не можна ігнорувати чи відкидати. Вирішення цих проблем послабить сили, що намагаються розірвати країну на частини. Принаймні в найближчому майбутньому."
