 CZE_crisis_in_the_sudentenland_desc: "Судетські воєнізовані угруповання підняли повстання в Судетах і розпочали проти нас партизанську війну. Тривалі зіткнення з нашими військами призвели до хаосу. Ми маємо взяти ситуацію під контроль, і зробити це потрібно до того, як ворог зможе цим скористатися."
