 ## FORT DECISIONS
 CZE_the_second_fortification_program_category: "Програми фортифікації"
 CZE_the_second_fortification_program_category_desc: "Невигідні кордони нашої країни є гострою проблемою національної безпеки. Держави, що нас оточують, дали чітко зрозуміти, що мають намір перекроїти їх на свою користь. Подальше укріплення наших рубежів змусить будь-якого потенційного ворога двічі подумати, перш ніж нападати на нас."
 CZE_fate_of_the_ro: "Доля Ради з фортифікації"
 CZE_fate_of_the_ro_desc: "Рада з фортифікації відповідає за збір коштів на наші фортифікаційні проєкти. Якщо ці кошти найближчим часом не будуть використані, люди почнуть задаватися питанням, навіщо взагалі їх збирали."
 CZE_bop_army_bunker_maintenance: "Зусилля з обслуговування укріплень"
 CZE_bop_army_bunker_maintenance_desc: "Належне обслуговування наших укріплень та підтримання їх у готовності забезпечить армії впевненість у них, якщо виникне потреба зайняти оборону."
 CZE_fortification_research: "Дослідження фортифікації"
 CZE_fortification_research_desc: "Необхідність укріплення нашого кордону очевидна, але питання в тому, як саме це зробити? Дослідження допоможуть нам знайти відповідь на це питання."
 CZE_fortification_research_tt: "Має національний дух §Y$CZE_directorate_of_fortification_works_no_gd_idea$§!"
 CZE_fortification_research_subtract_variable_tt: "Усі майбутні рішення з категорії «§YПрограми фортифікації§!» виконуватимуться на §Y30§! днів швидше!"
 CZE_fortification_decision_inprogress: "Вже йде робота над іншою програмою фортифікації"
 CZE_second_sudetenland_fortification_program: "Друга Судетська програма фортифікації"
 CZE_second_sudetenland_fortification_program_desc: "Судетська область, наш гірський кордон із Німеччиною, є ідеальним місцем для прикордонних укріплень. Вивчивши французьку лінію Мажино, ми можемо побудувати власну подібну лінію."
 CZE_third_sudetenland_fortification_program: "Третя Судетська програма фортифікації"
 CZE_third_sudetenland_fortification_program_desc: "Тепер Судетська область може похвалитися непоганою лінією оборони, але «непогано» — це недостатньо, коли на карту поставлено виживання нашої нації."
 CZE_fourth_sudetenland_fortification_program: "Четверта Судетська програма фортифікації"
 CZE_fourth_sudetenland_fortification_program_desc: "Судети мають міцну систему укріплень, але вона повинна стати ще сильнішою."
 CZE_fortify_the_crossroads_with_slo: "Укріпити перехрестя шляхів"
 CZE_fortify_the_crossroads_with_slo_desc: "Будь-яку систему укріплень можна прорвати. Щоб запобігти цьому, ми можемо побудувати опорні пункти навколо наших найважливіших міст, щоб ворог, який прорве наші лінії, не зміг їх легко захопити."
 CZE_fortify_the_hungarian_border_with_73: "Укріпити угорський кордон"
 CZE_fortify_the_hungarian_border_with_73_desc: "Угорський іредентизм є постійною загрозою для нашої нації. Система укріплень вздовж нашого спільного кордону допоможе гарантувати нашу безпеку."
 CZE_fortify_the_polish_border_with_72: "Укріпити польський кордон"
 CZE_fortify_the_polish_border_with_72_desc: "Польська агресія не знає меж, але сподіваємося, що добре укріплений кордон змусить їх шукати легшу ціль."

